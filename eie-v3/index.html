<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EIE 시간표 V3</title>
  <link rel="stylesheet" href="./css/v3.css">
</head>
<body>
  <div class="v3-app-shell">
    <header class="v3-header">
      <span class="v3-header-title">EIE 시간표 V3</span>
      <a href="../eie/index.html" class="v3-header-back">← V2로 돌아가기</a>
    </header>

    <nav class="v3-day-tabs" id="v3-day-tabs" aria-label="보기 선택">
      <button class="v3-tab is-active" data-day="all">전체</button>
      <button class="v3-tab" data-day="월">월</button>
      <button class="v3-tab" data-day="화">화</button>
      <button class="v3-tab" data-day="수">수</button>
      <button class="v3-tab" data-day="목">목</button>
      <button class="v3-tab" data-day="금">금</button>
    </nav>

    <main id="v3-app" class="v3-main">
      <div class="v3-loading">불러오는 중...</div>
    </main>
  </div>

  <script src="./js/v3-utils.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/block-builder.js"></script>
  <script src="./js/day-view-builder.js"></script>
  <script src="./js/renderer.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
