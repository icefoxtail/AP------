<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AP MATH - 학생 오답체크</title>
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --border: #dadce0;
            --error: #d93025;
            --success: #34a853;
            --text: #202124;
            --text-sec: #5f6368;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
            margin: 0; background: var(--bg); color: var(--text); line-height: 1.5;
            user-select: none;
        }
        header {
            background: var(--surface); padding: 16px; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 18px; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }
        
        main { padding: 16px; max-width: 500px; margin: 0 auto; min-height: calc(100vh - 60px); }
        
        /* 배너 및 정보창 */
        .info-banner {
            background: #e8f0fe; padding: 14px; border-radius: 12px; margin-bottom: 20px;
            font-size: 13px; border-left: 5px solid var(--primary); color: #174ea6;
        }
        .warning-text { color: var(--error); font-weight: 700; margin-top: 4px; display: block; }

        /* 카드 공통 */
        .card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px; 
            padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
        }

        /* 학생 선택 그리드 */
        .student-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .student-btn {
            border: 1px solid var(--border); background: var(--surface); padding: 16px 10px;
            border-radius: 12px; font-size: 15px; font-weight: 700; text-align: center;
            transition: all 0.2s; cursor: pointer; position: relative;
        }
        .student-btn .school-tag { font-size: 11px; font-weight: normal; opacity: 0.6; display: block; margin-top: 2px; }
        .student-btn.selected { border-color: var(--primary); background: #e8f0fe; color: var(--primary); box-shadow: inset 0 0 0 1px var(--primary); }
        .student-btn.done { opacity: 0.5; background: #f1f3f4; cursor: not-allowed; }
        
        .badge-done {
            position: absolute; top: -5px; right: -5px; background: var(--error); color: white;
            font-size: 10px; padding: 2px 6px; border-radius: 20px; font-weight: 800;
        }

        /* 검색창 */
        .search-input {
            width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border);
            font-size: 16px; margin-bottom: 16px; background: var(--surface);
        }

        /* OMR 그리드 */
        .omr-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .omr-btn {
            height: 54px; border: 1px solid var(--border); border-radius: 10px;
            background: var(--surface); font-size: 16px; font-weight: 800; color: var(--text-sec);
            display: flex; align-items: center; justify-content: center; transition: 0.1s;
        }
        .omr-btn.active { background: var(--error); color: white; border: none; transform: scale(0.95); }

        /* 하단 액션 바 */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; padding: 16px;
            background: var(--surface); border-top: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 8px; z-index: 110;
        }
        .btn-main {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: var(--primary); color: white; font-size: 17px; font-weight: 800;
            cursor: pointer; transition: 0.2s;
        }
        .btn-main:active { filter: brightness(0.9); transform: translateY(1px); }
        .btn-main:disabled { background: var(--border); cursor: not-allowed; }
        .btn-sub {
            width: 100%; padding: 10px; border: none; background: transparent;
            color: var(--text-sec); font-size: 14px; font-weight: 600; text-decoration: underline;
        }

        /* 모달/오버레이 */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .modal {
            background: var(--surface); width: 100%; max-width: 400px; border-radius: 20px;
            padding: 24px; text-align: center;
        }

        /* 토스트 */
        #toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(32, 33, 36, 0.9); color: white; padding: 12px 24px;
            border-radius: 50px; font-size: 14px; z-index: 1000; opacity: 0; transition: 0.3s;
            pointer-events: none; white-space: nowrap;
        }

        .hidden { display: none !important; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">AP MATH</div>
        <div id="header-status" style="font-size: 12px; color: var(--text-sec);"></div>
    </header>

    <main id="app-root">
        <div style="text-align: center; margin-top: 100px;">
            <div class="loader"></div>
            <p style="margin-top: 16px; color: var(--text-sec);">데이터를 불러오는 중...</p>
        </div>
    </main>

    <div id="toast"></div>

    <div id="confirm-overlay" class="overlay hidden">
        <div class="modal">
            <h2 id="confirm-title" style="margin: 0 0 12px 0;">제출 확인</h2>
            <div id="confirm-body" style="margin-bottom: 24px; font-size: 15px; color: var(--text-sec);"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="background: #f1f3f4; color: var(--text);" onclick="closeConfirm()">취소</button>
                <button id="final-submit-btn" class="btn-main">제출하기</button>
            </div>
        </div>
    </div>

    <script src="check.js"></script>
</body>
</html>
