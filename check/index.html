<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AP Math 오답 제출</title>
  <style>
    :root {
      --primary: #2563eb;
      --secondary: #64748b;
      --success: #16a34a;
      --error: #dc2626;
      --warning: #f97316;
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-sec: #64748b;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      padding-bottom: 120px;
    }

    .app-shell {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }

    .app-header {
      text-align: center;
      margin: 12px 0 18px;
    }

    .app-title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--primary);
    }

    .app-sub {
      margin-top: 6px;
      font-size: 13px;
      color: var(--text-sec);
      font-weight: 600;
    }

    .info-banner {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 16px;
      font-size: 13px;
      line-height: 1.5;
    }

    .warning-text {
      color: var(--warning);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .search-input {
      width: 100%;
      height: 46px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 16px;
      font-weight: 700;
      outline: none;
      background: white;
      margin-bottom: 14px;
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .student-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .student-btn {
      position: relative;
      min-height: 58px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 10px;
      font-size: 17px;
      font-weight: 900;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
      cursor: pointer;
    }

    .student-btn.selected {
      border-color: var(--primary);
      background: #eff6ff;
      color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .student-btn.done {
      opacity: 0.52;
      background: #f1f5f9;
      cursor: not-allowed;
    }

    .school-tag {
      font-size: 11px;
      color: var(--text-sec);
      font-weight: 700;
    }

    .badge-done {
      position: absolute;
      top: 6px;
      right: 7px;
      font-size: 10px;
      background: #dcfce7;
      color: #166534;
      border-radius: 999px;
      padding: 3px 6px;
      font-weight: 900;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
      margin-bottom: 16px;
    }

    .omr-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 9px;
    }

    .omr-btn {
      height: 48px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
    }

    .omr-btn.active {
      background: var(--error);
      border-color: var(--error);
      color: white;
      box-shadow: 0 8px 18px rgba(220, 38, 38, 0.22);
    }

    .bottom-bar {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.96);
      border-top: 1px solid var(--border);
      padding: 12px 16px 18px;
      box-shadow: 0 -12px 24px rgba(15, 23, 42, 0.08);
      z-index: 50;
    }

    .bottom-bar.hidden {
      display: none;
    }

    .btn-main,
    .btn-sub {
      width: 100%;
      min-height: 50px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn-main {
      background: var(--primary);
      color: white;
      margin-bottom: 8px;
    }

    .btn-main:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-sub {
      background: #f1f5f9;
      color: #334155;
    }

    #toast {
      position: fixed;
      left: 50%;
      bottom: 92px;
      transform: translateX(-50%);
      background: #0f172a;
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 100;
      max-width: calc(100% - 32px);
      text-align: center;
      pointer-events: none;
    }

    @media (max-width: 360px) {
      .student-grid {
        grid-template-columns: 1fr;
      }

      .omr-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="app-header">
      <div class="app-title">AP Math 오답 제출</div>
      <div class="app-sub">본인 이름 선택 → PIN 확인 → 틀린 번호 체크</div>
    </div>

    <main id="app-root"></main>
  </div>

  <div id="toast"></div>

  <script src="check.js?v=3b1"></script>
</body>
</html>
