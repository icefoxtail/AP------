<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AP Math 오답 제출</title>
    <style>
        :root {
            /* [Toss Base + Vivid Pop] 학생용 테마 동기화 */
            --primary: #1A5CFF;
            --primary-dark: #0040D6;
            --secondary: #8B95A1;
            --success: #00D084;
            --error: #FF4757;
            --warning: #FFA502;
            
            --bg: #F2F4F6;
            --surface: #FFFFFF;
            --border: #E5E8EB;
            --shadow: 0 4px 16px rgba(0,0,0,0.06);
            --text: #191F28;
            --text-sec: #4E5968;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6;
            min-height: 100vh;
        }

        /* 학생용 전용 헤더: 학원 로고와 시험 정보 강조 */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: calc(16px + env(safe-area-inset-top)) 20px 16px;
            text-align: center;
        }
        .header-logo { font-size: 18px; font-weight: 950; color: var(--primary); letter-spacing: -0.5px; }

        main { 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 20px 16px calc(140px + env(safe-area-inset-bottom)); 
        }

        /* 공통 카드 스타일 */
        .card { 
            background: var(--surface); 
            border-radius: 24px; 
            padding: 24px; 
            margin-bottom: 16px; 
            box-shadow: var(--shadow);
            border: none;
        }

        /* 시험 정보 배너 */
        .info-banner {
            background: #191F28;
            color: #fff;
            border-radius: 20px;
            padding: 18px 20px;
            margin-bottom: 24px;
            font-size: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }
        .info-banner b { color: var(--success); }
        .warning-text { 
            background: var(--error); 
            color: #fff; 
            font-size: 10px; 
            padding: 2px 8px; 
            border-radius: 6px; 
            font-weight: 900; 
        }

        /* 학생 선택 그리드 */
        .student-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-top: 16px;
        }
        .student-btn {
            background: var(--surface);
            padding: 20px 14px;
            border-radius: 18px;
            text-align: center;
            font-weight: 800;
            font-size: 16px;
            position: relative;
            box-shadow: var(--shadow);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid transparent;
        }
        .student-btn:active { transform: scale(0.95); background: var(--bg); }
        .student-btn.selected { 
            border-color: var(--primary); 
            background: rgba(26,92,255,0.05); 
            color: var(--primary); 
            box-shadow: 0 0 0 2px var(--primary);
        }
        .student-btn.done { opacity: 0.5; filter: grayscale(1); }
        .school-tag { display: block; font-size: 11px; color: var(--secondary); margin-top: 4px; font-weight: 600; }
        .badge-done { position: absolute; top: 8px; right: 8px; font-size: 9px; background: var(--secondary); color: #fff; padding: 2px 6px; border-radius: 4px; }

        /* 검색 인풋 */
        .search-input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,92,255,0.1); }

        /* OMR 그리드 */
        .omr-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 12px; 
            margin-top: 20px; 
        }
        .omr-btn {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            font-weight: 900;
            font-size: 16px;
            color: var(--secondary);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .omr-btn.active { 
            background: var(--primary); 
            color: #fff; 
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(26,92,255,0.3);
            transform: scale(1.1);
        }

        /* [핵심] 고정형 하단 액션 바 */
        .bottom-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 16px 20px calc(24px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: slide-up 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .bottom-bar.hidden { display: none; }

        .btn-main {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(26,92,255,0.25);
        }
        .btn-main:active { transform: scale(0.97); background: var(--primary-dark); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-sub {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: none;
            background: transparent;
            color: var(--secondary);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        /* 토스트 알림 */
        #toast {
            position: fixed;
            left: 50%;
            bottom: calc(110px + env(safe-area-inset-bottom));
            transform: translateX(-50%);
            background: rgba(25, 31, 40, 0.9);
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            pointer-events: none;
            white-space: nowrap;
        }

        @media (max-width: 360px) {
            .omr-grid { grid-template-columns: repeat(4, 1fr); }
            .student-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-logo">AP MATH OS</div>
    </header>

    <main id="app-root">
        </main>

    <div id="toast">알림 메시지</div>

    <script src="../js/check.js"></script>
</body>
</html>
