<body>

        <span id="ctrl-title">AP Math 오답 클리닉</span>

<script>
const STORAGE_KEY = 'AP_CLINIC_PRINT_PAYLOAD';
const ARCHIVE_BASE_URL = 'https://icefoxtail.github.io/AP------/archive/';
const state = { payload: null, banks: {}, mode: 'exam' };
const SE_OVERHEAD_COL = 10;
const SE_OVERHEAD_GRID = 20;
const SE_PAGE_TOLERANCE = 5;
const SE_BLOCK_GAP = 15;
const CLINIC_QPP = 4;

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function normalizeArchiveFile(file) {
    const raw = String(file || '').trim();
    if (!raw) return '';
    if (/^https?:\/\//i.test(raw)) return raw;
    let path = raw.replace(/^archive\//, '').replace(/^\.\//, '').replace(/^\//, '');
    if (!path.endsWith('.js')) path += '.js';
    if (!/^(exams|assets|data)\//.test(path)) path = `exams/${path}`;
    return path;
}

function getArchiveUrl(file) {
    const path = normalizeArchiveFile(file);
    if (!path) return '';
    if (/^https?:\/\//i.test(path)) return path;
    const encodedPath = path.split('/').map(part => encodeURIComponent(part)).join('/');
    return ARCHIVE_BASE_URL + encodedPath;
}

async function fetchArchiveText(file) {
    console.log('[wrong_print_engine] loading archiveFile', file);
    const url = getArchiveUrl(file);
    console.log('[wrong_print_engine] archive url', url);
    if (!url) throw new Error('archive file missing');
    const res = await fetch(url, { cache: 'force-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.text();
}

function extractQuestionBank(jsText) {
    const sandboxWindow = { questionBank: null, __questionBank: null };
    const sandboxDocument = {
        createElement: () => ({ style: {}, setAttribute() {}, appendChild() {}, innerHTML: '' }),
        head: { appendChild() {} },
        body: { appendChild() {} },
        addEventListener() {},
        querySelector: () => null,
        querySelectorAll: () => []
    };
    try {
        const fn = new Function('window', 'document', `${jsText}\n;return window.questionBank || window.__questionBank || (typeof questionBank !== 'undefined' ? questionBank : null);`);
        return fn(sandboxWindow, sandboxDocument);
    } catch (e) {
        console.warn('[wrong_print_engine] questionBank extract failed:', e);
        return null;
    }
}

function normalizeQuestionBank(bank) {
    if (Array.isArray(bank)) return bank;
    if (!bank || typeof bank !== 'object') return [];
    if (Array.isArray(bank.questions)) return bank.questions;
    if (Array.isArray(bank.items)) return bank.items;
    if (Array.isArray(bank.data)) return bank.data;
    return [];
}

function getQuestionNoValue(question, fallbackIndex) {
    const values = [question?.questionNo, question?.question_no, question?.no, question?.number, question?.qno, question?.qid, question?.id];
    for (const value of values) {
        const match = String(value ?? '').match(/\d+/);
        if (match) return Number(match[0]);
    }
    return fallbackIndex + 1;
}

function findQuestionInBank(bank, questionNo) {
    const list = normalizeQuestionBank(bank);
    const qNo = Number(questionNo);
    if (!qNo || !list.length) return null;
    return list.find((q, idx) => getQuestionNoValue(q, idx) === qNo) || list[qNo - 1] || null;
}

function wrapLatex(text) {
    if (text == null) return '';
    let s = String(text);
    s = s.replace(/\\\([\s\S]+?\\\)/g, m => '$' + m.slice(2, -2) + '$');
    s = s.replace(/\\\[[\s\S]+?\\\]/g, m => '$$' + m.slice(2, -2) + '$$');
    const combRepl = T => (m, a1, a2, b1, b2) => `$_{${a1||a2}}${T}_{${b1||b2}}$`;
    const combPat = prefix => new RegExp(`(?<!\\$)(?:\\{\\}|\\[\\])_(?:\\{([^}]+)\\}|([a-zA-Z0-9+\\-]+))${prefix}_(?:\\{([^}]+)\\}|([a-zA-Z0-9+\\-]+))`, 'g');
    const htmlTags = [];
    s = s.replace(/<svg[\s\S]*?<\/svg>|<img[^>]*>|<br\s*\/?>|<\/?(div|span|b|i|strong|em|u|sup|sub|table|thead|tbody|tr|th|td|colgroup|col)[^>]*>/gi, m => {
        const token = `__HTMLTAG_${htmlTags.length}__`;
        htmlTags.push(m);
        return token;
    });
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$)/g).map((seg, idx) => {
        if (idx % 2 === 1) return seg;
        let t = seg;
        t = t.replace(combPat('C'), combRepl('C')).replace(combPat('H'), combRepl('H')).replace(combPat('P'), combRepl('P'));
        return t.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }).join('');
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$|__HTMLTAG_\d+__)/g).map((seg, idx) => {
        if (idx % 2 === 1) return seg;
        const trimmed = seg.trim();
        if (!trimmed) return seg;
        const hasKorean = /[\uAC00-\uD7A3]/.test(seg);
        const hasLatex = /\\[a-zA-Z]/.test(seg);
        if (!hasKorean && /\\begin\{(cases|aligned|array|matrix|pmatrix|bmatrix|vmatrix|Vmatrix)\}/.test(seg)) return `$$${seg}$$`;
        if (!hasKorean && hasLatex && /^[0-9a-zA-Z\s\+\-\*\/\=\^\{\}\(\)\[\]_\.,\\!;:]+$/.test(trimmed)) return `$${trimmed}$`;
        if (hasKorean && hasLatex) return seg.replace(/(\\[a-zA-Z]+(?:\{[^}]*\})*(?:\{[^}]*\})*(?:_\{?[^}\s]+\}?)?(?:\^\{?[^}\s]+\}?)?)/g, '$$$1$$');
        return seg;
    }).join('');
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$)/g).map((seg, idx) => {
        if (idx % 2 === 1) return seg;
        return seg.replace(/(\\\{(?:[^{}]|\{[^}]*\})*\\\})/g, '$$$1$$');
    }).join('');
    s = s.replace(/\\n(?![a-zA-Z])/g, '<br>').replace(/\r\n|\r|\n/g, '<br>');
    return s.replace(/__HTMLTAG_(\d+)__/g, (_, i) => htmlTags[i] || '');
}

function raf() {
    return new Promise(resolve => requestAnimationFrame(resolve));
}

function autoCompress(container) {
    let fontSize = 9.5;
    let lineHeight = 1.58;
    while (container.scrollHeight > container.clientHeight + 1 && fontSize > 6.5) {
        fontSize = Math.max(fontSize - 0.3, 6.5);
        lineHeight = Math.max(lineHeight - 0.08, 1.0);
        container.style.fontSize = fontSize + 'pt';
        container.style.lineHeight = String(lineHeight);
    }
}

function fitQuestionBox(box) {
    if (!box) return;
    const textClasses = ['', 'fit-tight', 'fit-tighter', 'fit-micro'];
    const imgClasses = ['', 'img-fit-tight', 'img-fit-tighter', 'img-fit-micro'];
    const imgs = Array.from(box.querySelectorAll('.q-content img, .q-image-wrap img'));

    for (const tCls of textClasses) {
        box.classList.remove('fit-tight', 'fit-tighter', 'fit-micro');
        if (tCls) box.classList.add(tCls);
        if (box.scrollHeight <= box.clientHeight + 1) return;
    }

    for (const iCls of imgClasses) {
        imgs.forEach(img => img.classList.remove('img-fit-tight', 'img-fit-tighter', 'img-fit-micro'));
        if (iCls) imgs.forEach(img => img.classList.add(iCls));
        if (box.scrollHeight <= box.clientHeight + 1) return;
    }
}

const AUTO_IMAGE_SIZE_CLASSES = ['image-small', 'image-half', 'image-medium', 'image-large', 'image-full'];

function autoImageSizeClassFor(img) {
    const width = Number(img && img.naturalWidth) || 0;
    const height = Number(img && img.naturalHeight) || 0;
    if (!width || !height) return 'image-medium';
    const ratio = width / height;
    if (ratio >= 2.2) return 'image-full';
    if (ratio >= 1.25) return 'image-large';
    if (ratio >= 0.8) return 'image-small';
    return 'image-medium';
}

function waitForQuestionImage(img) {
    if (!img || img.complete) return Promise.resolve();
    return new Promise(resolve => {
        let done = false;
        const finish = () => {
            if (done) return;
            done = true;
            resolve();
        };
        img.addEventListener('load', finish, { once: true });
        img.addEventListener('error', finish, { once: true });
        setTimeout(finish, 1200);
    });
}

async function applyAutoImageSizeClasses(root) {
    const wraps = Array.from(root.querySelectorAll('.q-image-wrap'));
    await Promise.all(wraps.map(async wrap => {
        if (AUTO_IMAGE_SIZE_CLASSES.some(cls => wrap.classList.contains(cls))) return;
        const img = wrap.querySelector('img');
        if (!img) {
            wrap.classList.add('image-medium');
            return;
        }
        await waitForQuestionImage(img);
        wrap.classList.add(autoImageSizeClassFor(img));
    }));
}

function extractChoice(choice) {
    return String(choice || '');
}

function stripChoicePrefix(choice) {
    return String(choice || '').replace(/^\s*[\(\[]?\d+[\)\].]?\s*/, '').trim();
}

function detectChoiceRenderMode(choices) {
    const texts = (choices || []).map(c => stripChoicePrefix(extractChoice(c)).trim());
    const stripped = texts.map(t => t.replace(/\$\$[\s\S]*?\$\$/g, '~').replace(/\$[^$\n]*?\$/g, '~').trim());
    const avgLen = stripped.reduce((sum, text) => sum + text.length, 0) / Math.max(stripped.length, 1);
    const hasLineBreak = texts.some(t => /\\n|\n|<br/i.test(t));
    const hasVeryLong = stripped.some(t => t.length > 36);
    const hasMultiMarker = texts.some(t => (t.match(/[\u2460-\u2464]|[\u3131-\u314E]\.|[\uAC00-\uD7A3]\./g) || []).length >= 2);
    if (hasMultiMarker) return 'boxed';
    if (hasVeryLong || hasLineBreak || avgLen > 28) return 'block';
    return stripped.some(t => t.length > 20) ? 'block' : 'compact';
}

function renderChoicesHTML(q) {
    const circled = ['①', '②', '③', '④', '⑤'];
    const choices = Array.isArray(q.choices) ? q.choices : Array.isArray(q.options) ? q.options : [];
    const isSubjective = !choices.length || choices[0] === '주관식' || choices.every(c => extractChoice(c).trim() === '');
    if (isSubjective) return '<div class="answer-box"></div>';
    const mode = detectChoiceRenderMode(choices);
    const itemsHTML = choices.map((c, ci) => {
        const text = wrapLatex(stripChoicePrefix(extractChoice(c)));
        return `<div class="choice-item"><span class="choice-no">${circled[ci] || ''}</span><span class="choice-text">${text}</span></div>`;
    }).join('');
    return `<div class="choices choices-${mode}">${itemsHTML}</div>`;
}

function formatQuestionContent(html) {
    if (!html) return '';
    let count = 0;
    return html.replace(/([\.?\!]|\s|>)\s*(\(\d+\))/g, (match, p1, p2) => {
        count++;
        if (count === 1) return match;
        if (p1.includes('br>') || p1.includes('\n')) return match;
        return p1 + '<br>' + p2;
    });
}

function normalizeQuestionTables(html) {
    if (!html) return '';
    return html
        .replace(/<div class="question-table-wrap">\s*<table/gi, '<div class="question-table-wrap"><table class="question-table"')
        .replace(/<table(?![^>]*class=)/gi, '<table class="question-table"');
}

function normalizeQuestionNotes(html) {
    if (!html || /question-note-box/.test(html)) return html;
    return html.replace(/((?:<br\s*\/?>\s*)+)(\[[^\]]+\][\s\S]*?)(?=(?:<br\s*\/?>\s*){2,}|$)/gi, (match, breaks, noteBlock) => {
        const brCount = (noteBlock.match(/<br\s*\/?>/gi) || []).length;
        const plainText = noteBlock.replace(/<[^>]+>/g, '').trim();
        if (brCount < 2 && plainText.length < 60) return match;
        return `<div class="question-note-box">${noteBlock}</div>`;
    });
}

function protectRenderSegments(html) {
    const tokens = [];
    const save = (match) => {
        const token = `__PROTECTED_SEGMENT_${tokens.length}__`;
        tokens.push(match);
        return token;
    };
    let protectedHtml = String(html || '')
        .replace(/<div[^>]*class=["'][^"']*(?:question-table-wrap|question-note-box|box)[^"']*["'][^>]*>[\s\S]*?<\/div>/gi, save)
        .replace(/<table[\s\S]*?<\/table>/gi, save)
        .replace(/\$\$[\s\S]*?\$\$/g, save)
        .replace(/\$[^$\n]*?\$/g, save);
    return {
        html: protectedHtml,
        restore(value) {
            let restored = String(value || '');
            for (let pass = 0; pass < tokens.length + 2 && /__PROTECTED_SEGMENT_\d+__/.test(restored); pass++) {
                restored = restored.replace(/__PROTECTED_SEGMENT_(\d+)__/g, (match, i) => {
                    const idx = Number(i);
                    if (tokens[idx] !== undefined) return tokens[idx];
                    console.warn('[wrong_print_engine] protected segment restore failed:', match);
                    return '';
                });
            }
            if (/__PROTECTED_SEGMENT_\d+__/.test(restored)) {
                console.warn('[wrong_print_engine] protected segment remained after restore:', restored);
            }
            return restored;
        }
    };
}

function normalizeViewBlocks(html) {
    if (!html) return '';
    const protectedState = protectRenderSegments(html);
    let out = protectedState.html;

    out = out.replace(
        /((?:<br\s*\/?>\s*)*)(?:\[보기\]|&lt;보기&gt;|<보기>|보기\s*:|조건\s*:|자료\s*:)\s*([\s\S]*?)(?=(?:<br\s*\/?>\s*){2,}|$)/gi,
        (match, breaks, body) => {
            const plain = body.replace(/<[^>]+>/g, '').trim();
            const markerCount = (plain.match(/[\u3131-\u314E]\.|[\uAC00-\uD7A3]\.|[\u2460-\u2464]/g) || []).length;
            if (plain.length < 60 && markerCount < 2) return match;
            const label = /조건\s*:/.test(match) ? '조건' : (/자료\s*:/.test(match) ? '자료' : '보기');
            return `${breaks}<div class="question-note-box"><b>${label}</b><br>${body.trim()}</div>`;
        }
    );

    out = out.replace(
        /((?:<br\s*\/?>\s*)*)((?:[\u3131-\u314E]\.\s*[\s\S]*?){2,})(?=(?:<br\s*\/?>\s*){2,}|$)/g,
        (match, breaks, body) => {
            const plain = body.replace(/<[^>]+>/g, '').trim();
            const markerCount = (plain.match(/[\u3131-\u314E]\./g) || []).length;
            if (plain.length < 60 || markerCount < 2) return match;
            return `${breaks}<div class="question-note-box">${body.trim()}</div>`;
        }
    );

    out = out.replace(
        /((?:<br\s*\/?>\s*)*)((?:[\u2460-\u2464]\s*[\s\S]*?[\u2460-\u2464]\s*[\s\S]*?[\u2460-\u2464][\s\S]*?))(?=(?:<br\s*\/?>\s*){2,}|$)/g,
        (match, breaks, body) => {
            const plain = body.replace(/<[^>]+>/g, '').trim();
            const markerCount = (plain.match(/[\u2460-\u2464]/g) || []).length;
            if (plain.length < 60 || markerCount < 3) return match;
            return `${breaks}<div class="question-note-box">${body.trim()}</div>`;
        }
    );

    return protectedState.restore(out);
}

function sanitizeProtectedSegments(html) {
    const value = String(html || '');
    if (!/__PROTECTED_SEGMENT_\d+__/.test(value)) return value;
    console.warn('[wrong_print_engine] removing leaked protected segment token:', value);
    return value.replace(/__PROTECTED_SEGMENT_\d+__/g, '');
}

function formatQuestionForRender(rawContent, q) {
    return sanitizeProtectedSegments(
        normalizeQuestionNotes(
            normalizeViewBlocks(
                normalizeQuestionTables(
                    formatQuestionContent(wrapLatex(rawContent), q)
                )
            )
        )
    );
}

function stripInlineImagesFromContent(content, hasImageField) {
    if (!content) return '';
    if (!hasImageField) return content;
    let stripped = content.replace(/(?:<br\s*\/?>\s*)*<img[^>]*>(?:\s*<br\s*\/?>)*/gi, '<br>');
    stripped = stripped.replace(/^(?:<br\s*\/?>\s*)+/i, '').replace(/(?:<br\s*\/?>\s*)+$/i, '');
    return stripped;
}

function renderQuestionImageHTML(q) {
    const image = q.image || q.imageUrl || q.img || '';
    if (!image) return '';
    const size = ['small', 'half', 'medium', 'large', 'full'].includes(q.imageSize) ? q.imageSize : '';
    const sizeClass = size ? ` image-${size}` : '';
    return `<div class="q-image-wrap${sizeClass}"><img src="${escapeHtml(image)}" alt=""></div>`;
}

function getQuestionAnswer(q) {
    return q?.answer ?? q?.correctAnswer ?? q?.correct ?? q?.ans ?? '';
}

function getQuestionSolution(q) {
    return q?.solution || q?.explanation || q?.commentary || q?.sol || '';
}

function getStudentExamLabel(payload, student) {
    const titles = [...new Set((student.wrongItems || []).map(item => item.examTitle).filter(Boolean))];
    return titles.length === 1 ? titles[0] : (payload.printTitle || '오답 클리닉');
}

function cloneQuestionForRender(item) {
    const file = normalizeArchiveFile(item.archiveFile);
    const bank = state.banks[file] || [];
    const original = findQuestionInBank(bank, item.questionNo);
    if (!original) {
        return {
            id: item.questionNo,
            content: '<span style="color:#dc2626;font-weight:800;">문항 원문을 불러오지 못했습니다.</span>',
            choices: [],
            answer: '',
            solution: '',
            _wrongNote: item._wrongNote || '',
            _examLabel: item.examTitle || '',
            _sourceNo: item.questionNo
        };
    }
    const q = JSON.parse(JSON.stringify(original));
    q._wrongNote = item._wrongNote || '';
    q._examLabel = item.examTitle || '';
    q._sourceNo = item.questionNo;
    return q;
}

function makePage(area, type, title, metaLeft, metaRight, pageNumber) {
    const page = document.createElement('section');
    page.className = 'page';
    const frame = document.createElement('div');
    frame.className = 'page-exam-frame';
    const header = document.createElement('div');
    header.className = `page-header ${type === 'exam' ? 'page-header--exam' : ''}`;
    header.innerHTML = `
        <div class="page-header-title">${escapeHtml(title)}</div>
        <div class="page-header-meta">
            <div class="page-header-meta-left">${escapeHtml(metaLeft || '')}</div>
            <div class="page-header-meta-right">
                ${metaRight ? `<span>${escapeHtml(metaRight)}</span>` : ''}
            </div>
        </div>
    `;
    const body = document.createElement('div');
    body.style.flex = '1';
    body.style.display = 'flex';
    body.style.flexDirection = 'column';
    body.style.minHeight = '0';
    page.appendChild(frame);
    page.appendChild(header);
    page.appendChild(body);
    if (pageNumber) {
        const pageNum = document.createElement('div');
        pageNum.className = 'page-num';
        pageNum.textContent = `- ${pageNumber} -`;
        page.appendChild(pageNum);
    }
    area.appendChild(page);
    return { page, body };
}

function buildQuestionBoxHTML(q, displayNo, showWrongNote = true) {
    const hasImageField = !!(q.image || q.imageUrl || q.img);
    const rawContent = stripInlineImagesFromContent(q.content || q.question || q.text || q.prompt || '', hasImageField);
    const formattedContent = formatQuestionForRender(rawContent, q);
    const imageHTML = renderQuestionImageHTML(q);
    const choicesHTML = state.mode === 'exam' ? renderChoicesHTML(q) : '';
    const wrongNote = showWrongNote && q._wrongNote ? `<div class="wrong-note">${q._wrongNote}</div>` : '';
    const answer = state.mode === 'ans' || state.mode === 'sol' ? `<div style="margin-top:8px;font-weight:bold;color:red;">[정답] ${wrapLatex(getQuestionAnswer(q) || '-')}</div>` : '';
    const solution = state.mode === 'sol' ? `<div style="background:#fdfdfd;padding:8px;border:1px solid #eee;border-radius:3px;margin-top:8px;font-size:8.5pt;line-height:1.55;">${wrapLatex(getQuestionSolution(q) || '해설이 없습니다.')}</div>` : '';
    return `<div class="q-box${state.mode === 'sol' ? ' sol-box' : ''}">
        <div class="q-num">${displayNo}.</div>
        ${wrongNote}
        <div class="q-content">${formattedContent}</div>
        ${imageHTML}
        ${choicesHTML}
        ${answer}
        ${solution}
    </div>`;
}

async function loadAllQuestionBanks(payload) {
    const files = [...new Set([
        ...((payload.students || []).flatMap(student => (student.wrongItems || []).map(item => item.archiveFile))),
        ...((payload.classWrongItems || []).map(item => item.archiveFile))
    ].filter(Boolean))];

    for (const file of files) {
        const key = normalizeArchiveFile(file);
        if (state.banks[key]) continue;
        try {
            const text = await fetchArchiveText(file);
            state.banks[key] = normalizeQuestionBank(extractQuestionBank(text));
        } catch (e) {
            console.warn('[wrong_print_engine] archive load failed:', file, e);
            state.banks[key] = [];
        }
    }
}
function htmlToElement(html) {
    const template = document.createElement('template');
    template.innerHTML = String(html || '').trim();
    return template.content.firstElementChild;
}

function getGroupTitle(defaultTitle) {
    return defaultTitle || (state.payload?.printTitle || '오답 클리닉');
}

async function renderMeasuredExamPages(area, items, pageMeta = {}) {
    if (!items.length) return;
    const staging = document.getElementById('staging');
    staging.style.width = '83mm';
    staging.innerHTML = '';

    const stagedItems = items.map((q, idx) => {
        const box = htmlToElement(buildQuestionBoxHTML(q, idx + 1, pageMeta.showWrongNote !== false));
        staging.appendChild(box);
        return { q, box };
    });

    await applyAutoImageSizeClasses(staging);
    if (window.MathJax?.typesetPromise) {
        try { await MathJax.typesetPromise([staging]); } catch (e) { console.warn(e); }
    }
    await raf();

    for (const item of stagedItems) {
        const profile = {};
        profile.proxyHeight_raw = item.box.scrollHeight;
        item.box.classList.add('fit-tight');
        await raf();
        profile.proxyHeight_tight = item.box.scrollHeight;
        item.box.classList.remove('fit-tight');
        item.profile = profile;
    }

    const tempPage = makePage(area, 'exam', getGroupTitle(pageMeta.title), pageMeta.metaLeft || '', pageMeta.metaRight || '', 0);
    const usablePageHeight = tempPage.body.clientHeight;
    area.removeChild(tempPage.page);

    const pages = [];
    let currentPage = { blocks: [], usedHeight: 0 };
    let activeChunk = [];
    let currentType = null;

    const flushBlock = () => {
        if (!activeChunk.length) return;
        const type = currentType || 'normal';
        const chunk = [...activeChunk];
        const hType = type === 'normal' ? 'proxyHeight_tight' : 'proxyHeight_raw';
        let blockH;

        if (type === 'wide') {
            blockH = chunk[0].profile.proxyHeight_raw + SE_OVERHEAD_COL + SE_OVERHEAD_GRID;
        } else {
            const split = Math.ceil(chunk.length / 2);
            const leftH = chunk.slice(0, split).reduce((sum, item) => sum + item.profile[hType], 0) + SE_OVERHEAD_COL;
            const rightH = chunk.slice(split).reduce((sum, item) => sum + item.profile[hType], 0) + SE_OVERHEAD_COL;
            blockH = Math.max(leftH, rightH) + SE_OVERHEAD_GRID;
        }

        const gap = currentPage.blocks.length ? SE_BLOCK_GAP : 0;
        const normalForceBreak = type === 'normal' && currentPage.blocks.length > 0;
        if ((normalForceBreak || currentPage.usedHeight + gap + blockH > usablePageHeight) && currentPage.blocks.length > 0) {
            pages.push(currentPage);
            currentPage = { blocks: [], usedHeight: 0 };
        }

        currentPage.usedHeight += (currentPage.blocks.length ? SE_BLOCK_GAP : 0) + blockH;
        currentPage.blocks.push({ type, items: chunk, blockH });
        activeChunk = [];
    };

    stagedItems.forEach(item => {
        const layoutTag = item.q.layoutTag || '';
        let qType = 'normal';
        let limit = CLINIC_QPP;
        if (item.q.wide === true || layoutTag === 'fullwidth') {
            qType = 'wide';
            limit = 1;
        } else if (layoutTag === 'subjective-2up') {
            qType = 'subj2';
            limit = 2;
        } else if (layoutTag === 'subjective-4up') {
            qType = 'subj4';
            limit = 4;
        }

        const isSpecialType = qType === 'subj2' || qType === 'subj4' || qType === 'wide';
        const prevWasSpecial = currentType === 'subj2' || currentType === 'subj4' || currentType === 'wide';
        if ((currentType !== null && currentType !== qType) || activeChunk.length >= limit || ((isSpecialType || prevWasSpecial) && currentPage.blocks.length > 0)) {
            flushBlock();
            if (isSpecialType && currentPage.blocks.length > 0) {
                pages.push(currentPage);
                currentPage = { blocks: [], usedHeight: 0 };
            }
            currentType = qType;
        }
        if (currentType === null) currentType = qType;
        activeChunk.push(item);
    });
    flushBlock();
    if (currentPage.blocks.length > 0) pages.push(currentPage);

    for (let pageIdx = 0; pageIdx < pages.length; pageIdx++) {
        const pageData = pages[pageIdx];
        const page = makePage(area, 'exam', getGroupTitle(pageMeta.title), pageMeta.metaLeft || '', pageMeta.metaRight || '', pageIdx + 1);

        pageData.blocks.forEach((block, blockIdx) => {
            if (block.type === 'wide') {
                const wideCol = document.createElement('div');
                wideCol.style.cssText = 'flex:1; display:flex; flex-direction:column; padding:0 8px; min-height:0; overflow:hidden;';
                wideCol.appendChild(block.items[0].box.cloneNode(true));
                page.body.appendChild(wideCol);
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'grid-container';
            grid.style.flex = block.type === 'normal' ? '1 1 0' : 'none';
            if (blockIdx < pageData.blocks.length - 1) grid.style.marginBottom = `${SE_BLOCK_GAP}px`;

            const left = document.createElement('div');
            left.className = 'grid-col';
            const right = document.createElement('div');
            right.className = 'grid-col';
            grid.appendChild(left);
            grid.appendChild(right);
            page.body.appendChild(grid);

            const split = Math.ceil(block.items.length / 2);
            block.items.slice(0, split).forEach(item => left.appendChild(item.box.cloneNode(true)));
            block.items.slice(split).forEach(item => right.appendChild(item.box.cloneNode(true)));
        });

        if (pageIdx === pages.length - 1 && pageMeta.homeworkCheckHTML) {
            page.body.insertAdjacentHTML('beforeend', pageMeta.homeworkCheckHTML);
        }

        if (window.MathJax?.typesetPromise) {
            try { await MathJax.typesetPromise([page.page]); } catch (e) { console.warn(e); }
        }
        await raf();

        const boxes = page.page.querySelectorAll('.q-box');
        boxes.forEach(box => fitQuestionBox(box));

        if (page.body.scrollHeight > usablePageHeight + SE_PAGE_TOLERANCE) {
            boxes.forEach(box => autoCompress(box));
            await raf();
            if (window.MathJax?.typesetPromise) {
                try { await MathJax.typesetPromise([page.page]); } catch (e) { console.warn(e); }
            }
        }
    }
}

async function renderStudentPages(area, payload) {
    for (const student of (payload.students || [])) {
        const items = (student.wrongItems || []).map(item => cloneQuestionForRender({
            ...item,
            _wrongNote: `${item.examTitle || '시험'} · 원본 ${item.questionNo}번`
        }));
        await renderMeasuredExamPages(area, items, {
            title: `${student.studentName} 오답지`,
            metaLeft: '',
            metaRight: `${payload.className || ''} · ${getStudentExamLabel(payload, student)} · ${payload.createdDate || ''}`,
            homeworkCheckHTML: payload.options?.includeHomeworkCheckBox === false ? '' : `
                <div class="homework-check">
                    <span>□ 다시 풀기 완료</span>
                    <span>□ 오답 과정 확인</span>
                    <span>□ 선생님 확인</span>
                </div>
            `
        });
    }
}

async function renderClassPages(area, payload) {
    const items = (payload.classWrongItems || []).map(item => {
        const names = (item.wrongStudents || []).map(student => student.studentName).join(', ');
        return cloneQuestionForRender({
            ...item,
            _wrongNote: `오답: ${names || '-'} / 총 ${item.wrongCount || 0}명 · 원본 ${item.questionNo}번`
        });
    });
    await renderMeasuredExamPages(area, items, {
        title: `${payload.className || '반'} 반별 공통 오답지`,
        metaLeft: '',
        metaRight: payload.createdDate || ''
    });
}

async function placeSolutionItems(area, items, pageMeta = {}) {
    let pageNo = 1;
    let current = null;
    let colIdx = 0;

    const makeGridPage = () => {
        const page = makePage(area, 'sol', getGroupTitle(pageMeta.title), pageMeta.metaLeft || '', pageMeta.metaRight || '', pageNo++);
        const grid = document.createElement('div');
        grid.className = 'grid-container';
        grid.style.flex = '1 1 0';
        const left = document.createElement('div');
        left.className = 'grid-col';
        const right = document.createElement('div');
        right.className = 'grid-col';
        grid.appendChild(left);
        grid.appendChild(right);
        page.body.appendChild(grid);
        current = { page, cols: [left, right] };
        colIdx = 0;
    };

    const makeBox = (q, idx) => {
        const hasImageField = !!(q.image || q.imageUrl || q.img);
        const rawContent = stripInlineImagesFromContent(q.content || q.question || q.text || q.prompt || '', hasImageField);
        const formattedContent = formatQuestionForRender(rawContent, q);
        const box = document.createElement('div');
        box.className = 'q-box sol-box';
        box.innerHTML = `<div class="q-num">${idx + 1}.</div>
            ${q._wrongNote ? `<div class="wrong-note">${q._wrongNote}</div>` : ''}
            <div class="q-content">${formattedContent}</div>
            ${renderQuestionImageHTML(q)}
            <div class="sol-meta"><div class="sol-ans">[정답] ${wrapLatex(getQuestionAnswer(q) || '-')}</div><div class="sol-exp">${wrapLatex(getQuestionSolution(q) || '해설이 없습니다.')}</div></div>`;
        return box;
    };

    async function placeBox(box) {
        if (!current) makeGridPage();
        let placed = false;
        while (!placed) {
            const targetCol = current.cols[colIdx];
            targetCol.appendChild(box);
            await applyAutoImageSizeClasses(targetCol);
            if (window.MathJax?.typesetPromise) {
                try { await MathJax.typesetPromise([targetCol]); } catch (e) { console.warn(e); }
            }
            await raf();

            if (targetCol.scrollHeight <= targetCol.clientHeight + 2) {
                placed = true;
                break;
            }

            autoCompress(box);
            await raf();
            if (window.MathJax?.typesetPromise) {
                try { await MathJax.typesetPromise([targetCol]); } catch (e) { console.warn(e); }
            }
            await raf();

            if (targetCol.scrollHeight <= targetCol.clientHeight + 2 || targetCol.querySelectorAll('.sol-box').length === 1) {
                placed = true;
                break;
            }

            targetCol.removeChild(box);
            if (colIdx === 0) {
                colIdx = 1;
            } else {
                makeGridPage();
            }
        }
    }

    for (let idx = 0; idx < items.length; idx++) {
        await placeBox(makeBox(items[idx], idx));
    }
}

async function renderSol(area, payload) {
    if (payload.mode === 'class') {
        const items = (payload.classWrongItems || []).map(item => cloneQuestionForRender({
            ...item,
            _wrongNote: `오답: ${(item.wrongStudents || []).map(student => student.studentName).join(', ')} / 총 ${item.wrongCount || 0}명`
        }));
        await placeSolutionItems(area, items, {
            title: `${payload.className || '반'} 해설지`,
            metaLeft: payload.printTitle || '',
            metaRight: payload.createdDate || ''
        });
        return;
    }

    for (const student of (payload.students || [])) {
        const items = (student.wrongItems || []).map(item => cloneQuestionForRender({
            ...item,
            _wrongNote: `${item.examTitle || '시험'} · 원본 ${item.questionNo}번`
        }));
        await placeSolutionItems(area, items, {
            title: `${student.studentName} 해설지`,
            metaLeft: `${payload.className || ''} · ${getStudentExamLabel(payload, student)}`,
            metaRight: payload.createdDate || ''
        });
    }
}
function collectAnswerRows(payload) {
    const list = state.payload.mode === 'class' ? (payload.classWrongItems || []) : (payload.students || []).flatMap(student => (student.wrongItems || []).map(item => ({ ...item, studentName: student.studentName })));
    return list.map((item, idx) => {
        const q = cloneQuestionForRender(item);
        return {
            no: idx + 1,
            answer: getQuestionAnswer(q) || '-'
        };
    });
}

function renderAns(area, payload) {
    const data = collectAnswerRows(payload);
    const PER_PAGE = 50;
    let pageNo = 1;
    for (let start = 0; start < data.length; start += PER_PAGE) {
        const chunk = data.slice(start, start + PER_PAGE);
        const page = makePage(area, 'ans', payload.mode === 'class' ? `${payload.className || '반'} 정답표` : '학생별 정답표', payload.printTitle || '', `p.${pageNo}`, pageNo);
        pageNo += 1;
        const grid = document.createElement('div');
        grid.className = 'ans-grid';
        const splitIndex = Math.ceil(chunk.length / 2);
        for (let i = 0; i < splitIndex; i++) {
            [i, splitIndex + i].forEach(idx => {
                if (!chunk[idx]) return;
                const cell = document.createElement('div');
                cell.className = 'ans-cell';
                cell.innerHTML = `<div class="ans-n">${chunk[idx].no}.</div><div class="ans-v">${wrapLatex(chunk[idx].answer)}</div>`;
                grid.appendChild(cell);
            });
        }
        page.body.appendChild(grid);
    }
}

async function render() {
    const area = document.getElementById('print-area');
    area.innerHTML = '<div class="notice">오답 문항을 불러오는 중입니다.</div>';
    await loadAllQuestionBanks(state.payload);
    area.innerHTML = '';

    if (state.mode === 'ans') {
        renderAns(area, state.payload);
    } else if (state.mode === 'sol') {
        await renderSol(area, state.payload);
    } else if (state.payload.mode === 'class') {
        await renderClassPages(area, state.payload);
    } else {
        await renderStudentPages(area, state.payload);
    }

    if (!area.textContent.trim()) {
        area.innerHTML = '<div class="notice">출력할 오답 문항이 없습니다.</div>';
        return;
    }

    if (window.MathJax?.typesetPromise) {
        try { await MathJax.typesetPromise([area]); } catch (e) { console.warn(e); }
    }
    await raf();
}

function switchMode(mode) {
    state.mode = mode;
    document.querySelectorAll('.mode-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
    render();
}

function boot() {
    try {
        const payloadJson = sessionStorage.getItem(STORAGE_KEY) || localStorage.getItem(STORAGE_KEY) || 'null';
        state.payload = JSON.parse(payloadJson);
        console.log('[wrong_print_engine] payload loaded', !!state.payload);
    } catch (e) {
        state.payload = null;
    }

    document.querySelectorAll('.mode-tab').forEach(btn => {
        btn.addEventListener('click', () => switchMode(btn.dataset.mode || 'exam'));
    });

    if (!state.payload || typeof state.payload !== 'object') {
        document.getElementById('print-area').innerHTML = '<div class="notice">오답지 데이터를 찾을 수 없습니다. AP Math OS에서 다시 열어주세요.</div>';
        return;
    }

    render();
}

boot();
</script>
