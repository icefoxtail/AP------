<body>
    <div id="mode-ctrl">
        <span id="ctrl-title">AP Math 오답 클리닉</span>
        <div class="mode-tabs">

            <button class="mode-tab" id="btn-sol" type="button" data-mode="sol">해설지</button>
            <button class="mode-tab" id="btn-ans" type="button" data-mode="ans">정답표</button>

<script>
const STORAGE_KEY = 'AP_CLINIC_PRINT_PAYLOAD';
const ARCHIVE_BASE_URL = 'https://icefoxtail.github.io/AP------/archive/';
// 내부망/로컬에서 출력해도 QR은 항상 공개 URL로 생성한다(학생/학부모 폰에서 열려야 하므로).
const WRONG_PRINT_PUBLIC_URL = 'https://icefoxtail.github.io/AP------/apmath/wrong_print_engine.html';
const WRONG_CLINIC_API_BASE = 'https://ap-math-os-v2612.js-pdf.workers.dev/api';
// QR URL 길이별 스캔 안정성 기준(LOOP 4).
const QR_URL_LENGTH = { safe: 1200, warn: 1800 };
const state = { payload: null, banks: {}, mode: 'exam' };
let previewRenderTimer = null;
// 페이지네이션 상수·측정·조립은 ../archive/js/print-core.js(PrintCore)로 이동 (엔진 통합 Phase 1)
const CLINIC_QPP = 4;
const WRONG_QR_PATCH = {
    enabled: true,
    label: '정답·해설 확인',
    size: 220
};

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function getDefaultPrintHeaderOptions(payload = state.payload) {
    return {
        title: payload?.printTitle || '오답 클리닉',
        metaRight: '',
        subtitle: '',
        showNameLine: true,
        showScoreLine: true,
        showDate: false,
        applyToSolution: true,
        applyToAnswer: true
    };
}

function normalizePrintHeaderOptions(raw, payload = state.payload) {
    return PrintCore.normalizePrintHeaderOptions(raw, getDefaultPrintHeaderOptions(payload));
}

function getPrintHeaderOptions(payload = state.payload) {
    if (!payload) return getDefaultPrintHeaderOptions(payload);
    payload.headerOptions = normalizePrintHeaderOptions(payload.headerOptions, payload);
    return payload.headerOptions;
}

function shouldApplyPrintHeader(type) {
    return PrintCore.shouldApplyPrintHeader(type, getPrintHeaderOptions());
}

function getRenderHeaderTitle(type, fallbackTitle) {
    const opts = getPrintHeaderOptions();
    if ((type === 'ans' || type === 'sol') && state.payload?.mode === 'student' && fallbackTitle) {
        return fallbackTitle;
    }
    if (shouldApplyPrintHeader(type) && opts.title) return opts.title;
    return fallbackTitle || state.payload?.printTitle || '오답 클리닉';
}

function getRenderHeaderMetaRight(type, fallbackMetaRight) {
    const opts = getPrintHeaderOptions();
    if (shouldApplyPrintHeader(type) && opts.metaRight) return opts.metaRight;
    return fallbackMetaRight || '';
}

function getRenderHeaderSubtitle(type, fallback = '') {
    const opts = getPrintHeaderOptions();
    if (!shouldApplyPrintHeader(type)) return '';
    return opts.subtitle || fallback || '';
}

function renderHeaderFill(label, scoreSuffix = '') {
    const lineClass = scoreSuffix ? 'header-fill-line header-fill-line--score' : 'header-fill-line';
    return `<span>${escapeHtml(label)}<span class="${lineClass}"></span>${scoreSuffix ? escapeHtml(scoreSuffix) : ''}</span>`;
}

function encodeBase64Url(value) {
    const bytes = new TextEncoder().encode(String(value || ''));
    let binary = '';
    const chunkSize = 0x8000;
    for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode(...bytes.slice(i, i + chunkSize));
    }
    return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
}

function decodeBase64Url(value) {
    const normalized = String(value || '').replace(/-/g, '+').replace(/_/g, '/');
    const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, '=');
    const binary = atob(padded);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder().decode(bytes);
}

function normalizeArchiveFile(file) {
    const raw = String(file || '').trim();
    if (!raw) return '';
    if (/^https?:\/\//i.test(raw)) return raw;
    let path = raw.replace(/^archive\//, '').replace(/^\.\//, '').replace(/^\//, '');
    if (!path.endsWith('.js')) path += '.js';
    if (!/^(exams|assets|data)\//.test(path)) path = `exams/${path}`;
    return path;
}

function getArchiveUrl(file) {
    const path = normalizeArchiveFile(file);
    if (!path) return '';
    if (/^https?:\/\//i.test(path)) return path;
    const encodedPath = path.split('/').map(part => encodeURIComponent(part)).join('/');
    return ARCHIVE_BASE_URL + encodedPath;
}

function resolveArchiveAssetUrl(src, archiveFile) {
    const raw = String(src || '').trim();
    if (!raw) return '';
    // Absolute / inline sources are left untouched.
    if (/^(https?:|data:|blob:)/i.test(raw)) return raw;
    let path = raw.replace(/^\.\//, '').replace(/^\//, '');
    // "archive/assets/images/…" and "assets/images/…" both resolve under ARCHIVE_BASE_URL.
    path = path.replace(/^archive\//i, '');
    if (!/^assets\//i.test(path) && archiveFile) {
        // Relative to the source archive file's directory (e.g. "q1.png").
        const dir = normalizeArchiveFile(archiveFile).split('/').slice(0, -1).join('/');
        path = (dir ? dir + '/' : '') + path;
    }
    const encoded = path.split('/').map(part => encodeURIComponent(part)).join('/');
    return ARCHIVE_BASE_URL + encoded;
}

function rewriteImgSrcInHtml(html, archiveFile) {
    return String(html || '').replace(
        /(<img\b[^>]*?\bsrc\s*=\s*)(["'])([\s\S]*?)\2/gi,
        (match, pre, quote, src) => {
            const resolved = resolveArchiveAssetUrl(src, archiveFile);
            return `${pre}${quote}${resolved || src}${quote}`;
        }
    );
}

function getQuestionImageRaw(q) {
    return q?.image || q?.imageUrl || q?.img || q?.imageTag || q?.imagePath || q?.image_path || '';
}

function getQuestionArchiveFile(q) {
    return (q && (q._archiveFile || q._sourceArchiveFile)) || '';
}

// compact 문항: [archiveFile, questionNo, correctRate, examTitle?]
// 복원 정확도를 위해 "원본 아카이브 문항"(sourceArchiveFile/sourceQuestionNo)을 우선 직렬화한다.
// 일반 단일 시험은 source==exam이라 동일하고, MIXED/조립 시험만 원본으로 교정된다(길이 증가 없음).
// examTitle은 학생별에서만 보존한다(반/학년/유형은 문항이 많아 길이 폭증을 막기 위해 생략).
function compactWrongItem(item, includeExamTitle = false) {
    const rate = Number(item?.correctRate);
    const row = [
        normalizeArchiveFile(item?.sourceArchiveFile || item?.archiveFile || ''),
        Number(item?.sourceQuestionNo || item?.questionNo || 0),
        Number.isFinite(rate) ? Math.round(rate) : null
    ];
    if (includeExamTitle) row.push(String(item?.examTitle || ''));
    return row;
}

function expandWrongItem(row) {
    const data = Array.isArray(row) ? row : [];
    const rate = Number(data[2]);
    return {
        archiveFile: data[0] || '',
        questionNo: Number(data[1] || 0),
        correctRate: Number.isFinite(rate) ? rate : null,
        examTitle: data[3] || ''
    };
}

function buildClassQrPayload(payload) {
    return {
        v: 3,
        m: 'class',
        c: payload.className || '',
        t: payload.printTitle || '',
        d: payload.createdDate || '',
        i: (payload.classWrongItems || []).map(item => compactWrongItem(item))
    };
}

function buildGradeQrPayload(payload) {
    return {
        v: 3,
        m: 'grade',
        g: payload.gradeName || '',
        t: payload.printTitle || '',
        d: payload.createdDate || '',
        i: (payload.gradeWrongItems || []).map(item => compactWrongItem(item))
    };
}

function buildStudentQrPayload(payload, student) {
    return {
        v: 3,
        m: 'student',
        n: student?.studentName || '',
        c: payload.className || '',
        t: payload.printTitle || '',
        d: payload.createdDate || '',
        i: (student?.wrongItems || []).map(item => compactWrongItem(item, true))
    };
}

function buildTypeQrPayload(payload) {
    return {
        v: 3,
        m: 'type',
        y: payload.typeMode || '',
        l: getTypePrintLabel(payload),
        s: getTypeScopeLabel(payload),
        t: payload.printTitle || '',
        d: payload.createdDate || '',
        i: getTypeItems(payload).map(item => compactWrongItem(item))
    };
}

// v2(레거시 배열형) + v3(메타 포함)을 모두 복원한다. 복원 실패 문항을 조용히 버리지 않도록
// archiveFile/questionNo 누락 문항도 그대로 통과시키고, cloneQuestionForRender가 경고 박스를 출력한다.
function expandWrongQrPayload(compact) {
    const rawMode = compact?.m;
    const mode = rawMode === 'class' || rawMode === 'grade' || rawMode === 'type' ? rawMode : 'student';
    const items = (compact?.i || []).map(expandWrongItem);
    const base = {
        version: compact?.v >= 3 ? 'qr-3' : 'qr-2',
        mode,
        printTitle: compact?.t || '오답 클리닉',
        className: compact?.c || '',
        gradeName: compact?.g || '',
        createdDate: compact?.d || '',
        options: { includeHomeworkCheckBox: false, pageBreakByStudent: false },
        students: [],
        classWrongItems: [],
        gradeWrongItems: []
    };

    if (mode === 'class') {
        base.classWrongItems = items;
    } else if (mode === 'grade') {
        base.gradeWrongItems = items;
    } else if (mode === 'type') {
        base.typeMode = compact?.y || 'mostWrong';
        base.typeLabel = compact?.l || '';
        base.scopeLabel = compact?.s || '';
        // 범위 라벨을 className에 실어 QR review 제목(getTypeScopeLabel)에 그대로 노출한다.
        if (compact?.s) base.className = compact.s;
        base.typeItems = items;
        base.classWrongItems = items;
        if (!base.printTitle || base.printTitle === '오답 클리닉') {
            base.printTitle = [compact?.s, compact?.l].filter(Boolean).join(' ') || '유형별 오답';
        }
    } else {
        base.students = [{
            studentName: compact?.n || '오답',
            wrongItems: items
        }];
    }
    return base;
}

function encodeWrongQrPayload(compact) {
    return encodeBase64Url(JSON.stringify(compact));
}

function decodeWrongQrPayload(value) {
    return expandWrongQrPayload(JSON.parse(decodeBase64Url(value)));
}

function buildQrTargetUrl(compactPayload) {
    const url = new URL(WRONG_PRINT_PUBLIC_URL);
    url.searchParams.set('mode', 'review');
    url.searchParams.set('qr', '1');
    url.searchParams.set('wp', encodeWrongQrPayload(compactPayload));
    return url.toString();
}

function buildStoredQrTargetUrl(kind, key) {
    const safeKey = String(key || '').trim();
    if (!safeKey) return '';
    if (kind === 'packet') {
        const studentUrl = new URL('student/index.html', WRONG_PRINT_PUBLIC_URL);
        studentUrl.searchParams.set('wrong_clinic', safeKey);
        return studentUrl.toString();
    }
    const url = new URL(WRONG_PRINT_PUBLIC_URL);
    url.searchParams.set('mode', 'review');
    url.searchParams.set('qr', '1');
    url.searchParams.set(kind === 'set' ? 'set' : 'packet', safeKey);
    return url.toString();
}

function getPayloadSetKey(payload) {
    return String(payload?.serverSetKey || payload?.publicSetKey || payload?.setKey || payload?.public_set_key || '').trim();
}

function getStudentPacketKey(student) {
    return String(student?.serverPacketKey || student?.packetKey || student?.packet_key || '').trim();
}

// class/grade/type 모드에서 학생별로 배포된 packet_key 목록(있으면 학생 개인 QR을 붙일 수 있다).
function getPrintRecipients(payload) {
    return Array.isArray(payload?.recipients) ? payload.recipients.filter(r => r && getStudentPacketKey(r)) : [];
}

function buildQrTargetUrlForPayload(compactPayload, payload, student = null) {
    const packetKey = student ? getStudentPacketKey(student) : '';
    if (packetKey) return buildStoredQrTargetUrl('packet', packetKey);
    const setKey = getPayloadSetKey(payload);
    if (setKey) return buildStoredQrTargetUrl('set', setKey);
    return buildQrTargetUrl(compactPayload);
}

// QR URL 길이로 스캔 안정성 수준을 판정한다(LOOP 4). safe/warn/danger.
function evaluateQrUrlLength(qrUrl) {
    const length = String(qrUrl || '').length;
    let level = 'safe';
    if (length > QR_URL_LENGTH.warn) level = 'danger';
    else if (length > QR_URL_LENGTH.safe) level = 'warn';
    return { length, level };
}

function isQrSolutionMode() {

}

function applyQrSolutionLockUI() {

function injectSolutionQrToPage(targetPage, qrPayload) {
    if (!WRONG_QR_PATCH.enabled || !targetPage || !qrPayload) return;

    const compactPayload = qrPayload && typeof qrPayload === 'object' && qrPayload.payload ? qrPayload.payload : qrPayload;
    const qrUrl = qrPayload && typeof qrPayload === 'object' && qrPayload.url
        ? String(qrPayload.url)
        : buildQrTargetUrl(compactPayload);
    const lengthInfo = evaluateQrUrlLength(qrUrl);

    PrintCore.renderQrBadge(targetPage, {
        className: 'page-qr',
        html: `<div class="page-qr-label">${WRONG_QR_PATCH.label}</div><canvas></canvas>`,
        url: qrUrl,
        size: WRONG_QR_PATCH.size
    });

    if (lengthInfo.level !== 'safe') {
        // 출력물에는 경고 문구를 박지 않고 콘솔에만 남긴다(QR 하단 문구 제거 요청).
        console.warn('[wrong_print_engine] QR URL length', lengthInfo.length, '→', lengthInfo.level);
    }
}

async function fetchArchiveText(file) {

function extractQuestionBank(jsText) {
    const sandboxWindow = { questionBank: null, __questionBank: null };
    const sandboxDocument = {
        createElement: () => ({ style: {}, setAttribute() {}, appendChild() {}, innerHTML: '' }),
        head: { appendChild() {} },
        body: { appendChild() {} },
        addEventListener() {},
        querySelector: () => null,
        querySelectorAll: () => []
    };
    try {
        const fn = new Function('window', 'document', `${jsText}\n;return window.questionBank || window.__questionBank || (typeof questionBank !== 'undefined' ? questionBank : null);`);
        return fn(sandboxWindow, sandboxDocument);
    } catch (e) {
        console.warn('[wrong_print_engine] questionBank extract failed:', e);
        return null;
    }
}

function normalizeQuestionBank(bank) {
    if (Array.isArray(bank)) return bank;
    if (!bank || typeof bank !== 'object') return [];
    if (Array.isArray(bank.questions)) return bank.questions;
    if (Array.isArray(bank.items)) return bank.items;
    if (Array.isArray(bank.data)) return bank.data;
    return [];
}

function getQuestionNoValue(question, fallbackIndex) {
    const values = [question?.questionNo, question?.question_no, question?.no, question?.number, question?.qno, question?.qid, question?.id];
    for (const value of values) {
        const match = String(value ?? '').match(/\d+/);
        if (match) return Number(match[0]);
    }
    return fallbackIndex + 1;
}

function toQuestionNumber(value) {
    const match = String(value ?? '').match(/\d+/);
    return match ? Number(match[0]) : null;
}

// item이 제공할 수 있는 원본 식별자를 우선순위대로 모아 bank에서 문항을 찾는다(LOOP 2 보강).
// 순서: sourceQuestionNo → originalId → questionId → id → questionNo.
function findQuestionInBank(bank, item) {
    const list = normalizeQuestionBank(bank);
    if (!list.length) return null;
    // 하위 호환: questionNo(숫자/문자)만 넘어와도 동작한다.
    const src = (item && typeof item === 'object') ? item : { questionNo: item };
    const candidates = [
        src.sourceQuestionNo,
        src.originalId,
        src.questionId,
        src.source_question_no,
        src.id,
        src.questionNo
    ].map(toQuestionNumber).filter(n => n != null);
    if (!candidates.length) return null;
    const seen = new Set();
    const ordered = candidates.filter(n => (seen.has(n) ? false : seen.add(n)));
    // 1) bank의 questionNo/id 필드 직접 매칭
    for (const c of ordered) {
        const hit = list.find(q => toQuestionNumber(q?.questionNo) === c || toQuestionNumber(q?.id) === c);
        if (hit) return hit;
    }
    // 2) 파생 번호(getQuestionNoValue) 매칭
    for (const c of ordered) {
        const hit = list.find((q, idx) => getQuestionNoValue(q, idx) === c);
        if (hit) return hit;
    }
    // 3) 배열 index + 1
    for (const c of ordered) {
        if (list[c - 1]) return list[c - 1];
    }
    return null;
}

function wrapLatex(text) {
    if (text == null) return '';
    let s = String(text);
    s = s.replace(/\\\([\s\S]+?\\\)/g, m => '$' + m.slice(2, -2) + '$');
    s = s.replace(/\\\[[\s\S]+?\\\]/g, m => '$$' + m.slice(2, -2) + '$$');
    const combRepl = T => (m, a1, a2, b1, b2) => `$_{${a1||a2}}${T}_{${b1||b2}}$`;
    const combPat = prefix => new RegExp(`(?<!\\$)(?:\\{\\}|\\[\\])_(?:\\{([^}]+)\\}|([a-zA-Z0-9+\\-]+))${prefix}_(?:\\{([^}]+)\\}|([a-zA-Z0-9+\\-]+))`, 'g');
    const htmlTags = [];
    s = s.replace(/<svg[\s\S]*?<\/svg>|<img[^>]*>|<br\s*\/?>|<\/?(div|span|b|i|strong|em|u|sup|sub|table|thead|tbody|tr|th|td|colgroup|col)[^>]*>/gi, m => {
        const token = `__HTMLTAG_${htmlTags.length}__`;
        htmlTags.push(m);
        return token;
    });
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$)/g).map((seg, idx) => {
        if (idx % 2 === 1) return seg;
        let t = seg;
        t = t.replace(combPat('C'), combRepl('C')).replace(combPat('H'), combRepl('H')).replace(combPat('P'), combRepl('P'));
        return t.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }).join('');
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$|__HTMLTAG_\d+__)/g).map((seg, idx) => {
        if (idx % 2 === 1) return seg;
        const trimmed = seg.trim();
        if (!trimmed) return seg;
        const hasKorean = /[\uAC00-\uD7A3]/.test(seg);
        const hasLatex = /\\[a-zA-Z]/.test(seg);
        if (!hasKorean && /\\begin\{(cases|aligned|array|matrix|pmatrix|bmatrix|vmatrix|Vmatrix)\}/.test(seg)) return `$$${seg}$$`;
        if (!hasKorean && hasLatex && /^[0-9a-zA-Z\s\+\-\*\/\=\^\{\}\(\)\[\]_\.,\\!;:]+$/.test(trimmed)) return `$${trimmed}$`;
        if (hasKorean && hasLatex) return seg.replace(/(\\[a-zA-Z]+(?:\{[^}]*\})*(?:\{[^}]*\})*(?:_\{?[^}\s]+\}?)?(?:\^\{?[^}\s]+\}?)?)/g, '$$$1$$');
        return seg;
    }).join('');
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$)/g).map((seg, idx) => {
        if (idx % 2 === 1) return seg;
        return seg.replace(/(\\\{(?:[^{}]|\{[^}]*\})*\\\})/g, '$$$1$$');
    }).join('');
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$)/g).map((seg, idx) => {
        if (idx % 2 === 0) return seg;
        return seg.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }).join('');
    s = s.replace(/\\n(?![a-zA-Z])/g, '<br>').replace(/\r\n|\r|\n/g, '<br>');
    return s.replace(/__HTMLTAG_(\d+)__/g, (_, i) => htmlTags[i] || '');
}

function raf() {
    return PrintCore.raf();
}

// 클리닉 전용 이미지 비율표(아카이브 엔진과 다름 — 출력 보존을 위해 코어 훅으로 주입)
function autoImageSizeClassFor(img) {
    const width = Number(img && img.naturalWidth) || 0;
    const height = Number(img && img.naturalHeight) || 0;
    if (!width || !height) return 'image-medium';
    const ratio = width / height;
    if (ratio >= 2.2) return 'image-full';
    if (ratio >= 1.25) return 'image-large';
    if (ratio >= 0.8) return 'image-small';
    return 'image-medium';
}

// 본문 인라인 이미지(.q-image-wrap 밖)도 로드 완료 후 측정해야 페이지 높이가 안 어긋난다.
const applyAutoImageSizeClasses = PrintCore.createImageSizer({
    imageSizeClassFor: autoImageSizeClassFor,
    includeInlineContentImages: true
});

function extractChoice(choice) {
    return String(choice || '');
}

function stripChoicePrefix(choice) {
    const s = String(choice || '');
    // ① ② ③ … (U+2460–U+2473) and parenthesized ⑴ ⑵ … (U+2474–U+2487)
    const circled = /^\s*[①-⒇]\s*/;
    if (circled.test(s)) return s.replace(circled, '').trim();
    // "(1) …"  "[1] …"  "1) …"  — number explicitly wrapped or followed by a bracket
    const bracketed = /^\s*(?:\(\s*\d{1,2}\s*\)|\[\s*\d{1,2}\s*\]|\d{1,2}\))\s*/;
    if (bracketed.test(s)) return s.replace(bracketed, '').trim();
    // "1. …" — number then dot then whitespace (avoid decimals like 1.5 and units like 1분)
    const dotted = /^\s*\d{1,2}\.\s+/;
    if (dotted.test(s)) return s.replace(dotted, '').trim();
    // Bare numbers ("10", "500명", "18분 후", "2시간 30분", "$4$") are kept intact.
    return s.trim();
}

function detectChoiceRenderMode(choices) {
    const texts = (choices || []).map(c => stripChoicePrefix(extractChoice(c)).trim());
    const stripped = texts.map(t => t.replace(/\$\$[\s\S]*?\$\$/g, '~').replace(/\$[^$\n]*?\$/g, '~').trim());
    const avgLen = stripped.reduce((sum, text) => sum + text.length, 0) / Math.max(stripped.length, 1);
    const hasLineBreak = texts.some(t => /\\n|\n|<br/i.test(t));
    const hasVeryLong = stripped.some(t => t.length > 36);
    const hasMultiMarker = texts.some(t => (t.match(/[\u2460-\u2464]|[\u3131-\u314E]\.|[\uAC00-\uD7A3]\./g) || []).length >= 2);
    if (hasMultiMarker) return 'boxed';
    if (hasVeryLong || hasLineBreak || avgLen > 28) return 'block';
    return stripped.some(t => t.length > 20) ? 'block' : 'compact';
}

function renderChoicesHTML(q) {
    const circled = ['①', '②', '③', '④', '⑤'];
    const choices = Array.isArray(q.choices) ? q.choices : Array.isArray(q.options) ? q.options : [];
    const isSubjective = !choices.length || choices[0] === '주관식' || choices.every(c => extractChoice(c).trim() === '');
    if (isSubjective) return '<div class="answer-box"></div>';
    const mode = detectChoiceRenderMode(choices);
    const itemsHTML = choices.map((c, ci) => {
        const text = wrapLatex(stripChoicePrefix(extractChoice(c)));
        return `<div class="choice-item"><span class="choice-no">${circled[ci] || ''}</span><span class="choice-text">${text}</span></div>`;
    }).join('');
    return `<div class="choices choices-${mode}">${itemsHTML}</div>`;
}

function formatQuestionContent(html) {
    if (!html) return '';
    let count = 0;
    return html.replace(/([\.?\!]|\s|>)\s*(\(\d+\))/g, (match, p1, p2) => {
        count++;
        if (count === 1) return match;
        if (p1.includes('br>') || p1.includes('\n')) return match;
        return p1 + '<br>' + p2;
    });
}

function normalizeQuestionTables(html) {
    if (!html) return '';
    return html
        .replace(/<div class="question-table-wrap">\s*<table/gi, '<div class="question-table-wrap"><table class="question-table"')
        .replace(/<table(?![^>]*class=)/gi, '<table class="question-table"');
}

function normalizeQuestionNotes(html) {
    if (!html || /question-note-box/.test(html)) return html;
    return html.replace(/((?:<br\s*\/?>\s*)+)(\[[^\]]+\][\s\S]*?)(?=(?:<br\s*\/?>\s*){2,}|$)/gi, (match, breaks, noteBlock) => {
        const brCount = (noteBlock.match(/<br\s*\/?>/gi) || []).length;
        const plainText = noteBlock.replace(/<[^>]+>/g, '').trim();
        if (brCount < 2 && plainText.length < 60) return match;
        return `<div class="question-note-box">${noteBlock}</div>`;
    });
}

function protectRenderSegments(html) {
    const tokens = [];
    const save = (match) => {
        const token = `__PROTECTED_SEGMENT_${tokens.length}__`;
        tokens.push(match);
        return token;
    };
    let protectedHtml = String(html || '')
        .replace(/<div[^>]*class=["'][^"']*(?:question-table-wrap|question-note-box|box)[^"']*["'][^>]*>[\s\S]*?<\/div>/gi, save)
        .replace(/<table[\s\S]*?<\/table>/gi, save)
        .replace(/\$\$[\s\S]*?\$\$/g, save)
        .replace(/\$[^$\n]*?\$/g, save);
    return {
        html: protectedHtml,
        restore(value) {
            let restored = String(value || '');
            for (let pass = 0; pass < tokens.length + 2 && /__PROTECTED_SEGMENT_\d+__/.test(restored); pass++) {
                restored = restored.replace(/__PROTECTED_SEGMENT_(\d+)__/g, (match, i) => {
                    const idx = Number(i);
                    if (tokens[idx] !== undefined) return tokens[idx];
                    console.warn('[wrong_print_engine] protected segment restore failed:', match);
                    return '';
                });
            }
            if (/__PROTECTED_SEGMENT_\d+__/.test(restored)) {
                console.warn('[wrong_print_engine] protected segment remained after restore:', restored);
            }
            return restored;
        }
    };
}

function normalizeViewBlocks(html) {
    if (!html) return '';
    const protectedState = protectRenderSegments(html);
    let out = protectedState.html;

    out = out.replace(
        /((?:<br\s*\/?>\s*)*)(?:\[보기\]|&lt;보기&gt;|<보기>|보기\s*:|조건\s*:|자료\s*:)\s*([\s\S]*?)(?=(?:<br\s*\/?>\s*){2,}|$)/gi,
        (match, breaks, body) => {
            const plain = body.replace(/<[^>]+>/g, '').trim();
            const markerCount = (plain.match(/[\u3131-\u314E]\.|[\uAC00-\uD7A3]\.|[\u2460-\u2464]/g) || []).length;
            if (plain.length < 60 && markerCount < 2) return match;
            const label = /조건\s*:/.test(match) ? '조건' : (/자료\s*:/.test(match) ? '자료' : '보기');
            return `${breaks}<div class="question-note-box"><b>${label}</b><br>${body.trim()}</div>`;
        }
    );

    out = out.replace(
        /((?:<br\s*\/?>\s*)*)((?:[\u3131-\u314E]\.\s*[\s\S]*?){2,})(?=(?:<br\s*\/?>\s*){2,}|$)/g,
        (match, breaks, body) => {
            const plain = body.replace(/<[^>]+>/g, '').trim();
            const markerCount = (plain.match(/[\u3131-\u314E]\./g) || []).length;
            if (plain.length < 60 || markerCount < 2) return match;
            return `${breaks}<div class="question-note-box">${body.trim()}</div>`;
        }
    );

    out = out.replace(
        /((?:<br\s*\/?>\s*)*)((?:[\u2460-\u2464]\s*[\s\S]*?[\u2460-\u2464]\s*[\s\S]*?[\u2460-\u2464][\s\S]*?))(?=(?:<br\s*\/?>\s*){2,}|$)/g,
        (match, breaks, body) => {
            const plain = body.replace(/<[^>]+>/g, '').trim();
            const markerCount = (plain.match(/[\u2460-\u2464]/g) || []).length;
            if (plain.length < 60 || markerCount < 3) return match;
            return `${breaks}<div class="question-note-box">${body.trim()}</div>`;
        }
    );

    return protectedState.restore(out);
}

function sanitizeProtectedSegments(html) {
    const value = String(html || '');
    if (!/__PROTECTED_SEGMENT_\d+__/.test(value)) return value;
    console.warn('[wrong_print_engine] removing leaked protected segment token:', value);
    return value.replace(/__PROTECTED_SEGMENT_\d+__/g, '');
}

function formatQuestionForRender(rawContent, q) {
    return sanitizeProtectedSegments(
        normalizeQuestionNotes(
            normalizeViewBlocks(
                normalizeQuestionTables(
                    formatQuestionContent(wrapLatex(rawContent), q)
                )
            )
        )
    );
}

function stripInlineImagesFromContent(content, hasImageField) {
    if (!content) return '';
    if (!hasImageField) return content;
    let stripped = content.replace(/(?:<br\s*\/?>\s*)*<img[^>]*>(?:\s*<br\s*\/?>)*/gi, '<br>');
    stripped = stripped.replace(/^(?:<br\s*\/?>\s*)+/i, '').replace(/(?:<br\s*\/?>\s*)+$/i, '');
    return stripped;
}

function renderQuestionImageHTML(q) {
    const image = getQuestionImageRaw(q);
    if (!image) return '';
    const archiveFile = getQuestionArchiveFile(q);
    // imageTag (or any field) may carry a full <img …> tag — rewrite its src in place.
    if (/<img/i.test(image)) {
        return `<div class="q-image-wrap">${rewriteImgSrcInHtml(image, archiveFile)}</div>`;
    }
    const url = resolveArchiveAssetUrl(image, archiveFile);
    if (!url) return '';
    const size = ['small', 'half', 'medium', 'large', 'full', 'tall'].includes(q.imageSize) ? q.imageSize : '';
    const sizeClass = size ? ` image-${size}` : '';
    return `<div class="q-image-wrap${sizeClass}"><img src="${escapeHtml(url)}" alt=""></div>`;
}

function cloneQuestionForRender(item) {
    // 원본(조립/MIXED 교정) 아카이브를 우선 사용해 문항을 복원한다.
    const file = normalizeArchiveFile(item.sourceArchiveFile || item.archiveFile);
    const bank = state.banks[file] || [];
    const original = findQuestionInBank(bank, item);
    if (!original) {
        // 복원 실패를 조용히 버리지 않는다(LOOP 2): 콘솔 경고 + 출력물 경고 박스.
        console.warn('[wrong_print_engine] 문항 복원 실패:', { archiveFile: file, questionNo: item.questionNo, examTitle: item.examTitle || '' });
        const warnHtml = `<div class="sol-load-warn">[문항 로드 실패]<br>archiveFile: ${escapeHtml(file || '(없음)')}<br>questionNo: ${escapeHtml(String(item.questionNo || '(없음)'))}<br>이 문항은 원본 아카이브에서 찾지 못했습니다.</div>`;
        return {
            id: item.questionNo,
            content: warnHtml,
            choices: [],
            answer: '',
            solution: '원본 아카이브에서 문항을 찾지 못했습니다.',
            _loadFailed: true,
            _wrongNote: item._wrongNote || '',
            _examLabel: item.examTitle || '',
            _sourceNo: item.questionNo,
            _archiveFile: file,
            _sourceArchiveFile: file
        };
    }
    const q = JSON.parse(JSON.stringify(original));
    q._wrongNote = item._wrongNote || '';
    q._examLabel = item.examTitle || '';
    q._sourceNo = item.questionNo;
    q._archiveFile = file;
    q._sourceArchiveFile = file;
    return q;
}

function appendBlankPage(area) {
    // A physical, intentionally empty A4 page (no header, frame, QR, or page number)
    // so the next student's output starts on a fresh sheet front when duplex printing.
    const page = document.createElement('section');
    page.className = 'page page-blank';
    area.appendChild(page);
    return page;
}

// 이름칸: 값이 있으면 라벨+값(굵게)으로 인쇄, 없으면 빈 밑줄. 모드별 라벨(이름/반/학년).
function renderHeaderNameFill(label, value) {
    const safeLabel = escapeHtml(label || '이름');
    if (value) {
        return `<span><span class="page-header-fill-label">${safeLabel}</span><span class="page-header-fill-value">${escapeHtml(value)}</span></span>`;
    }
    return renderHeaderFill(label || '이름');
}

function makePage(area, type, title, metaLeft, metaRight, pageNumber, extra = {}) {
    const page = document.createElement('section');
    page.className = 'page';
    const frame = document.createElement('div');
    frame.className = 'page-exam-frame';
    const header = document.createElement('div');
    const opts = getPrintHeaderOptions();

    // 2페이지~ : 헤더 박스 없이 작은 러닝 이름표만(섞여도 식별 가능)
    if (type === 'exam' && extra.headerMode === 'running') {
        header.className = 'page-header page-header--running';
        const runningName = extra.nameValue ? `${extra.nameValue} · ` : '';
        header.innerHTML = `<span class="page-header-running-label">${escapeHtml(runningName)}p.${pageNumber || ''}</span>`;
    } else if (type === 'exam') {
        header.className = 'page-header page-header--exam';
        const renderTitle = getRenderHeaderTitle(type, title);
        const subtitle = getRenderHeaderSubtitle(type, extra.subtitleFallback);
        const nameHtml = opts.showNameLine ? renderHeaderNameFill(extra.nameLabel || '이름', extra.nameValue || '') : '';
        const scoreHtml = opts.showScoreLine ? renderHeaderFill('점수', '/ 100') : '';
        header.innerHTML = `
            <div class="page-header-titlecol">
                <div class="page-header-title">${escapeHtml(renderTitle)}</div>
                ${subtitle ? `<div class="page-header-subtitle">${escapeHtml(subtitle)}</div>` : ''}
            </div>
            <div class="page-header-meta">
                <div class="page-header-meta-right">${nameHtml}${scoreHtml}</div>
                ${(opts.showDate && extra.dateText) ? `<div class="page-header-date">${escapeHtml(extra.dateText)}</div>` : ''}
            </div>
        `;
    } else {
        // 해설지/정답표 등 비-문제지 헤더는 기존 동작 유지
        header.className = 'page-header';
        const renderTitle = getRenderHeaderTitle(type, title);
        const renderMetaRight = getRenderHeaderMetaRight(type, metaRight);
        const subtitle = getRenderHeaderSubtitle(type);
        header.innerHTML = `
            <div>
                <div class="page-header-title">${escapeHtml(renderTitle)}</div>
                ${subtitle ? `<div class="page-header-subtitle">${escapeHtml(subtitle)}</div>` : ''}
            </div>
            <div class="page-header-meta">
                <div class="page-header-meta-left">${escapeHtml(metaLeft || '')}</div>
                <div class="page-header-meta-right">
                    ${renderMetaRight ? `<span class="page-header-meta-text">${escapeHtml(renderMetaRight)}</span>` : ''}
                </div>
            </div>
        `;
    }
    const body = document.createElement('div');
    body.style.flex = '1';
    body.style.display = 'flex';
    body.style.flexDirection = 'column';
    body.style.minHeight = '0';
    page.appendChild(frame);
    page.appendChild(header);
    page.appendChild(body);
    if (pageNumber) {
        const pageNum = document.createElement('div');
        pageNum.className = 'page-num';
        pageNum.textContent = `- ${pageNumber} -`;
        page.appendChild(pageNum);
    }
    area.appendChild(page);
    return { page, body };
}

function buildQuestionBoxHTML(q, displayNo, showWrongNote = true) {
    const hasImageField = !!getQuestionImageRaw(q);
    const rawContent = stripInlineImagesFromContent(q.content || q.question || q.text || q.prompt || '', hasImageField);
    const formattedContent = rewriteImgSrcInHtml(formatQuestionForRender(rawContent, q), getQuestionArchiveFile(q));
    const imageHTML = renderQuestionImageHTML(q);
    const choicesHTML = state.mode === 'exam' ? renderChoicesHTML(q) : '';
    const wrongNote = showWrongNote && q._wrongNote ? `<div class="wrong-note">${q._wrongNote}</div>` : '';
    const answer = state.mode === 'ans' || state.mode === 'sol' ? `<div style="margin-top:8px;font-weight:bold;color:red;">[정답] ${wrapLatex(getQuestionAnswer(q) || '-')}</div>` : '';
    const solution = state.mode === 'sol' ? `<div style="background:#fdfdfd;padding:8px;border:1px solid #eee;border-radius:3px;margin-top:8px;font-size:8.5pt;line-height:1.55;">${wrapLatex(getQuestionSolution(q) || '해설이 없습니다.')}</div>` : '';
    return `<div class="q-box${state.mode === 'sol' ? ' sol-box' : ''}">
        <div class="q-num">${displayNo}.</div>
        ${wrongNote}
        <div class="q-content">${formattedContent}</div>
        ${imageHTML}
        ${choicesHTML}
        ${answer}
        ${solution}
    </div>`;
}

async function loadAllQuestionBanks(payload) {
    // 복원은 sourceArchiveFile(원본)을 우선 사용하므로, 원본 파일도 함께 적재한다.
    const itemFile = item => item.sourceArchiveFile || item.archiveFile;
    const files = [...new Set([
        ...((payload.students || []).flatMap(student => (student.wrongItems || []).map(itemFile))),
        ...((payload.classWrongItems || []).map(itemFile)),
        ...((payload.gradeWrongItems || []).map(itemFile)),
        ...((payload.typeItems || []).map(itemFile))
    ].filter(Boolean))];

    for (const file of files) {
        const key = normalizeArchiveFile(file);
        if (state.banks[key]) continue;
        try {
            const text = await fetchArchiveText(file);
            state.banks[key] = normalizeQuestionBank(extractQuestionBank(text));
        } catch (e) {
            console.warn('[wrong_print_engine] archive load failed:', file, e);
            state.banks[key] = [];
        }
    }
}
function htmlToElement(html) {
    const template = document.createElement('template');
    template.innerHTML = String(html || '').trim();
    return template.content.firstElementChild;
}

function getGroupTitle(defaultTitle) {
    return defaultTitle || (state.payload?.printTitle || '오답 클리닉');
}

async function renderMeasuredExamPages(area, items, pageMeta = {}) {
    if (!items.length) return;
    const stagedItems = items.map((q, idx) => ({
        q,
        box: htmlToElement(buildQuestionBoxHTML(q, idx + 1, pageMeta.showWrongNote !== false))
    }));

    const headerExtra = {
        nameLabel: pageMeta.nameLabel || '이름',
        nameValue: pageMeta.nameValue || '',
        dateText: pageMeta.dateText || '',
        subtitleFallback: pageMeta.subtitleFallback || ''
    };
    const title = getGroupTitle(pageMeta.title);

    await PrintCore.renderMeasuredExamPages({
        staging: document.getElementById('staging'),
        items: stagedItems,
        qpp: CLINIC_QPP,
        applyAutoImageSizeClasses,
        // 측정 페이지(0)와 1페이지는 전체 헤더, 2페이지부터는 작은 러닝 이름표
        makePage: (pageNumber) => makePage(
            area, 'exam', title, pageMeta.metaLeft || '', pageMeta.metaRight || '', pageNumber,
            { ...headerExtra, headerMode: pageNumber <= 1 ? 'full' : 'running' }
        ),
        onBeforePageMeasure: (handle, pageIdx, isLast) => {
            if (isLast && pageMeta.homeworkCheckHTML) {
                handle.body.insertAdjacentHTML('beforeend', pageMeta.homeworkCheckHTML);
            }
        },
        onPageRendered: (handle, pageIdx, isLast) => {
            if (isLast && state.mode === 'exam' && !isQrSolutionMode() && pageMeta.solutionQrPayload) {
                injectSolutionQrToPage(handle.page, pageMeta.solutionQrPayload);
            }
        }
    });
}

async function renderStudentPages(area, payload) {
    const students = payload.students || [];
    for (let sIdx = 0; sIdx < students.length; sIdx++) {
        const student = students[sIdx];
        const pagesBefore = area.querySelectorAll('.page').length;
        const items = (student.wrongItems || []).map(item => cloneQuestionForRender({
            ...item,
            _wrongNote: `${item.examTitle || '시험'} · 원본 ${item.questionNo}번`
        }));
        await renderMeasuredExamPages(area, items, {
            title: `${student.studentName} 오답`,
            metaLeft: '',
            nameLabel: '이름',
            nameValue: student.studentName || '',
            dateText: payload.createdDate || '',
            subtitleFallback: [payload.className || '', getStudentExamLabel(payload, student)].filter(Boolean).join(' · '),
            solutionQrPayload: {
                payload: buildStudentQrPayload(payload, student),
                url: buildQrTargetUrlForPayload(buildStudentQrPayload(payload, student), payload, student)
            },
            homeworkCheckHTML: payload.options?.includeHomeworkCheckBox === false ? '' : `
                <div class="homework-check">
                    <span>□ 다시 풀기 완료</span>
                    <span>□ 오답 과정 확인</span>
                    <span>□ 선생님 확인</span>
                </div>
            `
        });
        maybeInsertStudentDuplexBreak(area, payload, sIdx, students.length, pagesBefore);
    }
}

function maybeInsertStudentDuplexBreak(area, payload, studentIdx, studentCount, pagesBefore) {
    if (payload.options?.pageBreakByStudent === false) return;
    const hasNextStudent = studentIdx < studentCount - 1;
    if (!hasNextStudent) return;
    const pagesAdded = area.querySelectorAll('.page').length - pagesBefore;
    if (pagesAdded > 0 && pagesAdded % 2 === 1) appendBlankPage(area);
}

function getTypePrintLabel(payload) {
    if (payload.typeMode === 'unit') return '단원별 오답';
    if (payload.typeMode === 'frequent') return '최다빈출 오답';
    if (payload.typeMode === 'mostWrong') return '최다오답';
    return payload.printTitle || '유형별 오답';
}

function getTypeScopeLabel(payload) {
    if (payload.scope === 'grade') return getGradePrintLabel(payload);
    return payload.className || '반';
}

function getTypeItems(payload) {
    if (Array.isArray(payload.typeItems)) return payload.typeItems;
    return payload.scope === 'grade' ? (payload.gradeWrongItems || []) : (payload.classWrongItems || []);
}

function getTypeUnitLabel(key, items) {
    if (key === '__UNCLASSIFIED__') return '기타 / 단원 미분류';
    const found = (items || []).find(item => (item.unitKey || '__UNCLASSIFIED__') === key);
    return found?.unit || key || '기타 / 단원 미분류';
}

function getTypeSections(payload) {
    const items = getTypeItems(payload);
    if (payload.typeMode !== 'unit') {
        return [{ key: '', title: getTypePrintLabel(payload), items }];
    }

    const byUnit = new Map();
    items.forEach(item => {
        const key = item.unitKey || '__UNCLASSIFIED__';
        if (!byUnit.has(key)) byUnit.set(key, []);
        byUnit.get(key).push(item);
    });

    const orderedKeys = (payload.unitOrder || []).filter(key => byUnit.has(key));
    byUnit.forEach((_, key) => {
        if (!orderedKeys.includes(key)) orderedKeys.push(key);
    });

    return orderedKeys.map(key => ({
        key,
        title: getTypeUnitLabel(key, items),
        items: byUnit.get(key) || []
    })).filter(section => section.items.length);
}

function buildTypeSectionRenderItems(section) {
    return (section.items || []).map(item => cloneQuestionForRender({
        ...item,
        _wrongNote: formatCorrectRateLabel(item)
    }));
}

async function renderTypePages(area, payload) {
    const sections = getTypeSections(payload);
    const label = getTypePrintLabel(payload);

    if (!recipients.length) {
        for (const section of sections) {
            await renderMeasuredExamPages(area, buildTypeSectionRenderItems(section), {
                title: payload.typeMode === 'unit' ? section.title : `${scopeLabel} ${label}`,
                metaLeft: '',
                nameLabel: payload.scope === 'grade' ? '학년' : '반',
                nameValue: scopeLabel || '',
                dateText: payload.createdDate || '',
                subtitleFallback: payload.typeMode === 'unit' ? `${scopeLabel} · ${label}` : '',
                solutionQrPayload: {
                    payload: buildTypeQrPayload(payload),
                    url: buildQrTargetUrlForPayload(buildTypeQrPayload(payload), payload)
                }
            });
        }
        return;
    }

    // 학생마다 packet_key가 있으면 섹션 전체를 학생 개인 QR(→ 학생페이지)이 붙은 개인 사본으로 반복 인쇄한다.
    for (let rIdx = 0; rIdx < recipients.length; rIdx++) {
        const recipient = recipients[rIdx];
        const pagesBefore = area.querySelectorAll('.page').length;
        for (const section of sections) {
            await renderMeasuredExamPages(area, buildTypeSectionRenderItems(section), {
                title: payload.typeMode === 'unit' ? section.title : `${scopeLabel} ${label}`,
                metaLeft: '',
                nameLabel: '이름',
                nameValue: recipient.studentName || '',
                dateText: payload.createdDate || '',
                subtitleFallback: payload.typeMode === 'unit' ? `${scopeLabel} · ${label}` : '',
                solutionQrPayload: {
                    payload: null,
                    url: buildStoredQrTargetUrl('packet', getStudentPacketKey(recipient))
                }
            });
        }
        maybeInsertStudentDuplexBreak(area, payload, rIdx, recipients.length, pagesBefore);
    }
}

async function placeSolutionItems(area, items, pageMeta = {}) {
    let pageNo = 1;

    const makeGridPage = () => {
        const page = makePage(area, 'sol', getGroupTitle(pageMeta.title), pageMeta.metaLeft || '', pageMeta.metaRight || '', pageNo++);
        const grid = document.createElement('div');
        grid.className = 'grid-container';
        grid.style.flex = '1 1 0';
        const left = document.createElement('div');
        left.className = 'grid-col';
        const right = document.createElement('div');
        right.className = 'grid-col';
        grid.appendChild(left);
        grid.appendChild(right);
        page.body.appendChild(grid);
        return [left, right];
    };

    const makeBox = (q, idx) => {
        const hasImageField = !!getQuestionImageRaw(q);
        const rawContent = stripInlineImagesFromContent(q.content || q.question || q.text || q.prompt || '', hasImageField);
        const formattedContent = rewriteImgSrcInHtml(formatQuestionForRender(rawContent, q), getQuestionArchiveFile(q));
        const solutionHtml = wrapLatex(getQuestionSolution(q) || '해설이 없습니다.');
        const box = document.createElement('div');
        box.className = 'q-box sol-box';
        box.dataset.solutionHtml = solutionHtml;
        box.innerHTML = `<div class="q-num">${idx + 1}.</div>
            ${q._wrongNote ? `<div class="wrong-note">${q._wrongNote}</div>` : ''}
            <div class="q-content">${formattedContent}</div>
            ${renderQuestionImageHTML(q)}
            <div class="sol-meta"><div class="sol-ans">[정답] ${wrapLatex(getQuestionAnswer(q) || '-')}</div><div class="sol-exp">${solutionHtml}</div></div>`;
        return box;
    };

    // 컬럼 플로우/해설 분할은 PrintCore. prepareColumn으로 클리닉 이미지 사이즈를 측정 전에 적용한다.
    const flow = PrintCore.createSolutionFlow({
        makeGridPage,
        prepareColumn: (col) => applyAutoImageSizeClasses(col)
    });
    for (let idx = 0; idx < items.length; idx++) {
        await flow.placeBox(makeBox(items[idx], idx));
    }
}

async function renderSol(area, payload) {
    if (payload.mode === 'type') {
        const sections = getTypeSections(payload);
        const label = getTypePrintLabel(payload);
        const scopeLabel = getTypeScopeLabel(payload);
        for (const section of sections) {
            const items = section.items.map(item => {
                const rateLabel = formatCorrectRateLabel(item);
                return cloneQuestionForRender({
                    ...item,
                    _wrongNote: rateLabel
                });
            });
            await placeSolutionItems(area, items, {
                title: payload.typeMode === 'unit' ? `${section.title} 해설지` : `${scopeLabel} ${label} 해설지`,
                metaLeft: payload.typeMode === 'unit' ? `${scopeLabel} · ${label}` : (payload.printTitle || ''),
                metaRight: payload.createdDate || ''
            });
        }
        return;
    }

    if (payload.mode === 'class' || payload.mode === 'grade') {
        const sourceItems = payload.mode === 'grade' ? (payload.gradeWrongItems || []) : (payload.classWrongItems || []);
        const items = sourceItems.map(item => {
            const rateLabel = formatCorrectRateLabel(item);
            return cloneQuestionForRender({
                ...item,
                _wrongNote: rateLabel
            });
        });
        await placeSolutionItems(area, items, {
            title: payload.mode === 'grade' ? `${getGradePrintLabel(payload)} 해설지` : `${payload.className || '반'} 해설지`,
            metaLeft: payload.printTitle || '',
            metaRight: payload.createdDate || ''
        });
        return;
    }

    const students = payload.students || [];
    for (let sIdx = 0; sIdx < students.length; sIdx++) {
        const student = students[sIdx];
        const pagesBefore = area.querySelectorAll('.page').length;
        const items = (student.wrongItems || []).map(item => cloneQuestionForRender({
            ...item,
            _wrongNote: `${item.examTitle || '시험'} · 원본 ${item.questionNo}번`
        }));
        await placeSolutionItems(area, items, {
            title: `${student.studentName} 해설지`,
            metaLeft: `${payload.className || ''} · ${getStudentExamLabel(payload, student)}`,
            metaRight: payload.createdDate || ''
        });
        maybeInsertStudentDuplexBreak(area, payload, sIdx, students.length, pagesBefore);
    }
}
function collectAnswerRows(payload) {
    const list = state.payload.mode === 'type'
        ? getTypeItems(payload)
        : state.payload.mode === 'grade'
        ? (payload.gradeWrongItems || [])
        : state.payload.mode === 'class'
        ? (payload.classWrongItems || [])
        : (payload.students || []).flatMap(student => (student.wrongItems || []).map(item => ({ ...item, studentName: student.studentName })));
    return list.map((item, idx) => {
        const q = cloneQuestionForRender(item);
        return {
            no: idx + 1,
            answer: getQuestionAnswer(q) || '-'
        };
    });
}

function renderAnswerRows(area, rows, pageMeta = {}) {
    PrintCore.renderAnswerPages({
        data: (rows || []).map(row => ({ no: row.no, answerHtml: wrapLatex(row.answer) })),
        makePage: (pageNumber) => makePage(
            area, 'ans', pageMeta.title || '정답표', pageMeta.metaLeft || '', pageMeta.metaRight || `p.${pageNumber}`, pageNumber
        )
    });
}

function renderAns(area, payload) {
    if (payload.mode === 'student') {
        const students = payload.students || [];
        for (let sIdx = 0; sIdx < students.length; sIdx++) {
            const student = students[sIdx];
            const pagesBefore = area.querySelectorAll('.page').length;
            const items = (student.wrongItems || []).map(item => cloneQuestionForRender(item));
            const metaLeft = `${payload.className || ''} · ${getStudentExamLabel(payload, student)}`.replace(/^ · | · $/g, '');
            renderAnswerPagesForStudent(area, student, items, {
                title: getStudentWrongClinicHeaderTitle(student),
                metaLeft,
                metaRight: payload.createdDate || ''
            });
            maybeInsertStudentDuplexBreak(area, payload, sIdx, students.length, pagesBefore);
        }
        return;
    }
    const data = collectAnswerRows(payload);
    if (payload.mode === 'type') {
        renderAnswerRows(area, data, {
            title: `${getTypeScopeLabel(payload)} ${getTypePrintLabel(payload)} 정답표`,
            metaLeft: payload.printTitle || ''
        });
        return;
    }
    const title = payload.mode === 'grade'
        ? `${getGradePrintLabel(payload)} 정답표`
        : payload.mode === 'class'
        ? `${payload.className || '반'} 정답표`
        : '학생별 정답표';
    renderAnswerRows(area, data, {
        title,
        metaLeft: payload.printTitle || ''
    });
}

function renderAnswerPagesForStudent(area, student, items, pageMeta = {}) {
    const rows = (items || []).map((q, idx) => ({
        no: idx + 1,
        answer: getQuestionAnswer(q) || '-'
    }));
    renderAnswerRows(area, rows, {
        title: pageMeta.title || getStudentWrongClinicHeaderTitle(student),
        metaLeft: pageMeta.metaLeft || '',
        metaRight: pageMeta.metaRight || ''
    });
}

function getStudentWrongClinicHeaderTitle(student) {
    return `${student?.studentName || '학생'} 오답 클리닉`;
}

async function renderSolutionPagesForStudent(area, student, items, pageMeta = {}) {
    await placeSolutionItems(area, items || [], {
        title: pageMeta.title || getStudentWrongClinicHeaderTitle(student),
        metaLeft: pageMeta.metaLeft || '',
        metaRight: pageMeta.metaRight || ''
    });
}

function maybeInsertReviewPacketDuplexBreak(area, payload, studentIdx, studentCount, pagesBefore) {
    if (payload.options?.pageBreakByStudent === false) return;
    // No trailing blank after the final packet (single QR student, class/grade, or last student).
    const hasNextStudent = studentIdx < studentCount - 1;
    if (!hasNextStudent) return;
    const pagesAdded = area.querySelectorAll('.page').length - pagesBefore;
    if (pagesAdded > 0 && pagesAdded % 2 === 1) appendBlankPage(area);
}

async function renderStudentReviewPacket(area, payload) {
    if (payload.mode === 'type') {
        const label = `${getTypeScopeLabel(payload)} ${getTypePrintLabel(payload)}`;
        const items = getTypeItems(payload).map(item => {
            const rateLabel = formatCorrectRateLabel(item);
            return cloneQuestionForRender({
                ...item,
                _wrongNote: rateLabel
            });
        });
        const metaLeft = payload.printTitle || '';
        const metaRight = payload.createdDate || '';
        renderAnswerPagesForStudent(area, { studentName: label }, items, {
            title: `${label} 정답표`,
            metaLeft,
            metaRight
        });
        await renderSolutionPagesForStudent(area, { studentName: label }, items, {
            title: `${label} 해설지`,
            metaLeft,
            metaRight
        });
        return;
    }

    if (payload.mode === 'class' || payload.mode === 'grade') {
        const sourceItems = payload.mode === 'grade' ? (payload.gradeWrongItems || []) : (payload.classWrongItems || []);
        const label = payload.mode === 'grade' ? getGradePrintLabel(payload) : (payload.className || '반');
        const items = sourceItems.map(item => {
            const rateLabel = formatCorrectRateLabel(item);
            return cloneQuestionForRender({
                ...item,
                _wrongNote: rateLabel
            });
        });
        const metaLeft = payload.printTitle || '';
        const metaRight = payload.createdDate || '';
        renderAnswerPagesForStudent(area, { studentName: label }, items, {
            title: `${label} 공통 오답 정답표`,
            metaLeft,
            metaRight
        });
        await renderSolutionPagesForStudent(area, { studentName: label }, items, {
            title: `${label} 공통 오답 해설지`,
            metaLeft,
            metaRight
        });
        // Single common-wrong packet — no trailing blank.
        return;
    }

    const students = payload.students || [];
    for (let sIdx = 0; sIdx < students.length; sIdx++) {
        const student = students[sIdx];
        const pagesBefore = area.querySelectorAll('.page').length;
        const items = (student.wrongItems || []).map(item => cloneQuestionForRender({
            ...item,
            _wrongNote: `${item.examTitle || '시험'} · 원본 ${item.questionNo}번`
        }));
        const metaLeft = `${payload.className || ''} · ${getStudentExamLabel(payload, student)}`.replace(/^ · | · $/g, '');
        const metaRight = payload.createdDate || '';
        renderAnswerPagesForStudent(area, student, items, {
            title: getStudentWrongClinicHeaderTitle(student),
            metaLeft,
            metaRight
        });
        await renderSolutionPagesForStudent(area, student, items, {
            title: getStudentWrongClinicHeaderTitle(student),
            metaLeft,
            metaRight
        });
        maybeInsertReviewPacketDuplexBreak(area, payload, sIdx, students.length, pagesBefore);
    }
}

async function render() {
    const area = document.getElementById('print-area');
    area.innerHTML = '<div class="notice">오답 문항을 불러오는 중입니다.</div>';
    await loadAllQuestionBanks(state.payload);
    area.innerHTML = '';

    if (state.mode === 'ans') {
        renderAns(area, state.payload);
    } else if (state.mode === 'review') {
        await renderStudentReviewPacket(area, state.payload);
    } else if (state.mode === 'sol') {
        await renderSol(area, state.payload);
    } else if (state.payload.mode === 'type') {
        await renderTypePages(area, state.payload);
    } else if (state.payload.mode === 'grade') {
        await renderGradePages(area, state.payload);
    } else if (state.payload.mode === 'class') {
        await renderClassPages(area, state.payload);
    } else {
        await renderStudentPages(area, state.payload);
    }

    if (!area.textContent.trim()) {
        area.innerHTML = '<div class="notice">출력할 오답 문항이 없습니다.</div>';
        return;
    }

    if (window.MathJax?.typesetPromise) {
        try { await MathJax.typesetPromise([area]); } catch (e) { console.warn(e); }
    }
    await raf();
    enableHeaderInlineEdit();
}

function schedulePreviewRender() {
    clearTimeout(previewRenderTimer);
    previewRenderTimer = setTimeout(() => {
        render();
    }, 250);
}

// 미리보기에서 헤더 텍스트를 직접 클릭해 수정한다. blur(확정) 시 부모(클리닉)로 값 전송.
function bindHeaderEditable(el, field, placeholder) {
    if (!el) return;
    el.classList.add('clinic-editable');
    el.setAttribute('contenteditable', 'true');
    el.setAttribute('data-clinic-field', field);
    el.setAttribute('data-placeholder', placeholder);
    el.setAttribute('title', '클릭해서 수정');
    el.spellcheck = false;
    const normalize = () => (el.textContent || '').replace(/\s+/g, ' ').trim();
    // 편집 시작값 기록 → 변경 없는 blur는 저장하지 않는다(자동 보조문구를 클릭만 한 경우 수동값으로 굳는 것 방지).
    el.addEventListener('focus', () => { el._editStartValue = normalize(); });
    el.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
        if (e.key === 'Escape') { e.preventDefault(); el.textContent = el._editStartValue ?? el.textContent; el.blur(); }
    });
    el.addEventListener('blur', () => {
        const value = normalize();
        if (value === (el._editStartValue ?? '')) return;
        try {
            window.parent?.postMessage({ type: 'AP_CLINIC_HEADER_EDIT', field, value }, window.location.origin);
        } catch (e) { /* 부모 없거나 출처 불일치 시 무시 */ }
    });
}

// 첫 페이지 헤더만 편집 대상으로 삼는다(blur→부모→재렌더로 전 페이지 동기화).
function enableHeaderInlineEdit() {
    if (!document.body.classList.contains('preview-mode')) return;
    const header = document.querySelector('#print-area .page-header');
    if (!header) return;

    bindHeaderEditable(header.querySelector('.page-header-title'), 'title', '제목 입력');

    // 제목/보조문구만 직접 편집(이름·점수·날짜는 자동). 보조문구가 비어 있으면 편집용 빈 줄 생성.
    const col = header.querySelector('.page-header-titlecol') || header.querySelector('div');
    let subEl = header.querySelector('.page-header-subtitle');
    if (!subEl && col) {
        subEl = document.createElement('div');
        subEl.className = 'page-header-subtitle';
        col.appendChild(subEl);
    }
    bindHeaderEditable(subEl, 'subtitle', '보조 문구 입력');
}

function switchMode(mode) {
    if (isQrSolutionMode() && mode !== 'review') {
        mode = 'review';
    }
    state.mode = mode;
    PrintCore.setActiveModeTab(mode);
    render();
}

// 헤더를 편집(포커스가 .clinic-editable)하는 동안에는 재렌더를 미룬다.
// 빠르게 제목→보조문구로 옮겨 칠 때 contenteditable이 재생성돼 포커스/입력이 날아가는 것 방지.
let previewRenderPending = false;
function requestPreviewRender() {
    const active = document.activeElement;
    if (active && active.classList && active.classList.contains('clinic-editable')) {
        previewRenderPending = true;
        return;
    }
    previewRenderPending = false;
    schedulePreviewRender();
}

function installPreviewMessageChannel() {
    document.addEventListener('focusout', () => {
        if (!previewRenderPending) return;
        // 다음 틱에 포커스가 편집영역을 완전히 벗어났는지 확인 후 flush
        setTimeout(() => {
            const a = document.activeElement;
            if (!(a && a.classList && a.classList.contains('clinic-editable'))) {
                previewRenderPending = false;
                schedulePreviewRender();
            }
        }, 0);
    });

    window.addEventListener('message', event => {
        if (event.origin !== window.location.origin) return;
        const msg = event.data || {};
        if (msg.type !== 'AP_CLINIC_PREVIEW') return;
        state.payload = msg.payload;
        if (msg.mode) state.mode = msg.mode;
        PrintCore.setActiveModeTab(state.mode);
        requestPreviewRender();
    });
}

function loadPayloadFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const packed = params.get('wp');
    if (!packed) return null;
    try {
        return decodeWrongQrPayload(packed);
    } catch (e) {
        console.warn('[wrong_print_engine] QR payload decode failed:', e);
        return null;
    }
}

async function loadWrongClinicPayloadFromServer(kind, key) {
    const safeKind = kind === 'set' ? 'set' : 'packet';
    const res = await fetch(`${WRONG_CLINIC_API_BASE}/wrong-clinics/${safeKind}/${encodeURIComponent(key)}`, {
        headers: { 'Content-Type': 'application/json' }
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || data.success === false || !data.payload) {
        throw new Error(data.message || data.error || '오답 클리닉 데이터를 불러오지 못했습니다.');
    }
    return data.payload;
}

async function loadPayloadFromUrlOrStorage() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('packet')) return loadWrongClinicPayloadFromServer('packet', params.get('packet'));
    if (params.get('set')) return loadWrongClinicPayloadFromServer('set', params.get('set'));

    const urlPayload = loadPayloadFromUrl();
    if (urlPayload) return urlPayload;

    try {
        const payloadJson = sessionStorage.getItem(STORAGE_KEY) || localStorage.getItem(STORAGE_KEY) || 'null';
        const payload = JSON.parse(payloadJson);
        console.log('[wrong_print_engine] payload loaded', !!payload);
        return payload;
    } catch (e) {
        return null;
    }
}

async function boot() {
    const qrMode = isQrSolutionMode();
    const params = new URLSearchParams(window.location.search);
    const previewMode = params.get('preview') === '1';
    if (previewMode) {
        document.body.classList.add('preview-mode');
        installPreviewMessageChannel();
    }
    try {
        state.payload = await loadPayloadFromUrlOrStorage();
    } catch (e) {
        console.warn('[wrong_print_engine] server payload load failed:', e);
        document.getElementById('print-area').innerHTML = `<div class="notice">${escapeHtml(e.message || '오답지 데이터를 불러오지 못했습니다.')}</div>`;
        return;
    }

    state.mode = qrMode ? 'review' : (params.get('mode') || state.mode || 'exam');
    PrintCore.setActiveModeTab(state.mode);
    applyQrSolutionLockUI();

    document.querySelectorAll('.mode-tab').forEach(btn => {
        btn.addEventListener('click', () => switchMode(btn.dataset.mode || 'exam'));
    });

    if (previewMode && (!state.payload || typeof state.payload !== 'object')) {
        document.getElementById('print-area').innerHTML = '<div class="notice">설정을 선택하면 미리보기가 표시됩니다.</div>';
        return;
    }

    if (!state.payload || typeof state.payload !== 'object') {
        document.getElementById('print-area').innerHTML = '<div class="notice">오답지 데이터를 찾을 수 없습니다. AP Math OS에서 다시 열어주세요.</div>';
        return;
    }

    render();
}

boot();
</script>
