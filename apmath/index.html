<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AP Math OS 1.0</title>
    <style>
        :root {
            /* [Toss Base + Vivid Pop] 라이트 모드 (기본) */
            --primary: #1A5CFF;
            --primary-dark: #0040D6;
            --secondary: #8B95A1;
            --success: #00D084;
            --error: #FF4757;
            --warning: #FFA502;

            --bg: #F2F4F6;
            --surface: #FFFFFF;
            --surface-alpha: rgba(255, 255, 255, 0.85);
            --border: #E5E8EB;
            --shadow: 0 2px 12px rgba(0,0,0,0.04);
            
            --text: #191F28;
            --text-soft: #333D4B;
        }

        /* [Dark Mode] 다크 테마 컬러셋 */
        body.dark {
            --primary: #4D7CFF;
            --primary-dark: #2F5EEA;
            --secondary: #A7B0BD;
            --success: #22D98F;
            --error: #FF6B7A;
            --warning: #FFB84D;

            --bg: #111318;
            --surface: #1B1F27;
            --surface-alpha: rgba(27, 31, 39, 0.85);
            --border: #2B313B;
            --shadow: 0 2px 16px rgba(0,0,0,0.35);
            
            --text: #F2F4F6;
            --text-soft: #D1D6DE;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; transition: background 0.2s, color 0.2s; }

        header {
            position: sticky; top: 0; z-index: 100;
            background: var(--surface-alpha);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand { display: flex; align-items: baseline; gap: 8px; }
        .brand-text { font-size: 20px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; cursor: pointer; }
        .tag { font-size: 10px; background: var(--primary); color: #ffffff; padding: 3px 8px; border-radius: 20px; font-weight: 800; }

        nav { display: flex; gap: 8px; }
        nav .btn { background: var(--bg); color: var(--text); border: none; font-size: 13px; padding: 6px 12px; font-weight: 700; }

        main { max-width: 600px; margin: 0 auto; padding: 16px 14px calc(100px + env(safe-area-inset-bottom)); }

        .card { background: var(--surface); border-radius: 18px; border: none; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); font-size: 14px; font-weight: 700;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); gap: 6px; min-height: 44px;
            font-family: inherit;
        }
        .btn-primary { background: var(--primary); color: #ffffff; border: none; box-shadow: 0 4px 12px rgba(26,92,255,0.25); }
        .btn-primary:active { background: var(--primary-dark); transform: scale(0.96); }
        .btn:active { background: var(--bg); transform: scale(0.96); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 12px; color: var(--secondary); padding: 8px 6px; border-bottom: 1.5px solid var(--border); font-weight: 700; }
        td { padding: 12px 6px; border-bottom: 1px solid var(--bg); font-size: 14px; color: var(--text); }
        .hidden { display: none !important; }

        #modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000;
            display: flex; align-items: center; justify-content: center; padding: 16px;
            opacity: 0; visibility: hidden; transition: opacity 0.25s ease;
            backdrop-filter: blur(2px);
        }
        #modal-overlay.show { opacity: 1; visibility: visible; }

        #modal-content {
            background: var(--surface); width: 100%; max-width: 500px; border-radius: 24px;
            padding: 0; position: relative; max-height: 88vh; display: flex; flex-direction: column; overflow: hidden;
            transform: translateY(40px) scale(0.98); opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #modal-overlay.show #modal-content { transform: translateY(0) scale(1); opacity: 1; }

        /* [Top Action Modal] */
        #modal-header {
            display: grid;
            grid-template-columns: 64px minmax(0, 1fr) 64px;
            align-items: center;
            gap: 8px;
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--surface);
            z-index: 10;
        }

        #modal-cancel-btn {
            border: none;
            background: transparent;
            color: var(--secondary);
            font-size: 15px;
            font-weight: 800;
            font-family: inherit;
            padding: 8px 0;
            min-height: auto;
            cursor: pointer;
            text-align: left;
        }

        #modal-title {
            margin: 0;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--text);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #modal-action-btn,
        .modal-top-action {
            border: none;
            background: transparent;
            color: var(--primary);
            font-size: 15px;
            font-weight: 900;
            font-family: inherit;
            padding: 8px 0;
            min-height: auto;
            cursor: pointer;
            text-align: right;
            box-shadow: none;
        }

        #modal-action-btn:active,
        #modal-cancel-btn:active {
            background: transparent;
            transform: scale(0.96);
        }

        #modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; min-height: 0; }

        #modal-footer {
            padding: 14px 24px calc(18px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            flex-shrink: 0;
            background: var(--surface);
        }

        .toast-container { position: fixed; bottom: calc(30px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: rgba(25, 31, 40, 0.9); backdrop-filter: blur(8px); color: #FFFFFF; padding: 14px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; box-shadow: 0 8px 20px rgba(0,0,0,0.15); animation: toast-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes toast-in { from { transform: translateY(30px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        .omr-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin: 20px 0; }
        .omr-item { text-align: center; font-size: 13px; font-weight: 700; color: var(--secondary); }
        .omr-q { width: 26px; height: 26px; margin-top: 8px; cursor: pointer; accent-color: var(--primary); }

        .tab-bar { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: 14px; margin-bottom: 20px; }
        .tab-btn { flex: 1; border: none; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 800; color: var(--secondary); background: transparent; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: var(--surface); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        @media (max-width: 600px) {
            #modal-content { border-radius: 24px 24px 0 0; position: fixed; bottom: 0; max-height: 92vh; }
            .omr-grid { grid-template-columns: repeat(3, 1fr); }
            main { padding: 12px 12px calc(100px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="brand-text" onclick="goHome()">AP MATH</div>
            <div class="tag">1.0</div>
        </div>
        <nav>
            <button class="btn" onclick="toggleScope()"><span id="scope-text">내 담당</span></button>
        </nav>
    </header>

    <main id="app-root"></main>

    <div id="modal-overlay" class="hidden" onclick="if(event.target===this) closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()">
            <div id="modal-header">
                <button id="modal-cancel-btn" onclick="closeModal()">취소</button>
                <h2 id="modal-title"></h2>
                <button id="modal-action-btn" class="modal-top-action hidden"></button>
            </div>
            <div id="modal-body"></div>
            <div id="modal-footer" class="hidden"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/core.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/report.js"></script>
    <script src="js/qr-omr.js"></script>
    <script src="js/student.js"></script>
    <script src="js/classroom.js"></script>
    <script src="app.js"></script>
</body>
</html>
