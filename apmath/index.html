<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AP Math OS</title>
    <style>
        /* =========================================
           [Polish] Light Mode Palette (미니멀리즘)
           ========================================= */
                :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #60a5fa;
            --secondary: #64748b;
            --success: #059669;
            --error: #ef4444;
            --warning: #f59e0b;

            --navy: #07111f;
            --navy-2: #0c1a2e;
            --navy-3: #12233f;
            --navy-4: #173056;

            --bg: #f4f7fb;
            --surface: #ffffff;
            --surface-2: #f7faff;
            --surface-alpha: rgba(255,255,255,0.88);
            --border: #e2e8f0;
            --shadow: 0 14px 32px rgba(15,23,42,0.06);

            --text: #0f172a;
            --text-soft: #64748b;
            --text-weak: #94a3b8;
        }

        /* =========================================
           [Polish] Dark Mode Palette (Grok's Soft Dark)
           ========================================= */
                body.dark {
            --primary: #60a5fa;
            --primary-dark: #3b82f6;
            --primary-light: #93c5fd;
            --secondary: #94a3b8;
            --success: #34d399;
            --error: #fb7185;
            --warning: #fbbf24;

            --bg: #07111f;
            --surface: #0c1a2e;
            --surface-2: #12233f;
            --surface-alpha: rgba(12,26,46,0.88);
            --border: rgba(148,163,184,0.22);
            --shadow: 0 18px 40px rgba(0,0,0,0.45);

            --text: #f8fafc;
            --text-soft: #cbd5e1;
            --text-weak: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

                body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(59,130,246,0.06), transparent 26%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.2s, color 0.2s;
        }

        body.dark {
            background:
                radial-gradient(circle at top left, rgba(96,165,250,0.10), transparent 28%),
                linear-gradient(180deg, #07111f 0%, #0c1a2e 100%);
        }

                header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(180deg, rgba(7,17,31,0.98) 0%, rgba(12,26,46,0.96) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
        }

        .header-inner {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 8px;
            cursor: pointer;
        }

                .brand-text {
            font-size: 20px;
            font-weight: 950;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 8px;
            align-items: center;
        }

                main {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 14px calc(100px + env(safe-area-inset-bottom));
        }

        .desktop-rail {
            display: none;
        }

        @media (min-width: 900px) {
            header {
                display: none;
            }

            body {
                padding-left: 56px;
            }

            main {
                max-width: 1120px;
                padding: 32px 32px 80px;
            }

            .desktop-rail {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                z-index: 120;
                width: 56px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0;
                padding: 14px 8px calc(14px + env(safe-area-inset-bottom));
                background: rgba(255,255,255,0.86);
                border-right: 1px solid var(--border);
                backdrop-filter: blur(14px);
                -webkit-backdrop-filter: blur(14px);
            }

            body.dark .desktop-rail {
                background: rgba(7,17,31,0.88);
                border-right: 1px solid var(--border);
            }

            .rail-logo,
            .rail-btn {
                width: 38px;
                height: 38px;
                border-radius: 12px;
                border: none;
                background: transparent;
                color: var(--text);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: inherit;
                font-size: 13px;
                font-weight: 950;
                letter-spacing: -0.3px;
                cursor: pointer;
                position: relative;
                transition: background 0.16s, color 0.16s, transform 0.16s;
            }

            .rail-logo {
                color: var(--primary);
                margin-bottom: 18px;
            }

            .rail-btn:hover,
            .rail-logo:hover {
                background: var(--surface-2);
                color: var(--primary);
            }

            .rail-btn:active,
            .rail-logo:active {
                transform: scale(0.94);
            }

            .rail-sep {
                width: 28px;
                height: 1px;
                background: var(--border);
                margin: 8px 0;
            }

            .rail-spacer {
                flex: 1;
            }

            .rail-user {
                width: 30px;
                height: 30px;
                border-radius: 999px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--primary);
                color: #fff;
                font-size: 11px;
                font-weight: 900;
                margin-top: 8px;
            }

            .rail-btn::after,
            .rail-logo::after {
                content: attr(data-tip);
                position: absolute;
                left: 46px;
                top: 50%;
                transform: translateY(-50%);
                padding: 6px 9px;
                border-radius: 8px;
                background: rgba(15,23,42,0.92);
                color: #fff;
                font-size: 12px;
                font-weight: 800;
                line-height: 1;
                white-space: nowrap;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.14s;
                box-shadow: 0 10px 20px rgba(15,23,42,0.14);
            }

            .rail-btn:hover::after,
            .rail-logo:hover::after {
                opacity: 1;
            }

            #app-root > div:first-child button[onclick="openAppDrawer()"] {
                display: none !important;
            }
        }

        @media (min-width: 1400px) {
            main {
                max-width: 1180px;
                padding-left: 36px;
                padding-right: 36px;
            }
        }

        h1, h2, h3, h4, b, strong {
            color: var(--text);
        }

        /* [Polish] 카드 미니멀리즘: 투명한 테두리 대신 1px 은은한 테두리로 질감 표현 */
                .card {
            background: var(--surface);
            color: var(--text);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: background 0.2s, border 0.2s, box-shadow 0.2s;
        }

                body.dark .card {
            box-shadow: none;
            border: 1px solid var(--border);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 6px;
            min-height: 44px;
            font-family: inherit;
        }

                .btn-primary {
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #ffffff;
            border: none;
            box-shadow: 0 10px 22px rgba(37,99,235,0.20);
        }

        body.dark .btn {
            background: var(--surface-2);
        }

        body.dark .btn-primary {
            background: var(--primary-dark);
            color: #ffffff;
            box-shadow: none; /* 다크모드에서는 버튼 그림자도 제거하여 깔끔하게 */
        }

        .btn-primary:active {
            background: var(--primary-dark);
            transform: scale(0.96);
        }

        .btn:active {
            background: var(--bg);
            transform: scale(0.96);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table td, table th {
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding: 12px 8px;
            font-size: 14px;
            text-align: left;
        }

        th {
            font-size: 12px;
            color: var(--secondary);
            font-weight: 700;
            border-bottom: 1.5px solid var(--border);
        }

        .hidden {
            display: none !important;
        }

        /* [Polish] 모달 오버레이 투명도 및 블러 효과 보정 */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        #modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        #modal-content {
            background: var(--surface);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            overflow: hidden;
            transform: translateY(40px) scale(0.98);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            max-height: 90vh;
            border: 1px solid var(--border); /* 모달에도 테두리 추가하여 분리감 확보 */
        }

        #modal-overlay.show #modal-content {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        #modal-header {
            display: grid;
            grid-template-columns: 64px 1fr 64px;
            align-items: center;
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        #modal-title {
            font-size: 18px;
            font-weight: 950;
            text-align: center;
            color: var(--text);
            margin: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #modal-cancel-btn {
            background: transparent;
            border: none;
            color: var(--secondary);
            font-weight: 800;
            cursor: pointer;
            text-align: left;
            font-size: 15px;
            font-family: inherit;
        }

        #modal-action-btn,
        .modal-top-action {
            background: transparent;
            border: none;
            color: var(--primary);
            font-weight: 900;
            cursor: pointer;
            text-align: right;
            font-size: 15px;
            font-family: inherit;
        }

        #modal-body {
            padding: 20px 24px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }

        #modal-footer {
            padding: 14px 24px calc(18px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            flex-shrink: 0;
            background: var(--surface);
        }

        .toast-container {
            position: fixed;
            bottom: calc(30px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: rgba(25, 31, 40, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #FFFFFF;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            animation: toast-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes toast-in {
            from {
                transform: translateY(30px) scale(0.9);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .omr-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .omr-item {
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--secondary);
        }

        .omr-q {
            width: 26px;
            height: 26px;
            margin-top: 8px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            background: var(--bg);
            padding: 4px;
            border-radius: 14px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 800;
            color: var(--secondary);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--surface);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        body.dark .tab-btn.active {
            box-shadow: none;
            border: 1px solid var(--border);
        }

        @media (max-width: 600px) {
            #modal-content {
                border-radius: 24px 24px 0 0;
                position: fixed;
                bottom: 0;
                max-height: 92vh;
            }

            .omr-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <nav class="desktop-rail" aria-label="AP Math OS 데스크톱 메뉴">
        <button class="rail-logo" data-tip="홈" onclick="if(typeof goHome==='function') goHome(); else if(typeof renderDashboard==='function') renderDashboard();">AP</button>
        <button class="rail-btn" data-tip="홈" onclick="if(typeof renderDashboard==='function') renderDashboard();">홈</button>
        <button class="rail-btn" data-tip="일지" onclick="if(typeof openDailyJournalModal==='function') openDailyJournalModal();">일</button>
        <button class="rail-btn" data-tip="메모" onclick="if(typeof openTodoMemoModal==='function') openTodoMemoModal();">메</button>
        <button class="rail-btn" data-tip="학생관리" onclick="if(typeof openAddressBook==='function') openAddressBook();">학</button>
        <div class="rail-sep"></div>
        <button class="rail-btn" data-tip="출석부" onclick="if(typeof renderAttendanceLedger==='function') renderAttendanceLedger();">출</button>
        <button class="rail-btn" data-tip="시험일정" onclick="if(typeof openExamScheduleModal==='function') openExamScheduleModal();">시</button>
        <button class="rail-btn" data-tip="시험성적" onclick="if(typeof openGlobalExamGradeView==='function') openGlobalExamGradeView();">성</button>
        <button class="rail-btn" data-tip="클리닉" onclick="if(typeof openClinicBasket==='function') openClinicBasket(); else if(typeof toast==='function') toast('클리닉 기능을 불러오지 못했습니다.', 'warn');">클</button>
        <div class="rail-sep"></div>
        <button class="rail-btn" data-tip="운영메뉴" onclick="if(typeof openOperationMenu==='function') openOperationMenu();">운</button>
        <div class="rail-spacer"></div>
        <button class="rail-btn" data-tip="다크모드" onclick="if(typeof toggleThemeLegacy==='function') toggleThemeLegacy();">다</button>
        <button class="rail-btn" data-tip="로그아웃" onclick="if(typeof logout==='function') logout();">나</button>
        <div class="rail-user">AP</div>
    </nav>

    <header>
        <div class="header-inner">
            <div class="brand" onclick="goHome()">
                <div class="brand-text">AP MATH</div>
            </div>
        </div>
    </header>

    <main id="app-root"></main>

    <div id="modal-overlay" class="hidden" onclick="if(event.target===this) closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()">
            <div id="modal-header">
                <button id="modal-cancel-btn" onclick="closeModal()">취소</button>
                <h2 id="modal-title"></h2>
                <button id="modal-action-btn" class="modal-top-action hidden"></button>
            </div>
            <div id="modal-body"></div>
            <div id="modal-footer" class="hidden"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/core.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/report.js"></script>
    <script src="js/qr-omr.js"></script>
    <script src="js/student.js"></script>
    <script src="js/classroom.js"></script>
    <script src="app.js"></script>
</body>
</html>
