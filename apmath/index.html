<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AP Math OS 1.0</title>
    <style>
        :root {
            /* 라이트 모드 확정값 */
            --primary: #1A5CFF;
            --primary-dark: #0040D6;
            --secondary: #6B7684;
            --success: #00B894;
            --error: #E8414F;
            --warning: #F59F00;

            --bg: #F2F4F6;
            --surface: #FFFFFF;
            --surface-2: #F8FAFC;
            --surface-alpha: rgba(255,255,255,0.88);
            --border: #E5E8EB;
            --shadow: 0 2px 12px rgba(0,0,0,0.04);

            --text: #191F28;
            --text-soft: #333D4B;
        }

        body.dark {
            /* 다크 모드 확정값 */
            --primary: #5C8AFF;
            --primary-dark: #3F6FEA;
            --secondary: #A3B1C6;
            --success: #22D98F;
            --error: #FF6B7A;
            --warning: #FFB84D;

            --bg: #10141D;
            --surface: #1E2432;
            --surface-2: #252C3A;
            --surface-alpha: rgba(30,36,50,0.88);
            --border: #2C3444;
            --shadow: 0 4px 18px rgba(0,0,0,0.45);

            --text: #F2F4F6;
            --text-soft: #A3B1C6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; transition: background 0.2s, color 0.2s; }

        header {
            position: sticky; top: 0; z-index: 100;
            background: var(--surface-alpha);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand { display: flex; align-items: baseline; gap: 8px; }
        .brand-text { font-size: 20px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; cursor: pointer; }
        .tag { font-size: 10px; background: var(--primary); color: #ffffff; padding: 3px 8px; border-radius: 20px; font-weight: 800; }

        nav { display: flex; gap: 8px; align-items: center; }
        nav .btn { background: var(--bg); color: var(--text); border: none; font-size: 13px; padding: 6px 12px; font-weight: 700; }

        main { max-width: 600px; margin: 0 auto; padding: 16px 14px calc(100px + env(safe-area-inset-bottom)); }

        /* 공통 품질 보정 CSS */
        h1, h2, h3, h4, b, strong { color: var(--text); }

        .card { 
            background: var(--surface); 
            color: var(--text);
            border-radius: 18px; 
            padding: 16px; 
            margin-bottom: 12px; 
            box-shadow: var(--shadow);
            border: 1px solid transparent;
        }
        body.dark .card { border: 1px solid var(--border); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); font-size: 14px; font-weight: 700;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); gap: 6px;
        }
        .btn-primary { background: var(--primary); color: #ffffff; border: none; box-shadow: 0 4px 12px rgba(26,92,255,0.25); }
        
        body.dark .btn { background: var(--surface-2); }
        body.dark .btn-primary { background: var(--primary-dark); color: #ffffff; }

        table td, table th { color: var(--text); border-bottom: 1px solid var(--border); }
        
        #modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000;
            display: flex; align-items: center; justify-content: center; padding: 16px;
            opacity: 0; visibility: hidden; transition: opacity 0.25s ease;
        }
        #modal-overlay.show { opacity: 1; visibility: visible; }

        #modal-content {
            background: var(--surface); width: 100%; max-width: 500px; border-radius: 24px;
            overflow: hidden; transform: translateY(40px); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #modal-overlay.show #modal-content { transform: translateY(0); }

        #modal-header {
            display: grid; grid-template-columns: 64px 1fr 64px; align-items: center;
            padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
        }
        #modal-title { font-size: 18px; font-weight: 900; text-align: center; color: var(--text); margin: 0; }
        #modal-cancel-btn { background: transparent; border: none; color: var(--secondary); font-weight: 800; cursor: pointer; }
        #modal-action-btn { background: transparent; border: none; color: var(--primary); font-weight: 900; cursor: pointer; text-align: right; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <header>
        <div class="brand" onclick="goHome()">
            <div class="brand-text">AP MATH</div>
            <div class="tag">1.0</div>
        </div>
        <nav>
            <button id="theme-toggle-btn" class="btn" onclick="toggleTheme()" style="min-height:32px; padding:6px 12px; font-size:13px; border-radius:12px; background:transparent;">다크 모드</button>
            <button class="btn" onclick="toggleScope()"><span id="scope-text">내 담당</span></button>
        </nav>
    </header>
    <main id="app-root"></main>
    <div id="modal-overlay" class="hidden" onclick="if(event.target===this) closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()">
            <div id="modal-header">
                <button id="modal-cancel-btn" onclick="closeModal()">취소</button>
                <h2 id="modal-title"></h2>
                <button id="modal-action-btn" class="modal-top-action hidden"></button>
            </div>
            <div id="modal-body" style="padding:20px 24px; overflow-y:auto; max-height:80vh;"></div>
        </div>
    </div>
    <div id="toast-container" class="toast-container" style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:2000;"></div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/core.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/report.js"></script>
    <script src="js/qr-omr.js"></script>
    <script src="js/student.js"></script>
    <script src="js/classroom.js"></script>
    <script src="app.js"></script>
</body>
</html>
