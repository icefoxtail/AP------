<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AP Math OS</title>
    <style>
        /* =========================================
           [Polish] Light Mode Palette (미니멀리즘)
           ========================================= */
        :root {
            --primary: #1A5CFF;
            --primary-dark: #0040D6;
            --secondary: #6B7684;
            --success: #00B894;
            --error: #E8414F;
            --warning: #F59F00;

            --bg: #F2F4F6;
            --surface: #FFFFFF;
            --surface-2: #F8FAFC;
            --surface-alpha: rgba(255,255,255,0.88);
            --border: #E5E8EB;
            /* 그림자 힘 빼기: 기존 0.04보다 더 부드럽고 가볍게 */
            --shadow: 0 2px 8px rgba(0,0,0,0.03);

            --text: #191F28;
            --text-soft: #333D4B;
        }

        /* =========================================
           [Polish] Dark Mode Palette (Grok's Soft Dark)
           ========================================= */
        body.dark {
            --primary: #0A84FF;      /* iOS Dark Blue */
            --primary-dark: #0070E0;
            --secondary: #6E6E73;    /* 차분한 보조 텍스트 */
            --success: #30D158;      /* iOS Dark Green */
            --error: #FF453A;        /* iOS Dark Red */
            --warning: #FF9F0A;      /* iOS Dark Orange */

            --bg: #121212;           /* Pure Black 탈출 -> 눈이 편안한 메인 배경 */
            --surface: #1A1A1C;      /* 카드, 모달 등 주 컨테이너 */
            --surface-2: #242427;    /* 입력창, 사이드바 등 보조 배경 */
            --surface-alpha: rgba(26,26,28,0.88);
            --border: #323238;       /* 은은하고 고급스러운 테두리 */
            
            /* 다크모드에서는 그림자 대신 테두리에 의존하여 미니멀리즘 극대화 */
            --shadow: 0 4px 14px rgba(0,0,0,0.15); 

            --text: #F5F5F7;         /* 너무 쨍하지 않은 화이트 */
            --text-soft: #A8A8AC;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background 0.2s, color 0.2s;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surface-alpha);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            display: grid;
            grid-template-columns: 88px minmax(0, 1fr) 88px;
            align-items: center;
            height: 58px;
            min-height: 58px;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            min-width: 0;
            height: 40px;
        }

        .brand-text {
            font-size: 20px;
            font-weight:700;
            color: var(--text);
            letter-spacing: 0;
            white-space: nowrap;
            line-height: 1.25;
        }

        .mobile-header-menu {
            justify-self: start;
            width: 36px;
            height: 36px;
            margin: 0;
            padding: 0;
            border: 0;
            border-radius: 12px;
            background: transparent;
            color: var(--text);
            font-size: 20px;
            font-weight:700;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: inherit;
        }

        .mobile-header-menu:active {
            background: var(--bg);
            transform: scale(0.96);
        }

        .mobile-header-brand {
            justify-self: center;
            min-width: 0;
        }

        .mobile-header-user {
            justify-self: end;
            width: 88px;
            max-width: 88px;
            margin: 0;
            padding: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
            font-weight:700;
            color: var(--text);
            text-align: right;
            letter-spacing: 0;
            line-height: 40px;
        }

        nav {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        main {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 14px calc(100px + env(safe-area-inset-bottom));
        }

        .desktop-topbar {
            display: none;
            position: fixed;
            top: 0;
            left: 56px;
            right: 0;
            height: 58px;
            z-index: 80;
            align-items: center;
            padding: 0 24px;
            background: var(--surface-alpha);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: left 0.24s ease, background 0.2s, border 0.2s;
        }

        .desktop-topbar-title {
            font-size: 18px;
            font-weight:700;
            letter-spacing: -0.35px;
            color: var(--text);
            cursor: pointer;
            user-select: none;
        }

        .ap-internal-header-hidden {
            display: none !important;
        }

        @media (min-width: 901px) {
            body {
                padding-left: 56px;
                transition: padding-left 0.24s ease;
            }

            body.ap-drawer-expanded {
                padding-left: 260px;
            }

            header {
                display: none;
            }

            .desktop-topbar {
                display: flex;
            }

            body.ap-drawer-expanded .desktop-topbar {
                left: 260px;
            }

            main {
                max-width: 1180px;
                padding: 76px 36px 80px;
            }
        }

        @media (min-width: 1400px) {
            main {
                max-width: 1240px;
                padding-left: 40px;
                padding-right: 40px;
            }
        }

        h1, h2, h3, h4, b, strong {
            color: var(--text);
        }

        /* [Polish] 카드 미니멀리즘: 투명한 테두리 대신 1px 은은한 테두리로 질감 표현 */
        .card {
            background: var(--surface);
            color: var(--text);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border); 
            transition: background 0.2s, border 0.2s;
        }

        body.dark .card {
            box-shadow: none; /* 다크모드에서는 무거운 그림자를 완전히 뺍니다 */
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            min-height: 44px;
            line-height: 1.2;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 6px;
            min-height: 44px;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: #ffffff;
            border: none;
            box-shadow: 0 4px 12px rgba(26,92,255,0.25);
        }

        body.dark .btn {
            background: var(--surface-2);
        }

        body.dark .btn-primary {
            background: var(--primary-dark);
            color: #ffffff;
            box-shadow: none; /* 다크모드에서는 버튼 그림자도 제거하여 깔끔하게 */
        }

        .btn-primary:active {
            background: var(--primary-dark);
            transform: scale(0.96);
        }

        .btn:active {
            background: var(--bg);
            transform: scale(0.96);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table td, table th {
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding: 12px 8px;
            font-size: 14px;
            text-align: left;
        }

        th {
            font-size: 12px;
            color: var(--secondary);
            font-weight: 700;
            border-bottom: 1.5px solid var(--border);
        }

        .hidden {
            display: none !important;
        }

        /* [Polish] 모달 오버레이 투명도 및 블러 효과 보정 */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        #modal-overlay:not(.show) {
            pointer-events: none;
        }

        #modal-overlay.show {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        #modal-content {
            background: var(--surface);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            overflow: hidden;
            transform: translateY(40px) scale(0.98);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            max-height: 90vh;
            border: 1px solid var(--border); /* 모달에도 테두리 추가하여 분리감 확보 */
        }

        #modal-overlay.show #modal-content {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        #modal-header {
            display: grid;
            grid-template-columns: 64px 1fr 64px;
            align-items: center;
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        #modal-title {
            font-size: 20px;
            font-weight:700;
            line-height: 1.25;
            text-align: center;
            color: var(--text);
            margin: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #modal-cancel-btn {
            background: transparent;
            border: none;
            color: var(--secondary);
            font-weight:700;
            cursor: pointer;
            text-align: left;
            font-size: 15px;
            font-family: inherit;
        }

        #modal-action-btn,
        .modal-top-action {
            background: transparent;
            border: none;
            color: var(--primary);
            font-weight:700;
            cursor: pointer;
            text-align: right;
            font-size: 15px;
            font-family: inherit;
        }

        #modal-body {
            padding: 20px 24px;
            overflow-y: auto;
            overflow-x: hidden;
            flex: 1;
            min-height: 0;
        }

        #modal-footer {
            padding: 14px 24px calc(18px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            flex-shrink: 0;
            background: var(--surface);
        }

        .toast-container {
            position: fixed;
            bottom: calc(30px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: rgba(25, 31, 40, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #FFFFFF;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            animation: toast-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .toast.info { background: rgba(25, 31, 40, 0.92); }
        .toast.success { background: rgba(0, 184, 148, 0.94); }
        .toast.warn { background: rgba(245, 159, 0, 0.94); }
        .toast.error { background: rgba(232, 65, 79, 0.94); }

        @keyframes toast-in {
            from {
                transform: translateY(30px) scale(0.9);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .omr-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .omr-item {
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--secondary);
        }

        .omr-q {
            width: 26px;
            height: 26px;
            margin-top: 8px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            background: var(--bg);
            padding: 4px;
            border-radius: 14px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight:700;
            color: var(--secondary);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--surface);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        body.dark .tab-btn.active {
            box-shadow: none;
            border: 1px solid var(--border);
        }

        input.btn,
        select.btn,
        textarea.btn,
        .std-input-base,
        .cls-input {
            width: 100%;
            min-height: 48px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
        }

        textarea.btn,
        textarea.std-input-base,
        textarea.cls-input {
            font-weight: 400;
            line-height: 1.7;
            resize: vertical;
        }

        .ap-ui-row {
            display: flex;
            gap: 10px;
            width: 100%;
            min-width: 0;
        }

        .ap-ui-row > * {
            min-width: 0;
        }

        .ap-small-btn {
            min-height: 36px !important;
            border-radius: 10px !important;
            font-size: 12px !important;
            font-weight: 600 !important;
            padding: 8px 12px !important;
        }

        .ap-mid-btn {
            min-height: 44px !important;
            border-radius: 12px !important;
            font-size: 13px !important;
            font-weight: 700 !important;
        }

        .ap-primary-btn {
            width: 100%;
            min-height: 48px !important;
            border-radius: 14px !important;
            font-size: 14px !important;
            font-weight: 700 !important;
        }

        @media (max-width: 600px) {
            #modal-content {
                width: 100vw;
                max-width: 100vw;
                border-radius: 20px 20px 0 0;
                position: fixed;
                bottom: 0;
                max-height: calc(92vh - env(safe-area-inset-top));
            }

            #modal-header {
                grid-template-columns: 56px minmax(0, 1fr) 56px;
                padding: 16px 16px 12px;
            }

            #modal-body {
                padding: 16px;
            }

            #modal-footer {
                padding: 12px 16px calc(16px + env(safe-area-inset-bottom));
            }

            .ap-ui-row {
                flex-direction: column;
            }

            .ap-ui-row input,
            .ap-ui-row select,
            .ap-ui-row textarea,
            .ap-ui-row button {
                width: 100%;
            }

            .omr-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <header>
        <button class="mobile-header-menu" onclick="openAppDrawer()" aria-label="메뉴 열기" title="메뉴"><span class="ap-hamburger-glyph">☰</span></button>
        <div class="brand mobile-header-brand" onclick="goHome()">
            <div class="brand-text">AP MATH</div>
        </div>
        <div class="mobile-header-user" id="mobile-header-user" aria-label="사용자"></div>
    </header>

    <div class="desktop-topbar" aria-hidden="false">
        <div class="desktop-topbar-title" onclick="goHome()">AP MATH</div>
    </div>

    <main id="app-root"></main>

    <div id="modal-overlay" class="hidden" onclick="if(event.target===this) closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()">
            <div id="modal-header">
                <button id="modal-cancel-btn" onclick="closeModal()">취소</button>
                <h2 id="modal-title"></h2>
                <button id="modal-action-btn" class="modal-top-action hidden"></button>
            </div>
            <div id="modal-body"></div>
            <div id="modal-footer" class="hidden"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/core.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/report.js"></script>
    <script src="js/qr-omr.js"></script>
    <script src="js/student.js"></script>
    <script src="js/classroom.js"></script>
    <script src="js/management.js"></script>
    <script src="js/textbook.js"></script>
    <script src="js/memo.js"></script>
    <script src="js/schedule.js"></script>
    <script src="js/cumulative.js"></script>
    <script src="js/timetable.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="app.js"></script>
</body>
</html>
