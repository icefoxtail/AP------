<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>AP Math OS | 과제 제출</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root {
      --primary:#1A5CFF;
      --success:#00B894;
      --error:#E8414F;
      --warning:#FFA502;
      --bg:#F2F4F6;
      --surface:#FFFFFF;
      --surface-2:#F8FAFC;
      --border:#E5E8EB;
      --text:#191F28;
      --text-soft:#4E5968;
      --secondary:#6B7684;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; outline:none; }
    html { min-height:100%; background:var(--bg); }
    body {
      margin:0;
      min-height:100vh;
      min-height:100dvh;
      font-family:Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at 18% -8%, rgba(26,92,255,0.12) 0, rgba(26,92,255,0.04) 34%, transparent 58%),
        linear-gradient(180deg, #F8FAFC 0%, var(--bg) 52%, #EEF2F7 100%);
      color:var(--text);
      line-height:1.5;
      word-break:keep-all;
    }
    button, input { font-family:inherit; }
    button { cursor:pointer; }
    .top {
      position:sticky;
      top:0;
      z-index:20;
      min-height:58px;
      padding:0 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:rgba(248,250,252,0.92);
      border-bottom:1px solid rgba(229,232,235,0.82);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }
    .brand { display:flex; flex-direction:column; gap:1px; min-width:0; }
    .brand-main { font-size:17px; font-weight:700; color:var(--text); letter-spacing:-0.35px; line-height:1.2; }
    .brand-sub { font-size:11px; font-weight:700; color:var(--secondary); letter-spacing:-0.1px; line-height:1.2; }
    .chip {
      min-width:0;
      max-width:48%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:12px;
      font-weight:700;
      color:var(--primary);
      text-align:right;
      background:rgba(26,92,255,0.08);
      border:1px solid rgba(26,92,255,0.14);
      border-radius:999px;
      padding:6px 10px;
    }
    .chip:empty { display:none; }
    .app { width:100%; max-width:520px; margin:0 auto; padding:18px 14px calc(30px + env(safe-area-inset-bottom)); }
    .hero {
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:6px 2px 16px;
    }
    .hero-kicker { font-size:12px; font-weight:700; color:var(--primary); line-height:1.4; }
    .hero-title { margin:0; font-size:25px; font-weight:700; letter-spacing:-0.8px; line-height:1.18; color:var(--text); }
    .hero-desc { margin:0; font-size:13px; font-weight:700; color:var(--secondary); line-height:1.55; }

    .visual-wrap {
      position:relative;
      min-height:150px;
      margin:2px 0 8px;
      border-radius:28px;
      overflow:hidden;
      background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,0.95) 0, rgba(255,255,255,0.50) 16%, transparent 34%),
        linear-gradient(135deg, rgba(26,92,255,0.12) 0%, rgba(124,58,237,0.10) 52%, rgba(0,184,148,0.12) 100%);
      border:1px solid rgba(229,232,235,0.86);
      box-shadow:0 12px 32px rgba(25,31,40,0.045);
    }
    .visual-orb {
      position:absolute;
      border-radius:999px;
      opacity:.86;
      pointer-events:none;
    }
    .visual-orb.one { width:82px; height:82px; right:-18px; top:-20px; background:rgba(26,92,255,0.15); }
    .visual-orb.two { width:58px; height:58px; left:22px; bottom:-20px; background:rgba(0,184,148,0.16); }
    .visual-orb.three { width:22px; height:22px; right:96px; bottom:22px; background:rgba(255,165,2,0.22); }
    .visual-book {
      position:absolute;
      left:50%;
      top:50%;
      width:176px;
      height:100px;
      transform:translate(-50%, -48%) rotate(-2deg);
      border-radius:24px;
      background:#fff;
      border:1px solid rgba(229,232,235,0.95);
      box-shadow:0 20px 46px rgba(25,31,40,0.10);
    }
    .visual-book:before {
      content:'';
      position:absolute;
      left:50%;
      top:14px;
      bottom:14px;
      width:1px;
      background:rgba(229,232,235,0.95);
    }
    .visual-line {
      position:absolute;
      left:22px;
      height:7px;
      border-radius:999px;
      background:#E5E8EB;
    }
    .visual-line.a { top:26px; width:52px; }
    .visual-line.b { top:44px; width:38px; }
    .visual-line.c { top:62px; width:56px; }
    .visual-line.d { top:26px; left:104px; width:46px; }
    .visual-line.e { top:44px; left:104px; width:34px; }
    .visual-check {
      position:absolute;
      right:22px;
      bottom:18px;
      width:42px;
      height:42px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#00B894 0%,#12C99B 100%);
      color:#fff;
      font-size:25px;
      font-weight:700;
      box-shadow:0 12px 24px rgba(0,184,148,0.24);
    }
    .visual-pencil {
      position:absolute;
      left:calc(50% - 112px);
      top:38px;
      width:62px;
      height:14px;
      border-radius:999px;
      background:linear-gradient(90deg,#FFA502 0%,#FFA502 72%,#F8D9A6 72%,#F8D9A6 100%);
      transform:rotate(-24deg);
      box-shadow:0 10px 22px rgba(255,165,2,0.20);
    }
    .visual-pencil:after {
      content:'';
      position:absolute;
      right:-10px;
      top:1px;
      border-left:12px solid #4E5968;
      border-top:6px solid transparent;
      border-bottom:6px solid transparent;
    }
    .card {
      background:rgba(255,255,255,0.96);
      border:1px solid rgba(229,232,235,0.92);
      border-radius:22px;
      padding:18px;
      box-shadow:0 8px 26px rgba(25,31,40,0.045);
      margin-bottom:14px;
    }
    .title { margin:0; font-size:21px; font-weight:700; line-height:1.25; letter-spacing:-0.45px; color:var(--text); }
    .meta { margin-top:9px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; font-size:12px; font-weight:700; color:var(--secondary); }
    .meta-pill { display:inline-flex; align-items:center; min-height:26px; padding:4px 9px; border-radius:999px; background:var(--surface-2); border:1px solid var(--border); color:var(--text-soft); }
    .meta-pill.primary { color:var(--primary); background:rgba(26,92,255,0.07); border-color:rgba(26,92,255,0.14); }
    .desc {
      margin-top:15px;
      padding:14px;
      border-radius:16px;
      background:var(--surface-2);
      border:1px solid rgba(229,232,235,0.72);
      color:var(--text);
      font-size:14px;
      font-weight:700;
      line-height:1.65;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .input {
      width:100%;
      min-height:52px;
      border:1px solid var(--border);
      border-radius:16px;
      background:var(--surface);
      color:var(--text);
      padding:13px 15px;
      font-size:16px;
      font-weight:700;
      box-shadow:none;
    }
    .input::placeholder { color:#A0A8B2; }
    .btn {
      width:100%;
      min-height:52px;
      border:1px solid var(--border);
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      font-size:15px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:transform .12s ease, opacity .12s ease, background .12s ease;
    }
    .btn-primary { background:linear-gradient(135deg,#1A5CFF 0%,#4F46E5 100%); color:#fff; border:none; box-shadow:0 12px 24px rgba(26,92,255,0.22); }
    .btn:active { transform:scale(0.99); }
    .btn[disabled] { opacity:.58; pointer-events:none; }
    .stack { display:flex; flex-direction:column; gap:11px; }
    .notice {
      font-size:13px;
      font-weight:700;
      color:var(--secondary);
      line-height:1.58;
      padding:12px 13px;
      background:var(--surface-2);
      border:1px solid rgba(229,232,235,0.72);
      border-radius:16px;
    }
    .notice strong { color:var(--text); font-weight:700; }
    .done-mark {
      width:62px;
      height:62px;
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,184,148,0.12);
      color:var(--success);
      font-size:31px;
      font-weight:700;
      margin-bottom:14px;
      border:1px solid rgba(0,184,148,0.18);
    }
    .status-box {
      margin-top:15px;
      padding:14px;
      border-radius:16px;
      background:rgba(0,184,148,0.08);
      border:1px solid rgba(0,184,148,0.16);
      color:var(--text);
      font-size:13px;
      font-weight:700;
      line-height:1.6;
    }
    .footer-note {
      padding:2px 4px 0;
      font-size:11px;
      font-weight:700;
      color:var(--secondary);
      text-align:center;
      line-height:1.5;
    }
    .toast {
      position:fixed;
      left:50%;
      bottom:calc(24px + env(safe-area-inset-bottom));
      transform:translateX(-50%);
      background:#191F28;
      color:#fff;
      padding:11px 15px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
      z-index:100;
      white-space:nowrap;
      box-shadow:0 10px 28px rgba(25,31,40,0.18);
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(-4px); }
    @media (max-width:380px) {
      .app { padding-left:12px; padding-right:12px; }
      .card { padding:16px; border-radius:20px; }
      .hero-title { font-size:23px; }
      .title { font-size:20px; }
    }
  </style>
    <link rel="stylesheet" href="../css/apms-theme-override.css">
</head>
<body>
  <header class="top">
    <div class="brand">
      <div class="brand-main">AP Math OS</div>
      <div class="brand-sub">과제 제출</div>
    </div>
    <div id="student-chip" class="chip"></div>
  </header>
  <main id="app" class="app"></main>
  <div id="toast" class="toast"></div>

  <script>
    const API_BASE = 'https://ap-math-os-v2612.js-pdf.workers.dev/api';
    const params = new URLSearchParams(location.search);
    const assignmentId = String(params.get('assignment_id') || '').trim();
    const studentId = String(params.get('student_id') || '').trim();

    let pin = '';
    let assignment = null;
    let student = null;
    let submission = null;
    let isSubmitting = false;
    let selectedFiles = [];

    function $(id) { return document.getElementById(id); }
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
    }
    function toast(message) {
      const el = $('toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
    }
    function getStudentErrorMessage(error) {
      const raw = String(error?.message || error || '').trim();
      if (!raw) return '요청을 처리하지 못했습니다. 잠시 후 다시 시도해 주세요.';
      if (raw === 'r2_not_configured') return '사진 저장 준비가 아직 완료되지 않았습니다. 선생님께 말씀해주세요.';
      if (raw === 'PIN mismatch') return 'PIN이 일치하지 않습니다.';
      if (raw === 'Not found') return '숙제 정보를 찾을 수 없습니다.';
      if (raw === 'already_submitted') return '이미 제출이 완료되었습니다.';
      if (raw === 'assignment_closed') return '마감된 숙제입니다.';
      if (raw === 'assignment_deleted') return '삭제된 숙제입니다.';
      if (raw === 'files_required') return '사진 파일을 선택해 주세요.';
      if (raw === 'too_many_files') return '사진은 최대 3장까지 업로드할 수 있습니다.';
      if (raw === 'invalid_file_type') return '이미지 파일만 업로드할 수 있습니다.';
      if (raw === 'invalid_file_size') return '비어 있는 파일은 업로드할 수 없습니다.';
      if (raw === 'file_too_large') return '파일당 최대 6MB까지 업로드할 수 있습니다.';
      if (raw === 'total_size_exceeded') return '전체 파일 용량은 최대 18MB까지 업로드할 수 있습니다.';
      if (raw === 'upload_failed') return '사진 업로드 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
      return raw;
    }
    function authKey() { return `homework_photo_pin_${assignmentId}_${studentId}`; }
    async function apiGet(path) {
      const r = await fetch(`${API_BASE}/${path}`, { headers: { 'Content-Type': 'application/json' } });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || data.success === false) throw new Error(data.error || data.message || '요청 실패');
      return data;
    }
    async function apiPost(path, body) {
      const r = await fetch(`${API_BASE}/${path}`, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify(body || {})
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || data.success === false) throw new Error(data.error || data.message || '요청 실패');
      return data;
    }
    async function apiUpload(path, formData) {
      const r = await fetch(`${API_BASE}/${path}`, { method:'POST', body: formData });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || data.success === false) throw new Error(data.message || data.error || '업로드 실패');
      return data;
    }
    function renderHero() {
      return `
        <section class="hero">
          <div class="visual-wrap" aria-hidden="true">
            <span class="visual-orb one"></span>
            <span class="visual-orb two"></span>
            <span class="visual-orb three"></span>
            <span class="visual-pencil"></span>
            <div class="visual-book">
              <span class="visual-line a"></span>
              <span class="visual-line b"></span>
              <span class="visual-line c"></span>
              <span class="visual-line d"></span>
              <span class="visual-line e"></span>
              <span class="visual-check">✓</span>
            </div>
          </div>
          <div class="hero-kicker">AP수학 과제 확인</div>
          <h1 class="hero-title">숙제 사진을<br>제출해 주세요.</h1>
          <p class="hero-desc">PIN으로 본인 확인 후 사진을 올리면 선생님 클래스룸에서 바로 확인할 수 있어요.</p>
        </section>
      `;
    }
    function renderError(message) {
      $('student-chip').textContent = '';
      $('app').innerHTML = `
        ${renderHero()}
        <section class="card">
          <h1 class="title">접속 오류</h1>
          <div class="desc">${escapeHtml(message)}</div>
        </section>
        <div class="footer-note">링크가 계속 열리지 않으면 선생님께 다시 받아 주세요.</div>
      `;
    }
    function renderAssignmentCard() {
      if (!assignment) return '';
      const due = `${assignment.due_date || ''}${assignment.due_time ? ` ${assignment.due_time}` : ''}`.trim();
      return `
        <section class="card">
          <h1 class="title">${escapeHtml(assignment.title || '숙제')}</h1>
          <div class="meta">
            ${assignment.class_name ? `<span class="meta-pill">${escapeHtml(assignment.class_name)}</span>` : ''}
            ${due ? `<span class="meta-pill primary">마감 ${escapeHtml(due)}</span>` : ''}
          </div>
          ${assignment.description ? `<div class="desc">${escapeHtml(assignment.description)}</div>` : ''}
        </section>
      `;
    }
    function renderPinGate() {
      $('student-chip').textContent = student?.name || '';
      $('app').innerHTML = `
        ${renderHero()}
        ${renderAssignmentCard()}
        <section class="card">
          <div class="stack">
            <div class="notice"><strong>숙제 사진 제출</strong><br>PIN 번호를 입력하면 숙제 사진을 제출할 수 있어요.</div>
            <input id="pin-input" class="input" type="password" inputmode="numeric" autocomplete="current-password" placeholder="개인 PIN 입력" onkeydown="if(event.key==='Enter')verifyPin(false)">
            <button class="btn btn-primary" onclick="verifyPin(false)">확인</button>
          </div>
        </section>
      `;
      setTimeout(() => $('pin-input')?.focus(), 80);
    }
    function formatBytes(size) {
      const value = Number(size || 0);
      if (!Number.isFinite(value) || value <= 0) return '0B';
      if (value < 1024) return `${value}B`;
      if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)}KB`;
      return `${(value / (1024 * 1024)).toFixed(2)}MB`;
    }
    function renderSelectedFiles() {
      if (!selectedFiles.length) return `<div class="notice">사진은 최대 3장까지 올릴 수 있어요.</div>`;
      return `
        <div class="stack">
          ${selectedFiles.map((file, index) => `
            <div class="notice" style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
              <div style="min-width:0;">
                <div style="font-size:13px; font-weight:700; color:var(--text); overflow-wrap:anywhere;">${escapeHtml(file.name || `사진 ${index + 1}`)}</div>
                <div style="font-size:11px; font-weight:700; color:var(--secondary); margin-top:3px;">${escapeHtml(file.type || 'image')} · ${formatBytes(file.size)}</div>
              </div>
              <button class="btn" style="width:auto; min-height:36px; padding:0 12px; font-size:12px; border-color:rgba(232,65,79,0.16); color:var(--error); background:rgba(232,65,79,0.08);" onclick="removeSelectedFile(${index})">삭제</button>
            </div>
          `).join('')}
        </div>
      `;
    }
    function renderUploadGuide() {
      return `
        <div class="notice">
          <strong>제출 전 확인</strong><br>
          사진은 최대 3장까지 올릴 수 있어요.<br>
          이미지 파일만 제출할 수 있고, 파일당 최대 6MB까지 가능합니다.
        </div>
      `;
    }
    function renderSubmit() {
      $('student-chip').textContent = student?.name || '';
      if (Number(submission?.is_submitted || 0) === 1) {
        renderDone(submission?.submitted_at);
        return;
      }
      const isClosed = String(assignment?.status || '').trim() === 'closed';
      $('app').innerHTML = `
        ${renderHero()}
        ${renderAssignmentCard()}
        <section class="card">
          <div class="stack">
            ${isClosed ? `<div class="notice"><strong>마감 안내</strong><br>마감된 숙제입니다.</div>` : renderUploadGuide()}
            ${isClosed ? '' : `
              <input id="photo-input" class="input" type="file" accept="image/jpeg,image/png,image/webp,image/gif,image/heic,image/heif" multiple onchange="handleFileChange(event)">
              <div id="file-list">${renderSelectedFiles()}</div>
              <button id="submit-btn" class="btn btn-primary" onclick="submitHomeworkPhotos()">제출하기</button>
            `}
          </div>
        </section>
        <div class="footer-note">제출 완료 후에는 선생님이 다시 제출 요청을 열어준 경우에만 다시 제출할 수 있어요.</div>
      `;
    }
    function renderDone(submittedAt) {
      $('student-chip').textContent = student?.name || '';
      $('app').innerHTML = `
        ${renderHero()}
        ${renderAssignmentCard()}
        <section class="card">
          <div class="done-mark">✓</div>
          <h1 class="title">제출 완료</h1>
          <div class="meta">${escapeHtml(submittedAt || '방금 제출됨')}</div>
          <div class="status-box">선생님이 숙제 사진을 확인할 수 있어요.</div>
        </section>
      `;
    }
    function updateFileList() {
      const list = $('file-list');
      if (list) list.innerHTML = renderSelectedFiles();
    }
    function removeSelectedFile(index) {
      selectedFiles = selectedFiles.filter((_, i) => i !== index);
      updateFileList();
    }
    async function compressImageFile(file) {
      const fileType = String(file.type || '').toLowerCase();
      if (!fileType.startsWith('image/') || fileType === 'image/gif' || fileType === 'image/heic' || fileType === 'image/heif') {
        return file;
      }
      try {
        const bitmap = await createImageBitmap(file);
        const maxSide = 1600;
        const ratio = Math.min(1, maxSide / Math.max(bitmap.width, bitmap.height));
        const width = Math.max(1, Math.round(bitmap.width * ratio));
        const height = Math.max(1, Math.round(bitmap.height * ratio));
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        if (!ctx) return file;
        ctx.drawImage(bitmap, 0, 0, width, height);
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.82));
        bitmap.close?.();
        if (!blob) return file;
        const nextName = String(file.name || 'photo').replace(/\.[a-z0-9]+$/i, '') + '.jpg';
        return new File([blob], nextName, { type: 'image/jpeg' });
      } catch (e) {
        return file;
      }
    }
    async function handleFileChange(event) {
      const files = Array.from(event?.target?.files || []);
      if (!files.length) {
        selectedFiles = [];
        updateFileList();
        return;
      }
      if (files.length > 3) {
        toast('사진은 최대 3장까지 올릴 수 있어요.');
        event.target.value = '';
        return;
      }
      const normalized = [];
      for (const file of files) {
        if (!String(file.type || '').toLowerCase().startsWith('image/')) {
          toast('이미지 파일만 제출할 수 있어요.');
          event.target.value = '';
          return;
        }
        const compressed = await compressImageFile(file);
        if (Number(compressed.size || 0) > 6 * 1024 * 1024) {
          toast('파일당 최대 6MB까지 업로드할 수 있어요.');
          event.target.value = '';
          return;
        }
        normalized.push(compressed);
      }
      const totalSize = normalized.reduce((sum, file) => sum + Number(file.size || 0), 0);
      if (totalSize > 18 * 1024 * 1024) {
        toast('전체 파일 용량은 최대 18MB까지 가능해요.');
        event.target.value = '';
        return;
      }
      selectedFiles = normalized;
      updateFileList();
    }
    async function loadAssignment() {
      if (!assignmentId || !studentId) {
        renderError('숙제 링크가 올바르지 않습니다.');
        return;
      }
      try {
        const data = await apiGet(`homework-photo/assignment?assignment_id=${encodeURIComponent(assignmentId)}&student_id=${encodeURIComponent(studentId)}`);
        assignment = data.assignment;
        student = data.student;
        submission = data.submission;
        const savedPin = localStorage.getItem(authKey());
        if (savedPin) {
          pin = savedPin;
          try {
            await verifyPin(true);
            return;
          } catch (e) {
            localStorage.removeItem(authKey());
          }
        }
        renderPinGate();
      } catch (e) {
        renderError(e.message || '과제 정보를 불러오지 못했습니다.');
      }
    }
    async function verifyPin(fromStorage) {
      if (!fromStorage) pin = String($('pin-input')?.value || '').trim();
      if (!pin) {
        toast('PIN을 입력하세요.');
        return;
      }
      try {
        await apiPost('homework-photo/auth', { assignment_id: assignmentId, student_id: studentId, pin });
        localStorage.setItem(authKey(), pin);
        renderSubmit();
      } catch (e) {
        localStorage.removeItem(authKey());
        if (!fromStorage) toast(getStudentErrorMessage(e));
        else throw e;
      }
    }
    async function submitHomeworkPhotos() {
      if (isSubmitting) return;
      if (!selectedFiles.length) return toast('사진을 1장 이상 선택해 주세요.');
      isSubmitting = true;
      const btn = $('submit-btn');
      if (btn) {
        btn.disabled = true;
        btn.textContent = '제출 중...';
      }
      try {
        const formData = new FormData();
        formData.set('assignment_id', assignmentId);
        formData.set('student_id', studentId);
        formData.set('pin', pin);
        selectedFiles.forEach(file => formData.append('files', file, file.name));
        const data = await apiUpload('homework-photo/upload', formData);
        submission = { ...(submission || {}), is_submitted: 1, submitted_at: data.submitted_at || '방금 제출됨' };
        selectedFiles = [];
        toast('제출되었습니다.');
        renderDone(submission.submitted_at);
      } catch (e) {
        toast(getStudentErrorMessage(e));
        if (btn) {
          btn.disabled = false;
          btn.textContent = '제출하기';
        }
      } finally {
        isSubmitting = false;
      }
    }
    loadAssignment();
  </script>
</body>
</html>
