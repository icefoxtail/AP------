<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AP Math Planner</title>
  <link rel="stylesheet" href="../css/apms-ui-foundation.css">
  <style>
    :root {
      --primary:#1A5CFF;
      --primary-dark:#0040D6;
      --secondary:#6B7684;
      --success:#00B894;
      --error:#E8414F;
      --warning:#F59F00;
      --bg:#F2F4F6;
      --surface:#FFFFFF;
      --surface-2:#F8FAFC;
      --surface-alpha:rgba(242,244,246,0.92);
      --primary-soft:rgba(26,92,255,0.08);
      --primary-rgb:26,92,255;
      --border:#E5E8EB;
      --text:#191F28;
      --text-soft:#333D4B;
      --shadow:0 2px 8px rgba(0,0,0,0.03);
    }
    body.dark {
      --primary:#8AB4FF;
      --primary-dark:#5B8DFF;
      --secondary:#A7B0BE;
      --success:#4ADE80;
      --error:#FB7185;
      --warning:#FBBF24;
      --bg:#111318;
      --surface:#1A1D23;
      --surface-2:#232731;
      --surface-alpha:rgba(26,29,35,0.92);
      --primary-soft:rgba(138,180,255,0.14);
      --primary-rgb:138,180,255;
      --border:rgba(255,255,255,0.12);
      --text:#F3F4F6;
      --text-soft:#D1D5DB;
      --shadow:none;
    }
    @media (prefers-color-scheme: dark) {
      body:not(.light) {
        --primary:#8AB4FF;
        --primary-dark:#5B8DFF;
        --secondary:#A7B0BE;
        --success:#4ADE80;
        --error:#FB7185;
        --warning:#FBBF24;
        --bg:#111318;
        --surface:#1A1D23;
        --surface-2:#232731;
        --surface-alpha:rgba(26,29,35,0.92);
        --primary-soft:rgba(138,180,255,0.14);
        --primary-rgb:138,180,255;
        --border:rgba(255,255,255,0.12);
        --text:#F3F4F6;
        --text-soft:#D1D5DB;
        --shadow:none;
      }
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; outline:none; }
    body {
      margin:0;
      font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.55;
    }
    button, input, select, textarea { font-family:inherit; }
    .app {
      width:100%;
      max-width:1040px;
      margin:0 auto;
      padding:16px 14px calc(92px + env(safe-area-inset-bottom));
    }
    .top {
      position:sticky;
      top:0;
      z-index:20;
      background:var(--surface-alpha);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
    }
    .top-inner {
      max-width:1040px;
      margin:0 auto;
      height:58px;
      padding:0 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .brand {
      font-size:19px;
      font-weight:500;
      letter-spacing:-0.3px;
      color:var(--text);
      white-space:nowrap;
    }
    .student-chip {
      min-width:0;
      max-width:50%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:13px;
      font-weight:500;
      color:var(--secondary);
      text-align:right;
    }
    .card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:16px;
    }
    .btn {
      min-height:44px;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--text);
      padding:10px 14px;
      font-size:14px;
      font-weight:500;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      transition:transform .12s ease, background .12s ease;
    }
    .btn:active { transform:scale(0.98); }
    .btn-primary {
      background:var(--primary);
      border-color:var(--primary);
      color:#fff;
      box-shadow:0 4px 12px rgba(var(--primary-rgb),0.20);
    }
    .input {
      width:100%;
      min-height:46px;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--text);
      padding:11px 13px;
      font-size:15px;
      font-weight:500;
    }
    .muted {
      color:var(--secondary);
      font-size:12px;
      font-weight:500;
    }
    .pin-wrap {
      min-height:calc(100vh - 58px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 14px;
    }
    .pin-card {
      width:100%;
      max-width:380px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:24px;
      padding:30px 22px;
      box-shadow:var(--shadow);
    }
    .pin-logo {
      width:54px;
      height:54px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--primary);
      color:#fff;
      font-size:24px;
      font-weight:500;
      margin:0 auto 16px;
    }
    .pin-title {
      margin:0;
      text-align:center;
      font-size:20px;
      font-weight:500;
      color:var(--text);
      letter-spacing:-0.5px;
    }
    .pin-desc {
      margin:8px 0 24px;
      text-align:center;
      color:var(--secondary);
      font-size:13px;
      font-weight:500;
      line-height:1.5;
    }
    .dashboard {
      display:grid;
      grid-template-columns:320px minmax(0,1fr);
      gap:16px;
      align-items:start;
    }
    .hero {
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-bottom:16px;
    }
    .stat {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:18px;
      padding:15px 12px;
    }
    .stat-label {
      font-size:11px;
      font-weight:500;
      color:var(--secondary);
      margin-bottom:5px;
    }
    .stat-value {
      font-size:22px;
      font-weight:500;
      color:var(--text);
      line-height:1.15;
      letter-spacing:-0.5px;
    }
    .progress-wrap {
      height:10px;
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:999px;
      overflow:hidden;
      margin-top:10px;
    }
    .progress-bar {
      height:100%;
      background:var(--primary);
      border-radius:999px;
      transition:width .2s ease;
    }
    .feedback {
      margin-bottom:16px;
      border-radius:18px;
      border:1px solid rgba(var(--primary-rgb),0.18);
      background:var(--primary-soft);
      padding:14px;
    }
    .feedback-title {
      font-size:13px;
      font-weight:500;
      color:var(--primary);
      margin-bottom:5px;
    }
    .feedback-text {
      font-size:14px;
      font-weight:500;
      color:var(--text);
      line-height:1.5;
      white-space:pre-wrap;
    }
    .calendar-head {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
    }
    .calendar-title {
      font-size:17px;
      font-weight:500;
      color:var(--text);
    }
    .calendar-grid {
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:5px;
    }
    .weekday {
      text-align:center;
      font-size:11px;
      font-weight:500;
      color:var(--secondary);
      padding:5px 0;
    }
    .day {
      min-height:40px;
      border:1px solid transparent;
      border-radius:12px;
      background:transparent;
      color:var(--text);
      font-size:13px;
      font-weight:500;
      cursor:pointer;
      position:relative;
    }
    .day.out { color:var(--border); cursor:default; }
    .day.selected {
      border-color:var(--primary);
      background:var(--primary-soft);
      color:var(--primary);
    }
    .day.today::after {
      content:'';
      position:absolute;
      left:50%;
      bottom:5px;
      width:4px;
      height:4px;
      transform:translateX(-50%);
      border-radius:50%;
      background:var(--primary);
    }
    .day.done-full { background:rgba(0,184,148,0.10); }
    .day.done-part { background:rgba(245,159,0,0.12); }
    .plan-head {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:12px;
    }
    .plan-title {
      font-size:19px;
      font-weight:500;
      color:var(--text);
      letter-spacing:-0.4px;
      line-height:1.25;
    }
    .plan-date {
      font-size:12px;
      font-weight:500;
      color:var(--secondary);
      margin-top:4px;
    }
    .plan-list {
      display:flex;
      flex-direction:column;
      gap:9px;
    }
    .plan-item {
      min-height:54px;
      border:1px solid var(--border);
      background:var(--surface);
      border-radius:16px;
      padding:12px;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .check {
      width:30px;
      height:30px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--surface-2);
      color:var(--surface-2);
      font-size:17px;
      font-weight:500;
      flex:0 0 auto;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .check.done {
      background:var(--primary);
      border-color:var(--primary);
      color:#fff;
    }
    .plan-main {
      min-width:0;
      flex:1;
    }
    .plan-main.done { opacity:.5; text-decoration:line-through; }
    .plan-item-title {
      font-size:15px;
      font-weight:500;
      color:var(--text);
      line-height:1.35;
      word-break:break-word;
    }
    .plan-sub {
      margin-top:3px;
      font-size:11px;
      font-weight:500;
      color:var(--secondary);
    }
    .planner-badge-row {
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:8px;
    }
    .planner-badge {
      min-height:26px;
      display:inline-flex;
      align-items:center;
      gap:5px;
      padding:0 9px;
      border-radius:999px;
      border:1px solid var(--border);
      background:var(--surface-2);
      color:var(--secondary);
      font-size:11px;
      font-weight:500;
      line-height:1;
      white-space:nowrap;
    }
    .planner-badge svg,
    .planner-action-btn svg,
    .check svg {
      width:15px;
      height:15px;
      stroke:currentColor;
      stroke-width:2;
      fill:none;
      stroke-linecap:round;
      stroke-linejoin:round;
      flex:0 0 auto;
    }
    .planner-badge--focus {
      border-color:rgba(0,184,148,.24);
      background:rgba(0,184,148,.09);
      color:#047857;
    }
    .planner-badge--rest {
      border-color:rgba(245,159,0,.28);
      background:rgba(245,159,0,.10);
      color:#B45309;
    }
    .planner-badge--done {
      border-color:rgba(var(--primary-rgb),.26);
      background:var(--primary-soft);
      color:var(--primary);
    }
    .planner-badge--snapshot {
      border-color:rgba(51,65,85,.16);
      background:rgba(51,65,85,.06);
      color:#475569;
    }
    .planner-badge--question,
    .planner-badge--reply {
      border-color:rgba(99,102,241,.24);
      background:rgba(99,102,241,.08);
      color:#4F46E5;
    }
    .planner-badge--wake {
      border-color:rgba(249,115,22,.26);
      background:rgba(249,115,22,.10);
      color:#C2410C;
    }
    .planner-badge--seen {
      border-color:rgba(14,165,233,.24);
      background:rgba(14,165,233,.08);
      color:#0284C7;
    }
    .planner-badge--locked {
      border-color:rgba(232,65,79,.22);
      background:rgba(232,65,79,.08);
      color:var(--error);
    }
    .planner-action-row {
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-left:auto;
      justify-content:flex-end;
      flex:0 0 auto;
    }
    .planner-action-btn {
      min-height:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:5px;
      border:1px solid var(--border);
      border-radius:999px;
      background:var(--surface-2);
      color:var(--text);
      padding:0 10px;
      font-size:12px;
      font-weight:500;
      cursor:pointer;
      white-space:nowrap;
    }
    .planner-action-btn.primary {
      border-color:rgba(var(--primary-rgb),.28);
      background:var(--primary-soft);
      color:var(--primary);
    }
    .planner-action-btn.danger {
      border-color:transparent;
      background:transparent;
      color:var(--secondary);
      padding-inline:8px;
      box-shadow:none;
      opacity:.78;
    }
    .delete {
      border:0;
      background:transparent;
      color:var(--secondary);
      font-size:12px;
      font-weight:500;
      padding:8px;
      cursor:pointer;
      flex:0 0 auto;
    }
    .empty {
      padding:34px 12px;
      text-align:center;
      color:var(--secondary);
      font-size:13px;
      font-weight:500;
      border:1px dashed var(--border);
      border-radius:16px;
      background:var(--surface-2);
    }
    .quick-form {
      display:grid;
      grid-template-columns:minmax(0,1fr) 110px 86px;
      gap:8px;
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid var(--border);
    }
    .mobile-add {
      display:none;
      position:fixed;
      left:14px;
      right:14px;
      bottom:calc(14px + env(safe-area-inset-bottom));
      z-index:40;
      min-height:54px;
      border-radius:18px;
      box-shadow:0 10px 24px rgba(var(--primary-rgb),0.24);
    }
    .modal-overlay {
      position:fixed;
      inset:0;
      display:none;
      align-items:flex-end;
      justify-content:center;
      background:rgba(0,0,0,0.32);
      z-index:100;
      padding:14px;
    }
    .modal-overlay.show { display:flex; }
    .modal {
      width:100%;
      max-width:420px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:22px;
      padding:18px;
      box-shadow:0 16px 40px rgba(0,0,0,0.16);
      color:var(--text);
    }
    .modal-title {
      font-size:18px;
      font-weight:500;
      color:var(--text);
      margin-bottom:14px;
    }
    .toast {
      position:fixed;
      left:50%;
      bottom:calc(82px + env(safe-area-inset-bottom));
      transform:translateX(-50%);
      background:#191F28;
      color:#fff;
      border-radius:999px;
      padding:10px 15px;
      font-size:13px;
      font-weight:500;
      z-index:200;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease, transform .2s ease;
      white-space:nowrap;
    }
    .toast.show {
      opacity:1;
      transform:translateX(-50%) translateY(-4px);
    }

    .top-back {
      border:0;
      background:transparent;
      color:var(--secondary);
      font-size:13px;
      font-weight:500;
      padding:8px 8px 8px 0;
      cursor:pointer;
      flex:0 0 auto;
      white-space:nowrap;
    }
    .top-back:hover { color:var(--primary); }
    .planner-timer-mini {
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:70;
      width:min(360px, calc(100vw - 36px));
      display:flex;
      align-items:center;
      gap:12px;
      padding:13px 14px;
      border:1px solid var(--border);
      border-radius:20px;
      background:var(--surface-alpha);
      box-shadow:0 14px 34px rgba(0,0,0,0.14);
      backdrop-filter:blur(10px);
    }
    .planner-timer-mini.hidden { display:none; }
    .timer-time {
      flex:0 0 auto;
      min-width:72px;
      font-size:22px;
      font-weight:500;
      color:var(--primary);
      letter-spacing:-0.4px;
      font-variant-numeric:tabular-nums;
    }
    .timer-info {
      min-width:0;
      flex:1;
    }
    .timer-label {
      font-size:11px;
      font-weight:500;
      color:var(--secondary);
      line-height:1.2;
    }
    .timer-title {
      margin-top:2px;
      font-size:13px;
      font-weight:500;
      color:var(--text);
      line-height:1.25;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .timer-actions {
      display:flex;
      align-items:center;
      gap:6px;
      flex:0 0 auto;
    }
    .timer-presets {
      display:flex;
      align-items:center;
      gap:4px;
      margin-top:7px;
      flex-wrap:wrap;
    }
    .timer-preset {
      border:1px solid var(--border);
      background:var(--surface-2);
      color:var(--secondary);
      min-height:26px;
      padding:0 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:500;
      cursor:pointer;
    }
    .timer-preset.active {
      border-color:rgba(var(--primary-rgb),0.28);
      background:var(--primary-soft);
      color:var(--primary);
    }
    .timer-btn {
      border:1px solid var(--border);
      background:var(--surface-2);
      color:var(--text);
      min-height:34px;
      padding:0 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:500;
      cursor:pointer;
    }
    .timer-btn.primary {
      border-color:var(--primary);
      background:var(--primary);
      color:#fff;
    }
    .timer-btn.close {
      width:34px;
      padding:0;
      color:var(--secondary);
    }
    .plan-timer {
      border:0;
      background:var(--primary-soft);
      color:var(--primary);
      font-size:12px;
      font-weight:500;
      padding:8px;
      border-radius:999px;
      cursor:pointer;
      flex:0 0 auto;
      white-space:nowrap;
    }

    @media (max-width:767px) {
      .app { padding:14px 12px calc(88px + env(safe-area-inset-bottom)); }
      .dashboard { display:block; }
      .side { margin-bottom:14px; }
      .hero { grid-template-columns:1fr 1fr; }
      .hero .stat:last-child { grid-column:span 2; }
      .calendar-card { display:none; }
      .quick-form { display:none; }
      .mobile-add { display:flex; }

      .planner-timer-mini {
        left:12px;
        right:12px;
        bottom:calc(76px + env(safe-area-inset-bottom));
        width:auto;
      }
      .timer-time { min-width:66px; font-size:20px; }
      .timer-title { max-width:118px; }
      .timer-presets { gap:3px; margin-top:6px; }
      .timer-preset { min-height:24px; padding:0 7px; font-size:10.5px; }
      .plan-item {
        flex-wrap:wrap;
        align-items:flex-start;
      }
      .plan-main {
        flex:1 1 calc(100% - 40px);
      }
      .planner-action-row {
        flex:0 0 calc(100% - 40px);
        width:auto;
        margin-left:40px;
        justify-content:flex-start;
      }

      .top-inner { height:56px; }
      .brand { font-size:18px; }
      .student-chip { max-width:48%; font-size:12px; }
    }
  </style>
</head>
<body>
  <script>
    (function () {
      const saved = localStorage.getItem('APMATH_THEME');
      const isSystemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.body.classList.toggle('dark', saved === 'dark' || (!saved && isSystemDark));
      document.body.classList.toggle('light', saved === 'light');
      if (window.matchMedia) {
        const media = window.matchMedia('(prefers-color-scheme: dark)');
        const sync = () => {
          if (localStorage.getItem('APMATH_THEME')) return;
          document.body.classList.toggle('dark', media.matches);
        };
        if (media.addEventListener) media.addEventListener('change', sync);
        else if (media.addListener) media.addListener(sync);
      }
    })();
  </script>
  <header class="top">
    <div class="top-inner">
      <button class="top-back" onclick="goPlannerBack()">‹ 뒤로가기</button>
      <div class="brand">AP Math Planner</div>
      <div id="student-chip" class="student-chip"></div>
    </div>
  </header>

  <main id="app" class="app"></main>

  <button id="mobile-add-btn" class="btn btn-primary mobile-add" onclick="openAddModal(selectedDate)">+ 할 일 추가</button>

  <div id="modal-overlay" class="modal-overlay" onclick="if(event.target.id==='modal-overlay')closeModal()">
    <div class="modal">
      <div id="modal-title" class="modal-title"></div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="planner-timer-mini" class="planner-timer-mini hidden"></div>

  <div id="toast" class="toast"></div>

  <script>
    const API_BASE = 'https://ap-math-os-v2612.js-pdf.workers.dev/api';
    let examDate = null; // 서버에서 학생별로 받아옴. null이면 D-DAY 미표시

    const params = new URLSearchParams(location.search);
    const studentId = String(
      params.get('student_id') ||
      localStorage.getItem('PLANNER_SID') ||
      sessionStorage.getItem('PLANNER_SID') ||
      ''
    ).trim();

    let pin = String(
      params.get('pin') ||
      (studentId ? localStorage.getItem(`planner_pin_${studentId}`) : '') ||
      localStorage.getItem('PLANNER_PIN') ||

    function toast(message) {

      clearTimeout(window.__toastTimer);

    }

    function vibratePlannerTimerDone() {
      if (!('vibrate' in navigator)) return;
      try {
        navigator.vibrate([180, 80, 180]);
      } catch (e) {}
    }

    function goPlannerBack() {
      const sameOriginReferrer = document.referrer && document.referrer.indexOf(location.origin) === 0;
      if (sameOriginReferrer && history.length > 1) {
        history.back();
        return;
      }
      location.href = '../student/';
    }

    function getStoredPlannerTimerMinutes() {
      try {
        const saved = Number(authStore().getItem(PLANNER_TIMER_MINUTES_KEY));
        return PLANNER_TIMER_ALLOWED_MINUTES.includes(saved) ? saved : 45;
      } catch (e) {
        return 45;
      }
    }

    function setPlannerTimerMinutes(minutes) {
      const next = Number(minutes);
      if (!PLANNER_TIMER_ALLOWED_MINUTES.includes(next)) return;
      clearInterval(plannerTimerInterval);
      plannerTimerInterval = null;
      plannerTimerActive = false;
      plannerTimerSelectedMinutes = next;
      plannerTimerSeconds = next * 60;
      try { authStore().setItem(PLANNER_TIMER_MINUTES_KEY, String(next)); } catch (e) {}
      const mini = $('planner-timer-mini');
      if (mini) mini.classList.remove('hidden');
      renderPlannerTimerMini();
    }

    function getPlannerTimerPresetHtml() {
      return PLANNER_TIMER_ALLOWED_MINUTES.map(minutes => `
        <button class="timer-preset ${plannerTimerSelectedMinutes === minutes ? 'active' : ''}" onclick="setPlannerTimerMinutes(${minutes})">${minutes}분</button>
      `).join('');
    }

    function formatPlannerTimerTime() {
      const safe = Math.max(0, Number(plannerTimerSeconds || 0));
      const m = String(Math.floor(safe / 60)).padStart(2, '0');
      const s = String(safe % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    function renderPlannerTimerMini() {
      const mini = $('planner-timer-mini');
      if (!mini) return;
      mini.innerHTML = `
        <div class="timer-time">${formatPlannerTimerTime()}</div>
        <div class="timer-info">
          <div class="timer-label">집중 타이머 · ${plannerTimerSelectedMinutes}분</div>
          <div class="timer-title">${escapeHtml(plannerTimerTitle || '현재 계획')}</div>
          <div class="timer-presets">${getPlannerTimerPresetHtml()}</div>
        </div>
        <div class="timer-actions">
          <button class="timer-btn ${plannerTimerActive ? '' : 'primary'}" onclick="togglePlannerTimer()">${plannerTimerActive ? '일시정지' : '시작'}</button>
          <button class="timer-btn" onclick="resetPlannerTimer()">초기화</button>
          <button class="timer-btn close" onclick="closePlannerTimer()">×</button>
        </div>
      `;
    }

    function showPlannerTimer(title, resetSeconds = false) {
      plannerTimerTitle = String(title || plannerTimerTitle || '현재 계획').trim() || '현재 계획';
      if (!PLANNER_TIMER_ALLOWED_MINUTES.includes(Number(plannerTimerSelectedMinutes))) {
        plannerTimerSelectedMinutes = 45;
      }
      if (resetSeconds || !Number.isFinite(Number(plannerTimerSeconds)) || plannerTimerSeconds <= 0) {
        plannerTimerSeconds = plannerTimerSelectedMinutes * 60;
      }
      const mini = $('planner-timer-mini');
      if (mini) mini.classList.remove('hidden');
      renderPlannerTimerMini();
    }

    function startPlannerTimerForPlan(planId) {
      const plan = plans.find(p => String(p.id) === String(planId));
      clearInterval(plannerTimerInterval);
      plannerTimerInterval = null;
      plannerTimerActive = false;
      showPlannerTimer(plan?.title || '현재 계획', true);
      togglePlannerTimer();
    }

    function togglePlannerTimer() {
      const mini = $('planner-timer-mini');
      if (mini) mini.classList.remove('hidden');

      if (plannerTimerActive) {
        clearInterval(plannerTimerInterval);
        plannerTimerInterval = null;
        plannerTimerActive = false;
        renderPlannerTimerMini();
        return;
      }

      plannerTimerActive = true;
      clearInterval(plannerTimerInterval);
      plannerTimerInterval = setInterval(() => {
        plannerTimerSeconds -= 1;
        if (plannerTimerSeconds <= 0) {
          clearInterval(plannerTimerInterval);
          plannerTimerInterval = null;
          plannerTimerActive = false;
          plannerTimerSeconds = plannerTimerSelectedMinutes * 60;
          renderPlannerTimerMini();
          toast('집중 시간이 끝났습니다.');
          vibratePlannerTimerDone();
          return;
        }
        renderPlannerTimerMini();
      }, 1000);
      renderPlannerTimerMini();
    }

    function resetPlannerTimer() {
      clearInterval(plannerTimerInterval);
      plannerTimerInterval = null;
      plannerTimerActive = false;
      plannerTimerSeconds = plannerTimerSelectedMinutes * 60;
      renderPlannerTimerMini();
      toast('타이머가 초기화되었습니다.');
    }

    function closePlannerTimer() {
      clearInterval(plannerTimerInterval);
      plannerTimerInterval = null;
      plannerTimerActive = false;
      plannerTimerSeconds = plannerTimerSelectedMinutes * 60;
      plannerTimerTitle = '';
      const mini = $('planner-timer-mini');
      if (mini) mini.classList.add('hidden');
    }

    function authStore() { return window.localStorage; }
    function authKey() { return `planner_auth_${studentId}`; }
    function pinKey() { return `planner_pin_${studentId}`; }
    function getPortalPlannerPinCandidate() {
      const portalSid = String(localStorage.getItem('PLANNER_SID') || sessionStorage.getItem('PLANNER_SID') || '').trim();
      const queryPin = String(params.get('pin') || '').trim();
      const portalPin = String(localStorage.getItem('PLANNER_PIN') || sessionStorage.getItem('PLANNER_PIN') || '').trim();
      if (queryPin) return queryPin;
      if (portalSid && portalSid !== studentId) return '';
      return portalPin;
    }
    function importPortalPlannerSession() {
      if (!studentId) return;
      const portalPin = getPortalPlannerPinCandidate();
      if (!portalPin) return;
      pin = portalPin;
      authStore().setItem(authKey(), 'true');
      authStore().setItem(pinKey(), portalPin);
      localStorage.setItem('PLANNER_SID', studentId);
      localStorage.setItem('PLANNER_PIN', portalPin);
      if (params.has('pin')) {
        params.delete('pin');
        const query = params.toString();
        history.replaceState(null, '', location.pathname + (query ? `?${query}` : '') + location.hash);
      }
    }
    function isMobile() { return window.innerWidth < 768; }
    function addDays(date, days) {
      const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      d.setDate(d.getDate() + days);
      return d;
    }
    function formatDate(date) { return date.toLocaleDateString('sv-SE'); }
    function monthBounds(month) {
      const [y, m] = month.split('-').map(Number);
      const first = new Date(y, m - 1, 1);
      const last = new Date(y, m, 0);
      return { from: formatDate(first), to: formatDate(last), year: y, monthNo: m };
    }
    function invalidatePlannerIndex() {
      plannerIndex = null;
    }
    function setPlannerData(nextPlans, nextFeedback) {
      plans = Array.isArray(nextPlans) ? nextPlans : [];
      feedback = Array.isArray(nextFeedback) ? nextFeedback : [];
      invalidatePlannerIndex();
    }
    function upsertPlannerPlans(rows) {
      const nextRows = Array.isArray(rows) ? rows : [];
      if (!nextRows.length) return;
      const byId = new Map(plans.map(p => [String(p.id || ''), p]));
      nextRows.forEach(row => {
        const id = String(row && row.id || '');
        if (!id) return;
        byId.set(id, Object.assign({}, byId.get(id) || {}, row));
      });
      plans = Array.from(byId.values()).sort((a,b) =>
        String(a.plan_date || '').localeCompare(String(b.plan_date || '')) ||
        String(a.created_at || '').localeCompare(String(b.created_at || '')) ||
        String(a.id || '').localeCompare(String(b.id || ''))
      );
      invalidatePlannerIndex();
    }
    function patchPlannerPlan(planId, changes) {
      const id = String(planId || '');
      let changed = false;
      plans = plans.map(p => {
        if (String(p.id || '') !== id) return p;
        changed = true;
        return Object.assign({}, p, changes || {});
      });
      if (changed) invalidatePlannerIndex();
      return changed;
    }
    function removePlannerPlan(planId) {
      const id = String(planId || '');
      const before = plans.length;
      plans = plans.filter(p => String(p.id || '') !== id);
      if (plans.length !== before) invalidatePlannerIndex();
    }
    function getPlannerIndex() {
      if (plannerIndex) return plannerIndex;

      const byDate = {};
      const planDateMap = {};
      let monthTotal = 0;
      let monthDone = 0;

      plans.forEach(p => {
        const d = String(p.plan_date || '');
        if (!d) return;
        if (!byDate[d]) byDate[d] = [];
        byDate[d].push(p);
        if (!planDateMap[d]) planDateMap[d] = { total:0, done:0 };
        planDateMap[d].total++;
        if (Number(p.is_done || 0) === 1) planDateMap[d].done++;
        if (d.slice(0, 7) === currentMonth) {
          monthTotal++;
          if (Number(p.is_done || 0) === 1) monthDone++;
        }
      });

      Object.keys(byDate).forEach(date => {
        byDate[date].sort((a,b) =>
          String(a.created_at || '').localeCompare(String(b.created_at || '')) ||
          String(a.id || '').localeCompare(String(b.id || ''))
        );
      });

      const feedbackByDate = {};
      feedback.forEach(f => {
        const d = String(f && f.feedback_date || '');
        if (d) feedbackByDate[d] = f;
      });

      plannerIndex = {
        byDate,
        planDateMap,
        feedbackByDate,
        monthTotal,
        monthDone
      };
      return plannerIndex;
    }
    function getPlanDateMap() {
      return getPlannerIndex().planDateMap;
    }
    function plansForDate(date) {
      return (getPlannerIndex().byDate[String(date)] || []).slice();
    }
    function feedbackForDate(date) {
      return getPlannerIndex().feedbackByDate[String(date)] || null;
    }
    function calcDDay() {
      if (!examDate) return null;
      const today = new Date(todayStr() + 'T00:00:00');
      const exam = new Date(examDate + 'T00:00:00');
      return Math.ceil((exam - today) / 86400000);
    }

    function openExamDateEditor() {
      const existing = document.getElementById('exam-date-editor-overlay');
      if (existing) { existing.remove(); return; }

      const overlay = document.createElement('div');
      overlay.id = 'exam-date-editor-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.45);';
      overlay.innerHTML = `
        <div style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:16px;padding:24px;width:min(320px,90vw);display:flex;flex-direction:column;gap:16px;box-shadow:0 8px 40px rgba(0,0,0,.24);">
          <div style="font-size:15px;font-weight:700;color:var(--text);">시험일 설정</div>
          <input id="exam-date-input" type="date" value="${escapeHtml(examDate || '')}"
            style="border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:15px;width:100%;box-sizing:border-box;background:var(--surface-2);color:var(--text);">
          <div style="display:flex;gap:8px;">
            <button onclick="document.getElementById('exam-date-editor-overlay').remove()"
              style="flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;">취소</button>
            <button onclick="saveExamDate()"
              style="flex:1;padding:10px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:14px;font-weight:600;cursor:pointer;">저장</button>
          </div>
        </div>`;
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);
      setTimeout(() => document.getElementById('exam-date-input')?.focus(), 80);
    }

    async function saveExamDate() {
      const input = document.getElementById('exam-date-input');
      const newDate = String(input?.value || '').trim();
      if (!newDate || !/^\d{4}-\d{2}-\d{2}$/.test(newDate)) {
        toast('날짜를 올바르게 입력하세요.');
        return;
      }
      try {
        await apiSend(`planner/settings`, 'PATCH', {
          student_id: studentId,
          pin,
          planner_exam_date: newDate
        });
        examDate = newDate;
        document.getElementById('exam-date-editor-overlay')?.remove();
        toast('시험일이 저장되었습니다.');
        renderPlanner();
      } catch (e) {
        toast(e.message || '저장 중 오류가 발생했습니다.');
      }
    }
    function getMonthCompletionRate() {
      const idx = getPlannerIndex();
      if (!idx.monthTotal) return 0;
      return Math.round((idx.monthDone / idx.monthTotal) * 100);
    }

    async function apiGet(path) {
      const r = await fetch(`${API_BASE}/${path}`, { headers: { 'Content-Type': 'application/json' } });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || data.message || '요청 실패');
      return data;
    }
    async function apiSend(path, method, body) {
      const r = await fetch(`${API_BASE}/${path}`, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || data.success === false) throw new Error(data.error || data.message || '요청 실패');
      return data;
    }

    async function initPlanner() {
      if (!studentId) {
        renderError('학생 링크가 올바르지 않습니다.');
        return;
      }

      importPortalPlannerSession();

      const savedAuth = authStore().getItem(authKey());
      const savedPin = authStore().getItem(pinKey());

      if (savedAuth === 'true' && savedPin) {
        pin = savedPin;
        try {
          await verifyPin(true);
          return;
        } catch (e) {
          authStore().removeItem(authKey());
          authStore().removeItem(pinKey());
        }
      }

      renderPinGate();
    }

    function renderError(message) {
      $('student-chip').textContent = '';
      $('app').innerHTML = `
        <div class="pin-wrap">
          <div class="pin-card">
            <div class="pin-logo">!</div>
            <h1 class="pin-title">접속 오류</h1>
            <p class="pin-desc">${escapeHtml(message)}</p>
          </div>
        </div>
      `;
    }

    function renderPinGate() {
      $('student-chip').textContent = '';
      $('mobile-add-btn').style.display = 'none';
      $('app').innerHTML = `
        <div class="pin-wrap">
          <div class="pin-card">
            <div class="pin-logo">A</div>
            <h1 class="pin-title">개인 PIN 확인</h1>
            <p class="pin-desc">장기 플래너는 학생 개인 공간입니다.<br>본인 PIN을 입력하면 열립니다.</p>
            <div style="display:flex; flex-direction:column; gap:10px;">
              <input id="pin-input" class="input" type="password" inputmode="numeric" placeholder="개인 PIN 입력" onkeydown="if(event.key==='Enter')verifyPin(false)">
              <button class="btn apms-button apms-button--primary btn-primary" onclick="verifyPin(false)">확인</button>
            </div>
            <div class="muted" style="margin-top:16px; text-align:center;">공용 기기에서는 사용 후 브라우저를 닫아주세요.</div>
          </div>
        </div>
      `;
      setTimeout(() => $('pin-input')?.focus(), 80);
    }

    async function verifyPin(fromSession) {
      if (!fromSession) {
        pin = String($('pin-input')?.value || '').trim();
      }
      if (!pin) {
        toast('PIN을 입력하세요.');
        return;
      }

      try {
        const data = await apiGet(`planner-auth?student_id=${encodeURIComponent(studentId)}&pin=${encodeURIComponent(pin)}`);
        if (!data?.success || !data?.student) {
          authStore().removeItem(authKey());
          authStore().removeItem(pinKey());
          if (fromSession) {
            throw new Error(data?.error || 'session expired');
          }
          const input = $('pin-input');
          if (input) {
            input.value = '';
            input.focus();
          }
          toast(data?.error || 'PIN이 올바르지 않습니다.');
          return;
        }

        student = data.student;
        authStore().setItem(authKey(), 'true');
        authStore().setItem(pinKey(), pin);
        $('student-chip').textContent = student.name || '';
        await loadPlannerData();
        renderPlanner();
      } catch (e) {
        authStore().removeItem(authKey());
        authStore().removeItem(pinKey());
        toast('인증 중 오류가 발생했습니다.');
      }
    }

    async function loadPlannerData() {
      const { from, to } = monthBounds(currentMonth);
      const data = await apiGet(`planner?student_id=${encodeURIComponent(studentId)}&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&pin=${encodeURIComponent(pin)}`);
      if (data.planner_exam_date) examDate = data.planner_exam_date;
      setPlannerData(data.plans, data.feedback);
    }

    function renderPlanner() {
      if (isMobile()) renderMobilePlanner();
      else renderPCPlanner();
      $('mobile-add-btn').style.display = isMobile() ? 'flex' : 'none';
    }

    function renderStats() {
      const dday = calcDDay();
      const rate = getMonthCompletionRate();
      const todayPlans = plansForDate(todayStr());
      const todayDone = todayPlans.filter(p => Number(p.is_done || 0) === 1).length;
      return `
        <div class="hero">
          <div class="stat" onclick="openExamDateEditor()" style="cursor:pointer;" title="시험일 설정">
            <div class="stat-label">시험일 ✎</div>
            <div class="stat-value">${dday === null ? '미설정' : (dday >= 0 ? `D-${dday}` : `D+${Math.abs(dday)}`)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">오늘 완료</div>
            <div class="stat-value">${todayDone}/${todayPlans.length}</div>
          </div>
          <div class="stat">
            <div class="stat-label">월 이행률</div>

          </div>
        </div>

    function renderFeedbackBanner() {
      const f = feedbackForDate(selectedDate);
      if (!f) return '';
      const badge = f.badge ? `<span style="font-size:18px; margin-right:4px;">${escapeHtml(f.badge)}</span>` : '';
      const text = f.teacher_comment || '피드백이 도착했습니다.';
      return `
        <div class="feedback">
          <div class="feedback-title">${badge}담임 피드백</div>
          <div class="feedback-text">${escapeHtml(text)}</div>
        </div>
      `;
    }

    function renderPCPlanner() {
      $('app').innerHTML = `
        ${renderStats()}
        ${renderFeedbackBanner()}
        <div class="dashboard">
          <section class="side">
            <div class="card calendar-card">
              ${renderCalendar(Number(currentMonth.slice(0,4)), Number(currentMonth.slice(5,7)))}
            </div>
          </section>
          <section>
            <div class="card apms-card">
              ${renderPlanPanel()}
            </div>
          </section>
        </div>
      `;
    }

    function renderMobilePlanner() {
      $('app').innerHTML = `
        ${renderStats()}
        ${renderFeedbackBanner()}
        <div class="card apms-card">
          ${renderPlanPanel()}
        </div>
      `;
    }

    function renderCalendar(year, monthNo) {
      const first = new Date(year, monthNo - 1, 1);
      const last = new Date(year, monthNo, 0);
      const startDay = first.getDay();
      const total = last.getDate();
      const planMap = getPlanDateMap();

      const cells = [];
      for (let i = 0; i < startDay; i++) cells.push(`<button class="day out" disabled></button>`);
      for (let d = 1; d <= total; d++) {
        const date = `${year}-${String(monthNo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const p = planMap[date];
        const cls = [
          'day',
          date === selectedDate ? 'selected' : '',
          date === todayStr() ? 'today' : '',
          p && p.total > 0 && p.done === p.total ? 'done-full' : '',
          p && p.total > 0 && p.done < p.total ? 'done-part' : ''
        ].filter(Boolean).join(' ');
        cells.push(`<button class="${cls}" onclick="selectDate('${date}')">${d}</button>`);
      }

      const prev = new Date(year, monthNo - 2, 1);
      const next = new Date(year, monthNo, 1);

      return `
        <div class="calendar-head">
          <button class="btn apms-button apms-button--quiet" style="min-height:36px; padding:6px 10px;" onclick="changeMonth('${formatDate(prev).slice(0,7)}')">‹</button>
          <div class="calendar-title">${year}년 ${monthNo}월</div>
          <button class="btn apms-button apms-button--quiet" style="min-height:36px; padding:6px 10px;" onclick="changeMonth('${formatDate(next).slice(0,7)}')">›</button>
        </div>
        <div class="calendar-grid">
          ${['일','월','화','수','목','금','토'].map(w => `<div class="weekday">${w}</div>`).join('')}
          ${cells.join('')}
        </div>
      `;
    }

    function renderPlanPanel() {
      const datePlans = plansForDate(selectedDate);
      return `
        <div class="plan-head">
          <div>
            <div class="plan-title">${selectedDate === todayStr() ? '오늘 할 일' : '선택 날짜 할 일'}</div>
            <div class="plan-date">${selectedDate}</div>
          </div>
          <button class="btn apms-button apms-button--quiet" style="min-height:40px; padding:8px 12px; font-size:12px;" onclick="resetAuth()">잠금</button>
        </div>
        <div class="plan-list">
          ${datePlans.length ? datePlans.map(renderPlanItem).join('') : `<div class="empty apms-empty">등록된 할 일이 없습니다.</div>`}
        </div>
        <div class="quick-form">
          <input id="quick-title" class="input" placeholder="할 일 입력">
          <input id="quick-subject" class="input" placeholder="과목" value="수학">
          <button class="btn apms-button apms-button--primary btn-primary" onclick="saveQuickPlan()">추가</button>
        </div>
      `;
    }

    function renderPlanItem(plan) {
      const done = Number(plan.is_done || 0) === 1;
      const planId = escapeJsString(plan.id);
      const updatedAt = escapeJsString(plan.updated_at || '');
      const nextDone = done ? 0 : 1;
      return `
        <div class="plan-item">
          <button class="check ${done ? 'done' : ''}" onclick="toggleDone('${planId}', ${nextDone}, '${updatedAt}')" aria-label="완료 전환">${done ? plannerIconSvg('done') : ''}</button>
          <div class="plan-main ${done ? 'done' : ''}">
            <div class="plan-item-title">${escapeHtml(plan.title)}</div>
            <div class="plan-sub">${escapeHtml(plan.subject || '수학')}${plan.repeat_rule ? ` · ${plan.repeat_rule === 'daily' ? '매일' : '매주'}` : ''}</div>
            ${renderPlanStatusBadges(plan, done)}
          </div>
          <div class="planner-action-row">
            <button class="planner-action-btn primary" onclick="startPlannerTimerForPlan('${planId}')">${plannerIconSvg('focus')}<span>공부</span></button>
            <button class="planner-action-btn" onclick="showPlannerSoon('집중 스냅샷')">${plannerIconSvg('snapshot')}<span>스냅샷</span></button>
            <button class="planner-action-btn" onclick="showPlannerSoon('질문 카드')">${plannerIconSvg('question')}<span>질문</span></button>
            <button class="planner-action-btn" onclick="toggleDone('${planId}', ${nextDone}, '${updatedAt}')">${plannerIconSvg('done')}<span>${done ? '해제' : '완료'}</span></button>
            <button class="planner-action-btn danger" onclick="deletePlan('${planId}')">${plannerIconSvg('locked')}<span>삭제</span></button>
          </div>
        </div>
      `;
    }

    async function selectDate(date) {
      selectedDate = date;
      if (selectedDate.slice(0,7) !== currentMonth) {
        currentMonth = selectedDate.slice(0,7);
        await loadPlannerData();
      }
      renderPlanner();
    }

    async function changeMonth(month) {
      currentMonth = month;
      const bounds = monthBounds(month);
      selectedDate = bounds.from;
      await loadPlannerData();
      renderPlanner();
    }

    async function saveQuickPlan() {
      const title = String($('quick-title')?.value || '').trim();
      const subject = String($('quick-subject')?.value || '수학').trim();
      if (!title) {
        toast('할 일을 입력하세요.');
        return;
      }
      await savePlan({ title, subject, repeat_rule: null });
    }

    function openAddModal(date) {
      $('modal-title').textContent = '할 일 추가';
      $('modal-body').innerHTML = `
        <div style="display:flex; flex-direction:column; gap:10px;">
          <input id="modal-title-input" class="input" placeholder="할 일">
          <input id="modal-subject-input" class="input" placeholder="과목" value="수학">
          <select id="modal-repeat-input" class="input">
            <option value="">반복 없음</option>
            <option value="daily">매일 반복</option>
            <option value="weekly">매주 반복</option>
          </select>
          <div class="muted">${escapeHtml(getRepeatHintText())}</div>
          <button class="btn apms-button apms-button--primary btn-primary" onclick="saveModalPlan('${date}')">저장</button>
        </div>
      `;
      $('modal-overlay').classList.add('show');
      setTimeout(() => $('modal-title-input')?.focus(), 80);
    }

    function closeModal() {
      $('modal-overlay').classList.remove('show');
    }

    async function saveModalPlan(date) {
      const title = String($('modal-title-input')?.value || '').trim();
      const subject = String($('modal-subject-input')?.value || '수학').trim();
      const repeat_rule = String($('modal-repeat-input')?.value || '').trim() || null;
      if (!title) {
        toast('할 일을 입력하세요.');
        return;
      }
      await savePlan({ title, subject, repeat_rule, date });
      closeModal();
    }

    async function savePlan(data) {
      try {
        const result = await apiSend('planner', 'POST', {
          student_id: studentId,
          pin,
          plan_date: data.date || selectedDate,
          title: data.title,
          subject: data.subject || '수학',
          repeat_rule: data.repeat_rule || null,
          exam_date: examDate
        });
        toast('저장되었습니다.');
        if (Array.isArray(result.plans)) {
          upsertPlannerPlans(result.plans);
        } else {
          await loadPlannerData();
        }
        renderPlanner();
      } catch (e) {
        toast(e.message || '저장 실패');
      }
    }

    async function toggleDone(planId, isDone, updatedAt) {
      try {
        const result = await apiSend(`planner/${encodeURIComponent(planId)}`, 'PATCH', {
          student_id: studentId,
          pin,
          is_done: isDone,
          updated_at: updatedAt || ''
        });
        if (result.plan) {
          upsertPlannerPlans([result.plan]);
        } else if (!patchPlannerPlan(planId, { is_done: isDone ? 1 : 0, updated_at: new Date().toISOString() })) {
          await loadPlannerData();
        }
        renderPlanner();
      } catch (e) {
        toast(e.message || '변경 실패');
      }
    }

    async function deletePlan(planId) {
      if (!confirm('삭제하시겠습니까?')) return;
      try {
        await apiSend(`planner/${encodeURIComponent(planId)}?student_id=${encodeURIComponent(studentId)}&pin=${encodeURIComponent(pin)}`, 'DELETE');
        toast('삭제되었습니다.');
        removePlannerPlan(planId);
        renderPlanner();
      } catch (e) {
        toast(e.message || '삭제 실패');
      }
    }

    function resetAuth() {
      authStore().removeItem(authKey());
      authStore().removeItem(pinKey());
      try {
        localStorage.removeItem('PLANNER_SID');
        localStorage.removeItem('PLANNER_PIN');
        sessionStorage.removeItem('PLANNER_SID');
        sessionStorage.removeItem('PLANNER_PIN');
      } catch (e) {}
      pin = '';
      student = null;
      plans = [];
      feedback = [];
      invalidatePlannerIndex();
      closePlannerTimer();
      renderPinGate();
    }

    window.addEventListener('resize', () => {
      clearTimeout(window.__resizeTimer);
      window.__resizeTimer = setTimeout(() => {
        if (student) renderPlanner();
      }, 150);
    });

    initPlanner();
  </script>
</body>
</html>
