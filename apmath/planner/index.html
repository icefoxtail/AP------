<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AP Math 플래너</title>
    <style>
        /* =========================================
           [Polish] Light Mode Palette (미니멀리즘)
           ========================================= */
        :root {
            --primary: #1A5CFF;
            --primary-dark: #0040D6;
            --secondary: #6B7684;
            --success: #00B894;
            --error: #E8414F;
            --warning: #F59F00;

            --bg: #F2F4F6;
            --surface: #FFFFFF;
            --surface-2: #F8FAFC;
            --surface-alpha: rgba(255,255,255,0.88);
            --border: #E5E8EB;
            /* 그림자 힘 빼기: 기존 0.04보다 더 부드럽고 가볍게 */
            --shadow: 0 2px 8px rgba(0,0,0,0.03);

            --text: #191F28;
            --text-soft: #333D4B;
        }

        /* =========================================
           [Polish] Dark Mode Palette (Grok's Soft Dark)
           ========================================= */
        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #0A84FF;      /* iOS Dark Blue */
                --primary-dark: #0070E0;
                --secondary: #6E6E73;    /* 차분한 보조 텍스트 */
                --success: #30D158;      /* iOS Dark Green */
                --error: #FF453A;        /* iOS Dark Red */
                --warning: #FF9F0A;      /* iOS Dark Orange */

                --bg: #121212;           /* Pure Black 탈출 -> 눈이 편안한 메인 배경 */
                --surface: #1A1A1C;      /* 카드, 모달 등 주 컨테이너 */
                --surface-2: #242427;    /* 입력창, 사이드바 등 보조 배경 */
                --surface-alpha: rgba(26,26,28,0.88);
                --border: #323238;       /* 은은하고 고급스러운 테두리 */
                
                /* 다크모드에서는 그림자 대신 테두리에 의존하여 미니멀리즘 극대화 */
                --shadow: none; 

                --text: #F5F5F7;         /* 너무 쨍하지 않은 화이트 */
                --text-soft: #A8A8AC;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background 0.2s, color 0.2s;
        }

        .top {
            position: sticky; top: 0; z-index: 100;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px; display: flex; justify-content: space-between; align-items: center;
        }
        
        .top h2 { margin: 0; font-size: 18px; font-weight: 700; color: var(--text); }
        
        .app { padding: 16px; max-width: 1040px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

        @media (min-width: 768px) {
            .app { flex-direction: row; align-items: flex-start; }
            .left-panel { width: 340px; flex: none; position: sticky; top: 80px; }
            .right-panel { flex: 1; overflow-y: auto; max-height: calc(100vh - 100px); padding-right: 8px; }
        }

        /* [Polish] 카드 미니멀리즘: 투명한 테두리 대신 1px 은은한 테두리로 질감 표현 */
        .card {
            background: var(--surface);
            color: var(--text);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border); 
            transition: background 0.2s, border 0.2s;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            min-height: 44px;
            line-height: 1.2;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 6px;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: #ffffff;
            border: none;
            box-shadow: 0 4px 12px rgba(26,92,255,0.25);
        }

        @media (prefers-color-scheme: dark) {
            .btn { background: var(--surface-2); }
            .btn-primary { background: var(--primary-dark); color: #ffffff; box-shadow: none; }
        }

        .btn-primary:active {
            background: var(--primary-dark);
            transform: scale(0.96);
        }

        .btn:active {
            background: var(--bg);
            transform: scale(0.96);
        }

        .hidden {
            display: none !important;
        }

        /* [Polish] 모달 오버레이 투명도 및 블러 효과 보정 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .modal-overlay:not(.hidden) {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--surface);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
        }

        .modal-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 16px; }

        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(25, 31, 40, 0.9); color: #fff; padding: 12px 24px;
            border-radius: 50px; font-size: 13px; font-weight: 700; z-index: 2000;
            transition: opacity 0.3s; pointer-events: none;
            opacity: 0;
        }

        .input { width: 100%; min-height: 44px; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); font-size: 14px; }
        
        .weekly-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 40;
            background: rgba(242,244,246,0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
        }
        
        @media (prefers-color-scheme: dark) {
            .weekly-bar { background: rgba(26,26,28,0.95); }
        }

        .weekly-bar-inner {
            display: flex;
            align-items: center;
            gap: 4px;
            max-width: 1040px;
            margin: 0 auto;
        }

        .week-day-btn {
            flex: 1;
            min-height: 52px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
        }

        .week-day-btn.today {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .week-day-btn.exam-day {
            border-color: var(--error);
            color: var(--error);
        }

        .week-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--success);
        }

        .week-nav-btn {
            width: 32px;
            min-height: 52px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: var(--text);
            flex-shrink: 0;
        }
        
        #mobile-fab { display: none; }

        @media (max-width: 767px) {
            .weekly-bar { display: block; }
            .app { padding-bottom: calc(140px + env(safe-area-inset-bottom)); }
            .d-none-mobile { display: none !important; }
            #mobile-fab { display: flex !important; }
        }

        @keyframes celebFade {
            0% { opacity:0; transform:scale(0.5); }
            30% { opacity:1; transform:scale(1.2); }
            100% { opacity:0; transform:scale(1); }
        }

    </style>
</head>
<body>

    <div class="top">
        <h2>AP Math 플래너</h2>
        <div>
            <span id="student-chip" style="font-size:13px; font-weight:700; color:var(--primary); margin-right:12px;"></span>
            <button class="btn" style="min-height:36px; padding:6px 12px; font-size:12px;" onclick="resetAuth()">로그아웃</button>
        </div>
    </div>

    <div id="app" class="app"></div>

    <div class="weekly-bar" id="weekly-bar">
      <div class="weekly-bar-inner" id="weekly-bar-inner"></div>
    </div>
    
    <!-- 모바일 FAB: 주간 바(weekly-bar) 위에 위치하도록 bottom 값을 충분히 할당 -->
    <button id="mobile-fab" class="btn btn-primary hidden" style="position:fixed; right:16px; bottom:calc(76px + env(safe-area-inset-bottom)); width:56px; height:56px; border-radius:50%; font-size:28px; box-shadow:0 4px 12px rgba(26,92,255,0.3); z-index:45; align-items:center; justify-content:center; padding:0;" onclick="openAddModal(selectedDate || todayStr())">+</button>

    <div id="modal-overlay" class="modal-overlay hidden" onclick="if(event.target===this) closeModal()">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title" style="margin:0; font-size:16px;">새 계획 추가</h3>
                <button class="btn" style="border:none; padding:4px; min-height:32px;" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom:12px;">
                    <label style="display:block; font-size:12px; font-weight:700; color:var(--secondary); margin-bottom:6px;">계획 내용</label>
                    <input type="text" id="plan-title" class="input" placeholder="학습할 내용 (예: 센수학 1단원)">
                </div>
                <div style="margin-bottom:12px;">
                    <label style="display:block; font-size:12px; font-weight:700; color:var(--secondary); margin-bottom:6px;">과목</label>
                    <select id="plan-subject" class="input">
                        <option value="수학">수학</option>
                        <option value="국어">국어</option>
                        <option value="영어">영어</option>
                        <option value="과학">과학</option>
                        <option value="사회">사회</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div id="repeat-rule-container" style="margin-bottom:20px;">
                    <label style="display:block; font-size:12px; font-weight:700; color:var(--secondary); margin-bottom:6px;">반복 설정 (선택)</label>
                    <select id="plan-repeat" class="input">
                        <option value="">반복 안 함 (해당 날짜만)</option>
                        <option value="daily">매일 반복 (시험까지)</option>
                        <option value="weekly">매주 반복 (시험까지)</option>
                    </select>
                </div>
                <button class="btn btn-primary" style="width:100%;" onclick="savePlan()">저장</button>
            </div>
        </div>
    </div>

    <!-- 시험 날짜 변경용 모달 -->
    <div id="exam-date-modal-overlay" class="modal-overlay hidden" onclick="if(event.target===this) closeExamDateModal()">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin:0; font-size:16px;">시험 날짜 변경</h3>
                <button class="btn" style="border:none; padding:4px; min-height:32px;" onclick="closeExamDateModal()">✕</button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom:16px;">
                    <label style="display:block; font-size:12px; font-weight:700; color:var(--secondary); margin-bottom:6px;">새 시험 날짜</label>
                    <input type="date" id="modal-exam-date" class="input">
                </div>
                <button class="btn btn-primary" style="width:100%;" onclick="saveExamDateFromModal()">저장</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script>
        const API_BASE = 'https://ap-math-os-v2612.js-pdf.workers.dev/api';
        
        let studentId = '';
        let pin = '';
        let student = null;
        let plans = [];
        let feedback = [];
        let selectedDate = todayStr();
        let examDate = '';
        let weekOffset = 0;
        let editPlanId = null;
        let editPlanUpdatedAt = null;

        const SUBJECT_COLORS = {
            '수학': '#1A5CFF',
            '영어': '#00B894',
            '국어': '#E8414F',
            '과학': '#F59F00',
            '사회': '#A855F7',
        };

        function $(id) { return document.getElementById(id); }
        
        function todayStr() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth()+1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }
        
        function formatDate(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth()+1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function escapeHtml(text) {
            return String(text || '').replace(/[&<>"']/g, function(m) {
                return {'&': '&amp;','<': '&lt;','>': '&gt;','"': '&quot;',"'": '&#39;'}[m];
            });
        }

        function toast(msg) {
            const t = $('toast');
            t.textContent = msg;
            t.classList.remove('hidden');
            t.style.opacity = '1';
            setTimeout(() => {
                t.style.opacity = '0';
                setTimeout(() => t.classList.add('hidden'), 300);
            }, 2500);
        }

        async function apiGet(path) {
            try { const r = await fetch(`${API_BASE}/${path}`); return await r.json(); } 
            catch(e) { return { error: e.message }; }
        }
        async function apiPost(path, data) {
            try { const r = await fetch(`${API_BASE}/${path}`, { method: 'POST', body: JSON.stringify(data), headers:{'Content-Type':'application/json'} }); return await r.json(); } 
            catch(e) { return { error: e.message }; }
        }
        async function apiPatch(path, data) {
            try { const r = await fetch(`${API_BASE}/${path}`, { method: 'PATCH', body: JSON.stringify(data), headers:{'Content-Type':'application/json'} }); return await r.json(); } 
            catch(e) { return { error: e.message }; }
        }
        async function apiDelete(path) {
            try { const r = await fetch(`${API_BASE}/${path}`, { method: 'DELETE' }); return await r.json(); } 
            catch(e) { return { error: e.message }; }
        }

        function init() {
            const params = new URLSearchParams(location.search);
            studentId = params.get('student_id') || sessionStorage.getItem('PLANNER_SID');
            pin = params.get('pin') || sessionStorage.getItem('PLANNER_PIN');

            if (!studentId || !pin) {
                renderAuth();
            } else {
                verifyPin();
            }
        }

        function renderAuth() {
            $('app').innerHTML = `
                <div class="card" style="max-width:360px; width: 100%; margin: 40px auto; text-align:center;">
                    <h2 style="margin:0 0 8px; font-size:18px;">플래너 접속</h2>
                    <p style="font-size:12px; color:var(--secondary); margin-bottom:20px;">선생님이 발급해준 링크와 PIN이 필요합니다.</p>
                    <input type="text" id="auth-sid" class="input" placeholder="Student ID" value="${studentId||''}" style="margin-bottom:10px;">
                    <input type="password" id="auth-pin" class="input" placeholder="PIN 번호 (4자리)" style="margin-bottom:16px;">
                    <button class="btn btn-primary" style="width:100%;" onclick="doAuth()">입장하기</button>
                </div>
            `;
            $('weekly-bar').classList.add('hidden');
            $('mobile-fab').classList.add('hidden');
        }

        async function doAuth() {
            const sid = $('auth-sid').value.trim();
            const p = $('auth-pin').value.trim();
            if(!sid || !p) return toast('입력값을 확인해주세요.');
            
            const res = await apiGet(`planner-auth?student_id=${encodeURIComponent(sid)}&pin=${encodeURIComponent(p)}`);
            if(res.success) {
                studentId = sid; pin = p;
                sessionStorage.setItem('PLANNER_SID', sid);
                sessionStorage.setItem('PLANNER_PIN', p);
                verifyPin();
            } else {
                toast('접속 실패. PIN을 확인하세요.');
            }
        }

        function resetAuth() {
            sessionStorage.removeItem('PLANNER_SID');
            sessionStorage.removeItem('PLANNER_PIN');
            studentId = ''; pin = ''; student = null; examDate = '';
            $('student-chip').textContent = '';
            renderAuth();
        }

        async function verifyPin() {
            $('app').innerHTML = `<div style="text-align:center; width:100%; padding:40px; color:var(--secondary); font-size:14px; font-weight:700;">불러오는 중...</div>`;
            await loadPlannerData();
            
            if (!examDate && (!student || !student.planner_exam_date)) {
                renderExamDateSetup();
                return;
            }
            if(student && student.planner_exam_date) examDate = student.planner_exam_date;
            
            $('weekly-bar').classList.remove('hidden');
            $('mobile-fab').classList.remove('hidden');
            renderPlanner();
        }

        function renderExamDateSetup() {
            $('app').innerHTML = `
                <div style="padding: 24px; max-width: 400px; width: 100%; margin: 0 auto;">
                    <div class="card" style="text-align:center;">
                        <h2 style="margin:0 0 8px; font-size:18px;">시험 날짜 설정</h2>
                        <p style="color:var(--secondary); font-size:13px; margin:0 0 20px;">본인의 시험 날짜를 입력하면 그날까지 계획을 세울 수 있어요.</p>
                        <input type="date" id="setup-exam-date" class="input" min="${todayStr()}" style="width:100%; margin-bottom:16px;">
                        <button class="btn btn-primary" style="width:100%;" onclick="saveExamDate()">저장</button>
                    </div>
                </div>
            `;
            $('weekly-bar').classList.add('hidden');
            $('mobile-fab').classList.add('hidden');
        }

        async function saveExamDate() {
            const dateVal = $('setup-exam-date').value;
            if (!dateVal) return toast('날짜를 선택해주세요.');
            
            const res = await apiPatch('planner/settings', { student_id: studentId, pin, planner_exam_date: dateVal });
            
            if (!res?.success) {
                toast(res?.error || res?.message || '저장 실패');
                return;
            }

            examDate = dateVal;
            toast('목표일이 설정되었습니다.');
            await loadPlannerData();
            
            $('weekly-bar').classList.remove('hidden');
            $('mobile-fab').classList.remove('hidden');
            renderPlanner();
        }

        function openExamDateModal() {
            $('modal-exam-date').value = examDate || todayStr();
            $('modal-exam-date').min = todayStr();
            $('exam-date-modal-overlay').classList.remove('hidden');
        }

        function closeExamDateModal() {
            $('exam-date-modal-overlay').classList.add('hidden');
        }

        async function saveExamDateFromModal() {
            const dateVal = $('modal-exam-date').value;
            if (!dateVal) return toast('날짜를 선택해주세요.');
            
            const res = await apiPatch('planner/settings', { student_id: studentId, pin, planner_exam_date: dateVal });
            if (!res?.success) {
                toast(res?.error || res?.message || '저장 실패');
                return;
            }

            examDate = dateVal;
            toast('시험 날짜가 변경되었습니다.');
            closeExamDateModal();
            await loadPlannerData();
            renderPlanner();
        }

        async function loadPlannerData() {
            const from = todayStr();
            const to = examDate || todayStr();
            const data = await apiGet(`planner?student_id=${encodeURIComponent(studentId)}&from=${from}&to=${to}&pin=${encodeURIComponent(pin)}`);
            plans = Array.isArray(data.plans) ? data.plans : [];
            feedback = Array.isArray(data.feedback) ? data.feedback : [];
            if (data.student) {
                student = data.student;
                if (student.name) $('student-chip').textContent = student.name;
                if (student.planner_exam_date) examDate = student.planner_exam_date;
            }
        }

        function getPlanDateMap() {
            const map = {};
            plans.forEach(p => {
                const d = p.plan_date;
                if(!map[d]) map[d] = { total: 0, done: 0 };
                map[d].total++;
                if(Number(p.is_done) === 1) map[d].done++;
            });
            return map;
        }

        function calcStreak() {
            let streak = 0;
            const d = new Date(todayStr() + 'T00:00:00');
            while (true) {
                const dateStr = formatDate(d);
                const dayPlans = plans.filter(p => p.plan_date === dateStr);
                if (!dayPlans.length) break;
                const allDone = dayPlans.every(p => Number(p.is_done) === 1);
                if (!allDone) break;
                streak++;
                d.setDate(d.getDate() - 1);
            }
            return streak;
        }

        function renderStats() {
            const streak = calcStreak();
            const doneCount = plans.filter(p => Number(p.is_done) === 1).length;
            const rate = plans.length ? Math.round((doneCount/plans.length)*100) : 0;
            
            return `
                <div class="grid" style="margin-bottom:20px;">
                    <div class="card" style="text-align:center; padding:12px;">
                        <div style="font-size:12px; color:var(--secondary); font-weight:700;">전체 실천율</div>
                        <div style="font-size:20px; font-weight:700; color:var(--primary); margin-top:4px;">${rate}%</div>
                    </div>
                    <div class="card" style="text-align:center; padding:12px;">
                        <div style="font-size:12px; color:var(--secondary); font-weight:700;">완료한 계획</div>
                        <div style="font-size:20px; font-weight:700; color:var(--text); margin-top:4px;">${doneCount}</div>
                    </div>
                    ${streak > 0 ? `
                    <div class="card" style="grid-column: span 2; text-align:center; padding:12px; border-color:rgba(255,159,10,0.3); background:rgba(255,159,10,0.05);">
                        <div style="font-size:12px; color:var(--warning); font-weight:700;">연속 달성</div>
                        <div style="font-size:20px; font-weight:700; color:var(--warning); margin-top:4px;">🔥 ${streak}일</div>
                    </div>` : ''}
                </div>
                <div style="text-align:right; margin-top:-4px; margin-bottom:4px;">
                  <button class="btn" style="min-height:32px; padding:4px 12px; font-size:12px;" onclick="openExamDateModal()">📅 시험 변경</button>
                </div>
            `;
        }

        function renderCalendar() {
            const d = new Date(selectedDate + 'T00:00:00');
            const year = d.getFullYear();
            const month = d.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const map = getPlanDateMap();
            
            let html = `<div class="card d-none-mobile" style="margin-bottom:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <button class="btn" style="padding:4px 10px; font-size:12px;" onclick="selectedDate=formatDate(new Date(${year}, ${month-1}, 1)); renderPlanner();">‹</button>
                    <div style="font-weight:700; font-size:15px;">${year}년 ${month+1}월</div>
                    <button class="btn" style="padding:4px 10px; font-size:12px;" onclick="selectedDate=formatDate(new Date(${year}, ${month+1}, 1)); renderPlanner();">›</button>
                </div>
                <div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:4px; text-align:center; font-size:12px; font-weight:700; color:var(--secondary); margin-bottom:8px;">
                    <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
                </div>
                <div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:4px; text-align:center;">`;
                
            for(let i=0; i<firstDay; i++) html += `<div></div>`;
            for(let i=1; i<=daysInMonth; i++) {
                const curStr = formatDate(new Date(year, month, i));
                const isSel = curStr === selectedDate;
                const isToday = curStr === todayStr();
                const isExam = curStr === examDate;
                const pInfo = map[curStr];
                
                let style = 'padding:6px; border-radius:10px; cursor:pointer; font-size:13px; font-weight:600; border:1px solid transparent; display:flex; flex-direction:column; align-items:center; gap:2px; min-height:40px;';
                if(isSel) style += 'background:var(--primary); color:#fff;';
                else if(isToday) style += 'background:rgba(26,92,255,0.1); color:var(--primary);';
                else if(isExam) style += 'border-color:var(--error); color:var(--error);';
                else style += 'background:var(--surface-2); color:var(--text);';
                
                const dot = (pInfo && pInfo.total > 0 && pInfo.done === pInfo.total) 
                    ? `<div style="width:4px; height:4px; background:var(${isSel?'--surface':'--success'}); border-radius:50%;"></div>` 
                    : `<div style="width:4px; height:4px;"></div>`;
                    
                html += `<div style="${style}" onclick="selectDate('${curStr}')"><span>${i}</span>${dot}</div>`;
            }
            html += `</div></div>`;
            return html;
        }

        function selectDate(dateStr) {
            selectedDate = dateStr;
            renderPlanner();
            setTimeout(() => {
                const el = document.getElementById(`date-section-${dateStr}`);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    const topH = document.querySelector('.top')?.offsetHeight || 60;
                    window.scrollBy(0, -(topH + 8));
                }
            }, 50);
        }

        function renderPlanPanel() {
            let html = '';
            const t = new Date(todayStr() + 'T00:00:00');
            const e = new Date((examDate || todayStr()) + 'T00:00:00');
            
            let cur = new Date(t);
            while(cur <= e) {
                const dateStr = formatDate(cur);
                const isToday = dateStr === todayStr();
                const isExam = dateStr === examDate;
                
                const dayPlans = plans.filter(p => p.plan_date === dateStr);
                const doneCount = dayPlans.filter(p => Number(p.is_done) === 1).length;
                
                let badge = '';
                if(isToday) badge = `<span style="font-size:11px; color:var(--primary); background:rgba(26,92,255,0.1); padding:2px 6px; border-radius:6px; margin-left:6px; vertical-align:middle;">오늘</span>`;
                if(isExam) badge += `<span style="font-size:11px; color:var(--error); background:rgba(255,71,87,0.1); padding:2px 6px; border-radius:6px; margin-left:6px; vertical-align:middle;">🎯 시험</span>`;
                
                let headerStyle = isExam ? 'border:1px solid rgba(255,71,87,0.3); padding:10px 12px; border-radius:12px; background:rgba(255,71,87,0.03);' : '';
                
                let headerText = `${cur.getMonth()+1}월 ${cur.getDate()}일 (${['일','월','화','수','목','금','토'][cur.getDay()]})`;
                let subText = dayPlans.length ? ` · ${dayPlans.length}개 중 ${doneCount}개 완료` : ` · 할 일 없음`;
                
                let listHtml = dayPlans.length 
                    ? dayPlans.map(p => renderPlanItem(p)).join('') 
                    : `<div style="padding:16px; text-align:center; color:var(--secondary); font-size:13px; font-weight:600; border:1px dashed var(--border); border-radius:12px;">등록된 계획이 없습니다.</div>`;

                html += `
                    <div id="date-section-${dateStr}" style="margin-bottom:32px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; ${headerStyle}">
                            <div style="font-weight:700; font-size:15px; display:flex; align-items:center;">
                                <span style="${isToday ? 'color:var(--primary);' : ''}">${headerText}</span>
                                <span style="color:var(--secondary); font-size:12px; font-weight:600; margin-left:4px;">${subText}</span>
                                ${badge}
                            </div>
                            <button class="btn d-none-mobile" style="min-height:32px; padding:4px 10px; font-size:12px; border-radius:8px;" onclick="openAddModal('${dateStr}')">+ 추가</button>
                        </div>
                        <div style="display:flex; flex-direction:column; gap:8px;">
                            ${listHtml}
                        </div>
                    </div>
                `;
                cur.setDate(cur.getDate() + 1);
            }
            return html;
        }

        function renderPlanItem(plan) {
            const isDone = Number(plan.is_done) === 1;
            const subjectColor = SUBJECT_COLORS[plan.subject] || 'var(--secondary)';
            return `
                <div class="card" style="padding:12px 14px; margin-bottom:0; display:flex; justify-content:space-between; align-items:center; gap:10px;">
                    <div style="display:flex; align-items:center; gap:12px; flex:1; min-width:0; cursor:pointer;" onclick="toggleDone('${plan.id}')">
                        <div style="width:24px; height:24px; border-radius:50%; border:2px solid ${isDone ? 'var(--success)' : 'var(--border)'}; background:${isDone ? 'var(--success)' : 'transparent'}; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:0.2s;">
                            ${isDone ? '<span style="color:#fff; font-size:12px; font-weight:700;">✓</span>' : ''}
                        </div>
                        <div style="min-width:0;">
                            <div style="font-size:14px; font-weight:700; color:${isDone ? 'var(--secondary)' : 'var(--text)'}; text-decoration:${isDone ? 'line-through' : 'none'}; word-break:break-word;">
                                ${escapeHtml(plan.title)}
                            </div>
                            <div style="font-size:12px; color:var(--secondary); font-weight:600; margin-top:4px;">
                                <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${subjectColor};margin-right:4px;vertical-align:middle;"></span>
                                ${escapeHtml(plan.subject || '수학')}
                                ${plan.repeat_rule ? ` · ${plan.repeat_rule === 'daily' ? '매일' : '매주'}` : ''}
                            </div>
                        </div>
                    </div>
                    <div style="display:flex; gap:6px; flex-shrink:0;">
                        <button class="btn" style="min-height:36px; padding:6px 10px; font-size:12px;" onclick="openEditModal('${plan.id}','${escapeHtml(plan.title)}','${escapeHtml(plan.subject||'')}','${plan.updated_at||''}')">수정</button>
                        <button class="btn" style="min-height:36px; padding:6px 10px; font-size:12px; color:var(--error); background:rgba(255,71,87,0.05); border-color:rgba(255,71,87,0.15);" onclick="deletePlan('${plan.id}')">삭제</button>
                    </div>
                </div>
            `;
        }

        function renderWeeklyBar() {
            const bar = $('weekly-bar-inner');
            if (!bar) return;

            const today = new Date(todayStr() + 'T00:00:00');
            const sunday = new Date(today);
            sunday.setDate(today.getDate() - today.getDay() + (weekOffset * 7));

            const days = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(sunday);
                d.setDate(sunday.getDate() + i);
                days.push(d);
            }

            const dayNames = ['일','월','화','수','목','금','토'];
            const planMap = getPlanDateMap();

            let html = `<button class="week-nav-btn" onclick="changeWeek(-1)">‹</button>`;

            for (const d of days) {
                const dateStr = formatDate(d);
                const isToday = dateStr === todayStr();
                const isExam = dateStr === examDate;
                const p = planMap[dateStr];
                const hasDot = p && p.total > 0 && p.done === p.total;

                let cls = 'week-day-btn';
                if (isToday) cls += ' today';
                else if (isExam) cls += ' exam-day';

                html += `
                <button class="${cls}" onclick="scrollToDate('${dateStr}')">
                    <span style="font-size:10px; opacity:0.75;">${dayNames[d.getDay()]}</span>
                    <span style="font-size:13px;">${d.getDate()}</span>
                    ${hasDot ? `<div class="week-dot"></div>` : `<div style="width:5px;height:5px;"></div>`}
                </button>`;
            }

            html += `<button class="week-nav-btn" onclick="changeWeek(1)">›</button>`;
            bar.innerHTML = html;
        }

        function changeWeek(dir) {
            weekOffset += dir;
            renderWeeklyBar();
        }

        function scrollToDate(dateStr) {
            selectedDate = dateStr;
            const el = document.getElementById(`date-section-${dateStr}`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                const topH = document.querySelector('.top')?.offsetHeight || 60;
                window.scrollBy(0, -(topH + 8));
            }
            renderWeeklyBar();
        }

        function renderPlanner() {
            $('app').innerHTML = `
                <div class="left-panel">
                    ${renderStats()}
                    ${renderCalendar()}
                </div>
                <div class="right-panel">
                    ${renderPlanPanel()}
                </div>
            `;
            renderWeeklyBar();
        }

        function openAddModal(dateStr) {
            selectedDate = dateStr;
            editPlanId = null;
            editPlanUpdatedAt = null;
            $('modal-title').textContent = '새 계획 추가';
            $('plan-title').value = '';
            $('plan-subject').value = '수학';
            if($('repeat-rule-container')) $('repeat-rule-container').style.display = 'block';
            $('modal-overlay').classList.remove('hidden');
        }

        function openEditModal(id, title, subject, updatedAt) {
            editPlanId = id;
            editPlanUpdatedAt = updatedAt;
            $('modal-title').textContent = '계획 수정';
            $('plan-title').value = title;
            $('plan-subject').value = subject;
            if($('repeat-rule-container')) $('repeat-rule-container').style.display = 'none';
            $('modal-overlay').classList.remove('hidden');
        }

        function closeModal() {
            $('modal-overlay').classList.add('hidden');
        }

        async function savePlan() {
            const title = $('plan-title').value.trim();
            const subject = $('plan-subject').value.trim();
            if(!title) return toast('내용을 입력하세요.');
            
            if(editPlanId) {
                const res = await apiPatch(`planner/${editPlanId}`, { 
                    student_id: studentId, 
                    pin, 
                    title, 
                    subject, 
                    updated_at: editPlanUpdatedAt 
                });
                if(!res.error) {
                    toast('수정되었습니다.');
                    closeModal();
                    await loadPlannerData();
                    renderPlanner();
                } else toast('수정 실패: ' + (res.error || '알 수 없는 오류'));
            } else {
                const repeatRule = $('plan-repeat') ? $('plan-repeat').value : '';
                const res = await apiPost('planner', { 
                    student_id: studentId, 
                    pin, 
                    plan_date: selectedDate, 
                    title, 
                    subject, 
                    repeat_rule: repeatRule, 
                    exam_date: examDate 
                });
                if(!res.error) {
                    toast('등록되었습니다.');
                    closeModal();
                    await loadPlannerData();
                    renderPlanner();
                } else toast('등록 실패');
            }
        }

        async function deletePlan(id) {
            if(!confirm('삭제할까요?')) return;
            const res = await apiDelete(`planner/${id}?student_id=${studentId}&pin=${pin}`);
            if(!res.error) {
                toast('삭제되었습니다.');
                await loadPlannerData();
                renderPlanner();
            } else toast('삭제 실패');
        }

        function showCelebration() {
            const el = document.createElement('div');
            el.style.cssText = `
                position:fixed; inset:0; display:flex; align-items:center;
                justify-content:center; z-index:9999; pointer-events:none;
                font-size:72px; animation:celebFade 1.5s ease forwards;
            `;
            el.textContent = '🎉';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1500);
        }

        async function toggleDone(id) {
            const plan = plans.find(p => p.id === id);
            if(!plan) return;
            
            const nextState = Number(plan.is_done) === 1 ? 0 : 1;
            plan.is_done = nextState; 
            renderPlanner();
            
            if (nextState === 1) {
                const dateStr = plan.plan_date;
                const dayPlans = plans.filter(p => p.plan_date === dateStr);
                const allDone = dayPlans.every(p => Number(p.is_done) === 1);
                if (allDone && dayPlans.length > 0) showCelebration();
            }

            const res = await apiPatch(`planner/${id}`, { student_id: studentId, pin, is_done: nextState });
            if(res.error) {
                plan.is_done = nextState === 1 ? 0 : 1; 
                renderPlanner();
                toast('상태 변경 실패');
            } else {
                await loadPlannerData();
                renderPlanner();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
