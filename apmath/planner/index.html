<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AP MATH 플래너</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AP 플래너">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --primary: #1A5CFF;
            --primary-soft: rgba(26,92,255,0.07);
            --secondary: #8B95A1;
            --success: #00B894;
            --error: #E8414F;
            --bg: #F2F4F6;
            --surface: #FFFFFF;
            --surface-soft: #F8FAFC;
            --border: #E5E8EB;
            --text: #191F28;
            --text-soft: #4E5968;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.035);
            --safe-bottom: env(safe-area-inset-bottom, 0px);

            --subj-math-bg: rgba(26,92,255,0.07);
            --subj-math-text: #1A5CFF;
            --subj-eng-bg: rgba(245,159,0,0.10);
            --subj-eng-text: #D97706;
            --subj-kor-bg: rgba(232,65,79,0.08);
            --subj-kor-text: #D92D3A;
            --subj-sci-bg: rgba(0,184,148,0.09);
            --subj-sci-text: #008F72;
            --subj-soc-bg: rgba(124,58,237,0.08);
            --subj-soc-text: #6D28D9;
            --subj-etc-bg: rgba(107,118,132,0.10);
            --subj-etc-text: #6B7684;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #0A84FF;
                --primary-soft: rgba(10,132,255,0.14);
                --secondary: #7B7B80;
                --success: #30D158;
                --error: #FF453A;
                --bg: #121212;
                --surface: #1C1C1E;
                --surface-soft: #242427;
                --border: #2C2C2E;
                --text: #F5F5F7;
                --text-soft: #A1A1A6;
                --shadow-sm: none;

                --subj-math-bg: rgba(10,132,255,0.14);
                --subj-math-text: #64A9FF;
                --subj-eng-bg: rgba(255,159,10,0.14);
                --subj-eng-text: #FFB84D;
                --subj-kor-bg: rgba(255,69,58,0.13);
                --subj-kor-text: #FF7A73;
                --subj-sci-bg: rgba(48,209,88,0.13);
                --subj-sci-text: #67D982;
                --subj-soc-bg: rgba(159,122,234,0.14);
                --subj-soc-text: #B99AFF;
                --subj-etc-bg: rgba(142,142,147,0.14);
                --subj-etc-text: #A1A1A6;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { min-height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: var(--surface);
            color: var(--text);
            line-height: 1.45;
            overscroll-behavior-y: contain;
        }

        .top {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.92);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 0 16px;
            height: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (prefers-color-scheme: dark) { .top { background: rgba(28,28,30,0.92); } }
        .top-left { display:flex; align-items:center; gap:6px; min-width: 0; }
        .top h2 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; }
        #student-chip { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .top-status { display:flex; align-items:center; gap:12px; font-size:13px; font-weight:700; flex-shrink: 0; }
        .top-status button { border:0; background:transparent; padding:0; font:inherit; cursor:pointer; }
        #top-dday { color:var(--primary); }
        .top-rate { color:var(--secondary); }

        .app {
            width: 100%;
            max-width: 1080px;
            margin: 0 auto;
            padding: 0 0 calc(92px + var(--safe-bottom));
            display: grid;
            grid-template-columns: 1fr;
        }
        @media (min-width: 800px) {
            body { background: var(--bg); }
            .app { grid-template-columns: 280px minmax(0, 1fr); align-items: start; padding: 24px 16px; gap: 24px; }
            .side-panel { position: sticky; top: 80px; }
            .main-panel { background: var(--surface); border-radius: 16px; padding: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
            .top { border-bottom: none; background: transparent; backdrop-filter: none; -webkit-backdrop-filter: none; }
        }

        .side-panel { min-width: 0; }
        @media (max-width: 799px) { .side-panel { display:none; } }
        .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 10px; text-align: center; }
        .stat-card .val { font-size: 20px; font-weight: 800; color: var(--primary); line-height: 1.1; }
        .stat-card .lbl { font-size: 11px; color: var(--secondary); font-weight: 650; margin-top: 4px; }
        .exam-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .exam-title { font-size: 11px; color: var(--secondary); font-weight: 700; }
        .exam-value { font-size: 14px; color: var(--text); font-weight: 700; margin-top: 4px; }

        /* [수정본] 3단계 학습 보조 UI 스타일 */
        .learning-assist-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-top: 16px; }
        .assist-stats { display: flex; gap: 8px; margin-bottom: 12px; }
        .assist-stat-box { flex: 1; background: var(--surface-soft); border-radius: 10px; padding: 10px; text-align: center; border: 1px solid var(--border); }
        .assist-stat-val { font-size: 16px; font-weight: 800; color: var(--text); }
        .assist-stat-lbl { font-size: 11px; font-weight: 700; color: var(--secondary); margin-top: 2px; }
        .assist-subj-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .assist-subj-chip { font-size: 10px; font-weight: 750; padding: 3px 6px; border-radius: 6px; line-height: 1.2; background: var(--surface-soft); color: var(--secondary); }
        .mobile-assist-card { display: none; margin: 16px 16px 0; }
        @media (max-width: 799px) { .mobile-assist-card { display: block; } }

        .review-card { display: flex; flex-direction: column; gap: 4px; background: var(--surface-soft); border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-bottom: 6px; cursor: pointer; transition: background 0.15s; }
        .review-card:active { background: var(--border); }
        .review-card-top { display: flex; align-items: center; gap: 6px; }
        .review-d-badge { font-size: 10px; font-weight: 800; color: var(--primary); background: var(--primary-soft); padding: 2px 5px; border-radius: 4px; }
        .review-card-title { font-size: 13px; font-weight: 650; color: var(--text); }

        .pomodoro-start-box { background: var(--surface-soft); border-radius: 12px; padding: 10px; margin-top: 12px; border: 1px solid var(--border); }
        .pomodoro-mini { position: fixed; left: 16px; right: 16px; bottom: calc(82px + var(--safe-bottom)); z-index: 1100; max-width: 520px; margin: 0 auto; background: rgba(255,255,255,0.96); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 12px 32px rgba(0,0,0,0.16); padding: 10px 12px; display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 10px; align-items: center; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
        @media (prefers-color-scheme: dark) { .pomodoro-mini { background: rgba(28,28,30,0.96); } }
        .pomodoro-mini-main { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
        .pomodoro-mini-title { font-size: 11px; font-weight: 800; color: var(--secondary); line-height: 1.2; }
        .pomodoro-mini-plan { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pomodoro-mini-time { font-size: 22px; font-weight: 800; color: var(--primary); font-variant-numeric: tabular-nums; line-height: 1; }
        .pomodoro-mini-actions { display: flex; align-items: center; gap: 6px; }
        .pomodoro-mini-btn { min-height: 34px; padding: 0 10px; border-radius: 10px; font-size: 12px; font-weight: 800; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-family: inherit; }
        .pomodoro-mini-btn.primary { border-color: transparent; background: var(--primary); color: #fff; }
        .pomodoro-mini-btn.danger { border-color: rgba(232,65,79,0.28); color: var(--error); background: rgba(232,65,79,0.08); }
        .pomodoro-mini-close { width: 30px; min-height: 34px; padding: 0; border-radius: 10px; }

        .week-shell { padding: 0 16px; }
        .week-nav-row { display: flex; align-items: center; justify-content: center; gap: 18px; padding: 7px 0 0; color: var(--secondary); font-size: 12px; font-weight: 700; }
        .week-nav-row button { border: 0; background: transparent; color: inherit; font: inherit; padding: 4px 6px; cursor: pointer; }
        .week-strip { display: flex; padding: 10px 0; border-bottom: 1px solid var(--border); justify-content: space-between; }
        .day-pill { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 0; border: 0; background: transparent; color: var(--secondary); font-family: inherit; cursor: pointer; position: relative; min-width: 0; }
        .day-name { font-size: 10px; font-weight: 600; color: var(--secondary); line-height: 1.1; }
        .day-num { font-size: 14px; font-weight: 700; line-height: 1.1; color: var(--text); position: relative; padding-top: 4px; }
        .day-count { font-size: 11px; font-weight: 600; color: var(--secondary); min-height: 13px; line-height: 1.1; }
        .day-pill.is-today .day-name, .day-pill.is-today .day-num { color: var(--primary); }
        .day-pill.selected .day-num { border-bottom: 2px solid var(--primary); padding-bottom: 2px; }

        .subject-strip { display: flex; gap: 16px; padding: 0 16px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .subject-strip::-webkit-scrollbar { display: none; }
        .subject-pill { font-size: 13px; font-weight: 600; color: var(--secondary); padding: 12px 2px; cursor: pointer; border: none; background: transparent; white-space: nowrap; }
        .subject-pill.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .notebook { padding: 0 16px; background: transparent; }
        .section-title { margin: 18px 16px 6px; display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: 700; color: var(--text); }
        .section-title small { font-size: 12px; font-weight: 600; color: var(--secondary); margin-left: 6px; }
        .day-add { border: none; background: transparent; color: var(--secondary); font-size: 16px; padding: 0 4px; cursor: pointer; }
        .date-block .date-header { display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-weight: 600; color: var(--secondary); padding: 18px 0 6px; }
        .date-block.is-today .date-header { display: none; }

        .plan-row { display: flex; align-items: flex-start; gap: 10px; min-height: 36px; padding: 8px 0; border-top: 1px solid var(--border); }
        .plan-row.carry-row { background: var(--surface-soft); border-radius: 6px; padding: 8px; border-top: none; margin-bottom: 4px; }
        .chk-wrapper { flex: 0 0 18px; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
        .chk-input { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--border); background: transparent; margin: 0; cursor: pointer; position: relative; transition: all .15s ease; }
        .chk-input:checked { background: var(--primary); border-color: var(--primary); }
        .chk-input:checked::after { content: ''; position: absolute; top: 4px; left: 4px; width: 8px; height: 4px; border: 1.5px solid #fff; border-top: none; border-right: none; transform: rotate(-45deg); }
        .plan-content { flex: 1; min-width: 0; cursor: pointer; display: flex; flex-direction: column; }
        .plan-title { font-size: 13px; font-weight: 600; color: var(--text); word-break: break-word; line-height: 1.4; transition: opacity 0.15s ease; }
        .subject-tag { display: inline-flex; align-items: center; width: fit-content; max-width: 100%; margin-top: 3px; padding: 1px 5px; border-radius: 5px; font-size: 10px; font-weight: 650; line-height: 1.35; background: var(--subj-etc-bg); color: var(--subj-etc-text); }
        .subject-tag.subj-math { background: var(--subj-math-bg); color: var(--subj-math-text); }
        .subject-tag.subj-eng { background: var(--subj-eng-bg); color: var(--subj-eng-text); }
        .subject-tag.subj-kor { background: var(--subj-kor-bg); color: var(--subj-kor-text); }
        .subject-tag.subj-sci { background: var(--subj-sci-bg); color: var(--subj-sci-text); }
        .subject-tag.subj-soc { background: var(--subj-soc-bg); color: var(--subj-soc-text); }
        .subject-tag.subj-etc { background: var(--subj-etc-bg); color: var(--subj-etc-text); }
        .carry-badge { background: var(--border); color: var(--secondary); font-size: 9px; padding: 2px 4px; border-radius: 4px; margin-right: 4px; vertical-align: middle; }
        .plan-row.done { opacity: 0.38; }
        .plan-row.done .plan-title { text-decoration: none; }
        .roll-btn { background: transparent; border: none; color: var(--primary); font-size: 11px; font-weight: 700; padding: 4px; margin: -4px; cursor: pointer; }

        .inline-add-row { display: flex; align-items: center; gap: 10px; min-height: 36px; margin: 2px -6px 0; padding: 8px 6px; border-radius: 8px; border-top: none; background: var(--primary-soft); }
        .inline-add-row .chk-wrapper span { width: 18px; height: 18px; border: 1px solid var(--border); border-radius: 50%; display: block; background: var(--surface); }
        .inline-add-input { flex: 1; border: none; background: transparent; color: var(--text); font-size: 13px; font-weight: 600; padding: 0; outline: none; font-family: inherit; }
        .inline-add-input::placeholder { color: var(--primary); opacity: 0.65; }
        .inline-save { border:0; background:transparent; color:var(--primary); font-size:12px; font-weight:700; padding:0 4px; cursor:pointer; }

        .floating-add { position: fixed; right: 18px; bottom: calc(18px + var(--safe-bottom)); z-index: 90; width: 52px; height: 52px; border-radius: 50%; background: var(--primary); color: #fff; border: none; font-size: 26px; font-weight: 300; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 16px rgba(26,92,255,0.3); cursor: pointer; transition: transform 0.1s ease; }
        .floating-add:active { transform: scale(0.92); }

        .planner-view-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin: 14px 16px 0; padding: 4px; border-radius: 14px; background: var(--surface-soft); border: 1px solid var(--border); }
        .planner-view-tab { height: 38px; border: 0; border-radius: 10px; background: transparent; color: var(--secondary); font-size: 12px; font-weight: 800; font-family: inherit; cursor: pointer; }
        .planner-view-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }
        .planner-view-body { padding-top: 4px; }
        .planner-table-card { margin: 12px 16px 0; border: 1px solid var(--border); border-radius: 16px; background: var(--surface); overflow: hidden; box-shadow: var(--shadow-sm); }
        .planner-table-scroll { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .planner-week-table { width: 100%; min-width: 660px; border-collapse: collapse; table-layout: fixed; }
        .planner-week-table th, .planner-week-table td { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); vertical-align: top; }
        .planner-week-table th:last-child, .planner-week-table td:last-child { border-right: 0; }
        .planner-week-table tr:last-child td { border-bottom: 0; }
        .planner-week-table thead th { height: 42px; background: var(--surface-soft); color: var(--secondary); font-size: 11px; font-weight: 800; text-align: center; white-space: nowrap; }
        .planner-week-table .subject-head { width: 58px; min-width: 58px; position: sticky; left: 0; z-index: 4; background: var(--surface-soft); color: var(--text); border-right: 2px solid var(--border); }
        .planner-week-table .subject-cell { position: sticky; left: 0; z-index: 3; width: 58px; min-width: 58px; background: var(--surface); color: var(--text); font-size: 13px; font-weight: 800; text-align: center; vertical-align: middle; border-right: 2px solid var(--border); }
        .planner-week-day { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; min-height: 42px; }
        .planner-week-day .date { color: var(--text); font-size: 13px; line-height: 1.1; }
        .planner-week-day .dow { color: var(--secondary); font-size: 10px; line-height: 1.1; }
        .planner-week-day.today .date, .planner-week-day.today .dow { color: var(--primary); }
        
        .planner-cell { min-height: 76px; padding: 6px; cursor: pointer; background: var(--surface); transition: background-color 0.15s; }
        .planner-cell.today { background: rgba(26,92,255,0.035); }
        .planner-cell.selected { box-shadow: inset 0 0 0 1.5px rgba(26,92,255,0.4); }
        .planner-cell.selected.today { box-shadow: inset 0 0 0 1.5px rgba(26,92,255,0.4); background: rgba(26,92,255,0.035); }
        .planner-cell.empty { color: var(--border); }
        .planner-cell-add { width: 100%; height: 100%; min-height: 58px; display: flex; align-items: center; justify-content: center; color: var(--border); font-size: 15px; font-weight: 800; border-radius: 10px; }
        .planner-cell:active .planner-cell-add { background: var(--surface-soft); }
        .planner-chip { display: flex; align-items: center; gap: 4px; width: 100%; min-height: 24px; margin-bottom: 4px; padding: 4px 6px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface-soft); color: var(--text); font-size: 11px; font-weight: 700; line-height: 1.25; text-align: left; cursor: pointer; overflow: hidden; }
        .planner-chip.done { opacity: .42; }
        .planner-chip .txt { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .planner-chip.subj-math { background: var(--subj-math-bg); color: var(--subj-math-text); border-color: transparent; }
        .planner-chip.subj-eng { background: var(--subj-eng-bg); color: var(--subj-eng-text); border-color: transparent; }
        .planner-chip.subj-kor { background: var(--subj-kor-bg); color: var(--subj-kor-text); border-color: transparent; }
        .planner-chip.subj-sci { background: var(--subj-sci-bg); color: var(--subj-sci-text); border-color: transparent; }
        .planner-chip.subj-soc { background: var(--subj-soc-bg); color: var(--subj-soc-text); border-color: transparent; }
        .planner-more { font-size: 11px; font-weight: 700; color: var(--primary); background: transparent; border: none; padding: 2px 4px; cursor: pointer; display: block; margin-top: 2px; }
        
        .planner-month-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 16px 0; }
        .planner-month-title { font-size: 15px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
        .planner-month-actions { display:flex; align-items:center; gap:8px; }
        .planner-month-actions button { border:0; background:transparent; color:var(--secondary); font-size:13px; font-weight:800; padding:5px 8px; cursor:pointer; }
        .planner-month-ledger { width: max-content; min-width: 100%; border-collapse: collapse; table-layout: fixed; }
        .planner-month-ledger th, .planner-month-ledger td { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); text-align: center; }
        .planner-month-ledger thead th { position: sticky; top: 0; z-index: 5; background: var(--surface); box-shadow: 0 1px 0 var(--border); padding: 5px 0; }
        .planner-month-ledger .month-subject-head, .planner-month-ledger .month-subject-cell { position: sticky; left: 0; z-index: 6; width: 58px; min-width: 58px; background: var(--surface); border-right: 2px solid var(--border) !important; font-size: 12px; font-weight: 800; color: var(--text); }
        .planner-month-ledger .month-subject-head { color: var(--secondary); z-index: 7; }
        .planner-month-ledger .month-day-head { width: 44px; min-width: 44px; color: var(--secondary); }
        .planner-month-ledger .month-day-head.sun { color: #e53935; }
        .planner-month-ledger .month-day-head.sat { color: #1565c0; }
        
        .planner-month-cell { width: 44px; min-width: 44px; height: 44px; padding: 3px; vertical-align: middle; cursor: pointer; background: var(--surface); transition: background-color 0.15s; }
        .planner-month-cell.has-plan { background: rgba(26,92,255,0.025); }
        .planner-month-cell.today { background: rgba(26,92,255,0.045); }
        .planner-month-cell.selected { box-shadow: inset 0 0 0 1.5px rgba(26,92,255,0.4); }
        .planner-month-cell.selected.today { box-shadow: inset 0 0 0 1.5px rgba(26,92,255,0.4); background: rgba(26,92,255,0.045); }
        
        .planner-month-cell-inner { min-height: 36px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; border-radius: 8px; }
        .planner-month-dot { width: 6px; height: 6px; border-radius: 999px; display: inline-block; background: var(--primary); }
        .planner-month-count { font-size: 10px; font-weight: 800; color: var(--text); line-height: 1; }
        .planner-month-title-mini { border:0; background:transparent; padding:0; font-family:inherit; cursor:pointer; width: 100%; max-width: 38px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 10px; font-weight: 800; line-height: 1.15; color: var(--text); }
        
        @media (max-width: 799px) {

        function addDays(str, days) { const d = dateObj(str); d.setDate(d.getDate() + days); return formatDate(d); }
        function getWeekStart(str) {
            const d = dateObj(str);
            const day = d.getDay();
            const diff = day === 0 ? -6 : 1 - day;
            d.setDate(d.getDate() + diff);
            return formatDate(d);
        }
        function getWeekDates(start = currentWeekStart) { return Array.from({ length: 7 }, (_, i) => addDays(start, i)); }

            const saved = window.localStorage?.getItem(PLANNER_VIEW_KEY);
            if (['weekly','monthly','list'].includes(saved)) return saved;
            return window.matchMedia && window.matchMedia('(min-width: 1200px)').matches ? 'monthly' : 'weekly';

        function getMonthEnd(str = selectedDate) {
            const base = dateObj(getMonthStart(str));
            const end = new Date(base.getFullYear(), base.getMonth() + 1, 0);
            return formatDate(end);
        }
        function getMonthLabel(str = selectedDate) {
            const d = dateObj(getMonthStart(str));
            return `${d.getFullYear()}년 ${d.getMonth() + 1}월`;

            const d = dateObj(getMonthStart(selectedDate));
            d.setMonth(d.getMonth() + delta);

            inlineAddDate = null;
            loadPlannerData().then(renderPlanner);

            const d = dateObj(str);
            return `${d.getMonth() + 1}/${d.getDate()}(${['일','월','화','수','목','금','토'][d.getDay()]})`;
        }
        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
        }
        function escapeJs(value) { return String(value ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, ''); }
        function isDone(p) { return Number(p.is_done) === 1; }

            const s = String(subject || '수학').trim();

            return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

            const ua = window.navigator.userAgent || '';
            const isIos = /iphone|ipad|ipod/i.test(ua);
            const isSafari = /safari/i.test(ua) && !/crios|fxios|edgios|kakaotalk|naver/i.test(ua);

        async function doAuth() {
            const name = $('auth-name')?.value.trim() || '';
            const p = $('auth-pin')?.value.trim() || '';
            if (!name || !p) return toast('학생 이름과 PIN을 입력하세요.');

            const res = await apiPost('planner-auth-by-name', { name, pin: p });
            if (res.success && res.student?.id) {
                studentId = String(res.student.id);
                pin = p;
                student = res.student;
                authStore().setItem('PLANNER_SID', studentId);
                authStore().setItem('PLANNER_PIN', p);
                sessionStorage.setItem('PLANNER_SID', studentId);
                sessionStorage.setItem('PLANNER_PIN', p);
                await verifyPin();
                return;
            }

            toast(res.message || res.error || '이름 또는 PIN을 확인하세요.');
        }

        function resetAuth() {
            authStore().removeItem('PLANNER_SID'); authStore().removeItem('PLANNER_PIN'); authStore().removeItem('PLANNER_SUBJECT');
            sessionStorage.removeItem('PLANNER_SID'); sessionStorage.removeItem('PLANNER_PIN'); sessionStorage.removeItem('PLANNER_SUBJECT');
            location.reload();
        }
        
        async function verifyPin() {
            if (!studentId || !pin) { renderAuth(); return; }
            const res = await apiGet(`planner-auth?student_id=${encodeURIComponent(studentId)}&pin=${encodeURIComponent(pin)}`);
            if (!res.success) {
                authStore().removeItem('PLANNER_SID'); authStore().removeItem('PLANNER_PIN');
                sessionStorage.removeItem('PLANNER_SID'); sessionStorage.removeItem('PLANNER_PIN');
                studentId = ''; pin = ''; toast('다시 로그인해주세요.'); renderAuth(); return;
            }
            await loadPlannerData();
            renderPlanner();
        }

        async function loadPlannerData() {
            const weekDates = getWeekDates(currentWeekStart);
            const today = todayStr();
            const yesterday = addDays(today, -1);
            const monthStart = getMonthStart(selectedDate);
            const monthEnd = getMonthEnd(selectedDate);
            let from = [addDays(weekDates[0], -1), yesterday, monthStart].sort()[0];
            let to = [weekDates[6], today, monthEnd].sort().slice(-1)[0];
            
            // [수정본] 미완료 누적 및 복습 조회를 위해 D-7까지 커버하도록 from 조정
            const past7DayStart = addDays(today, -7);
            if (dateObj(past7DayStart) < dateObj(from)) from = past7DayStart;

            const data = await apiGet(`planner?student_id=${encodeURIComponent(studentId)}&from=${from}&to=${to}&pin=${encodeURIComponent(pin)}`);
            plans = Array.isArray(data.plans) ? data.plans : [];
            feedback = Array.isArray(data.feedback) ? data.feedback : [];
            if (data.student) {
                student = data.student;
                const chip = $('student-chip');
                if (chip) chip.textContent = student.name || '';
                examDate = student.planner_exam_date || examDate || '';
            }
        }

        // [수정본] 3단계 오늘/이번 주 요약 UI 생성
        function renderLearningAssistSummary(weekDates) {
            const today = todayStr();
            const todayPlansAll = plans.filter(p => p.plan_date === today);
            const todayDone = todayPlansAll.filter(isDone).length;
            const todayTotal = todayPlansAll.length;
            
            const weekPlanSet = new Set(weekDates);
            const weekPlansAll = plans.filter(p => weekPlanSet.has(p.plan_date));
            const weekDone = weekPlansAll.filter(isDone).length;
            const weekTotal = weekPlansAll.length;

            const subjectsToTrack = [...PLANNER_TABLE_SUBJECTS, '기타'];
            const subjStats = subjectsToTrack.map(subj => {
                const subjPlans = weekPlansAll.filter(p => planSubject(p) === subj);
                if (subjPlans.length === 0) return null;
                const sDone = subjPlans.filter(isDone).length;
                return `<span class="assist-subj-chip">${subj} ${sDone}/${subjPlans.length}</span>`;
            }).filter(Boolean).join('');

            return `
                <div class="learning-assist-card">
                    <div class="assist-stats">
                        <div class="assist-stat-box"><div class="assist-stat-val">${todayDone}/${todayTotal}</div><div class="assist-stat-lbl">오늘 완료</div></div>
                        <div class="assist-stat-box"><div class="assist-stat-val">${weekDone}/${weekTotal}</div><div class="assist-stat-lbl">이번 주 완료</div></div>
                    </div>
                    ${subjStats ? `<div class="assist-subj-row">${subjStats}</div>` : ''}
                </div>
            `;
        }

        function renderFeedbackBanner() {
            const f = feedback.find(x => String(x.feedback_date) === todayStr());
            if (!f) return '';
            const badge = f.badge ? `<span style="font-size:13px; margin-right:4px;">${escapeHtml(f.badge)}</span>` : '';
            return `<div class="feedback-banner"><div class="feedback-title">${badge}담임 피드백</div><div class="feedback-text">${escapeHtml(f.teacher_comment || '')}</div></div>`;
        }

        function hashCoachSeed(text) {
            let hash = 0;
            const raw = String(text || '');
            for (let i = 0; i < raw.length; i++) hash = ((hash << 5) - hash + raw.charCodeAt(i)) | 0;
            return Math.abs(hash);
        }

        function normalizeCoachTitle(title) {
            return String(title || '').toLowerCase().replace(/\s+/g, ' ').replace(/[^a-z0-9가-힣\s]/gi, '').trim();
        }

        function getPlannerCoachWorkingPlans() {
            const focusDate = selectedDate || todayStr();
            const visible = plans.filter(p => p.plan_date === focusDate && (activeSubject === '전체' || planSubject(p) === activeSubject))
                .map(p => ({ ...p, title: String(p.title || '').trim() }));

            const modalTitle = $('plan-title')?.value.trim() || '';
            const modalSubject = $('plan-subject')?.value || (activeSubject === '전체' ? '수학' : activeSubject);
            if (modalTitle) {
                if (editPlanId) {
                    const found = visible.find(p => String(p.id) === String(editPlanId));
                    if (found) {
                        found.title = modalTitle;
                        found.subject = modalSubject;
                    } else {
                        visible.push({ id: `draft-${editPlanId}`, plan_date: focusDate, title: modalTitle, subject: modalSubject, is_done: 0 });
                    }
                } else {
                    visible.push({ id: 'draft-new', plan_date: focusDate, title: modalTitle, subject: modalSubject, is_done: 0 });
                }
            }

            const inlineTitle = $('inline-add-input')?.value.trim() || '';
            if (inlineTitle) {
                visible.push({
                    id: 'draft-inline',
                    plan_date: focusDate,
                    title: inlineTitle,
                    subject: activeSubject === '전체' ? '수학' : activeSubject,
                    is_done: 0
                });
            }

            return visible.filter(p => String(p.title || '').trim());
        }

        function isVagueCoachPlan(title) {
            const text = String(title || '').trim();
            if (!text) return false;
            const normalized = text.replace(/\s+/g, '');
            const vagueWords = ['공부', '공부하기', '복습', '숙제', '문제풀기', '문제 풀기', '준비', '암기'];
            const hasConcreteHint = /(\d+|p\.|P\.|쪽|번|문제|분|시간)/.test(text);
            return vagueWords.some(word => normalized === word.replace(/\s+/g, '') || normalized.startsWith(word.replace(/\s+/g, ''))) && !hasConcreteHint;
        }

        function isHeavyCoachPlan(title) {
            const text = String(title || '').trim();
            return text.length >= 35 || /(전체 복습|다 풀기|전범위|전부|모두|기출\s*\d+회독)/.test(text);
        }

        function detectRepeatLeft(plansForCoach) {
            const incompleteFocus = plansForCoach.filter(p => !isDone(p));
            if (!incompleteFocus.length) return false;
            const focusTitles = new Set(incompleteFocus.map(p => normalizeCoachTitle(p.title)).filter(Boolean));
            if (!focusTitles.size) return false;
            const recentIncomplete = plans.filter(p => Number(p.is_done || 0) !== 1)
                .map(p => normalizeCoachTitle(p.title))
                .filter(Boolean);
            return [...focusTitles].some(title => recentIncomplete.filter(item => item === title).length >= 2);
        }

        function getPlannerCoachSnapshot() {
            const focusDate = selectedDate || todayStr();
            const items = getPlannerCoachWorkingPlans();
            const total = items.length;
            const done = items.filter(isDone).length;
            const undone = total - done;
            const rate = total ? Math.round((done / total) * 100) : 0;
            const hour = new Date().getHours();
            const allTitles = items.map(item => String(item.title || '').trim()).filter(Boolean);
            const vagueOnly = allTitles.length > 0 && allTitles.every(isVagueCoachPlan);
            const heavyItem = total > 0 && total <= 5 && allTitles.some(isHeavyCoachPlan);
            const repeatLeft = detectRepeatLeft(items);
            return { focusDate, items, total, done, undone, rate, hour, vagueOnly, heavyItem, repeatLeft };
        }

        function getPlannerCoachMainState(snapshot) {
            if (!snapshot.total) return 'empty';
            if (snapshot.total >= 6 || snapshot.undone >= 5) return 'too_many';
            if (snapshot.vagueOnly) return 'vague';
            if (snapshot.heavyItem) return 'heavy_item';
            if (snapshot.repeatLeft) return 'repeat_left';
            if (snapshot.hour >= 18 && (snapshot.total >= 5 || snapshot.undone >= 4) && snapshot.done <= 1) return 'reset_evening';
            if ((snapshot.total >= 3 && snapshot.done === 0) || (snapshot.total >= 3 && snapshot.rate < 30)) return 'low_progress';
            if (snapshot.rate >= 60 && snapshot.total >= 2) return 'good_progress';
            return 'good';
        }

        function getPlannerCoachMessage(stateKey) {
            const bucket = PLANNER_COACH_MESSAGES[stateKey] || PLANNER_COACH_MESSAGES.balanced_cheer;
            if (plannerCoachState.mainState !== stateKey) {
                plannerCoachState.mainState = stateKey;
                plannerCoachState.variantIndex = hashCoachSeed(`${stateKey}|${selectedDate}|${studentId}`) % bucket.length;
            }
            return bucket[plannerCoachState.variantIndex] || bucket[0];
        }

        function computePlannerCoachResult() {
            const snapshot = getPlannerCoachSnapshot();
            const mainState = getPlannerCoachMainState(snapshot);
            const message = getPlannerCoachMessage(mainState);
            let subLine = '';
            if (snapshot.hour >= 22) {
                const night = PLANNER_COACH_MESSAGES.time_night[0];
                subLine = night.status;
            }
            return { mainState, message, subLine };
        }

        function renderPlannerCoach() {
            const result = computePlannerCoachResult();
            return `
                <div class="planner-coach-card">
                    <div class="planner-coach-title">AI 코치</div>
                    <div class="planner-coach-line">${escapeHtml(result.message.status)}</div>
                    <div class="planner-coach-line">${escapeHtml(result.message.action)}</div>
                    <div class="planner-coach-line">${escapeHtml(result.message.cheer)}</div>
                    ${result.subLine ? `<div class="planner-coach-line sub">${escapeHtml(result.subLine)}</div>` : ''}
                </div>
            `;
        }

        function updatePlannerCoach() {
            document.querySelectorAll('[data-planner-coach-slot]').forEach(el => {
                el.innerHTML = renderPlannerCoach();
            });
        }

        function schedulePlannerCoachUpdate() {
            if (plannerCoachTimer) clearTimeout(plannerCoachTimer);
            plannerCoachTimer = setTimeout(() => {
                plannerCoachTimer = null;
                updatePlannerCoach();
            }, 180);
        }

        function bindPlannerCoachInputs() {
            const titleInput = $('plan-title');
            const subjectInput = $('plan-subject');
            const inlineInput = $('inline-add-input');
            if (titleInput) titleInput.oninput = schedulePlannerCoachUpdate;
            if (subjectInput) subjectInput.onchange = schedulePlannerCoachUpdate;
            if (inlineInput) inlineInput.oninput = schedulePlannerCoachUpdate;
        }
        
        function renderSubjectFilter() {
            return `<div class="subject-strip" id="subject-strip">${SUBJECTS.map(s => `<button class="subject-pill ${activeSubject === s ? 'active' : ''}" onclick="setSubject('${s}')">${s}</button>`).join('')}</div>`;
        }
        
        function setSubject(subject) { activeSubject = subject; authStore().setItem('PLANNER_SUBJECT', subject); renderPlanner(); }

        function renderPlanner() {
            const weekDates = getWeekDates(currentWeekStart);
            const weekPlanSet = new Set(weekDates);
            const weekOnlyPlans = visiblePlans(plans.filter(p => weekPlanSet.has(p.plan_date)));
            const doneCount = weekOnlyPlans.filter(isDone).length;
            const rate = weekOnlyPlans.length ? Math.round((doneCount / weekOnlyPlans.length) * 100) : 0;
            const dday = examDate ? Math.ceil((dateObj(examDate) - dateObj(todayStr())) / 86400000) : null;
            
            const topDday = $('top-dday');
            const topRate = $('top-rate');
            const chip = $('student-chip');
            if (topDday) topDday.textContent = '로그아웃';
            if (topRate) topRate.textContent = `${rate}%`;
            if (chip) chip.textContent = student?.name || '';
            
            const feedbackHtml = renderFeedbackBanner();
            const assistSummaryHtml = renderLearningAssistSummary(weekDates); // [수정본]
            const coachHtml = renderPlannerCoach();

            $('app').innerHTML = `
                <div class="side-panel">
                    <div class="summary-row">
                        <div class="stat-card"><div class="val">${rate}%</div><div class="lbl">주간 실천율</div></div>
                        <div class="stat-card"><div class="val">${doneCount}</div><div class="lbl">주간 완료</div></div>
                    </div>
                    <div class="exam-card">
                        <div style="min-width:0;">
                            <div class="exam-title">시험 일정</div>
                            <div class="exam-value">${examDate ? `${escapeHtml(examDate)}${dday !== null && dday >= 0 ? ` · D-${dday}` : ''}` : '미설정'}</div>
                        </div>
                        <button class="btn btn-primary" style="padding: 6px 12px;" onclick="openExamDateModal()">변경</button>
                    </div>
                    ${assistSummaryHtml}
                    <div class="planner-coach-slot planner-coach-side" data-planner-coach-slot>${coachHtml}</div>
                </div>
                <div class="main-panel">
                    ${feedbackHtml}
                    <div class="mobile-assist-card">${assistSummaryHtml}</div>
                    <div class="planner-coach-slot planner-coach-main" data-planner-coach-slot>${coachHtml}</div>
                    ${renderViewTabs()}
                    <div class="planner-view-body" id="planner-view-body">
                        ${renderActiveView(weekDates)}
                    </div>
                </div>
            `;
            bindWeekSwipe();
            if (plannerView === 'list') {
                requestAnimationFrame(() => {
                    renderChecklists();
                    if (shouldScrollToSelectedDate) {
                        shouldScrollToSelectedDate = false;
                        requestAnimationFrame(() => {
                            const block = $('selected-date-block');
                            if (block) block.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        });
                    }
                });
            }
            const fab = $('fab-add');
            if (fab) fab.classList.remove('hidden');
            bindPlannerCoachInputs();
            updatePlannerCoach();
        }

        function renderViewTabs() {
            const tabs = [['weekly', '주간플래너'], ['monthly', '월간플래너'], ['list', '리스트']];
            return `<div class="planner-view-tabs">${tabs.map(([key, label]) => `<button class="planner-view-tab ${plannerView === key ? 'active' : ''}" onclick="setPlannerView('${key}')">${label}</button>`).join('')}</div>`;
        }

        async function setPlannerView(view) {
            if (!['weekly','monthly','list'].includes(view)) return;
            plannerView = view; authStore().setItem(PLANNER_VIEW_KEY, view); inlineAddDate = null;
            await loadPlannerData(); renderPlanner();
        }

        function renderActiveView(weekDates) {
            if (plannerView === 'monthly') return renderMonthlyLedgerView();
            if (plannerView === 'list') return renderListViewShell(weekDates);
            return renderWeeklyTimetableView(weekDates);
        }

        function renderListViewShell(weekDates) { return `<div class="week-shell" id="week-shell">${renderWeekNav()}${renderWeekStrip(weekDates)}</div>${renderSubjectFilter()}<div id="list-dynamic-area"></div>`; }

        function renderWeeklyTimetableView(weekDates) {
            return `
                <div class="week-shell" id="week-shell">${renderWeekNav()}</div>
                <div class="planner-table-card">
                    <div class="planner-table-scroll">
                        <table class="planner-week-table">
                            <thead><tr><th class="subject-head">과목</th>${weekDates.map(d => renderWeeklyDayHead(d)).join('')}</tr></thead>
                            <tbody>${PLANNER_TABLE_SUBJECTS.map(subject => renderWeeklySubjectRow(subject, weekDates)).join('')}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderWeeklyDayHead(dateStr) {
            const d = dateObj(dateStr); const dow = ['일','월','화','수','목','금','토'][d.getDay()]; const isToday = dateStr === todayStr();
            return `<th><div class="planner-week-day ${isToday ? 'today' : ''}"><span class="date">${d.getDate()}</span><span class="dow">${dow}</span></div></th>`;
        }
        function renderWeeklySubjectRow(subject, weekDates) { return `<tr><td class="subject-cell">${escapeHtml(subject)}</td>${weekDates.map(dateStr => renderPlannerSubjectCell(dateStr, subject, 'week')).join('')}</tr>`; }

        function renderMonthlyLedgerView() {
            const monthStart = getMonthStart(selectedDate); const days = getMonthDaysForPlanner(monthStart);
            return `
                <div class="planner-month-head">
                    <div class="planner-month-title">${escapeHtml(getMonthLabel(selectedDate))}</div>
                    <div class="planner-month-actions"><button onclick="moveMonth(-1)">‹ 이전 달</button><button onclick="selectMonthToday()">이번 달</button><button onclick="moveMonth(1)">다음 달 ›</button></div>
                </div>
                <div class="planner-table-card">
                    <div class="planner-table-scroll">
                        <table class="planner-month-ledger">
                            <thead><tr><th class="month-subject-head">과목</th>${days.map(d => renderMonthDayHead(d)).join('')}</tr></thead>
                            <tbody>${PLANNER_TABLE_SUBJECTS.map(subject => renderMonthlySubjectRow(subject, days)).join('')}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderMonthDayHead(dateStr) {
            const d = dateObj(dateStr); const dow = ['일','월','화','수','목','금','토'][d.getDay()]; const cls = d.getDay() === 0 ? ' sun' : d.getDay() === 6 ? ' sat' : '';
            return `<th class="month-day-head${cls}" data-date="${escapeHtml(dateStr)}"><div style="font-size:11px;font-weight:800;line-height:1.2;">${d.getDate()}</div><div style="font-size:10px;font-weight:700;line-height:1.2;">${dow}</div></th>`;
        }
        function renderMonthlySubjectRow(subject, days) { return `<tr><td class="month-subject-cell">${escapeHtml(subject)}</td>${days.map(dateStr => renderPlannerSubjectCell(dateStr, subject, 'month')).join('')}</tr>`; }

        function renderPlannerSubjectCell(dateStr, subject, mode) {
            const list = plans.filter(p => p.plan_date === dateStr && planSubject(p) === subject).sort((a, b) => String(a.created_at || a.id || '').localeCompare(String(b.created_at || b.id || '')));
            const today = todayStr(); const selected = dateStr === selectedDate ? ' selected' : ''; const isToday = dateStr === today ? ' today' : '';
            
            if (mode === 'month') {
                const hasPlanCls = list.length ? ' has-plan' : '';
                const inner = list.length ? list.slice(0, 2).map(p => renderMonthPlanMini(p)).join('') + (list.length > 2 ? `<span class="planner-month-count">+${list.length - 2}</span>` : '') : `<span style="color:var(--border);font-size:13px;font-weight:800;">＋</span>`;
                return `<td class="planner-month-cell${selected}${isToday}${hasPlanCls}" onclick="openCellAction(event, '${dateStr}', '${subject}')"><div class="planner-month-cell-inner">${inner}</div></td>`;
            }

            const chips = list.length ? list.slice(0, 3).map(p => renderPlannerChip(p)).join('') + (list.length > 3 ? `<button class="planner-more" onclick="event.stopPropagation(); goToListView('${dateStr}', '${subject}')">+${list.length - 3}개 더</button>` : '') : `<div class="planner-cell-add">＋</div>`;
            return `<td class="planner-cell${selected}${isToday} ${list.length ? '' : 'empty'}" onclick="openCellAction(event, '${dateStr}', '${subject}')">${chips}</td>`;
        }

        function goToListView(dateStr, subject) { selectedDate = dateStr; currentWeekStart = getWeekStart(dateStr); if (PLANNER_TABLE_SUBJECTS.includes(subject)) { activeSubject = subject; authStore().setItem('PLANNER_SUBJECT', subject); } shouldScrollToSelectedDate = true; setPlannerView('list'); }
        function renderPlannerChip(p) { const payload = encodeURIComponent(JSON.stringify({ id: p.id, title: p.title || '', subject: planSubject(p), updated_at: p.updated_at || '' })); return `<button class="planner-chip ${getSubjectClass(planSubject(p))} ${isDone(p) ? 'done' : ''}" onclick="event.stopPropagation(); openEditModalFromPayload('${payload}')"><span class="txt">${escapeHtml(p.title || '')}</span></button>`; }
        function renderMonthPlanMini(p) { const payload = encodeURIComponent(JSON.stringify({ id: p.id, title: p.title || '', subject: planSubject(p), updated_at: p.updated_at || '' })); return `<button class="planner-month-title-mini" onclick="event.stopPropagation(); openEditModalFromPayload('${payload}')">${escapeHtml(p.title || '')}</button>`; }

        function openCellAction(event, dateStr, subject) {
            if (event) event.stopPropagation();
            selectedDate = dateStr; currentWeekStart = getWeekStart(dateStr);
            if (PLANNER_TABLE_SUBJECTS.includes(subject)) { activeSubject = subject; authStore().setItem('PLANNER_SUBJECT', subject); }
            const list = plans.filter(p => p.plan_date === dateStr && planSubject(p) === subject);
            if (plannerView === 'monthly') {
                if (list.length === 0) openAddModal(dateStr, subject); else { shouldScrollToSelectedDate = true; setPlannerView('list'); }
                return;
            }
            if (list.length === 0) openAddModal(dateStr, subject);
            else if (list.length === 1) { const p = list[0]; openEditModal(p.id, p.title || '', planSubject(p), p.updated_at || ''); }
            else { shouldScrollToSelectedDate = true; setPlannerView('list'); }
        }

        function selectMonthToday() { selectedDate = todayStr(); currentWeekStart = getWeekStart(selectedDate); inlineAddDate = null; loadPlannerData().then(renderPlanner); }
        function getMonthDaysForPlanner(monthStart) { const month = String(monthStart || selectedDate).slice(0, 7); const [year, monthNo] = month.split('-').map(Number); const endDay = new Date(year, monthNo, 0).getDate(); return Array.from({ length: endDay }, (_, idx) => `${month}-${String(idx + 1).padStart(2, '0')}`); }
        function renderWeekNav() { const isCurrentWeek = currentWeekStart === getWeekStart(todayStr()); return `<div class="week-nav-row"><button onclick="moveWeek(-1)">‹</button>${!isCurrentWeek ? '<button onclick="goThisWeek()">이번 주</button>' : '<span style="width:48px;"></span>'}<button onclick="moveWeek(1)">›</button></div>`; }
        function renderWeekStrip(weekDates) { return `<div class="week-strip">${weekDates.map(dateStr => { const d = dateObj(dateStr); const dayName = ['일','월','화','수','목','금','토'][d.getDay()]; const count = visiblePlans(plans.filter(p => p.plan_date === dateStr)).length; return `<button class="day-pill ${dateStr === selectedDate ? 'selected' : ''} ${dateStr === todayStr() ? 'is-today' : ''}" onclick="selectDate('${dateStr}')"><span class="day-name">${dayName}</span><span class="day-num">${d.getDate()}</span><span class="day-count">${count ? count : '·'}</span></button>`; }).join('')}</div>`; }
        function selectDate(dateStr) { selectedDate = dateStr; currentWeekStart = getWeekStart(dateStr); renderPlanner(); }
        async function goThisWeek() { selectedDate = todayStr(); currentWeekStart = getWeekStart(selectedDate); inlineAddDate = null; await loadPlannerData(); renderPlanner(); }
        async function moveWeek(delta) { currentWeekStart = addDays(currentWeekStart, delta * 7); selectedDate = currentWeekStart; if (getWeekStart(todayStr()) === currentWeekStart) selectedDate = todayStr(); inlineAddDate = null; await loadPlannerData(); renderPlanner(); }
        function bindWeekSwipe() {
            const shell = $('week-shell'); if (!shell) return;
            shell.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, { passive: true });
            shell.addEventListener('touchend', e => { const t = e.changedTouches[0]; const dx = t.clientX - touchStartX; const dy = t.clientY - touchStartY; if (Math.abs(dx) > 56 && Math.abs(dx) > Math.abs(dy) * 1.4) moveWeek(dx < 0 ? 1 : -1); }, { passive: true });
        }

        function renderChecklists() {
            const area = $('list-dynamic-area');
            if (!area) return;

            const today = todayStr();
            const weekDates = getWeekDates(currentWeekStart);

            // [수정본] 1. 최근 7일 미완료 누적 (오늘 계획과 중복 제거)
            const todayPlansAll = plans.filter(p => p.plan_date === today);
            const past7Days = Array.from({length: 7}, (_, i) => addDays(today, -(i+1)));
            let carryOverAll = plans.filter(p => past7Days.includes(p.plan_date) && !isDone(p));
            carryOverAll = carryOverAll.filter(p => !todayPlansAll.some(tp => tp.title === p.title && planSubject(tp) === planSubject(p)));
            const carryPlans = visiblePlans(carryOverAll);
            
            let carryHtml = '';
            if (carryPlans.length > 0) {
                carryHtml = `
                    <div class="section-title"><span>미완료 누적 <small>최근 7일</small></span></div>
                    <div class="notebook" style="margin-bottom:12px;">${carryPlans.map(p => renderPlanRow(p, true)).join('')}</div>
                `;
            }

            // [수정본] 2. 오늘 복습 추천 (D-1, 3, 7 완료된 과제)
            const dMinus1 = addDays(today, -1);
            const dMinus3 = addDays(today, -3);
            const dMinus7 = addDays(today, -7);
            const reviewPlansAll = plans.filter(p => isDone(p) && [dMinus1, dMinus3, dMinus7].includes(p.plan_date));
            const reviewPlansVisible = visiblePlans(reviewPlansAll);
            
            let reviewHtml = '';
            if (reviewPlansVisible.length > 0) {
                reviewHtml = `
                    <div class="section-title"><span>오늘 복습 추천</span></div>
                    <div class="notebook" style="margin-bottom:12px;">
                        ${reviewPlansVisible.map(p => {
                            let dLabel = p.plan_date === dMinus1 ? 'D+1' : p.plan_date === dMinus3 ? 'D+3' : 'D+7';
                            const payload = encodeURIComponent(JSON.stringify({ id: p.id, title: p.title || '', subject: planSubject(p), updated_at: p.updated_at || '' }));
                            return `
                                <div class="review-card" onclick="openEditModalFromPayload('${payload}')">
                                    <div class="review-card-top">
                                        <span class="subject-tag ${getSubjectClass(planSubject(p))}">${planSubject(p)}</span>
                                        <span class="review-d-badge">${dLabel} 복습</span>
                                    </div>
                                    <div class="review-card-title">${escapeHtml(p.title)}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }

            const todayPlans = visiblePlans(todayPlansAll);
            const todayInline = inlineAddDate === today ? renderInlineAddRow(today) : '';
            const todayHtml = todayPlans.map(p => renderPlanRow(p)).join('') + todayInline;

            let selectedHtml = '';
            if (selectedDate !== today) {
                const selPlans = visiblePlans(plans.filter(p => p.plan_date === selectedDate));
                const selInline = inlineAddDate === selectedDate ? renderInlineAddRow(selectedDate) : '';
                selectedHtml = `
                    <div class="section-title" id="selected-date-block" style="scroll-margin-top: 70px; color: var(--primary);">
                        <div>선택한 날짜<small>${formatDateShort(selectedDate)}</small></div>
                        <button class="day-add" onclick="openInlineAdd('${selectedDate}')">＋</button>
                    </div>
                    <div class="notebook">${selPlans.map(p => renderPlanRow(p)).join('')}${selInline}</div>
                `;
            }

            const weeklyHtml = weekDates.map(dateStr => {
                if (dateStr === today || dateStr === selectedDate) return '';
                const dayPlans = visiblePlans(plans.filter(p => p.plan_date === dateStr));
                const inline = inlineAddDate === dateStr ? renderInlineAddRow(dateStr) : '';
                
                if (dayPlans.length === 0 && !inline) {
                    return `<div class="date-block"><div class="date-header" onclick="openInlineAdd('${dateStr}')"><span>${formatDateShort(dateStr)}</span><button class="day-add" onclick="event.stopPropagation(); openInlineAdd('${dateStr}')">＋</button></div></div>`;
                }
                return `<div class="date-block"><div class="date-header" onclick="openInlineAdd('${dateStr}')"><span>${formatDateShort(dateStr)}</span><button class="day-add" onclick="event.stopPropagation(); openInlineAdd('${dateStr}')">＋</button></div><div class="plan-list">${dayPlans.map(p => renderPlanRow(p)).join('')}${inline}</div></div>`;
            }).join('');

            area.innerHTML = `
                ${selectedHtml}
                ${carryHtml}
                <div class="section-title" ${selectedDate === today ? 'id="selected-date-block" style="scroll-margin-top: 70px;"' : ''}>
                    <div>오늘 할 일<small>${formatDateShort(today)}</small></div>
                    <button class="day-add" onclick="openInlineAdd('${today}')">＋</button>
                </div>
                <div class="notebook">${todayHtml}</div>
                ${reviewHtml}
                <div class="section-title"><span>주간 계획</span></div>
                <div class="notebook">${weeklyHtml}</div>
            `;
        }

        function renderInlineAddRow(dateStr) { return `<div class="inline-add-row"><span class="chk-wrapper"><span></span></span><input id="inline-add-input" class="inline-add-input" placeholder="학습 내용 입력 후 Enter" onkeydown="handleInlineKey(event, '${dateStr}')"><button class="inline-save" onclick="saveInlinePlan('${dateStr}')">저장</button></div>`; }
        function openInlineAdd(dateStr) { inlineAddDate = dateStr || todayStr(); selectedDate = inlineAddDate; currentWeekStart = getWeekStart(inlineAddDate); renderPlanner(); setTimeout(() => $('inline-add-input')?.focus(), 60); }
        function handleInlineKey(event, dateStr) { if (event.key === 'Enter') saveInlinePlan(dateStr); if (event.key === 'Escape') { inlineAddDate = null; renderPlanner(); } }
        async function saveInlinePlan(dateStr) {
            const input = $('inline-add-input'); const title = input ? input.value.trim() : ''; if (!title) { inlineAddDate = null; renderPlanner(); return; }
            const subject = activeSubject === '전체' ? '수학' : activeSubject;
            const res = await apiPost('planner', { student_id: studentId, pin, plan_date: dateStr, title, subject, repeat_rule: '', exam_date: examDate });
            if (res.error) return toast('등록 실패');
            toast('등록됨'); inlineAddDate = null; await loadPlannerData(); renderPlanner();
        }

        function renderPlanRow(p, carry = false) {
            const done = isDone(p); const subject = planSubject(p); const title = escapeHtml(p.title || '');
            const tag = activeSubject === '전체' ? `<span class="subject-tag ${getSubjectClass(subject)}">${escapeHtml(subject)}</span>` : '';
            const planPayload = encodeURIComponent(JSON.stringify({ id: p.id, title: p.title || '', subject: subject, updated_at: p.updated_at || '' }));

            return `
                <div class="plan-row ${done ? 'done' : ''} ${carry ? 'carry-row' : ''}">
                    <label class="chk-wrapper" onclick="event.stopPropagation()"><input type="checkbox" class="chk-input" ${done ? 'checked' : ''} onchange="toggleDone('${p.id}')"></label>
                    <div class="plan-content" onclick="openEditModalFromPayload('${planPayload}')">
                        <span class="plan-title"><span class="carry-badge" style="display:${carry ? 'inline-block' : 'none'}">이전 미완료</span>${title}</span>
                        ${tag}
                    </div>
                    ${carry ? `<button class="roll-btn" onclick="copyPlanToToday('${p.id}')">오늘로</button>` : ''}
                </div>
            `;
        }

        function openEditModalFromPayload(payload) { const plan = JSON.parse(decodeURIComponent(payload)); openEditModal(plan.id, plan.title, plan.subject, plan.updated_at); }

        async function toggleDone(id) {
            const plan = plans.find(p => String(p.id) === String(id)); if (!plan) return;
            const prev = Number(plan.is_done) === 1 ? 1 : 0; const next = prev === 1 ? 0 : 1;
            const scrollTop = window.scrollY || document.documentElement.scrollTop || 0;
            plan.is_done = next;
            updatePlannerCoach();
            const res = await apiPatch(`planner/${id}`, { student_id: studentId, pin, is_done: next });
            if (res.error) { toast('변경 실패'); plan.is_done = prev; }
            await loadPlannerData(); renderPlanner();
            if (plannerView === 'list' && !shouldScrollToSelectedDate) { requestAnimationFrame(() => window.scrollTo({ top: scrollTop, behavior: 'auto' })); }
        }

        async function copyPlanToToday(id) {
            const plan = plans.find(p => String(p.id) === String(id)); if (!plan) return; const today = todayStr();
            const duplicated = plans.some(p => p.plan_date === today && String(p.title || '') === String(plan.title || '') && planSubject(p) === planSubject(plan));
            if (duplicated) return toast('이미 오늘 계획에 있습니다.');
            const res = await apiPost('planner', { student_id: studentId, pin, plan_date: today, title: plan.title || '', subject: planSubject(plan), repeat_rule: '', exam_date: examDate });
            if (res.error) return toast('이동 실패');
            toast('오늘 계획에 추가됨'); selectedDate = today; currentWeekStart = getWeekStart(today); await loadPlannerData(); renderPlanner();
        }

        // [3.1 패치] 뽀모도로 하단 미니바 함수
        function formatPomoTime() {
            const m = String(Math.floor(pomoTime / 60)).padStart(2, '0');
            const s = String(pomoTime % 60).padStart(2, '0');
            return `${m}:${s}`;
        }

        function showPomoMini() {
            $('pomodoro-mini')?.classList.remove('hidden');
        }

        function updatePomoUI() {
            const timeEl = $('pomo-time-display');
            if (timeEl) timeEl.textContent = formatPomoTime();

            const titleEl = $('pomo-plan-title');
            if (titleEl) titleEl.textContent = pomoPlanTitle || '현재 계획';

            const btn = $('pomo-toggle-btn');
            if (btn) {
                btn.textContent = pomoActive ? '일시정지' : '시작';
                btn.classList.toggle('primary', !pomoActive);
                btn.classList.toggle('danger', pomoActive);
            }

            const startBtn = $('pomo-start-btn');
            if (startBtn) startBtn.textContent = pomoActive ? '집중 타이머 보기' : '25분 집중 시작';
        }

        function startPomoForCurrentPlan() {
            const title = $('plan-title')?.value.trim() || '현재 계획';
            pomoPlanTitle = title;
            if (pomoTime <= 0) pomoTime = 25 * 60;
            showPomoMini();
            if (!pomoActive) togglePomo();
            else updatePomoUI();
            closeModal();
        }

        function togglePomo() {
            showPomoMini();
            if (pomoActive) {
                clearInterval(pomoInterval);
                pomoInterval = null;
                pomoActive = false;
                updatePomoUI();
                return;
            }

            pomoActive = true;
            updatePomoUI();
            clearInterval(pomoInterval);
            pomoInterval = setInterval(() => {
                pomoTime -= 1;
                if (pomoTime <= 0) {
                    clearInterval(pomoInterval);
                    pomoInterval = null;
                    pomoActive = false;
                    pomoTime = 25 * 60;
                    updatePomoUI();
                    toast('집중 시간이 끝났습니다. 수고하셨습니다!');
                    return;
                }
                updatePomoUI();
            }, 1000);
        }

        function resetPomo(auto = false) {
            clearInterval(pomoInterval);
            pomoInterval = null;
            pomoActive = false;
            pomoTime = 25 * 60;
            updatePomoUI();
            showPomoMini();
            if (!auto) toast('타이머가 초기화되었습니다.');
        }

        function closePomoMini() {
            clearInterval(pomoInterval);
            pomoInterval = null;
            pomoActive = false;
            pomoTime = 25 * 60;
            pomoPlanTitle = '';
            updatePomoUI();
            $('pomodoro-mini')?.classList.add('hidden');
        }

        function openAddModal(dateStr = selectedDate, subject = '수학') {
            editPlanId = null; editPlanUpdatedAt = null; selectedDate = dateStr || todayStr(); currentWeekStart = getWeekStart(selectedDate);
            $('modal-title').textContent = `${formatDateShort(selectedDate)} 계획 추가`;
            $('plan-title').value = ''; $('plan-subject').value = SUBJECTS.includes(subject) && subject !== '전체' ? subject : '수학';
            $('plan-repeat').value = ''; $('repeat-rule-container').classList.remove('hidden');
            $('delete-plan-btn')?.classList.add('hidden');
            $('pomodoro-container')?.classList.add('hidden'); // 추가 모달에서는 집중 시작 버튼 숨김
            $('modal-overlay').classList.remove('hidden');
            $('plan-title').onkeyup = (e) => { if (e.key === 'Enter') savePlan(); };
            bindPlannerCoachInputs();
            updatePlannerCoach();
            setTimeout(() => $('plan-title')?.focus(), 80);
        }

        function openEditModal(id, title, subject, updatedAt) {
            editPlanId = id; editPlanUpdatedAt = updatedAt;
            $('modal-title').textContent = '계획 수정';
            $('plan-title').value = title; $('plan-subject').value = SUBJECTS.includes(subject) && subject !== '전체' ? subject : '수학';
            $('repeat-rule-container').classList.add('hidden');
            $('delete-plan-btn')?.classList.remove('hidden');
            $('pomodoro-container')?.classList.remove('hidden'); // 수정 모달에서는 집중 시작 버튼 표시
            if (!pomoPlanTitle) pomoPlanTitle = title || '현재 계획';
            updatePomoUI(); // 상태 동기화
            $('modal-overlay').classList.remove('hidden');
            $('plan-title').onkeyup = (e) => { if (e.key === 'Enter') savePlan(); };
            bindPlannerCoachInputs();
            updatePlannerCoach();
        }

        function closeModal() { $('modal-overlay').classList.add('hidden'); editPlanId = null; editPlanUpdatedAt = null; updatePlannerCoach(); }

        async function deletePlan() {
            if (!editPlanId) return; if (!confirm('이 계획을 삭제할까요?')) return;
            const res = await apiDelete(`planner/${encodeURIComponent(editPlanId)}?student_id=${encodeURIComponent(studentId)}&pin=${encodeURIComponent(pin)}`);
            if (res.error || res.success === false) { toast(res.message || '삭제 실패'); return; }
            toast('삭제됨'); editPlanId = null; editPlanUpdatedAt = null; inlineAddDate = null; closeModal(); await loadPlannerData(); renderPlanner();
        }

        async function savePlan() {
            const title = $('plan-title').value.trim(); if (!title) return toast('내용을 입력하세요.');
            const subject = $('plan-subject').value || '수학';
            if (editPlanId) {
                const res = await apiPatch(`planner/${editPlanId}`, { student_id: studentId, pin, title, subject, updated_at: editPlanUpdatedAt });
                if (res.error) return toast('수정 실패'); toast('수정됨');
            } else {
                const res = await apiPost('planner', { student_id: studentId, pin, plan_date: selectedDate, title, subject, repeat_rule: $('plan-repeat').value, exam_date: examDate });
                if (res.error) return toast('등록 실패'); toast('등록됨');
            }
            closeModal(); await loadPlannerData(); renderPlanner();
        }

        function openExamDateModal() { $('modal-exam-date').value = examDate || todayStr(); $('exam-date-modal-overlay').classList.remove('hidden'); }
        function closeExamDateModal() { $('exam-date-modal-overlay').classList.add('hidden'); }
        async function saveExamDateFromModal() {
            const d = $('modal-exam-date').value; if (!d) return;
            const res = await apiPatch('planner/settings', { student_id: studentId, pin, planner_exam_date: d });
            if (res.error) return toast('저장 실패');
            toast('시험일 변경됨'); examDate = d; closeExamDateModal(); await loadPlannerData(); renderPlanner();
        }

        window.onload = init;

        window.addEventListener('beforeinstallprompt', (event) => {
            event.preventDefault();
            deferredInstallPrompt = event;
            refreshPlannerInstallCards();
        });

        window.addEventListener('appinstalled', () => {
            deferredInstallPrompt = null;
            refreshPlannerInstallCards();
            toast('AP 플래너 앱이 설치되었습니다.');
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
