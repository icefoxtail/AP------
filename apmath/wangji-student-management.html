<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>왕지 학생관리 (1차 안전 모드 · 관리자 전용)</title>
  <!--
    왕지교육 공통 학생관리 v1 — 1차 독립(관리자 전용) 화면.
    * 기존 AP/EIE 화면/메뉴를 교체하지 않는 독립 HTML.
    * 기존 메인 메뉴에 정식 노출하지 않음. 직접 URL / 숨김 진입 전용.
    * read-only 연결 모드. 원본 AP/EIE DB 를 수정하지 않음.
  -->
  <link rel="stylesheet" href="css/wangji-student-management.css" />
</head>
<body class="wsm-body">
  <header class="wsm-topbar">
    <h1>왕지 통합 학생관리</h1>
    <span class="wsm-badge">안전 모드</span>
    <span class="wsm-badge">관리자 전용</span>
    <span id="wsm-overlay-status"></span>
  </header>

  <p class="wsm-safe-banner">
    통합 학생관리 안전 모드입니다. AP/EIE 원본 정보는 읽기 전용으로 표시되며, 원본 수정은 아직 지원하지 않습니다.
    공통 연결·상담·메모는 왕지 공통 저장소에 저장됩니다.
  </p>

  <main class="wsm-layout">
    <!-- 좌측: 검색 / 필터 / 목록 -->
    <section class="wsm-panel">
      <div class="wsm-search-row">
        <input id="wsm-search-input" type="text" placeholder="학생명 / 학교 검색" />
        <button id="wsm-search-btn" class="wsm-btn primary" type="button">검색</button>
      </div>
      <div class="wsm-filters">
        <button class="wsm-chip is-active" data-filter="all" type="button">전체</button>
        <button class="wsm-chip" data-filter="ap" type="button">AP</button>
        <button class="wsm-chip" data-filter="eie" type="button">EIE</button>
        <button class="wsm-chip" data-filter="ap_eie" type="button">AP+EIE</button>
        <button class="wsm-chip" data-filter="candidate" type="button">연결 후보</button>
        <button class="wsm-chip" data-filter="common" type="button">공통 학생</button>
      </div>
      <div class="wsm-disabled-note" style="margin-bottom:10px;">
        AP+EIE / 연결 후보는 현재 표시 기준입니다. 실제 후보 매칭과 확정 연결은 공통 연결 저장소 로그인 후 활성화됩니다.
      </div>
      <div style="margin-bottom:10px; display:flex; flex-wrap:wrap; gap:6px; align-items:center;">
        <button id="wsm-register-btn" class="wsm-btn primary" type="button">공통 학생 등록</button>
        <button id="wsm-scan-btn" class="wsm-btn" type="button">연결 후보 스캔</button>
        <button id="wsm-queue-btn" class="wsm-btn" type="button">검토 큐</button>
      </div>
      <div class="wsm-disabled-note" style="margin-bottom:10px;">
        이름·연락처가 같아도 자동으로 같은 학생으로 확정하지 않습니다. 연결 확정은 관리자가 직접 합니다.
      </div>
      <div id="wsm-list" class="wsm-list"></div>
    </section>

    <!-- 우측: 통합 상세 -->
    <section class="wsm-panel">
      <div id="wsm-detail">
        <div class="wsm-empty">좌측에서 학생을 선택하면 통합 상세가 표시됩니다.</div>
      </div>
    </section>
  </main>

  <script src="js/wangji-student-management.js"></script>
</body>
</html>
