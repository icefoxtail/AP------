<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>AP Math OS | 학생 포털</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root {
      --primary:#1A5CFF;
      --success:#00B894;
      --error:#E8414F;
      --warning:#FFA502;
      --bg:#F2F4F6;
      --surface:#FFFFFF;
      --surface-2:#F8FAFC;
      --border:#E5E8EB;
      --text:#191F28;
      --text-soft:#4E5968;
      --secondary:#6B7684;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; outline:none; }
    html { min-height:100%; background:var(--bg); }
    body {
      margin:0;
      min-height:100vh;
      min-height:100dvh;
      font-family:Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at 18% -8%, rgba(26,92,255,0.12) 0, rgba(26,92,255,0.04) 34%, transparent 58%),
        linear-gradient(180deg, #F8FAFC 0%, var(--bg) 52%, #EEF2F7 100%);
      color:var(--text);
      line-height:1.5;
      word-break:keep-all;
    }
    button, input { font-family:inherit; }
    button { cursor:pointer; }
    .top {
      position:sticky;
      top:0;
      z-index:20;
      min-height:58px;
      padding:0 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:rgba(248,250,252,0.92);
      border-bottom:1px solid rgba(229,232,235,0.82);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }
    .brand { display:flex; flex-direction:column; gap:1px; min-width:0; }
    .brand-main { font-size:17px; font-weight:700; color:var(--text); letter-spacing:-0.35px; line-height:1.2; }
    .brand-sub { font-size:11px; font-weight:700; color:var(--secondary); letter-spacing:-0.1px; line-height:1.2; }
    .top-actions { display:flex; align-items:center; gap:8px; min-width:0; }
    .chip {
      max-width:150px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:12px;
      font-weight:700;
      color:var(--primary);
      text-align:right;
      background:rgba(26,92,255,0.08);
      border:1px solid rgba(26,92,255,0.14);
      border-radius:999px;
      padding:6px 10px;
    }
    .chip:empty { display:none; }
    .logout {
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--secondary);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:700;
    }
    .logout.hidden { display:none; }
    .app { width:100%; max-width:520px; margin:0 auto; padding:18px 14px calc(32px + env(safe-area-inset-bottom)); }
    .hero { display:flex; flex-direction:column; gap:8px; padding:6px 2px 16px; }
    .hero-kicker { font-size:12px; font-weight:700; color:var(--primary); line-height:1.4; }
    .hero-title { margin:0; font-size:25px; font-weight:700; letter-spacing:-0.8px; line-height:1.18; color:var(--text); }
    .hero-desc { margin:0; font-size:13px; font-weight:700; color:var(--secondary); line-height:1.55; }
    .visual-wrap {
      position:relative;
      min-height:150px;
      margin:2px 0 8px;
      border-radius:28px;
      overflow:hidden;
      background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,0.95) 0, rgba(255,255,255,0.50) 16%, transparent 34%),
        linear-gradient(135deg, rgba(26,92,255,0.12) 0%, rgba(124,58,237,0.10) 52%, rgba(0,184,148,0.12) 100%);
      border:1px solid rgba(229,232,235,0.86);
      box-shadow:0 12px 32px rgba(25,31,40,0.045);
    }
    .visual-orb { position:absolute; border-radius:999px; opacity:.86; pointer-events:none; }
    .visual-orb.one { width:82px; height:82px; right:-18px; top:-20px; background:rgba(26,92,255,0.15); }
    .visual-orb.two { width:58px; height:58px; left:22px; bottom:-20px; background:rgba(0,184,148,0.16); }
    .visual-orb.three { width:22px; height:22px; right:96px; bottom:22px; background:rgba(255,165,2,0.22); }
    .visual-card {
      position:absolute;
      left:50%;
      top:50%;
      width:178px;
      min-height:104px;
      transform:translate(-50%, -48%) rotate(-2deg);
      border-radius:24px;
      background:#fff;
      border:1px solid rgba(229,232,235,0.95);
      box-shadow:0 20px 46px rgba(25,31,40,0.10);
      padding:22px 20px;
    }
    .visual-line { height:8px; border-radius:999px; background:#E5E8EB; margin-bottom:10px; }
    .visual-line.a { width:92px; }
    .visual-line.b { width:132px; }
    .visual-line.c { width:74px; margin-bottom:0; }
    .visual-check {
      position:absolute;
      right:18px;
      bottom:16px;
      width:42px;
      height:42px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#00B894 0%,#12C99B 100%);
      color:#fff;
      font-size:25px;
      font-weight:700;
      box-shadow:0 12px 24px rgba(0,184,148,0.24);
    }
    .card {
      background:rgba(255,255,255,0.96);
      border:1px solid rgba(229,232,235,0.92);
      border-radius:22px;
      padding:18px;
      box-shadow:0 8px 26px rgba(25,31,40,0.045);
      margin-bottom:14px;
    }
    .card-title { margin:0; font-size:20px; font-weight:700; line-height:1.25; letter-spacing:-0.45px; color:var(--text); }
    .card-desc { margin:7px 0 0; font-size:13px; font-weight:700; color:var(--secondary); line-height:1.55; }
    .input {
      width:100%;
      min-height:52px;
      border:1px solid var(--border);
      border-radius:16px;
      background:var(--surface);
      color:var(--text);
      padding:13px 15px;
      font-size:16px;
      font-weight:700;
      box-shadow:none;
    }
    .input::placeholder { color:#A0A8B2; }
    .btn {
      width:100%;
      min-height:52px;
      border:1px solid var(--border);
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      font-size:15px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:transform .12s ease, opacity .12s ease, background .12s ease;
    }
    .btn-primary { background:linear-gradient(135deg,#1A5CFF 0%,#4F46E5 100%); color:#fff; border:none; box-shadow:0 12px 24px rgba(26,92,255,0.22); }
    .btn:active { transform:scale(0.99); }
    .btn[disabled] { opacity:.58; pointer-events:none; }
    .stack { display:flex; flex-direction:column; gap:11px; }
    .notice {
      font-size:13px;
      font-weight:700;
      color:var(--secondary);
      line-height:1.58;
      padding:12px 13px;
      background:var(--surface-2);
      border:1px solid rgba(229,232,235,0.72);
      border-radius:16px;
    }
    .notice strong { color:var(--text); font-weight:700; }
    .summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:14px; }
    .summary-box { border:1px solid var(--border); border-radius:16px; background:var(--surface-2); padding:12px; }
    .summary-value { font-size:22px; font-weight:700; color:var(--primary); line-height:1; }
    .summary-label { margin-top:5px; font-size:11px; font-weight:700; color:var(--secondary); }
    .portal-card { display:flex; flex-direction:column; gap:12px; }
    .portal-head { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
    .portal-icon { flex:0 0 auto; width:44px; height:44px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:22px; background:rgba(26,92,255,0.08); color:var(--primary); }
    .portal-icon.green { background:rgba(0,184,148,0.10); color:var(--success); }
    .portal-icon.orange { background:rgba(255,165,2,0.12); color:var(--warning); }
    .assignment-list { display:flex; flex-direction:column; gap:10px; }
    .assignment-card { border:1px solid var(--border); border-radius:18px; padding:14px; background:var(--surface); }
    .assignment-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
    .assignment-title { font-size:15px; font-weight:700; color:var(--text); line-height:1.35; }
    .assignment-meta { margin-top:5px; font-size:12px; font-weight:700; color:var(--secondary); line-height:1.5; }
    .status-pill { flex:0 0 auto; border-radius:999px; padding:5px 9px; font-size:11px; font-weight:700; }
    .status-pill.missing { background:rgba(232,65,79,0.10); color:#D92D3A; }
    .status-pill.done { background:rgba(0,184,148,0.10); color:#008F72; }
    .section-title { margin:18px 2px 9px; font-size:14px; font-weight:700; color:var(--text); }
    .empty { padding:24px 12px; text-align:center; color:var(--secondary); font-size:13px; font-weight:700; background:var(--surface-2); border:1px dashed var(--border); border-radius:18px; }
    .row-actions { display:flex; gap:8px; margin-top:12px; }
    .row-actions .btn { min-height:42px; border-radius:13px; font-size:13px; }
    .back-btn { width:auto; min-height:38px; padding:8px 12px; font-size:12px; border-radius:999px; margin-bottom:12px; }
    .toast {
      position:fixed;
      left:50%;
      bottom:calc(24px + env(safe-area-inset-bottom));
      transform:translateX(-50%);
      background:#191F28;
      color:#fff;
      padding:11px 15px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
      z-index:100;
      white-space:nowrap;
      box-shadow:0 10px 28px rgba(25,31,40,0.18);
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(-4px); }
    @media (max-width:380px) {
      .app { padding-left:12px; padding-right:12px; }
      .card { padding:16px; border-radius:20px; }
      .hero-title { font-size:23px; }
      .chip { max-width:120px; }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="brand">
      <div class="brand-main">AP Math OS</div>
      <div class="brand-sub">학생 포털</div>
    </div>
    <div class="top-actions">
      <div id="student-chip" class="chip"></div>
      <button id="logout-btn" class="logout hidden" onclick="logoutStudent()">로그아웃</button>
    </div>
  </header>
  <main id="app" class="app"></main>
  <div id="toast" class="toast"></div>

  <script>
    const API_BASE = 'https://ap-math-os-v2612.js-pdf.workers.dev/api';
    const SESSION_KEY = 'APMATH_STUDENT_PORTAL_SESSION';

    let session = null;
    let homeData = null;
    let isLoading = false;

    function $(id) { return document.getElementById(id); }
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
    }
    function toast(message) {
      const el = $('toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => el.classList.remove('show'), 1900);
    }
    function setTopStudent(name) {
      $('student-chip').textContent = name || '';
      $('logout-btn').classList.toggle('hidden', !name);
    }
    function saveSession(next) {
      session = next;
      localStorage.setItem(SESSION_KEY, JSON.stringify(next));
    }
    function readSession() {
      try { return JSON.parse(localStorage.getItem(SESSION_KEY)) || null; } catch (e) { return null; }
    }
    function clearSession() {
      localStorage.removeItem(SESSION_KEY);
      session = null;
      homeData = null;
    }
    async function apiPost(path, body) {
      const r = await fetch(`${API_BASE}/${path}`, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify(body || {})
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || data.success === false) throw new Error(data.message || data.error || '요청 실패');
      return data;
    }
    async function apiGet(path, token) {
      const headers = { 'Content-Type':'application/json' };
      if (token) headers['X-Student-Token'] = token;
      const r = await fetch(`${API_BASE}/${path}`, { headers });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || data.success === false) throw new Error(data.message || data.error || '요청 실패');
      return data;
    }
    function renderHero() {
      return `
        <section class="hero">
          <div class="visual-wrap" aria-hidden="true">
            <span class="visual-orb one"></span>
            <span class="visual-orb two"></span>
            <span class="visual-orb three"></span>
            <div class="visual-card">
              <div class="visual-line a"></div>
              <div class="visual-line b"></div>
              <div class="visual-line c"></div>
              <div class="visual-check">✓</div>
            </div>
          </div>
          <div class="hero-kicker">AP수학 학생 입구</div>
          <h1 class="hero-title">이름과 PIN으로<br>내 학습 화면에 들어가요.</h1>
          <p class="hero-desc">과제, 플래너, OMR 입구를 한곳에서 확인합니다.</p>
        </section>
      `;
    }
    function renderLogin(message = '') {
      setTopStudent('');
      $('app').innerHTML = `
        ${renderHero()}
        <section class="card">
          <div class="stack">
            <div>
              <h1 class="card-title">학생 로그인</h1>
              <p class="card-desc">이름과 PIN은 선생님께 받은 정보로 입력하세요.</p>
            </div>
            ${message ? `<div class="notice"><strong>확인 필요</strong><br>${escapeHtml(message)}</div>` : ''}
            <input id="student-name" class="input" type="text" autocomplete="name" placeholder="이름 입력" onkeydown="if(event.key==='Enter')$('student-pin').focus()">
            <input id="student-pin" class="input" type="password" inputmode="numeric" autocomplete="current-password" placeholder="개인 PIN 입력" onkeydown="if(event.key==='Enter')loginStudent()">
            <button id="login-btn" class="btn btn-primary" onclick="loginStudent()">로그인</button>
          </div>
        </section>
      `;
      setTimeout(() => $('student-name')?.focus(), 80);
    }
    async function loginStudent() {
      if (isLoading) return;
      const name = String($('student-name')?.value || '').trim();
      const pin = String($('student-pin')?.value || '').trim();
      if (!name || !pin) {
        toast('이름과 PIN을 입력하세요.');
        return;
      }
      isLoading = true;
      const btn = $('login-btn');
      if (btn) {
        btn.disabled = true;
        btn.textContent = '확인 중...';
      }
      try {
        const data = await apiPost('student-portal/auth', { name, pin });
        const next = {
          student_id: data.student.id,
          name: data.student.name,
          grade: data.student.grade || '',
          school_name: data.student.school_name || '',
          student_token: data.student_token,
          login_at: new Date().toISOString()
        };
        saveSession(next);
        await loadHome();
      } catch (e) {
        toast(e.message || '이름 또는 PIN을 확인하세요.');
        if (btn) {
          btn.disabled = false;
          btn.textContent = '로그인';
        }
      } finally {
        isLoading = false;
      }
    }
    async function loadHome() {
      if (!session?.student_id || !session?.student_token) {
        clearSession();
        renderLogin();
        return;
      }
      try {
        homeData = await apiGet(`student-portal/home?student_id=${encodeURIComponent(session.student_id)}`, session.student_token);
        renderHome();
      } catch (e) {
        clearSession();
        renderLogin(e.message || '학생 로그인이 만료되었습니다. 다시 로그인하세요.');
      }
    }
    function getAssignments() {
      return Array.isArray(homeData?.assignments) ? homeData.assignments : [];
    }
    function splitAssignments() {
      const list = getAssignments();
      return {
        missing: list.filter(item => Number(item.is_submitted || 0) !== 1),
        done: list.filter(item => Number(item.is_submitted || 0) === 1)
      };
    }
    function renderHome() {
      const student = homeData?.student || session || {};
      const { missing, done } = splitAssignments();
      const schoolGrade = [student.school_name, student.grade].filter(Boolean).join(' · ');
      setTopStudent(student.name || session?.name || '');
      $('app').innerHTML = `
        ${renderHero()}
        <section class="card">
          <h1 class="card-title">${escapeHtml(student.name || '학생')} 학생</h1>
          <p class="card-desc">${escapeHtml(schoolGrade || 'AP수학 학생 포털')}</p>
          <div class="summary-grid">
            <div class="summary-box">
              <div class="summary-value">${missing.length}</div>
              <div class="summary-label">미제출 과제</div>
            </div>
            <div class="summary-box">
              <div class="summary-value">${done.length}</div>
              <div class="summary-label">제출 완료</div>
            </div>
          </div>
        </section>
        <section class="card portal-card">
          <div class="portal-head">
            <div>
              <h2 class="card-title">과제</h2>
              <p class="card-desc">진행 중인 과제와 제출 상태를 확인합니다.</p>
            </div>
            <div class="portal-icon green">✓</div>
          </div>
          <button class="btn btn-primary" onclick="renderAssignments()">과제 보기</button>
        </section>
        <section class="card portal-card">
          <div class="portal-head">
            <div>
              <h2 class="card-title">플래너</h2>
              <p class="card-desc">오늘 계획을 확인하고 완료 체크를 합니다.</p>
            </div>
            <div class="portal-icon">▦</div>
          </div>
          <button class="btn" onclick="openPlanner()">플래너 열기</button>
        </section>
        <section class="card portal-card">
          <div class="portal-head">
            <div>
              <h2 class="card-title">OMR 입력</h2>
              <p class="card-desc">시험 답안 입력은 준비 중입니다.</p>
            </div>
            <div class="portal-icon orange">◯</div>
          </div>
          <button class="btn" onclick="openOmrNotice()">OMR 입력</button>
        </section>
      `;
    }
    function renderAssignments() {
      const { missing, done } = splitAssignments();
      setTopStudent(homeData?.student?.name || session?.name || '');
      $('app').innerHTML = `
        <button class="btn back-btn" onclick="renderHome()">← 홈</button>
        <section class="card">
          <h1 class="card-title">과제 목록</h1>
          <p class="card-desc">미제출 과제를 먼저 확인하세요.</p>
        </section>
        <div class="section-title">미제출 과제</div>
        <div class="assignment-list">
          ${missing.length ? missing.map(item => renderAssignmentCard(item, false)).join('') : '<div class="empty">현재 미제출 과제가 없습니다.</div>'}
        </div>
        <div class="section-title">제출 완료</div>
        <div class="assignment-list">
          ${done.length ? done.map(item => renderAssignmentCard(item, true)).join('') : '<div class="empty">제출 완료 과제가 없습니다.</div>'}
        </div>
      `;
    }
    function renderAssignmentCard(item, done) {
      const due = `${item.due_date || ''}${item.due_time ? ` ${item.due_time}` : ''}`.trim();
      const meta = done
        ? `제출 ${item.submitted_at || ''}`.trim()
        : `마감 ${due || '-'}`;
      const buttonText = done ? '확인' : '제출하기';
      const statusText = done ? '완료' : '미제출';
      const url = `../homework/?assignment_id=${encodeURIComponent(item.assignment_id)}&student_id=${encodeURIComponent(session.student_id)}`;
      return `
        <article class="assignment-card">
          <div class="assignment-top">
            <div style="min-width:0;">
              <div class="assignment-title">${escapeHtml(item.title || '과제')}</div>
              <div class="assignment-meta">${escapeHtml(item.class_name || '')}${item.class_name ? ' · ' : ''}${escapeHtml(meta)}</div>
            </div>
            <span class="status-pill ${done ? 'done' : 'missing'}">${statusText}</span>
          </div>
          <div class="row-actions">
            <button class="btn ${done ? '' : 'btn-primary'}" onclick="location.href='${url}'">${buttonText}</button>
          </div>
        </article>
      `;
    }
    function openPlanner() {
      if (!session?.student_id) return toast('로그인이 필요합니다.');
      location.href = `../planner/?student_id=${encodeURIComponent(session.student_id)}`;
    }
    function openOmrNotice() {
      toast('OMR 입력은 준비 중입니다. 선생님이 안내한 시험 QR 또는 코드를 사용해 주세요.');
    }
    function logoutStudent() {
      clearSession();
      toast('로그아웃 되었습니다.');
      renderLogin();
    }
    async function boot() {
      session = readSession();
      if (session?.student_id && session?.student_token) {
        setTopStudent(session.name || '');
        $('app').innerHTML = `${renderHero()}<section class="card"><div class="notice"><strong>불러오는 중</strong><br>학생 정보를 확인하고 있습니다.</div></section>`;
        await loadHome();
      } else {
        renderLogin();
      }
    }
    boot();
  </script>
</body>
</html>
