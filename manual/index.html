<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AP Math OS 사용설명서</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="manual.css">
</head>
<body>
    <div class="manual-app">
        <header class="manual-hero">
            <div class="manual-hero-inner">
                <div class="brand-row">
                    <div class="brand-mark">AP</div>
                    <div>
                        <div class="brand-eyebrow">Teacher Guide Center</div>
                        <h1>AP Math OS 사용설명서</h1>
                    </div>
                </div>
                <p class="hero-copy">선생님들이 수업 중 바로 찾아볼 수 있는 운영 가이드입니다. 출석, 숙제, 시험성적, QR/OMR, JS아카이브 시험지 출력, 레포트 문구 생성까지 필요한 기능을 검색해서 확인할 수 있습니다.</p>
                <div class="hero-meta">
                    <span id="manual-updated">업데이트 확인 중</span>
                    <span>모바일 최적화</span>
                    <span>검색형 도움말</span>
                </div>
            </div>
        </header>

        <main class="manual-main">
            <section class="quick-panel" aria-labelledby="quick-title">
                <div class="section-heading">
                    <div>
                        <span class="section-kicker">Start here</span>
                        <h2 id="quick-title">처음 쓰는 선생님은 이것만 보세요</h2>
                    </div>
                    <button class="soft-btn" id="btn-print-guide" type="button">인쇄용 보기</button>
                </div>
                <div class="quick-grid" id="quick-start"></div>
            </section>

            <section class="search-panel" aria-labelledby="search-title">
                <div class="search-card">
                    <label for="manual-search" id="search-title">궁금한 기능 검색</label>
                    <div class="search-input-wrap">
                        <span class="search-icon">⌕</span>
                        <input id="manual-search" type="search" autocomplete="off" placeholder="궁금한 기능을 검색하세요. 예: QR, 출석, 성적, 아카이브">
                        <button id="clear-search" type="button" aria-label="검색어 지우기">×</button>
                    </div>
                    <div class="search-hints" id="search-hints"></div>
                </div>
                <nav class="category-tabs" id="category-tabs" aria-label="설명서 카테고리"></nav>
            </section>

            <section class="content-layout">
                <aside class="toc-panel" aria-label="목차">
                    <div class="toc-title">목차</div>
                    <div id="toc-list"></div>
                </aside>
                <section class="result-panel" aria-live="polite">
                    <div class="result-head">
                        <div>
                            <span class="section-kicker">Manual topics</span>
                            <h2 id="result-title">전체 설명</h2>
                        </div>
                        <span id="result-count" class="count-badge">0개</span>
                    </div>
                    <div id="manual-results" class="manual-results"></div>
                </section>
            </section>
        </main>
    </div>

    <button class="top-button" id="top-button" type="button" aria-label="맨 위로">↑</button>
    <script src="manual-data.js"></script>
    <script src="manual.js"></script>
</body>
</html>
