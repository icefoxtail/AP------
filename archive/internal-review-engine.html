<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS아카이브 내부 검수 엔진</title>
  <link rel="stylesheet" href="internal-review-engine.css">
</head>
<body>
  <!-- 상단 바 -->
  <header id="topbar">
    <div id="topbar-title">JS아카이브 내부 검수 엔진</div>
    <div id="topbar-controls">
      <div id="view-mode-btns">
        <button type="button" class="view-btn active" data-mode="question">문제만</button>
        <button type="button" class="view-btn" data-mode="answer">문제+정답</button>
        <button type="button" class="view-btn" data-mode="solution">문제+해설</button>
        <button type="button" class="view-btn" data-mode="table">검수표</button>
      </div>
      <div id="action-btns">
        <button type="button" id="btn-save-file" class="btn-primary" title="Ctrl+S">수정본 저장</button>
        <button type="button" id="btn-download" class="btn-secondary" title="Ctrl+D">다운로드</button>
        <button type="button" id="btn-backup">백업 다운로드</button>
        <button type="button" id="btn-csv">검수표 CSV</button>
        <button type="button" id="btn-restore-all" class="btn-warn">전체 되돌리기</button>
      </div>
    </div>
  </header>

  <!-- 에러 박스 -->
  <div id="error-box" style="display:none"></div>
  <!-- 토스트 -->
  <div id="toast" style="display:none"></div>

  <!-- 상태 바 -->
  <div id="statusbar">
    <span id="status-file">파일 없음</span>
    <span id="status-save-mode" class="badge-warn"></span>
    <span id="status-counts"></span>
  </div>

  <!-- 3단 레이아웃 -->
  <div id="main-layout">

    <!-- 왼쪽 패널 -->
    <aside id="left-panel">
      <div id="file-open-btns">
        <button type="button" id="btn-open-dir" class="btn-primary">📂 archive 폴더 열기</button>
        <button type="button" id="btn-open-file">📄 JS 파일 열기</button>
        <input type="file" id="fallback-input" accept=".js" style="display:none">
      </div>
      <div id="file-list-area">
        <div id="file-list-label">파일 목록</div>
        <input type="text" id="file-search" placeholder="파일명 검색..." style="display:none">
        <div id="file-list"></div>
      </div>
      <hr>
      <div id="filter-area">
        <div id="filter-label">필터</div>
        <div id="filter-btns"></div>
        <div id="search-box">
          <input type="text" id="content-search" placeholder="내용 검색 (content/id/tags)...">
        </div>
      </div>
      <div id="left-stats"></div>
    </aside>

    <!-- 가운데 패널 -->
    <main id="center-panel">
      <div id="engine-iframe-wrap">
        <iframe id="engine-iframe"></iframe>
        <div id="engine-placeholder">파일을 열면 미리보기가 표시됩니다.<br><small>archive 폴더를 열어야 iframe 미리보기가 지원됩니다.</small></div>
      </div>
      <div id="review-table-area" style="display:none">
        <table id="review-table">
          <thead>
            <tr>
              <th>#</th><th>id</th><th>현재레벨</th><th>추천레벨</th>
              <th>유형</th><th>tags</th><th>내용(preview)</th>
              <th>정답(preview)</th><th>경고</th><th>수정</th><th>제거</th>
            </tr>
          </thead>
          <tbody id="review-table-body"></tbody>
        </table>
      </div>
    </main>

    <!-- 오른쪽 패널 -->
    <aside id="right-panel">
      <div id="right-empty">문항을 클릭하면 여기에 수정 폼이 열립니다.</div>
      <div id="edit-form" style="display:none">
        <div id="edit-header">
          <span id="edit-qnum"></span>
          <span id="edit-qid"></span>
          <div id="edit-warnings-list"></div>
          <div id="edit-rec-level"></div>
        </div>

        <div class="field-group">
          <label>level</label>
          <select id="e-level">
            <option value="하">하</option>
            <option value="중">중</option>
            <option value="상">상</option>
          </select>
        </div>
        <div class="field-group">
          <label>questionType</label>
          <select id="e-qtype">
            <option value="객관식">객관식</option>
            <option value="단답형">단답형</option>
            <option value="서술형">서술형</option>
            <option value="OX">OX</option>
          </select>
        </div>
        <div class="field-group">
          <label>layoutTag</label>
          <input type="text" id="e-layout" placeholder="grid / stack / wide ...">
        </div>
        <div class="field-group">
          <label>tags <span class="hint">(쉼표 또는 줄바꿈)</span></label>
          <textarea id="e-tags" rows="2"></textarea>
        </div>
        <div class="field-group">
          <label>content</label>
          <textarea id="e-content" rows="5"></textarea>
        </div>
        <div class="field-group">
          <label>choices <span class="hint">(한 줄 = 한 보기)</span></label>
          <textarea id="e-choices" rows="5"></textarea>
        </div>
        <div class="field-group">
          <label>answer</label>
          <textarea id="e-answer" rows="2"></textarea>
        </div>
        <div class="field-group">
          <label>solution</label>
          <textarea id="e-solution" rows="6"></textarea>
        </div>
        <div class="field-group">
          <label>image</label>
          <input type="text" id="e-image" placeholder="assets/images/...">
          <div id="e-image-preview"></div>
        </div>

        <div id="edit-action-btns">
          <button type="button" id="btn-apply" class="btn-primary">적용</button>
          <button type="button" id="btn-remove" class="btn-danger">제거</button>
          <button type="button" id="btn-revert">되돌리기</button>
        </div>
      </div>
    </aside>
  </div>

  <script src="internal-review-engine.js"></script>
</body>
</html>
