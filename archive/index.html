}

async function doApmathLoginAndOpenAssignTarget(e) {
    if (e && e.preventDefault) e.preventDefault();
    const loginId = document.getElementById('assign-target-login-id')?.value.trim();
    const pw = document.getElementById('assign-target-login-pw')?.value;
    const errEl = document.getElementById('assign-target-login-err');
    if (!loginId || !pw) { if (errEl) errEl.innerText = '아이디와 비밀번호를 입력하세요.'; return; }
    if (errEl) errEl.innerText = '로그인 중...';
    try {
        const res = await fetch(`${ARCHIVE_AP_API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login_id: loginId, password: pw })
        });
        const data = await res.json();
        if (!data.success) { if (errEl) errEl.innerText = '아이디 또는 비밀번호가 맞지 않습니다.'; return; }
        window.__APMATH_AUTH_MEMORY = { login_id: loginId, raw_password: pw };
        saveApmathSession({ login_id: data.login_id || loginId, id: data.id, name: data.name, role: data.role, session_token: data.session_token || '', expires_at: data.expires_at || '' });
        if (AssignTarget?.item) openAssignTargetPanel(AssignTarget.item, AssignTarget.qpp);
    } catch(err) {
        if (errEl) errEl.innerText = '서버 연결 실패. 다시 시도하세요.';
    }
}

function ensureAssignTargetGradeState(grade) {
    if (!AssignTarget.gradeStates[grade]) {
        const state = {};
        getIndexClassesForGrade(grade).forEach(row => {
            state[row.id] = {
                row,
                checked: false,
                studentIds: null,
                roster: null,
                rosterLoading: false,
                rosterError: null,
                toast: null,
                toastUndo: null
            };
        });
        AssignTarget.gradeStates[grade] = state;
    }
    return AssignTarget.gradeStates[grade];
}

function assignTargetSwitchGrade(grade) {
    if (!AssignTarget) return;
    AssignTarget.grade = grade;
    AssignTarget.classState = ensureAssignTargetGradeState(grade);
    const teacherOptions = getIndexTeacherFilterOptions(getIndexClassesForGrade(grade));
    if (AssignTarget.teacherFilter && !teacherOptions.some(option => option.value === AssignTarget.teacherFilter)) {
        AssignTarget.teacherFilter = '';
    }
    renderAssignTargetSelectView();
    getAssignTargetVisibleClassIds().forEach(id => {
        if (AssignTarget.classState[id].checked) ensureAssignClassRoster(id);
    });
}

function assignTargetSetTeacherFilter(value) {
    if (!AssignTarget) return;
    AssignTarget.teacherFilter = String(value || '');
    renderAssignTargetSelectView();
    getAssignTargetVisibleClassIds().forEach(id => {
        if (AssignTarget.classState[id].checked) ensureAssignClassRoster(id);
    });
}

async function ensureAssignClassRoster(classId) {
    const st = AssignTarget?.classState?.[classId];
    if (!st || st.roster || st.rosterLoading) return;
    st.rosterLoading = true;
    renderAssignTargetSelectView();
    try {
        const authHeader = getIndexAssignmentAuthHeader();
        if (!authHeader) throw new Error('AP Math OS 로그인이 필요합니다.');
        const examTitle = getIndexExamTitle(AssignTarget.item);
        const examDate = new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().split('T')[0];
        const url = `${ARCHIVE_AP_API_BASE}/class-exam-assignments/roster?class_id=${encodeURIComponent(classId)}&exam_title=${encodeURIComponent(examTitle)}&exam_date=${encodeURIComponent(examDate)}`;
        const res = await fetch(url, { headers: authHeader });
        if (!res.ok) throw new Error('roster fetch failed: ' + res.status);
        const data = await res.json();
        st.roster = Array.isArray(data.students) ? data.students : [];
        st.rosterError = null;
    } catch(e) {
        console.warn('[assign target] roster fetch failed:', classId, e);
        st.rosterError = '학생 목록을 불러오지 못했습니다.';
        st.roster = null;
    } finally {
        st.rosterLoading = false;
        if (AssignTarget) renderAssignTargetSelectView();
    }
}

function assignRetryRoster(classId) {
    const st = AssignTarget?.classState?.[classId];
    if (!st) return;
    st.roster = null;
    st.rosterError = null;
    ensureAssignClassRoster(classId);
}

function assignTargetToggleAll(checked) {
    const classIds = getAssignTargetVisibleClassIds();
    classIds.forEach(id => {
        AssignTarget.classState[id].checked = checked;
        AssignTarget.classState[id].studentIds = null;
    });
    renderAssignTargetSelectView();
    if (checked) {
        classIds.forEach(id => ensureAssignClassRoster(id));
    }
}

function assignTargetToggleClass(classId, checked) {
    const st = AssignTarget.classState[classId];
    if (!st) return;
    st.checked = checked;
    if (checked) {
        st.studentIds = null;
        ensureAssignClassRoster(classId);
    }
    renderAssignTargetSelectView();
}

function assignTargetToggleStudent(classId, studentId, checked) {
    const st = AssignTarget.classState[classId];
    if (!st || !st.roster) return;
    if (!st.studentIds) st.studentIds = new Set(st.roster.map(s => s.id));
    if (checked) st.studentIds.add(studentId); else st.studentIds.delete(studentId);
    if (st.studentIds.size === st.roster.length) st.studentIds = null;
    st.toast = null;
    st.toastUndo = null;
    renderAssignTargetSelectView();
}

function assignTargetSelectAllStudents(classId) {
    const st = AssignTarget.classState[classId];
    if (!st) return;
    st.studentIds = null;
    st.toast = null;
    st.toastUndo = null;
    renderAssignTargetSelectView();
}

function assignTargetApplyPreset(classId, kind) {
    const st = AssignTarget.classState[classId];
    if (!st || !st.roster) return;
    const before = st.studentIds ? new Set(st.studentIds) : new Set(st.roster.map(s => s.id));
    const matches = st.roster.filter(s => kind === 'submitted' && s.already_submitted);
    if (!matches.length) return;
    const next = new Set(before);
    matches.forEach(s => next.delete(s.id));
    st.toastUndo = before;
    st.studentIds = next.size === st.roster.length ? null : next;
    st.toast = `${matches.length}명 자동 제외됨(이미 응시한 학생)`;
    renderAssignTargetSelectView();
}

function assignTargetUndoLastPreset(classId) {
    const st = AssignTarget.classState[classId];
    if (!st || !st.toastUndo) return;
    st.studentIds = (st.roster && st.toastUndo.size === st.roster.length) ? null : new Set(st.toastUndo);
    st.toast = null;
    st.toastUndo = null;
    renderAssignTargetSelectView();
}

function assignTargetSearchStudents(classId, value) {
    const section = document.getElementById('assign-class-section-' + classId);
    if (!section) return;
    const q = value.trim();
    section.querySelectorAll('.assign-student-check').forEach(label => {
        const name = label.querySelector('.name')?.textContent || '';
        label.style.display = (!q || name.includes(q)) ? '' : 'none';
    });
}

function computeAssignTargetSummary() {
    const classIds = getAssignTargetVisibleClassIds();
    const checkedIds = classIds.filter(id => AssignTarget.classState[id].checked);
    let fullCount = 0, partialCount = 0, totalStudents = 0;
    checkedIds.forEach(id => {
        const st = AssignTarget.classState[id];
        if (st.studentIds) {
            partialCount++;
            totalStudents += st.studentIds.size;
        } else {
            fullCount++;
            totalStudents += (st.roster ? st.roster.length : 0);
        }
    });
    if (!checkedIds.length) {
        return { text: `${AssignTarget.grade} · 선택된 반 없음`, totalStudents: 0 };
    }
    const parts = [];
    if (fullCount) parts.push(`${fullCount}개 반 전체`);
    if (partialCount) parts.push(`${partialCount}개 반 일부`);
    return { text: `${AssignTarget.grade} · ${parts.join(' + ')} · 총 ${totalStudents}명`, totalStudents };
}

function renderAssignClassRowHtml(classId) {
    const st = AssignTarget.classState[classId];
    const teacherName = getIndexClassTeacherName(st.row);
    const teacherHtml = teacherName ? `<small>${escapeModalText(teacherName)}</small>` : '';
    const countLabel = st.studentIds
        ? `${st.studentIds.size}/${st.roster ? st.roster.length : '?'}명`
        : (st.roster ? `${st.roster.length}명` : (st.rosterLoading ? '...' : ''));
    return `
        <div class="assign-class-row ${st.studentIds ? 'partial' : ''}">
            <input type="checkbox" id="assign-class-check-${classId}" ${st.checked ? 'checked' : ''} onchange="assignTargetToggleClass('${classId}', this.checked)">
            <span class="name">${escapeModalText(st.row.name || '이름 없는 반')}${teacherHtml}</span>
            <span class="count">${countLabel}</span>
        </div>`;
}

function renderAssignClassSectionHtml(classId) {
    const st = AssignTarget.classState[classId];
    const countText = st.roster ? `${st.roster.length}명` : '...';
    const title = `${escapeModalText(st.row.name || '이름 없는 반')} (${countText})`;
    const head = `<div class="assign-class-section-head"><div class="assign-class-section-title">${title}</div>`;

    if (st.rosterLoading || (!st.roster && !st.rosterError)) {
        return `<div class="assign-class-section" id="assign-class-section-${classId}">${head}</div><div class="empty-hint">학생 목록 불러오는 중...</div></div>`;
    }
    if (st.rosterError) {
        return `<div class="assign-class-section" id="assign-class-section-${classId}">${head}</div><div class="empty-hint" style="color:var(--warn-text);">${st.rosterError} <button class="assign-preset-btn" onclick="assignRetryRoster('${classId}')">다시 시도</button></div></div>`;
    }
    if (!st.roster.length) {
        return `<div class="assign-class-section" id="assign-class-section-${classId}">${head}</div><div class="empty-hint">재원 학생이 없습니다.</div></div>`;
    }

    const excludedSet = st.studentIds ? new Set(st.roster.filter(s => !st.studentIds.has(s.id)).map(s => s.id)) : new Set();

    const gridHtml = st.roster.map(s => {
        const checked = !st.studentIds || st.studentIds.has(s.id);
        const classes = ['assign-student-check'];
        if (s.already_submitted) classes.push('submitted');
        return `<label class="${classes.join(' ')}"><input type="checkbox" ${checked ? 'checked' : ''} onchange="assignTargetToggleStudent('${classId}','${s.id}', this.checked)"><span class="name">${escapeModalText(s.name)}</span></label>`;
    }).join('');

    const excludedChips = excludedSet.size
        ? `<div class="assign-excluded-chips">${st.roster.filter(s => excludedSet.has(s.id)).map(s => `<span class="assign-chip" onclick="assignTargetToggleStudent('${classId}','${s.id}', true)">${escapeModalText(s.name)} ✕</span>`).join('')}</div>`
        : '';

    const toastHtml = st.toast
        ? `<div class="assign-toast"><span>${escapeModalText(st.toast)}</span><button onclick="assignTargetUndoLastPreset('${classId}')">되돌리기</button></div>`
        : '';

    const hasSubmittedCandidate = st.roster.some(s => s.already_submitted);

    return `
        <div class="assign-class-section" id="assign-class-section-${classId}">
            <div class="assign-class-section-head">
                <div class="assign-class-section-title">${title}</div>
                <div class="assign-preset-btns">
                    ${excludedSet.size ? `<button class="assign-preset-btn" onclick="assignTargetSelectAllStudents('${classId}')">전체 선택</button>` : ''}
                    ${hasSubmittedCandidate ? `<button class="assign-preset-btn" onclick="assignTargetApplyPreset('${classId}','submitted')">이 시험 미응시자만</button>` : ''}
                </div>
            </div>
            ${st.roster.length > 8 ? `<input class="assign-student-search" placeholder="학생 이름 검색" oninput="assignTargetSearchStudents('${classId}', this.value)">` : ''}
            <div class="assign-student-grid">${gridHtml}</div>
            ${excludedChips}
            ${toastHtml}
        </div>`;
}

function renderAssignTargetSelectView() {
    if (!AssignTarget) return;
    const grades = getIndexAvailableGrades(AssignTarget.classRows);
    const gradeClassRows = getIndexClassesForGrade(AssignTarget.grade);
    const teacherOptions = getIndexTeacherFilterOptions(gradeClassRows);
    const classIds = getAssignTargetVisibleClassIds();
    const allChecked = classIds.length > 0 && classIds.every(id => AssignTarget.classState[id].checked && !AssignTarget.classState[id].studentIds);
    const noneChecked = classIds.every(id => !AssignTarget.classState[id].checked);

    const tabsHtml = grades.map(g => `<div class="assign-grade-tab ${g === AssignTarget.grade ? 'active' : ''}" onclick="assignTargetSwitchGrade('${g}')">${g}</div>`).join('');
    const teacherFilterHtml = teacherOptions.length > 1
        ? `<div class="assign-filter-row"><select class="assign-teacher-filter" onchange="assignTargetSetTeacherFilter(this.value)">
            <option value="">전체 선생님</option>
            ${teacherOptions.map(option => `<option value="${escapeModalText(option.value)}" ${option.value === AssignTarget.teacherFilter ? 'selected' : ''}>${escapeModalText(option.label)}</option>`).join('')}
        </select></div>`
        : '';
    const classRowsHtml = classIds.map(id => renderAssignClassRowHtml(id)).join('') || '<div class="empty-hint">해당 학년에 반이 없습니다.</div>';
    const checkedIds = classIds.filter(id => AssignTarget.classState[id].checked);
    const studentColHtml = checkedIds.length
        ? checkedIds.map(id => renderAssignClassSectionHtml(id)).join('')
        : '<div class="empty-hint">왼쪽에서 반을 선택하면 학생 목록이 표시됩니다.</div>';

    const summary = computeAssignTargetSummary();

    assignTargetBodyEl().innerHTML = `
        <div class="assign-target-panel">
            <div class="assign-target-head">
                <div class="assign-target-head-row">
                    <div class="modal-title">출제 대상 선택</div>
                    ${assignTargetPreviewToggleHtml()}
                </div>
                <div class="modal-sub">${escapeModalText(getIndexExamTitle(AssignTarget.item))} · 학년을 고르고, 반과 학생을 선택해서 출제하세요.</div>
                <div class="assign-grade-tabs">${tabsHtml}</div>
                ${teacherFilterHtml}
            </div>
            <div class="assign-target-body">
                <div class="assign-class-col">
                    <label class="assign-class-all-toggle">
                        <input type="checkbox" id="assign-class-all-toggle" ${allChecked ? 'checked' : ''} onchange="assignTargetToggleAll(this.checked)">
                        전체 반 선택
                    </label>
                    ${classRowsHtml}
                </div>
                <div class="assign-student-col">${studentColHtml}</div>
            </div>
            <div class="assign-target-foot">
                <div class="assign-summary-text">${summary.text}</div>
                <div class="assign-foot-btns">
                    <button class="modal-btn-cancel" onclick="closeModal()">취소</button>
                    <button class="modal-btn-primary" ${summary.totalStudents ? '' : 'disabled'} onclick="assignTargetGoReview()">출제 대상 최종 확인</button>
                </div>
            </div>
        </div>`;

    classIds.forEach(id => {
        const st = AssignTarget.classState[id];
        const el = document.getElementById('assign-class-check-' + id);
        if (el) el.indeterminate = st.checked && !!st.studentIds;
    });
    const allToggleEl = document.getElementById('assign-class-all-toggle');
    if (allToggleEl) allToggleEl.indeterminate = !allChecked && !noneChecked;
}

function assignTargetGoReview() {
    const summary = computeAssignTargetSummary();
    if (!summary.totalStudents) return;
    AssignTarget.view = 'review';
    // 최종 확인은 "이 명단에게 이 시험지가 출제된다"를 한 화면에서 보도록 미리보기를 기본으로 연다.
    AssignTarget.previewOpen = true;
    renderAssignTargetReviewView();
    syncAssignTargetPreviewPane();
}

function assignTargetBackToSelect() {
    AssignTarget.view = 'select';
    AssignTarget.previewOpen = false;
    syncAssignTargetPreviewPane();
    renderAssignTargetSelectView();
}

function renderAssignTargetReviewView() {
    const classIds = Object.keys(AssignTarget.classState).filter(id => AssignTarget.classState[id].checked);
    const rowsHtml = classIds.map(id => {
        const st = AssignTarget.classState[id];
        const name = escapeModalText(st.row.name || '이름 없는 반');
        if (!st.studentIds) {
            return `<div class="class-full">${name} (${st.roster ? st.roster.length : 0}명 전체)</div>`;
        }
        const includedNames = st.roster.filter(s => st.studentIds.has(s.id)).map(s => s.name);
        const excludedNames = st.roster.filter(s => !st.studentIds.has(s.id)).map(s => s.name);
        return `
            <div class="class-full">${name} (${includedNames.length}명만)</div>
            <div class="class-partial-names">대상: ${includedNames.map(escapeModalText).join(', ')}</div>
            <div class="class-excluded-names">제외(${excludedNames.length}명): ${excludedNames.map(escapeModalText).join(', ')}</div>`;
    }).join('');

    const summary = computeAssignTargetSummary();

    assignTargetBodyEl().innerHTML = `
        <div class="assign-target-panel">
            <div class="assign-target-head">
                <div class="assign-target-head-row">
                    <div class="modal-title">최종 확인 — 이 명단으로 출제됩니다</div>
                    ${assignTargetPreviewToggleHtml()}
                </div>
                <div class="modal-sub">${escapeModalText(getIndexExamTitle(AssignTarget.item))}</div>
            </div>
            <div class="assign-target-body" style="display:block; padding:16px 28px; overflow-y:auto;">
                <div class="assign-review-list">${rowsHtml}</div>
            </div>
            <div class="assign-target-foot">
                <div class="assign-summary-text">${summary.text}</div>
                <div class="assign-foot-btns">
                    <button class="modal-btn-cancel" onclick="assignTargetBackToSelect()">뒤로</button>
                    <button class="modal-btn-primary" onclick="assignTargetSubmit()">총 ${summary.totalStudents}명에게 출제</button>
                </div>
            </div>
        </div>`;
}

async function assignTargetSubmit() {
    const classIds = Object.keys(AssignTarget.classState).filter(id => AssignTarget.classState[id].checked);
    if (!classIds.length) return;
    if (!resolveExamQuestionCountForAssignment(AssignTarget.item)) {
        renderAssignTargetNotice('문항 수 확인이 필요합니다.');
        return;
    }

    AssignTarget.scope = classIds.length === 1 ? 'class' : 'grade';
    AssignTarget.assignmentBatchId = getIndexAssignmentBatchId(AssignTarget.item, AssignTarget.grade);
    AssignTarget.view = 'progress';
    AssignTarget.previewOpen = false;
    syncAssignTargetPreviewPane();
    AssignTarget.progress = {};
    classIds.forEach(id => { AssignTarget.progress[id] = { status: 'pending' }; });
    renderAssignTargetProgressView();

    for (const classId of classIds) {
        await assignTargetProcessOneClass(classId);
        if (!AssignTarget) return;
        renderAssignTargetProgressView();
    }
    assignTargetMaybeFinish();
}

async function assignTargetProcessOneClass(classId) {
    const st = AssignTarget.classState[classId];
    AssignTarget.progress[classId] = { status: 'pending' };
    try {
        await registerIndexClassExamAssignment(st.row, AssignTarget.item, {
            assignmentBatchId: AssignTarget.assignmentBatchId,
            target_scope: AssignTarget.scope,
            gradeLabel: AssignTarget.grade
        });
        if (st.studentIds) {
            const excludedIds = st.roster.filter(s => !st.studentIds.has(s.id)).map(s => s.id);
            if (excludedIds.length) {
                const authHeader = getIndexAssignmentAuthHeader();
                const examDate = new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().split('T')[0];
                const res = await fetch(`${ARCHIVE_AP_API_BASE}/class-exam-assignments/exclude-students`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...authHeader },
                    body: JSON.stringify({
                        class_id: classId,
                        student_ids: excludedIds,
                        exam_title: getIndexExamTitle(AssignTarget.item),
                        exam_date: examDate,
                        archive_file: `exams/${AssignTarget.item.file}`
                    })
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok || !data.success) throw new Error('exclude-students failed: ' + res.status);
            }
        }
        AssignTarget.progress[classId] = { status: 'success' };
    } catch(e) {
        console.warn('[assign target] class 처리 실패:', classId, e);
        AssignTarget.progress[classId] = { status: 'error', error: String(e?.message || e) };
    }
}

function renderAssignTargetProgressView() {
    const classIds = Object.keys(AssignTarget.progress);
    const rowsHtml = classIds.map(id => {
        const st = AssignTarget.classState[id];
        const p = AssignTarget.progress[id];
        const icon = p.status === 'success' ? '✔' : p.status === 'error' ? '✕' : '…';
        return `<div class="assign-progress-row ${p.status}"><span class="icon">${icon}</span><span>${escapeModalText(st.row.name || '')}${p.status === 'error' ? ' — 등록 실패' : ''}</span></div>`;
    }).join('');

    const anyError = classIds.some(id => AssignTarget.progress[id].status === 'error');
    const anyPending = classIds.some(id => AssignTarget.progress[id].status === 'pending');

    assignTargetBodyEl().innerHTML = `
        <div class="assign-target-panel">
            <div class="assign-target-head">
                <div class="modal-title">${anyPending ? '출제 처리 중' : (anyError ? '일부 실패' : '출제 완료')}</div>
            </div>
            <div class="assign-target-body" style="display:block; padding:12px 28px; overflow-y:auto;">
                ${rowsHtml}
            </div>
            <div class="assign-target-foot">
                <div class="assign-summary-text">${anyPending ? '처리 중입니다...' : (anyError ? '실패한 반만 다시 시도할 수 있습니다.' : '모두 완료되었습니다.')}</div>
                <div class="assign-foot-btns">
                    ${(!anyPending && anyError) ? '<button class="modal-btn-primary" onclick="assignTargetRetryFailed()">실패한 반만 재시도</button>' : ''}
                    ${(!anyPending && !anyError) ? '<button class="modal-btn-primary" onclick="closeModal()">닫기</button>' : ''}
                </div>
            </div>
        </div>`;
}

async function assignTargetRetryFailed() {
    const failedIds = Object.keys(AssignTarget.progress).filter(id => AssignTarget.progress[id].status === 'error');
    for (const classId of failedIds) {
        await assignTargetProcessOneClass(classId);
        if (!AssignTarget) return;
        renderAssignTargetProgressView();
    }
    assignTargetMaybeFinish();
}

function assignTargetMaybeFinish() {
    if (!AssignTarget) return;
    const allSuccess = Object.values(AssignTarget.progress).every(p => p.status === 'success');
    if (!allSuccess) return;
    if (AssignTarget.grade) loadAssignmentBoardForGrade(AssignTarget.grade);
    setTimeout(() => assignTargetFinishAndOpenEngine(), 700);
}

function assignTargetFinishAndOpenEngine() {
    if (!AssignTarget) return;
    const classIds = Object.keys(AssignTarget.classState).filter(id => AssignTarget.classState[id].checked);
    const representativeId = classIds[0];
    const representative = representativeId ? AssignTarget.classState[representativeId].row : null;
    const item = AssignTarget.item;
    const qpp = AssignTarget.qpp;
    const gradeLabel = AssignTarget.grade;
    const assignmentBatchId = AssignTarget.assignmentBatchId;
    const scope = AssignTarget.scope;
    closeModal();
    if (representative) {
        goEngine(item, "exam", qpp, {
            submitQr: true,
            classId: representative.id,
            teacherName: getQrTeacherName(representative),
            className: representative.name || '',
            target_scope: scope,
            gradeLabel,
            assignmentBatchId
        });
    }
}

/* engine.html 연동 */
function goEngine(item, action, qpp, options = {}) {
    const baseTitle = item.school || item.topic || String(item.file || '').replace('.js', '');
    const title = `${baseTitle} ${item.subject || ''}`.trim();

    const url = new URL('engine.html', window.location.href);
    url.searchParams.set('mode', action);
    url.searchParams.set('qpp', qpp);
    url.searchParams.set('data', 'exams/' + item.file);
    url.searchParams.set('title', title);
    url.searchParams.set('subject', item.subject || '');

    if (options.submitQr) url.searchParams.set('submitQr', '1');
    if (options.classId) url.searchParams.set('class', options.classId);
    if (options.teacherName) url.searchParams.set('teacher', options.teacherName);
    if (options.className) url.searchParams.set('className', options.className);
    if (options.target_scope) url.searchParams.set('target_scope', options.target_scope);
    if (options.gradeLabel) url.searchParams.set('grade_label', options.gradeLabel);
    if (options.assignmentBatchId) url.searchParams.set('assignment_batch_id', options.assignmentBatchId);
    const questionCount = getArchiveExamQuestionCount(item);
    if (questionCount) url.searchParams.set('q', String(questionCount));

    window.open(appendCurrentArchiveSessionToHash(url.toString()), '_blank');
}

function resetView() {
    location.reload();
}

// PWA(/apmath/) 안에서 열린 아카이브는 모바일에서 외부 브라우저로 떠 localStorage가
// 공유되지 않는다. AP Math OS가 URL 해시로 넘긴 세션을 이 페이지 저장소에 복원한다.
function restoreApmathSessionFromHash() {
    const hash = window.location.hash || '';
    const match = /[#&]apmsess=([^&]+)/.exec(hash);
    if (!match) return false;
    try {
        const incoming = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(match[1])))));
        if (incoming && (incoming.session_token || incoming.login_id)) {
            let existing = null;
            try { existing = JSON.parse(localStorage.getItem('APMATH_SESSION') || 'null'); } catch (e) {}
            // 이미 사용 가능한 세션 토큰이 있으면 덮어쓰지 않는다.
            const session = {
                ...(existing || {}),
                ...incoming,
                login_id: incoming.login_id || incoming.loginId || (existing && (existing.login_id || existing.loginId)) || '',
                id: incoming.id || (existing && existing.id) || '',
                name: incoming.name || (existing && existing.name) || '',
                role: incoming.role || (existing && existing.role) || '',
                session_token: incoming.session_token || (existing && existing.session_token) || '',
                expires_at: incoming.expires_at || (existing && existing.expires_at) || '',
                restored_from_archive_hash: true,
                restored_at: new Date().toISOString()
            };
            saveApmathSession(session);
            return true;
        }
    } catch (e) {
        // 잘못된 페이로드는 무시한다.
    } finally {
        // 토큰이 주소창/히스토리에 남지 않도록 해시를 제거한다.
        try {
            history.replaceState(null, '', window.location.pathname + window.location.search);
        } catch (e) {}
    }
    return false;
}

window.onload = function () {
    init();
};
