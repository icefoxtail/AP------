<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS아카이브 | 수학 기출 통합 시스템</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --navy: #ffffff;
            --navy-2: #f8fafc;
            --navy-3: #eef4fb;
            --navy-4: #e5edf7;
            --blue-main: #3f3f46;
            --blue-strong: #27272a;
            --blue-light: #a1a1aa;
            --blue-pale: #e4e4e7;
            --blue-soft: #f4f4f5;
            --green-main: #059669;
            --green-soft: #ecfdf5;
            --green-border: #b7efd4;
            --gray-muted: #94a3b8;
            --bg-soft: #f4f4f5;
            --card-bg: #ffffff;
            --card-active: #f7f7f8;
            --card-border: #e4e4e7;
            --card-border-hover: #d4d4d8;
            --card-border-active: #a1a1aa;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --text-weak: #94a3b8;
            --badge-bg: #f4f4f5;
            --badge-text: #27272a;
            --badge-border: #e4e4e7;
            --warn-bg: #fff7ed;
            --warn-border: #fed7aa;
            --warn-text: #9a3412;
            --shadow-card: 0 14px 32px rgba(15, 23, 42, 0.06);
            --shadow-card-hover: 0 18px 34px rgba(15, 23, 42, 0.10);
            --shadow-panel: 0 24px 48px rgba(2, 8, 23, 0.16);
            --radius-xl: 24px;
            --radius-lg: 20px;
            --radius-md: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(180deg, #fafafa 0%, var(--bg-soft) 100%);
            color: #1e293b;
            overflow-x: hidden;
        }

        header {
            background: rgba(255, 255, 255, 0.92);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(228, 228, 231, 0.95);
            backdrop-filter: blur(12px);
        }

        .top-nav {
            max-width: 1200px;
            margin: 0 auto;
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
        }

        .grade-nav {
            display: flex;
            width: 100%;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            max-width: 780px;
        }

        .gtab {
            font-size: 13px;
            color: #64748b;
            font-weight: 700;
            padding: 9px 14px;
            border-radius: 999px;
            cursor: pointer;
            transition: 0.18s ease;
            border: 1px solid #e4e4e7;
            background: #f8fafc;
            user-select: none;
            letter-spacing: -0.01em;
        }

        .gtab:hover {
            color: #27272a;
            background: #f4f4f5;
            border-color: #d4d4d8;
            transform: translateY(-1px);
        }

        .gtab.active {
            color: #fff;
            background: linear-gradient(180deg, var(--blue-main) 0%, var(--blue-strong) 100%);
            border-color: var(--blue-main);
            box-shadow: 0 8px 16px rgba(39, 39, 42, 0.14);
        }

        .hero {
            background: linear-gradient(180deg, #ffffff 0%, #f7f7f8 100%);
            padding: 38px 24px 56px;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid #e4e4e7;
        }

        .hero::before,
        .hero::after { display: none; }

        .hero-inner {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .hero-brand-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 22px;
        }

        .hero-left {
            max-width: 860px;
            min-width: 0;
        }

        .assignment-board {
            position: absolute;
            right: 0;
            top: 44px;
            width: 430px;
            min-height: 270px;
            border: 1px solid #e4e4e7;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.10);
            backdrop-filter: blur(14px);
            padding: 14px;
            color: var(--text-main);
            display: none;
        }

        .assignment-board.open { display: block; }

        .assignment-board-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .assignment-board-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--text-main);
            white-space: nowrap;
        }

        .assignment-board-date {
            width: 126px;
            height: 30px;
            border: 1px solid #e4e4e7;
            border-radius: 8px;
            background: #fafafa;
            color: var(--text-main);
            font-size: 11px;
            font-weight: 700;
            padding: 0 8px;
        }

        .assignment-board-date::-webkit-calendar-picker-indicator { opacity: 0.72; }

        .assignment-board-range {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .assignment-board-tabs {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 6px;
            margin-bottom: 8px;
        }

        .assignment-board-tab {
            height: 28px;
            border: 1px solid #e4e4e7;
            border-radius: 8px;
            background: #fafafa;
            color: #71717a;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
        }

        .assignment-board-tab.active {
            border-color: #a1a1aa;
            background: #f4f4f5;
            color: #27272a;
        }

        .assignment-board-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 202px;
            overflow: auto;
            padding-right: 2px;
        }

        .assignment-board-row {
            display: grid;
            grid-template-columns: 72px minmax(0, 1fr) minmax(84px, 0.74fr);
            gap: 8px;
            align-items: center;
            min-height: 30px;
            border: 1px solid #e4e4e7;
            border-radius: 8px;
            background: #ffffff;
            padding: 6px 8px;
            font-size: 11px;
            font-weight: 700;
        }

        .assignment-board-row span {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .assignment-board-teacher {
            color: var(--text-sub);
        }

        .assignment-board-paper { color: var(--text-main); }

        .assignment-board-classes { color: #52525b; }

        .assignment-board-empty {
            border: 1px dashed #d4d4d8;
            border-radius: 10px;
            padding: 18px 10px;
            text-align: center;
            color: var(--text-sub);
            font-size: 12px;
            font-weight: 700;
        }

        .hero-title {
            font-size: clamp(32px, 5vw, 46px);
            font-weight: 800;
            color: #18181b;
            line-height: 1.14;
            letter-spacing: -0.05em;
            max-width: 760px;
        }

        .hero-title em {
            color: #52525b;
            font-style: normal;
        }

        .hero-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 24px;
        }

        .hero-stat {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 40px;
            padding: 0 14px;
            border-radius: 999px;
            background: #ffffff;
            border: 1px solid #e4e4e7;
            color: #52525b;
            font-size: 13px;
            font-weight: 700;
            backdrop-filter: blur(10px);
        }

        .hero-stat i {
            color: #71717a;
        }

        .hero-panel-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 30px;
            padding: 0 12px;
            border-radius: 999px;
            background: #f4f4f5;
            color: #3f3f46;
            font-size: 11px;
            font-weight: 800;
            border: 1px solid #e4e4e7;
            flex-shrink: 0;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .logo-mark {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(180deg, var(--blue-main) 0%, var(--blue-strong) 100%);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 3.5px;
            padding: 6px;
            box-shadow: 0 12px 22px rgba(29,78,216,0.24);
        }

        .logo-mark div { background: white; border-radius: 2px; }
        .logo-mark div:last-child { background: var(--blue-light); }

        .logo-name {
            font-size: 20px;
            font-weight: 800;
            color: #18181b;
            letter-spacing: -0.5px;
        }

        .logo-name em {
            color: #71717a;
            font-style: normal;
        }

        .filter-band {
            background: rgba(255,255,255,0.88);
            border-bottom: 1px solid #e6ebf3;
            position: sticky;
            top: 58px;
            z-index: 900;
            backdrop-filter: blur(14px);
        }

        .filter-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .fb-search {
            flex: 1 1 320px;
            position: relative;
            min-width: 260px;
        }

        .fb-search input {
            width: 100%;
            height: 44px;
            background: rgba(255,255,255,0.92);
            border: 1px solid #e4ebf5;
            border-radius: 12px;
            padding: 0 14px 0 40px;
            font-size: 13px;
            font-weight: 600;
            color: #0f172a;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s, transform 0.15s;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.03);
        }

        .fb-search input::placeholder {
            color: #94a3b8;
            font-weight: 600;
        }

        .fb-search input:focus {
            border-color: var(--blue-main);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(63, 63, 70, 0.08), 0 10px 20px rgba(63, 63, 70, 0.06);
            transform: translateY(-1px);
        }

        .fb-search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 13px;
        }

        .fb-sel {
            height: 44px;
            background: rgba(255,255,255,0.92);
            border: 1px solid #e4ebf5;
            border-radius: 12px;
            padding: 0 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            color: #334155;
            min-width: 120px;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.03);
            transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
        }

        .fb-sel:hover,
        .fb-sel:focus {
            border-color: #d4d4d8;
            box-shadow: 0 10px 18px rgba(15, 23, 42, 0.04);
            transform: translateY(-1px);
            outline: none;
        }

        .fb-mixer {
            height: 44px;
            background: linear-gradient(180deg, var(--blue-main) 0%, var(--blue-strong) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 18px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(39, 39, 42, 0.16);
            transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
        }

        .fb-mixer:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 28px rgba(39, 39, 42, 0.20);
            filter: brightness(1.02);
        }

        .fb-original-toggle {
            display: none;
            height: 44px;
            background: rgba(255,255,255,0.92);
            color: #334155;
            border: 1px solid #e4ebf5;
            border-radius: 12px;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.03);
            transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s, color 0.15s, background 0.15s;
            align-items: center;
            gap: 7px;
        }

        .fb-original-toggle:hover {
            border-color: #d4d4d8;
            box-shadow: 0 10px 18px rgba(15, 23, 42, 0.04);
            transform: translateY(-1px);
        }

        .fb-original-toggle.active {
            background: linear-gradient(180deg, #fff7ed 0%, #ffedd5 100%);
            color: #9a3412;
            border-color: #fed7aa;
        }

        .content-wrap {
            background: linear-gradient(180deg, rgba(255,255,255,0.38) 0%, rgba(255,255,255,0) 100%);
        }

        .sec-block {
            padding: 52px 24px;
            width: 100vw;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
        }

        .sec-block > * {
            max-width: 1152px;
            margin: 0 auto;
        }

        .sec-block.dark {
            background: linear-gradient(180deg, #fafafa 0%, #f4f4f5 100%);
            color: var(--text-main);
            border-top: 1px solid #e4e4e7;
            border-bottom: 1px solid #e4e4e7;
        }

        .sec-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .sec-title {
            font-size: 19px;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: -0.03em;
        }

        .sec-block.dark .sec-title {
            color: #18181b;
        }

        .sec-line {
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .sec-block.dark .sec-line {
            background: #d4d4d8;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .exam-card {
            background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0.98) 100%);
            border: 1px solid var(--card-border);
            border-radius: 22px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: 0.18s ease;
            cursor: pointer;
            box-shadow: var(--shadow-card);
            position: relative;
        }

        .exam-card:hover {
            transform: translateY(-5px);
            border-color: var(--card-border-hover);
            box-shadow: var(--shadow-card-hover);
        }

        .exam-card.is-active {
            background: linear-gradient(180deg, #ffffff 0%, var(--card-active) 100%);
            border-color: var(--card-border-active);
            box-shadow: 0 16px 30px rgba(39, 39, 42, 0.12);
        }

        .card-top {
            height: 4px;
            background: linear-gradient(90deg, #3f3f46 0%, #a1a1aa 100%);
        }

        .exam-card.type-sheet .card-top {
            background: linear-gradient(90deg, #3f3f46 0%, #a1a1aa 100%);
        }

        .exam-card.type-study .card-top {
            background: linear-gradient(90deg, #059669 0%, #34d399 100%);
        }

        .card-body {
            padding: 22px 22px 18px;
            display: flex;
            flex-direction: column;
            min-height: 212px;
        }

        .card-grade-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .card-grade-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-sub);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .card-type-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 25px;
            padding: 0 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            border: 1px solid var(--badge-border);
            background: rgba(244,244,245,0.86);
            color: var(--badge-text);
            flex-shrink: 0;
            backdrop-filter: blur(8px);
        }

        .exam-card.type-study .card-type-chip {
            background: rgba(236,253,245,0.92);
            color: #047857;
            border-color: var(--green-border);
        }

        .card-main-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.28;
            letter-spacing: -0.04em;
            display: block;
            margin-bottom: 8px;
            white-space: normal;
            word-break: keep-all;
            overflow-wrap: anywhere;
        }

        .card-sub-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-sub);
            line-height: 1.58;
            display: block;
        }

        .card-meta-line {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-top: 13px;
            min-height: 28px;
        }

        .meta-badge {
            display: inline-flex;
            align-items: center;
            min-height: 27px;
            padding: 0 10px;
            border-radius: 9px;
            font-size: 11px;
            font-weight: 800;
            color: #475569;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4);
        }

        .meta-badge.primary {
            color: var(--blue-main);
            background: rgba(244,244,245,0.95);
            border-color: #e4e4e7;
        }

        .meta-badge.green {
            color: #047857;
            background: rgba(236,253,245,0.95);
            border-color: var(--green-border);
        }

        .card-file-name {
            display: block;
            margin-top: auto;
            font-size: 11px;
            line-height: 1.45;
            color: #000000;
            word-break: break-all;
            padding-top: 13px;
            border-top: 1px dashed #e2e8f0;
            opacity: 0.92;
        }

        .exam-card.is-active .card-file-name {
            color: #000000;
            border-top-color: #e4e4e7;
        }

        .card-actions {
            border-top: 1px solid var(--card-border);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: linear-gradient(180deg, #fcfcfd 0%, #f9f9fa 100%);
        }

        .exam-card.is-active .card-actions {
            background: linear-gradient(180deg, #f9f9fa 0%, #f4f4f5 100%);
            border-top-color: #e4e4e7;
        }

        .action-btn {
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-sub);
            transition: background 0.15s, color 0.15s;
        }

        .action-btn + .action-btn {
            border-left: 1px solid #edf2f7;
        }

        .action-btn:hover {
            background: #f4f4f5;
            color: #27272a;
        }

        .exam-card.is-active .action-btn + .action-btn {
            border-left-color: #e4e4e7;
        }

        .empty-state {
            max-width: 1152px;
            margin: 32px auto 0;
            padding: 18px 20px;
            border: 1px solid var(--warn-border);
            background: var(--warn-bg);
            color: var(--warn-text);
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 12px 24px rgba(154, 52, 18, 0.05);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 8, 23, 0.52);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-box {
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
            border-radius: 26px;
            padding: 40px;
            width: 388px;
            text-align: center;
            box-shadow: 0 28px 60px rgba(0,0,0,0.22);
            border: 1px solid rgba(226,232,240,0.9);
        }

        .modal-box--wide {
            width: min(920px, calc(100vw - 40px));
            max-height: min(88vh, 860px);
            text-align: left;
            padding: 0;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }

        #assignTargetBody {
            flex: 1 1 auto;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        #assignTargetPreviewPane {
            display: none;
            flex: 0 0 460px;
            min-width: 0;
            flex-direction: column;
            border-left: 1px solid rgba(226,232,240,0.9);
            background: #e8edf3;
        }

        #assignTargetBox.assign-preview-open {
            width: min(1400px, calc(100vw - 40px));
        }

        #assignTargetBox.assign-preview-open #assignTargetPreviewPane { display: flex; }

        #assignTargetBox.assign-review-preview {
            width: min(100vw - 16px, 1600px);
            height: min(100vh - 16px, 980px);
            max-height: calc(100vh - 16px);
            border-radius: 12px;
        }

        #assignTargetBox.assign-review-preview #assignTargetBody {
            flex: 0 0 min(360px, 28vw);
            max-width: 390px;
        }

        #assignTargetBox.assign-review-preview #assignTargetPreviewPane {
            flex: 1 1 auto;
            display: flex;
            background: #f1f5f9;
        }

        #assignTargetBox.assign-review-preview #assignTargetPreviewFrame {
            min-height: 0;
        }

        #assignTargetPreviewFrame {
            border: 0;
            width: 100%;
            flex: 1;
            min-height: 420px;
        }

        .assign-preview-toggle {
            flex: none;
            font-size: 12px;
            font-weight: 700;
            padding: 7px 14px;
            border-radius: 999px;
            cursor: pointer;
            border: 1px solid var(--card-border, #e2e8f0);
            background: #f8fafc;
            color: var(--text-main);
            transition: 0.15s ease;
        }

<script>
const ARCHIVE_ASSET_VERSION = '20260702';
function withArchiveAssetVersion(src) {
    return `${src}?v=${ARCHIVE_ASSET_VERSION}`;
}

let engineDB = { exams: [] };
let selectedGrade = '';
let includeOriginalArchiveItems = false;
let archiveDbLoadFailed = false;
let assignmentBoardState = {
    date: new Date().toLocaleDateString('sv-SE'),
    grade: '',
    boardRows: [],
    mode: 'all',
    loading: false
};

function compactText(value) {
    return String(value || '').replace(/\s+/g, '').trim();
}

function normalizeContentType(value) {
    const raw = String(value || '').trim();
    const compact = compactText(raw);

    if (!compact) return '';
    if (compact.includes('단원평가')) return '단원평가';
    if (compact.includes('기출유사')) return '유형';
    if (compact.includes('기출심화')) return '유형';
    if (compact.includes('유형')) return '유형';
    if (compact.includes('쪽지')) return '쪽지';
    if (compact === '기출') return '기출';

    return raw;
}

function normalizeGrade(value) {
    const compact = compactText(value);

    if (compact === '고1' || compact === '고등1' || compact === '고등학교1학년') return '고1';
    if (compact === '고2' || compact === '고등2' || compact === '고등학교2학년') return '고2';
    if (compact === '고3' || compact === '고등3' || compact === '고등학교3학년') return '고3';
    if (compact === '중1' || compact === '중등1' || compact === '중학교1학년') return '중1';
    if (compact === '중2' || compact === '중등2' || compact === '중학교2학년') return '중2';
    if (compact === '중3' || compact === '중등3' || compact === '중학교3학년') return '중3';

    return String(value || '').trim();
}

function normalizeSemester(value) {
    const compact = compactText(value);
    if (!compact) return '';
    if (compact === '1' || compact === '1학기') return '1';
    if (compact === '2' || compact === '2학기') return '2';
    return String(value || '').trim();
}

function normalizeExamType(value) {
    const compact = compactText(value).toLowerCase();
    if (!compact) return '';
    if (compact === 'mid' || compact === 'middle' || compact === '중간' || compact === '중간고사') return 'mid';
    if (compact === 'final' || compact === '기말' || compact === '기말고사') return 'final';
    return String(value || '').trim();
}

function normalizeYear(value) {
    if (value === '' || value == null) return '';
    const s = String(value).replace(/[^\d]/g, '');
    if (!s) return '';
    const n = parseInt(s, 10);
    return Number.isFinite(n) ? n : '';
}

function normalizeExamMeta(ex) {
    const normalized = { ...(ex || {}) };
    normalized.file = String(ex?.file || '').trim();
    normalized.school = String(ex?.school || '').trim();
    normalized.topic = String(ex?.topic || '').trim();
    normalized.subject = String(ex?.subject || '').trim();
    normalized.grade = normalizeGrade(ex?.grade);
    normalized.year = normalizeYear(ex?.year);
    normalized.semester = normalizeSemester(ex?.semester);
    normalized.examType = normalizeExamType(ex?.examType);
    normalized.contentType = normalizeContentType(ex?.contentType);
    return normalized;
}

function normalizedExams() {
    return Array.isArray(engineDB.exams) ? engineDB.exams.map(normalizeExamMeta).filter(e => e.file) : [];

}

function encodeArchiveSessionPayload(payload) {

function appendCurrentArchiveSessionToHash(url) {
    const session = getApmathSession();
    if (!session) return url;

    const payload = sanitizeApmathSessionForStorage({
        login_id: session.login_id || session.loginId || '',
        id: session.id || session.user?.id || '',
        name: session.name || session.user?.name || '',
        role: session.role || session.user?.role || session.auth?.role || '',
        session_token: session.session_token || '',
        expires_at: session.expires_at || ''
    });

    if (!payload.session_token && !payload.login_id) return url;
    return url + (url.indexOf('#') === -1 ? '#' : '&') + 'apmsess=' + encodeArchiveSessionPayload(payload);
}

    return rows;
}

function groupArchiveBoardAssignments(grade) {
    const start = archiveBoardAddDays(assignmentBoardState.date, -30);
    const end = assignmentBoardState.date;
    const boardRows = filterArchiveBoardRows(assignmentBoardState.boardRows || []);
    const groups = new Map();

    boardRows.forEach(row => {
        const date = String(row.exam_date || row.date || '').slice(0, 10);
        if (!date || date < start || date > end) return;
        if (grade && normalizeGrade(row.class_grade || row.grade_label || row.grade || '') !== grade) return;

        const paperKey = getArchiveBoardPaperKey(row);
        const teacher = String(row.teacher_name || row.teacherName || row.owner_name || row.class_teacher_name || '-').trim();
        const teacherKey = String(row.teacher_id || row.teacherId || compactText(teacher)).trim();
        const groupKey = `${paperKey}::teacher:${teacherKey}`;

        if (!groups.has(groupKey)) {
            groups.set(groupKey, {
                title: getArchiveBoardAssignmentTitle(row),
                paperKey,
                teacher,
                teacherKey,
                isMine: isArchiveBoardMine(row),
                classMap: new Map(),
                assignments: [],
                firstDate: date,
                lastDate: date
            });
        }

        const group = groups.get(groupKey);
        const classId = String(row.class_id || '');
        const className = String(row.class_name || row.className || '-').trim();
        const classKey = classId || `${teacherKey}:${compactText(className)}`;
        if (!group.classMap.has(classKey)) group.classMap.set(classKey, className);
        group.assignments.push({ classId, className, teacher, date, row });
        if (date < group.firstDate) group.firstDate = date;
        if (date > group.lastDate) group.lastDate = date;
    });

    return [...groups.values()].map(group => {
        const classNames = [...group.classMap.values()].sort((a, b) => String(a).localeCompare(String(b), 'ko'));
        return {
            title: group.title,
            paperKey: group.paperKey,
            teacher: group.teacher,
            teacherKey: group.teacherKey,
            isMine: group.isMine,
            classLabel: classNames.join(', '),
            classCount: classNames.length,
            assignments: group.assignments,
            firstDate: group.firstDate,
            lastDate: group.lastDate
        };
    }).sort((a, b) =>
        String(a.title || '').localeCompare(String(b.title || ''), 'ko') ||
        String(a.teacher || '').localeCompare(String(b.teacher || ''), 'ko') ||
        String(a.classLabel || '').localeCompare(String(b.classLabel || ''), 'ko')
    );
}

function renderAssignmentBoard(message) {

    }

    board.classList.add('open');
    title.textContent = `${selectedGrade} 출제보드`;
    dateInput.value = assignmentBoardState.date;
    range.textContent = `${archiveBoardAddDays(assignmentBoardState.date, -30)} ~ ${assignmentBoardState.date}`;

    if (message) {
        list.innerHTML = `<div class="assignment-board-empty">${archiveBoardEscape(message)}</div>`;
        return;
    }

    const rows = groupArchiveBoardAssignments(selectedGrade);
    if (!rows.length) {
        const emptyText = assignmentBoardState.mode === 'mine'
            ? '\uD574\uB2F9 \uAE30\uAC04 \uB0B4 \uCD9C\uC81C \uAE30\uB85D\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.'
            : assignmentBoardState.mode === 'other'
                ? '\uD574\uB2F9 \uAE30\uAC04 \uB2E4\uB978 \uC120\uC0DD\uB2D8 \uCD9C\uC81C \uAE30\uB85D\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.'
                : '\uD574\uB2F9 \uAE30\uAC04 \uCD9C\uC81C \uAE30\uB85D\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.';
        list.innerHTML = `<div class="assignment-board-empty">${archiveBoardEscape(emptyText)}</div>`;
        return;
    }

    list.innerHTML = rows.map(row => `
        <div class="assignment-board-row" title="${archiveBoardEscape(`${row.title} | ${row.teacher || '-'} | ${row.classLabel || '-'} | ${row.firstDate} ~ ${row.lastDate}`)}">
            <span class="assignment-board-teacher">${archiveBoardEscape(row.teacher || '-')}</span>
            <span class="assignment-board-paper">${archiveBoardEscape(row.title)}</span>
            <span class="assignment-board-classes">${archiveBoardEscape(row.classLabel || '-')}</span>
        </div>
    `).join('');
}

async function loadAssignmentBoardForGrade(grade) {
    if (!grade) {
        assignmentBoardState.boardRows = [];
        renderAssignmentBoard();
        return;
    }

    assignmentBoardState.grade = grade;
    renderAssignmentBoard('\uCD9C\uC81C \uAE30\uB85D\uC744 \uBD88\uB7EC\uC624\uB294 \uC911...');

    try {
        const authHeader = getIndexAssignmentAuthHeader();
        if (!authHeader) {
            renderAssignmentBoard('AP Math OS \uB85C\uADF8\uC778 \uD6C4 \uCD9C\uC81C\uBCF4\uB4DC\uB97C \uBCFC \uC218 \uC788\uC2B5\uB2C8\uB2E4.');
            return;
        }

        const from = archiveBoardAddDays(assignmentBoardState.date, -30);
        const to = assignmentBoardState.date;
        const url = `${ARCHIVE_AP_API_BASE}/class-exam-assignments/board?grade=${encodeURIComponent(grade)}&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
        const res = await fetch(url, { headers: authHeader });
        if (!res.ok) throw new Error(`assignment board failed: ${res.status}`);
        const data = await res.json();
        assignmentBoardState.boardRows = data.assignments || data.items || [];
        renderAssignmentBoard();
    } catch (e) {
        console.warn('[archive assignment board] load failed:', e);
        assignmentBoardState.boardRows = [];
        renderAssignmentBoard('\uCD9C\uC81C \uAE30\uB85D\uC744 \uBD88\uB7EC\uC624\uC9C0 \uBABB\uD588\uC2B5\uB2C8\uB2E4.');
    }
}

function sortExams(list) {
    const gradeOrder = { "고3":0, "고2":1, "고1":2, "중3":3, "중2":4, "중1":5 };

    return [...list].sort((a, b) => {
        const yA = parseInt(a.year) || 0;
        const yB = parseInt(b.year) || 0;
        if (yB !== yA) return yB - yA;

        const gA = gradeOrder[a.grade] ?? 99;
        const gB = gradeOrder[b.grade] ?? 99;
        if (gA !== gB) return gA - gB;

        const sA = a.school || '';
        const sB = b.school || '';
        if (sA !== sB) return sA.localeCompare(sB);

        return (a.file || '').localeCompare(b.file || '');
    });
}

const ARCHIVE_SUBJECT_SYNONYM_GROUPS = [
    ['수학1', '수학Ⅰ', '수학I', '수학로마자1', '대수', '수1'],
    ['수학2', '수학Ⅱ', '수학II', '수학로마자2', '미적분1', '미적분Ⅰ', '수2'],
    ['미적분', '미적분2', '미적분Ⅱ']
];

function normalizeArchiveSearchText(value) {
    return String(value || '')
        .toLowerCase()
        .replace(/[Ⅰⅰ]/g, 'i')
        .replace(/[Ⅱⅱ]/g, 'ii')
        .replace(/\s+/g, '');
}

const ARCHIVE_SUBJECT_SYNONYM_LOOKUP = ARCHIVE_SUBJECT_SYNONYM_GROUPS.reduce((map, group) => {
    const normalizedGroup = [...new Set(group.map(normalizeArchiveSearchText).filter(Boolean))];
    normalizedGroup.forEach(token => {
        map[token] = normalizedGroup;
    });
    return map;
}, {});

function archiveSubjectTokenInText(text, token) {
    const source = String(text || '');
    const needle = String(token || '');
    if (!needle) return false;
    if (needle === '미적분') {
        return /미적분($|[^0-9i])|미적분2|미적분ii/.test(source);
    }
    return source.includes(needle);
}

function expandArchiveSearchSubjectTerms(value) {
    const normalized = normalizeArchiveSearchText(value);
    if (!normalized) return [];
    const terms = new Set([normalized]);
    Object.keys(ARCHIVE_SUBJECT_SYNONYM_LOOKUP).forEach(token => {
        if (!token || !archiveSubjectTokenInText(normalized, token)) return;
        ARCHIVE_SUBJECT_SYNONYM_LOOKUP[token].forEach(alias => terms.add(alias));
    });
    if (normalized === '미적분') terms.delete('미적분');
    return Array.from(terms);
}

function buildArchiveSearchHaystack(parts) {
    const base = normalizeArchiveSearchText((Array.isArray(parts) ? parts : []).join(' '));
    const expanded = new Set([base]);
    Object.keys(ARCHIVE_SUBJECT_SYNONYM_LOOKUP).forEach(token => {
        if (!token || !archiveSubjectTokenInText(base, token)) return;
        ARCHIVE_SUBJECT_SYNONYM_LOOKUP[token].forEach(alias => expanded.add(alias));
    });
    return Array.from(expanded).join(' ');
}

function onFilterChange() {

        renderFullList();
    } else {
        document.getElementById('featured-section').style.display = 'block';
        document.getElementById('full-section').style.display = 'none';
        renderFeatured();
    }
}

function showEmptyState(message) {
    const section = document.getElementById('featured-section');
    section.innerHTML = `<div class="empty-state">${message}</div>`;
}

function renderFeatured() {
    const section = document.getElementById('featured-section');
    section.innerHTML = '';

    const all = visibleExams();
    const rawCount = Array.isArray(engineDB.exams) ? engineDB.exams.length : 0;

    if (archiveDbLoadFailed) {
        showEmptyState('db.js를 불러오지 못했습니다. archive/db.js 경로를 확인하세요.');
        return;
    }

    if (!rawCount) {
        showEmptyState('등록된 자료가 없습니다.');
        return;
    }

    if (!all.length) {
        showEmptyState('표시할 수 있는 자료가 없습니다. AP Math OS 로그인 상태를 확인하거나 기출 보기를 켜주세요.');
        return;
    }

    const featuredGrades = ['고2', '고1', '중3', '중2', '중1'];

    const latestByGrade = featuredGrades
        .map(grade => {
            const items = sortExams(
                all.filter(e => e.grade === grade && e.contentType === '기출')
            );
            return items[0] || null;
        })
        .filter(Boolean);

    if (latestByGrade.length) {
        const block = document.createElement('div');
        block.className = 'sec-block dark';
        block.innerHTML = `
            <div class="sec-header">
                <span class="sec-title">학년별 대표 기출</span>
                <div class="sec-line"></div>
            </div>
            <div class="card-grid"></div>
        `;

        const grid = block.querySelector('.card-grid');
        latestByGrade.forEach(item => grid.appendChild(buildCard(item)));
        section.appendChild(block);
        return;
    }

    const fallbackItems = sortExams(all).slice(0, 8);

    const block = document.createElement('div');
    block.className = 'sec-block dark';
    block.innerHTML = `
        <div class="sec-header">
            <span class="sec-title">최신 등록 자료</span>
            <div class="sec-line"></div>
        </div>
        <div class="card-grid"></div>
    `;

    const grid = block.querySelector('.card-grid');
    fallbackItems.forEach(item => grid.appendChild(buildCard(item)));
    section.appendChild(block);
}

function renderFullList() {
    const keyword = document.getElementById('searchInput').value.trim();
    const keywordTerms = expandArchiveSearchSubjectTerms(keyword);
    const year = document.getElementById('yearFilter').value;
    const type = compactText(document.getElementById('contentTypeFilter').value);
    const examPeriod = document.getElementById('examPeriodFilter').value;

    const container = document.getElementById('full-grid');
    container.innerHTML = '';

    let filtered = visibleExams().filter(ex => {
        const searchBase = buildArchiveSearchHaystack([
            ex.school || '',
            ex.subject || '',
            ex.topic || '',
            ex.file || '',
            ex.contentType || ''
        ]);

        const matchK = !keywordTerms.length || keywordTerms.some(term => searchBase.includes(term));
        const matchG = !selectedGrade || ex.grade === selectedGrade;
        const matchY = !year || String(ex.year) === String(year);
        const itemType = compactText(ex.contentType || '');
        const matchT = !type || itemType === type;
        const matchP = !examPeriod || examPeriodValue(ex) === examPeriod;

        return matchK && matchG && matchY && matchT && matchP;
    });

    filtered = sortExams(filtered);

    const activeFilters = [];
    if (selectedGrade) activeFilters.push(selectedGrade);
    if (year) activeFilters.push(`${year}년`);
    if (type) activeFilters.push(document.getElementById('contentTypeFilter').selectedOptions[0]?.textContent || type);
    if (examPeriod) activeFilters.push(document.getElementById('examPeriodFilter').selectedOptions[0]?.textContent || examPeriod);
    document.getElementById('listMeta').innerText = activeFilters.length
        ? `${filtered.length}개 자료 · ${activeFilters.join(' · ')}`
        : `${filtered.length}개 자료`;

    if (!filtered.length) {
        container.innerHTML = `<div class="empty-state" style="grid-column:1/-1; margin:0;">조건에 맞는 자료가 없습니다.</div>`;
        return;
    }

    filtered.forEach(ex => container.appendChild(buildCard(ex)));
}

function buildMetaBadge(text, variant = '') {
    if (!text) return '';
    return `<span class="meta-badge ${variant}">${text}</span>`;
}

function formatArchiveDisplayName(file) {
    const raw = String(file || '').trim();
    if (!raw) return '';
    const last = raw.split('/').filter(Boolean).pop() || raw;
    return last
        .replace(/\.js$/i, '')
        .replace(/_/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}

function buildCard(ex) {
    const card = document.createElement('div');
    const fileName = (ex.file || '파일정보없음').replace(/\.js$/i, '');
    const semester = ex.semester ? `${ex.semester}학기` : '';
    const examName = examTypeLabel(ex.examType);
    const isSheet = (ex.contentType || '기출') === '기출';
    const cardTypeClass = isSheet ? 'type-sheet' : 'type-study';
    const contentTypeLabel = ex.contentType || '기출';

    card.className = `exam-card ${cardTypeClass}`;

    card.onclick = () => {
        document.querySelectorAll('.exam-card').forEach(c => c.classList.remove('is-active'));
        card.classList.add('is-active');
    };

    let title = '';
    let subtitle = '';
    let metaHTML = '';

    if (isSheet) {
        title = ex.school || fileName;
        subtitle = [
            ex.year ? `${ex.year}년` : '',
            semester,
            examName,
            ex.subject || '',
            contentTypeLabel
        ].filter(Boolean).join(' · ');

        metaHTML = [
            buildMetaBadge(ex.grade || ''),
            buildMetaBadge(ex.subject || '', 'primary'),
            buildMetaBadge(`${semester} ${examName}`.trim() || '', 'primary')
        ].filter(Boolean).join('');
    } else {
        title = ex.topic || ex.school || fileName;
        subtitle = [
            ex.grade || '',
            contentTypeLabel,
            ex.subject || ''
        ].filter(Boolean).join(' · ');

        if (!subtitle) subtitle = contentTypeLabel;

        metaHTML = [
            buildMetaBadge(ex.grade || ''),
            buildMetaBadge(contentTypeLabel, 'green'),
            buildMetaBadge(ex.subject || ''),
            (ex.school && ex.school !== 'AP수학') ? buildMetaBadge(ex.school) : ''
        ].filter(Boolean).join('');
    }

    card.innerHTML = `
        <div class="card-top"></div>
        <div class="card-body">
            <div class="card-grade-row">
                <div class="card-grade-label">${isSheet ? '학교 시험지' : '학습 자료'}</div>
                <div class="card-type-chip">${contentTypeLabel}</div>
            </div>
            <div class="card-main-title">${title}</div>
            <div class="card-sub-title">${subtitle || '상세 정보 없음'}</div>
            <div class="card-meta-line">${metaHTML}</div>
            <div class="card-file-name">${formatArchiveDisplayName(ex.file || fileName)}</div>
        </div>
        <div class="card-actions">
            <div class="action-btn" data-action="exam">시험</div>
            <div class="action-btn" data-action="sol">해설</div>
            <div class="action-btn" data-action="ans">정답</div>
        </div>
    `;

    card.querySelectorAll('.action-btn').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            openEngine(ex.file, btn.dataset.action);
        };
    });

    return card;
}

/* AP Math OS 선생님 → 반 선택 헬퍼 */
let _indexQrClassRows = [];

function escapeModalText(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function getQrTeacherName(row) {
    const raw = row?.teacher_name || row?.teacherName || row?.teacher || row?.owner_name || row?.ownerName || '';
    const name = String(raw || '').replace(/\s*선생님\s*$/g, '').trim();
    return name || '담당 미지정';
}

function sortQrClassesForSelect(list) {
    const gradeRank = { '중1': 1, '중2': 2, '중3': 3, '고1': 4, '고2': 5, '고3': 6 };
    return [...list].sort((a, b) => {
        const ag = gradeRank[getIndexClassGrade(a)] || 99;
        const bg = gradeRank[getIndexClassGrade(b)] || 99;
        if (ag !== bg) return ag - bg;
        const an = String(a.name || '');
        const bn = String(b.name || '');
        const nameDiff = an.localeCompare(bn, 'ko');
        if (nameDiff !== 0) return nameDiff;
        return String(a.id || '').localeCompare(String(b.id || ''), 'ko');
    });
}

function getIndexClassGrade(row) {
    const explicit = String(row?.grade || row?.grade_label || row?.class_grade || '').trim();
    if (explicit) return explicit;
    const text = `${row?.name || ''} ${row?.class_name || ''}`;
    return ['중1', '중2', '중3', '고1', '고2'].find(grade => text.includes(grade)) || '';
}

function getIndexAvailableGrades(classes) {
    const grades = new Set((classes || []).map(getIndexClassGrade).filter(Boolean));
    return ['중1', '중2', '중3', '고1', '고2'].filter(grade => grades.has(grade));
}

function getIndexClassTeacherId(row) {
    return String(row?.teacher_id || row?.teacherId || row?.owner_id || row?.ownerId || '').trim();
}

function getIndexClassTeacherName(row) {
    return String(row?.teacher_name || row?.teacherName || row?.teacher || row?.owner_name || row?.ownerName || row?.class_teacher_name || '').trim();
}

function getIndexClassTeacherFilterKey(row) {
    const teacherId = getIndexClassTeacherId(row);
    if (teacherId) return `id:${teacherId}`;
    const teacherName = compactText(getIndexClassTeacherName(row));
    return teacherName ? `name:${teacherName}` : '';
}

function getIndexTeacherFilterOptions(rows) {
    const map = new Map();
    (rows || []).forEach(row => {
        const key = getIndexClassTeacherFilterKey(row);
        if (!key || map.has(key)) return;
        map.set(key, getIndexClassTeacherName(row) || '담당 미지정');
    });
    return Array.from(map.entries())
        .map(([value, label]) => ({ value, label }))
        .sort((a, b) => a.label.localeCompare(b.label, 'ko'));
}

function filterIndexClassesForCurrentTeacher(classes) {
    const rows = Array.isArray(classes) ? classes : [];
    if (isArchiveAdminSession()) return rows;

    const currentId = getArchiveCurrentTeacherId();
    const currentName = compactText(getArchiveCurrentTeacherName());
    const filtered = rows.filter(row => {
        const teacherId = getIndexClassTeacherId(row);
        if (currentId && teacherId && String(teacherId) === String(currentId)) return true;
        const teacherName = compactText(getIndexClassTeacherName(row));
        return !!(currentName && teacherName && teacherName === currentName);
    });

    return filtered;
}

function getIndexClassesForGrade(grade) {
    return sortQrClassesForSelect((_indexQrClassRows || []).filter(row => getIndexClassGrade(row) === grade));
}

function getAssignTargetVisibleClassIds() {
    if (!AssignTarget) return [];
    const teacherFilter = String(AssignTarget.teacherFilter || '');
    return Object.keys(AssignTarget.classState || {}).filter(id => {
        const row = AssignTarget.classState[id]?.row;
        return !teacherFilter || getIndexClassTeacherFilterKey(row) === teacherFilter;
    });
}

function getArchiveExamQuestionCount(item) {
    const candidates = [
        item?.question_count,
        item?.questionCount,
        item?.qCount,
        item?.count,
        Array.isArray(item?.questions) ? item.questions.length : undefined
    ];
    for (const value of candidates) {
        const parsed = Number.parseInt(value, 10);
        if (Number.isInteger(parsed) && parsed > 0) return parsed;
    }
    return null;
}

function resolveExamQuestionCountForAssignment(item) {
    const questionCount = getArchiveExamQuestionCount(item);
    if (!questionCount) {
        console.warn('[archive assignment] 문항 수 확인 실패:', item?.file || item?.title || item);
    }
    return questionCount;
}

function encodeIndexBasicAuth(value) {
    const str = String(value || '');
    try {
        return btoa(unescape(encodeURIComponent(str)));
    } catch (e) {
        return btoa(str);
    }
}

function getIndexAssignmentAuthHeader() {
    try {
        const session = JSON.parse(localStorage.getItem('APMATH_SESSION') || 'null');
        if (!session) return null;
        if (session.session_token) {
            return { 'Authorization': 'Bearer ' + session.session_token };
        }

        const mem = window.__APMATH_AUTH_MEMORY || {};
        const loginId = mem.login_id || session.login_id || session.loginId;
        const rawPassword = mem.raw_password || session.raw_password;
        if (!loginId || !rawPassword) return null;
        return { 'Authorization': 'Basic ' + encodeIndexBasicAuth(`${loginId}:${rawPassword}`) };
    } catch(e) {
        return null;
    }
}

function printIndexPendingGeneralExam() {
    const item = normalizedExams().find(e => e.file === _pendingFile);
    if (!item) return;
    closeModal();
    goEngine(item, _pendingAction || 'exam', _pendingQpp || 4);
}

function getIndexExamTitle(item) {
    const baseTitle = item.school || item.topic || String(item.file || '').replace('.js', '');
    return `${baseTitle} ${item.subject || ''}`.trim();
}

function getIndexAssignmentBatchId(item, gradeLabel) {
    const fileKey = String(item?.file || 'archive').replace(/[^a-zA-Z0-9_-]+/g, '_');
    const gradeKey = String(gradeLabel || 'class').replace(/[^a-zA-Z0-9가-힣_-]+/g, '_');
    return `batch_archive_${fileKey}_${gradeKey}_${Date.now()}`;
}

async function registerIndexClassExamAssignment(classRow, item, options = {}) {
    const authHeader = getIndexAssignmentAuthHeader();
    if (!authHeader) {
        notifyArchiveQrApiFailure(401, 'class-exam-assignments auth');
        throw new Error('auth required');
    }
    const questionCount = resolveExamQuestionCountForAssignment(item);
    if (!questionCount) throw new Error('question count required');
    const gradeLabel = options.gradeLabel || getIndexClassGrade(classRow) || item?.grade || '';
    const payload = {
        class_id: classRow.id,
        exam_title: getIndexExamTitle(item),
        exam_date: new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().split('T')[0],
        question_count: questionCount,
        archive_file: `exams/${item.file}`,
        source_type: 'archive',
        subject: item.subject || '',
        grade_label: gradeLabel,
        assignment_batch_id: options.assignmentBatchId || getIndexAssignmentBatchId(item, gradeLabel),
        target_scope: options.target_scope || 'class'
    };
    const res = await fetch(`${ARCHIVE_AP_API_BASE}/class-exam-assignments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeader },
        body: JSON.stringify(payload)
    });
    if (!res.ok) {
        notifyArchiveQrApiFailure(res.status, 'class-exam-assignments');
        throw new Error(`assignment failed: ${res.status}`);
    }
    return res.json().catch(() => ({}));
}

function closeModal() {
    document.getElementById('qppModal').classList.remove('open');
    document.getElementById('examModeModal').classList.remove('open');
    const assignModal = document.getElementById('assignTargetModalOverlay');
    if (assignModal) assignModal.classList.remove('open');
    AssignTarget = null;
    resetAssignTargetPreviewPane();
}

let AssignTarget = null;

function assignTargetBodyEl() {
    return document.getElementById('assignTargetBody');
}

/* ----- 출제 전 시험지 미리보기 (engine.html preview=1 임베드) ----- */

function buildAssignTargetPreviewUrl() {
    const item = AssignTarget?.item;
    if (!item) return '';
    const url = new URL('engine.html', window.location.href);
    url.searchParams.set('mode', 'exam');
    url.searchParams.set('qpp', String(AssignTarget.qpp || 4));
    url.searchParams.set('data', 'exams/' + item.file);
    url.searchParams.set('title', getIndexExamTitle(item));
    if (item.subject) url.searchParams.set('subject', item.subject);
    url.searchParams.set('preview', '1');
    return url.toString();
}

function syncAssignTargetPreviewPane() {
    const box = document.getElementById('assignTargetBox');
    const frame = document.getElementById('assignTargetPreviewFrame');
    if (!box || !frame) return;
    const open = !!(AssignTarget && AssignTarget.previewOpen);
    const reviewOpen = !!(AssignTarget && AssignTarget.view === 'review' && AssignTarget.previewOpen);
    box.classList.toggle('assign-preview-open', open);
    box.classList.toggle('assign-review-preview', reviewOpen);
    const btn = document.getElementById('assign-preview-toggle-btn');
    if (btn) btn.textContent = open ? '미리보기 닫기' : '시험지 미리보기';
    if (!open) return;
    const url = buildAssignTargetPreviewUrl();
    // 같은 시험이면 src를 유지한다(대상 선택 조작·화면 전환마다 MathJax 재렌더 방지)
    if (url && frame.getAttribute('src') !== url) frame.setAttribute('src', url);
}

function resetAssignTargetPreviewPane() {
    const box = document.getElementById('assignTargetBox');
    const frame = document.getElementById('assignTargetPreviewFrame');
    if (box) box.classList.remove('assign-preview-open');
    if (box) box.classList.remove('assign-review-preview');
    if (frame && frame.getAttribute('src')) frame.setAttribute('src', 'about:blank');
}

function assignTargetTogglePreview() {
    if (!AssignTarget) return;
    AssignTarget.previewOpen = !AssignTarget.previewOpen;
    syncAssignTargetPreviewPane();
}

function assignTargetPreviewToggleHtml() {
    const open = !!(AssignTarget && AssignTarget.previewOpen);
    return `<button class="assign-preview-toggle" id="assign-preview-toggle-btn" type="button" onclick="assignTargetTogglePreview()">${open ? '미리보기 닫기' : '시험지 미리보기'}</button>`;
}

async function openAssignTargetPanel(item, qpp) {
    AssignTarget = {
        item, qpp,
        grade: '',
        teacherFilter: '',
        classRows: [],
        gradeStates: {},
        classState: {},
        view: 'select',
        progress: null,
        assignmentBatchId: '',
        scope: 'class',
        previewOpen: false
    };
    document.getElementById('assignTargetModalOverlay').classList.add('open');
    resetAssignTargetPreviewPane();
    assignTargetBodyEl().innerHTML = '<div style="padding:60px; text-align:center; color:var(--text-sub);">반 목록을 불러오는 중...</div>';

    const authHeader = getIndexAssignmentAuthHeader();
    if (!authHeader) {
        renderAssignTargetLoginPrompt();
        return;
    }

    try {
        const res = await fetch(`${ARCHIVE_AP_API_BASE}/qr-classes`, { headers: authHeader });
        if (res.status === 401) { renderAssignTargetNotice(ARCHIVE_QR_LOGIN_REQUIRED_HTML); return; }
        if (res.status === 403) { renderAssignTargetNotice(ARCHIVE_QR_FORBIDDEN_HTML); return; }
        if (!res.ok) throw new Error('API Request Failed');

        const data = await res.json();
        if (!data || !data.success || !Array.isArray(data.classes)) throw new Error('Invalid data format');
        if (!data.classes.length) { renderAssignTargetNotice('등록된 반이 없습니다. AP Math OS에서 반을 먼저 생성하세요.'); return; }

        const visibleClasses = filterIndexClassesForCurrentTeacher(data.classes);
        _indexQrClassRows = visibleClasses;
        AssignTarget.classRows = visibleClasses;
        const grades = getIndexAvailableGrades(visibleClasses);
        if (!grades.length) { renderAssignTargetNotice('담당 반이 없습니다. AP Math OS에서 선생님별 반 배정을 확인하세요.'); return; }
        assignTargetSwitchGrade(grades[0]);
    } catch(e) {
        console.error(e);
        renderAssignTargetNotice(ARCHIVE_QR_NETWORK_HTML);
    }
}
