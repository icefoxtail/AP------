<body>
    <div id="mode-ctrl">
        <span id="ctrl-title">JS아카이브</span>
        <div class="mode-tabs">
            <button class="mode-tab" id="btn-exam" onclick="switchMode('exam')">시험지</button>
            <button class="mode-tab" id="btn-sol" onclick="switchMode('sol')">해설지</button>
            <button class="mode-tab" id="btn-ans" onclick="switchMode('ans')">정답표</button>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="qpp-display" style="color:rgba(255,255,255,0.7); font-size:11px; font-weight:bold;"></span>
            <div class="qr-output-wrap" id="qr-output-wrap">
                <button id="btn-qr-output" type="button" onclick="toggleQrOutputPopover(event)">QR 출력: 없음</button>
                <div class="qr-output-popover" id="qr-output-popover">
                    <div class="qr-output-title">QR 출력</div>
                    <label class="qr-output-option"><input type="checkbox" id="chk-submit-qr" onchange="setQrOutputParam('submit', this.checked)"> 정답지 제출 QR</label>
                    <label class="qr-output-option"><input type="checkbox" id="chk-sol-qr" onchange="setQrOutputParam('sol', this.checked)"> 해설·정답 확인 QR</label>
                </div>
            </div>
            <button id="btn-print" onclick="window.print()" style="padding:8px 16px; border-radius:6px; border:none; background:#378ADD; color:white; font-weight:bold; cursor:pointer;">인쇄</button>
        </div>
    </div>
    <div id="print-area"></div>
    <div id="staging" style="position:absolute;top:-9999px;left:0;visibility:hidden;width:83mm;"></div>

<script>
const SE_OVERHEAD_COL = 10;
const SE_OVERHEAD_GRID = 20;
const SE_PAGE_TOLERANCE = 5;
const SE_BLOCK_GAP = 15;

const AppState = { data: [], mode: 'exam', qpp: 4, title: '' };

const QR_PATCH = {
    enabled: true,
    label: '해설·정답 확인',
    size: 220
};

function buildQrTargetUrl() {
    const url = new URL(window.location.href);
    url.searchParams.set('mode', 'sol');
    url.searchParams.set('qr', '1');
    if (!url.searchParams.has('qpp')) {
        url.searchParams.set('qpp', String(AppState.qpp || 4));
    }
    return url.toString();
}

function isQrSolutionMode() {
    try {
        const params = new URLSearchParams(window.location.search);
        return params.get('qr') === '1';
    } catch (e) {
        return false;
    }
}

function shouldRenderSolutionQr() {
    if (AppState.mode !== 'exam') return false;
    try {
        const params = new URLSearchParams(window.location.search);
        return params.get('solQr') === '1';
    } catch (e) {
        return false;
    }
}

function getQrOutputState() {
    const params = new URLSearchParams(window.location.search);
    const submitQr = params.get('submitQr');
    return {
        submit: submitQr === '1' || (submitQr !== '0' && params.get('osqr') === '1'),
        sol: params.get('solQr') === '1'
    };
}

function syncQrOutputControls() {
    const state = getQrOutputState();
    const submitBox = document.getElementById('chk-submit-qr');
    const solBox = document.getElementById('chk-sol-qr');
    const btn = document.getElementById('btn-qr-output');
    if (submitBox) submitBox.checked = state.submit;
    if (solBox) solBox.checked = state.sol;
    if (btn) {
        const count = Number(state.submit) + Number(state.sol);
        btn.textContent = count ? `QR 출력: ${count}개` : 'QR 출력: 없음';
    }
}

function toggleQrOutputPopover(event) {
    if (event) event.stopPropagation();
    const wrap = document.getElementById('qr-output-wrap');
    if (wrap) wrap.classList.toggle('open');
}

function setQrOutputParam(type, checked) {
    const url = new URL(window.location.href);
    if (type === 'submit') {
        url.searchParams.set('submitQr', checked ? '1' : '0');
        url.searchParams.delete('osqr');
    } else {
        url.searchParams.set('solQr', checked ? '1' : '0');
    }
    history.replaceState(null, '', url.toString());
    syncQrOutputControls();
    render();
}

document.addEventListener('click', (event) => {
    const wrap = document.getElementById('qr-output-wrap');
    if (wrap && !wrap.contains(event.target)) wrap.classList.remove('open');
});

function applyQrSolutionLockUI() {
    if (!isQrSolutionMode()) return;

    const btnExam = document.getElementById('btn-exam');
    const btnAns = document.getElementById('btn-ans');
    const btnSol = document.getElementById('btn-sol');

    if (btnExam) btnExam.style.display = 'none';
    if (btnAns) btnAns.style.display = 'none';
    if (btnSol) {
        btnSol.classList.add('active');
        btnSol.style.pointerEvents = 'none';
    }

    const title = document.getElementById('ctrl-title');
    if (title) title.innerText = 'JS아카이브 해설지';
}

function injectQrToLastExamPage(area) {
    if (!shouldRenderSolutionQr() || !QR_PATCH.enabled) return;
    if (typeof QRious !== 'function') return;

    const pages = area.querySelectorAll('.page');
    if (!pages.length) return;

    const targetPage = pages[pages.length - 1];

    const oldQr = targetPage.querySelector('.page-qr');
    if (oldQr) oldQr.remove();

    const qrWrap = document.createElement('div');
    qrWrap.className = 'page-qr';
    qrWrap.innerHTML = `
        <div class="page-qr-label">${QR_PATCH.label}</div>
        <canvas></canvas>
    `;

    targetPage.appendChild(qrWrap);

    const canvas = qrWrap.querySelector('canvas');
    new QRious({
        element: canvas,
        value: buildQrTargetUrl(),
        size: QR_PATCH.size,
        level: 'M',
        background: 'white',
        foreground: 'black',
        padding: 0
    });
}

// =========================================================================
// [5A] AP Math OS 제출용 QR 추가 기능 시작
// =========================================================================

function shouldRenderSubmitQr() {
    if (AppState.mode !== 'exam') return false;
    try {
        const params = new URLSearchParams(window.location.search);
        const submitQr = params.get('submitQr');
        if (submitQr === '0') return false;
        return submitQr === '1' || params.get('osqr') === '1';
    } catch (e) {
        return false;
    }
}

function buildSubmitQrTargetUrl() {
    const params = new URLSearchParams(window.location.search);
    const classId = params.get('class') || '';
    const teacherName = params.get('teacher') || '';
    const className = params.get('className') || '';
    
    let date = params.get('date') || '';
    if (!date) {
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        date = `${year}-${month}-${day}`;
    }
    
    const q = params.get('q') || AppState.data.length || 0;
    const exam = AppState.title || '시험지';
    const dataUrl = params.get('data') || '';

    if (!classId) {
        const url = new URL('../apmath/student/', window.location.href);
        url.searchParams.set('omr', '1');
        url.searchParams.set('exam', exam);
        url.searchParams.set('date', date);
        url.searchParams.set('q', q);
        if (dataUrl) url.searchParams.set('archiveFile', dataUrl);
        return url.toString();
    }

    const url = new URL('../check/', window.location.href);
    if (classId) url.searchParams.set('class', classId);
    if (teacherName) url.searchParams.set('teacher', teacherName);
    if (className) url.searchParams.set('className', className);
    url.searchParams.set('exam', exam);
    url.searchParams.set('date', date);
    url.searchParams.set('q', q);

    // [3B] archive_file 전달
    if (dataUrl) url.searchParams.set('archiveFile', dataUrl);

    return url.toString();
}

function injectSubmitQrToLastExamPage(area) {
    if (!shouldRenderSubmitQr()) return;
    if (typeof QRious !== 'function') return;

    const pages = area.querySelectorAll('.page');
    if (!pages.length) return;

    const targetPage = pages[pages.length - 1];

    const oldQr = targetPage.querySelector('.page-submit-qr');
    if (oldQr) oldQr.remove();

    const params = new URLSearchParams(window.location.search);
    const hasClass = !!params.get('class');

    const qrWrap = document.createElement('div');
    qrWrap.className = 'page-submit-qr';
    
    const warnHtml = hasClass ? '' : `<div class="page-submit-qr-warn">학생페이지로 이동</div>`;
    
    qrWrap.innerHTML = `
        <div class="page-submit-qr-info">
            <div class="page-submit-qr-label">정답지 제출</div>
            ${warnHtml}
        </div>
        <canvas></canvas>
    `;

    targetPage.appendChild(qrWrap);

    const canvas = qrWrap.querySelector('canvas');
    new QRious({
        element: canvas,
        value: buildSubmitQrTargetUrl(),
        size: 220,
        level: 'M',
        background: 'white',
        foreground: 'black',
        padding: 0
    });
}

// =========================================================================
// [5A] AP Math OS 제출용 QR 추가 기능 끝
// =========================================================================

// =========================================================================
// [3H] class_exam_assignments 자동 등록 (AP 제출 QR 모드 전용)
// =========================================================================
let _classExamAssignmentRegisteredSig = '';

function getKstTodayString() {
    const d = new Date();
    const kst = new Date(d.getTime() + (9 * 60 * 60 * 1000));
    return kst.toISOString().split('T')[0];
}

const ARCHIVE_AP_API_BASE = (window.APMATH_API_BASE || 'https://ap-math-os-v2612.js-pdf.workers.dev/api').replace(/\/+$/, '');
const ARCHIVE_QR_AUTH_REQUIRED_MESSAGE = 'AP 제출 QR은 AP Math OS 로그인이 필요합니다. 일반 출력은 가능합니다.';
const ARCHIVE_QR_LOGIN_REQUIRED_MESSAGE = 'AP Math OS 로그인 후 다시 시도해 주세요.';
const ARCHIVE_QR_FORBIDDEN_MESSAGE = '권한이 없습니다. 원장/담당 선생님 권한을 확인하세요.';
const ARCHIVE_QR_NETWORK_MESSAGE = '서버 연결에 실패했습니다. 일반 출력은 가능합니다.';

function notifyArchiveQrApiFailure(status, context) {
    const message = status === 401
        ? ARCHIVE_QR_LOGIN_REQUIRED_MESSAGE
        : status === 403
            ? ARCHIVE_QR_FORBIDDEN_MESSAGE
            : status === 'auth'
                ? ARCHIVE_QR_AUTH_REQUIRED_MESSAGE
                : ARCHIVE_QR_NETWORK_MESSAGE;
    console.warn(`[archive QR] ${context || 'api'} failed:`, status, message);
    if (typeof window.toast === 'function') window.toast(message, status === 403 ? 'warn' : 'error');
}

function getApmathSession() {
    try {
        return JSON.parse(localStorage.getItem('APMATH_SESSION') || 'null');
    } catch (e) {
        return null;
    }
}

function sanitizeApmathSessionForStorage(data) {
    const safe = { ...(data || {}) };
    delete safe.raw_password;
    delete safe.password;
    delete safe.pw;
    return safe;
}

function saveApmathSession(data) {
    localStorage.setItem('APMATH_SESSION', JSON.stringify(sanitizeApmathSessionForStorage(data)));
}

function encodeBasicAuthUnicodeSafe(value) {
    const str = String(value || '');
    try {
        return btoa(unescape(encodeURIComponent(str)));
    } catch (e) {
        return btoa(str);
    }
}

function getAssignmentAuthHeader() {
    try {
        const session = getApmathSession();
        if (!session) return null;
        if (session.session_token) return { 'Authorization': 'Bearer ' + session.session_token };

        const mem = window.__APMATH_AUTH_MEMORY || {};
        const loginId = mem.login_id || session.login_id || session.loginId;
        const rawPassword = mem.raw_password || session.raw_password;
        if (!loginId || !rawPassword) return null;
        return { 'Authorization': 'Basic ' + encodeBasicAuthUnicodeSafe(`${loginId}:${rawPassword}`) };
    } catch (e) {
        return null;
    }
}

function restoreApmathSessionFromHash() {
    const hash = String(window.location.hash || '');
    const match = /(?:^#|&)apmsess=([^&]+)/.exec(hash);
    if (!match) return false;
    try {
        const incoming = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(match[1])))));
        if (!incoming || (!incoming.session_token && !incoming.login_id)) return false;
        const existing = getApmathSession();
        saveApmathSession({
            ...(existing || {}),
            ...incoming,
            login_id: incoming.login_id || incoming.loginId || (existing && (existing.login_id || existing.loginId)) || '',
            id: incoming.id || (existing && existing.id) || '',
            name: incoming.name || (existing && existing.name) || '',
            role: incoming.role || (existing && existing.role) || '',
            session_token: incoming.session_token || (existing && existing.session_token) || '',
            expires_at: incoming.expires_at || (existing && existing.expires_at) || '',
            restored_from_archive_hash: true,
            restored_at: new Date().toISOString()
        });
        return true;
    } catch (e) {
        console.warn('[archive auth] failed to restore AP session from hash:', e);
        return false;
    } finally {
        try {
            history.replaceState(null, '', window.location.pathname + window.location.search);
        } catch (e) {}
    }
}

function wrapLatex(text) {
    if (text == null) return '';
    let s = String(text);
    s = s.replace(/\\\([\s\S]+?\\\)/g, m => '$' + m.slice(2, -2) + '$');
    s = s.replace(/\\\[[\s\S]+?\\\]/g, m => '$$' + m.slice(2, -2) + '$$');
    const combRepl = T => (m, a1, a2, b1, b2) => `$_{${a1||a2}}${T}_{${b1||b2}}$`;
    const combPat = prefix => new RegExp(`(?<!\\$)(?:\\{\\}|\\[\\])_(?:\\{([^}]+)\\}|([a-zA-Z0-9+\\-]+))${prefix}_(?:\\{([^}]+)\\}|([a-zA-Z0-9+\\-]+))`, 'g');
    const htmlTags = [];
    s = s.replace(/<svg[\s\S]*?<\/svg>|<img[^>]*>|<br\s*\/?>|<\/?(div|span|b|i|strong|em|u|sup|sub|table|thead|tbody|tr|th|td|colgroup|col)[^>]*>/gi, m => {
        const token = `__HTMLTAG_${htmlTags.length}__`; htmlTags.push(m); return token;
    });
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$)/g).map((seg, idx) => {
        if (idx % 2 === 1) return seg;
        let t = seg;
        t = t.replace(combPat('C'), combRepl('C')).replace(combPat('H'), combRepl('H')).replace(combPat('P'), combRepl('P'));
        return t.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }).join('');
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$|__HTMLTAG_\d+__)/g).map((seg, idx) => {
        if (idx % 2 === 1) return seg;
        const trimmed = seg.trim(); if (!trimmed) return seg;
        const hasKorean = /[가-힣]/.test(seg); const hasLatex = /\\[a-zA-Z]/.test(seg);
        if (!hasKorean && /\\begin\{(cases|aligned|array|matrix|pmatrix|bmatrix|vmatrix|Vmatrix)\}/.test(seg)) return `$$${seg}$$`;
        if (!hasKorean && hasLatex && /^[0-9a-zA-Z\s\+\-\*\/\=\^\{\}\(\)\[\]_\.,\\!;:]+$/.test(trimmed)) return `$${trimmed}$`;
        if (hasKorean && hasLatex) return seg.replace(/(\\[a-zA-Z]+(?:\{[^}]*\})*(?:\{[^}]*\})*(?:_\{?[^}\s]+\}?)?(?:\^\{?[^}\s]+\}?)?)/g, '$$$1$$');
        return seg;
    }).join('');
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$)/g).map((seg, idx) => {
        if (idx % 2 === 1) return seg;
        return seg.replace(/(\\\{(?:[^{}]|\{[^}]*\})*\\\})/g, '$$$1$$');
    }).join('');
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$)/g).map((seg, idx) => {
        if (idx % 2 === 0) return seg;
        return seg.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }).join('');
    s = s.replace(/\\n(?![a-zA-Z])/g, '<br>').replace(/\r\n|\r|\n/g, '<br>');
    return s.replace(/__HTMLTAG_(\d+)__/g, (_, i) => htmlTags[i] || '');
}

function autoCompress(container) {
    let fontSize = 9.5; let lineHeight = 1.58;
    while (container.scrollHeight > container.clientHeight + 1 && fontSize > 6.5) {
        fontSize = Math.max(fontSize - 0.3, 6.5); lineHeight = Math.max(lineHeight - 0.08, 1.0);
        container.style.fontSize = fontSize + 'pt'; container.style.lineHeight = String(lineHeight);
    }
}

function fitQuestionBox(box) {
    const textClasses = ['', 'fit-tight', 'fit-tighter', 'fit-micro'];
    const imgClasses = ['', 'img-fit-tight', 'img-fit-tighter', 'img-fit-micro'];
    const imgs = box.querySelectorAll('.q-content img, .q-image-wrap img');
    for (const tCls of textClasses) {
        box.classList.remove('fit-tight', 'fit-tighter', 'fit-micro');
        if (tCls) box.classList.add(tCls);
        if (box.scrollHeight <= box.clientHeight + 1) return;
    }
    for (const iCls of imgClasses) {
        imgs.forEach(img => img.classList.remove('img-fit-tight', 'img-fit-tighter', 'img-fit-micro'));
        if (iCls) imgs.forEach(img => img.classList.add(iCls));
        if (box.scrollHeight <= box.clientHeight + 1) return;
    }
}

function makeSolutionHtmlChunks(html) {
    const host = document.createElement('div');
    host.innerHTML = html || '';
    const chunks = [];
    const pushTextChunks = (text) => {
        const parts = String(text || '').split(/(\s+)/);
        let buf = '';
        for (const part of parts) {
            if ((buf + part).length > 260 && buf.trim()) {
                const span = document.createElement('span');
                span.textContent = buf;
                chunks.push(span.outerHTML);
                buf = part;
            } else {
                buf += part;
            }
        }
        if (buf) {
            const span = document.createElement('span');
            span.textContent = buf;
            chunks.push(span.outerHTML);
        }
    };
    host.childNodes.forEach(node => {
        if (node.nodeType === Node.TEXT_NODE) {
            pushTextChunks(node.textContent || '');
        } else if (node.nodeType === Node.ELEMENT_NODE) {
            if (node.tagName === 'BR') chunks.push('<br>');
            else chunks.push(node.outerHTML);
        }
    });
    return chunks.length ? chunks : [''];
}

function normalizeArchiveExamScriptPath(raw) {
    const value = String(raw || '').trim();
    if (!value || value.length > 512) return '';
    if (/\\|%5c/i.test(value)) return '';

    let decoded = value;
    try {
        decoded = decodeURIComponent(value);
    } catch (e) {
        return '';
    }

    if (/\\/.test(decoded)) return '';
    decoded = decoded.trim().replace(/^\.\/+/, '');
    decoded = decoded.replace(/^archive\/exams\//, 'exams/');

    if (!decoded || decoded.length > 512) return '';
    if (/^blob:/i.test(decoded)) {
        try {
            const blobUrl = new URL(decoded);
            if (blobUrl.origin === window.location.origin) return decoded;
        } catch (e) {}
        return '';
    }
    if (/[?#]/.test(decoded)) return '';
    if (/^(https?:)?\/\//i.test(decoded)) return '';
    if (/^(javascript|data):/i.test(decoded)) return '';
    if (decoded.includes('../') || decoded.includes('/./') || decoded.includes('//')) return '';
    if (/%2e|%2f|%5c/i.test(decoded)) return '';
    if (!/^exams\/[a-zA-Z0-9가-힣_\-./]+\.js$/.test(decoded)) return '';

    return decoded;
}

function extractChoice(c) {
    if (c === null || c === undefined) return '';
    if (typeof c === 'object') return c.text || c.content || c.value || c.answer || Object.values(c)[0] || '';
    return String(c);
}

function stripChoicePrefix(text) {
    return String(text || '').replace(/^\s*(?:[①②③④⑤⑥⑦⑧⑨⑩]|\(?\d+\)|\d+\.(?!\d)|\d+\))\s*/, '').trim();
}

function detectChoiceRenderMode(choices) {
    if (!choices || choices.length === 0) return 'compact';

    const texts = choices.map(c => stripChoicePrefix(extractChoice(c)).trim());
    // LaTeX 수식 제거 후 길이 측정 (LaTeX 소스 길이로 오인식 방지)
    const stripped = texts.map(t => t.replace(/\$\$[\s\S]*?\$\$/g, '~').replace(/\$[^$\n]*?\$/g, '~').trim());

    const avgLen = stripped.reduce((s, t) => s + t.length, 0) / Math.max(stripped.length, 1);
    const isVeryLong = stripped.some(t => t.length > 36);
    const hasLineBreak = texts.some(t => /\\n|\n|<br/i.test(t));
    const hasSentence = stripped.some(t => /[.?!。]|입니다|한다|된다|아니다|같다|옳다|옳지/.test(t) && t.length > 20);
    // boxed: 선택지 자체에 ㄱ/ㄴ/㉠/㉡ 마커가 2개 이상 포함된 경우만 (보기형 선택지)
    const hasMultiMarker = texts.some(t => (t.match(/[ㄱㄴㄷㄹㅁ]\.|㉠|㉡|㉢|㉣|㉤/g) || []).length >= 2);

    if (hasMultiMarker) return 'boxed';
    if (isVeryLong || hasLineBreak || hasSentence || avgLen > 28) return 'block';

    const isLong = stripped.some(t => t.length > 20);
    const hasBlockPrefix = texts.some(t => /^[가-힣ㄱ-ㅎa-zA-Z][\.\)]/.test(t));

    return (isLong || hasBlockPrefix) ? 'block' : 'compact';
}

function renderChoicesHTML(q) {
    const circled = ['①', '②', '③', '④', '⑤'];
    const isSubjective = !Array.isArray(q.choices) || q.choices.length === 0 || q.choices[0] === '주관식' || q.choices.every(c => extractChoice(c).trim() === '');
    if (isSubjective) return '<div class="answer-box"></div>';
    const mode = detectChoiceRenderMode(q.choices);
    const itemsHTML = q.choices.map((c, ci) => {
        const text = wrapLatex(stripChoicePrefix(extractChoice(c)));
        return `<div class="choice-item"><span class="choice-no">${circled[ci] || ''}</span><span class="choice-text">${text}</span></div>`;
    }).join('');
    return `<div class="choices choices-${mode}">${itemsHTML}</div>`;
}

function formatQuestionContent(html, q) {
    if (!html) return '';

    return html.replace(/([\.?\!]|\s|>)\s*(\(\d+\))/g, (match, p1, p2) => {
        count++;
        if (count === 1) return match;
        if (p1.includes('br>') || p1.includes('\n')) return match;
        return p1 + '<br>' + p2;
    });
}

function normalizeQuestionTables(html) {

function normalizeQuestionNotes(html) {
    if (!html || /question-note-box/.test(html)) return html;
    return html.replace(
        /((?:<br\s*\/?>\s*)+)(\[[^\]]+\][\s\S]*?)(?=(?:<br\s*\/?>\s*){2,}|$)/gi,
        (match, breaks, noteBlock) => {
            const brCount = (noteBlock.match(/<br\s*\/?>/gi) || []).length;
            const plainText = noteBlock.replace(/<[^>]+>/g, '').trim();
            if (brCount < 2 && plainText.length < 60) return match;
            return `<div class="question-note-box">${noteBlock}</div>`;
        }
    );
}

function protectRenderSegments(html) {
    const tokens = [];
    const save = (match) => {
        const token = `__PROTECTED_SEGMENT_${tokens.length}__`;
        tokens.push(match);
        return token;
    };

    // 블록 HTML을 먼저 보호한 뒤 인라인 수식을 보호한다.
    // 기존 순서(수식 → table/div)는 table 안의 수식 토큰이 table 토큰 안에 다시 들어가면서
    // __PROTECTED_SEGMENT_n__ 문자열이 한 번만 복원되고 화면에 그대로 남는 문제가 있었다.
    let protectedHtml = String(html || '')
        .replace(/<div[^>]*class=["'][^"']*(?:question-table-wrap|question-note-box|box)[^"']*["'][^>]*>[\s\S]*?<\/div>/gi, save)
        .replace(/<table[\s\S]*?<\/table>/gi, save)
        .replace(/\$\$[\s\S]*?\$\$/g, save)
        .replace(/\$[^$\n]*?\$/g, save);

    return {
        html: protectedHtml,
        restore(value) {
            let restored = String(value || '');
            // 과거 저장본/예외 케이스에 중첩 토큰이 남아도 끝까지 복원한다.
            for (let pass = 0; pass < tokens.length + 2 && /__PROTECTED_SEGMENT_\d+__/.test(restored); pass++) {
                restored = restored.replace(/__PROTECTED_SEGMENT_(\d+)__/g, (match, i) => {
                    const idx = Number(i);
                    if (tokens[idx] !== undefined) return tokens[idx];
                    console.warn('[JS Archive] protected segment restore failed:', match);
                    return '';
                });
            }
            if (/__PROTECTED_SEGMENT_\d+__/.test(restored)) {
                console.warn('[JS Archive] protected segment remained after restore:', restored);
            }
            return restored;
        }
    };
}

function normalizeViewBlocks(html) {
    if (!html) return '';
    const protectedState = protectRenderSegments(html);
    let out = protectedState.html;

    out = out.replace(
        /((?:<br\s*\/?>\s*)*)(?:\[보기\]|&lt;보기&gt;|<보기>|보기\s*:|조건\s*:|자료\s*:)\s*([\s\S]*?)(?=(?:<br\s*\/?>\s*){2,}|$)/gi,
        (match, breaks, body) => {
            const plain = body.replace(/<[^>]+>/g, '').trim();
            const markerCount = (plain.match(/[ㄱㄴㄷㄹㅁ]\.|㉠|㉡|㉢|㉣|㉤|①|②|③|④|⑤/g) || []).length;
            if (plain.length < 60 && markerCount < 2) return match;
            const label = /조건\s*:/.test(match) ? '조건' : (/자료\s*:/.test(match) ? '자료' : '보기');
            return `${breaks}<div class="question-note-box"><b>${label}</b><br>${body.trim()}</div>`;
        }
    );

    out = out.replace(
        /((?:<br\s*\/?>\s*)*)((?:[ㄱㄴㄷㄹㅁ]\.\s*[\s\S]*?){2,})(?=(?:<br\s*\/?>\s*){2,}|$)/g,
        (match, breaks, body) => {
            const plain = body.replace(/<[^>]+>/g, '').trim();
            const markerCount = (plain.match(/[ㄱㄴㄷㄹㅁ]\./g) || []).length;
            if (plain.length < 60 || markerCount < 2) return match;
            return `${breaks}<div class="question-note-box">${body.trim()}</div>`;
        }
    );

    out = out.replace(
        /((?:<br\s*\/?>\s*)*)((?:㉠\s*[\s\S]*?㉡\s*[\s\S]*?(?:㉢|㉣|㉤)[\s\S]*?))(?=(?:<br\s*\/?>\s*){2,}|$)/g,
        (match, breaks, body) => {
            const plain = body.replace(/<[^>]+>/g, '').trim();
            const markerCount = (plain.match(/㉠|㉡|㉢|㉣|㉤/g) || []).length;
            if (plain.length < 60 || markerCount < 3) return match;
            return `${breaks}<div class="question-note-box">${body.trim()}</div>`;
        }
    );

    return protectedState.restore(out);
}

function sanitizeProtectedSegments(html) {
    const value = String(html || '');
    if (!/__PROTECTED_SEGMENT_\d+__/.test(value)) return value;
    console.warn('[JS Archive] removing leaked protected segment token:', value);
    return value.replace(/__PROTECTED_SEGMENT_\d+__/g, '');
}

function stripInlineImagesFromContent(content, hasImageField) {
    if (!content) return '';
    if (!hasImageField) return content;
    let stripped = content.replace(/(?:<br\s*\/?>\s*)*<img[^>]*>(?:\s*<br\s*\/?>)*/gi, '<br>');
    stripped = stripped.replace(/^(?:<br\s*\/?>\s*)+/i, '').replace(/(?:<br\s*\/?>\s*)+$/i, '');
    return stripped;
}

function renderQuestionImageHTML(q) {
    if (!q.image) return '';
    const size = ['small','half','medium','large','full','tall'].includes(q.imageSize) ? q.imageSize : '';
    const sizeClass = size ? ` image-${size}` : '';
    return `<div class="q-image-wrap${sizeClass}"><img src="${q.image}"></div>`;
}

const AUTO_IMAGE_SIZE_CLASSES = ['image-small', 'image-half', 'image-medium', 'image-large', 'image-full', 'image-tall'];

function autoImageSizeClassFor(img) {
    const width = Number(img && img.naturalWidth) || 0;
    const height = Number(img && img.naturalHeight) || 0;
    if (!width || !height) return 'image-medium';
    const ratio = width / height;
    if (ratio >= 2.2) return 'image-full';
    if (ratio >= 1.25) return 'image-large';
    if (ratio >= 0.8) return 'image-small';
    return 'image-medium';
}

function waitForQuestionImage(img) {
    if (!img || img.complete) return Promise.resolve();
    return new Promise(resolve => {
        let done = false;
        const finish = () => {
            if (done) return;
            done = true;
            resolve();
        };
        img.addEventListener('load', finish, { once: true });
        img.addEventListener('error', finish, { once: true });
        setTimeout(finish, 1200);
    });
}

async function applyAutoImageSizeClasses(root) {
    const wraps = Array.from(root.querySelectorAll('.q-image-wrap'));
    await Promise.all(wraps.map(async wrap => {
        if (AUTO_IMAGE_SIZE_CLASSES.some(cls => wrap.classList.contains(cls))) return;
        const img = wrap.querySelector('img');
        if (!img) {
            wrap.classList.add('image-medium');
            return;
        }
        await waitForQuestionImage(img);
        wrap.classList.add(autoImageSizeClassFor(img));
    }));
}

async function renderExam(area, data) {
    const staging = document.getElementById('staging'); staging.style.width = '83mm'; staging.innerHTML = '';
    let pNum = 1;
    const items = data.map((q, i) => {
        const box = document.createElement('div'); box.className = 'q-box';
        const hasImageField = !!q.image;
        const rawContent = stripInlineImagesFromContent(q.content || q.question || '', hasImageField);
        const formattedContent = sanitizeProtectedSegments(
            normalizeQuestionNotes(
                normalizeViewBlocks(
                    normalizeQuestionTables(
                        formatQuestionContent(wrapLatex(rawContent), q)
                    )
                )
            )
        );
        const imageHTML = renderQuestionImageHTML(q);
        const choicesHTML = renderChoicesHTML(q);
        box.innerHTML = `<div class="q-num">${i + 1}.</div>
                         <div class="q-content">${formattedContent}</div>
                         ${imageHTML}
                         ${choicesHTML}`;
        staging.appendChild(box); return { q, box, originalIndex: i };
    });
    await applyAutoImageSizeClasses(staging);
    if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([staging]); await raf();
    for (const item of items) {
        const p = {}; p.proxyHeight_raw = item.box.scrollHeight; item.box.classList.add('fit-tight'); await raf();
        p.proxyHeight_tight = item.box.scrollHeight; item.box.classList.remove('fit-tight');
        item.profile = p;
    }
    const tempPage = makePage(area, 'exam', 0);
    const usablePageHeight = tempPage.body.clientHeight;
    area.removeChild(tempPage);
    let firstPage = null; let pages = [];
    let currentPage = { blocks: [], usedHeight: 0 };
    let activeChunk = []; let currentType = null;
    const flushBlock = () => {
        if (activeChunk.length === 0) return;
        const type = currentType; const chunk = [...activeChunk];
        let hType = (type === 'normal') ? 'proxyHeight_tight' : 'proxyHeight_raw';
        let blockH;
        if (type === 'wide') {
            blockH = chunk[0].profile.proxyHeight_raw + SE_OVERHEAD_COL + SE_OVERHEAD_GRID;
        } else {
            const split = Math.ceil(chunk.length / 2);
            const leftH = chunk.slice(0, split).reduce((s, it) => s + it.profile[hType], 0) + SE_OVERHEAD_COL;
            const rightH = chunk.slice(split).reduce((s, it) => s + it.profile[hType], 0) + SE_OVERHEAD_COL;
            blockH = Math.max(leftH, rightH) + SE_OVERHEAD_GRID;
        }
        const isNormalForceBreak = (type === 'normal' && currentPage.blocks.length > 0);
        const gap = (currentPage.blocks.length > 0) ? SE_BLOCK_GAP : 0;
        if ((isNormalForceBreak || (currentPage.usedHeight + gap + blockH > usablePageHeight)) && currentPage.blocks.length > 0) {
            pages.push(currentPage); currentPage = { blocks: [], usedHeight: 0 };
        }
        currentPage.usedHeight += (currentPage.blocks.length > 0 ? SE_BLOCK_GAP : 0) + blockH;
        currentPage.blocks.push({ type, items: chunk, blockH });
        activeChunk = [];
    };
    items.forEach(item => {
        const lt = item.q.layoutTag || '';
        let qType = 'normal'; let limit = AppState.qpp;
        if (item.q.wide === true || lt === 'fullwidth') { qType = 'wide'; limit = 1; }
        else if (lt === 'subjective-2up') { qType = 'subj2'; limit = 2; }
        else if (lt === 'subjective-4up') { qType = 'subj4'; limit = 4; }
        const isSpecialType = (qType === 'subj2' || qType === 'subj4' || qType === 'wide');
        const prevWasSpecial = (currentType === 'subj2' || currentType === 'subj4' || currentType === 'wide');
        if ((currentType !== null && currentType !== qType) || (activeChunk.length >= limit) || ((isSpecialType || prevWasSpecial) && currentPage.blocks.length > 0)) {
            flushBlock();
            if (isSpecialType && currentPage.blocks.length > 0) { pages.push(currentPage); currentPage = { blocks: [], usedHeight: 0 }; }
            currentType = qType;
        }
        if (currentType === null) currentType = qType;
        activeChunk.push(item);
    });
    flushBlock(); if (currentPage.blocks.length > 0) pages.push(currentPage);
    for (let pIdx = 0; pIdx < pages.length; pIdx++) {
        const pageData = pages[pIdx];
        const page = (!firstPage) ? (firstPage = makePage(area, 'exam', pNum)) : makePage(area, 'exam', ++pNum);
        pageData.blocks.forEach((block, bIdx) => {
            if (block.type === 'wide') {
                const wideCol = document.createElement('div'); wideCol.style.cssText = 'flex:1; display:flex; flex-direction:column; padding:0 8px; min-height:0; overflow:hidden;';
                wideCol.appendChild(block.items[0].box.cloneNode(true)); page.body.appendChild(wideCol);
            } else {
                const bGrid = document.createElement('div'); bGrid.className = 'grid-container';
                bGrid.style.flex = (block.type === 'normal') ? '1 1 0' : 'none';
                if (bIdx < pageData.blocks.length - 1) bGrid.style.marginBottom = SE_BLOCK_GAP + 'px';
                const bLeft = document.createElement('div'); bLeft.className = 'grid-col';
                const bRight = document.createElement('div'); bRight.className = 'grid-col';
                bGrid.appendChild(bLeft); bGrid.appendChild(bRight); page.body.appendChild(bGrid);
                const split = Math.ceil(block.items.length / 2);
                block.items.slice(0, split).forEach(it => bLeft.appendChild(it.box.cloneNode(true)));
                block.items.slice(split).forEach(it => bRight.appendChild(it.box.cloneNode(true)));
            }
        });
        if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([page]); await raf();
        const allPageBoxes = page.querySelectorAll('.q-box'); allPageBoxes.forEach(b => fitQuestionBox(b));
        if (page.body.scrollHeight > usablePageHeight + SE_PAGE_TOLERANCE) {
            allPageBoxes.forEach(b => autoCompress(b)); await raf();
            if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([page]);
        }
    }
}

async function renderSol(area, data) {
    {
        let pNum = 1;
        let cols;
        let colIdx = 0;
        const makeGridPage = () => {
            const p = makePage(area, 'sol', pNum++);
            const grid = document.createElement('div'); grid.className = 'grid-container';
            const l = document.createElement('div'); l.className = 'grid-col';
            const r = document.createElement('div'); r.className = 'grid-col';
            grid.appendChild(l); grid.appendChild(r); p.body.appendChild(grid);
            return { p, cols: [l, r] };
        };
        const advanceColumn = () => {
            if (colIdx === 0) colIdx = 1;
            else { ({ cols } = makeGridPage()); colIdx = 0; }
            return cols[colIdx];
        };
        const renderSplitSolutionBox = async (sourceBox, qNo) => {
            const originalExp = sourceBox.querySelector('.sol-exp');
            const chunks = makeSolutionHtmlChunks(sourceBox.dataset.solutionHtml || (originalExp ? originalExp.innerHTML : ''));
            let shell = makeLongSolutionShell(sourceBox, qNo, false);
            let exp = shell.querySelector('.sol-exp');
            let targetCol = cols[colIdx];
            targetCol.appendChild(shell);

            for (const chunkHtml of chunks) {
                const chunk = document.createElement('span');
                chunk.className = 'sol-chunk';
                chunk.innerHTML = chunkHtml;
                exp.appendChild(chunk);
                if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([targetCol]);
                await raf();
                if (targetCol.scrollHeight <= targetCol.clientHeight + 2) continue;

                if (exp.children.length > 1) {
                    exp.removeChild(chunk);
                    targetCol = advanceColumn();
                    shell = makeLongSolutionShell(sourceBox, qNo, true);
                    exp = shell.querySelector('.sol-exp');
                    targetCol.appendChild(shell);
                    exp.appendChild(chunk);
                    if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([targetCol]);
                    await raf();
                }
                if (targetCol.scrollHeight > targetCol.clientHeight + 2) {
                    autoCompress(shell);
                    await raf();
                }
            }
        };
        const placeSolutionBox = async (box, qNo) => {
            while (true) {
                const targetCol = cols[colIdx];
                targetCol.appendChild(box);
                if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([targetCol]);
                await raf();
                if (targetCol.scrollHeight <= targetCol.clientHeight + 2) return;

                autoCompress(box);
                await raf();
                if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([targetCol]);
                await raf();
                if (targetCol.scrollHeight <= targetCol.clientHeight + 2) return;

                const isOnlyBoxInColumn = targetCol.querySelectorAll('.sol-box').length === 1;
                targetCol.removeChild(box);
                if (isOnlyBoxInColumn) {
                    await renderSplitSolutionBox(box, qNo);
                    return;
                }
                advanceColumn();
            }
        };

        ({ cols } = makeGridPage());
        for (let i = 0; i < data.length; i++) {
            const q = data[i];
            const solutionText = q.solution || q.explanation || q.sol || '';
            const reminderRawContent = stripInlineImagesFromContent(q.content || q.question || '', !!q.image);
            const reminderContent = sanitizeProtectedSegments(
                normalizeQuestionNotes(
                    normalizeViewBlocks(
                        normalizeQuestionTables(
                            formatQuestionContent(wrapLatex(reminderRawContent), q)
                        )
                    )
                )
            );
            const solutionHtml = wrapLatex(solutionText);
            const box = document.createElement('div'); box.className = 'q-box sol-box';
            box.dataset.solutionHtml = solutionHtml;
            box.innerHTML = `<div class="q-num">${i + 1}.</div><div style="margin-bottom:8px;color:#555;font-size:8.5pt;">${reminderContent}</div><div class="sol-meta"><div class="sol-ans">[정답] ${wrapLatex(q.answer ?? '-')}</div><div class="sol-exp">${solutionHtml}</div></div>`;
            await placeSolutionBox(box, i + 1);
        }
        return;
    }
    let pNum = 1;
    function makeGridPage() {
        const p = makePage(area, 'sol', pNum++);
        const grid = document.createElement('div'); grid.className = 'grid-container';
        const l = document.createElement('div'); l.className = 'grid-col';
        const r = document.createElement('div'); r.className = 'grid-col';
        grid.appendChild(l); grid.appendChild(r); p.body.appendChild(grid);
        return { p, cols: [l, r] };
    }
    let { cols } = makeGridPage(); let colIdx = 0;
    for (let i = 0; i < data.length; i++) {
        const q = data[i]; const solutionText = q.solution || q.explanation || q.sol || '해설이 없습니다.';
        const reminderRawContent = stripInlineImagesFromContent(q.content || q.question || '', !!q.image);
        const reminderContent = sanitizeProtectedSegments(
            normalizeQuestionNotes(
                normalizeViewBlocks(
                    normalizeQuestionTables(
                        formatQuestionContent(wrapLatex(reminderRawContent), q)
                    )
                )
            )
        );
        const box = document.createElement('div'); box.className = 'q-box sol-box';
        box.innerHTML = `<div class="q-num">${i+1}.</div><div style="margin-bottom:8px;color:#555;font-size:8.5pt;">${reminderContent}</div><div style="background:#fdfdfd;padding:8px;border:1px solid #eee;border-radius:3px;"><div style="font-weight:bold;color:red;margin-bottom:4px;">[정답] ${wrapLatex(q.answer ?? '–')}</div><div style="font-size:8.5pt;line-height:1.55;">${wrapLatex(solutionText)}</div></div>`;
        cols[colIdx].appendChild(box);
        if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([cols[colIdx]]); await raf();
        if (cols[colIdx].scrollHeight > cols[colIdx].clientHeight + 2) {
            autoCompress(box); await raf();
            if (cols[colIdx].scrollHeight > cols[colIdx].clientHeight + 2) {
                cols[colIdx].removeChild(box);
                if (colIdx === 0) { colIdx = 1; cols[colIdx].appendChild(box); }
                else { ({ cols } = makeGridPage()); colIdx = 0; cols[colIdx].appendChild(box); }
                if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([cols[colIdx]]); await raf();
            }
        }
    }
}

function renderAns(area, data) {
    const PER_PAGE = 48; let pCount = 1; // 4의 배수(열당 24=6세트)로 두 열의 세트 경계를 맞춘다
    for (let start = 0; start < data.length; start += PER_PAGE) {
        const chunk = data.slice(start, start + PER_PAGE);
        const p = makePage(area, 'ans', pCount++);
        const grid = document.createElement('div'); grid.className = 'ans-grid';
        // 열 분할점을 4의 배수로 올려, 한 세트(4문제)가 두 열에 걸치지 않게 한다
        const splitIndex = Math.ceil(Math.ceil(chunk.length / 2) / 4) * 4;
        for (let i = 0; i < splitIndex; i++) {
            [i, splitIndex + i].forEach(idx => {
                if (chunk[idx]) {
                    const num = start + idx + 1;
                    const u = document.createElement('div'); u.className = 'ans-cell';
                    if (num % 4 === 0) u.classList.add('group-end'); // 4문제마다 채점 구분선
                    u.innerHTML = `<div class="ans-n">${num}.</div><div class="ans-v">${wrapLatex(chunk[idx].answer ?? '–')}</div>`;
                    grid.appendChild(u);
                }
            });
        }
        p.body.appendChild(grid);
    }
}

async function render() {
    const area = document.getElementById('print-area');
    area.innerHTML = '';
    syncQrOutputControls();

    if (AppState.mode === 'ans') {
        renderAns(area, AppState.data);
    } else if (AppState.mode === 'sol') {
        await renderSol(area, AppState.data);
    } else {
        await renderExam(area, AppState.data);
    }

    if (window.MathJax?.typesetPromise) {
        await MathJax.typesetPromise([area]);
    }

    injectQrToLastExamPage(area);
    injectSubmitQrToLastExamPage(area);
    applyQrSolutionLockUI();
    registerBlueprintToOS(); // [3B] blueprint 등록 (비동기, 출력 차단 없음)
    registerClassExamAssignmentToOS(); // [3H] 출제 이력 등록 (비동기, 출력 차단 없음)
}

// [3B] exam_blueprints 자동 등록 (AP 제출 QR 모드 전용)
let _blueprintRegisteredSig = '';

async function registerBlueprintToOS() {
    if (!shouldRenderSubmitQr()) return;
    if (!AppState.data.length) return;

    const params = new URLSearchParams(window.location.search);
    const archiveFile = params.get('data') || '';
    if (!archiveFile) return;

    // WARN1: 동일 내용 중복 POST 방지
    const sig = archiveFile + '|' + AppState.data.map(q => q.id).join(',');
    if (sig === _blueprintRegisteredSig) return;

    const authHeader = getAssignmentAuthHeader();
    if (!authHeader) {
        notifyArchiveQrApiFailure('auth', 'exam-blueprints auth');
        return;
    }

    const getKey = window.getConceptClusterKey || (() => '__UNMAPPED__'); // WARN2

    const items = AppState.data.map((q, i) => ({
        question_no: i + 1,
        source_archive_file: archiveFile,
        source_question_no: q.id ?? (i + 1),
        standard_unit_key: q.standardUnitKey || '',
        standard_unit: q.standardUnit || '',
        standard_course: q.standardCourse || '',
        concept_cluster_key: getKey(q.standardUnitKey || '')
    }));

    try {
        const res = await fetch(`${ARCHIVE_AP_API_BASE}/exam-blueprints`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...authHeader },
            body: JSON.stringify({ archive_file: archiveFile, items })
        });
        if (!res.ok) {
            notifyArchiveQrApiFailure(res.status, 'exam-blueprints');
            console.warn('[3B] blueprint 등록 실패:', res.status);
        }
        else _blueprintRegisteredSig = sig;
    } catch(e) {
        notifyArchiveQrApiFailure(0, 'exam-blueprints');
        console.warn('[3B] blueprint 등록 오류:', e);
    }
}

window.onload = () => {
    restoreApmathSessionFromHash();
    init();
};
