<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>시험지 분석표</title>
  <style>
    :root {
      --blue-main: #2563eb;
      --blue-light: #60a5fa;
      --blue-pale: #eff6ff;
      --green-border: #b7efd4;
      --bg-soft: #f4f7fb;
      --card-active: #f7faff;
      --card-border: #e2e8f0;
      --card-border-hover: #93c5fd;
      --text-main: #0f172a;
      --text-sub: #64748b;
      --badge-text: #315ea8;
      --badge-border: #d8e5fb;
      --warn-bg: #fff7ed;
      --warn-border: #fed7aa;
      --warn-text: #9a3412;
      --shadow-card: 0 14px 32px rgba(15, 23, 42, 0.06);
      --shadow-card-hover: 0 22px 44px rgba(37, 99, 235, 0.12);
      --archive-red: #b42318;
      --archive-amber: #a16207;
      --archive-green: #0f766e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.06), transparent 26%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg-soft) 100%);
      color: #1e293b;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
    }
    header {
      background: rgba(255,255,255,0.88);
      border-bottom: 1px solid #e6ebf3;
      position: sticky;
      top: 0;
      z-index: 900;
      backdrop-filter: blur(14px);
    }
    .top-nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .brand {
      font-size: 18px;
      font-weight: 900;
      color: var(--text-main);
    }
    .back-link {
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }
    .content-wrap {
      background: linear-gradient(180deg, rgba(255,255,255,0.38) 0%, rgba(255,255,255,0) 100%);
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px 58px;
    }
    .exam-card {
      background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0.98) 100%);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      box-shadow: var(--shadow-card);
      margin-bottom: 18px;
      overflow: hidden;
      transition: 0.18s ease;
      position: relative;
    }
    .card-top {
      height: 4px;
      background: linear-gradient(90deg, var(--blue-main) 0%, #7db8ff 100%);
    }
    .card-body {
      padding: 22px 22px 18px;
    }
    .card-grade-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .card-grade-label {
      color: var(--text-sub);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .card-type-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 25px;
      border-radius: 999px;
      background: rgba(238,244,255,0.86);
      border: 1px solid var(--badge-border);
      color: var(--badge-text);
      font-size: 11px;
      font-weight: 800;
      padding: 0 10px;
      flex-shrink: 0;
      backdrop-filter: blur(8px);
    }
    .meta-badge {
      display: inline-flex;
      align-items: center;
      min-height: 27px;
      padding: 0 10px;
      border-radius: 9px;
      font-size: 11px;
      font-weight: 800;
      color: #475569;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4);
    }
    .meta-badge.primary {
      color: var(--blue-main);
      background: rgba(239,246,255,0.95);
      border-color: #dbeafe;
    }
    .meta-badge.green {
      color: #047857;
      background: rgba(236,253,245,0.95);
      border-color: var(--green-border);
    }
    .card-main-title {
      color: var(--text-main);
      font-size: 20px;
      font-weight: 800;
      line-height: 1.28;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .card-sub-title {
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.58;
      margin-bottom: 12px;
    }
    .card-meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 13px;
      min-height: 28px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 800;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #e4ebf5;
      border-radius: 12px;
      background: rgba(255,255,255,0.92);
      color: var(--text-main);
      font: inherit;
      padding: 10px 11px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.03);
    }
    textarea {
      min-height: 42px;
      resize: vertical;
    }
    .span-2 { grid-column: span 2; }
    .action-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0;
      margin-top: 14px;
      border: 1px solid var(--card-border);
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(180deg, #fcfdff 0%, #f9fbff 100%);
    }
    .action-btn {
      min-height: 48px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--text-sub);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      font-family: inherit;
      padding: 0 16px;
      transition: background 0.15s, color 0.15s;
    }
    .action-btn + .action-btn { border-left: 1px solid #edf2f7; }
    .action-btn:hover {
      background: #f2f7ff;
      color: #315ea8;
    }
    .save-state {
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 800;
      margin-left: auto;
      padding: 0 12px;
    }
    .section-title {
      font-size: 17px;
      font-weight: 900;
      margin: 0 0 12px;
      color: var(--text-main);
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--card-border);
      border-radius: 14px;
      background: linear-gradient(180deg, #fcfdff 0%, #f9fbff 100%);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }
    th, td {
      border-bottom: 1px solid var(--card-border);
      padding: 9px 10px;
      text-align: left;
      vertical-align: middle;
      font-size: 13px;
    }
    th {
      background: #f8fafc;
      color: var(--text-sub);
      font-weight: 800;
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: 0; }
    .result-picker {
      display: flex;
      gap: 5px;
    }
    .result-btn {
      min-width: 38px;
      min-height: 38px;
      border: 1px solid #e4ebf5;
      border-radius: 12px;
      background: #fff;
      color: var(--text-sub);
      cursor: pointer;
      font-weight: 850;
    }
    .result-btn.is-selected[data-status="correct"] {
      border-color: var(--archive-green);
      background: #e9f8f4;
      color: var(--archive-green);
    }
    .result-btn.is-selected[data-status="wrong"] {
      border-color: var(--archive-red);
      background: #fff1f0;
      color: var(--archive-red);
    }
    .result-btn.is-selected[data-status="partial"] {
      border-color: var(--archive-amber);
      background: #fff8e7;
      color: var(--archive-amber);
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }
    .stat {
      border: 1px solid #e4ebf5;
      border-radius: 12px;
      background: rgba(255,255,255,0.92);
      padding: 12px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.03);
    }
    .stat strong {
      display: block;
      color: var(--text-main);
      font-size: 20px;
      line-height: 1.1;
    }
    .empty-state {
      border: 1px solid var(--warn-border);
      border-radius: 14px;
      background: var(--warn-bg);
      color: var(--warn-text);
      padding: 18px 20px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(154, 52, 18, 0.05);
    }
    .needs-list {
      display: grid;
      gap: 8px;
    }
    .need-item {
      border: 1px solid var(--card-border);
      border-radius: 14px;
      background: #fff;
      padding: 10px 12px;
      font-size: 13px;
    }

    @media (max-width: 760px) {
      .top-nav { align-items: flex-start; flex-direction: column; }
      .content-wrap { padding: 16px 12px 40px; }
      .form-grid, .summary-grid { grid-template-columns: 1fr; }
      .span-2 { grid-column: span 1; }
      .card-main-title { font-size: 19px; }
      th, td { padding: 8px; }
      .result-btn { min-width: 36px; }
    }

    @media print {
      body { background: #fff; }
      header, .no-print, .input-section, .result-picker, .print-hidden, .internal-only { display: none !important; }
      .content-wrap { max-width: none; padding: 0; }
      .exam-card { box-shadow: none; break-inside: avoid; }
      .card-body { padding: 12px; }
      .table-wrap { overflow: visible; }
      table { min-width: 0; }
      th, td { font-size: 10px; padding: 5px; }
      .card-main-title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="top-nav">
      <div class="brand">시험지 분석표</div>
      <a class="back-link" href="./assessment-mvp.html">시험지 보관함으로 돌아가기</a>
    </div>
  </header>

  <main class="content-wrap" id="app">
    <div class="empty-state">평가팩을 불러오는 중입니다.</div>
  </main>

  <script src="assessment-packs-1sem.generated.js"></script>
  <script src="assessment-question-index-1sem.generated.js"></script>
  <script>
    const PACK_DATA = window.APMATH_ASSESSMENT_PACKS_1SEM || { packs: [] };
    const QUESTION_INDEX_DATA = window.APMATH_ASSESSMENT_QUESTION_INDEX_1SEM || { questions: [] };
    const packs = PACK_DATA.packs || [];
    const questionIndex = QUESTION_INDEX_DATA.questions || [];
    const STORAGE_PREFIX = 'apms.assessment.analysis.';
    const DIAGNOSTIC_RESULT_PREFIX = 'apms.diagnostic.assessment.result.';
    const DIAGNOSTIC_RESULTS_LIST_KEY = 'apms.diagnostic.assessment.results';
    const DIAGNOSTIC_CURRENT_KEY = 'apms.diagnostic.assessment.current';
    const DIAGNOSTIC_INPUT_MODE_QUERY = 'mode=diagnostic-input';
    const DIAGNOSTIC_REPORT_MODE_QUERY = 'mode=diagnostic-report';
    const STATUS_LABELS = { correct: 'O', wrong: 'X', partial: '△', unchecked: '-' };
    const state = { pack: null, rows: [], diagnosticEditOpen: false, diagnosticInternalOpen: false };

    function escapeHTML(value) {
      return String(value ?? '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[ch]));
    }

    function todayString() {
      return new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
    }

    function getPackId() {
      return new URLSearchParams(window.location.search).get('packId') || '';
    }

    function getDiagnosticId() {
      return new URLSearchParams(window.location.search).get('diagnosticId') || '';
    }

    function getPageMode() {
      return new URLSearchParams(window.location.search).get('mode') || '';
    }

    function isDiagnosticMode() {
      const mode = getPageMode();
      return !!getDiagnosticId() && (mode === 'diagnostic-input' || mode === 'diagnostic-report');
    }

    function isDiagnosticReportMode() {
      return isDiagnosticMode() && getPageMode() === 'diagnostic-report';
    }

    function shouldShowDiagnosticInput() {
      return !isDiagnosticReportMode() || state.diagnosticEditOpen;
    }

    function getStorageKey() {
      if (isDiagnosticMode()) return DIAGNOSTIC_RESULT_PREFIX + getDiagnosticId();
      return STORAGE_PREFIX + (state.pack?.id || getPackId());
    }

    function firstValue(values, fallback) {
      for (const value of values) {
        if (Array.isArray(value) && value.length) return value[0];
        if (value !== undefined && value !== null && String(value).trim() !== '') return value;
      }
      return fallback;
    }

    function hasUsableQuestions(pack) {
      return Array.isArray(pack?.questions) && pack.questions.length > 0;
    }

    function getQuestionCount(pack) {
      if (hasUsableQuestions(pack)) return pack.questions.length;
      const count = Number.parseInt(pack?.questionCount || pack?.question_count, 10);
      return Number.isInteger(count) && count > 0 ? count : null;
    }

    function getScopeLabel(pack) {
      return firstValue([pack?.scopeLabel, pack?.scope, pack?.unitLabel, pack?.unit], '범위 확인 필요');
    }

    function getQuestionSourceFile(question) {
      return firstValue([
        question?._sourceFile,
        question?.sourceFile,
        question?.sourceRef?.file,
        question?.file,
      ], '');
    }

    function getQuestionSourceNo(question) {
      return firstValue([
        question?._sourceQuestionNo,
        question?.sourceQuestionNo,
        question?.sourceRef?.questionNo,
        question?.questionNo,
        question?.no,
      ], '');
    }

    function findQuestionIndex(question) {
      const sourceFile = getQuestionSourceFile(question);
      const sourceNo = String(getQuestionSourceNo(question) || '');
      const sourceRefFile = question?.sourceRef?.file || '';
      const sourceRefNo = String(question?.sourceRef?.questionNo || '');
      const id = question?.id;
      return questionIndex.find((item) => {
        if (sourceFile && sourceNo && item.sourceFile === sourceFile && String(item.sourceQuestionNo) === sourceNo) return true;
        if (question?._sourceFile && question?._sourceQuestionNo && item.sourceFile === question._sourceFile && String(item.sourceQuestionNo) === String(question._sourceQuestionNo)) return true;
        if (question?.sourceFile && question?.questionNo && item.sourceFile === question.sourceFile && String(item.sourceQuestionNo) === String(question.questionNo)) return true;
        if (sourceRefFile && sourceRefNo && item.sourceFile === sourceRefFile && String(item.sourceQuestionNo) === sourceRefNo) return true;
        return id !== undefined && String(item.id) === String(id);
      }) || null;
    }

    function buildQuestionMeta(question, indexItem, pack) {
      return {
        sourceFile: firstValue([getQuestionSourceFile(question), indexItem?.sourceFile], '원본 확인 필요'),
        sourceQuestionNo: firstValue([getQuestionSourceNo(question), indexItem?.sourceQuestionNo], '-'),
        unit: firstValue([
          question?.standardUnit,
          question?.unitLabel,
          question?.unit,
          question?.standard_unit,
          indexItem?.unitLabel,
          pack?.unitLabel,
        ], '단원 확인 필요'),
        type: firstValue([
          question?.typeKey,
          question?.type_key,
          question?.skill,
          question?.category,
          question?.diagnosisTags,
          indexItem?.skill,
          indexItem?.category,
        ], '유형 확인 필요'),
        level: firstValue([
          question?.level,
          question?.difficulty,
          question?.difficultyLabel,
          indexItem?.level,
          indexItem?.difficulty,
        ], '난이도 확인 필요'),
      };
    }

    function getInternalAnalysisNote(question, status) {
      if (status === 'correct') return '해당 문항 기준 통과';
      if (status === 'unchecked') return '결과 미입력';
      const raw = firstValue([
        question?.wrongMeaning,
        question?.diagnosisText,
        question?.parentComment,
        question?.firstMonthAction,
        question?.analysisNote,
      ], '');
      if (raw) return String(raw).split(/\n+/)[0].slice(0, 80);
      if (status === 'wrong') return '해당 단원/유형 보완 필요';
      if (status === 'partial') return '풀이 과정 확인 필요';
      return '결과 미입력';
    }

    function buildRows(pack) {
      if (!hasUsableQuestions(pack)) return [];
      return pack.questions.map((question, index) => {
        const indexItem = findQuestionIndex(question);
        return {
          order_no: index + 1,
          question,
          indexItem,
          meta: buildQuestionMeta(question, indexItem, pack),
          result_status: 'unchecked',
          student_answer: '',
          note: '',
        };
      });
    }

    function renderInfo(pack, count) {
      return `
        <section class="exam-card">
          <div class="card-top"></div>
          <div class="card-body">
            <div class="card-grade-row">
              <div class="card-grade-label">${escapeHTML(pack.category || '평가 구분 확인 필요')}</div>
              <div class="card-type-chip">내부용 분석표</div>
            </div>
            <div class="card-main-title">${escapeHTML(pack.title || '평가팩 제목 확인 필요')}</div>
            <div class="card-sub-title">${escapeHTML(getScopeLabel(pack))}</div>
            <div class="card-meta-line">
              <span class="meta-badge primary">평가 구분: ${escapeHTML(pack.category || '확인 필요')}</span>
              <span class="meta-badge">${escapeHTML(pack.grade || '학년 확인 필요')}</span>
              <span class="meta-badge green">${escapeHTML(getScopeLabel(pack))}</span>
              <span class="meta-badge">${count ? `${count}문항` : '문항 수 확인 필요'}</span>
            </div>
          </div>
        </section>`;
    }

    function renderDiagnosticModeBanner() {
      if (!isDiagnosticMode()) return '';
      const isReport = isDiagnosticReportMode();
      const payload = isReport ? loadDiagnosticPayload() : null;
      const studentName = String(payload?.studentName || '').trim() || '이름 미입력';
      const packTitle = payload?.packTitle || state.pack?.title || '평가명 확인 필요';
      const examDate = payload?.examDate || todayString();
      return `
        <section class="exam-card ${isReport ? 'parent-print' : 'print-hidden'}">
          <div class="card-top"></div>
          <div class="card-body">
            <div class="card-grade-row">
              <div class="card-grade-label">${isReport ? 'AP수학 진단평가' : '진단평가 빠른 입력'}</div>
              <div class="card-type-chip">${isReport ? '결과표' : '입력'}</div>
            </div>
            <div class="card-main-title">${isReport ? 'AP수학 진단평가' : '진단평가 입력'}</div>
            <div class="card-sub-title">${isReport ? `${escapeHTML(studentName)} · ${escapeHTML(packTitle)} · ${escapeHTML(examDate)}` : '학생명과 반이 비어 있어도 저장할 수 있습니다. 입력 완료를 누르면 바로 결과표가 열립니다.'}</div>
          </div>
        </section>`;
    }

    function renderDiagnosticReportActions() {
      if (!isDiagnosticReportMode()) return '';
      return `
        <section class="exam-card print-hidden">
          <div class="card-body">
            <div class="action-row">
              <button class="action-btn" type="button" onclick="startDiagnosticReportEdit()">입력 수정</button>
              <button class="action-btn" type="button" onclick="window.print()">결과표 출력</button>
              <span class="save-state">결과표가 먼저 표시됩니다. 입력을 고칠 때만 빠른 입력을 다시 엽니다.</span>
            </div>
            <div class="action-row diagnostic-internal-toggle" style="margin-top:10px; border-style:dashed; background:#f8fafc;">
              <button class="action-btn" type="button" onclick="toggleDiagnosticInternalDetails()">${state.diagnosticInternalOpen ? '내부 상세 숨기기' : '내부 상세 보기'}</button>
              <span class="save-state">운영 확인용 보조 정보입니다. 학부모 기본 화면과 출력에서는 분리됩니다.</span>
            </div>
          </div>
        </section>`;
    }

    function toggleDiagnosticInternalDetails() {
      state.diagnosticInternalOpen = !state.diagnosticInternalOpen;
      renderApp();
    }

    function startDiagnosticReportEdit() {
      state.diagnosticEditOpen = true;
      renderApp();
      setTimeout(() => {
        document.querySelector('.input-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 0);
    }

    function renderInputSection() {
      const completeButton = isDiagnosticMode()
        ? '<button class="action-btn" type="button" onclick="saveDiagnosticResultAndShowReport()">입력 완료</button>'
        : '<button class="action-btn" type="button" onclick="saveDraft()">임시저장</button>';
      return `
        <section class="exam-card input-section">
          <div class="card-body">
            <h2 class="section-title">기본 입력</h2>
            <div class="form-grid">
              <label>학생명<input id="studentName" data-field="studentName" type="text"></label>
              <label>반명<input id="className" data-field="className" type="text"></label>
              <label>평가일<input id="examDate" data-field="examDate" type="date"></label>
              <label class="span-2">메모<textarea id="memo" data-field="memo"></textarea></label>
            </div>
            <div class="action-row no-print">
              ${completeButton}
              <button class="action-btn" type="button" onclick="loadDraft(true)">불러오기</button>
              <button class="action-btn" type="button" onclick="resetDraft()">초기화</button>
              <button class="action-btn" type="button" onclick="window.print()">분석표 출력</button>
              <span class="save-state" id="saveState"></span>
            </div>
          </div>
        </section>`;
    }

    function renderQuestionInputTable() {
      const rows = state.rows.map((row) => `
        <tr>
          <td>${row.order_no}</td>
          <td>
            <div class="result-picker" data-order="${row.order_no}">
              <button class="result-btn ${row.result_status === 'correct' ? 'is-selected' : ''}" type="button" data-status="correct">O</button>
              <button class="result-btn ${row.result_status === 'wrong' ? 'is-selected' : ''}" type="button" data-status="wrong">X</button>
              <button class="result-btn ${row.result_status === 'partial' ? 'is-selected' : ''}" type="button" data-status="partial">△</button>
            </div>
          </td>
          <td><input data-answer="${row.order_no}" type="text" value="${escapeHTML(row.student_answer)}"></td>
          <td><input data-note="${row.order_no}" type="text" value="${escapeHTML(row.note)}"></td>
        </tr>`).join('');
      return `
        <section class="exam-card input-section">
          <div class="card-body">
            <h2 class="section-title">문항별 입력</h2>
            <div class="table-wrap">
              <table>
                <thead><tr><th>번호</th><th>결과</th><th>학생답</th><th>비고</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        </section>`;
    }

    function getCounts(rows) {
      return rows.reduce((acc, row) => {
        acc.total += 1;
        acc[row.result_status || 'unchecked'] += 1;
        if (row.result_status !== 'unchecked') acc.entered += 1;
        return acc;
      }, { total: 0, entered: 0, correct: 0, wrong: 0, partial: 0, unchecked: 0 });
    }

    function rateText(correct, wrong, partial) {
      const denominator = correct + wrong + partial;
      if (!denominator) return '-';
      return `${Math.round((correct / denominator) * 1000) / 10}%`;
    }

    function renderOverallSummary() {
      const counts = getCounts(state.rows);
      return `
        <section class="exam-card">
          <div class="card-body">
            <h2 class="section-title">전체 결과</h2>
            <div class="summary-grid">
              <div class="stat"><strong>${counts.entered}</strong>입력 문항 수</div>
              <div class="stat"><strong>${counts.correct}</strong>정답 수</div>
              <div class="stat"><strong>${counts.wrong}</strong>오답 수</div>
              <div class="stat"><strong>${counts.partial}</strong>부분/확인 필요 수</div>
              <div class="stat"><strong>${counts.unchecked}</strong>미입력 수</div>
              <div class="stat"><strong>${rateText(counts.correct, counts.wrong, counts.partial)}</strong>정답률</div>
            </div>
          </div>
        </section>`;
    }

    function groupRows(keyGetter) {
      const groups = new Map();
      state.rows.forEach((row) => {
        const key = keyGetter(row) || '문항 정보 확인 필요';
        if (!groups.has(key)) groups.set(key, { name: key, total: 0, correct: 0, wrong: 0, partial: 0, unchecked: 0 });
        const group = groups.get(key);
        group.total += 1;
        group[row.result_status || 'unchecked'] += 1;
      });
      return [...groups.values()].sort((a, b) => a.name.localeCompare(b.name, 'ko'));
    }

    function renderAggregateTable(title, groups) {
      const body = groups.map((group) => `
        <tr>
          <td>${escapeHTML(group.name)}</td>
          <td>${group.total}</td>
          <td>${group.correct}</td>
          <td>${group.wrong}</td>
          <td>${group.partial}</td>
          <td>${group.unchecked}</td>
          <td>${rateText(group.correct, group.wrong, group.partial)}</td>
        </tr>`).join('');
      return `
        <section class="exam-card">
          <div class="card-body">
            <h2 class="section-title">${title}</h2>
            <div class="table-wrap">
              <table>
                <thead><tr><th>${title.replace(' 집계', '')}</th><th>문항 수</th><th>정답</th><th>오답</th><th>△</th><th>미입력</th><th>정답률</th></tr></thead>
                <tbody>${body}</tbody>
              </table>
            </div>
          </div>
        </section>`;
    }

    function renderRawAnalysisTable() {
      const rows = state.rows.map((row) => `
        <tr>
          <td>${row.order_no}</td>
          <td>${STATUS_LABELS[row.result_status] || '-'}</td>
          <td>${escapeHTML(row.meta.sourceFile)}</td>
          <td>${escapeHTML(row.meta.sourceQuestionNo)}</td>
          <td>${escapeHTML(row.meta.unit)}</td>
          <td>${escapeHTML(row.meta.type)}</td>
          <td>${escapeHTML(row.meta.level)}</td>
          <td>${escapeHTML(row.student_answer)}</td>
          <td>${escapeHTML(getInternalAnalysisNote(row.question, row.result_status))}</td>
          <td>${escapeHTML(row.note)}</td>
        </tr>`).join('');
      return `
        <section class="exam-card">
          <div class="card-body">
            <h2 class="section-title">문항별 분석표</h2>
            <div class="table-wrap">
              <table>
                <thead><tr><th>번호</th><th>결과</th><th>원본 시험지</th><th>원본 문항번호</th><th>단원</th><th>유형</th><th>난이도</th><th>학생답</th><th>분석 메모</th><th>비고</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        </section>`;
    }

    function renderDiagnosticParentItemTable() {
      const rows = state.rows.map((row) => `
        <tr>
          <td>${row.order_no}</td>
          <td>${STATUS_LABELS[row.result_status] || '-'}</td>
          <td>${escapeHTML(row.meta.unit)}</td>
          <td>${escapeHTML(row.meta.type)}</td>
          <td>${escapeHTML(row.meta.level)}</td>
          <td></td>
        </tr>`).join('');
      return `
        <section class="exam-card parent-print diagnostic-parent-result-table">
          <div class="card-body">
            <h2 class="section-title">문항별 확인 사인</h2>
            <div class="table-wrap">
              <table>
                <thead><tr><th>문항</th><th>결과</th><th>단원</th><th>유형</th><th>난이도</th><th>확인 사인</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        </section>`;
    }

    function renderDiagnosticInternalDetails() {
      const rows = state.rows.map((row) => `
        <tr>
          <td>${row.order_no}</td>
          <td>${escapeHTML(row.meta.sourceFile)}</td>
          <td>${escapeHTML(row.meta.sourceQuestionNo)}</td>
          <td>${escapeHTML(row.student_answer)}</td>
          <td>${escapeHTML(row.note)}</td>
        </tr>`).join('');
      return `
        <section class="exam-card internal-only print-hidden diagnostic-internal-detail">
          <div class="card-body">
            <h2 class="section-title">내부 상세 보기</h2>
            <div class="table-wrap">
              <table>
                <thead><tr><th>문항</th><th>sourceFile</th><th>sourceQuestionNo</th><th>학생답</th><th>내부 메모</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        </section>`;
    }

    function renderNeedsList() {
      const groups = new Map();
      state.rows.filter((row) => row.result_status === 'wrong' || row.result_status === 'partial').forEach((row) => {
        const key = `${row.meta.unit} / ${row.meta.type}`;
        groups.set(key, (groups.get(key) || 0) + 1);
      });
      const items = [...groups.entries()].sort((a, b) => b[1] - a[1]).map(([key, count]) => {
        const [unit, type] = key.split(' / ');
        return `<div class="need-item">${escapeHTML(unit)} / ${escapeHTML(type)} / ${count}문항</div>`;
      }).join('');
      return `
        <section class="exam-card">
          <div class="card-body">
            <h2 class="section-title">보완 필요 목록</h2>
            <div class="needs-list">${items || '<div class="empty-state">보완 필요 항목이 없습니다.</div>'}</div>
          </div>
        </section>`;
    }

    function renderAnalysisSections() {
      document.getElementById('analysisSections').innerHTML = [
        renderOverallSummary(),
        renderRawAnalysisTable(),
        renderAggregateTable('단원별 집계', groupRows((row) => row.meta.unit)),
        renderAggregateTable('유형별 집계', groupRows((row) => row.meta.type)),
        renderAggregateTable('난이도별 집계', groupRows((row) => row.meta.level)),
        renderNeedsList(),
      ].join('');
    }

    function renderDiagnosticAnalysisSections() {
      document.getElementById('analysisSections').innerHTML = [
        renderOverallSummary(),
        renderAggregateTable('단원별 집계', groupRows((row) => row.meta.unit)),
        renderAggregateTable('유형별 집계', groupRows((row) => row.meta.type)),
        renderAggregateTable('난이도별 집계', groupRows((row) => row.meta.level)),
        renderDiagnosticParentItemTable(),
        renderNeedsList(),
        state.diagnosticInternalOpen ? renderDiagnosticInternalDetails() : '',
      ].join('');
    }

    function collectDraft() {
      if (!state.rows.length) return null;
      if (isDiagnosticMode()) {
        const now = new Date().toISOString();
        return {
          diagnosticId: getDiagnosticId(),
          packId: state.pack?.id || getPackId(),
          packTitle: state.pack?.title || '',
          category: state.pack?.category || '',
          type: state.pack?.examType || '',
          grade: state.pack?.grade || '',
          scope: getScopeLabel(state.pack),
          range: getScopeLabel(state.pack),
          questionCount: state.rows.length,
          createdAt: loadDiagnosticPayload()?.createdAt || now,
          updatedAt: now,
          status: isDiagnosticReportMode() ? 'completed' : 'input_pending',
          studentName: document.getElementById('studentName')?.value || '',
          className: document.getElementById('className')?.value || '',
          schoolName: document.getElementById('schoolName')?.value || '',
          gradeLabel: state.pack?.grade || '',
          examDate: document.getElementById('examDate')?.value || todayString(),
          memo: document.getElementById('memo')?.value || '',
          results: state.rows.map((row) => ({
            order_no: row.order_no,
            result_status: row.result_status,
            student_answer: row.student_answer,
            note: row.note,
          })),
          source: 'assessment_analysis',
          mode: 'diagnostic',
        };
      }
      return {
        studentName: document.getElementById('studentName')?.value || '',
        className: document.getElementById('className')?.value || '',
        examDate: document.getElementById('examDate')?.value || todayString(),
        memo: document.getElementById('memo')?.value || '',
        results: Object.fromEntries(state.rows.map((row) => [row.order_no, {
          result_status: row.result_status,
          student_answer: row.student_answer,
          note: row.note,
        }])),
      };
    }

    function loadDiagnosticPayload() {
      const id = getDiagnosticId();
      if (!id) return null;
      try {
        const raw = localStorage.getItem(DIAGNOSTIC_RESULT_PREFIX + id);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        console.warn('[diagnostic assessment] payload load failed:', error);
        return null;
      }
    }

    function applyDiagnosticPayloadToRows(payload) {
      if (!payload || !state.rows.length) return;
      const byOrder = new Map();
      if (Array.isArray(payload.results)) {
        payload.results.forEach((item) => byOrder.set(Number(item.order_no), item));
      } else if (payload.results && typeof payload.results === 'object') {
        Object.entries(payload.results).forEach(([order, item]) => byOrder.set(Number(order), item));
      }
      const studentEl = document.getElementById('studentName');
      const classEl = document.getElementById('className');
      const examDateEl = document.getElementById('examDate');
      const memoEl = document.getElementById('memo');
      if (studentEl) studentEl.value = payload.studentName || '';
      if (classEl) classEl.value = payload.className || '';
      if (examDateEl) examDateEl.value = payload.examDate || todayString();
      if (memoEl) memoEl.value = payload.memo || '';
      state.rows.forEach((row) => {
        const saved = byOrder.get(row.order_no) || {};
        row.result_status = saved.result_status || 'unchecked';
        row.student_answer = saved.student_answer || '';
        row.note = saved.note || '';
      });
    }

    function updateDiagnosticResultsList(payload) {
      if (!payload?.diagnosticId) return;
      const list = JSON.parse(localStorage.getItem(DIAGNOSTIC_RESULTS_LIST_KEY) || '[]')
        .filter((item) => item?.diagnosticId !== payload.diagnosticId);
      list.unshift({
        diagnosticId: payload.diagnosticId,
        packId: payload.packId,
        packTitle: payload.packTitle,
        questionCount: payload.questionCount,
        status: payload.status,
        updatedAt: payload.updatedAt,
        completedAt: payload.completedAt,
      });
      localStorage.setItem(DIAGNOSTIC_RESULTS_LIST_KEY, JSON.stringify(list.slice(0, 30)));
      localStorage.setItem(DIAGNOSTIC_CURRENT_KEY, payload.diagnosticId);
    }

    function saveDiagnosticResultAndShowReport() {
      if (!isDiagnosticMode()) {
        saveDraft(true);
        return;
      }
      const payload = collectDraft();
      if (!payload) return;
      const completedAt = new Date().toISOString();
      Object.assign(payload, {
        status: 'completed',
        updatedAt: completedAt,
        completedAt,
      });
      localStorage.setItem(DIAGNOSTIC_RESULT_PREFIX + payload.diagnosticId, JSON.stringify(payload));
      updateDiagnosticResultsList(payload);
      const params = new URLSearchParams(window.location.search);
      params.set('mode', 'diagnostic-report');
      const nextUrl = `${window.location.pathname}?${params.toString()}`;
      window.history.replaceState(null, '', nextUrl);
      renderApp();
    }

    function saveDraft(showState = true) {
      const draft = collectDraft();
      if (!draft) return;
      localStorage.setItem(getStorageKey(), JSON.stringify(draft));
      if (isDiagnosticMode()) updateDiagnosticResultsList(draft);
      if (showState) {
        const el = document.getElementById('saveState');
        if (el) el.textContent = isDiagnosticMode() ? '저장됨' : '임시저장됨';
      }
    }

    function loadDraft(showState = false) {
      const raw = localStorage.getItem(getStorageKey());
      if (!state.rows.length) return;
      if (!raw) {
        if (showState) {
          const el = document.getElementById('saveState');
          if (el) el.textContent = '저장된 내용이 없습니다.';
        }
        return;
      }
      try {
        const draft = JSON.parse(raw);
        applyDiagnosticPayloadToRows(draft);
        renderDynamic();
        if (showState) document.getElementById('saveState').textContent = '불러왔습니다.';
      } catch (error) {
        console.warn('[assessment analysis] draft load failed:', error);
      }
    }

    function resetDraft() {
      if (!confirm('현재 입력값과 임시저장 내용을 초기화할까요?')) return;
      localStorage.removeItem(getStorageKey());
      document.getElementById('studentName').value = '';
      document.getElementById('className').value = '';
      document.getElementById('examDate').value = todayString();
      document.getElementById('memo').value = '';
      state.rows.forEach((row) => {
        row.result_status = 'unchecked';
        row.student_answer = '';
        row.note = '';
      });
      renderDynamic();
      document.getElementById('saveState').textContent = '초기화됨';
    }

    function renderDynamic() {
      const questionInputMount = document.getElementById('questionInputMount');
      if (questionInputMount) questionInputMount.innerHTML = renderQuestionInputTable();
      if (isDiagnosticReportMode()) renderDiagnosticAnalysisSections();
      else renderAnalysisSections();
      bindDynamicEvents();
    }

    function bindDynamicEvents() {
      document.querySelectorAll('.result-btn').forEach((button) => {
        button.addEventListener('click', () => {
          const order = Number(button.closest('.result-picker')?.dataset.order);
          const row = state.rows.find((item) => item.order_no === order);
          if (!row) return;
          row.result_status = row.result_status === button.dataset.status ? 'unchecked' : button.dataset.status;
          renderDynamic();
          saveDraft(false);
        });
      });
      document.querySelectorAll('[data-answer]').forEach((input) => {
        input.addEventListener('input', () => {
          const row = state.rows.find((item) => item.order_no === Number(input.dataset.answer));
          if (row) row.student_answer = input.value;
          renderAnalysisSections();
          saveDraft(false);
        });
      });
      document.querySelectorAll('[data-note]').forEach((input) => {
        input.addEventListener('input', () => {
          const row = state.rows.find((item) => item.order_no === Number(input.dataset.note));
          if (row) row.note = input.value;
          renderAnalysisSections();
          saveDraft(false);
        });
      });
    }

    function bindStaticEvents() {
      document.querySelectorAll('[data-field]').forEach((input) => {
        input.addEventListener('input', () => saveDraft(false));
      });
    }

    function renderApp() {
      const app = document.getElementById('app');
      const packId = getPackId();
      if (!packId) {
        app.innerHTML = '<div class="empty-state">평가팩을 선택해 주세요.</div>';
        return;
      }
      const pack = packs.find((item) => item.id === packId);
      if (!pack) {
        app.innerHTML = '<div class="empty-state">평가팩을 찾을 수 없습니다.</div>';
        return;
      }
      const count = getQuestionCount(pack);
      const canRenderQuestions = hasUsableQuestions(pack);
      state.pack = pack;
      state.rows = canRenderQuestions ? buildRows(pack) : [];
      app.innerHTML = [
        renderDiagnosticModeBanner(),
        isDiagnosticReportMode() ? '' : renderInfo(pack, count),
        isDiagnosticReportMode() ? renderDiagnosticReportActions() : '',
        canRenderQuestions && isDiagnosticReportMode() ? '<div id="analysisSections"></div>' : '',
        canRenderQuestions && shouldShowDiagnosticInput() ? renderInputSection() : '',
        canRenderQuestions && shouldShowDiagnosticInput() ? '<div id="questionInputMount"></div>' : '',
        canRenderQuestions && !isDiagnosticReportMode() ? '<div id="analysisSections"></div>' : '',
        !canRenderQuestions ? '<div class="empty-state">문항 수 확인 필요</div>' : '',
      ].join('');
      if (!canRenderQuestions) return;
      const examDate = document.getElementById('examDate');
      if (examDate) examDate.value = todayString();
      renderDynamic();
      if (shouldShowDiagnosticInput()) bindStaticEvents();
      if (isDiagnosticMode()) {
        applyDiagnosticPayloadToRows(loadDiagnosticPayload());
        renderDynamic();
      } else {
        loadDraft(false);
      }
    }

    renderApp();
  </script>
</body>
</html>
