<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AP Math 시험지 보관함</title>
  <style>
    :root { --bg:#f6f7fb; --card:#fff; --line:#e5e7eb; --text:#111827; --muted:#6b7280; --blue:#2563eb; --blue-soft:#eff6ff; --green:#059669; --orange:#d97706; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1180px; margin:0 auto; padding:28px 18px 48px; }
    .hero { display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:18px; }
    h1 { margin:0; font-size:28px; letter-spacing:-.04em; }
    .sub { margin:7px 0 0; color:var(--muted); font-size:14px; }
    .stats { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .stat { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:9px 12px; font-size:12px; color:var(--muted); }
    .stat strong { color:var(--text); font-size:15px; margin-right:3px; }
    .toolbar { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:14px; display:grid; grid-template-columns:1fr 170px 170px; gap:10px; position:sticky; top:0; z-index:2; box-shadow:0 8px 18px rgba(15,23,42,.04); }
    input, select { height:42px; border:1px solid var(--line); border-radius:12px; padding:0 12px; font-size:14px; background:#fff; }
    .tabs { display:flex; gap:8px; margin:16px 0; flex-wrap:wrap; }
    .tab { border:1px solid var(--line); background:#fff; border-radius:999px; padding:10px 14px; cursor:pointer; font-weight:800; font-size:13px; color:#374151; }
    .tab.active { background:var(--blue); color:#fff; border-color:var(--blue); }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px; display:flex; flex-direction:column; gap:12px; min-height:190px; }
    .card-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .title { font-size:17px; font-weight:900; letter-spacing:-.03em; line-height:1.3; }
    .badge { flex:0 0 auto; font-size:11px; border-radius:999px; padding:5px 8px; background:var(--blue-soft); color:var(--blue); font-weight:900; }
    .meta { display:flex; flex-wrap:wrap; gap:6px; }
    .chip { font-size:12px; color:#475569; background:#f8fafc; border:1px solid #eef2f7; border-radius:999px; padding:5px 8px; }
    .scope { font-size:13px; color:#334155; background:#f8fafc; border:1px solid #eef2f7; border-radius:14px; padding:10px 11px; line-height:1.5; }
    .scope b { color:#111827; margin-right:6px; }
    .mix { font-size:12px; color:var(--muted); line-height:1.6; }
    .actions { display:flex; gap:8px; margin-top:auto; }
    button.action { flex:1; height:40px; border-radius:12px; border:1px solid var(--line); background:#fff; font-weight:900; cursor:pointer; }
    button.primary { background:var(--blue); color:#fff; border-color:var(--blue); }
    button.answer { color:var(--green); }
    button.solution { color:var(--orange); }
    .empty { padding:30px; text-align:center; color:var(--muted); background:#fff; border:1px dashed var(--line); border-radius:18px; }
    @media (max-width:820px) { .hero { display:block; } .stats { justify-content:flex-start; margin-top:12px; } .toolbar { grid-template-columns:1fr; } .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>시험지 보관함</h1>
        <p class="sub">진단평가·단원평가·중간·기말평가를 범위 확인 후 바로 출력합니다.</p>
      </div>
      <div class="stats" id="stats"></div>
    </div>
    <div class="toolbar">
      <input id="search" placeholder="평가명, 학년, 단원, 범위 검색">
      <select id="grade"><option value="">전체 학년</option></select>
      <select id="count"><option value="">전체 문항 수</option><option value="10">10문항</option><option value="15">15문항</option><option value="20">20문항</option><option value="25">25문항</option></select>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="grid" id="grid"></div>
  </div>
  <script src="assessment-packs-1sem.generated.js"></script>
  <script>
    const DATA = window.APMATH_ASSESSMENT_PACKS_1SEM || { packs: [], sourceSummary: {} };
    const packs = DATA.packs || [];
    const categories = DATA.categoryOrder || ['진단평가','단원평가','중간·기말평가'];
    let active = categories[0];
    function countObj(obj) { return Object.entries(obj || {}).map(([k,v]) => `${k} ${v}`).join(' · ') || '-'; }
    function renderStats() {
      const s = DATA.sourceSummary || {};
      document.getElementById('stats').innerHTML = [
        `<div class="stat"><strong>${packs.length}</strong>평가팩</div>`,
        `<div class="stat"><strong>${s.uniqueTextQuestions || 0}</strong>고유 텍스트 문항</div>`,
        `<div class="stat"><strong>${s.imageExcluded || 0}</strong>이미지 제외</div>`
      ].join('');
    }
    function setupControls() {
      document.getElementById('tabs').innerHTML = categories.map(c => `<button class="tab ${c===active?'active':''}" onclick="active='${c}'; render();">${c}</button>`).join('');
      const grades = [...new Set(packs.map(p => p.grade).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ko'));
      document.getElementById('grade').innerHTML = '<option value="">전체 학년</option>' + grades.map(g => `<option value="${g}">${g}</option>`).join('');
      ['search','grade','count'].forEach(id => document.getElementById(id).addEventListener('input', render));
    }
    function filterPacks() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const grade = document.getElementById('grade').value;
      const count = document.getElementById('count').value;
      return packs.filter(p => {
        if (p.category !== active) return false;
        if (grade && p.grade !== grade) return false;
        if (count && String(p.questionCount) !== count) return false;
        if (!q) return true;
        return [p.title,p.category,p.grade,p.unitLabel,p.unitKey,p.scopeLabel,(p.scopeUnits||[]).join(' '),p.purpose].join(' ').toLowerCase().includes(q);
      });
    }
    function render() {
      document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.textContent === active));
      const list = filterPacks();
      const grid = document.getElementById('grid');
      if (!list.length) { grid.innerHTML = '<div class="empty">조건에 맞는 평가팩이 없습니다.</div>'; return; }
      grid.innerHTML = list.map(p => `
        <div class="card">
          <div class="card-head"><div class="title">${p.title}</div><div class="badge">${p.category}</div></div>
          <div class="meta">
            <span class="chip">${p.grade || '학년 미지정'}</span>
            <span class="chip">${p.questionCount}문항</span>
            <span class="chip">${p.estimatedMinutes}분</span>
            <span class="chip">${p.hasImage ? '이미지 포함' : '이미지 없음'}</span>
            ${p.courseLabel ? `<span class="chip">${p.courseLabel}</span>` : ''}
          </div>
          <div class="scope"><b>범위</b>${p.scopeLabel || p.unitLabel || '범위 확인 필요'}</div>
          <div class="mix">난이도: ${countObj(p.difficultyMix)}<br>유형: ${countObj(p.skillMix)}</div>
          <div class="actions">
            <button class="action primary" onclick="openPack('${p.id}','exam')">출력</button>
            <button class="action answer" onclick="openPack('${p.id}','ans')">정답</button>
            <button class="action solution" onclick="openPack('${p.id}','sol')">해설</button>
          </div>
        </div>`).join('');
    }
    function openPack(packId, mode) {
      const pack = packs.find(p => p.id === packId);
      if (!pack) return alert('평가팩을 찾지 못했습니다.');
      const key = `assessment_${pack.id}_${Date.now()}`;
      const questions = (pack.questions || []).map(q => ({ ...q }));
      const meta = { title: pack.title, count: questions.length, generatedAt: new Date().toISOString(), assessmentPackId: pack.id, category: pack.category };
      localStorage.setItem('mixedQuestions_' + key, JSON.stringify(questions));
      localStorage.setItem('mixedMeta_' + key, JSON.stringify(meta));
      const url = `../mixed_engine.html?key=${encodeURIComponent(key)}&qpp=2&mode=${encodeURIComponent(mode || 'exam')}`;
      window.open(url, '_blank');
    }
    renderStats(); setupControls(); render();
  </script>
</body>
</html>
