<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS아카이브 | 믹서 개편 v4.6.1 (UX/Mobile Optimized + Stability Fixed)</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']], packages: {'[+]': ['ams', 'boldsymbol']} },
            options: { enableMenu: false },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        :root {
            --navy: #07111f; --navy-2: #0c1a2e; --navy-3: #12233f;
            --blue: #2563eb; --blue-dark: #1d4ed8; --blue-soft: #eff6ff;
            --green: #10b981; --green-soft: #ecfdf5;
            --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
            --gray-300: #cbd5e1; --gray-500: #64748b;
            --text-main: #0f172a; --radius-md: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--gray-50); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }
        header { background: var(--navy); height: 58px; display: flex; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { color: white; text-decoration: none; font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .logo em { color: #60a5fa; font-style: normal; }

        .mixer-container { display: flex; height: calc(100vh - 58px); }
        .panel { display: flex; flex-direction: column; background: white; border-right: 1px solid var(--gray-200); height: 100%; min-width: 0; }
        .panel-header { padding: 15px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; min-height: 58px; flex-shrink: 0; }
        .panel-body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }

        /* 왼쪽 패널: 검색 및 시험지 목록 */
        .panel-papers { width: 360px; flex-shrink: 0; background: var(--gray-50); }
        .filter-area { padding: 15px 20px; border-bottom: 1px solid var(--gray-200); background: white; display: flex; flex-direction: column; gap: 8px; }
        
        .btn-filter-toggle {
            height: 28px; padding: 0 12px; border-radius: 9999px; border: 1px solid var(--gray-200); background: white;
            color: var(--gray-500); font-size: 11.5px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; flex: 0 0 auto; transition: 0.2s;
        }
        .btn-filter-toggle:hover { background: var(--gray-50); color: var(--text-main); border-color: var(--gray-300); }

        .search-box { position: relative; }
        .search-box i { position: absolute; left: 12px; top: 12px; color: var(--gray-300); }
        .search-box input { width: 100%; height: 38px; padding: 0 12px 0 34px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; outline: none; }
        .filter-row { display: flex; gap: 6px; }
        .form-select { width: 100%; height: 36px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 12px; font-weight: 700; outline: none; background: white; }

        .exam-bulk-bar { padding: 12px 20px; background: #fdfdfe; border-bottom: 1px solid var(--gray-200); }
        .bulk-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 11.5px; font-weight: 800; color: var(--gray-500); }
        .exam-bulk-actions { display: flex; gap: 6px; }
        .btn-action { padding: 8px 0; font-size: 11px; font-weight: 800; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid var(--gray-200); background: white; color: var(--text-main); }
        .exam-bulk-actions .btn-action { flex: 1; }
        .question-filter-bar .btn-action { flex: 0 0 auto; }
        .btn-filter-all { height: 34px; padding: 0 12px; font-size: 12px; white-space: nowrap; }
        .btn-action.primary { background: var(--blue); color: white; border-color: var(--blue); }
        .btn-action.reset { border-color: #fca5a5; color: #ef4444; }

        /* 시험지 카드 스타일 */
        .paper-item { padding: 16px; padding-right: 40px; border-radius: 12px; background: white; border: 1px solid var(--gray-200); margin-bottom: 10px; transition: 0.2s; position: relative; cursor: pointer; }
        .paper-item:hover { border-color: var(--blue); transform: translateY(-1px); }
        .paper-item.active { border-color: var(--blue); background: var(--blue-soft); box-shadow: inset 0 0 0 1px var(--blue); }
        .paper-item.selected { border-color: var(--green); }
        
        .btn-card-select { position: absolute; top: 14px; right: 14px; background: none; border: none; font-size: 20px; color: var(--gray-300); cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; height: 24px; width: 24px; }
        .paper-item.selected .btn-card-select { color: var(--green); }
        
        .card-title { font-size: 14.5px; font-weight: 800; margin-bottom: 6px; line-height: 1.3; word-break: keep-all; }
        .card-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .m-badge { font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; background: var(--gray-100); color: var(--gray-500); }
        .m-badge.blue { background: var(--blue-soft); color: var(--blue); }
        .card-file { font-size: 10px; color: #000000; word-break: break-all; border-top: 1px dashed var(--gray-100); padding-top: 6px; margin-top: 4px; }

        /* 중앙 패널: 문항 목록 */
        .panel-questions { flex: 1; min-width: 0; }
        .status-summary-bar { padding: 10px 20px; background: var(--navy); color: white; display: flex; align-items: center; justify-content: space-between; font-size: 11.5px; gap: 15px; }
        .stat-item { display: flex; align-items: center; gap: 6px; }
        .stat-label { color: rgba(255,255,255,0.5); font-weight: 400; }
        .stat-value { font-weight: 800; color: #60a5fa; }

        .question-filter-bar { padding: 12px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; gap: 10px; background: white; position: sticky; top: 0; z-index: 10; }
        
        .q-item { padding: 30px; border-bottom: 1px solid var(--gray-100); position: relative; }
        .q-item:hover { background: #fafafa; }
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .q-tag-line { display: flex; gap: 6px; margin-bottom: 8px; }
        .q-unit-tag { font-size: 10.5px; font-weight: 800; color: var(--blue); background: var(--blue-soft); padding: 2px 8px; border-radius: 4px; }
        .q-num { font-size: 16px; font-weight: 900; color: var(--text-main); }
        
        .q-content { font-size: 15px; line-height: 1.8; white-space: pre-wrap; word-break: keep-all; }
        .q-image { max-width: 100%; margin: 15px 0; border-radius: 8px; display: block; border: 1px solid var(--gray-100); }
        .q-choices { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 18px; }
        .choice-row { display: flex; gap: 10px; font-size: 14px; }
        
        .btn-add-cart { height: 36px; padding: 0 16px; border-radius: 8px; border: 1px solid var(--gray-200); background: white; font-size: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-add-cart.in { background: var(--blue); color: white; border-color: var(--blue); }

        /* 카트 패널 */
        .panel-cart { width: 340px; flex-shrink: 0; border-right: none; }
        .cart-item { padding: 12px; border: 1px solid var(--gray-100); border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; background: white; }
        .cart-footer { padding: 20px; border-top: 1px solid var(--gray-100); background: white; position: sticky; bottom: 0; }
        .btn-main { width: 100%; height: 52px; border: none; border-radius: var(--radius-md); background: var(--blue); color: white; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-main:hover { opacity: 0.9; }

        .empty-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--gray-300); text-align: center; padding: 40px; }
        .empty-placeholder i { font-size: 48px; margin-bottom: 15px; }

        /* [모달 공용] */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; align-items: center;
            justify-content: center; z-index: 2000; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; padding: 24px; border-radius: 12px; width: 340px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 16px;
        }
        .modal-title { font-size: 17px; font-weight: 800; color: var(--text-main); text-align: center; margin-bottom: 5px; }

        /* [모바일 하단 고정바 CSS] */
        .mobile-output-bar { display: none; }

        @media (max-width: 900px) {
            body { padding-bottom: 78px; }
            .mixer-container { flex-direction: column; height: auto; }
            .panel { width: 100%; height: auto; border-right: none; }
            .panel-papers { max-height: 450px; }
            .panel-cart { position: relative; }
            
            .mobile-output-bar {
                position: fixed; left: 0; right: 0; bottom: 0; z-index: 1500;
                display: grid; grid-template-columns: 72px 1fr 1.4fr; gap: 8px;
                align-items: center; padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
                background: rgba(255, 255, 255, 0.96); border-top: 1px solid var(--gray-200);
                box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.12); backdrop-filter: blur(12px);
            }
            .mobile-cart-count { font-size: 12px; font-weight: 800; color: var(--text-main); text-align: center; line-height: 1.2; }
            .mobile-cart-count strong { display: block; font-size: 18px; color: var(--blue); }
            .mobile-cart-btn, .mobile-output-btn { height: 44px; border-radius: 12px; font-size: 13px; font-weight: 900; cursor: pointer; }
            .mobile-cart-btn { border: 1px solid var(--gray-200); background: white; color: var(--text-main); }
            .mobile-output-btn { border: none; background: var(--blue); color: white; }
            
            .cart-footer { padding-bottom: 92px; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo"><i class="fa-solid fa-layer-group"></i><span><em>JS</em>아카이브 믹서</span></a>
</header>

<div class="mixer-container">
    <div class="panel panel-papers">
        <div class="filter-area">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 13px; font-weight: 800; color: var(--text-main);">탐색 필터</span>
                <button id="btn-toggle-filter" class="btn-filter-toggle" onclick="toggleFilterPanel()">
                    <i class="fa-solid fa-caret-down"></i> 필터 닫기
                </button>
            </div>
            
            <div id="filter-panel-content" style="display: flex; flex-direction: column; gap: 8px; margin-top: 8px;">
                <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="paperSearch" placeholder="학교명, 파일명 검색..."></div>
                <div class="filter-row">
                    <select id="gradeFilter" class="form-select">
                        <option value="">학년 선택</option>
                        <option value="고3">고3</option><option value="고2">고2</option><option value="고1">고1</option>
                        <option value="중3">중3</option><option value="중2">중2</option><option value="중1">중1</option>
                    </select>
                    <select id="axisFilter" class="form-select">
                        <option value="">전체 시험축</option>
                        <option value="1-mid">1학기 중간</option>
                        <option value="1-final">1학기 기말</option>
                        <option value="2-mid">2학기 중간</option>
                        <option value="2-final">2학기 기말</option>
                        <option value="other">기타/전범위</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="exam-bulk-bar">
            <div class="bulk-info">
                <span><b id="selected-count" style="color:var(--blue)">0</b>개 선택됨</span>
                <span id="bulk-status-text" style="font-size:10px;">파일을 체크하세요</span>
            </div>
            <div class="exam-bulk-actions">
                <button class="btn-action reset" type="button" onclick="resetMixerState()">초기화</button>
                <button class="btn-action" onclick="clearSelection()">선택해제</button>
                <button class="btn-action primary" onclick="loadMultipleExams()">불러오기</button>
            </div>
        </div>

        <div class="panel-body" id="paper-list"></div>
    </div>

    <div class="panel panel-questions">
        <div class="status-summary-bar" id="status-bar">
            <div class="stat-item"><span class="stat-label">Source:</span><span class="stat-value" id="cur-source-name">준비됨</span></div>
            <div class="stat-item"><span class="stat-label">표시 단원:</span><span class="stat-value" id="cur-unit-name">전체</span></div>
            <div class="stat-item"><span class="stat-label">표시 문항:</span><span class="stat-value" id="cur-q-count">0</span></div>
        </div>

        <div class="question-filter-bar">
            <select id="q-unit-filter" class="form-select" style="width:220px;"><option value="">전체 표준단원</option></select>
            <select id="q-level-filter" class="form-select" style="width:110px;">
                <option value="">전체 난이도</option>
                <option value="상">상</option><option value="중">중</option><option value="하">하</option>
            </select>
            <select id="q-view-mode" class="form-select" style="width:110px;">
                <option value="list">문항순 보기</option><option value="group">단원별 보기</option>
            </select>
            <button class="btn-action primary btn-filter-all" onclick="addCurrentFilterAll()">필터 담기</button>
        </div>

        <div class="panel-body" id="question-list">
            <div class="empty-placeholder">
                <i class="fa-solid fa-file-circle-plus"></i>
                <p>왼쪽에서 시험지를 클릭하거나 여러 개 선택 후 불러오기를 누르세요.</p>
            </div>
        </div>
    </div>

    <div class="panel panel-cart">
        <div class="panel-header">
            <span style="font-weight:900;">출제 카트</span>
            <span id="cart-count" style="font-weight:900; color:var(--blue); background: var(--blue-soft); padding: 2px 10px; border-radius: 99px;">0</span>
        </div>
        <div class="panel-body" id="cart-items"></div>
        <div class="cart-footer">
            <button class="btn-action reset" type="button" onclick="clearCartOnly()" style="margin-bottom:10px; width:100%;">카트 비우기</button>
            <input type="text" id="mixed-title-input" class="form-select" placeholder="시험지 제목 입력" style="height:40px; margin-bottom:10px; padding:0 12px; font-weight:700;">
            <select id="cart-level-order" class="form-select" style="height:40px; margin-bottom:10px;">
                <option value="original">담은 순서</option>
                <option value="high-first">난이도순 (상→하)</option>
                <option value="low-first">난이도순 (하→상)</option>
            </select>
            <select id="print-qpp" class="form-select" style="height:40px; margin-bottom:10px;">
                <option value="2">2문항/P</option><option value="4" selected>4문항/P</option>
                <option value="6">6문항/P</option><option value="8">8문항/P</option>
            </select>
            <button class="btn-main" onclick="openMixedOutputModeModal()">시험지 생성</button>
        </div>
    </div>
</div>

<div id="mobile-output-bar" class="mobile-output-bar">
    <div class="mobile-cart-count">
        <strong id="mobile-cart-count-num">0</strong>문항
    </div>
    <button type="button" class="mobile-cart-btn" onclick="scrollToCartPanel()">카트 보기</button>
    <button type="button" class="mobile-output-btn" onclick="openMixedOutputModeModal()">시험지 생성</button>
</div>

<div id="mixed-output-mode-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-title">시험지 출력 방식 선택</div>
        <div style="display:flex; flex-direction:column; gap:8px;">
            <button class="btn-main" onclick="selectMixedOutputMode(false)">일반 시험지 출력</button>
            <button class="btn-main" style="background:var(--navy);" onclick="selectMixedOutputMode(true)">AP 제출 QR 시험지 출력</button>
            <button class="btn-action reset" type="button" style="height:44px; margin-top:4px;" onclick="closeMixedOutputModeModal()">취소</button>
        </div>
    </div>
</div>

<div id="class-modal-overlay" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-title">출제 학급 선택</div>
        <div id="class-modal-body"></div>
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:8px;">
            <button class="btn-action reset" style="padding:8px 16px;" onclick="closeClassModal()">취소</button>
            <button class="btn-action primary" style="padding:8px 16px;" onclick="confirmClassSelection()">확인</button>
        </div>
    </div>
</div>

<script>
/**
 * 방어 코드: LEGACY_TO_KEY_MAP
 */
const LEGACY_TO_KEY_MAP = window.LEGACY_TO_KEY_MAP || {};

/**
 * [FAIL 1 수정] 필터 패널 토글 로직 복구
 */
function toggleFilterPanel() {
    const panel = document.getElementById('filter-panel-content');
    const btn = document.getElementById('btn-toggle-filter');
    if (panel.style.display === 'none') {
        panel.style.display = 'flex';
        btn.innerHTML = '<i class="fa-solid fa-caret-down"></i> 필터 닫기';
    } else {
        panel.style.display = 'none';
        btn.innerHTML = '<i class="fa-solid fa-caret-right"></i> 필터 열기';
    }
}

/**
 * 출력 모드 선택 로직
 */
function openMixedOutputModeModal() {
    if (cart.length === 0) return alert('카트가 비어있습니다.');
    document.getElementById('mixed-output-mode-modal').style.display = 'flex';
}

function closeMixedOutputModeModal() {
    document.getElementById('mixed-output-mode-modal').style.display = 'none';
}

function selectMixedOutputMode(withSubmitQr) {
    closeMixedOutputModeModal();
    if (withSubmitQr) {
        openClassSelectionModal();
    } else {
        openMixedEngine(false);
    }
}

function scrollToCartPanel() {
    const cartPanel = document.querySelector('.panel-cart');
    if (cartPanel) cartPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/**
 * [FAIL 2 수정] JS아카이브 표준단원 마스터 테이블 풀버전 원복
 */
const COURSE_BASE_ORDER = {
    "중1 수학": 100, "중2 수학": 200, "중3 수학": 300,
    "공통수학1": 400, "공통수학2": 500, "대수": 600,
    "미적분Ⅰ": 700, "미적분Ⅱ": 800, "확률과 통계": 900, "기하": 1000
};

const MASTER_TABLE = {
    "M1-01": { course: "중1 수학", unit: "소인수분해", order: 1 },
    "M1-02": { course: "중1 수학", unit: "정수와 유리수", order: 2 },
    "M1-03": { course: "중1 수학", unit: "문자와 식", order: 3 },
    "M1-04": { course: "중1 수학", unit: "좌표평면과 그래프", order: 4 },
    "M1-05": { course: "중1 수학", unit: "기본도형", order: 5 },
    "M1-06": { course: "중1 수학", unit: "평면도형의 성질", order: 6 },
    "M1-07": { course: "중1 수학", unit: "입체도형의 성질", order: 7 },
    "M1-08": { course: "중1 수학", unit: "자료의 정리와 해석", order: 8 },
    "M2-01": { course: "중2 수학", unit: "수와 식", order: 1 },
    "M2-02": { course: "중2 수학", unit: "일차부등식", order: 2 },
    "M2-03": { course: "중2 수학", unit: "연립일차방정식", order: 3 },
    "M2-04": { course: "중2 수학", unit: "일차함수와 그래프", order: 4 },
    "M2-05": { course: "중2 수학", unit: "도형의 성질", order: 5 },
    "M2-06": { course: "중2 수학", unit: "도형의 닮음", order: 6 },
    "M2-07": { course: "중2 수학", unit: "피타고라스 정리", order: 7 },
    "M2-08": { course: "중2 수학", unit: "확률", order: 8 },

function getStandardizedUnit(q) {
    const key = String(q.standardUnitKey || '').trim();
    if (key && !key.startsWith('RAW-') && MASTER_TABLE[key]) return MASTER_TABLE[key];
    const mapKey = `${String(q.standardCourse || '').trim()}::${String(q.standardUnit || '').trim()}`;
    const mappedKey = LEGACY_TO_KEY_MAP[mapKey];
    if (mappedKey && MASTER_TABLE[mappedKey]) return MASTER_TABLE[mappedKey];
    return { course: "기타", unit: "미분류", order: 999 };
}

function resetMixerState() {
    selectedFiles.clear(); currentViewingSource = null; currentDisplayQuestions = []; cart = [];

function clearCartOnly() { cart = []; updateCartUI(); renderQuestionList(); }

function normalizeExamMeta(ex) {
    const n = { ...(ex || {}) };
    n.grade = (ex.grade || "").replace(/[^중고\d]/g, "");
    n.semester = String(ex.semester || "");
    n.examType = (ex.examType || "").toLowerCase();
    let axis = "other";
    if(n.semester === "1" && n.examType.includes("mid")) axis = "1-mid";
    else if(n.semester === "1" && n.examType.includes("final")) axis = "1-final";
    else if(n.semester === "2" && n.examType.includes("mid")) axis = "2-mid";
    else if(n.semester === "2" && n.examType.includes("final")) axis = "2-final";
    n._axis = axis; return n;
}

function renderExamList() {
    const keyword = document.getElementById('paperSearch').value.toLowerCase();
    const grade = document.getElementById('gradeFilter').value;
    const axis = document.getElementById('axisFilter').value;
    const filtered = engineDB.exams.filter(ex => {
        const searchBase = `${ex.school} ${ex.topic} ${ex.file}`.toLowerCase();
        return (!keyword || searchBase.includes(keyword)) && (!grade || ex.grade === grade) && (!axis || ex._axis === axis);
    });
    const container = document.getElementById('paper-list');
    container.innerHTML = filtered.length ? '' : '<div class="empty-placeholder"><p>조건에 맞는 시험지가 없습니다.</p></div>';
    filtered.forEach(ex => {
        const isSelected = selectedFiles.has(ex.file), isActive = currentViewingSource && currentViewingSource.file === ex.file;
        const div = document.createElement('div'); div.className = `paper-item ${isActive ? 'active' : ''} ${isSelected ? 'selected' : ''}`;
        div.onclick = () => loadSingleExam(ex);
        div.innerHTML = `<div class="card-title">${ex.school || ex.topic || ex.file}</div>
            <div class="card-meta"><span class="m-badge">${ex.grade}</span><span class="m-badge blue">${getAxisLabel(ex._axis)}</span><span class="m-badge">${ex.subject || '수학'}</span></div>
            <div class="card-file">${ex.file}</div>
            <button class="btn-card-select" onclick="event.stopPropagation(); toggleFileSelection('${ex.file}')"><i class="fa-solid ${isSelected ? 'fa-check-square' : 'fa-square'}"></i></button>`;
        container.appendChild(div);
    });
}

function getAxisLabel(axis) { const labels = { "1-mid": "1학기 중간", "1-final": "1학기 기말", "2-mid": "2학기 중간", "2-final": "2학기 기말", "other": "기타" }; return labels[axis] || "기타"; }
function toggleFileSelection(file) { if (selectedFiles.has(file)) selectedFiles.delete(file); else selectedFiles.add(file); renderExamList(); updateBulkStatus(); }
function clearSelection() { selectedFiles.clear(); renderExamList(); updateBulkStatus(); }
function updateBulkStatus() { document.getElementById('selected-count').innerText = selectedFiles.size; document.getElementById('bulk-status-text').innerText = selectedFiles.size > 0 ? "불러오기를 누르세요" : "파일을 체크하세요"; }

function updateUnitFilter(questions) {
    const select = document.getElementById('q-unit-filter'), current = select.value, unitMap = new Map();
    questions.forEach(q => { const std = getStandardizedUnit(q); if (std.unit && std.unit !== '미분류') unitMap.set(std.unit, (COURSE_BASE_ORDER[std.course] || 90000) + std.order); });
    select.innerHTML = '<option value="">전체 표준단원</option>';
    Array.from(unitMap.entries()).sort((a,b)=>a[1]-b[1]).forEach(([name]) => { const opt = document.createElement('option'); opt.value = name; opt.textContent = name; select.appendChild(opt); });
    if (Array.from(unitMap.keys()).includes(current)) select.value = current;
    document.getElementById('cur-unit-name').innerText = select.value || '전체';
}

function addCurrentFilterAll() {
    const unitFilter = document.getElementById('q-unit-filter').value, levelFilter = document.getElementById('q-level-filter').value;
    const targets = currentDisplayQuestions.filter(q => (!unitFilter || getStandardizedUnit(q).unit === unitFilter) && (!levelFilter || String(q.level || '').trim() === levelFilter));
    const existing = new Set(cart.map(c => c._qKey));
    targets.forEach(q => { if (!existing.has(q._qKey)) cart.push(q); });
    updateCartUI(); renderQuestionList();
}

async function loadSingleExam(ex) {
    currentViewingSource = ex; renderExamList();
    const container = document.getElementById('question-list');
    container.innerHTML = '<div class="empty-placeholder"><i class="fa-solid fa-spinner fa-spin"></i><p>문항 로드 중...</p></div>';
    try {
        const questions = await fetchQuestionData(ex.file);
        currentDisplayQuestions = questions.map(q => ({ ...q, _sourceTitle: ex.school || ex.topic || ex.file, _sourceFile: ex.file, _qKey: `${ex.file}_${q.id}` }));
        document.getElementById('cur-source-name').innerText = ex.school || ex.topic || ex.file;
        document.getElementById('cur-q-count').innerText = currentDisplayQuestions.length;
        updateUnitFilter(currentDisplayQuestions); renderQuestionList();
    } catch (e) { container.innerHTML = '<p>로드 실패</p>'; }
}

async function loadMultipleExams() {
    const files = Array.from(selectedFiles); if(!files.length) return alert('선택한 시험지가 없습니다.');
    currentViewingSource = { file: "multi" }; renderExamList();
    const container = document.getElementById('question-list');
    container.innerHTML = '<div class="empty-placeholder"><i class="fa-solid fa-spinner fa-spin"></i><p>묶음 처리 중...</p></div>';
    let allQs = [];
    for(const file of files) {
        try {
            const qs = await fetchQuestionData(file), ex = engineDB.exams.find(e => e.file === file);
            allQs.push(...qs.map(q => ({ ...q, _sourceTitle: ex.school || '기출', _sourceFile: file, _qKey: `${file}_${q.id}` })));
        } catch(e) {}
    }
    currentDisplayQuestions = allQs;
    document.getElementById('cur-source-name').innerText = `${files.length}개 시험지`;
    document.getElementById('cur-q-count').innerText = allQs.length;
    updateUnitFilter(allQs); renderQuestionList();
}

function fetchQuestionData(file) {
    return new Promise((res, rej) => {
        delete window.questions; delete window.questionBank;
        const s = document.createElement('script'); s.src = `exams/${file}?v=${Date.now()}`;
        s.onload = () => { const data = window.questions || window.questionBank; if (Array.isArray(data)) res(data); else rej(); s.remove(); };
        s.onerror = () => { rej(); s.remove(); }; document.body.appendChild(s);
    });
}

function renderQuestionList() {
    const container = document.getElementById('question-list'), unitFilter = document.getElementById('q-unit-filter').value, levelFilter = document.getElementById('q-level-filter').value, viewMode = document.getElementById('q-view-mode').value;
    let displayQs = currentDisplayQuestions.filter(q => (!unitFilter || getStandardizedUnit(q).unit === unitFilter) && (!levelFilter || String(q.level || '').trim() === levelFilter));
    if(!displayQs.length) { container.innerHTML = '<div class="empty-placeholder"><p>표시할 문항이 없습니다.</p></div>'; return; }
    container.innerHTML = '';
    if(viewMode === 'group') {
        const groups = {};
        displayQs.forEach(q => { const std = getStandardizedUnit(q); if (!groups[std.unit]) groups[std.unit] = { list: [], order: (COURSE_BASE_ORDER[std.course] || 90000) + std.order }; groups[std.unit].list.push(q); });
        Object.keys(groups).sort((a,b)=>groups[a].order-groups[b].order).forEach(name => {
            const gDiv = document.createElement('div'); gDiv.innerHTML = `<div style="padding:10px 20px; background:var(--gray-50); font-weight:800; font-size:13px; border-bottom:1px solid var(--gray-200);">${name}</div>`;
            groups[name].list.forEach(q => gDiv.appendChild(createQuestionItem(q))); container.appendChild(gDiv);
        });
    } else { displayQs.forEach(q => container.appendChild(createQuestionItem(q))); }
    if (window.MathJax) MathJax.typesetPromise([container]);
}

function createQuestionItem(q) {
    const isAdded = cart.some(c => c._qKey === q._qKey), div = document.createElement('div'), std = getStandardizedUnit(q);
    div.className = 'q-item';
    let choicesHTML = (q.choices && q.choices.length > 0 && q.choices[0] !== '주관식') ? `<div class="q-choices">` + q.choices.map((c, i) => `<div class="choice-row"><span style="font-weight:700; color:var(--gray-500); min-width:24px;">(${i+1})</span><span>${c}</span></div>`).join('') + `</div>` : '';
    div.innerHTML = `<div class="q-header"><div><div class="q-tag-line"><span class="q-unit-tag">${std.course}</span><span class="q-unit-tag" style="background:#eee; color:#666;">${std.unit}</span><span class="q-unit-tag" style="background:#f8fafc; color:#475569;">${q.level || '미'}</span></div><span class="q-num">${q.id}번</span><span style="font-size:11px; color:#999; margin-left:10px;">${q._sourceTitle}</span></div>
        <button class="btn-add-cart ${isAdded ? 'in' : ''}" onclick="toggleCart('${q._qKey}')"><i class="fa-solid ${isAdded ? 'fa-check' : 'fa-plus'}"></i>${isAdded ? '담김' : '담기'}</button></div>
        <div class="q-content">${q.content}</div>${q.image ? `<img src="${q.image}" class="q-image">` : ''}${choicesHTML}`;
    return div;
}

function toggleCart(qKey) {
    const idx = cart.findIndex(c => c._qKey === qKey);
    if(idx > -1) cart.splice(idx, 1); else { const q = currentDisplayQuestions.find(it => it._qKey === qKey); if(q) cart.push(q); }
    updateCartUI(); renderQuestionList();
}

function updateCartUI() {
    document.getElementById('cart-count').innerText = cart.length;
    const mNum = document.getElementById('mobile-cart-count-num');
    if (mNum) mNum.innerText = cart.length;
    document.getElementById('cart-items').innerHTML = cart.map(c => {
        const std = getStandardizedUnit(c);
        return `<div class="cart-item"><span style="font-size:12px; font-weight:700;"><span style="color:var(--blue); font-size:10px; margin-right:4px;">[${std.unit}]</span><span style="color:#64748b; font-size:10px; margin-right:4px;">[${c.level || '미'}]</span>${c._sourceTitle} ${c.id}번</span><i class="fa-solid fa-xmark" style="cursor:pointer; color:#ccc;" onclick="toggleCart('${c._qKey}')"></i></div>`;
    }).join('');
}

/* AP Math OS 선생님 → 반 선택 헬퍼 */
let _mixerQrClassRows = [];
let _mixerQrGroupedByTeacher = {};

function mixerEscapeModalText(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function getMixerQrTeacherName(row) {
    const raw = row?.teacher_name || row?.teacherName || row?.teacher || row?.owner_name || row?.ownerName || '';
    const name = String(raw || '').replace(/\s*선생님\s*$/g, '').trim();
    return name || '담당 미지정';
}

function sortMixerQrClassesForSelect(list) {
    const gradeRank = { '중1': 1, '중2': 2, '중3': 3, '고1': 4, '고2': 5, '고3': 6 };
    return [...list].sort((a, b) => {
        const ag = gradeRank[String(a.grade || '').trim()] || 99;
        const bg = gradeRank[String(b.grade || '').trim()] || 99;
        if (ag !== bg) return ag - bg;
        const nameDiff = String(a.name || '').localeCompare(String(b.name || ''), 'ko');
        if (nameDiff !== 0) return nameDiff;
        return String(a.id || '').localeCompare(String(b.id || ''), 'ko');
    });
}

function renderMixerTeacherClassSelector(classes) {
    _mixerQrClassRows = Array.isArray(classes) ? classes : [];
    _mixerQrGroupedByTeacher = {};

    _mixerQrClassRows.forEach(c => {
        const teacher = getMixerQrTeacherName(c);
        if (!_mixerQrGroupedByTeacher[teacher]) _mixerQrGroupedByTeacher[teacher] = [];
        _mixerQrGroupedByTeacher[teacher].push(c);
    });

    const teachers = Object.keys(_mixerQrGroupedByTeacher).sort((a, b) => a.localeCompare(b, 'ko'));
    if (!teachers.length) {
        return '<div style="color:#ef4444; font-size:13px;">등록된 반이 없습니다. AP Math OS에서 반을 먼저 생성하세요.</div>';
    }

    const teacherOptions = teachers.map(t => `<option value="${mixerEscapeModalText(t)}">${mixerEscapeModalText(t)} 선생님</option>`).join('');
    return `
        <div style="display:flex; flex-direction:column; gap:12px; text-align:left;">
            <div>
                <label style="display:block; margin-bottom:6px; font-size:12px; font-weight:800; color:var(--gray-500);">1. 선생님 선택</label>
                <select id="modal-teacher-select" class="form-select" style="width:100%;" onchange="renderMixerClassSelectByTeacher()">${teacherOptions}</select>
            </div>
            <div>
                <label style="display:block; margin-bottom:6px; font-size:12px; font-weight:800; color:var(--gray-500);">2. 반 선택</label>
                <select id="modal-class-select" class="form-select" style="width:100%;"></select>
                <div style="margin-top:8px; font-size:11px; font-weight:700; line-height:1.5; color:var(--gray-500);">같은 반명이라도 선택한 선생님의 class_id로 분리되어 QR에 연결됩니다.</div>
            </div>
        </div>`;
}

function renderMixerClassSelectByTeacher() {
    const teacherSelect = document.getElementById('modal-teacher-select');
    const classSelect = document.getElementById('modal-class-select');
    if (!teacherSelect || !classSelect) return;

    const teacher = teacherSelect.value || Object.keys(_mixerQrGroupedByTeacher)[0] || '';
    const rows = sortMixerQrClassesForSelect(_mixerQrGroupedByTeacher[teacher] || []);

    classSelect.innerHTML = rows.map(c => {
        const labelParts = [c.name || '이름 없는 반', c.grade ? `(${c.grade})` : ''].filter(Boolean).join(' ');
        return `<option value="${mixerEscapeModalText(c.id)}" data-teacher="${mixerEscapeModalText(teacher)}" data-class-name="${mixerEscapeModalText(c.name || '')}">${mixerEscapeModalText(labelParts)}</option>`;
    }).join('');
}

async function openClassSelectionModal() {
    const overlay = document.getElementById('class-modal-overlay'), body = document.getElementById('class-modal-body');
    overlay.style.display = 'flex'; body.innerHTML = '<p style="text-align:center; padding:20px; color:var(--gray-500);">반 목록을 불러오는 중...</p>';

    // [5G] APMATH_SESSION 인증 정보 로드
    let authHeader = {};
    try {
        const session = JSON.parse(localStorage.getItem('APMATH_SESSION') || 'null');
        if (!session || !session.login_id || !session.raw_password) {
            body.innerHTML = '<div style="color:#ef4444; font-size:13px;">AP Math OS 로그인 후 다시 시도하세요.</div>'; return;
        }
        authHeader = { 'Authorization': 'Basic ' + btoa(session.login_id + ':' + session.raw_password) };
    } catch(e) {
        body.innerHTML = '<div style="color:#ef4444; font-size:13px;">AP Math OS 로그인 후 다시 시도하세요.</div>'; return;
    }

    try {
        const res = await fetch('https://ap-math-os-v2612.js-pdf.workers.dev/api/qr-classes', { headers: authHeader });
        if (res.status === 401) { body.innerHTML = '<div style="color:#ef4444; font-size:13px;">AP Math OS 로그인 후 다시 시도하세요.</div>'; return; }
        const data = await res.json();
        if (data && data.success && Array.isArray(data.classes)) {
            if (data.classes.length === 0) {
                body.innerHTML = '<div style="color:red; font-size:13px;">등록된 반이 없습니다. AP Math OS에서 반을 먼저 생성하세요.</div>'; return;
            }
            body.innerHTML = renderMixerTeacherClassSelector(data.classes);
            renderMixerClassSelectByTeacher();
        } else { throw new Error(); }
    } catch(e) { body.innerHTML = '<div style="color:#ef4444; font-size:13px;">반 목록을 불러오지 못했습니다. AP Math OS 연결을 확인하세요.</div>'; }
}

function closeClassModal() { document.getElementById('class-modal-overlay').style.display = 'none'; }
function confirmClassSelection() {
    const s = document.getElementById('modal-class-select');
    if (!s || !s.value) return;
    const selectedOption = s.options[s.selectedIndex];
    const teacherName = selectedOption?.dataset?.teacher || document.getElementById('modal-teacher-select')?.value || '';
    const className = selectedOption?.dataset?.className || '';
    closeClassModal();
    openMixedEngine(true, s.value, { teacherName, className });
}

function getLevelRank(level, mode = 'high-first') {
    const table = mode === 'low-first' ? { "하": 1, "중": 2, "상": 3 } : { "상": 1, "중": 2, "하": 3 };
    return table[String(level || '').trim()] ?? 999;
}

function openMixedEngine(withSubmitQr = false, classId = "", options = {}) {
    if(cart.length === 0) return alert('카트가 비어있습니다.');
    const orderMode = document.getElementById('cart-level-order').value;
    let exportCart = [...cart];
    if (orderMode === 'high-first' || orderMode === 'low-first') {
        exportCart.sort((a,b) => getLevelRank(a.level, orderMode) - getLevelRank(b.level, orderMode) || (a.id||0)-(b.id||0));
    }
    const customTitle = String(document.getElementById('mixed-title-input')?.value || '').trim();
    const autoTitle = currentViewingSource ? (currentViewingSource.school || currentViewingSource.topic || currentViewingSource.file || `믹서 출제 (${exportCart.length}문항)`) : `믹서 출제 (${exportCart.length}문항)`;
    const meta = { title: customTitle || autoTitle, count: exportCart.length, generatedAt: new Date().toISOString() };
    const sessionKey = 'mix_' + Date.now();
    localStorage.setItem('mixedQuestions_' + sessionKey, JSON.stringify(exportCart));
    localStorage.setItem('mixedMeta_' + sessionKey, JSON.stringify(meta));
    let url = `mixed_engine.html?qpp=${document.getElementById('print-qpp').value}&key=${sessionKey}`;
    if (withSubmitQr) {
        url += '&submitQr=1';
        if (classId) url += '&class=' + encodeURIComponent(classId);
        if (options.teacherName) url += '&teacher=' + encodeURIComponent(options.teacherName);
        if (options.className) url += '&className=' + encodeURIComponent(options.className);
    }
    window.open(url, '_blank');
}

 * [FAIL 3 수정] 필터 이벤트 리스너 복구
 */
window.onload = async () => {
    const s = document.createElement('script'); s.src = 'db.js?v=' + Date.now();
    s.onload = () => { if(window.mainDB) { engineDB.exams = window.mainDB.exams.map(normalizeExamMeta); renderExamList(); } };
    document.body.appendChild(s);
    document.getElementById('paperSearch').oninput = renderExamList;
    document.getElementById('gradeFilter').onchange = renderExamList;
    document.getElementById('axisFilter').onchange = renderExamList;
    document.getElementById('q-unit-filter').onchange = () => { renderQuestionList(); document.getElementById('cur-unit-name').innerText = document.getElementById('q-unit-filter').value || '전체'; };
    
    // 복구된 이벤트 리스너
    document.getElementById('q-level-filter').onchange = renderQuestionList;
    document.getElementById('q-view-mode').onchange = renderQuestionList;
};
