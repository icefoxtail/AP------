<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS아카이브 | 믹서 개편 v4.6.1 (UX/Mobile Optimized + Stability Fixed)</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']], packages: {'[+]': ['ams', 'boldsymbol']} },
            options: { enableMenu: false },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        :root {
            --navy: #111113; --navy-2: #18181b; --navy-3: #202024;
            --blue: #27272a; --blue-dark: #18181b; --blue-soft: #f4f4f5;
            --green: #10b981; --green-soft: #ecfdf5;
            --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
            --gray-300: #cbd5e1; --gray-500: #64748b;
            --text-main: #0f172a; --radius-md: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--gray-50); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }
        header { background: var(--navy); height: 58px; display: flex; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { color: white; text-decoration: none; font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .logo em { color: #a1a1aa; font-style: normal; }

        .mixer-container { display: flex; height: calc(100vh - 58px); }
        .panel { display: flex; flex-direction: column; background: white; border-right: 1px solid var(--gray-200); height: 100%; min-width: 0; }
        .panel-header { padding: 15px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; min-height: 58px; flex-shrink: 0; }
        .panel-body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }

        /* 왼쪽 패널: 검색 및 시험지 목록 */
        .panel-papers { width: 360px; flex-shrink: 0; background: var(--gray-50); }
        .filter-area { padding: 15px 20px; border-bottom: 1px solid var(--gray-200); background: white; display: flex; flex-direction: column; gap: 8px; }

        .btn-filter-toggle {
            height: 28px; padding: 0 12px; border-radius: 9999px; border: 1px solid var(--gray-200); background: white;
            color: var(--gray-500); font-size: 11.5px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; flex: 0 0 auto; transition: 0.2s;
        }
        .btn-filter-toggle:hover { background: var(--gray-50); color: var(--text-main); border-color: var(--gray-300); }
        .btn-filter-toggle.original-toggle.active { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }

        .search-box { position: relative; }
        .search-box i { position: absolute; left: 12px; top: 12px; color: var(--gray-300); }
        .search-box input { width: 100%; height: 38px; padding: 0 12px 0 34px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; outline: none; }
        .filter-row { display: flex; gap: 6px; }
        .form-select { width: 100%; height: 36px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 12px; font-weight: 700; outline: none; background: white; }

        .exam-bulk-bar { padding: 12px 20px; background: #fdfdfe; border-bottom: 1px solid var(--gray-200); }
        .bulk-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 11.5px; font-weight: 800; color: var(--gray-500); }
        .exam-bulk-actions { display: flex; gap: 6px; }
        .btn-action { padding: 8px 0; font-size: 11px; font-weight: 800; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid var(--gray-200); background: white; color: var(--text-main); }
        .exam-bulk-actions .btn-action { flex: 1; }
        .question-filter-bar .search-box { flex: 1 1 180px; min-width: 150px; }
        .question-filter-bar .btn-action { flex: 0 0 auto; }
        .btn-filter-all { height: 34px; padding: 0 12px; font-size: 12px; white-space: nowrap; }
        .btn-action.primary { background: var(--blue); color: white; border-color: var(--blue); }
        .btn-action.reset { border-color: #fca5a5; color: #ef4444; }

        /* 시험지 카드 스타일 */
        .paper-item { padding: 16px; padding-right: 40px; border-radius: 12px; background: white; border: 1px solid var(--gray-200); margin-bottom: 10px; transition: 0.2s; position: relative; cursor: pointer; }
        .paper-item:hover { border-color: var(--blue); transform: translateY(-1px); }
        .paper-item.active { border-color: var(--blue); background: var(--blue-soft); box-shadow: inset 0 0 0 1px var(--blue); }
        .paper-item.selected { border-color: var(--green); }

        .btn-card-select { position: absolute; top: 14px; right: 14px; background: none; border: none; font-size: 20px; color: var(--gray-300); cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; height: 24px; width: 24px; }
        .paper-item.selected .btn-card-select { color: var(--green); }

        .card-title { font-size: 14.5px; font-weight: 800; margin-bottom: 6px; line-height: 1.3; word-break: keep-all; }
        .card-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .m-badge { font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; background: var(--gray-100); color: var(--gray-500); }
        .m-badge.blue { background: var(--blue-soft); color: var(--blue); }
        .card-file { font-size: 10px; color: #000000; word-break: break-all; border-top: 1px dashed var(--gray-100); padding-top: 6px; margin-top: 4px; }

        /* 중앙 패널: 문항 목록 */
        .panel-questions { flex: 1; min-width: 0; }
        .status-summary-bar { padding: 10px 20px; background: var(--navy); color: white; display: flex; align-items: center; justify-content: space-between; font-size: 11.5px; gap: 15px; }
        .stat-item { display: flex; align-items: center; gap: 6px; }
        .stat-label { color: rgba(255,255,255,0.5); font-weight: 400; }
        .stat-value { font-weight: 800; color: #a1a1aa; }

        .question-filter-bar { padding: 12px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; gap: 10px; background: white; position: sticky; top: 0; z-index: 10; flex-wrap: wrap; }
        .source-flow-grid { width: 100%; display: grid; grid-template-columns: 170px repeat(5, minmax(120px, 1fr)); gap: 8px; align-items: center; }
        .source-flow-grid .form-select, .source-flow-grid input { min-width: 0; }
        .difficulty-plan { width: 100%; display: grid; grid-template-columns: repeat(3, minmax(150px, 1fr)); gap: 8px; }
        .difficulty-plan label { display: grid; grid-template-columns: 34px 1fr; gap: 6px; align-items: center; padding: 8px; border: 1px solid var(--gray-200); border-radius: 8px; background: var(--gray-50); font-size: 12px; font-weight: 900; }
        .difficulty-plan input { width: 100%; height: 32px; border: 1px solid var(--gray-200); border-radius: 8px; padding: 0 8px; font-weight: 900; text-align: center; }
        .difficulty-plan small { grid-column: 1 / -1; color: var(--gray-500); font-size: 10.5px; font-weight: 800; }
        .detail-filter-panel { width: 100%; display: none; grid-template-columns: repeat(6, minmax(110px, 1fr)); gap: 8px; padding: 10px; border: 1px solid var(--gray-200); border-radius: 8px; background: var(--gray-50); }
        .detail-filter-panel.open { display: grid; }
        .source-scope-note { width: 100%; font-size: 11.5px; font-weight: 900; color: var(--gray-500); }
        .availability-card { margin: 0 20px 12px; border: 1px solid var(--gray-200); border-radius: 8px; background: white; padding: 10px 12px; font-size: 11.5px; line-height: 1.6; }
        .availability-head { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; font-weight: 900; color: var(--text-main); }
        .availability-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
        .availability-cell { border: 1px solid var(--gray-100); border-radius: 8px; background: var(--gray-50); padding: 6px 8px; }
        .availability-cell span { display: block; color: var(--gray-500); font-weight: 800; font-size: 10px; }
        .availability-cell strong { display: block; color: var(--blue); font-weight: 900; font-size: 13px; }

        .q-mode-toggle { display: inline-flex; gap: 4px; padding: 3px; border: 1px solid var(--gray-200); border-radius: 8px; background: var(--gray-50); flex: 0 0 auto; }
        .q-mode-btn { height: 28px; padding: 0 10px; border: none; border-radius: 6px; background: transparent; color: var(--gray-500); font-size: 11px; font-weight: 900; cursor: pointer; white-space: nowrap; }
        .q-mode-btn.active { background: white; color: var(--blue); box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08); }
        .q-result-note { padding: 10px 20px; background: #fff7ed; color: #9a3412; font-size: 12px; font-weight: 800; border-bottom: 1px solid #fed7aa; }
        .q-source-file { display: inline-block; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom; }

        .q-item { padding: 30px; border-bottom: 1px solid var(--gray-100); position: relative; }
        .q-item:hover { background: #fafafa; }
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .q-tag-line { display: flex; gap: 6px; margin-bottom: 8px; }
        .q-unit-tag { font-size: 10.5px; font-weight: 800; color: var(--blue); background: var(--blue-soft); padding: 2px 8px; border-radius: 4px; }
        .q-num { font-size: 16px; font-weight: 900; color: var(--text-main); }

        .q-content { font-size: 15px; line-height: 1.8; white-space: pre-wrap; word-break: keep-all; }
        .q-image { max-width: 100%; margin: 15px 0; border-radius: 8px; display: block; border: 1px solid var(--gray-100); }
        .q-choices { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 18px; }
        .choice-row { display: flex; gap: 10px; font-size: 14px; }

        .btn-add-cart { height: 36px; padding: 0 16px; border-radius: 8px; border: 1px solid var(--gray-200); background: white; font-size: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-add-cart.in { background: var(--blue); color: white; border-color: var(--blue); }

        /* 카트 패널 */
        .panel-cart { width: 340px; flex-shrink: 0; border-right: none; }
        .cart-item { padding: 12px; border: 1px solid var(--gray-100); border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; background: white; }
        .cart-analysis { padding: 14px 16px; border-bottom: 1px solid var(--gray-100); background: var(--gray-50); }
        .cart-analysis-title { font-size: 12px; font-weight: 900; margin-bottom: 10px; color: var(--text-main); }
        .cart-analysis-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        .cart-analysis-stat { min-width: 0; padding: 8px; border: 1px solid var(--gray-200); border-radius: 8px; background: white; }
        .cart-analysis-label { display: block; font-size: 10px; font-weight: 800; color: var(--gray-500); }
        .cart-analysis-value { display: block; margin-top: 2px; font-size: 14px; font-weight: 900; color: var(--blue); }
        .cart-unit-list { display: flex; flex-direction: column; gap: 5px; }
        .cart-unit-row { display: flex; justify-content: space-between; gap: 8px; font-size: 11px; font-weight: 800; color: var(--gray-500); }
        .cart-unit-row span:first-child { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-main); }
        .cart-footer { padding: 20px; border-top: 1px solid var(--gray-100); background: white; position: sticky; bottom: 0; }
        .btn-main { width: 100%; height: 52px; border: none; border-radius: var(--radius-md); background: var(--blue); color: white; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-main:hover { opacity: 0.9; }

        .empty-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--gray-300); text-align: center; padding: 40px; }
        .empty-placeholder i { font-size: 48px; margin-bottom: 15px; }

        /* [자동출제 패널] */
        .autogen-panel { border-bottom: 1px solid var(--gray-100); background: #fcfcfd; flex-shrink: 0; }
        .autogen-head { padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-size: 13px; font-weight: 900; color: var(--text-main); user-select: none; }
        .autogen-head .ag-title { display: flex; align-items: center; gap: 8px; }
        .autogen-head .ag-title i { color: var(--blue); }
        .autogen-body { padding: 0 20px 16px; max-height: 340px; overflow-y: auto; }
        .autogen-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .autogen-row { display: grid; grid-template-columns: 1fr 84px 88px 32px; gap: 6px; align-items: center; }
        .autogen-row.has-adv { grid-template-columns: 1fr 84px 80px 96px 1fr 32px; }
        .autogen-row .form-select, .autogen-row input { height: 34px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 12px; font-weight: 700; outline: none; background: white; padding: 0 8px; min-width: 0; width: 100%; }
        .autogen-row .ag-count { text-align: center; }
        .btn-ag-remove { height: 34px; width: 32px; border: 1px solid #fca5a5; color: #ef4444; background: white; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .autogen-toolbar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 10px; }
        .btn-ag { height: 32px; padding: 0 12px; border-radius: 8px; border: 1px solid var(--gray-200); background: white; font-size: 11.5px; font-weight: 800; cursor: pointer; }
        .btn-ag.primary { background: var(--blue); color: white; border-color: var(--blue); }
        .btn-ag.dark { background: var(--navy); color: white; border-color: var(--navy); }
        .btn-ag.reset { border-color: #fca5a5; color: #ef4444; }
        .ag-adv-toggle { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 800; color: var(--gray-500); cursor: pointer; margin-left: auto; }
        .autogen-run { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .autogen-run .btn-ag { flex: 1 1 auto; height: 38px; }
        .ag-report { font-size: 11.5px; line-height: 1.6; }
        .ag-report-empty { color: var(--gray-300); }
        .ag-report-card { border: 1px solid var(--gray-200); border-radius: 10px; padding: 10px 12px; background: white; }
        .ag-report-head { font-weight: 900; margin-bottom: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
        .ag-report-head .ok { color: var(--green); }
        .ag-report-head .miss { color: #ef4444; }
        .ag-report-row { display: flex; justify-content: space-between; gap: 8px; padding: 3px 0; border-top: 1px dashed var(--gray-100); }
        .ag-report-row .lack { color: #ef4444; font-weight: 900; }
        .ag-report-row .full { color: var(--green); font-weight: 800; }

        /* [고정 문항 + 출력 전 검토] */
        .cart-item .ag-pin { cursor: pointer; color: var(--gray-300); margin-right: 8px; font-size: 12px; }
        .cart-item.pinned { border-color: #f59e0b; background: #fffbeb; }
        .cart-item.pinned .ag-pin { color: #f59e0b; }
        .cart-item-actions { display: flex; align-items: center; flex-shrink: 0; }
        .print-review { padding: 12px; border: 1px solid var(--gray-200); border-radius: 10px; background: var(--gray-50); margin-bottom: 12px; }
        .print-review-title { font-size: 11.5px; font-weight: 900; color: var(--text-main); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .print-review-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .print-review-cell { background: white; border: 1px solid var(--gray-200); border-radius: 8px; padding: 6px 8px; }
        .print-review-cell .pr-label { display: block; font-size: 10px; font-weight: 800; color: var(--gray-500); }
        .print-review-cell .pr-value { display: block; margin-top: 2px; font-size: 13px; font-weight: 900; color: var(--blue); }

        /* [모달 공용] */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; align-items: center;
            justify-content: center; z-index: 2000; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; padding: 24px; border-radius: 12px; width: 340px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 16px;
        }
        .modal-title { font-size: 17px; font-weight: 800; color: var(--text-main); text-align: center; margin-bottom: 5px; }

        /* [모바일 하단 고정바 CSS] */
        .mobile-output-bar { display: none; }

        @media (max-width: 900px) {
            body { padding-bottom: 78px; }
            .mixer-container { flex-direction: column; height: auto; }
            .panel { width: 100%; height: auto; border-right: none; }
            .panel-papers { max-height: 450px; }
            .panel-cart { position: relative; }

            .mobile-output-bar {
                position: fixed; left: 0; right: 0; bottom: 0; z-index: 1500;
                display: grid; grid-template-columns: 72px 1fr 1.4fr; gap: 8px;
                align-items: center; padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
                background: rgba(255, 255, 255, 0.96); border-top: 1px solid var(--gray-200);
                box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.12); backdrop-filter: blur(12px);
            }
            .mobile-cart-count { font-size: 12px; font-weight: 800; color: var(--text-main); text-align: center; line-height: 1.2; }
            .mobile-cart-count strong { display: block; font-size: 18px; color: var(--blue); }
            .mobile-cart-btn, .mobile-output-btn { height: 44px; border-radius: 12px; font-size: 13px; font-weight: 900; cursor: pointer; }
            .mobile-cart-btn { border: 1px solid var(--gray-200); background: white; color: var(--text-main); }
            .mobile-output-btn { border: none; background: var(--blue); color: white; }

            .cart-footer { padding-bottom: 92px; }
            .cart-analysis-grid { grid-template-columns: repeat(2, 1fr); }
            .status-summary-bar { flex-wrap: wrap; align-items: flex-start; }
            .question-filter-bar { align-items: stretch; gap: 8px; }
            .question-filter-bar .form-select,
            .question-filter-bar .search-box,
            .question-filter-bar .btn-action { flex: 1 1 150px; width: auto !important; }
            .source-flow-grid, .difficulty-plan, .detail-filter-panel, .availability-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo"><i class="fa-solid fa-layer-group"></i><span><em>JS</em>아카이브 믹서</span></a>
</header>

<div class="mixer-container">
    <div class="panel panel-papers">
        <div class="filter-area">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 13px; font-weight: 800; color: var(--text-main);">탐색 필터</span>
                <button id="btn-toggle-filter" class="btn-filter-toggle" onclick="toggleFilterPanel()">
                    <i class="fa-solid fa-caret-down"></i> 필터 닫기
                </button>
            </div>

            <div id="filter-panel-content" style="display: flex; flex-direction: column; gap: 8px; margin-top: 8px;">
                <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="paperSearch" placeholder="학교명, 파일명 검색..."></div>
                <button id="originalArchiveToggle" class="btn-filter-toggle original-toggle" type="button" style="display:none; align-self:flex-start;" onclick="toggleOriginalArchiveVisibility()">
                    <i class="fa-solid fa-lock"></i> 기출 포함 OFF
                </button>
                <div class="filter-row">
                    <select id="gradeFilter" class="form-select">
                        <option value="">학년 선택</option>
                        <option value="고3">고3</option><option value="고2">고2</option><option value="고1">고1</option>
                        <option value="중3">중3</option><option value="중2">중2</option><option value="중1">중1</option>
                    </select>
                    <select id="axisFilter" class="form-select">
                        <option value="">전체 시험축</option>
                        <option value="1-mid">1학기 중간</option>
                        <option value="1-final">1학기 기말</option>
                        <option value="2-mid">2학기 중간</option>
                        <option value="2-final">2학기 기말</option>
                        <option value="other">기타/전범위</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="exam-bulk-bar">
            <div class="bulk-info">
                <span><b id="selected-count" style="color:var(--blue)">0</b>개 선택됨</span>
                <span id="bulk-status-text" style="font-size:10px;">파일을 체크하세요</span>
            </div>
            <div class="exam-bulk-actions">
                <button class="btn-action reset" type="button" onclick="resetMixerState()">초기화</button>
                <button class="btn-action" onclick="clearSelection()">선택해제</button>
                <button class="btn-action primary" onclick="loadMultipleExams()">불러오기</button>
            </div>
        </div>

        <div class="panel-body" id="paper-list"></div>
    </div>

    <div class="panel panel-questions">
        <div class="status-summary-bar" id="status-bar">
            <div class="stat-item"><span class="stat-label">Source:</span><span class="stat-value" id="cur-source-name">준비됨</span></div>
            <div class="stat-item"><span class="stat-label">현재 단원:</span><span class="stat-value" id="cur-unit-name">전체</span></div>

function hasVisualAsset(q) {
    const content = String(q?.content || '');
    return Boolean(
        q?.image ||
        /<img\b/i.test(content) ||
        /<svg\b/i.test(content) ||
        /<table\b/i.test(content)
    );
}

function inferGradeFromFile(file) {
    const text = String(file || '');
    const m = text.match(/(고|중)\s*([1-3])/);
    return m ? `${m[1]}${m[2]}` : '';
}

function normalizeCourseName(value) {
    const text = String(value || '').trim();
    const compact = text.replace(/\s+/g, '');
    const aliases = {
        '확률과통계': '확률과 통계',
        '기하와벡터': '기하와 벡터',
        '수학Ⅰ': '수학I',
        '수학Ⅱ': '수학II',
        '미적분Ⅰ': '미적분I',
        '미적분Ⅱ': '미적분II'
    };
    return aliases[compact] || text;
}

function findStandardUnitKey(course, unit, order) {
    const normalizedCourse = normalizeCourseName(course);
    const normalizedUnit = String(unit || '').trim();
    for (const [key, info] of Object.entries(MASTER_TABLE || {})) {
        if (normalizeCourseName(info.course) === normalizedCourse && String(info.unit || '').trim() === normalizedUnit) return key;
    }
    if (Number.isFinite(Number(order))) {
        for (const [key, info] of Object.entries(MASTER_TABLE || {})) {
            if (normalizeCourseName(info.course) === normalizedCourse && Number(info.order) === Number(order)) return key;
        }
    }
    return '';
}

function getSourceMetaForFile(file) {
    return engineDB.exams.find(ex => String(ex.file || '') === String(file || '')) || {};
}

function normalizeTags(tags) {
    if (Array.isArray(tags)) return tags.map(t => String(t || '').trim()).filter(Boolean);
    if (!tags) return [];
    return String(tags).split(/[,\s]+/).map(t => t.trim()).filter(Boolean);
}

function normalizeForFilter(q, sourceMode, sourceMeta = {}) {
    const raw = q || {};
    const sourceFile = String(raw._sourceFile || raw.sourceFile || sourceMeta.file || '').trim();
    const meta = sourceFile ? { ...getSourceMetaForFile(sourceFile), ...sourceMeta } : sourceMeta;
    const std = getStandardizedUnit(raw);
    const key = String(sourceMode === 'archive' ? (raw.qKey || raw._qKey || `${sourceFile}_${raw.id || ''}`) : (raw._qKey || raw.qKey || `${sourceFile}_${raw.id || ''}`));
    const rawSubject = String(raw.subject || meta.subject || '').trim();
    const stdCourse = normalizeCourseName(std.course && std.course !== '기타' ? std.course : '');
    const course = normalizeCourseName(stdCourse || raw.course || raw.standardCourse || meta.primaryStandardCourse || '');
    const standardUnit = String((std.unit && std.unit !== '미분류' ? std.unit : '') || raw.standardUnit || '').trim();
    const unitOrder = Number.isFinite(Number(std.order)) ? Number(std.order) : Number(raw.unitOrder || 999);
    const standardUnitKey = String(raw.standardUnitKey || findStandardUnitKey(course, standardUnit, unitOrder) || '').trim();
    const tags = normalizeTags(raw.tags);
    const content = String(raw.content || raw.contentText || '');
    const choices = Array.isArray(raw.choices) ? raw.choices.join(' ') : String(raw.choicesText || '');
    const hasImage = Boolean(raw.hasImage || raw.image || /<img\b/i.test(content) || /<svg\b/i.test(content) || /<table\b/i.test(content));
    const sourceTitle = String(raw._sourceTitle || meta.school || meta.topic || sourceFile || '').trim();
    const grade = String(meta.grade || raw.grade || inferGradeFromFile(sourceFile) || '').trim();
    const searchText = [content, choices, sourceFile, sourceTitle, grade, rawSubject, course, standardUnit, standardUnitKey, raw.level, ...tags]
        .map(v => String(v || '').toLowerCase()).join(' ');

    return {
        key,
        sourceMode,
        sourceFile,
        sourceTitle,
        grade,
        rawSubject,
        subject: rawSubject,
        course,
        standardCourse: String(raw.standardCourse || course || '').trim(),
        standardUnitKey,
        standardUnit,
        unitOrder,
        level: raw.level || '',
        normalizedLevel: normalizeCartLevel(raw.level),
        hasImage,
        tags,
        searchText,
        axis: raw.axis || meta._axis || '',
        school: meta.school || raw.school || '',
        year: raw.year || meta.year || '',
        raw
    };
}

function isOriginalArchiveSourceFile(file) {
    return String(file || '').trim().replace(/^exams\//, '').startsWith('original/');
}

function getCanonicalPool(sourceScope) {
    const scope = sourceScope === 'archive' ? 'archive' : 'paper';
    if (scope === 'archive') {
        return getQuestionIndexRecords()
            .filter(q => !isOriginalArchiveSourceFile(q.sourceFile) || shouldShowOriginalArchiveItems())
            .map(q => normalizeForFilter(q, 'archive', getSourceMetaForIndexRecord(q)));
    }
    return currentDisplayQuestions.map(q => normalizeForFilter(q, 'paper', getSourceMetaForFile(q._sourceFile)));
}

    };
}

function getUnitOrderForKey(unitKey) {
    const info = MASTER_TABLE[unitKey];
    return info ? Number(info.order || 999) : 999;
}

function applyMixerFilters(records, state) {
    const cartKeys = new Set(cart.map(c => c._qKey));
    const startOrder = state.unitStartKey ? getUnitOrderForKey(state.unitStartKey) : null;
    const endOrder = state.unitEndKey ? getUnitOrderForKey(state.unitEndKey) : null;
    const rangeCourse = normalizeCourseName(MASTER_TABLE[state.unitStartKey]?.course || MASTER_TABLE[state.unitEndKey]?.course || state.course || '');
    const minOrder = startOrder !== null && endOrder !== null ? Math.min(startOrder, endOrder) : startOrder;
    const maxOrder = startOrder !== null && endOrder !== null ? Math.max(startOrder, endOrder) : endOrder;

    return records.filter(record => {
        if (state.grade && record.grade !== state.grade) return false;
        if (state.course && record.course !== state.course) return false;
        if (state.unitKeys && state.unitKeys.length && !state.unitKeys.includes(record.standardUnitKey)) return false;
        if (state.unitStartKey || state.unitEndKey) {
            if (!record.standardUnitKey) return false;
            if (rangeCourse && record.course !== rangeCourse) return false;
            const order = Number(record.unitOrder || getUnitOrderForKey(record.standardUnitKey));
            if (minOrder !== null && order < minOrder) return false;
            if (maxOrder !== null && order > maxOrder) return false;
        }
        if (state.level && record.normalizedLevel !== state.level) return false;
        if (state.axis && record.axis !== state.axis) return false;
        if (state.school && !String(record.sourceTitle || record.school || '').toLowerCase().includes(state.school)) return false;
        if (state.year && String(record.year || '') !== String(state.year)) return false;
        if (state.cartState === 'in' && !cartKeys.has(record.key)) return false;
        if (state.cartState === 'out' && cartKeys.has(record.key)) return false;
        if (state.search && !record.searchText.includes(state.search)) return false;
        if (state.tags && state.tags.length) {
            const have = record.tags.map(t => String(t).toLowerCase());
            if (!state.tags.every(t => have.includes(t))) return false;
        }
        return true;
    });
}

function getFilteredCanonicalRecords() {
    const state = readFilterState();
    return applyMixerFilters(getCanonicalPool(state.sourceScope), state);
}

    return {

        standardUnitKey: record.raw.standardUnitKey || record.standardUnitKey,

    };

function buildCourseOptions(records, state) {
    const map = new Map();
    records.forEach(record => {
        if (state.grade && record.grade !== state.grade) return;
        if (!record.course) return;
        if (!map.has(record.course)) map.set(record.course, { label: record.course, course: record.course, count: 0 });
        map.get(record.course).count += 1;
    });
    return Array.from(map.values()).sort((a, b) => a.label.localeCompare(b.label, 'ko'));
}

function buildUnitOptions(records, state) {
    const map = new Map();
    records.forEach(record => {
        if (state.grade && record.grade !== state.grade) return;
        if (state.course && record.course !== state.course) return;
        if (!record.standardUnitKey || !record.standardUnit) return;
        const mapKey = `${record.course}::${record.standardUnitKey}`;
        if (!map.has(mapKey)) map.set(mapKey, { label: record.standardUnit, course: record.course, unitKey: record.standardUnitKey, order: Number(record.unitOrder || 999), count: 0 });
        map.get(mapKey).count += 1;
    });
    return Array.from(map.values()).sort((a, b) => (a.course || '').localeCompare(b.course || '', 'ko') || a.order - b.order || a.label.localeCompare(b.label, 'ko'));
}

function setSelectOptions(select, options, placeholder, valueKey = 'value', labelKey = 'label') {
    if (!select) return;
    const current = select.value;
    select.innerHTML = `<option value="">${placeholder}</option>`;
    options.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item[valueKey];
        opt.textContent = item.count ? `${item[labelKey]} (${item.count})` : item[labelKey];
        select.appendChild(opt);
    });
    if (options.some(item => String(item[valueKey]) === current)) select.value = current;
}

function refreshCascadeOptions() {
    const state = readFilterState();
    const pool = getCanonicalPool(state.sourceScope);
    const grades = Array.from(new Set(pool.map(r => r.grade).filter(Boolean))).sort((a, b) => a.localeCompare(b, 'ko'));
    setSelectOptions(document.getElementById('q-grade-filter'), grades.map(g => ({ value: g, label: g })), '전체 학년');
    const nextState = readFilterState();
    const courseOptions = buildCourseOptions(pool, nextState);
    setSelectOptions(document.getElementById('q-course-filter'), courseOptions.map(c => ({ value: c.course, label: c.label, count: c.count })), '전체 과목');
    const unitState = readFilterState();
    const unitOptions = buildUnitOptions(pool, unitState);
    setSelectOptions(document.getElementById('q-unit-start-filter'), unitOptions, '시작 단원', 'unitKey', 'label');
    setSelectOptions(document.getElementById('q-unit-end-filter'), unitOptions, '끝 단원', 'unitKey', 'label');
}

function describeSourceScope() {
    const state = readFilterState();
    if (state.sourceScope === 'archive') return '전체 아카이브';
    if (currentViewingSource && currentViewingSource.file === 'multi') return `선택한 시험지 ${selectedFiles.size || '여러'}개`;
    if (currentViewingSource) return `선택한 시험지: ${currentViewingSource.school || currentViewingSource.topic || currentViewingSource.file || ''}`;
    return '선택한 시험지';
}

function readDifficultyPlan() {
    const clamp = value => Math.max(0, Math.min(AUTOGEN_MAX_CART, parseInt(value, 10) || 0));
    return {
        high: clamp(document.getElementById('autogen-high-count')?.value),
        mid: clamp(document.getElementById('autogen-mid-count')?.value),
        low: clamp(document.getElementById('autogen-low-count')?.value),
        includeUnclassified: false
    };
}

function getSelectedUnitRangeLabel() {
    const startKey = document.getElementById('q-unit-start-filter')?.value || '';
    const endKey = document.getElementById('q-unit-end-filter')?.value || '';
    const labelFor = key => MASTER_TABLE[key]?.unit || '';
    if (startKey && endKey) return [`${labelFor(startKey)} ~ ${labelFor(endKey)}`];
    if (startKey) return [`${labelFor(startKey)}부터`];
    if (endKey) return [`${labelFor(endKey)}까지`];
    return ['전체 단원'];
}

function renderAvailabilitySummary() {
    const state = readFilterState();
    const filtered = getFilteredCanonicalRecords();
    const counts = { '상': 0, '중': 0, '하': 0, '기타': 0, '미분류': 0 };
    const unitSet = new Set();
    let imageCount = 0;
    filtered.forEach(record => {
        counts[record.normalizedLevel] = (counts[record.normalizedLevel] || 0) + 1;
        if (record.standardUnitKey) unitSet.add(`${record.course}::${record.standardUnitKey}`);
        if (record.hasImage) imageCount += 1;
    });
    const plan = readDifficultyPlan();
    const requested = plan.high + plan.mid + plan.low;
    const shortage = Math.max(0, plan.high - counts['상']) + Math.max(0, plan.mid - counts['중']) + Math.max(0, plan.low - counts['하']);
    const range = [state.grade || '전체 학년', state.course || '전체 과목'].concat(getSelectedUnitRangeLabel()).join(' / ');
    const sourceNote = document.getElementById('source-scope-note');
    if (sourceNote) sourceNote.textContent = `현재 출제 소스: ${describeSourceScope()}`;
    const setAvail = (id, n) => { const el = document.getElementById(id); if (el) el.textContent = `사용 가능 ${n}`; };
    setAvail('autogen-high-available', counts['상']);
    setAvail('autogen-mid-available', counts['중']);
    setAvail('autogen-low-available', counts['하']);
    const el = document.getElementById('availability-summary');
    if (el) {
        el.innerHTML = `<div class="availability-head"><span>선택 범위: ${escapeMixerHtml(range)}</span><span>${escapeMixerHtml(describeSourceScope())}</span></div>
            <div class="availability-grid">
                <div class="availability-cell"><span>사용 가능</span><strong>${filtered.length}</strong></div>
                <div class="availability-cell"><span>상/중/하</span><strong>${counts['상']}/${counts['중']}/${counts['하']}</strong></div>
                <div class="availability-cell"><span>미분류/이미지</span><strong>${counts['미분류']}/${imageCount}</strong></div>
                <div class="availability-cell"><span>단원/요청</span><strong>${unitSet.size}/${requested}</strong></div>
            </div>
            <div style="margin-top:6px; color:${shortage ? '#ef4444' : 'var(--green)'}; font-weight:900;">${shortage ? `부족 예상 ${shortage}문항` : '부족 없음'}</div>`;
    }
}

function encodeArchiveSessionPayload(payload) {
    return encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(payload)))));
}

function appendCurrentArchiveSessionToHash(url) {
    const session = getApmathSession();
    if (!session) return url;
    const payload = sanitizeApmathSessionForStorage({
        login_id: session.login_id || session.loginId || '',
        id: session.id || session.user?.id || '',
        name: session.name || session.user?.name || '',
        role: session.role || session.user?.role || session.auth?.role || '',
        session_token: session.session_token || '',
        expires_at: session.expires_at || ''
    });
    if (!payload.session_token && !payload.login_id) return url;
    return url + (url.indexOf('#') === -1 ? '#' : '&') + 'apmsess=' + encodeArchiveSessionPayload(payload);
}

function restoreApmathSessionFromHash() {
    const hash = String(window.location.hash || '');
    const match = /(?:^#|&)apmsess=([^&]+)/.exec(hash);
    if (!match) return false;

    try {
        const incoming = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(match[1])))));
        if (!incoming || (!incoming.session_token && !incoming.login_id)) return false;

        const existing = getApmathSession();
        const session = {
            ...(existing || {}),
            ...incoming,
            login_id: incoming.login_id || incoming.loginId || (existing && (existing.login_id || existing.loginId)) || '',
            id: incoming.id || (existing && existing.id) || '',
            name: incoming.name || (existing && existing.name) || '',
            role: incoming.role || (existing && existing.role) || '',
            session_token: incoming.session_token || (existing && existing.session_token) || '',
            expires_at: incoming.expires_at || (existing && existing.expires_at) || '',
            restored_from_archive_hash: true,
            restored_at: new Date().toISOString()
        };

        saveApmathSession(session);
        return true;
    } catch (e) {
        console.warn('[archive auth] failed to restore AP session from hash:', e);
        return false;
    } finally {
        try {
            history.replaceState(null, '', window.location.pathname + window.location.search);
        } catch (e) {}
    }
}

function ensureQuestionIndexLoaded(opts = {}) {
    const silent = opts.silent === true;
    if (questionIndexLoaded && getQuestionIndexRecords().length) return Promise.resolve(true);
    if (questionIndexLoadingPromise) return questionIndexLoadingPromise;
    if (!silent) setQuestionIndexStatus('전문항 인덱스 불러오는 중...');
    questionIndexLoadingPromise = new Promise(resolve => {
        const s = document.createElement('script');
        s.src = `question-index.js?v=${Date.now()}`;
        s.onload = () => {
            questionIndexLoaded = getQuestionIndexRecords().length > 0;
            questionIndexLoadingPromise = null;
            s.remove();
            if (questionIndexLoaded) {
                buildAutoGenUnitList();
                if (!silent) {
                    updateQuestionIndexUnitFilter();
                    updateQuestionStatus(getFilteredQuestionIndexRecords().length);
                    setQuestionIndexStatus(`전문항 ${getQuestionIndexRecords().length}문항 검색 준비`);
                }
                resolve(true);
            } else {
                if (!silent) setQuestionIndexStatus('전문항 인덱스를 불러오지 못했습니다.<br>question-index.js 생성 여부를 확인하세요.');
                resolve(false);
            }
        };
        s.onerror = () => {
            questionIndexLoadingPromise = null;
            s.remove();
            if (!silent) setQuestionIndexStatus('전문항 인덱스를 불러오지 못했습니다.<br>question-index.js 생성 여부를 확인하세요.');
            resolve(false);
        };
        document.body.appendChild(s);
    });
    return questionIndexLoadingPromise;
}

function getCachedQuestionFile(sourceFile) {

    }).catch(error => {

async function restoreIndexRecordToCart(record) {
    const normalized = record && record.raw ? record : normalizeForFilter(record, 'archive', getSourceMetaForIndexRecord(record));
    if (!normalized || cart.some(c => c._qKey === normalized.key)) return true;
    try {
        const questions = await getCachedQuestionFile(normalized.sourceFile);
        const original = questions.find(q => String(q?.id) === String(normalized.raw.id));
        if (!original) return false;
        cart.push({
            ...original,
            _sourceTitle: normalized.sourceTitle || getSourceTitleForIndexRecord(normalized.raw),
            _sourceFile: normalized.sourceFile,
            _qKey: normalized.key,
            standardUnit: original.standardUnit || normalized.standardUnit,
            standardUnitKey: original.standardUnitKey || normalized.standardUnitKey,
            standardCourse: original.standardCourse || normalized.standardCourse || normalized.course
        });
        return true;
    } catch (e) {
        console.warn('question restore failed:', normalized.sourceFile, normalized.raw.id, e);
        return false;
    }
}

}

    const picked = [];
    const buckets = {
        high: { label: '상', want: plan.high, list: filteredPool.filter(r => r.normalizedLevel === '상' && r.standardUnitKey && !cartKeys.has(r.key)) },
        mid: { label: '중', want: plan.mid, list: filteredPool.filter(r => r.normalizedLevel === '중' && r.standardUnitKey && !cartKeys.has(r.key)) },
        low: { label: '하', want: plan.low, list: filteredPool.filter(r => r.normalizedLevel === '하' && r.standardUnitKey && !cartKeys.has(r.key)) }
    };
    const reportRows = [];
    Object.values(buckets).forEach(bucket => {
        const take = bucket.list.slice(0, bucket.want);
        take.forEach(record => {
            if (!cartKeys.has(record.key) && picked.length + cart.length < AUTOGEN_MAX_CART) {
                picked.push(record);
                cartKeys.add(record.key);
            }
        });
        reportRows.push({ unit: 'filteredPool', level: bucket.label, requested: bucket.want, added: take.length, available: bucket.list.length });
    });
    return { picked, reportRows };
}

function pickQuestionsByBlueprint(filteredPool) {
    const cartKeys = new Set(cart.map(c => c._qKey));
    const picked = [];
    const reportRows = [];
    const rows = autoGenRows.filter(r => Number(r.count) > 0);
    rows.forEach(row => {
        const want = Math.max(1, Math.min(AUTOGEN_MAX_CART, parseInt(row.count, 10) || 0));
        const available = filteredPool.filter(record => !cartKeys.has(record.key) && record.standardUnitKey && matchesBlueprintRow(record, row));
        const take = available.slice(0, want);
        take.forEach(record => {
            if (!cartKeys.has(record.key) && picked.length + cart.length < AUTOGEN_MAX_CART) {
                picked.push(record);
                cartKeys.add(record.key);
            }
        });
        const unitLabel = row.unitKey ? (MASTER_TABLE[row.unitKey]?.unit || row.unitKey) : '전체 단원';
        reportRows.push({ unit: unitLabel, level: row.level || '전체', requested: want, added: take.length, available: available.length });
    });
    return { picked, reportRows };
}

async function applyPickedToCart(picked) {
    let added = 0;
    for (const record of picked) {
        if (cart.length >= AUTOGEN_MAX_CART) break;
        if (cart.some(c => c._qKey === record.key)) continue;
        if (record.sourceMode === 'archive') {
            const ok = await restoreIndexRecordToCart(record);
            if (ok) added += 1;
        } else {
            cart.push(makeCartItemFromRecord(record));
            added += 1;
        }
    }
    return added;
}

async function runAutoGenerate(mode) {
    const state = readFilterState();
    if (state.sourceScope === 'archive') {
        const ok = await ensureQuestionIndexLoaded({ silent: true });
        if (!ok) { alert('전문항 인덱스를 불러오지 못했습니다.\nquestion-index.js 생성 여부를 확인하세요.'); return; }
    }
    if (mode === 'rebuild') cart = cart.filter(c => pinnedKeys.has(c._qKey));
    const pool = getCanonicalPool(state.sourceScope);
    const filteredPool = applyMixerFilters(pool, state);
    const result = autoGenAdvanced ? pickQuestionsByBlueprint(filteredPool) : pickQuestionsByDifficulty(filteredPool, readDifficultyPlan());
    const before = cart.length;
    await applyPickedToCart(result.picked);
    const capped = cart.length >= AUTOGEN_MAX_CART && result.picked.length > (cart.length - before);
    updateCartUI();
    refreshFilterResults();
    renderAutoGenReport({ mode, rows: result.reportRows, capped, poolSize: filteredPool.length });
    setAutoGenOpen(true);
}

function renderAutoGenReport(report) {
    const el = document.getElementById('autogen-report');
    if (!el) return;
    const totalReq = report.rows.reduce((s, r) => s + r.requested, 0);
    const totalAdd = report.rows.reduce((s, r) => s + r.added, 0);
    const lack = totalReq - totalAdd;
    const head = `<div class="ag-report-head">
            <span>filteredPool <b>${report.poolSize ?? 0}</b>문항</span>
            <span>요청 <b>${totalReq}</b>문항</span>
            <span class="ok">담김 <b>${totalAdd}</b>문항</span>
            ${lack > 0 ? `<span class="miss">부족 <b>${lack}</b>문항</span>` : ''}
            ${report.mode === 'rebuild' ? '<span style="color:var(--gray-500);">(고정 유지 재구성)</span>' : ''}
        </div>`;
    const rowsHtml = report.rows.map(r => {
        const short = r.requested - r.added;
        const status = short > 0 ? `<span class="lack">${r.added}/${r.requested} (부족 ${short})</span>` : `<span class="full">${r.added}/${r.requested}</span>`;
        return `<div class="ag-report-row"><span>${escapeMixerHtml(r.unit)} / ${escapeMixerHtml(r.level)} / 가능 ${r.available ?? r.added}</span>${status}</div>`;
    }).join('');
    const cap = report.capped ? `<div class="ag-report-row" style="color:#9a3412;">카트 ${AUTOGEN_MAX_CART}문항 한도에 도달했습니다.</div>` : '';
    el.innerHTML = `<div class="ag-report-card">${head}${rowsHtml}${cap}</div>`;
}

function togglePin(qKey) {
    if (pinnedKeys.has(qKey)) pinnedKeys.delete(qKey); else pinnedKeys.add(qKey);
    updateCartUI();
}

function renderPrintReview() {
    const el = document.getElementById('print-review');
    if (!el) return;
    const qpp = Number(document.getElementById('print-qpp')?.value) || 4;
    const levelCounts = { '상': 0, '중': 0, '하': 0 };
    const unitSet = new Set();
    let pinned = 0;
    cart.forEach(q => {
        const lv = normalizeCartLevel(q.level);
        if (levelCounts[lv] !== undefined) levelCounts[lv] += 1;
        unitSet.add(getStandardizedUnit(q).unit || '미분류');
        if (pinnedKeys.has(q._qKey)) pinned += 1;
    });
    const pages = cart.length ? Math.ceil(cart.length / qpp) : 0;
    el.innerHTML = `
        <div class="print-review-title"><i class="fa-solid fa-clipboard-check"></i> 출력 전 검토</div>
        <div class="print-review-grid">

            <div class="print-review-cell"><span class="pr-label">난이도 상/중/하</span><span class="pr-value">${levelCounts['상']}/${levelCounts['중']}/${levelCounts['하']}</span></div>
            <div class="print-review-cell"><span class="pr-label">단원 수</span><span class="pr-value">${unitSet.size}</span></div>
            <div class="print-review-cell"><span class="pr-label">고정 문항</span><span class="pr-value">${pinned}</span></div>

}

        alert('현재 결과가 50문항을 초과합니다.\n검색어/학년/course/단원/난이도 필터를 더 좁힌 뒤 다시 시도하세요.');
        return;
    }
    for (const record of targets) {
        if (cart.some(c => c._qKey === record.key)) continue;
        if (record.sourceMode === 'archive') await restoreIndexRecordToCart(record);
        else cart.push(makeCartItemFromRecord(record));
    }
    updateCartUI(); refreshFilterResults();
}

function removeCurrentFilterAll() {
    const targetKeys = new Set(getFilteredCanonicalRecords().map(record => record.key));
    cart = cart.filter(q => !targetKeys.has(q._qKey));
    targetKeys.forEach(key => pinnedKeys.delete(key));
    updateCartUI(); refreshFilterResults();
}

async function loadMultipleExams() {

function fetchQuestionData(file) {
    return new Promise((res, rej) => {
        delete window.questions; delete window.questionBank;
        const s = document.createElement('script'); s.src = `exams/${file}?v=${Date.now()}`;
        s.onload = () => { const data = window.questions || window.questionBank; if (Array.isArray(data)) res(data); else rej(); s.remove(); };
        s.onerror = () => { rej(); s.remove(); }; document.body.appendChild(s);
    });
}

function renderQuestionList() {
    const container = document.getElementById('question-list'), viewMode = document.getElementById('q-view-mode')?.value || 'list';
    let displayRecords = getFilteredCanonicalRecords();
    updateQuestionStatus(displayRecords.length);
    renderAvailabilitySummary();
    if (readFilterState().sourceScope === 'archive') {
        renderQuestionIndexList(container, displayRecords);
        return;
    }
    if(!displayRecords.length) { container.innerHTML = '<div class="empty-placeholder"><p>표시할 문항이 없습니다.</p></div>'; return; }
    container.innerHTML = '';
    if(viewMode === 'group') {
        const groups = {};
        displayRecords.forEach(record => { const key = record.standardUnit || '미분류'; if (!groups[key]) groups[key] = { list: [], order: (COURSE_BASE_ORDER[record.course] || 90000) + record.unitOrder }; groups[key].list.push(record); });
        Object.keys(groups).sort((a,b)=>groups[a].order-groups[b].order).forEach(name => {
            const gDiv = document.createElement('div'); gDiv.innerHTML = `<div style="padding:10px 20px; background:var(--gray-50); font-weight:800; font-size:13px; border-bottom:1px solid var(--gray-200);">${escapeMixerHtml(name)}</div>`;
            groups[name].list.forEach(record => gDiv.appendChild(createQuestionItem(record))); container.appendChild(gDiv);
        });
    } else { displayRecords.forEach(record => container.appendChild(createQuestionItem(record))); }
    if (window.MathJax) MathJax.typesetPromise([container]);
}

function escapeMixerHtml(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function summarizeIndexText(value, limit = 180) {
    const text = String(value || '').replace(/\s+/g, ' ').trim();
    return text.length > limit ? `${text.slice(0, limit)}...` : text;
}

function renderQuestionIndexList(container, displayRecords) {
    if (!questionIndexLoaded) return;
    if(!displayRecords.length) { container.innerHTML = '<div class="empty-placeholder"><p>표시할 문항이 없습니다.</p></div>'; return; }
    const visibleRecords = displayRecords.slice(0, 200);
    container.innerHTML = '';
    if (displayRecords.length > 200) {
        const note = document.createElement('div');
        note.className = 'q-result-note';
        note.textContent = `검색 결과 ${displayRecords.length}문항 중 200문항만 표시 중입니다. 검색어 또는 필터를 더 좁혀 주세요.`;
        container.appendChild(note);
    }
    visibleRecords.forEach(record => container.appendChild(createQuestionIndexItem(record)));
}

    const isAdded = cart.some(c => c._qKey === key);
    const div = document.createElement('div');

            <span class="q-unit-tag">${escapeMixerHtml(record.course || '기타')}</span>

            ${record.hasImage ? '<span class="q-unit-tag" style="background:#ecfdf5; color:#047857;">이미지 있음</span>' : ''}
        </div><span class="q-num">${escapeMixerHtml(q.id)}번</span><span style="font-size:11px; color:#999; margin-left:10px;" class="q-source-file">${escapeMixerHtml(record.sourceFile)}</span></div>
        <button class="btn-add-cart ${isAdded ? 'in' : ''}" onclick='toggleIndexCart(${safeKey})'><i class="fa-solid ${isAdded ? 'fa-check' : 'fa-plus'}"></i>${isAdded ? '담김' : '담기'}</button></div>
        <div class="q-content">${escapeMixerHtml(summarizeIndexText(q.contentText || q.content))}</div>`;

async function toggleIndexCart(qKey) {
    const idx = cart.findIndex(c => c._qKey === qKey);

        cart.splice(idx, 1);
        pinnedKeys.delete(qKey);

        const record = getCanonicalPool('archive').find(q => q.key === qKey);

            const ok = await restoreIndexRecordToCart(record);

        }

}

function createQuestionItem(record) {

    const key = record.key || q._qKey;
    const isAdded = cart.some(c => c._qKey === key), div = document.createElement('div');
    div.className = 'q-item';
    let choicesHTML = (q.choices && q.choices.length > 0 && q.choices[0] !== '주관식') ? `<div class="q-choices">` + q.choices.map((c, i) => `<div class="choice-row"><span style="font-weight:700; color:var(--gray-500); min-width:24px;">(${i+1})</span><span>${c}</span></div>`).join('') + `</div>` : '';
    const safeKey = JSON.stringify(key);

        <button class="btn-add-cart ${isAdded ? 'in' : ''}" onclick='toggleCart(${safeKey})'><i class="fa-solid ${isAdded ? 'fa-check' : 'fa-plus'}"></i>${isAdded ? '담김' : '담기'}</button></div>
        <div class="q-content">${q.content || ''}</div>${q.image ? `<img src="${q.image}" class="q-image">` : ''}${choicesHTML}`;
    return div;

function toggleCart(qKey) {
    const idx = cart.findIndex(c => c._qKey === qKey);
    if(idx > -1) { cart.splice(idx, 1); pinnedKeys.delete(qKey); }
    else {
        const record = getCanonicalPool('paper').find(it => it.key === qKey);
        if(record) cart.push(makeCartItemFromRecord(record));
    }
    updateCartUI(); refreshFilterResults();
}

function normalizeCartLevel(level) {
    const raw = String(level || '').trim();
    if (!raw) return '미분류';
    const compact = raw.replace(/[\[\]\s]/g, '');
    if (compact === '미입력' || compact === '미분류') return '미분류';
    if (compact === '상') return '상';
    if (compact === '중') return '중';
    if (compact === '하') return '하';
    return '기타';
}

function renderCartAnalysis() {
    const el = document.getElementById('cart-analysis');
    if (!el) return;
    const levelCounts = { '상': 0, '중': 0, '하': 0, '기타': 0, '미분류': 0 };
    const unitCounts = new Map();

    cart.forEach(q => {
        levelCounts[normalizeCartLevel(q.level)] += 1;
        const std = getStandardizedUnit(q);
        const unit = std.unit || '미분류';
        unitCounts.set(unit, (unitCounts.get(unit) || 0) + 1);
    });

    const unitRows = Array.from(unitCounts.entries())
        .sort((a, b) => b[1] - a[1] || String(a[0]).localeCompare(String(b[0])))
        .slice(0, 10);
    const unitHtml = unitRows.length
        ? unitRows.map(([unit, count]) => `<div class="cart-unit-row"><span>${unit}</span><strong>${count}</strong></div>`).join('')
        : '<div class="cart-unit-row"><span>미분류</span><strong>0</strong></div>';

    el.innerHTML = `
        <div class="cart-analysis-title">카트 분석</div>
        <div class="cart-analysis-grid">
            <div class="cart-analysis-stat"><span class="cart-analysis-label">총 문항</span><span class="cart-analysis-value">${cart.length}</span></div>
            <div class="cart-analysis-stat"><span class="cart-analysis-label">상</span><span class="cart-analysis-value">${levelCounts['상']}</span></div>
            <div class="cart-analysis-stat"><span class="cart-analysis-label">중</span><span class="cart-analysis-value">${levelCounts['중']}</span></div>
            <div class="cart-analysis-stat"><span class="cart-analysis-label">하</span><span class="cart-analysis-value">${levelCounts['하']}</span></div>
            <div class="cart-analysis-stat"><span class="cart-analysis-label">기타</span><span class="cart-analysis-value">${levelCounts['기타']}</span></div>
            <div class="cart-analysis-stat"><span class="cart-analysis-label">미분류</span><span class="cart-analysis-value">${levelCounts['미분류']}</span></div>
        </div>
        <div class="cart-unit-list">${unitHtml}</div>`;
}

function updateCartUI() {
    document.getElementById('cart-count').innerText = cart.length;
    const cartStatus = document.getElementById('cur-cart-count');
    if (cartStatus) cartStatus.innerText = `${cart.length}문항`;
    const mNum = document.getElementById('mobile-cart-count-num');
    if (mNum) mNum.innerText = cart.length;
    renderCartAnalysis();
    document.getElementById('cart-items').innerHTML = cart.map(c => {
        const std = getStandardizedUnit(c);

        return `<div class="cart-item${pinned ? ' pinned' : ''}"><span style="font-size:12px; font-weight:700;"><span style="color:var(--blue); font-size:10px; margin-right:4px;">[${std.unit}]</span><span style="color:#64748b; font-size:10px; margin-right:4px;">[${c.level || '미'}]</span>${c._sourceTitle} ${c.id}번</span><span class="cart-item-actions"><i class="fa-solid fa-thumbtack ag-pin" title="${pinned ? '고정 해제' : '고정'}" onclick='togglePin(${safeKey})'></i><i class="fa-solid fa-xmark" style="cursor:pointer; color:#ccc;" onclick='toggleCart(${safeKey})'></i></span></div>`;
    }).join('');
    renderPrintReview();
}

/* AP Math OS 선생님 → 반 선택 헬퍼 */
let _mixerQrClassRows = [];
let _mixerQrGroupedByTeacher = {};

function mixerEscapeModalText(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function getMixerQrTeacherName(row) {
    const raw = row?.teacher_name || row?.teacherName || row?.teacher || row?.owner_name || row?.ownerName || '';
    const name = String(raw || '').replace(/\s*선생님\s*$/g, '').trim();
    return name || '담당 미지정';
}

function sortMixerQrClassesForSelect(list) {
    const gradeRank = { '중1': 1, '중2': 2, '중3': 3, '고1': 4, '고2': 5, '고3': 6 };
    return [...list].sort((a, b) => {
        const ag = gradeRank[String(a.grade || '').trim()] || 99;
        const bg = gradeRank[String(b.grade || '').trim()] || 99;
        if (ag !== bg) return ag - bg;
        const nameDiff = String(a.name || '').localeCompare(String(b.name || ''), 'ko');
        if (nameDiff !== 0) return nameDiff;
        return String(a.id || '').localeCompare(String(b.id || ''), 'ko');
    });
}

function renderMixerTeacherClassSelector(classes) {
    _mixerQrClassRows = Array.isArray(classes) ? classes : [];
    _mixerQrGroupedByTeacher = {};

    _mixerQrClassRows.forEach(c => {
        const teacher = getMixerQrTeacherName(c);
        if (!_mixerQrGroupedByTeacher[teacher]) _mixerQrGroupedByTeacher[teacher] = [];
        _mixerQrGroupedByTeacher[teacher].push(c);
    });

    const teachers = Object.keys(_mixerQrGroupedByTeacher).sort((a, b) => a.localeCompare(b, 'ko'));
    if (!teachers.length) {
        return '<div style="color:#ef4444; font-size:13px;">등록된 반이 없습니다. AP Math OS에서 반을 먼저 생성하세요.</div>';
    }

    const teacherOptions = teachers.map(t => `<option value="${mixerEscapeModalText(t)}">${mixerEscapeModalText(t)} 선생님</option>`).join('');
    return `
        <div style="display:flex; flex-direction:column; gap:12px; text-align:left;">
            <div>
                <label style="display:block; margin-bottom:6px; font-size:12px; font-weight:800; color:var(--gray-500);">1. 선생님 선택</label>
                <select id="modal-teacher-select" class="form-select" style="width:100%;" onchange="renderMixerClassSelectByTeacher()">${teacherOptions}</select>
            </div>
            <div>
                <label style="display:block; margin-bottom:6px; font-size:12px; font-weight:800; color:var(--gray-500);">2. 반 선택</label>
                <select id="modal-class-select" class="form-select" style="width:100%;"></select>
                <div style="margin-top:8px; font-size:11px; font-weight:700; line-height:1.5; color:var(--gray-500);">같은 반명이라도 선택한 선생님의 class_id로 분리되어 QR에 연결됩니다.</div>
            </div>
        </div>`;
}

function renderMixerClassSelectByTeacher() {
    const teacherSelect = document.getElementById('modal-teacher-select');
    const classSelect = document.getElementById('modal-class-select');
    if (!teacherSelect || !classSelect) return;

    const teacher = teacherSelect.value || Object.keys(_mixerQrGroupedByTeacher)[0] || '';
    const rows = sortMixerQrClassesForSelect(_mixerQrGroupedByTeacher[teacher] || []);

    classSelect.innerHTML = rows.map(c => {
        const labelParts = [c.name || '이름 없는 반', c.grade ? `(${c.grade})` : ''].filter(Boolean).join(' ');
        return `<option value="${mixerEscapeModalText(c.id)}" data-teacher="${mixerEscapeModalText(teacher)}" data-class-name="${mixerEscapeModalText(c.name || '')}">${mixerEscapeModalText(labelParts)}</option>`;
    }).join('');
}

function encodeMixerBasicAuth(value) {
    const str = String(value || '');
    try {
        return btoa(unescape(encodeURIComponent(str)));
    } catch (e) {
        return btoa(str);
    }
}

function getMixerAssignmentAuthHeader() {
    try {
        const session = getApmathSession();
        if (!session) return null;

        if (session.session_token) {
            return { 'Authorization': 'Bearer ' + session.session_token };
        }

        const mem = window.__APMATH_AUTH_MEMORY || {};
        const loginId = mem.login_id || session.login_id || session.loginId;
        const rawPassword = mem.raw_password || session.raw_password;

        if (!loginId || !rawPassword) return null;
        return { 'Authorization': 'Basic ' + encodeMixerBasicAuth(`${loginId}:${rawPassword}`) };
    } catch (e) {
        return null;
    }
}

function setMixerClassModalFooterVisible(visible) {
    const footer = document.getElementById('class-modal-footer');
    if (footer) footer.style.display = visible ? 'flex' : 'none';
}

function renderMixerQrAuthFallback(body) {
    setMixerClassModalFooterVisible(false);
    body.innerHTML = '<div style="display:flex; flex-direction:column; gap:12px; color:var(--gray-700); font-size:13px; line-height:1.5;">'
        + '<div style="color:#ef4444; font-weight:700;">AP Math OS &#47196;&#44536;&#51064; &#51221;&#48372;&#44032; &#50630;&#50612; &#48152; &#47785;&#47197;&#51012; &#48520;&#47084;&#50732; &#49688; &#50630;&#49845;&#45768;&#45796;.</div>'
        + '<div>&#54617;&#49373; &#50724;&#45813; &#49688;&#51665; QR &#49884;&#54744;&#51648;&#45716; &#47196;&#44536;&#51064; &#54980; &#49324;&#50857;&#54624; &#49688; &#51080;&#49845;&#45768;&#45796;.<br>&#51068;&#48152; &#49884;&#54744;&#51648;&#45716; &#48148;&#47196; &#52636;&#47141;&#54624; &#49688; &#51080;&#49845;&#45768;&#45796;.</div>'
        + '<button class="btn-main" onclick="closeClassModal(); openMixedEngine(false)">&#51068;&#48152; &#49884;&#54744;&#51648; &#52636;&#47141;</button>'
        + "<button class=\"btn-main\" style=\"background:var(--navy);\" onclick=\"location.href='../apmath/'\">AP Math OS&#47196; &#46028;&#50500;&#44032;&#44592;</button>"
        + '<button class="btn-main" style="background:var(--gray-500);" onclick="closeClassModal()">&#52712;&#49548;</button>'
        + '</div>';
}

async function openClassSelectionModal() {
    const overlay = document.getElementById('class-modal-overlay'), body = document.getElementById('class-modal-body');
    overlay.style.display = 'flex'; body.innerHTML = '<p style="text-align:center; padding:20px; color:var(--gray-500);">반 목록을 불러오는 중...</p>';
    setMixerClassModalFooterVisible(false);

    // [5G] APMATH_SESSION 인증 정보 로드
    const authHeader = getMixerAssignmentAuthHeader();
    if (!authHeader) {
        renderMixerQrAuthFallback(body);
        return;
    }
    try {
        const res = await fetch(`${ARCHIVE_AP_API_BASE}/qr-classes`, { headers: authHeader });
        if (res.status === 401) { body.innerHTML = mixerQrNoticeHtml(ARCHIVE_QR_LOGIN_REQUIRED_MESSAGE); return; }
        if (res.status === 403) {
            body.innerHTML = mixerQrNoticeHtml(ARCHIVE_QR_FORBIDDEN_MESSAGE);
            return;
        }
        const data = await res.json();
        if (data && data.success && Array.isArray(data.classes)) {
            if (data.classes.length === 0) {
                body.innerHTML = '<div style="color:red; font-size:13px;">등록된 반이 없습니다. AP Math OS에서 반을 먼저 생성하세요.</div>'; return;
            }
            body.innerHTML = renderMixerTeacherClassSelector(data.classes);
            renderMixerClassSelectByTeacher();
            setMixerClassModalFooterVisible(true);
        } else { throw new Error(); }
    } catch(e) { body.innerHTML = mixerQrNoticeHtml(ARCHIVE_QR_NETWORK_MESSAGE); }
}

function closeClassModal() { document.getElementById('class-modal-overlay').style.display = 'none'; }
function confirmClassSelection() {
    const s = document.getElementById('modal-class-select');
    if (!s || !s.value) return;
    const selectedOption = s.options[s.selectedIndex];
    const teacherName = selectedOption?.dataset?.teacher || document.getElementById('modal-teacher-select')?.value || '';
    const className = selectedOption?.dataset?.className || '';
    closeClassModal();
    openMixedEngine(true, s.value, { teacherName, className });
}

function getLevelRank(level, mode = 'high-first') {
    const table = mode === 'low-first' ? { "하": 1, "중": 2, "상": 3 } : { "상": 1, "중": 2, "하": 3 };
    return table[String(level || '').trim()] ?? 999;
}

// 서버 저장(엔진 통합 Phase 4): 성공하면 key가 어느 기기·시점에서든(학생 QR 스캔 포함)
// 재출력 가능해진다. 실패해도(오프라인/미배포 등) 로컬 핸드오프로 즉시 폴백해
// "일반 시험지 출력"은 항상 되게 한다 — 로그인 여부와 무관.
async function saveMixerSetToServer(questions, meta) {
    try {
        const authHeader = getMixerAssignmentAuthHeader() || {};
        const res = await fetch(`${ARCHIVE_AP_API_BASE}/mixer-sets`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...authHeader },
            body: JSON.stringify({ questions, meta })
        });
        if (!res.ok) return null;
        const data = await res.json().catch(() => null);
        return (data && data.success && data.key) ? String(data.key) : null;
    } catch (e) {
        console.warn('[mixer] server set save failed, falling back to local handoff:', e);
        return null;
    }
}

async function openMixedEngine(withSubmitQr = false, classId = "", options = {}) {
    if(cart.length === 0) return alert('카트가 비어있습니다.');
    const orderMode = document.getElementById('cart-level-order').value;
    let exportCart = [...cart];
    if (orderMode === 'high-first' || orderMode === 'low-first') {
        exportCart.sort((a,b) => getLevelRank(a.level, orderMode) - getLevelRank(b.level, orderMode) || (a.id||0)-(b.id||0));
    }
    const customTitle = String(document.getElementById('mixed-title-input')?.value || '').trim();
    const autoTitle = currentViewingSource ? (currentViewingSource.school || currentViewingSource.topic || currentViewingSource.file || `믹서 출제 (${exportCart.length}문항)`) : `믹서 출제 (${exportCart.length}문항)`;
    const identityTitle = customTitle || autoTitle;
    const qpp = parseInt(document.getElementById('print-qpp').value, 10) || 4;
    const meta = {
        title: identityTitle,
        identityTitle,
        count: exportCart.length,
        qpp,
        generatedAt: new Date().toISOString(),
        printHeaderOptions: {
            title: identityTitle,
            metaRight: '',
            subtitle: '',
            showNameLine: true,
            showScoreLine: true,
            applyToSolution: true,
            applyToAnswer: true
        }
    };
    const sessionKey = (await saveMixerSetToServer(exportCart, meta)) || 'mix_' + Date.now();
    localStorage.setItem('mixedQuestions_' + sessionKey, JSON.stringify(exportCart));
    localStorage.setItem('mixedMeta_' + sessionKey, JSON.stringify(meta));
    let url = `mixed_engine.html?qpp=${qpp}&key=${sessionKey}`;
    if (withSubmitQr) {
        url += '&submitQr=1';
        if (classId) url += '&class=' + encodeURIComponent(classId);
        if (options.teacherName) url += '&teacher=' + encodeURIComponent(options.teacherName);
        if (options.className) url += '&className=' + encodeURIComponent(options.className);
    }
    const win = window.open(appendCurrentArchiveSessionToHash(url), '_blank');
    if (!win) alert('팝업이 차단되었습니다. 팝업 차단을 해제한 뒤 다시 시도하세요.');
}

        engineDB.exams = exams.map(normalizeExamMeta);
