<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AP수학 엔진 v7.5.0</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], macros: { tf: ['\\dfrac{#1}{#2}', 2], implies: '\\Rightarrow', therefore: '\\therefore' } },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        @page { size: A4; margin: 0; }
        body { margin: 0; font-family: 'Nanum Myeongjo', serif; font-size: 9.5pt; background: #f1f5f9; padding-top: 50px; }
        #mode-ctrl { position: fixed; top: 0; left: 0; width: 100%; height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; background: white; z-index: 1000; border-bottom: 1px solid #e2e8f0; }
        .page { width: 210mm; height: 297mm; padding: 15mm; margin: 0 auto 10mm auto; background: #fff; page-break-after: always; display: flex; flex-direction: column; box-sizing: border-box; }
        .content-container { display: flex; flex: 1; width: 100%; height: 100%; overflow: hidden; }
        body.test-mode .content-container { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10mm; }
        body.test-mode .item { height: 125mm; overflow: hidden; border: 1px solid #f1f5f9; padding: 5mm; box-sizing: border-box; display: flex; flex-direction: column; }
        body.sol-mode .content-container { display: block; }
        body.sol-mode .item { border-bottom: 1px dashed #cbd5e1; padding-bottom: 10mm; margin-bottom: 10mm; }
        .sol-mode-only { display: none; }
        body.sol-mode .sol-mode-only { display: block; }
        @media print { .no-print { display: none !important; } body { padding-top: 0; } .page { margin: 0; } }
    </style>
</head>
<body class="test-mode">
    <div id="mode-ctrl" class="no-print">
        <button onclick="location.href='index.html'">뒤로가기</button>
        <div>
            <button onclick="setMode('test-mode')">시험</button>
            <button onclick="setMode('sol-mode')">해설</button>
            <button onclick="setMode('ans-mode')">정답</button>
        </div>
    </div>
    <div id="print-area"></div>
    <div id="item-pool" style="display:none;"></div>

<script>
const AppState = { title: "" };
const CIRCLED = ['①','②','③','④','⑤'];

function secureFormat(text) {
    if (!text) return "";
    const mathChunks = [];
    const protected = String(text).replace(/\$[\s\S]*?\$/g, m => { mathChunks.push(m); return '\x00MATH\x00'; });
    let escaped = protected.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/&lt;br\s*\/?&gt;/gi, '<br>').replace(/&lt;b&gt;(.*?)&lt;\/b&gt;/gi, '<b>$1</b>');
    return escaped.split('\x00MATH\x00').map((p, i) => p + (mathChunks[i] || "")).join('');
}

function renderItems() {
    const pool = document.getElementById('item-pool');
    pool.innerHTML = (window.questionBank || []).map((q, i) => {
        const isSub = !q.choices || q.choices.length < 5;
        return `
        <div class="item">
            <div style="font-size:7.5pt; color:#94a3b8;">[${q.level || '중'}] ${q.category || '기출'}</div>
            <div style="flex:1;">
                <b>${i+1}.</b> ${secureFormat(q.content)}
                ${!isSub ? `<div style="margin-top:10px;">${q.choices.map((c, ci) => `<div>${CIRCLED[ci]} ${secureFormat(c)}</div>`).join('')}</div>` : ''}
            </div>
            ${isSub ? `<div style="margin-top:auto; border:1px solid #ccc; height:35mm; background:#f8fafc;"></div>` : ''}
            <div class="sol-mode-only" style="margin-top:10px; padding-top:10px; border-top:1px dashed #eee;">
                <b style="color:#10b981;">[해설]</b> ${secureFormat(q.solution)}
                <div style="text-align:right; color:#ef4444; font-weight:bold;">정답: ${q.answer}</div>
            </div>
        </div>`;
    }).join('');
}

async function initRender() {
    renderItems();
    if (window.MathJax?.startup?.promise) {
        await MathJax.startup.promise;
        await MathJax.typesetPromise();
    }
    paginate();
}

function paginate() {
    const printArea = document.getElementById('print-area');
    printArea.innerHTML = '';
    const items = Array.from(document.getElementById('item-pool').querySelectorAll('.item'));
    const mode = document.body.className;
    
    const addPage = (suffix = "") => {
        const page = document.createElement('div'); page.className = 'page';
        page.innerHTML = `<div style="border-bottom:2px solid #1e293b; padding-bottom:5px; margin-bottom:15px; font-weight:bold; display:flex; justify-content:space-between;">
            <span>${AppState.title} ${suffix}</span><span>- ${printArea.children.length + 1} -</span>
        </div><div class="content-container"></div>`;
        printArea.appendChild(page);
        return page;
    };

    // [버그 5] ans-mode 분기 복구
    if (mode === 'ans-mode') {
        const page = addPage("[정답표]");
        const bank = window.questionBank || [];
        let html = `<table style="width:100%; border-collapse:collapse; margin-top:10px;">`;
        for (let i = 0; i < bank.length; i += 5) {
            html += '<tr>';
            for (let j = i; j < i + 5; j++) {
                if (j < bank.length) {
                    html += `<td style="border:1px solid #ccc; padding:8px; text-align:center; background:#f8fafc; font-weight:bold; width:40px;">${j+1}</td>
                             <td style="border:1px solid #ccc; padding:8px; text-align:center;">${bank[j].answer}</td>`;
                } else {
                    html += `<td style="border:1px solid #ccc; width:40px;"></td><td style="border:1px solid #ccc;"></td>`;
                }
            }
            html += '</tr>';
        }
        html += '</table>';
        page.querySelector('.content-container').innerHTML = html;
        return;
    }

    let currentPage = addPage(mode === 'sol-mode' ? "[해설지]" : "");
    
    // [버그 3] 높이 누적 추적 방식 (MathJax 렌더링 후 정확한 높이 측정)
    if (mode === 'sol-mode') {
        const PAGE_HEIGHT_PX = 267 * 3.7795; 
        let usedHeight = 80; 

        items.forEach(item => {
            const clone = item.cloneNode(true);
            clone.style.visibility = 'hidden';
            clone.style.position = 'absolute';
            document.body.appendChild(clone);
            const h = clone.offsetHeight + 40; 
            document.body.removeChild(clone);

            if (usedHeight + h > PAGE_HEIGHT_PX && usedHeight > 80) {
                currentPage = addPage("[해설지]");
                usedHeight = 80;
            }
            currentPage.querySelector('.content-container').appendChild(item.cloneNode(true));
            usedHeight += h;
        });
    } else {
        items.forEach((item, idx) => {
            if (idx > 0 && idx % 4 === 0) currentPage = addPage();
            currentPage.querySelector('.content-container').appendChild(item.cloneNode(true));
        });
    }
}

function setMode(m) { document.body.className = m; initRender(); }

(function load() {
    const params = new URLSearchParams(window.location.search);
    AppState.title = params.get('title') || '제목 없음';
    const file = params.get('data');
    if (!file) return;

    const s = document.createElement('script');
    s.src = file + '?v=' + Date.now();
    s.onload = initRender;
    s.onerror = () => {
        document.getElementById('print-area').innerHTML = `<div style="padding:50px; color:#ef4444; text-align:center;">
            <h2>❌ 데이터 로드 실패</h2>경로 확인: <b>${file}</b></div>`;
    };
    document.body.appendChild(s);
})();
</script>
</body>
</html>
