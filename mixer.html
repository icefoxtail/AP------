<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS아카이브 | 믹서 출제 (v3.5.6 Final-Fix)</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']], packages: {'[+]': ['ams', 'boldsymbol']} },
            options: { enableMenu: false },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        :root {
            --navy: #07111f; --navy-2: #0c1a2e; --navy-3: #12233f;
            --blue: #2563eb; --blue-dark: #1d4ed8; --blue-soft: #eff6ff;
            --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
            --gray-300: #cbd5e1; --gray-500: #64748b;
            --text-main: #0f172a; --radius-md: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--gray-50); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }
        header { background: var(--navy); height: 58px; display: flex; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { color: white; text-decoration: none; font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .logo em { color: #60a5fa; font-style: normal; }

        .mixer-container { display: flex; height: calc(100vh - 58px); }
        .panel { display: flex; flex-direction: column; background: white; border-right: 1px solid var(--gray-200); height: 100%; min-width: 0; }
        .panel-header { padding: 15px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; min-height: 58px; flex-shrink: 0; }
        .panel-body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }

        .panel-papers { width: 340px; flex-shrink: 0; background: var(--gray-50); }
        .filter-area { padding: 15px 20px; border-bottom: 1px solid var(--gray-200); background: white; display: flex; flex-direction: column; gap: 8px; }
        .search-box { position: relative; }
        .search-box i { position: absolute; left: 12px; top: 12px; color: var(--gray-300); }
        .search-box input { width: 100%; height: 38px; padding: 0 12px 0 34px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; outline: none; }
        .filter-row { display: flex; gap: 6px; }
        .form-select { width: 100%; height: 36px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 12px; font-weight: 600; outline: none; background: white; }

        .exam-bulk-bar { padding: 12px 20px; background: var(--blue-soft); border-bottom: 1px solid var(--gray-200); }
        .exam-bulk-top { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; font-weight: 800; color: var(--blue-dark); }
        .exam-bulk-actions { display: flex; gap: 6px; }
        .panel-action { flex: 1; padding: 6px 0; font-size: 11.5px; font-weight: 700; background: white; border: 1px solid var(--blue); color: var(--blue); border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .panel-action.primary { background: var(--blue); color: white; }

        .paper-item { padding: 14px 16px; border-radius: 12px; background: white; border: 1px solid var(--gray-200); margin-bottom: 10px; transition: 0.2s; position: relative; }
        @media (min-width: 901px) { .paper-item { cursor: pointer; } .paper-item:hover { border-color: var(--blue); } }
        .paper-item.active { border-color: var(--blue); background: var(--blue-soft); box-shadow: inset 0 0 0 1px var(--blue); }
        .paper-item.selected { border-color: var(--blue-dark); background: #eef2ff; }
        .exam-item-head { display: flex; gap: 10px; align-items: flex-start; }
        .exam-check-wrap { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; flex-shrink: 0; cursor: pointer; margin-top: -4px; margin-left: -6px; }
        .exam-check { width: 18px; height: 18px; accent-color: var(--blue); cursor: pointer; }
        .paper-name { font-size: 14.5px; font-weight: 800; line-height: 1.35; color: var(--text-main); margin-bottom: 6px; word-break: keep-all; }
        .paper-sub { font-size: 11.5px; color: var(--gray-500); margin-bottom: 8px; }
        .paper-meta-line { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .meta-badge { display: inline-flex; align-items: center; min-height: 22px; padding: 0 8px; border-radius: 6px; font-size: 10px; font-weight: 800; color: #475569; background: #f8fafc; border: 1px solid #e2e8f0; }
        .meta-badge.primary { color: var(--blue); background: #eff6ff; border-color: #dbeafe; }
        .meta-badge.green { color: #047857; background: #ecfdf5; border-color: #b7efd4; }
        .paper-file-name { font-size: 10px; color: #94a3b8; border-top: 1px dashed #e2e8f0; padding-top: 8px; margin-top: 4px; word-break: break-all; }

        .exam-card-actions { display: none; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--gray-100); }
        .exam-card-btn { flex: 1; height: 40px; border-radius: 8px; font-size: 12.5px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; border: 1px solid var(--gray-200); background: white; cursor: pointer; }
        .exam-card-btn.preview { color: var(--gray-500); }
        .exam-card-btn.select { border-color: var(--blue); color: var(--blue); }
        .exam-card-btn.select.active { background: var(--blue); color: white; border-color: var(--blue); }

        .panel-questions { flex: 1; min-width: 0; }
        .auto-range-bar { padding: 12px 20px; border-bottom: 1px solid var(--gray-100); background: #fdfdfe; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
        .range-group { display: flex; align-items: center; gap: 6px; }
        .range-group label { font-size: 11px; font-weight: 800; color: var(--gray-500); }
        .range-select { height: 32px; border: 1px solid var(--gray-200); border-radius: 6px; font-size: 11px; font-weight: 700; background: white; max-width: 130px; }
        .auto-count-input { width: 48px; height: 32px; border: 1px solid var(--gray-200); border-radius: 6px; text-align: center; font-weight: 700; font-size: 12px; }

        .q-item { padding: 30px; border-bottom: 1px solid var(--gray-100); }
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .q-num { font-size: 16px; font-weight: 900; color: var(--blue); }
        .q-content { font-size: 15px; line-height: 1.8; white-space: pre-wrap; word-break: keep-all; }
        .q-image { max-width: 100%; margin: 15px 0; border-radius: 8px; display: block; border: 1px solid var(--gray-100); }
        .q-choices { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 18px; }
        .choice-row { display: flex; gap: 10px; font-size: 14px; }
        .choice-num { font-weight: 700; color: var(--gray-500); min-width: 24px; }
        .unit-group-header { padding: 12px 20px; background: var(--gray-50); border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
        .btn-add-q { height: 34px; padding: 0 12px; border-radius: 8px; border: 1px solid var(--gray-200); background: white; font-size: 11.5px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-add-q.in-cart { background: var(--blue); color: white; border-color: var(--blue); }

        .panel-cart { width: 340px; flex-shrink: 0; border-right: none; }
        .cart-item { padding: 12px; border: 1px solid var(--gray-100); border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; background: white; }
        .cart-q-text { font-size: 12px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cart-footer { padding: 20px; border-top: 1px solid var(--gray-100); background: white; position: sticky; bottom: 0; }
        .btn-main { width: 100%; height: 52px; border: none; border-radius: var(--radius-md); background: var(--blue); color: white; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        @media (max-width: 900px) {
            .mixer-container { flex-direction: column; height: auto; }
            .panel { width: 100%; height: auto; border-right: none; }
            .panel-papers { max-height: 450px; }
            .exam-card-actions { display: flex; }
            .panel-cart { position: sticky; bottom: 0; z-index: 900; border-top: 1px solid var(--gray-200); box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo"><i class="fa-solid fa-layer-group"></i><span><em>JS</em>아카이브 믹서</span></a>
</header>

<div class="mixer-container">
    <div class="panel panel-papers">
        <div class="filter-area">
            <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="paperSearch" placeholder="통합 검색..."></div>
            <div class="filter-row">
                <select id="gradeFilter" class="form-select">
                    <option value="">전체 학년</option>
                    <option value="고3">고3</option><option value="고2">고2</option><option value="고1">고1</option>
                    <option value="중3">중3</option><option value="중2">중2</option><option value="중1">중1</option>
                </select>
                <select id="courseFilter" class="form-select"><option value="">전체 과목</option></select>
            </div>
            <div class="filter-row"><select id="standardUnitFilter" class="form-select"><option value="">전체 단원</option></select></div>
            <div class="filter-row">
                <select id="startUnitFilter" class="form-select"><option value="">시작 단원</option></select>
                <select id="endUnitFilter" class="form-select"><option value="">끝 단원</option></select>
            </div>
        </div>
        <div class="exam-bulk-bar">
            <div class="exam-bulk-top"><span>선택 시험지 <span id="selected-exam-count">0</span>개</span><span id="selected-exam-meta">pool 미구성</span></div>
            <div class="exam-bulk-actions">
                <button class="panel-action" type="button" onclick="selectFilteredExams()">전체 선택</button>
                <button class="panel-action" type="button" onclick="clearSelectedExams()">해제</button>
                <button class="panel-action primary" type="button" onclick="loadSelectedExamPool()">pool 로드</button>
            </div>
        </div>
        <div class="panel-body" id="paper-list"></div>
    </div>

    <div class="panel panel-questions">
        <div class="auto-range-bar">
            <div class="range-group"><label>범위</label><select id="auto-start-unit" class="range-select"><option value="">시작 단원</option></select></div>
            <div class="range-group"><select id="auto-end-unit" class="range-select"><option value="">끝 단원</option></select></div>
            <div class="range-group"><label>난이도</label><select id="levelBalanceMode" class="range-select" style="width:70px;"><option value="balanced">균형</option><option value="low">하</option><option value="mid">중</option><option value="high">상</option></select></div>
            <div class="range-group"><input id="autoCountInput" class="auto-count-input" type="number" value="20"></div>
            <button class="btn-add-q" onclick="handleAutoPick('append')"><i class="fa-solid fa-magic"></i>추가</button>
            <button class="btn-add-q" onclick="handleAutoPick('replace')"><i class="fa-solid fa-rotate"></i>교체</button>
            <div id="poolStatusLabel" class="status-label" style="font-size:10.5px; font-weight:800; color:var(--blue);">준비됨</div>
        </div>
        <div class="panel-header">
            <div style="display:flex; align-items:center; gap:12px;">
                <span id="q-panel-title" class="panel-title">문항 목록</span>
                <span id="q-count-info" class="panel-subtle" style="font-size:11px; color:var(--gray-500);">시험지를 선택하세요.</span>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <select id="source-mode" class="form-select" style="width:auto; height:32px;" onchange="handleSourceModeChange()"><option value="activeExam">현재 시험지</option><option value="selectedExams">선택 pool</option></select>
                <select id="q-view-mode" class="form-select" style="width:auto; height:32px; font-size:11px;" onchange="renderQuestionList()"><option value="individual">개별</option><option value="unit">단원별</option></select>
                <select id="q-standard-filter" class="form-select" style="width:auto; height:32px; font-size:11px; max-width:130px;" onchange="renderQuestionList()"><option value="">전체 표준단원</option></select>
                <button id="add-standard-btn" class="btn-add-q" style="height:32px;" onclick="addCurrentStandardUnit()">필터담기</button>
                <button id="addUnitAllBtn" class="btn-add-q" style="height:32px;" onclick="addCurrentUnitAll()">전체담기</button>
            </div>
        </div>
        <div class="panel-body" id="question-list"></div>
    </div>

    <div class="panel panel-cart">
        <div class="panel-header"><span class="panel-title">출제 카트</span><span id="cart-count" style="font-weight:900; color:var(--blue); background: var(--blue-soft); padding: 2px 8px; border-radius: 99px;">0</span></div>
        <div class="panel-body" id="cart-items"></div>
        <div class="cart-footer">
            <select id="print-qpp" class="form-select" style="height:40px; margin-bottom:10px;"><option value="4">4문항/P</option><option value="6">6문항/P</option><option value="1">1문항/P</option></select>
            <button class="btn-main" onclick="openMixed()">시험지 생성</button>
        </div>
    </div>
</div>

<script>
function isMobileMixer() { return window.innerWidth <= 900; }
function compactText(v) { return String(v || '').replace(/\s+/g, '').trim(); }

function normalizeGrade(v) {
  const c = compactText(v);
  if (['고1','고등1','고등학교1학년'].includes(c)) return '고1';
  if (['고2','고등2','고등학교2학년'].includes(c)) return '고2';
  if (['고3','고등3','고등학교3학년'].includes(c)) return '고3';
  if (['중1','중등1','중학교1학년'].includes(c)) return '중1';
  if (['중2','중등2','중학교2학년'].includes(c)) return '중2';
  if (['중3','중등3','중학교3학년'].includes(c)) return '중3';
  return String(v || '').trim();
}
function normalizeYear(v) {
  if (v === '' || v == null) return '';
  const n = parseInt(String(v).replace(/[^\d]/g, ''), 10);
  return Number.isFinite(n) ? n : '';
}
function normalizeExamMeta(ex) {
  const n = { ...(ex || {}) };
  n.file = String(ex?.file || '').trim();
  n.school = String(ex?.school || '').trim();
  n.topic = String(ex?.topic || '').trim();
  n.grade = normalizeGrade(ex?.grade);
  n.year = normalizeYear(ex?.year);
  n.semester = String(ex?.semester || '').includes('1') ? '1' : (String(ex?.semester || '').includes('2') ? '2' : '');
  n.examType = String(ex?.examType || '').toLowerCase().includes('mid') ? 'mid' : (String(ex?.examType || '').toLowerCase().includes('final') ? 'final' : '');
  n.contentType = String(ex?.contentType || '기출').trim();
  n.subject = String(ex?.subject || '').trim();
  n.primaryStandardCourse = String(ex?.primaryStandardCourse || '').trim();
  n.courseRanges = Array.isArray(ex?.courseRanges) ? ex.courseRanges : [];
  return n;
}

  "중3 수학": [ { key: "M3-01", name: "실수와 그 계산", order: 1 }, { key: "M3-02", name: "다항식의 곱셈과 인수분해", order: 2 }, { key: "M3-03", name: "이차방정식", order: 3 }, { key: "M3-04", name: "이차함수와 그래프", order: 4 }, { key: "M3-05", name: "삼각비", order: 5 }, { key: "M3-06", name: "원의 성질", order: 6 }, { key: "M3-07", name: "통계", order: 7 } ],

function getAvailableCoursesByGrade(grade) {
  if (grade === "중1") return ["중1 수학"];
  if (grade === "중2") return ["중2 수학"];
  if (grade === "중3") return ["중3 수학"];
  if (grade === "고1") return ["공통수학1", "공통수학2", "수학(상)", "수학(하)"];
  if (grade === "고2") return ["대수", "확률과 통계", "수학Ⅰ", "미적분Ⅰ"];
  if (grade === "고3") return ["미적분Ⅱ", "기하", "수학Ⅱ", "미적분", "기하와 벡터"];
  return [];
}
function getMergedUnitOptionsByGrade(grade) {
  const courses = getAvailableCoursesByGrade(grade);
  const merged = [];
  const seen = new Set();
  courses.forEach(c => {
    (STANDARD_UNIT_MASTER[c] || []).forEach(u => {
      if (!seen.has(u.key)) {
        merged.push({ ...u, courseName: c });
        seen.add(u.key);
      }
    });
  });
  return merged;
}
function inferCourseFromUnitKey(key) {
  if (!key) return "";
  for (const c in STANDARD_UNIT_MASTER) {
    if (STANDARD_UNIT_MASTER[c].some(u => u.key === key)) return c;
  }
  return "";
}
function examMatchesUnitRange(exam, selectedCourse, unitKey, startKey, endKey) {
  const effectiveCourse = selectedCourse || inferCourseFromUnitKey(unitKey || startKey || endKey);
  if (!effectiveCourse) return !unitKey && !startKey && !endKey;
  const units = STANDARD_UNIT_MASTER[effectiveCourse] || [];
  const unitMap = new Map(units.map(u => [u.key, u]));
  const targetRange = (exam.courseRanges || []).find(cr => cr.standardCourse === effectiveCourse);
  if (!targetRange) return false;
  const sOrder = startKey ? (unitMap.get(startKey)?.order ?? Infinity) : -Infinity;
  const eOrder = endKey ? (unitMap.get(endKey)?.order ?? -Infinity) : Infinity;
  const examStart = targetRange.rangeStartUnitOrder ?? Infinity;
  const examEnd = targetRange.rangeEndUnitOrder ?? -Infinity;
  if (unitKey) {
    const u = unitMap.get(unitKey);
    return u && examStart <= u.order && u.order <= examEnd;
  }
  return examEnd >= sOrder && examStart <= eOrder;
}

function distributedPick(candidates, count) {
  const groups = {};
  candidates.forEach(c => {
    if (!groups[c._sourceFile]) groups[c._sourceFile] = [];
    groups[c._sourceFile].push(c);
  });
  const files = Object.keys(groups).sort(() => Math.random() - 0.5);
  const picked = [];
  let cycle = 0;
  while (picked.length < count && files.length > 0) {
    const idx = cycle % files.length;
    const f = files[idx];
    if (groups[f].length > 0) {
      picked.push(groups[f].splice(Math.floor(Math.random() * groups[f].length), 1)[0]);
    } else {
      files.splice(idx, 1);
      continue;
    }
    cycle++;
  }
  return picked;
}
function pickBalancedByLevel(candidates, totalCount, mode) {
  const ratios = mode === 'low' ? [0.5, 0.4, 0.1] : (mode === 'high' ? [0.1, 0.4, 0.5] : [0.3, 0.5, 0.2]);
  const targets = [
    Math.floor(totalCount * ratios[0]),
    Math.floor(totalCount * ratios[1]),
    totalCount - (Math.floor(totalCount * ratios[0]) + Math.floor(totalCount * ratios[1]))
  ];
  const groups = { '하': [], '중': [], '상': [] };
  candidates.forEach(q => {
    const lv = q.level === '하' ? '하' : (q.level === '상' ? '상' : '중');
    groups[lv].push(q);
  });
  let result = [];
  ['하', '중', '상'].forEach((lv, idx) => {
    result.push(...distributedPick(groups[lv], targets[idx]));
  });
  if (result.length < totalCount) {
    const pickedKeys = new Set(result.map(x => x._qKey));
    result.push(...distributedPick(candidates.filter(c => !pickedKeys.has(c._qKey)), totalCount - result.length));
  }
  return result.sort(() => Math.random() - 0.5);
}
async function handleAutoPick(mode) {
  const pool = getQuestionSourcePool();
  const startKey = document.getElementById('auto-start-unit').value;
  const endKey = document.getElementById('auto-end-unit').value;
  const levelMode = document.getElementById('levelBalanceMode').value;
  const count = parseInt(document.getElementById('autoCountInput').value, 10);
  let candidates = pool;
  if (startKey || endKey) {
    const unitMap = new Map();
    pool.forEach(q => {
      if (q.standardUnitKey) unitMap.set(q.standardUnitKey, q.standardUnitOrder || 999);
    });
    const sOrder = startKey ? (unitMap.get(startKey) ?? -Infinity) : -Infinity;
    const eOrder = endKey ? (unitMap.get(endKey) ?? Infinity) : Infinity;
    candidates = pool.filter(q => {
      const o = unitMap.get(q.standardUnitKey);
      return o !== undefined && o >= sOrder && o <= eOrder;
    });
  }
  if (!candidates.length) return alert('추출 대상 문항이 없습니다.');
  const picked = pickBalancedByLevel(candidates, count, levelMode);
  if (mode === 'replace') cart = picked;
  else cart.push(...picked);
  updateCart();
  renderQuestionList();
  renderAutoSummary(`추출 완료: ${picked.length}문항`);
}

function buildMixerExamCardInfo(ex) {
  const contentType = ex.contentType || '기출';
  const fileName = ex.file || '';
  return {
    title: ex.school || ex.topic || fileName.replace('.js', ''),
    subtitle: [ex.year ? `${ex.year}년` : '', ex.semester ? `${ex.semester}학기` : '', ex.subject].filter(Boolean).join(' · ') || contentType,
    metaHTML: `<span class="meta-badge">${ex.grade}</span><span class="meta-badge primary">${ex.subject || ''}</span><span class="meta-badge ${contentType === '기출' ? 'primary' : 'green'}">${contentType}</span>`,
    fileName
  };
}
function renderExamList() {
  const isMobile = isMobileMixer();
  const keyword = document.getElementById('paperSearch').value.toLowerCase();
  const grade = document.getElementById('gradeFilter').value;
  const course = document.getElementById('courseFilter').value;
  const unitKey = document.getElementById('standardUnitFilter').value;
  const startKey = document.getElementById('startUnitFilter').value;
  const endKey = document.getElementById('endUnitFilter').value;

  filteredPaperPool = engineDB.exams.filter(ex => {
    const searchBase = `${ex.school || ''} ${ex.topic || ''} ${ex.file || ''} ${ex.subject || ''}`.toLowerCase();
    return (!keyword || searchBase.includes(keyword)) &&
           (!grade || ex.grade === grade) &&
           (!course || (ex.primaryStandardCourse === course || (ex.courseRanges || []).some(cr => cr.standardCourse === course))) &&
           examMatchesUnitRange(ex, course, unitKey, startKey, endKey);
  });

  const container = document.getElementById('paper-list');
  container.innerHTML = filteredPaperPool.length ? '' : '<div class="empty-box"><p>결과 없음</p></div>';

  filteredPaperPool.forEach(ex => {
    const checked = selectedExamFiles.has(ex.file);
    const info = buildMixerExamCardInfo(ex);
    const div = document.createElement('div');
    div.className = `paper-item ${currentPaper?.file === ex.file ? 'active' : ''} ${checked ? 'selected' : ''}`;

    if (!isMobile) div.onclick = () => selectPaper(ex);

    div.innerHTML = `
      <div class="exam-item-head">
        <div class="exam-check-wrap"><input type="checkbox" class="exam-check" ${checked ? 'checked' : ''}></div>
        <div class="exam-main">
          <div class="paper-name">${info.title}</div>
          <div class="paper-sub">${info.subtitle}</div>
          <div class="paper-meta-line">${info.metaHTML}</div>
          <div class="paper-file-name">${info.fileName}</div>
        </div>
      </div>
      <div class="exam-card-actions">
        <button class="exam-card-btn preview"><i class="fa-solid fa-eye"></i>미리보기</button>
        <button class="exam-card-btn select ${selectedExamFiles.has(ex.file) ? 'active' : ''}">
          <i class="fa-solid ${selectedExamFiles.has(ex.file) ? 'fa-check' : 'fa-plus'}"></i>${selectedExamFiles.has(ex.file) ? '해제' : '선택'}
        </button>
      </div>
    `;

    const checkWrap = div.querySelector('.exam-check-wrap');
    const checkbox = div.querySelector('.exam-check');
    const previewBtn = div.querySelector('.preview');
    const selectBtn = div.querySelector('.select');

    checkWrap.onclick = (e) => {
      e.stopPropagation();
      toggleExamSelection(ex.file, !selectedExamFiles.has(ex.file));
    };
    checkbox.onclick = (e) => {
      e.stopPropagation();
      toggleExamSelection(ex.file, e.target.checked);
    };
    if (previewBtn) previewBtn.onclick = (e) => {
      e.stopPropagation();
      selectPaper(ex);
    };
    if (selectBtn) selectBtn.onclick = (e) => {
      e.stopPropagation();
      toggleExamSelection(ex.file, !selectedExamFiles.has(ex.file));
    };

    container.appendChild(div);
  });

  updateSelectedExamMeta();
}

async function selectPaper(ex) {
  currentPaper = ex;
  renderExamList();
  const container = document.getElementById('question-list');
  container.innerHTML = '<div class="empty-box"><i class="fa-solid fa-spinner fa-spin"></i><p>로딩 중...</p></div>';
  try {
    const qs = await loadQuestionData(ex.file);
    ex._loadedQuestions = qs;
    currentQuestions = qs;
    refreshPoolDependentUI();
    renderQuestionList();
  } catch (e) {
    container.innerHTML = '<p>로드 실패</p>';
  }
}
function selectFilteredExams() {
  filteredPaperPool.forEach(ex => selectedExamFiles.add(ex.file));
  updateSelectedExamMeta();
  renderExamList();
}
function toggleExamSelection(file, checked) {
  if (checked) selectedExamFiles.add(file);
  else selectedExamFiles.delete(file);
  updateSelectedExamMeta();
  renderExamList();
}

async function loadSelectedExamPool() {
  const selected = Array.from(selectedExamFiles);
  if (!selected.length) return alert('선택한 시험지가 없습니다.');
  selectedPoolLoading = true;
  updateSelectedExamMeta();
  renderAutoSummary();

  for (const file of selected) {
    if (!loadedExamQuestionMap[file]) {
      try {
        loadedExamQuestionMap[file] = await loadQuestionData(file);
      } catch (e) {
        loadedExamQuestionMap[file] = [];
      }
    }
  }

  mergedPool = [];
  selected.forEach(file => {
    const ex = engineDB.exams.find(e => e.file === file);
    (loadedExamQuestionMap[file] || []).forEach((q, i) => {
      mergedPool.push({
        ...q,
        _sourceTitle: ex?.school || ex?.topic || 'Pool',
        _sourceFile: file,
        _qKey: `${file}_${q.id || (i + 1)}`
      });
    });
  });

  selectedPoolLoading = false;
  updateSelectedExamMeta();
  document.getElementById('source-mode').value = 'selectedExams';
  handleSourceModeChange();
}
function handleSourceModeChange() {
  const mode = document.getElementById('source-mode').value;
  if (mode === 'selectedExams' && mergedPool.length === 0) {
    if (!selectedPoolLoading) {
      alert("로드된 pool이 없습니다. 'pool 로드'를 먼저 진행하세요.");
      document.getElementById('source-mode').value = 'activeExam';
      refreshPoolDependentUI();
      renderQuestionList();
      return;
    }
  }
  refreshPoolDependentUI();
  renderQuestionList();
}

function refreshPoolDependentUI() {
  const pool = getQuestionSourcePool();
  const start = document.getElementById('auto-start-unit');
  const end = document.getElementById('auto-end-unit');
  const qFilter = document.getElementById('q-standard-filter');
  const unitMap = new Map();

  pool.forEach(q => {
    if (q.standardUnitKey && !unitMap.has(q.standardUnitKey)) {
      unitMap.set(q.standardUnitKey, {
        key: q.standardUnitKey,
        name: q.standardUnit,
        order: q.standardUnitOrder || 999
      });
    }
  });

  const sortedUnits = Array.from(unitMap.values()).sort((a, b) => a.order - b.order);

  [start, end, qFilter].forEach(s => {
    const isFilter = s.id === 'q-standard-filter';
    s.innerHTML = `<option value="">${isFilter ? '전체 표준단원' : (s.id === 'auto-start-unit' ? '시작' : '끝')}</option>`;
    sortedUnits.forEach(u => {
      const o = document.createElement('option');
      o.value = u.key;
      o.textContent = u.name;
      s.appendChild(o);
    });
  });

  updateQuestionPanelMeta();
}
function renderQuestionList() {
  const pool = getQuestionSourcePool();
  const viewMode = document.getElementById('q-view-mode').value;
  const standardFilter = document.getElementById('q-standard-filter').value;
  const container = document.getElementById('question-list');
  container.innerHTML = '';

  const displayPool = standardFilter ? pool.filter(q => q.standardUnitKey === standardFilter) : pool;

  if (!pool.length) {
    container.innerHTML = '<div class="empty-box"><p>문항 데이터가 없습니다.</p></div>';
    updateQuestionPanelMeta();
    return;
  }

  if (viewMode === 'unit') {
    const groups = {};
    displayPool.forEach(q => {
      const uKey = q.standardUnitKey || '미분류';
      if (!groups[uKey]) groups[uKey] = { name: q.standardUnit || '단원 미지정', questions: [] };
      groups[uKey].questions.push(q);
    });

    Object.keys(groups).forEach(uKey => {
      const g = groups[uKey];
      const section = document.createElement('div');
      section.innerHTML = `<div class="unit-group-header"><span class="unit-group-title">${g.name} (${g.questions.length})</span><button class="btn-add-q" onclick="addUnitGroup('${uKey}')">전체담기</button></div>`;
      g.questions.forEach((q, i) => section.appendChild(createQuestionItem(q, i)));
      container.appendChild(section);
    });
  } else {
    displayPool.forEach((q, i) => container.appendChild(createQuestionItem(q, i)));
  }

  updateQuestionPanelMeta();
  if (window.MathJax) MathJax.typesetPromise([container]);
}
function createQuestionItem(q, i) {
  const inCart = cart.some(c => c._qKey === q._qKey);
  const div = document.createElement('div');
  div.className = 'q-item';
  div.innerHTML = `
    <div class="q-header">
      <span class="q-num"><small style="display:block; font-size:10px; color:var(--gray-500);">${q._sourceTitle}</small>${q.id || (i + 1)}번</span>
      <button class="btn-add-q ${inCart ? 'in-cart' : ''}" onclick="toggleCartPoolItem('${q._qKey}')"><i class="fa-solid ${inCart ? 'fa-check' : 'fa-plus'}"></i>${inCart ? '담김' : '담기'}</button>
    </div>
    <div class="q-content">${q.content || ''}</div>
    ${q.image ? `<img src="${typeof q.image === 'string' ? q.image : `assets/images/${q._sourceFile.replace('.js','')}/q${q.id || (i + 1)}.png`}" class="q-image" onerror="this.style.display='none'">` : ''}
    ${q.choices ? `<div class="q-choices">${q.choices.map((c, ci) => `<div class="choice-row"><span class="choice-num">(${ci + 1})</span><span>${c}</span></div>`).join('')}</div>` : ''}
  `;
  return div;
}
function toggleCartPoolItem(qKey) {
  const pool = getQuestionSourcePool();
  const item = pool.find(q => q._qKey === qKey);
  const idx = cart.findIndex(c => c._qKey === qKey);
  if (idx > -1) cart.splice(idx, 1);
  else if (item) cart.push(item);
  updateCart();
  renderQuestionList();
}
function addUnitGroup(uKey) {
  const pool = getQuestionSourcePool();
  pool.filter(q => q.standardUnitKey === uKey).forEach(q => {
    if (!cart.some(c => c._qKey === q._qKey)) cart.push(q);
  });
  updateCart();
  renderQuestionList();
}
function addCurrentStandardUnit() {
  const k = document.getElementById('q-standard-filter').value;
  if (k) addUnitGroup(k);
  else alert('필터를 선택하세요.');
}
function addCurrentUnitAll() {
  getQuestionSourcePool().forEach(q => {
    if (!cart.some(c => c._qKey === q._qKey)) cart.push(q);
  });
  updateCart();
  renderQuestionList();
}
function updateCart() {
  const container = document.getElementById('cart-items');
  document.getElementById('cart-count').innerText = cart.length;
  container.innerHTML = cart.length ? '' : '<div class="empty-box" style="font-size:12px;">비어있음</div>';
  cart.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `<div class="cart-info"><div class="cart-q-text">${c._sourceTitle} - ${c.id || (i + 1)}번</div></div><i class="fa-solid fa-times-circle" style="cursor:pointer; color:#ccc;" onclick="removeCart(${i})"></i>`;
    container.appendChild(div);
  });
}
function removeCart(i) {
  cart.splice(i, 1);
  updateCart();
  renderQuestionList();
}
function getQuestionSourcePool() {
  if (document.getElementById('source-mode').value === 'selectedExams') return mergedPool;
  if (!currentPaper) return [];
  return currentQuestions.map((q, i) => ({
    ...q,
    _sourceTitle: currentPaper.school || currentPaper.topic || currentPaper.file.replace('.js',''),
    _sourceFile: currentPaper.file,
    _qKey: `${currentPaper.file}_${q.id || (i + 1)}`
  }));
}

function loadQuestionData(file) {
  return new Promise((res, rej) => {
    const old = document.getElementById('temp-script');
    if (old) old.remove();
    const s = document.createElement('script');
    s.id = 'temp-script';
    s.src = `exams/${file}?v=${Date.now()}`;
    s.onload = () => {
      const d = window.questions || window.questionBank;
      window.questions = null;
      window.questionBank = null;
      d ? res(d) : rej();
    };
    s.onerror = rej;
    document.body.appendChild(s);
  });
}
async function loadDB() {
  return new Promise(res => {
    const s = document.createElement('script');
    s.src = 'db.js?v=' + Date.now();
    s.onload = () => {
      engineDB = { exams: (window.mainDB?.exams || []).map(normalizeExamMeta).filter(e => e.file) };
      res();
    };
    document.body.appendChild(s);
  });
}
function setupEvents() {
  document.getElementById('gradeFilter').onchange = () => { populateFilters(); renderExamList(); };
  document.getElementById('courseFilter').onchange = () => { populateStandardUnitFilters(); renderExamList(); };
  ['standardUnitFilter', 'startUnitFilter', 'endUnitFilter', 'paperSearch'].forEach(id => {
    document.getElementById(id).onchange = renderExamList;
    if (id === 'paperSearch') document.getElementById(id).oninput = renderExamList;
  });
}
function populateFilters() {
  const g = document.getElementById('gradeFilter').value;
  const s = document.getElementById('courseFilter');
  s.innerHTML = '<option value="">전체 과목</option>';
  getAvailableCoursesByGrade(g).forEach(c => {
    const o = document.createElement('option');
    o.value = o.textContent = c;
    s.appendChild(o);
  });
  populateStandardUnitFilters();
}
function populateStandardUnitFilters() {
  const g = document.getElementById('gradeFilter').value;
  const c = document.getElementById('courseFilter').value;
  const units = c ? (STANDARD_UNIT_MASTER[c] || []).map(u => ({ ...u, courseName: c })) : (g ? getMergedUnitOptionsByGrade(g) : []);
  const usePrefix = !c && g;
  ['standardUnitFilter', 'startUnitFilter', 'endUnitFilter'].forEach(id => {
    const s = document.getElementById(id);
    s.innerHTML = `<option value="">${id === 'standardUnitFilter' ? '전체 단원' : (id === 'startUnitFilter' ? '시작' : '끝')}</option>`;
    units.forEach(u => {
      const o = document.createElement('option');
      o.value = u.key;
      o.textContent = (usePrefix ? `${u.courseName} · ` : '') + u.name;
      s.appendChild(o);
    });
  });
}
function openMixed() {
  if (!cart.length) return alert('문항을 담아주세요.');
  localStorage.setItem('mixedQuestions', JSON.stringify(cart));
  localStorage.setItem('mixedMeta', JSON.stringify({
    title: 'JS아카이브 믹서 출제',
    count: cart.length,
    qpp: document.getElementById('print-qpp').value
  }));
  window.open(`mixed_engine.html?mode=exam&qpp=${document.getElementById('print-qpp').value}`, '_blank');
}

window.onload = async () => {
  await loadDB();
  setupEvents();
  renderExamList();
  updateQuestionPanelMeta();
};
</script>
</body>
</html>
