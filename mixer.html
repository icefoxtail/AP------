<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS아카이브 | 믹서 출제</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']], packages: {'[+]': ['ams', 'boldsymbol']} },
      options: { enableMenu: false },
      startup: { typeset: false }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <style>
    :root {
      --navy: #07111f;
      --navy-2: #0c1a2e;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --blue-soft: #eff6ff;
      --green-soft: #ecfdf5;
      --green-border: #b7efd4;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-500: #64748b;
      --gray-700: #334155;
      --text-main: #0f172a;
      --danger: #dc2626;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', sans-serif;
      background: var(--gray-50);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      background: var(--navy);
      color: white;
      height: 58px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header-left, .header-right { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .logo { color: white; text-decoration: none; font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    .logo em { color: #60a5fa; font-style: normal; }
    .top-btn {
      height: 36px; padding: 0 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08); color: white; font-size: 12px; font-weight: 800; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .top-btn:hover { background: rgba(255,255,255,0.14); }

    .mixer-container {
      flex: 1;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr) 340px;
      gap: 1px;
      background: var(--gray-200);
      min-height: 0;
    }
    .panel {
      background: white;
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .panel-header {
      min-height: 56px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .panel-title { font-size: 15px; font-weight: 900; }
    .panel-subtle { font-size: 12px; font-weight: 700; color: var(--gray-500); }
    .panel-body { flex: 1; min-height: 0; overflow-y: auto; padding: 16px 18px; -webkit-overflow-scrolling: touch; }

    .filter-area {
      padding: 14px 18px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fff;
      flex-shrink: 0;
    }
    .search-box { position: relative; }
    .search-box i {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--gray-300); font-size: 13px;
    }
    .search-box input, .form-select, .count-input {
      width: 100%; height: 38px; border: 1px solid var(--gray-200); border-radius: 10px; outline: none;
      background: white; font-size: 12.5px; color: var(--gray-700);
    }
    .search-box input { padding: 0 12px 0 34px; }
    .form-select { padding: 0 10px; font-weight: 700; }
    .count-input { padding: 0 10px; text-align: center; font-weight: 800; }
    .filter-row { display: flex; gap: 8px; }

    .exam-bulk-bar {
      padding: 12px 18px;
      border-bottom: 1px solid var(--gray-200);
      background: var(--blue-soft);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .exam-bulk-top {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      font-size: 12px; font-weight: 800; color: var(--blue-dark);
    }
    .bulk-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }

    .action-btn, .small-btn, .main-btn {
      border: 1px solid var(--gray-200); border-radius: 10px; cursor: pointer; font-weight: 800;
      transition: 0.18s ease; white-space: nowrap;
    }
    .action-btn {
      height: 36px; padding: 0 10px; font-size: 12px; background: white; color: var(--blue-dark); border-color: #bfdbfe;
    }
    .action-btn:hover { background: #dbeafe; }
    .action-btn.primary { background: var(--blue); color: white; border-color: var(--blue); }
    .action-btn.primary:hover { background: var(--blue-dark); }
    .action-btn.ghost { background: var(--gray-100); color: var(--gray-700); border-color: var(--gray-200); }
    .action-btn.ghost:hover { background: var(--gray-200); }

    .paper-item {
      padding: 14px; border: 1px solid var(--gray-200); border-radius: 14px; background: white;
      margin-bottom: 10px; transition: 0.18s ease;
    }
    .paper-item:hover { border-color: var(--blue); background: #fcfdff; }
    .paper-item.active { border-color: var(--blue); background: var(--blue-soft); box-shadow: inset 0 0 0 1px var(--blue); }
    .paper-item.selected { border-color: var(--blue-dark); background: #eef2ff; }
    .exam-item-head { display: flex; gap: 10px; align-items: flex-start; }
    .exam-check-wrap {
      display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; flex-shrink: 0;
      margin-top: -4px; margin-left: -6px;
    }
    .exam-check { width: 16px; height: 16px; cursor: pointer; accent-color: var(--blue); }
    .exam-main { flex: 1; min-width: 0; }
    .paper-name { font-size: 15px; font-weight: 900; line-height: 1.34; margin-bottom: 6px; word-break: keep-all; overflow-wrap: anywhere; }
    .paper-sub { font-size: 12px; line-height: 1.5; color: var(--gray-500); margin-bottom: 8px; word-break: keep-all; overflow-wrap: anywhere; }
    .paper-meta-line { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .meta-badge {
      display: inline-flex; align-items: center; min-height: 24px; padding: 0 9px; border-radius: 999px;
      font-size: 10.5px; font-weight: 800; background: var(--gray-100); color: var(--gray-500); border: 1px solid var(--gray-200);
    }
    .meta-badge.primary { background: #eff6ff; color: var(--blue-dark); border-color: #dbeafe; }
    .meta-badge.green { background: var(--green-soft); color: #166534; border-color: var(--green-border); }
    .paper-file-name {
      font-size: 10.5px; line-height: 1.4; color: #94a3b8; word-break: break-all;
      padding-top: 8px; border-top: 1px dashed var(--gray-200);
    }
    .exam-card-actions {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .compose-bar {
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--gray-100);
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      background: #fff;
      flex-shrink: 0;
    }
    .compose-label { font-size: 13px; font-weight: 900; color: var(--gray-500); }
    .compose-tabs {
      display: inline-flex; align-items: center; gap: 4px; padding: 3px;
      background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 999px;
    }
    .compose-tab {
      min-width: 72px; height: 36px; border: none; border-radius: 999px; background: transparent;
      color: var(--gray-500); font-size: 13px; font-weight: 900; cursor: pointer;
    }
    .compose-tab.active { background: var(--blue); color: white; box-shadow: 0 6px 14px rgba(37,99,235,0.18); }
    .compose-hint { margin-left: auto; font-size: 12px; font-weight: 700; color: var(--gray-500); }

    .mode-panel-wrap {
      padding: 12px 18px 14px;
      border-bottom: 1px solid var(--gray-100);
      background: #fcfdff;
      flex-shrink: 0;
    }
    .mode-panel { display: none; flex-direction: column; gap: 10px; }
    .mode-panel.active { display: flex; }
    .mode-section-label { font-size: 12px; font-weight: 900; color: var(--blue-dark); }
    .mode-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .mode-row .form-select { width: auto; min-width: 130px; }
    .mode-row .count-input { width: 72px; }
    .helper-line { font-size: 11.5px; font-weight: 800; color: var(--gray-500); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .helper-chip {
      display: inline-flex; align-items: center; min-height: 26px; padding: 0 10px; border-radius: 999px;
      background: var(--gray-100); color: var(--gray-500); font-size: 11px; font-weight: 800;
    }

    .q-empty { padding: 56px 18px; text-align: center; color: var(--gray-300); font-size: 14px; font-weight: 700; }
    .q-group-title {
      position: sticky; top: 0; z-index: 2; padding: 10px 18px; background: #f8fafc;
      border-top: 1px solid var(--gray-200); border-bottom: 1px solid var(--gray-200);
      font-size: 12px; font-weight: 900; color: var(--gray-700);
    }
    .q-item { padding: 22px 18px; border-bottom: 1px solid var(--gray-100); }
    .q-item-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .q-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; font-size: 11px; font-weight: 800; color: var(--blue-dark); }
    .q-number { font-size: 16px; font-weight: 900; color: var(--blue); }
    .q-source { color: var(--gray-500); }
    .q-body { font-size: 14px; line-height: 1.72; color: var(--text-main); word-break: keep-all; overflow-wrap: anywhere; margin-bottom: 12px; }
    .q-image-wrap { margin: 10px 0 14px; }
    .q-image-wrap img { max-width: 100%; height: auto; display: block; margin: 0 auto; border: 1px solid var(--gray-100); border-radius: 8px; background: white; }
    .q-choices { display: flex; flex-direction: column; gap: 6px; padding: 12px; background: var(--gray-50); border: 1px solid var(--gray-100); border-radius: 10px; }
    .choice-row { display: flex; gap: 10px; font-size: 13.5px; line-height: 1.6; color: var(--gray-700); }
    .choice-num { min-width: 22px; font-weight: 800; color: var(--gray-500); }

    .cart-item {
      padding: 12px; border: 1px solid var(--gray-100); border-radius: 12px; background: white; margin-bottom: 8px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .cart-info { flex: 1; min-width: 0; }
    .cart-title { font-size: 12px; font-weight: 800; color: var(--text-main); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-sub { font-size: 10.5px; color: var(--gray-500); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .small-btn {
      width: 28px; height: 28px; background: white; color: var(--gray-500); font-size: 12px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .small-btn:hover { background: var(--gray-100); }
    .small-btn.remove { color: var(--danger); }

    .cart-footer {
      padding: 16px 18px; border-top: 1px solid var(--gray-100); background: white; flex-shrink: 0;
    }
    .cart-count-box {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 12px; font-size: 14px; font-weight: 900;
    }
    .cart-note { text-align: center; font-size: 12px; color: var(--gray-500); margin-bottom: 10px; }
    .main-btn {
      width: 100%; height: 46px; background: var(--blue); color: white; font-size: 14px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .main-btn:hover { background: var(--blue-dark); }
    .stack { display: flex; flex-direction: column; gap: 8px; }

    @media (max-width: 1024px) {
      body { height: auto; min-height: 100vh; overflow: auto; }
      .mixer-container { grid-template-columns: 1fr; height: auto; }
      .panel { min-height: 300px; }
      .panel-cart { position: sticky; bottom: 0; z-index: 30; border-top: 1px solid var(--gray-200); box-shadow: 0 -10px 18px rgba(2,8,23,0.05); }
      .cart-footer { position: sticky; bottom: 0; }
      .exam-card-actions { display: grid; }
      .compose-hint { width: 100%; margin-left: 0; }
      .bulk-actions { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <a href="index.html" class="logo"><i class="fa-solid fa-layer-group"></i><span><em>JS</em>아카이브 믹서</span></a>
  </div>
  <div class="header-right">
    <button class="top-btn" type="button" onclick="resetMixerState()"><i class="fa-solid fa-rotate-left"></i>초기화</button>
  </div>
</header>

<div class="mixer-container">
  <section class="panel panel-papers">
    <div class="filter-area">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="paperSearch" placeholder="학교명, 과목, 파일명 검색">
      </div>
      <div class="filter-row">
        <select id="gradeFilter" class="form-select">
          <option value="">전체 학년</option>
          <option value="고3">고3</option>
          <option value="고2">고2</option>
          <option value="고1">고1</option>
          <option value="중3">중3</option>
          <option value="중2">중2</option>
          <option value="중1">중1</option>
        </select>
        <select id="courseFilter" class="form-select">
          <option value="">전체 과목</option>
        </select>
      </div>
      <div class="filter-row">
        <select id="unitFilter" class="form-select">
          <option value="">전체 소단원</option>
        </select>
      </div>
    </div>

    <div class="exam-bulk-bar">
      <div class="exam-bulk-top">
        <span>선택 시험지 <span id="selected-exam-count">0</span>개</span>
        <span id="selected-exam-meta">pool 미구성</span>
      </div>
      <div class="bulk-actions">
        <button class="action-btn" type="button" onclick="selectFilteredExams()">필터 전체 선택</button>
        <button class="action-btn ghost" type="button" onclick="clearSelectedExams()">선택 해제</button>
        <button class="action-btn primary" type="button" onclick="loadSelectedExamPool()">pool 로드</button>
      </div>
    </div>

    <div class="panel-body" id="paper-list"></div>
  </section>

  <section class="panel panel-questions">
    <div class="compose-bar">
      <span class="compose-label">출제</span>
      <div class="compose-tabs">
        <button id="composeAutoBtn" class="compose-tab active" type="button" onclick="switchComposeMode('auto')">자동</button>
        <button id="composeManualBtn" class="compose-tab" type="button" onclick="switchComposeMode('manual')">수동</button>
      </div>
      <span id="composeModeHint" class="compose-hint">자동으로 문항을 추출합니다.</span>
    </div>

    <div class="mode-panel-wrap">
      <div id="autoModeSection" class="mode-panel active">
        <div class="mode-section-label">자동출제</div>
        <div class="mode-row">
          <select id="autoSourceMode" class="form-select">
            <option value="current">현재 시험지</option>
            <option value="filtered">검색 결과 전체</option>
            <option value="selectedExams">선택 시험지 pool</option>
          </select>
          <select id="autoStartUnit" class="form-select"></select>
          <select id="autoEndUnit" class="form-select"></select>
          <select id="levelBalanceMode" class="form-select">
            <option value="balanced">균형</option>
            <option value="low">하 중심</option>
            <option value="mid">중 중심</option>
            <option value="high">상 중심</option>
          </select>
          <input id="autoCountInput" class="count-input" type="number" min="1" max="100" value="20">
          <button class="action-btn" type="button" onclick="handleAutoPick('append')">자동추가</button>
          <button class="action-btn primary" type="button" onclick="handleAutoPick('replace')">자동교체</button>
        </div>
        <div class="helper-line">
          <span class="helper-chip">시작·끝은 현재 source 기준 첫/끝 소단원으로 자동 설정</span>
          <span id="autoStatusText">자동출제 대기 중</span>
        </div>
      </div>

      <div id="manualModeSection" class="mode-panel">
        <div class="mode-section-label">수동출제</div>
        <div class="mode-row">
          <select id="sourceMode" class="form-select" onchange="handleSourceModeChange()">
            <option value="activeExam">현재 시험지</option>
            <option value="selectedExams">선택 시험지 pool</option>
          </select>
          <select id="manualViewMode" class="form-select" onchange="renderQuestionList()">
            <option value="default">기본순</option>
            <option value="standard">소단원별 묶음</option>
          </select>
          <select id="manualUnitFilter" class="form-select" onchange="renderQuestionList()">
            <option value="">전체 소단원</option>
          </select>
          <button class="action-btn primary" type="button" onclick="addCurrentUnitAll()">현재 소단원 전체담기</button>
        </div>
        <div class="helper-line">
          <span class="helper-chip">수동은 아래 문항의 담기 버튼으로 출제</span>
          <span id="manualStatusText">현재 시험지 기준</span>
        </div>
      </div>
    </div>

    <div class="panel-header">
      <div>
        <span class="panel-title" id="qPanelTitle">문항 목록</span>
        <span class="panel-subtle" id="qCountInfo">시험지 또는 선택 pool을 불러와 주세요.</span>
      </div>
    </div>

    <div class="panel-body" id="question-list"></div>
  </section>

  <section class="panel panel-cart">
    <div class="panel-header">
      <span class="panel-title">출제 카트</span>
      <span class="meta-badge primary" id="cartCountBadge">0</span>
    </div>
    <div class="panel-body" id="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-count-box">총 <span id="cart-count">0</span>문항</div>
      <div class="cart-note">자동/수동 혼합 출제 가능</div>
      <div class="stack">
        <select id="print-qpp" class="form-select">
          <option value="4">페이지당 4문항</option>
          <option value="6">페이지당 6문항</option>
          <option value="1">페이지당 1문항</option>
        </select>
        <button class="main-btn" type="button" onclick="openMixed()"><i class="fa-solid fa-print"></i>시험지 생성하기</button>
      </div>
    </div>
  </section>
</div>

<script>
function compactText(value) {
  return String(value || '').replace(/\s+/g, '').trim();
}

function normalizeContentType(value) {
  const raw = String(value || '').trim();
  const compact = compactText(raw);
  if (!compact) return '';
  if (compact.includes('단원평가')) return '단원평가';
  if (compact.includes('기출')) return '기출';
  if (compact.includes('유형')) return '유형';
  if (compact.includes('쪽지')) return '쪽지';
  return raw;
}

function normalizeGrade(value) {
  const compact = compactText(value);
  if (compact === '고1' || compact === '고등1' || compact === '고등학교1학년') return '고1';
  if (compact === '고2' || compact === '고등2' || compact === '고등학교2학년') return '고2';
  if (compact === '고3' || compact === '고등3' || compact === '고등학교3학년') return '고3';
  if (compact === '중1' || compact === '중등1' || compact === '중학교1학년') return '중1';
  if (compact === '중2' || compact === '중등2' || compact === '중학교2학년') return '중2';
  if (compact === '중3' || compact === '중등3' || compact === '중학교3학년') return '중3';
  return String(value || '').trim();
}

function normalizeSemester(value) {
  const compact = compactText(value);
  if (!compact) return '';
  if (compact === '1' || compact === '1학기') return '1';
  if (compact === '2' || compact === '2학기') return '2';
  return String(value || '').trim();
}

function normalizeExamType(value) {
  const compact = compactText(value).toLowerCase();
  if (!compact) return '';
  if (compact === 'mid' || compact === 'middle' || compact === '중간' || compact === '중간고사') return 'mid';
  if (compact === 'final' || compact === '기말' || compact === '기말고사') return 'final';
  return String(value || '').trim();
}

function normalizeYear(value) {
  if (value === '' || value == null) return '';
  const s = String(value).replace(/[^\d]/g, '');
  if (!s) return '';
  const n = parseInt(s, 10);
  return Number.isFinite(n) ? n : '';
}

function normalizeExamMeta(ex) {
  const normalized = { ...(ex || {}) };
  normalized.file = String(ex?.file || '').trim();
  normalized.school = String(ex?.school || '').trim();
  normalized.topic = String(ex?.topic || '').trim();
  normalized.subject = String(ex?.subject || '').trim();
  normalized.grade = normalizeGrade(ex?.grade);
  normalized.year = normalizeYear(ex?.year);
  normalized.semester = normalizeSemester(ex?.semester);
  normalized.examType = normalizeExamType(ex?.examType);
  normalized.contentType = normalizeContentType(ex?.contentType);
  return normalized;
}

function unitCanon(name) {
  return compactText(name).replace(/[·ㆍ・&/()\[\]\-]/g, '');
}

function getAvailableCoursesByGrade(grade) {
  if (!grade) return [];
  if (grade === '중1') return ['중1 수학'];
  if (grade === '중2') return ['중2 수학'];
  if (grade === '중3') return ['중3 수학'];
  if (grade === '고1') return ['공통수학1', '공통수학2', '수학(상)', '수학(하)'];
  if (grade === '고2') return ['대수', '확률과 통계', '수학Ⅰ', '미적분Ⅰ'];
  if (grade === '고3') return ['미적분Ⅱ', '기하', '수학Ⅱ', '미적분', '기하와 벡터'];
  return [];
}

function getStandardUnitOptionsByCourse(courseName) {
  return STANDARD_UNIT_MASTER[courseName] || [];
}

function getMergedUnitOptionsByGrade(grade) {
  const courses = getAvailableCoursesByGrade(grade);
  const map = new Map();
  courses.forEach(course => {
    (STANDARD_UNIT_MASTER[course] || []).forEach(unit => {
      const canon = unitCanon(unit.name);
      if (!canon) return;
      if (!map.has(canon)) {
        map.set(canon, {
          value: `merged::${canon}`,
          name: unit.name,
          order: unit.order ?? 999,
          links: [{ course, key: unit.key, order: unit.order ?? 999, name: unit.name }]
        });
      } else {
        const existing = map.get(canon);
        existing.order = Math.min(existing.order, unit.order ?? 999);
        existing.links.push({ course, key: unit.key, order: unit.order ?? 999, name: unit.name });
        if (unit.name.length < existing.name.length) existing.name = unit.name;
      }
    });
  });
  return Array.from(map.values()).sort((a, b) => a.order - b.order || a.name.localeCompare(b.name, 'ko'));
}

function isMergedUnitValue(value) {
  return typeof value === 'string' && value.startsWith('merged::');
}

function getMergedCanon(value) {
  return isMergedUnitValue(value) ? value.replace(/^merged::/, '') : '';
}

function inferCourseFromQuestion(q) {
  const key = q?.standardUnitKey || '';
  if (key.startsWith('M1-')) return '중1 수학';
  if (key.startsWith('M2-')) return '중2 수학';
  if (key.startsWith('M3-')) return '중3 수학';
  if (key.startsWith('H22-C-')) return '공통수학1';
  if (key.startsWith('H22-C2-')) return '공통수학2';
  if (key.startsWith('H22-A-')) return '대수';
  if (key.startsWith('H22-M1-')) return '미적분Ⅰ';
  if (key.startsWith('H22-M2-')) return '미적분Ⅱ';
  if (key.startsWith('H22-PS-')) return '확률과 통계';
  if (key.startsWith('H22-GE-')) return '기하';
  if (key.startsWith('H15-SA-')) return '수학(상)';
  if (key.startsWith('H15-SB-')) return '수학(하)';
  if (key.startsWith('H15-M1-')) return '수학Ⅰ';
  if (key.startsWith('H15-M2-')) return '수학Ⅱ';
  if (key.startsWith('H15-CALC-')) return '미적분';
  if (key.startsWith('H15-GV-')) return '기하와 벡터';
  return q?.standardCourse || '';
}

function normalizeQuestionUnitName(q) {
  return String(q?.standardUnit || '').trim();
}

function getQuestionCourseUnitOrder(q) {
  const course = q.standardCourse || inferCourseFromQuestion(q);
  const units = STANDARD_UNIT_MASTER[course] || [];
  const canon = unitCanon(normalizeQuestionUnitName(q));
  const byKey = units.find(u => u.key === q.standardUnitKey);
  if (byKey) return byKey.order;
  const byName = units.find(u => unitCanon(u.name) === canon);
  return byName?.order ?? (q.standardUnitOrder || 999);
}

function questionMatchesUnitValue(q, unitValue) {
  if (!unitValue) return true;
  const qKey = q.standardUnitKey || '';
  const qCanon = unitCanon(normalizeQuestionUnitName(q));
  if (isMergedUnitValue(unitValue)) return qCanon === getMergedCanon(unitValue);
  return qKey === unitValue;
}

function questionMatchesRange(q, startValue, endValue) {
  if (!startValue && !endValue) return true;
  const order = getQuestionCourseUnitOrder(q);
  const course = q.standardCourse || inferCourseFromQuestion(q);
  const units = STANDARD_UNIT_MASTER[course] || [];

  const getOrder = value => {
    if (!value) return null;
    if (isMergedUnitValue(value)) {
      const canon = getMergedCanon(value);
      const found = units.find(u => unitCanon(u.name) === canon);
      return found ? found.order : null;
    }
    return units.find(u => u.key === value)?.order ?? null;
  };

  const startOrder = getOrder(startValue);
  const endOrder = getOrder(endValue);
  if (startOrder != null && order < startOrder) return false;
  if (endOrder != null && order > endOrder) return false;
  return true;
}

function examMatchesCourse(exam, selectedCourse) {
  if (!selectedCourse) return true;
  const subject = String(exam.subject || '').trim();
  return subject === selectedCourse;
}

function examMatchesUnitFilter(exam, selectedUnit) {
  if (!selectedUnit) return true;
  const grade = exam.grade;
  const subject = String(exam.subject || '').trim();
  const courses = subject ? [subject] : getAvailableCoursesByGrade(grade);
  const targetCanon = isMergedUnitValue(selectedUnit) ? getMergedCanon(selectedUnit) : '';
  return courses.some(course => {
    const units = STANDARD_UNIT_MASTER[course] || [];
    if (isMergedUnitValue(selectedUnit)) return units.some(u => unitCanon(u.name) === targetCanon);
    return units.some(u => u.key === selectedUnit);
  });
}

function examTypeLabel(examType) {
  const v = String(examType || '').trim().toLowerCase();
  if (v === 'mid' || v === '중간' || v === '중간고사') return '중간';
  if (v === 'final' || v === '기말' || v === '기말고사') return '기말';
  return examType || '';
}

function buildMetaBadge(text, variant = '') {
  if (!text) return '';
  return `<span class="meta-badge ${variant}">${text}</span>`;
}

function buildMixerExamCardInfo(ex) {
  const fileName = String(ex.file || '파일정보없음').replace(/\.js$/i, '');
  const semester = ex.semester ? `${ex.semester}학기` : '';
  const examName = examTypeLabel(ex.examType);
  const contentTypeLabel = ex.contentType || '기출';
  const isSheet = contentTypeLabel === '기출';

  let title = '';
  let subtitle = '';
  let metaHTML = '';

  if (isSheet) {
    title = ex.school || fileName;
    subtitle = [ex.year ? `${ex.year}년` : '', semester, examName, ex.subject || '', contentTypeLabel].filter(Boolean).join(' · ');
    metaHTML = [
      buildMetaBadge(ex.grade || ''),
      buildMetaBadge(ex.subject || '', 'primary'),
      buildMetaBadge(`${semester} ${examName}`.trim(), 'primary')
    ].filter(Boolean).join('');
  } else {
    title = ex.topic || ex.school || fileName;
    subtitle = [ex.grade || '', contentTypeLabel, ex.subject || ''].filter(Boolean).join(' · ') || contentTypeLabel;
    metaHTML = [
      buildMetaBadge(ex.grade || ''),
      buildMetaBadge(contentTypeLabel, 'green'),
      buildMetaBadge(ex.subject || ''),
      (ex.school && ex.school !== 'AP수학') ? buildMetaBadge(ex.school) : ''
    ].filter(Boolean).join('');
  }

  return { title, subtitle: subtitle || '상세 정보 없음', metaHTML, fileName };
}

function getSelectedExamList() {
  return engineDB.exams.filter(ex => selectedExamFiles.has(ex.file));
}

function updateSelectedExamMeta() {
  const countEl = document.getElementById('selected-exam-count');
  const metaEl = document.getElementById('selected-exam-meta');
  if (!countEl || !metaEl) return;

  const selected = getSelectedExamList();
  countEl.textContent = String(selected.length);
  if (!selected.length) {
    metaEl.textContent = 'pool 미구성';
    return;
  }
  const loadedCount = selected.filter(ex => Array.isArray(loadedExamQuestionMap[ex.file])).length;
  metaEl.textContent = loadedCount === selected.length ? `pool 준비됨 · ${selected.length}개 시험지` : `선택됨 · ${selected.length}개 시험지`;
}

function syncSourceModeIfNeeded() {
  const sourceMode = document.getElementById('sourceMode');
  if (!sourceMode) return;
  if (!selectedExamFiles.size || !mergedPool.length) {
    if (sourceMode.value === 'selectedExams') sourceMode.value = 'activeExam';
  }
}

function toggleExamSelection(file, checked) {
  if (checked) selectedExamFiles.add(file);
  else selectedExamFiles.delete(file);

  if (!selectedExamFiles.size) {
    mergedPool = [];
    selectedPoolLoading = false;
  }

  updateSelectedExamMeta();
  syncSourceModeIfNeeded();
  renderExamList();
  refreshSourceDependentUI();
  renderQuestionList();
}

function clearSelectedExams() {
  selectedExamFiles.clear();
  mergedPool = [];
  selectedPoolLoading = false;
  updateSelectedExamMeta();
  syncSourceModeIfNeeded();
  renderExamList();
  refreshSourceDependentUI();
  renderQuestionList();
}

function selectFilteredExams() {
  filteredPaperPool.forEach(ex => selectedExamFiles.add(ex.file));
  updateSelectedExamMeta();
  renderExamList();
  renderQuestionList();
}

async function loadSelectedExamPool() {
  const selected = getSelectedExamList();
  if (!selected.length) {
    alert('선택한 시험지가 없습니다.');
    return;
  }

  selectedPoolLoading = true;
  updateSelectedExamMeta();

  for (const ex of selected) {
    if (!Array.isArray(loadedExamQuestionMap[ex.file])) {
      try {
        loadedExamQuestionMap[ex.file] = await loadQuestionData(ex.file);
      } catch (e) {
        loadedExamQuestionMap[ex.file] = [];
      }
    }
  }

  mergedPool = [];
  selected.forEach(ex => {
    const qs = loadedExamQuestionMap[ex.file] || [];
    qs.forEach((q, i) => {
      mergedPool.push({
        ...q,
        _sourceTitle: ex.school || ex.topic || ex.file,
        _sourceFile: ex.file,
        _qKey: `${ex.file}_${q.id || (i + 1)}`
      });
    });
  });

  selectedPoolLoading = false;
  updateSelectedExamMeta();
  const sourceMode = document.getElementById('sourceMode');
  if (sourceMode) sourceMode.value = 'selectedExams';
  refreshSourceDependentUI();
  renderQuestionList();
}

async function loadDB() {

    s.src = 'db.js?v=' + Date.now();
    s.onload = () => {
      const rawDB = window.mainDB || { exams: [] };
      engineDB = { exams: (rawDB.exams || []).map(normalizeExamMeta).filter(e => e.file) };
      resolve();
    };
    s.onerror = () => {
      engineDB = { exams: [] };
      resolve();
    };
    document.body.appendChild(s);
  });
}

function populateUnitFilter() {

  const course = document.getElementById('courseFilter').value;
  const select = document.getElementById('unitFilter');
  const current = select.value;
  let options = [];

  select.innerHTML = '<option value="">전체 소단원</option>';

function renderExamList() {
  const keyword = document.getElementById('paperSearch').value.toLowerCase();
  const grade = document.getElementById('gradeFilter').value;
  const course = document.getElementById('courseFilter').value;
  const unitValue = document.getElementById('unitFilter').value;

  filteredPaperPool = engineDB.exams.filter(ex => {
    const searchBase = [ex.school || '', ex.topic || '', ex.file || '', ex.subject || ''].join(' ').toLowerCase();
    const matchK = !keyword || searchBase.includes(keyword);
    const matchG = !grade || ex.grade === grade;
    const matchC = examMatchesCourse(ex, course);
    const matchU = examMatchesUnitFilter(ex, unitValue);
    return matchK && matchG && matchC && matchU;
  });

  const container = document.getElementById('paper-list');
  if (!filteredPaperPool.length) {
    container.innerHTML = '<div class="q-empty">조건에 맞는 시험지가 없습니다.</div>';
    return;
  }

  const isMobile = window.matchMedia('(max-width: 1024px)').matches;

  container.innerHTML = filteredPaperPool.map(ex => {
    const isActive = currentPaper && currentPaper.file === ex.file;
    const isSelected = selectedExamFiles.has(ex.file);
    const info = buildMixerExamCardInfo(ex);
    return `
      <div class="paper-item ${isActive ? 'active' : ''} ${isSelected ? 'selected' : ''}" data-file="${ex.file}">
        <div class="exam-item-head">
          <label class="exam-check-wrap">
            <input class="exam-check" type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleExamSelection('${ex.file.replace(/'/g, "\\'")}', this.checked); event.stopPropagation();">

          <div class="exam-main">

            <div class="paper-sub">${info.subtitle}</div>
            <div class="paper-meta-line">${info.metaHTML}</div>
            <div class="paper-file-name">${info.fileName}</div>
          </div>
        </div>

          <button class="action-btn" type="button" onclick="selectPaperByFile('${ex.file.replace(/'/g, "\\'")}'); event.stopPropagation();">미리보기</button>

      _qKey: `${currentPaper.file}_${q.id || (i + 1)}`
    }));

function getUniqueUnitsFromQuestions(questions) {
  const map = new Map();
  questions.forEach(q => {
    const name = normalizeQuestionUnitName(q);
    if (!name) return;
    const canon = unitCanon(name);
    const order = getQuestionCourseUnitOrder(q);
    if (!map.has(canon)) {
      map.set(canon, { value: `merged::${canon}`, name, order });
    } else {
      const existing = map.get(canon);
      if (order < existing.order) existing.order = order;
      if (name.length < existing.name.length) existing.name = name;
    }
  });
  return Array.from(map.values()).sort((a, b) => a.order - b.order || a.name.localeCompare(b.name, 'ko'));
}

    } else if (!currentPaper) {
      qPanelTitle.textContent = '문항 목록';

      container.innerHTML = '<div class="q-empty">왼쪽에서 시험지를 선택하세요.</div>';

      qPanelTitle.textContent = currentPaper.school || currentPaper.topic || '문항 목록';

      container.innerHTML = '<div class="q-empty">조건에 맞는 문항이 없습니다.</div>';
    }

  }

  const sourceMode = document.getElementById('sourceMode').value;
  qPanelTitle.textContent = sourceMode === 'selectedExams' ? '선택 시험지 pool' : (currentPaper.school || currentPaper.topic || '문항 목록');
  qCountInfo.textContent = `${pool.length}문항`;

  const renderItem = (q, idx) => {
    const qKey = q._qKey || `${q._sourceFile}_${q.id || (idx + 1)}`;
    const inCart = cart.some(c => c._qKey === qKey);
    const imgSrc = q.image ? (typeof q.image === 'string' ? q.image : `assets/images/${String(q._sourceFile || '').replace('.js','')}/q${q.id || (idx + 1)}.png`) : '';
    const choices = Array.isArray(q.choices) ? q.choices : [];
    return `
      <div class="q-item">
        <div class="q-item-head">
          <div class="q-meta">
            <span class="q-number">${q.id || (idx + 1)}번</span>
            <span>${q.standardUnit || ''}</span>
            <span class="q-source">${q._sourceTitle || ''}</span>
          </div>
          <button class="action-btn ${inCart ? 'primary' : ''}" type="button" onclick="toggleQuestionCart('${qKey.replace(/'/g, "\\'")}')">${inCart ? '담김' : '담기'}</button>
        </div>
        <div class="q-body">${q.content || ''}</div>
        ${imgSrc ? `<div class="q-image-wrap"><img src="${imgSrc}" onerror="this.style.display='none'"></div>` : ''}
        ${choices.length ? `<div class="q-choices">${choices.map((c, ci) => `<div class="choice-row"><span class="choice-num">${['①','②','③','④','⑤'][ci] || `${ci + 1}.`}</span><span>${c}</span></div>`).join('')}</div>` : ''}
      </div>
    `;
  };

  if (viewMode === 'standard') {
    const groups = new Map();
    pool.forEach((q, idx) => {
      const name = normalizeQuestionUnitName(q) || '미분류';
      if (!groups.has(name)) groups.set(name, []);
      groups.get(name).push({ q, idx });
    });
    let html = '';
    Array.from(groups.entries()).forEach(([name, items]) => {
      html += `<div class="q-group-title">${name} · ${items.length}문항</div>`;
      html += items.map(item => renderItem(item.q, item.idx)).join('');
    });
    container.innerHTML = html;
  } else {
    container.innerHTML = pool.map((q, idx) => renderItem(q, idx)).join('');
  }

  if (window.MathJax) MathJax.typesetPromise([container]);
}

function normalizeLevel(level) {
  const v = String(level || '').trim();
  if (v === '하' || v.toLowerCase() === 'low') return '하';
  if (v === '중' || v.toLowerCase() === 'mid' || v.toLowerCase() === 'medium') return '중';
  if (v === '상' || v.toLowerCase() === 'high') return '상';
  return '미분류';
}

function getLevelModeConfig(mode) {
  if (mode === 'low') return { '하': 0.5, '중': 0.4, '상': 0.1 };
  if (mode === 'mid') return { '하': 0.2, '중': 0.6, '상': 0.2 };
  if (mode === 'high') return { '하': 0.1, '중': 0.4, '상': 0.5 };
  return { '하': 0.3, '중': 0.5, '상': 0.2 };
}

function calcLevelTargets(totalCount, ratioMap) {
  const raw = {
    '하': totalCount * (ratioMap['하'] || 0),
    '중': totalCount * (ratioMap['중'] || 0),
    '상': totalCount * (ratioMap['상'] || 0)
  };
  const base = {
    '하': Math.floor(raw['하']),
    '중': Math.floor(raw['중']),
    '상': Math.floor(raw['상'])
  };
  let remain = totalCount - (base['하'] + base['중'] + base['상']);
  const fracOrder = ['하', '중', '상'].map(k => ({ key: k, frac: raw[k] - base[k] })).sort((a, b) => b.frac - a.frac);
  let idx = 0;
  while (remain > 0) {
    base[fracOrder[idx % fracOrder.length].key] += 1;
    remain -= 1;
    idx += 1;
  }
  return base;
}

function distributedPick(candidates, count) {
  const groups = {};
  candidates.forEach(c => {
    if (!groups[c._sourceFile]) groups[c._sourceFile] = [];
    groups[c._sourceFile].push(c);
  });
  const files = Object.keys(groups).sort(() => Math.random() - 0.5);
  const picked = [];
  let cycle = 0;
  while (picked.length < count && files.length > 0) {
    const idx = cycle % files.length;
    const f = files[idx];
    if (groups[f].length > 0) {
      const pickIndex = Math.floor(Math.random() * groups[f].length);
      picked.push(groups[f].splice(pickIndex, 1)[0]);
    } else {
      files.splice(idx, 1);
      continue;
    }
    cycle += 1;
  }
  return picked;
}

function groupCandidatesByLevel(candidates) {
  const groups = { '하': [], '중': [], '상': [], '미분류': [] };
  candidates.forEach(c => {
    const lv = normalizeLevel(c.level);
    if (!groups[lv]) groups[lv] = [];
    groups[lv].push(c);
  });
  return groups;
}

function pickBalancedByLevel(candidates, totalCount, mode) {
  const ratioMap = getLevelModeConfig(mode);
  const targets = calcLevelTargets(totalCount, ratioMap);
  const groups = groupCandidatesByLevel(candidates);
  let picked = [];
  ['하', '중', '상'].forEach(level => {
    const need = targets[level] || 0;
    if (!need) return;
    const part = distributedPick(groups[level] || [], Math.min(need, (groups[level] || []).length));
    picked.push(...part);
  });
  if (picked.length < totalCount) {
    const pickedKeys = new Set(picked.map(x => x._qKey));
    const remainPool = candidates.filter(c => !pickedKeys.has(c._qKey));
    const supplement = distributedPick(remainPool, totalCount - picked.length);
    picked.push(...supplement);
  }
  return picked.slice(0, totalCount);
}

function getLevelSummaryText(items) {
  const stat = { '하': 0, '중': 0, '상': 0, '미분류': 0 };
  items.forEach(item => {
    const lv = normalizeLevel(item.level);
    stat[lv] = (stat[lv] || 0) + 1;
  });
  return `하 ${stat['하']} / 중 ${stat['중']} / 상 ${stat['상']}${stat['미분류'] ? ` / 미분류 ${stat['미분류']}` : ''}`;
}

async function buildFilteredQuestionPool(course, unitValue) {
  const cartKeys = new Set(cart.map(c => c._qKey));
  const candidates = [];
  for (const ex of filteredPaperPool) {
    if (!Array.isArray(loadedExamQuestionMap[ex.file])) {
      try {
        loadedExamQuestionMap[ex.file] = await loadQuestionData(ex.file);
      } catch (e) {
        loadedExamQuestionMap[ex.file] = [];
      }
    }
    (loadedExamQuestionMap[ex.file] || []).forEach((q, i) => {
      const qCourse = q.standardCourse || inferCourseFromQuestion(q);
      const qKey = `${ex.file}_${q.id || (i + 1)}`;
      if (course && qCourse !== course) return;
      if (!questionMatchesUnitValue(q, unitValue)) return;
      if (cartKeys.has(qKey)) return;
      candidates.push({
        ...q,
        _sourceTitle: ex.school || ex.topic || ex.file,
        _sourceFile: ex.file,
        _qKey: qKey
      });
    });
  }
  return candidates;
}

async function handleAutoPick(mode) {
  const count = parseInt(document.getElementById('autoCountInput').value || '0', 10);
  if (!count) {
    alert('문항 수를 입력하세요.');
    return;
  }

  const autoSourceMode = document.getElementById('autoSourceMode').value;
  const course = document.getElementById('courseFilter').value;
  const startValue = document.getElementById('autoStartUnit').value || '';
  const endValue = document.getElementById('autoEndUnit').value || '';
  const levelMode = document.getElementById('levelBalanceMode').value;
  const statusEl = document.getElementById('autoStatusText');
  statusEl.textContent = '자동추출 중...';

  let candidates = [];
  if (autoSourceMode === 'selectedExams') {
    const cartKeys = new Set(cart.map(c => c._qKey));
    candidates = mergedPool.filter(q => {
      const qCourse = q.standardCourse || inferCourseFromQuestion(q);
      if (course && qCourse !== course) return false;
      if (!questionMatchesRange(q, startValue, endValue)) return false;
      return !cartKeys.has(q._qKey);
    });
  } else if (autoSourceMode === 'current') {
    if (!currentPaper) {
      statusEl.textContent = '현재 시험지를 선택해 주세요.';
      alert('현재 시험지를 먼저 선택해 주세요.');
      return;
    }
    const cartKeys = new Set(cart.map(c => c._qKey));
    candidates = currentQuestions.map((q, i) => ({
      ...q,
      _sourceTitle: currentPaper.school || currentPaper.topic || currentPaper.file,
      _sourceFile: currentPaper.file,
      _qKey: `${currentPaper.file}_${q.id || (i + 1)}`
    })).filter(q => {
      const qCourse = q.standardCourse || inferCourseFromQuestion(q);
      if (course && qCourse !== course) return false;
      if (!questionMatchesRange(q, startValue, endValue)) return false;
      return !cartKeys.has(q._qKey);
    });
  } else {
    candidates = await buildFilteredQuestionPool(course, '');
    candidates = candidates.filter(q => questionMatchesRange(q, startValue, endValue));
  }

  if (!candidates.length) {
    statusEl.textContent = '추출 가능한 문항이 없습니다.';
    alert('추가할 문항이 없습니다.');
    return;
  }

  const picked = pickBalancedByLevel(candidates, count, levelMode);
  if (mode === 'replace') cart = picked;
  else cart.push(...picked);

  updateCart();
  renderQuestionList();
  statusEl.textContent = `추출 완료 · ${getLevelSummaryText(picked)}`;
}

function updateCart() {
  const container = document.getElementById('cart-items');
  document.getElementById('cart-count').textContent = String(cart.length);
  document.getElementById('cartCountBadge').textContent = String(cart.length);
  if (!cart.length) {
    container.innerHTML = '<div class="q-empty">카트가 비어 있습니다.</div>';
    return;
  }
  container.innerHTML = cart.map((c, i) => `
    <div class="cart-item">
      <div class="cart-info">
        <div class="cart-title">${c._sourceTitle || ''} · ${c.id || (i + 1)}번</div>
        <div class="cart-sub">${String(c.standardUnit || '').trim() || '미분류'} · ${(c.content || '').replace(/<[^>]+>/g, '').slice(0, 28)}...</div>
      </div>
      <button class="small-btn remove" type="button" onclick="removeCart(${i})"><i class="fa-solid fa-xmark"></i></button>
    </div>
  `).join('');
}

function removeCart(index) {
  cart.splice(index, 1);
  updateCart();
  renderQuestionList();
}

function resetMixerState() {
  selectedExamFiles.clear();
  mergedPool = [];
  selectedPoolLoading = false;
  currentPaper = null;
  currentQuestions = [];
  cart = [];

  document.getElementById('paperSearch').value = '';
  document.getElementById('gradeFilter').value = '';
  document.getElementById('courseFilter').value = '';
  document.getElementById('unitFilter').value = '';
  document.getElementById('sourceMode').value = 'activeExam';
  document.getElementById('manualViewMode').value = 'default';
  document.getElementById('manualUnitFilter').value = '';
  document.getElementById('autoSourceMode').value = 'current';
  document.getElementById('levelBalanceMode').value = 'balanced';
  document.getElementById('autoCountInput').value = '20';

  populateCourseFilter();
  populateUnitFilter();
  updateSelectedExamMeta();
  updateCart();
  switchComposeMode('auto');
  renderExamList();
  refreshSourceDependentUI();
  renderQuestionList();
}

function openMixed() {
  if (!cart.length) {
    alert('문항을 담아주세요.');
    return;
  }
  const qpp = document.getElementById('print-qpp').value;
  const meta = { title: `믹서 출제 (${cart.length}문항)`, count: cart.length, qpp, at: new Date().toISOString() };
  let lOk = true;
  let sOk = true;
  try {
    localStorage.setItem('mixedQuestions', JSON.stringify(cart));
    localStorage.setItem('mixedMeta', JSON.stringify(meta));
  } catch (e) {
    lOk = false;
  }
  try {
    sessionStorage.setItem('mixedQuestions', JSON.stringify(cart));
    sessionStorage.setItem('mixedMeta', JSON.stringify(meta));
  } catch (e) {
    sOk = false;
  }
  if (!lOk && !sOk) alert('브라우저 저장소 용량이 부족합니다.');
  window.open(`mixed_engine.html?mode=exam&qpp=${qpp}`, '_blank');
}

async function init() {
  await loadDB();
  setupEvents();
  populateCourseFilter();
  populateUnitFilter();
  updateSelectedExamMeta();
  updateCart();
  switchComposeMode('auto');
  renderExamList();
  refreshSourceDependentUI();
  renderQuestionList();
}

window.onload = init;
</script>
</body>
