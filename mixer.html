<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS아카이브 | 믹서 개편 v4.5 (Master-Table Synced)</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']], packages: {'[+]': ['ams', 'boldsymbol']} },
            options: { enableMenu: false },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        :root {
            --navy: #07111f; --navy-2: #0c1a2e; --navy-3: #12233f;
            --blue: #2563eb; --blue-dark: #1d4ed8; --blue-soft: #eff6ff;
            --green: #10b981; --green-soft: #ecfdf5;
            --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
            --gray-300: #cbd5e1; --gray-500: #64748b;
            --text-main: #0f172a; --radius-md: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--gray-50); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }
        header { background: var(--navy); height: 58px; display: flex; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { color: white; text-decoration: none; font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .logo em { color: #60a5fa; font-style: normal; }

        .mixer-container { display: flex; height: calc(100vh - 58px); }
        .panel { display: flex; flex-direction: column; background: white; border-right: 1px solid var(--gray-200); height: 100%; min-width: 0; }
        .panel-header { padding: 15px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; min-height: 58px; flex-shrink: 0; }
        .panel-body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }

        /* 왼쪽 패널: 검색 및 시험지 목록 */
        .panel-papers { width: 360px; flex-shrink: 0; background: var(--gray-50); }
        .filter-area { padding: 15px 20px; border-bottom: 1px solid var(--gray-200); background: white; display: flex; flex-direction: column; gap: 8px; }
        
        /* 필터 토글 버튼 (소형 보조버튼화) */
        .btn-filter-toggle {
            height: 28px;
            padding: 0 12px;
            border-radius: 9999px;
            border: 1px solid var(--gray-200);
            background: white;
            color: var(--gray-500);
            font-size: 11.5px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex: 0 0 auto;
            transition: 0.2s;
        }
        .btn-filter-toggle:hover {
            background: var(--gray-50);
            color: var(--text-main);
            border-color: var(--gray-300);
        }

        .search-box { position: relative; }
        .search-box i { position: absolute; left: 12px; top: 12px; color: var(--gray-300); }
        .search-box input { width: 100%; height: 38px; padding: 0 12px 0 34px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; outline: none; }
        .filter-row { display: flex; gap: 6px; }
        .form-select { width: 100%; height: 36px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 12px; font-weight: 700; outline: none; background: white; }

        .exam-bulk-bar { padding: 12px 20px; background: #fdfdfe; border-bottom: 1px solid var(--gray-200); }
        .bulk-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 11.5px; font-weight: 800; color: var(--gray-500); }
        .exam-bulk-actions { display: flex; gap: 6px; }
        .btn-action { flex: 1; padding: 8px 0; font-size: 11px; font-weight: 800; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid var(--gray-200); background: white; color: var(--text-main); }
        .btn-action.primary { background: var(--blue); color: white; border-color: var(--blue); }
        .btn-action.reset { border-color: #fca5a5; color: #ef4444; }

        /* 시험지 카드 스타일 */
        .paper-item { padding: 16px; padding-right: 40px; border-radius: 12px; background: white; border: 1px solid var(--gray-200); margin-bottom: 10px; transition: 0.2s; position: relative; cursor: pointer; }
        .paper-item:hover { border-color: var(--blue); transform: translateY(-1px); }
        .paper-item.active { border-color: var(--blue); background: var(--blue-soft); box-shadow: inset 0 0 0 1px var(--blue); }
        .paper-item.selected { border-color: var(--green); }
        
        .btn-card-select { position: absolute; top: 14px; right: 14px; background: none; border: none; font-size: 20px; color: var(--gray-300); cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; height: 24px; width: 24px; }
        .paper-item.selected .btn-card-select { color: var(--green); }
        
        .card-title { font-size: 14.5px; font-weight: 800; margin-bottom: 6px; line-height: 1.3; word-break: keep-all; }
        .card-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .m-badge { font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; background: var(--gray-100); color: var(--gray-500); }
        .m-badge.blue { background: var(--blue-soft); color: var(--blue); }
        .card-file { font-size: 10px; color: var(--gray-300); word-break: break-all; border-top: 1px dashed var(--gray-100); padding-top: 6px; margin-top: 4px; }

        /* 중앙 패널: 문항 목록 */
        .panel-questions { flex: 1; min-width: 0; }
        .status-summary-bar { padding: 10px 20px; background: var(--navy); color: white; display: flex; align-items: center; justify-content: space-between; font-size: 11.5px; gap: 15px; }
        .stat-item { display: flex; align-items: center; gap: 6px; }
        .stat-label { color: rgba(255,255,255,0.5); font-weight: 400; }
        .stat-value { font-weight: 800; color: #60a5fa; }

        .question-filter-bar { padding: 12px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; gap: 10px; background: white; position: sticky; top: 0; z-index: 10; }
        
        .q-item { padding: 30px; border-bottom: 1px solid var(--gray-100); position: relative; }
        .q-item:hover { background: #fafafa; }
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .q-tag-line { display: flex; gap: 6px; margin-bottom: 8px; }
        .q-unit-tag { font-size: 10.5px; font-weight: 800; color: var(--blue); background: var(--blue-soft); padding: 2px 8px; border-radius: 4px; }
        .q-num { font-size: 16px; font-weight: 900; color: var(--text-main); }
        
        .q-content { font-size: 15px; line-height: 1.8; white-space: pre-wrap; word-break: keep-all; }
        .q-image { max-width: 100%; margin: 15px 0; border-radius: 8px; display: block; border: 1px solid var(--gray-100); }
        .q-choices { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 18px; }
        .choice-row { display: flex; gap: 10px; font-size: 14px; }
        
        .btn-add-cart { height: 36px; padding: 0 16px; border-radius: 8px; border: 1px solid var(--gray-200); background: white; font-size: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-add-cart.in { background: var(--blue); color: white; border-color: var(--blue); }

        /* 카트 패널 */
        .panel-cart { width: 340px; flex-shrink: 0; border-right: none; }
        .cart-item { padding: 12px; border: 1px solid var(--gray-100); border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; background: white; }
        .cart-footer { padding: 20px; border-top: 1px solid var(--gray-100); background: white; position: sticky; bottom: 0; }
        .btn-main { width: 100%; height: 52px; border: none; border-radius: var(--radius-md); background: var(--blue); color: white; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .empty-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--gray-300); text-align: center; padding: 40px; }
        .empty-placeholder i { font-size: 48px; margin-bottom: 15px; }

        @media (max-width: 900px) {
            .mixer-container { flex-direction: column; height: auto; }
            .panel { width: 100%; height: auto; border-right: none; }
            .panel-papers { max-height: 450px; }
            .panel-cart { position: sticky; bottom: 0; z-index: 900; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo"><i class="fa-solid fa-layer-group"></i><span><em>JS</em>아카이브 믹서</span></a>
</header>

<div class="mixer-container">
    <div class="panel panel-papers">
        <div class="filter-area">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 13px; font-weight: 800; color: var(--text-main);">탐색 필터</span>
                <button id="btn-toggle-filter" class="btn-filter-toggle" onclick="toggleFilterPanel()">
                    <i class="fa-solid fa-caret-down"></i> 필터 닫기
                </button>
            </div>
            
            <div id="filter-panel-content" style="display: flex; flex-direction: column; gap: 8px; margin-top: 8px;">
                <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="paperSearch" placeholder="학교명, 파일명 검색..."></div>
                <div class="filter-row">
                    <select id="gradeFilter" class="form-select">
                        <option value="">학년 선택</option>
                        <option value="고3">고3</option><option value="고2">고2</option><option value="고1">고1</option>
                        <option value="중3">중3</option><option value="중2">중2</option><option value="중1">중1</option>
                    </select>
                    <select id="axisFilter" class="form-select">
                        <option value="">전체 시험축</option>
                        <option value="1-mid">1학기 중간</option>
                        <option value="1-final">1학기 기말</option>
                        <option value="2-mid">2학기 중간</option>
                        <option value="2-final">2학기 기말</option>
                        <option value="other">기타/전범위</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="exam-bulk-bar">
            <div class="bulk-info">
                <span><b id="selected-count" style="color:var(--blue)">0</b>개 선택됨</span>
                <span id="bulk-status-text" style="font-size:10px;">파일을 체크하세요</span>
            </div>
            <div class="exam-bulk-actions">
                <button class="btn-action reset" type="button" onclick="resetMixerState()">초기화</button>
                <button class="btn-action" onclick="clearSelection()">선택해제</button>
                <button class="btn-action primary" onclick="loadMultipleExams()">불러오기</button>
            </div>
        </div>

        <div class="panel-body" id="paper-list"></div>
    </div>

    <div class="panel panel-questions">
        <div class="status-summary-bar" id="status-bar">
            <div class="stat-item"><span class="stat-label">Source:</span><span class="stat-value" id="cur-source-name">준비됨</span></div>
            <div class="stat-item"><span class="stat-label">표시 단원:</span><span class="stat-value" id="cur-unit-name">전체</span></div>
            <div class="stat-item"><span class="stat-label">표시 문항:</span><span class="stat-value" id="cur-q-count">0</span></div>
        </div>

        <div class="question-filter-bar">
            <select id="q-unit-filter" class="form-select" style="width:240px;"><option value="">전체 표준단원</option></select>
            <select id="q-view-mode" class="form-select" style="width:120px;"><option value="list">리스트형</option><option value="group">그룹형</option></select>
            <button class="btn-action primary" style="width:auto; padding:0 15px;" onclick="addCurrentFilterAll()">필터 전체 담기</button>
        </div>

        <div class="panel-body" id="question-list">
            <div class="empty-placeholder">
                <i class="fa-solid fa-file-circle-plus"></i>
                <p>왼쪽에서 시험지를 클릭하거나<br>여러 개 선택 후 불러오기를 누르세요.</p>
            </div>
        </div>
    </div>

    <div class="panel panel-cart">
        <div class="panel-header">
            <span style="font-weight:900;">출제 카트</span>
            <span id="cart-count" style="font-weight:900; color:var(--blue); background: var(--blue-soft); padding: 2px 10px; border-radius: 99px;">0</span>
        </div>
        
        <div class="panel-body" id="cart-items"></div>

        <div class="cart-footer">
            <select id="print-qpp" class="form-select" style="height:40px; margin-bottom:10px;">
                <option value="4">4문항/P</option>
                <option value="6">6문항/P</option>
                <option value="1">1문항/P</option>
            </select>
            <button class="btn-main" onclick="openMixedEngine()">시험지 생성</button>
        </div>
    </div>
</div>

<script>
/**
 * 필터 패널 토글 로직
 */
function toggleFilterPanel() {
    const panel = document.getElementById('filter-panel-content');
    const btn = document.getElementById('btn-toggle-filter');
    if (panel.style.display === 'none') {
        panel.style.display = 'flex';
        btn.innerHTML = '<i class="fa-solid fa-caret-down"></i> 필터 닫기';
    } else {
        panel.style.display = 'none';
        btn.innerHTML = '<i class="fa-solid fa-caret-right"></i> 필터 열기';
    }
}

/**
 * [Core] JS아카이브 표준단원 마스터 테이블 구조
 * 룰북 및 마스터 테이블에 등재된 완벽한 소단원 기준 화이트리스트
 */

    "H22-M1-06": { course: "미적분Ⅰ", unit: "부정적분", order: 6 },

/**
 * [Core] 문항의 표준단원 변환 및 검증 함수
 * 매핑 실패 시 원문 통과 절대 금지, '미분류'로 반환 및 로그 기록
 */
function getStandardizedUnit(q) {
    const key = String(q.standardUnitKey || '').trim();
    
    // 1. 이미 Master Table에 등재된 Key를 가진 경우 (우선순위 1)
    if (key && !key.startsWith('RAW-') && MASTER_TABLE[key]) {
        return MASTER_TABLE[key];
    }

    // 2. 15개정 등 비표준 문자열 매핑 시도
    const course = String(q.standardCourse || '').trim();
    const unit = String(q.standardUnit || '').trim();
    const mapKey = `${course}::${unit}`;
    
    const mappedKey = LEGACY_TO_KEY_MAP[mapKey];
    if (mappedKey && MASTER_TABLE[mappedKey]) {
        return MASTER_TABLE[mappedKey];
    }

    // 3. 매핑 완전 실패 시 (원문 통과 금지, 미분류 강제 격리)
    console.warn(`[미분류 발생] 파일: ${q._sourceFile || '알수없음'}, 문항: ${q.id}, 원문: ${mapKey}`);
    return { course: "기타", unit: "미분류", order: 999 };
}

function resetMixerState() {
  selectedFiles.clear();

  currentDisplayQuestions = [];
  cart = [];

  document.getElementById('paperSearch').value = '';
  document.getElementById('gradeFilter').value = '';
  document.getElementById('axisFilter').value = '';

  // 필터가 닫혀있다면 다시 열어줌
  const panel = document.getElementById('filter-panel-content');
  if (panel.style.display === 'none') {
      toggleFilterPanel();
  }

  renderExamList();

    </div>
  `;
}

function normalizeExamMeta(ex) {
    const n = { ...(ex || {}) };
    n.grade = (ex.grade || "").replace(/[^중고\d]/g, "");
    n.semester = String(ex.semester || "");
    n.examType = (ex.examType || "").toLowerCase();
    
    let axis = "other";
    if(n.semester === "1" && n.examType.includes("mid")) axis = "1-mid";
    else if(n.semester === "1" && n.examType.includes("final")) axis = "1-final";
    else if(n.semester === "2" && n.examType.includes("mid")) axis = "2-mid";
    else if(n.semester === "2" && n.examType.includes("final")) axis = "2-final";
    n._axis = axis;
    
    return n;
}

function renderExamList() {
    const keyword = document.getElementById('paperSearch').value.toLowerCase();
    const grade = document.getElementById('gradeFilter').value;
    const axis = document.getElementById('axisFilter').value;
    
    const filtered = engineDB.exams.filter(ex => {
        const searchBase = `${ex.school} ${ex.topic} ${ex.file}`.toLowerCase();
        return (!keyword || searchBase.includes(keyword)) &&
               (!grade || ex.grade === grade) &&
               (!axis || ex._axis === axis);
    });

    const container = document.getElementById('paper-list');
    container.innerHTML = filtered.length ? '' : '<div class="empty-placeholder"><p>조건에 맞는 시험지가 없습니다.</p></div>';

    filtered.forEach(ex => {
        const isSelected = selectedFiles.has(ex.file);
        const isActive = currentViewingSource && currentViewingSource.file === ex.file;
        
        const div = document.createElement('div');
        div.className = `paper-item ${isActive ? 'active' : ''} ${isSelected ? 'selected' : ''}`;
        div.onclick = () => loadSingleExam(ex);
        
        div.innerHTML = `
            <div class="card-title">${ex.school || ex.topic || ex.file}</div>
            <div class="card-meta">
                <span class="m-badge">${ex.grade}</span>
                <span class="m-badge blue">${getAxisLabel(ex._axis)}</span>
                <span class="m-badge">${ex.subject || '수학'}</span>
            </div>
            <div class="card-file">${ex.file}</div>
            <button class="btn-card-select" onclick="event.stopPropagation(); toggleFileSelection('${ex.file}')">
                <i class="fa-solid ${isSelected ? 'fa-check-square' : 'fa-square'}"></i>
            </button>
        `;
        container.appendChild(div);
    });
}

function getAxisLabel(axis) {
    const labels = { "1-mid": "1학기 중간", "1-final": "1학기 기말", "2-mid": "2학기 중간", "2-final": "2학기 기말", "other": "기타" };
    return labels[axis] || "기타";
}

function toggleFileSelection(file) {
    if (selectedFiles.has(file)) selectedFiles.delete(file);
    else selectedFiles.add(file);
    renderExamList();
    updateBulkStatus();
}

function clearSelection() {
    selectedFiles.clear();
    renderExamList();
    updateBulkStatus();
}

function updateBulkStatus() {
    document.getElementById('selected-count').innerText = selectedFiles.size;
    document.getElementById('bulk-status-text').innerText = selectedFiles.size > 0 ? "불러오기를 누르세요" : "파일을 체크하세요";
}

function updateCurrentUnitStatus() {
    const unit = document.getElementById('q-unit-filter')?.value || '';
    document.getElementById('cur-unit-name').innerText = unit || '전체';
}

function resetQuestionStatus(sourceText = '준비됨') {
    document.getElementById('cur-source-name').innerText = sourceText;
    document.getElementById('cur-q-count').innerText = '0';
    document.getElementById('cur-unit-name').innerText = '전체';
}

function getGlobalOrder(stdUnit) {
    if (stdUnit.unit === '미분류') return 999999;
    const base = COURSE_BASE_ORDER[stdUnit.course] || 90000;
    return base + stdUnit.order;
}

function updateUnitFilter(questions) {
    const select = document.getElementById('q-unit-filter');
    const current = select.value;
    const unitMap = new Map();

    questions.forEach(q => {
        const stdUnit = getStandardizedUnit(q);
        const name = stdUnit.unit;
        // 비표준(미분류)은 노출 필터에서 제외
        if (name && name !== '미분류') {
            if (!unitMap.has(name)) {
                unitMap.set(name, getGlobalOrder(stdUnit));
            }
        }
    });

    select.innerHTML = '<option value="">전체 표준단원</option>';
    Array.from(unitMap.entries())
        .sort((a, b) => a[1] - b[1] || a[0].localeCompare(b[0], 'ko'))
        .forEach(([name]) => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            select.appendChild(opt);
        });

    if (Array.from(unitMap.keys()).includes(current)) select.value = current;
    updateCurrentUnitStatus();
}

function addCurrentFilterAll() {
    const unitFilter = document.getElementById('q-unit-filter').value;
    const targets = unitFilter
        ? currentDisplayQuestions.filter(q => getStandardizedUnit(q).unit === unitFilter)
        : currentDisplayQuestions;

    const existing = new Set(cart.map(c => c._qKey));
    targets.forEach(q => {
        if (!existing.has(q._qKey)) cart.push(q);
    });

    updateCartUI();
    renderQuestionList();
}

function fetchQuestionData(file) {
    return new Promise((res, rej) => {
        delete window.questionBank;
        delete window.questions;
        const s = document.createElement('script');
        s.src = `exams/${file}?v=${Date.now()}`;
        s.onload = () => {
            const data = window.questions || window.questionBank;
            if (Array.isArray(data)) res(data);
            else rej(new Error(`Format Error: ${file}`));
            s.remove();
        };
        s.onerror = () => { rej(new Error(`Load Error: ${file}`)); s.remove(); };
        document.body.appendChild(s);
    });
}

async function loadSingleExam(ex) {
    currentViewingSource = ex;
    renderExamList();
    const container = document.getElementById('question-list');
    container.innerHTML = '<div class="empty-placeholder"><i class="fa-solid fa-spinner fa-spin"></i><p>문항을 불러오고 있습니다...</p></div>';
    try {
        const questions = await fetchQuestionData(ex.file);
        currentDisplayQuestions = questions.map(q => ({
            ...q,
            _sourceTitle: ex.school || ex.topic || ex.file,
            _sourceFile: ex.file,
            _qKey: `${ex.file}_${q.id}`
        }));
        updateStatusSummary(ex.school || ex.topic || ex.file, currentDisplayQuestions.length);
        updateUnitFilter(currentDisplayQuestions);
        renderQuestionList();
    } catch (e) {
        console.error(e);
        container.innerHTML = `<div class="empty-placeholder"><p>시험지를 불러오지 못했습니다.<br>${ex.file}</p></div>`;
        resetQuestionStatus('로드 실패');
    }
}

async function loadMultipleExams() {
    const files = Array.from(selectedFiles);
    if(files.length === 0) return alert('선택한 시험지가 없습니다.');
    currentViewingSource = { file: "multi", school: `${files.length}개 시험지 묶음` };
    renderExamList();
    const container = document.getElementById('question-list');
    container.innerHTML = '<div class="empty-placeholder"><i class="fa-solid fa-spinner fa-spin"></i><p>묶음 문항 처리 중...</p></div>';
    let allQs = [];
    for(const file of files) {
        try {
            const qs = await fetchQuestionData(file);
            const ex = engineDB.exams.find(e => e.file === file);
            allQs.push(...qs.map(q => ({
                ...q, _sourceTitle: ex.school || '기출', _sourceFile: file, _qKey: `${file}_${q.id}`
            })));
        } catch(e) { console.error(e); }
    }
    if (allQs.length === 0) {
        container.innerHTML = '<div class="empty-placeholder"><p>불러올 문항이 없습니다.</p></div>';
        resetQuestionStatus('불러오기 실패');
        return;
    }
    currentDisplayQuestions = allQs;
    updateStatusSummary(`${files.length}개 시험지`, allQs.length);
    updateUnitFilter(allQs);
    renderQuestionList();
}

function updateStatusSummary(sourceName, qCount) {
    document.getElementById('cur-source-name').innerText = sourceName;
    document.getElementById('cur-q-count').innerText = qCount;
}

function renderQuestionList() {
    const container = document.getElementById('question-list');
    const unitFilter = document.getElementById('q-unit-filter').value;
    const viewMode = document.getElementById('q-view-mode').value;
    
    let displayQs = unitFilter
        ? currentDisplayQuestions.filter(q => getStandardizedUnit(q).unit === unitFilter)
        : currentDisplayQuestions;
    
    if(displayQs.length === 0) {
        container.innerHTML = '<div class="empty-placeholder"><p>표시할 문항이 없습니다.</p></div>';
        return;
    }
    
    container.innerHTML = '';
    
    if(viewMode === 'group') {
        const groups = {};
        displayQs.forEach(q => {
            const stdUnit = getStandardizedUnit(q);
            const key = stdUnit.unit;
            if (!groups[key]) groups[key] = { list: [], globalOrder: getGlobalOrder(stdUnit) };
            groups[key].list.push(q);
        });

        // 교육과정 전체 순서(Global Order) 기준으로 그룹 정렬
        const sortedUnitNames = Object.keys(groups).sort((a, b) => groups[a].globalOrder - groups[b].globalOrder || a.localeCompare(b, 'ko'));

        sortedUnitNames.forEach(unitName => {
            const groupDiv = document.createElement('div');
            groupDiv.innerHTML = `<div style="padding:10px 20px; background:var(--gray-50); font-weight:800; font-size:13px; border-bottom:1px solid var(--gray-200);">${unitName}</div>`;
            groups[unitName].list.forEach(q => groupDiv.appendChild(createQuestionItem(q)));
            container.appendChild(groupDiv);
        });
    } else {
        displayQs.forEach(q => container.appendChild(createQuestionItem(q)));
    }
    if (window.MathJax) MathJax.typesetPromise([container]);
}

function createQuestionItem(q) {
    const isAdded = cart.some(c => c._qKey === q._qKey);
    const div = document.createElement('div');
    div.className = 'q-item';
    const stdUnit = getStandardizedUnit(q);
    
    let choicesHTML = '';
    if (q.choices && Array.isArray(q.choices) && q.choices.length > 0 && q.choices[0] !== '주관식') {
        choicesHTML = `<div class="q-choices">` + q.choices.map((c, ci) => 
            `<div class="choice-row"><span style="font-weight:700; color:var(--gray-500); min-width:24px;">(${ci + 1})</span><span>${c}</span></div>`
        ).join('') + `</div>`;
    }
    
    div.innerHTML = `
        <div class="q-header">
            <div>
                <div class="q-tag-line">
                    <span class="q-unit-tag">${stdUnit.course}</span>
                    <span class="q-unit-tag" style="background:#eee; color:#666;">${stdUnit.unit}</span>
                </div>
                <span class="q-num">${q.id}번</span>
                <span style="font-size:11px; color:#999; margin-left:10px;">${q._sourceTitle}</span>
            </div>
            <button class="btn-add-cart ${isAdded ? 'in' : ''}" onclick="toggleCart('${q._qKey}')">
                <i class="fa-solid ${isAdded ? 'fa-check' : 'fa-plus'}"></i>${isAdded ? '담김' : '담기'}
            </button>
        </div>
        <div class="q-content">${q.content}</div>
        ${q.image ? `<img src="${q.image}" class="q-image">` : ''}
        ${choicesHTML}
    `;
    return div;
}

window.onload = async () => {
    const s = document.createElement('script');
    s.src = 'db.js?v=' + Date.now();
    s.onload = () => {
        if(window.mainDB) {
            engineDB.exams = window.mainDB.exams.map(normalizeExamMeta);
            renderExamList();
        }
    };
    document.body.appendChild(s);
    
    document.getElementById('paperSearch').oninput = renderExamList;
    document.getElementById('gradeFilter').onchange = renderExamList;
    document.getElementById('axisFilter').onchange = renderExamList;
    document.getElementById('q-unit-filter').onchange = () => {
        renderQuestionList();
        updateCurrentUnitStatus();
    };
    document.getElementById('q-view-mode').onchange = renderQuestionList;
};

function toggleCart(qKey) {
    const idx = cart.findIndex(c => c._qKey === qKey);
    if(idx > -1) cart.splice(idx, 1);
    else {
        const q = currentDisplayQuestions.find(it => it._qKey === qKey);
        if(q) cart.push(q);
    }
    updateCartUI();
    renderQuestionList();
}

function updateCartUI() {
    document.getElementById('cart-count').innerText = cart.length;
    const container = document.getElementById('cart-items');
    container.innerHTML = cart.map((c, i) => {
        const stdUnit = getStandardizedUnit(c);
        return `
        <div class="cart-item">
            <span style="font-size:12px; font-weight:700;">
                <span style="color:var(--blue); font-size:10px; margin-right:4px;">[${stdUnit.unit}]</span>
                ${c._sourceTitle} ${c.id}번
            </span>
            <i class="fa-solid fa-xmark" style="cursor:pointer; color:#ccc;" onclick="toggleCart('${c._qKey}')"></i>
        </div>
        `;
    }).join('');
}

function openMixedEngine() {
    if(cart.length === 0) return alert('카트가 비어있습니다.');
    localStorage.setItem('mixedQuestions', JSON.stringify(cart));
    window.open(`mixed_engine.html?qpp=${document.getElementById('print-qpp').value}`, '_blank');
}
</script>
