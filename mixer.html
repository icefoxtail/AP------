<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS아카이브 | 믹서 출제 (v3.3.2 Normalized)</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']], packages: {'[+]': ['ams', 'boldsymbol']} },
            options: { enableMenu: false },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        :root {
            --navy: #07111f; --navy-2: #0c1a2e; --navy-3: #12233f;
            --blue: #2563eb; --blue-dark: #1d4ed8; --blue-soft: #eff6ff;
            --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0; 
            --gray-300: #cbd5e1; --gray-500: #64748b;
            --text-main: #0f172a; --radius-md: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--gray-50); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }
        header { background: var(--navy); height: 58px; display: flex; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { color: white; text-decoration: none; font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .logo em { color: #60a5fa; font-style: normal; }
        .mixer-container { display: flex; height: calc(100vh - 58px); }
        .panel { display: flex; flex-direction: column; background: white; border-right: 1px solid var(--gray-200); height: 100%; min-width: 0; }
        .panel-header { padding: 15px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; min-height: 58px; flex-shrink: 0; }
        .panel-body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        
        /* Left: Papers & Bulk Selection */
        .panel-papers { width: 340px; flex-shrink: 0; background: var(--gray-50); }
        .filter-area { padding: 15px 20px; border-bottom: 1px solid var(--gray-200); background: white; display: flex; flex-direction: column; gap: 8px; }
        .search-box { position: relative; }
        .search-box input { width: 100%; height: 38px; padding: 0 12px 0 34px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; outline: none; }
        .search-box i { position: absolute; left: 12px; top: 12px; color: var(--gray-300); }
        .form-select { width: 100%; height: 36px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 12px; font-weight: 600; outline: none; background: white; }
        .filter-row { display: flex; gap: 6px; }
        
        .exam-bulk-bar { padding: 12px 20px; background: var(--blue-soft); border-bottom: 1px solid var(--gray-200); }
        .exam-bulk-top { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; font-weight: 800; color: var(--blue-dark); }
        .exam-bulk-actions { display: flex; gap: 6px; }
        .panel-action { flex: 1; padding: 6px 0; font-size: 11.5px; font-weight: 700; background: white; border: 1px solid var(--blue); color: var(--blue); border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .panel-action:hover { background: var(--blue); color: white; }
        .panel-action.primary { background: var(--blue); color: white; }
        .panel-action.primary:hover { background: var(--blue-dark); }

        /* 인덱스 기준 시험지 카드 UI */
        .paper-item {
          padding: 14px 16px;
          border-radius: 12px;
          background: white;
          border: 1px solid var(--gray-200);
          margin-bottom: 10px;
          cursor: pointer;
          transition: 0.2s;
        }
        .paper-item:hover { border-color: var(--blue); background: #fdfdfe; }
        .paper-item.active { border-color: var(--blue); background: var(--blue-soft); box-shadow: inset 0 0 0 1px var(--blue); }
        .paper-item.selected { border-color: var(--blue-dark); background: #eef2ff; }

        .exam-item-head { display: flex; gap: 10px; align-items: flex-start; }
        .exam-check { margin-top: 2px; cursor: pointer; width: 16px; height: 16px; accent-color: var(--blue); flex-shrink: 0; }
        .exam-main { flex: 1; min-width: 0; }
        .paper-name { font-size: 15px; font-weight: 800; line-height: 1.32; color: var(--text-main); margin-bottom: 6px; word-break: keep-all; overflow-wrap: anywhere; }
        .paper-sub { font-size: 12px; line-height: 1.5; color: var(--gray-500); margin-bottom: 8px; word-break: keep-all; overflow-wrap: anywhere; }
        .paper-meta-line { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        
        .meta-badge { display: inline-flex; align-items: center; min-height: 24px; padding: 0 9px; border-radius: 8px; font-size: 10.5px; font-weight: 800; color: #475569; background: #f8fafc; border: 1px solid #e2e8f0; }
        .meta-badge.primary { color: var(--blue); background: #eff6ff; border-color: #dbeafe; }
        .meta-badge.green { color: #047857; background: #ecfdf5; border-color: #b7efd4; }
        
        .paper-file-name { font-size: 10.5px; line-height: 1.4; color: #94a3b8; word-break: break-all; padding-top: 8px; border-top: 1px dashed #e2e8f0; }

        /* Middle: Action Bar & Questions */
        .panel-questions { flex: 1; min-width: 0; }
        .top-action-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 10px 20px; border-bottom: 1px solid var(--gray-100); background: #fdfdfe; }
        .top-action-bar input[type="number"] { width: 55px; height: 34px; border: 1px solid var(--gray-200); border-radius: 6px; text-align: center; font-weight: 700; font-size: 12px; }
        .q-item { padding: 30px; border-bottom: 1px solid var(--gray-100); }
        .q-num { font-size: 16px; font-weight: 900; color: var(--blue); }
        .q-content { font-size: 15px; line-height: 1.8; white-space: pre-wrap; margin-bottom: 16px; word-break: keep-all; }
        .q-image { max-width: 100%; margin: 15px 0; border-radius: 8px; display: block; border: 1px solid var(--gray-100); }
        .q-choices { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 20px; }
        .choice-row { display: flex; gap: 10px; font-size: 14.5px; }
        .choice-num { font-weight: 700; color: var(--gray-500); min-width: 24px; }

        .btn-add-q { height: 34px; padding: 0 12px; border-radius: 8px; border: 1px solid var(--gray-200); background: white; font-size: 11.5px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-add-q:hover { background: var(--blue-soft); border-color: var(--blue); }
        .btn-add-q.in-cart { background: var(--blue); border-color: var(--blue); color: white; }
        
        /* Right: Cart */
        .panel-cart { width: 340px; flex-shrink: 0; border-right: none; }
        .cart-item { padding: 12px; border: 1px solid var(--gray-100); border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; background: white; }
        .cart-info { flex: 1; min-width: 0; }
        .cart-q-text { font-size: 12px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px; }
        .cart-q-sub { font-size: 10px; color: var(--gray-500); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cart-footer { padding: 20px; border-top: 1px solid var(--gray-100); background: white; position: sticky; bottom: 0; }
        .btn-main { width: 100%; height: 52px; border: none; border-radius: var(--radius-md); background: var(--blue); color: white; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .status-label { font-size: 11px; font-weight: 800; color: var(--blue); margin-left: auto; }
        @media (max-width: 900px) {
            .mixer-container { flex-direction: column; height: auto; }
            .panel { width: 100%; height: auto; border-right: none; }
            .panel-papers { max-height: 400px; }
            .panel-cart { position: sticky; bottom: 0; z-index: 900; border-top: 1px solid var(--gray-200); box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        }
    </style>
</head>
<body>

<header>

<div class="mixer-container">

<script>
// [인덱스 데이터 정규화 레이어 (Normalization Functions)]
function compactText(value) { return String(value || '').replace(/\s+/g, '').trim(); }

function normalizeContentType(value) {
    const raw = String(value || '').trim();
    const compact = compactText(raw);
    if (!compact) return '';
    if (compact.includes('단원평가')) return '단원평가';
    if (compact.includes('기출')) return '기출';
    if (compact.includes('유형')) return '유형';
    if (compact.includes('쪽지')) return '쪽지';
    return raw;
}

function normalizeGrade(value) {
    const compact = compactText(value);
    if (compact === '고1' || compact === '고등1' || compact === '고등학교1학년') return '고1';
    if (compact === '고2' || compact === '고등2' || compact === '고등학교2학년') return '고2';
    if (compact === '고3' || compact === '고등3' || compact === '고등학교3학년') return '고3';
    if (compact === '중1' || compact === '중등1' || compact === '중학교1학년') return '중1';
    if (compact === '중2' || compact === '중등2' || compact === '중학교2학년') return '중2';
    if (compact === '중3' || compact === '중등3' || compact === '중학교3학년') return '중3';
    return String(value || '').trim();
}

function normalizeSemester(value) {
    const compact = compactText(value);
    if (!compact) return '';
    if (compact === '1' || compact === '1학기') return '1';
    if (compact === '2' || compact === '2학기') return '2';
    return String(value || '').trim();
}

function normalizeExamType(value) {
    const compact = compactText(value).toLowerCase();
    if (!compact) return '';
    if (compact === 'mid' || compact === 'middle' || compact === '중간' || compact === '중간고사') return 'mid';
    if (compact === 'final' || compact === '기말' || compact === '기말고사') return 'final';
    return String(value || '').trim();
}

function normalizeYear(value) {
    if (value === '' || value == null) return '';
    const s = String(value).replace(/[^\d]/g, '');
    if (!s) return '';
    const n = parseInt(s, 10);
    return Number.isFinite(n) ? n : '';
}

function normalizeExamMeta(ex) {
    const normalized = { ...(ex || {}) };
    normalized.file = String(ex?.file || '').trim();
    normalized.school = String(ex?.school || '').trim();
    normalized.topic = String(ex?.topic || '').trim();
    normalized.subject = String(ex?.subject || '').trim();
    normalized.grade = normalizeGrade(ex?.grade);
    normalized.year = normalizeYear(ex?.year);
    normalized.semester = normalizeSemester(ex?.semester);
    normalized.examType = normalizeExamType(ex?.examType);
    normalized.contentType = normalizeContentType(ex?.contentType);
    return normalized;
}

function getAvailableCoursesByGrade(grade) {
  if (!grade) return [];
  if (grade === "중1") return ["중1 수학"];

  if (grade === "중3") return ["중3 수학"];

  if (grade === "고2") return ["대수", "확률과 통계", "수학Ⅰ", "미적분Ⅰ"];
  if (grade === "고3") return ["미적분Ⅱ", "기하", "수학Ⅱ", "미적분", "기하와 벡터"];
  return [];
}

function getStandardUnitOptionsByCourse(courseName) {
  return STANDARD_UNIT_MASTER[courseName] || [];
}

function getExamCourseRanges(exam) {
  return Array.isArray(exam.courseRanges) ? exam.courseRanges : [];
}

function examMatchesCourse(exam, selectedCourse) {
  if (!selectedCourse) return true;
  if (exam.primaryStandardCourse === selectedCourse) return true;
  return getExamCourseRanges(exam).some(cr => cr.standardCourse === selectedCourse);
}

function examMatchesUnitRange(exam, selectedCourse, unitKey, startKey, endKey) {
  if (!selectedCourse) return !unitKey && !startKey && !endKey;
  const units = getStandardUnitOptionsByCourse(selectedCourse);
  const unitMap = new Map(units.map(u => [u.key, u]));
  const targetRange = getExamCourseRanges(exam).find(cr => cr.standardCourse === selectedCourse);
  if (!targetRange) return false;

  const startOrder = startKey ? (unitMap.get(startKey)?.order ?? Infinity) : -Infinity;
  const endOrder = endKey ? (unitMap.get(endKey)?.order ?? -Infinity) : Infinity;
  const examStart = targetRange.rangeStartUnitOrder ?? Infinity;
  const examEnd = targetRange.rangeEndUnitOrder ?? -Infinity;

  if (unitKey) {
    const u = unitMap.get(unitKey);
    if (!u) return false;
    return examStart <= u.order && u.order <= examEnd;
  }
  return examEnd >= startOrder && examStart <= endOrder;
}

function distributedPick(candidates, count) {
  const groups = {};
  candidates.forEach(c => {
    if (!groups[c._sourceFile]) groups[c._sourceFile] = [];
    groups[c._sourceFile].push(c);
  });

  const files = Object.keys(groups).sort(() => Math.random() - 0.5);
  const picked = [];
  let cycle = 0;

  while (picked.length < count && files.length > 0) {
    const idx = cycle % files.length;
    const f = files[idx];
    if (groups[f].length > 0) {
      const pickIndex = Math.floor(Math.random() * groups[f].length);
      picked.push(groups[f].splice(pickIndex, 1)[0]);
    } else {
      files.splice(idx, 1);
      continue;
    }
    cycle++;
  }
  return picked;
}

// [난이도 밸런스 추출 헬퍼 함수]
function normalizeLevel(level) {
  const v = String(level || '').trim();
  if (v === '하' || v.toLowerCase() === 'low') return '하';
  if (v === '중' || v.toLowerCase() === 'mid' || v.toLowerCase() === 'medium') return '중';
  if (v === '상' || v.toLowerCase() === 'high') return '상';
  return '미분류';
}

function getLevelModeConfig(mode, totalCount) {
  if (mode === 'low') return { '하': 0.5, '중': 0.4, '상': 0.1 };
  if (mode === 'mid') return { '하': 0.2, '중': 0.6, '상': 0.2 };
  if (mode === 'high') return { '하': 0.1, '중': 0.4, '상': 0.5 };
  return { '하': 0.3, '중': 0.5, '상': 0.2 };
}

function calcLevelTargets(totalCount, ratioMap) {
  const raw = {
    '하': totalCount * (ratioMap['하'] || 0),
    '중': totalCount * (ratioMap['중'] || 0),
    '상': totalCount * (ratioMap['상'] || 0)
  };

  const base = {
    '하': Math.floor(raw['하']),
    '중': Math.floor(raw['중']),
    '상': Math.floor(raw['상'])
  };

  let remain = totalCount - (base['하'] + base['중'] + base['상']);
  const fracOrder = ['하', '중', '상']
    .map(k => ({ key: k, frac: raw[k] - base[k] }))
    .sort((a, b) => b.frac - a.frac);

  let idx = 0;
  while (remain > 0) {
    base[fracOrder[idx % fracOrder.length].key] += 1;
    remain--;
    idx++;
  }
  return base;
}

function groupCandidatesByLevel(candidates) {
  const groups = { '하': [], '중': [], '상': [], '미분류': [] };
  candidates.forEach(c => {
    const lv = normalizeLevel(c.level);
    if (!groups[lv]) groups[lv] = [];
    groups[lv].push(c);
  });
  return groups;
}

function pickBalancedByLevel(candidates, totalCount, mode) {
  const ratioMap = getLevelModeConfig(mode, totalCount);
  const targets = calcLevelTargets(totalCount, ratioMap);
  const groups = groupCandidatesByLevel(candidates);

  let picked = [];
  ['하', '중', '상'].forEach(level => {
    const need = targets[level] || 0;
    if (!need) return;
    const part = distributedPick(groups[level] || [], Math.min(need, (groups[level] || []).length));
    picked.push(...part);
  });

  if (picked.length < totalCount) {
    const pickedKeys = new Set(picked.map(x => x._qKey));
    const remainPool = candidates.filter(c => !pickedKeys.has(c._qKey));
    const supplement = distributedPick(remainPool, totalCount - picked.length);
    picked.push(...supplement);
  }
  return picked.slice(0, totalCount);
}

function getLevelSummaryText(items) {
  const stat = { '하': 0, '중': 0, '상': 0, '미분류': 0 };
  items.forEach(item => {
    const lv = normalizeLevel(item.level);
    stat[lv] = (stat[lv] || 0) + 1;
  });
  return `하 ${stat['하']} / 중 ${stat['중']} / 상 ${stat['상']}${stat['미분류'] ? ` / 미분류 ${stat['미분류']}` : ''}`;
}

function examTypeLabel(examType) {
  const v = String(examType || '').trim().toLowerCase();
  if (v === 'mid' || v === '중간' || v === '중간고사') return '중간';
  if (v === 'final' || v === '기말' || v === '기말고사') return '기말';
  return examType || '';
}

function buildMixerMetaBadge(text, variant = '') {
  if (!text) return '';
  return `<span class="meta-badge ${variant}">${text}</span>`;
}

function buildMixerExamCardInfo(ex) {
  const fileName = String(ex.file || '파일정보없음').replace(/\.js$/i, '');
  const semester = ex.semester ? `${ex.semester}학기` : '';
  const examName = examTypeLabel(ex.examType);
  const contentTypeLabel = ex.contentType || '기출';
  const isSheet = contentTypeLabel === '기출';

  let title = '';
  let subtitle = '';
  let metaHTML = '';

  if (isSheet) {
    title = ex.school || fileName;
    subtitle = [
      ex.year ? `${ex.year}년` : '',
      semester,
      examName,
      ex.subject || '',
      contentTypeLabel
    ].filter(Boolean).join(' · ');

    metaHTML = [
      buildMixerMetaBadge(ex.grade || ''),
      buildMixerMetaBadge(ex.subject || '', 'primary'),
      buildMixerMetaBadge(`${semester} ${examName}`.trim(), 'primary')
    ].filter(Boolean).join('');
  } else {
    title = ex.topic || ex.school || fileName;
    subtitle = [
      ex.grade || '',
      contentTypeLabel,
      ex.subject || ''
    ].filter(Boolean).join(' · ');

    if (!subtitle) subtitle = contentTypeLabel;

    metaHTML = [
      buildMixerMetaBadge(ex.grade || ''),
      buildMixerMetaBadge(contentTypeLabel, 'green'),
      buildMixerMetaBadge(ex.subject || ''),
      (ex.school && ex.school !== 'AP수학') ? buildMixerMetaBadge(ex.school) : ''
    ].filter(Boolean).join('');
  }

  return {
    title,
    subtitle: subtitle || '상세 정보 없음',
    metaHTML,
    fileName
  };
}

// [Pool Functions]
let selectedExamFiles = new Set();
let loadedExamQuestionMap = {};
let mergedPool = [];
let selectedPoolLoading = false;
let lastSelectedPoolKey = '';

function getSelectedExamList() {
  return engineDB.exams.filter(ex => selectedExamFiles.has(ex.file));
}

function updateSelectedExamMeta() {
  const countEl = document.getElementById('selected-exam-count');
  const metaEl = document.getElementById('selected-exam-meta');
  if (!countEl || !metaEl) return;

  const selected = getSelectedExamList();
  countEl.textContent = String(selected.length);

  if (!selected.length) {
    metaEl.textContent = 'pool 미구성';
    return;
  }

  const loadedCount = selected.filter(ex => Array.isArray(loadedExamQuestionMap[ex.file])).length;
  metaEl.textContent = loadedCount === selected.length
    ? `pool 준비됨 · ${selected.length}개 시험지`
    : `선택됨 · ${selected.length}개 시험지`;
}

function toggleExamSelection(file, checked) {
  if (checked) selectedExamFiles.add(file);
  else selectedExamFiles.delete(file);
  updateSelectedExamMeta();
  renderExamList();
}

function clearSelectedExams() {
  selectedExamFiles.clear();
  mergedPool = [];
  lastSelectedPoolKey = '';
  updateSelectedExamMeta();
  renderExamList();
  handleSourceModeChange();
}

function selectFilteredExams() {
  filteredPaperPool.forEach(ex => selectedExamFiles.add(ex.file));
  updateSelectedExamMeta();
  renderExamList();
}

async function loadSelectedExamPool() {
  const selected = getSelectedExamList();
  if (!selected.length) {
    alert('선택한 시험지가 없습니다.');
    return;
  }

  selectedPoolLoading = true;
  updateSelectedExamMeta();

  for (const ex of selected) {
    if (!Array.isArray(loadedExamQuestionMap[ex.file])) {
      try {
        loadedExamQuestionMap[ex.file] = await loadQuestionData(ex.file);
      } catch (e) {
        loadedExamQuestionMap[ex.file] = [];
      }
    }
  }

  mergedPool = [];
  selected.forEach(ex => {
    const qs = loadedExamQuestionMap[ex.file] || [];
    qs.forEach((q, i) => {
      mergedPool.push({
        ...q,
        _sourceTitle: ex.school || ex.topic,
        _sourceFile: ex.file,
        _qKey: `${ex.file}_${q.id || (i + 1)}`
      });
    });
  });

  lastSelectedPoolKey = selected.map(ex => ex.file).sort().join('|');
  selectedPoolLoading = false;
  updateSelectedExamMeta();

  const sourceMode = document.getElementById('source-mode');
  if (sourceMode) sourceMode.value = 'selectedExams';
  handleSourceModeChange();
}

function handleSourceModeChange() {
  renderQuestionList();
  renderActionBar();
}

function getQuestionSourcePool() {
  const sourceMode = document.getElementById('source-mode')?.value || 'activeExam';
  if (sourceMode === 'selectedExams') return mergedPool;
  if (!currentPaper) return [];
  return currentQuestions.map((q, i) => ({
    ...q,
    _sourceTitle: currentPaper.school || currentPaper.topic,
    _sourceFile: currentPaper.file,
    _qKey: `${currentPaper.file}_${q.id || (i + 1)}`
  }));
}

async function loadDB() {
  return new Promise(res => {
    const s = document.createElement('script');
    s.src = 'db.js?v=' + Date.now();
    s.onload = () => {
      const rawDB = window.mainDB || { exams: [] };
      engineDB = { exams: rawDB.exams.map(normalizeExamMeta).filter(e => e.file) };
      res();
    };
    s.onerror = () => {
      engineDB = { exams: [] };
      res();
    };
    document.body.appendChild(s);
  });
}

  const courseSelect = document.getElementById('courseFilter');
  const courses = getAvailableCoursesByGrade(grade);
  courseSelect.innerHTML = '<option value="">전체 과목</option>';
  courses.forEach(course => {
    const opt = document.createElement('option');
    opt.value = course; opt.textContent = course;
    courseSelect.appendChild(opt);
  });
}

function populateStandardUnitFilter() {
  const course = document.getElementById('courseFilter').value;
  const select = document.getElementById('standardUnitFilter');
  const options = getStandardUnitOptionsByCourse(course);
  select.innerHTML = '<option value="">전체 단원</option>';
  options.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.key; opt.textContent = u.name;
    select.appendChild(opt);
  });
}

function syncStartEndUnitFilters() {
  const course = document.getElementById('courseFilter').value;
  const units = getStandardUnitOptionsByCourse(course);
  const s = document.getElementById('startUnitFilter');
  const e = document.getElementById('endUnitFilter');
  s.innerHTML = '<option value="">시작 단원</option>';
  e.innerHTML = '<option value="">끝 단원</option>';
  units.forEach(u => {
    const o1 = document.createElement('option'); o1.value = u.key; o1.textContent = u.name; s.appendChild(o1);
    const o2 = document.createElement('option'); o2.value = u.key; o2.textContent = u.name; e.appendChild(o2);
  });
}

// [Render Exam List]
function renderExamList() {
  const keyword = document.getElementById('paperSearch').value.toLowerCase();
  const grade = document.getElementById('gradeFilter').value;
  const course = document.getElementById('courseFilter').value;
  const unitKey = document.getElementById('standardUnitFilter').value;
  const startKey = document.getElementById('startUnitFilter').value;
  const endKey = document.getElementById('endUnitFilter').value;

  filteredPaperPool = engineDB.exams.filter(ex => {
    const searchBase = [
      ex.school || '',
      ex.topic || '',
      ex.file || '',
      ex.subject || '',
      ex.primaryStandardCourse || '',
      ...(Array.isArray(ex.courseRanges) ? ex.courseRanges.map(cr => cr.standardCourse || '') : [])
    ].join(' ').toLowerCase();

    const matchK = !keyword || searchBase.includes(keyword);
    const matchG = !grade || ex.grade === grade;
    const matchC = examMatchesCourse(ex, course);
    const matchU = examMatchesUnitRange(ex, course, unitKey, startKey, endKey);
    return matchK && matchG && matchC && matchU;
  });

  const container = document.getElementById('paper-list');
  container.innerHTML = filteredPaperPool.length ? '' : '<div class="empty-box"><p>결과 없음</p></div>';

  filteredPaperPool.forEach(ex => {
    const checked = selectedExamFiles.has(ex.file);
    const info = buildMixerExamCardInfo(ex);

    const div = document.createElement('div');
    div.className = `paper-item ${currentPaper?.file === ex.file ? 'active' : ''} ${checked ? 'selected' : ''}`;
    div.innerHTML = `
      <div class="exam-item-head">
        <input type="checkbox" class="exam-check" ${checked ? 'checked' : ''} onclick="event.stopPropagation(); toggleExamSelection('${ex.file}', this.checked)">
        <div class="exam-main">
          <div class="paper-name">${info.title}</div>
          <div class="paper-sub">${info.subtitle}</div>
          <div class="paper-meta-line">${info.metaHTML}</div>
          <div class="paper-file-name">${info.fileName}</div>
        </div>
      </div>
    `;
    div.onclick = () => selectPaper(ex);
    container.appendChild(div);
  });

  updateSelectedExamMeta();
  renderActionBar();
}

async function selectPaper(ex) {
    currentPaper = ex; renderExamList();
    const sourceMode = document.getElementById('source-mode');
    if (sourceMode) sourceMode.value = 'activeExam';

    const container = document.getElementById('question-list');
    container.innerHTML = '<div class="empty-box"><i class="fa-solid fa-spinner fa-spin"></i><p>로딩 중...</p></div>';
    
    try {
        const qs = await loadQuestionData(ex.file);
        ex._loadedQuestions = qs; currentQuestions = qs;
        handleSourceModeChange();
    } catch (e) { container.innerHTML = '<p>로드 실패</p>'; }
}

function loadQuestionData(file) {
    return new Promise((res, rej) => {
        const old = document.getElementById('temp-script'); if (old) old.remove();
        const s = document.createElement('script');
        s.id = 'temp-script'; s.src = `exams/${file}?v=${Date.now()}`;
        s.onload = () => { 
            const d = window.questions || window.questionBank; 
            window.questions = null; window.questionBank = null; d ? res(d) : rej(); 
        };
        s.onerror = rej; document.body.appendChild(s);
    });
}

function renderQuestionList() {
  const sourceMode = document.getElementById('source-mode')?.value || 'activeExam';
  const container = document.getElementById('question-list');
  const info = document.getElementById('q-count-info');

  container.innerHTML = '';

  if (sourceMode === 'selectedExams') {
    const pool = getQuestionSourcePool();
    document.getElementById('q-panel-title').innerText = '선택 시험지 pool';
    document.getElementById('q-panel-meta').innerText = `${pool.length}개 문항`;
    if (info) info.textContent = mergedPool.length ? '선택 시험지 pool 기준' : '선택 시험지 pool을 불러와 주세요.';

    if (!pool.length) {
      container.innerHTML = '<div class="empty-box"><p>선택 시험지 pool을 불러와 주세요.</p></div>';
      return;
    }

    pool.forEach((q, i) => {
      const qKey = q._qKey || `${q._sourceFile}_${q.id || (i + 1)}`;
      const inCart = cart.some(c => c._qKey === qKey);
      const qId = q.id || (i + 1);
      let imgSrc = q.image ? (typeof q.image === 'string' ? q.image : `assets/images/${q._sourceFile.replace('.js','')}/q${qId}.png`) : '';
      const div = document.createElement('div');
      div.className = 'q-item';
      div.innerHTML = `
        <div class="q-header">
          <span class="q-num" style="font-size:13px; font-weight:800; color:var(--text-main);">${q._sourceTitle} · <span style="color:var(--blue); font-size:16px;">${qId}번</span></span>
          <button class="btn-add-q ${inCart ? 'in-cart' : ''}" onclick="togglePoolCartItem(${i})">
            <i class="fa-solid ${inCart ? 'fa-check' : 'fa-plus'}"></i>${inCart ? '담김' : '담기'}
          </button>
        </div>
        <div class="q-content">${q.content || ''}</div>
        ${imgSrc ? `<img src="${imgSrc}" class="q-image" onerror="this.style.display='none'">` : ''}
        ${q.choices ? `<div class="q-choices">${q.choices.map((c,ci)=>`<div class="choice-row"><span class="choice-num">(${ci+1})</span><span>${c}</span></div>`).join('')}</div>` : ''}
      `;
      container.appendChild(div);
    });

    if (window.MathJax) MathJax.typesetPromise([container]);
    return;
  }

  if (!currentPaper) {
    container.innerHTML = '<div class="empty-box"><p>왼쪽에서 시험지를 선택하세요.</p></div>';
    if (info) info.textContent = '시험지 또는 선택 pool을 불러와 주세요.';
    return;
  }

  if (info) info.textContent = '현재 시험지 기준';
  document.getElementById('q-panel-title').innerText = currentPaper.school || currentPaper.topic;
  document.getElementById('q-panel-meta').innerText = `${currentQuestions.length}개 문항`;

  currentQuestions.forEach((q, i) => {
    const qId = q.id || (i+1);
    const qKey = `${currentPaper.file}_${qId}`;
    const inCart = cart.some(c => c._qKey === qKey);
    let imgSrc = q.image ? (typeof q.image === 'string' ? q.image : `assets/images/${currentPaper.file.replace('.js','')}/q${qId}.png`) : '';
    const div = document.createElement('div');
    div.className = 'q-item';
    div.innerHTML = `
      <div class="q-header"><span class="q-num">${qId}번</span>
        <button class="btn-add-q ${inCart ? 'in-cart' : ''}" onclick="toggleCartItem(${i})">
          <i class="fa-solid ${inCart ? 'fa-check' : 'fa-plus'}"></i>${inCart ? '담김' : '담기'}
        </button>
      </div>
      <div class="q-content">${q.content || ''}</div>
      ${imgSrc ? `<img src="${imgSrc}" class="q-image" onerror="this.style.display='none'">` : ''}
      ${q.choices ? `<div class="q-choices">${q.choices.map((c,ci)=>`<div class="choice-row"><span class="choice-num">(${ci+1})</span><span>${c}</span></div>`).join('')}</div>` : ''}
    `;
    container.appendChild(div);
  });

  if (window.MathJax) MathJax.typesetPromise([container]);
}

function togglePoolCartItem(idx) {
  const pool = getQuestionSourcePool();
  const item = pool[idx];
  if (!item) return;
  const fIdx = cart.findIndex(c => c._qKey === item._qKey);
  if (fIdx > -1) cart.splice(fIdx, 1);
  else cart.push(item);
  updateCart();
  renderQuestionList();
  renderActionBar();
}

function toggleCartItem(idx) {
    if (!currentPaper) return;
    const qKey = `${currentPaper.file}_${currentQuestions[idx].id || (idx+1)}`;
    const fIdx = cart.findIndex(c => c._qKey === qKey);
    if (fIdx > -1) cart.splice(fIdx, 1);
    else cart.push({...currentQuestions[idx], _sourceTitle: currentPaper.school || currentPaper.topic, _sourceFile: currentPaper.file, _qKey: qKey});
    updateCart(); renderQuestionList(); renderActionBar();
}

async function handleAutoPick(mode) {
  const count = parseInt(document.getElementById('autoCountInput').value);
  if (!count) return alert('문항 수를 입력하세요.');

  const sourceMode = document.getElementById('source-mode')?.value || 'activeExam';
  const course = document.getElementById('courseFilter').value;
  const unitKey = document.getElementById('standardUnitFilter').value;
  const levelMode = document.getElementById('levelBalanceMode')?.value || 'balanced';

  document.getElementById('poolStatusLabel').innerText = "로딩 중...";

  let candidates = [];
  const cartKeys = new Set(cart.map(c => c._qKey));

  if (sourceMode === 'selectedExams') {
    candidates = mergedPool.filter(q => {
      const qCourse = q.standardCourse || inferCourseFromQuestion(q);
      const matchC = !course || qCourse === course;
      const matchU = !unitKey || q.standardUnitKey === unitKey;
      return matchC && matchU && !cartKeys.has(q._qKey);
    });
  } else {
    const poolMode = document.getElementById('poolModeSelect').value;
    const pool = (poolMode === 'current' && currentPaper) ? [currentPaper] : filteredPaperPool;

    for (const ex of pool) {
      if (!ex._loadedQuestions) {
        try { ex._loadedQuestions = await loadQuestionData(ex.file); } catch(e) {}
      }
    }

    pool.forEach(ex => {
      let qs = (ex._loadedQuestions || []).filter((q, i) => {
        const qKey = `${ex.file}_${q.id || (i + 1)}`;
        const qCourse = q.standardCourse || inferCourseFromQuestion(q);
        const matchC = !course || qCourse === course;
        const matchU = !unitKey || q.standardUnitKey === unitKey;
        return matchC && matchU && !cartKeys.has(qKey);
      });

      candidates.push(...qs.map((q, i) => ({
        ...q,
        _sourceTitle: ex.school || ex.topic,
        _sourceFile: ex.file,
        _qKey: `${ex.file}_${q.id || (i + 1)}`
      })));
    });
  }

  if (!candidates.length) {
    document.getElementById('poolStatusLabel').innerText = "준비됨";
    return alert('추가할 문항이 없습니다.');
  }

  const picked = pickBalancedByLevel(candidates, count, levelMode);

  if (mode === 'replace') cart = picked;
  else cart.push(...picked);

  updateCart();
  renderQuestionList();
  renderActionBar();

  document.getElementById('poolStatusLabel').innerText = `추출 완료 · ${getLevelSummaryText(picked)}`;
}

function addCurrentUnitAll() {
  const sourceMode = document.getElementById('source-mode')?.value || 'activeExam';
  const course = document.getElementById('courseFilter').value;
  const unitKey = document.getElementById('standardUnitFilter').value;
  const cartKeys = new Set(cart.map(c => c._qKey));

  if (sourceMode === 'selectedExams') {
    mergedPool.forEach(q => {
      const qCourse = q.standardCourse || inferCourseFromQuestion(q);
      const matchC = !course || qCourse === course;
      const matchU = !unitKey || q.standardUnitKey === unitKey;
      if (matchC && matchU && !cartKeys.has(q._qKey)) cart.push(q);
    });
    updateCart();
    renderQuestionList();
    renderActionBar();
    return;
  }

  if (!currentPaper || !currentQuestions.length) return;

  currentQuestions.forEach((q, i) => {
    const qKey = `${currentPaper.file}_${q.id || (i + 1)}`;
    const qCourse = q.standardCourse || inferCourseFromQuestion(q);
    const matchC = !course || qCourse === course;
    const matchU = !unitKey || q.standardUnitKey === unitKey;

    if (matchC && matchU && !cartKeys.has(qKey)) {
      cart.push({
        ...q,
        _sourceTitle: currentPaper.school || currentPaper.topic,
        _sourceFile: currentPaper.file,
        _qKey: qKey
      });
    }
  });

  updateCart();
  renderQuestionList();
  renderActionBar();
}

function updateCart() {
    const container = document.getElementById('cart-items');
    document.getElementById('cart-count').innerText = cart.length;
    container.innerHTML = cart.length ? '' : '<div class="empty-box" style="font-size:12px;">카트가 비어있습니다.</div>';
    cart.forEach((c, i) => {
        const div = document.createElement('div'); div.className = 'cart-item';
        div.innerHTML = `<div class="cart-info"><div class="cart-q-text">${c._sourceTitle} - ${c.id || (i+1)}번</div><div class="cart-q-sub">${(c.content||'').substring(0,25)}...</div></div><i class="fa-solid fa-times-circle" style="cursor:pointer; color:#ccc;" onclick="removeCart(${i})"></i>`;
        container.appendChild(div);
    });
}

function removeCart(i) { cart.splice(i, 1); updateCart(); renderQuestionList(); renderActionBar(); }

function renderActionBar() {
  const sourceMode = document.getElementById('source-mode')?.value || 'activeExam';
  let poolCount = 0;

  if (sourceMode === 'selectedExams') poolCount = mergedPool.length;
  else poolCount = ((document.getElementById('poolModeSelect').value === 'current' && currentPaper) ? 1 : filteredPaperPool.length);

  const baseText = sourceMode === 'selectedExams'
      ? `선택 pool: ${poolCount}문항`
      : `대상: ${poolCount}개 시험지`;

  // 추출 완료 메시지가 없을 때만 기본 텍스트 표시
  const currentLabel = document.getElementById('poolStatusLabel').innerText;
  if (!currentLabel.startsWith('추출 완료')) {
      document.getElementById('poolStatusLabel').innerText = baseText;
  } else {
      // 만약 소스 모드나 옵션이 바뀌면 추출 완료 메시지를 리셋
      document.getElementById('poolStatusLabel').innerText = baseText;
  }

  document.getElementById('addUnitAllBtn').disabled =
    sourceMode === 'selectedExams' ? !mergedPool.length : !currentPaper;
}

function openMixed() {
    if (!cart.length) return alert('문항을 담아주세요.');
    const qpp = document.getElementById('print-qpp').value;
    const meta = { title: `믹서 출제 (${cart.length}문항)`, count: cart.length, qpp, at: new Date().toISOString() };
    
    let lOk = true, sOk = true;
    try { localStorage.setItem('mixedQuestions', JSON.stringify(cart)); localStorage.setItem('mixedMeta', JSON.stringify(meta)); } catch(e) { lOk = false; }
    try { sessionStorage.setItem('mixedQuestions', JSON.stringify(cart)); sessionStorage.setItem('mixedMeta', JSON.stringify(meta)); } catch(e) { sOk = false; }
    
    if (!lOk && !sOk) alert('경고: 브라우저 저장소 용량이 가득 찼습니다. 출제가 불가능할 수 있습니다.');
    else if (!lOk) console.warn('LocalStorage 저장 실패 (새 탭에서 세션 데이터 사용)');

    window.open(`mixed_engine.html?mode=exam&qpp=${qpp}`, '_blank');
}
window.onload = init;
</script>
