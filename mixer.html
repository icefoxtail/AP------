<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS아카이브 | 믹서 출제</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] },
            options: { enableMenu: false },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        :root {
            --navy: #0f172a;
            --blue: #1d4ed8;
            --blue-dark: #1e40af;
            --blue-light: #eff6ff;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-500: #64748b;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --danger: #dc2626;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: var(--navy);
            color: white;
            padding: 0 20px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 12px;
        }
        .h-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
        .h-title { font-size: 18px; font-weight: 800; white-space: nowrap; }
        .btn-icon {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.18); }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 1px;
            background: var(--gray-200);
        }
        .panel {
            background: white;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        #panel-exams { width: 320px; flex-shrink: 0; }
        #panel-questions { flex: 1; min-width: 420px; }
        #panel-cart { width: 360px; flex-shrink: 0; }

        .panel-header {
            padding: 15px;
            border-bottom: 1px solid var(--gray-200);
            font-weight: 800;
            font-size: 14px;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .panel-subtle { font-weight: 600; color: var(--gray-500); font-size: 12px; }
        .panel-tools { display: flex; align-items: center; gap: 8px; }
        .panel-select {
            padding: 6px 8px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 12px;
            background: white;
            color: var(--gray-700);
            outline: none;
        }
        .panel-action {
            padding: 6px 10px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 12px;
            background: var(--blue-light);
            color: var(--blue-dark);
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
        }
        .panel-action:hover { background: #dbeafe; }

        .filter-area {
            padding: 15px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .search-box { position: relative; }
        .search-box input {
            width: 100%;
            padding: 9px 10px 9px 34px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }
        .search-box input:focus { border-color: var(--blue); }
        .search-box i {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-300);
            font-size: 13px;
        }
        .filter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .filter-grid select {
            padding: 8px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
            background: white;
        }
        .list-scroll {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }
        #exam-list { padding: 10px; }
        .exam-item {
            padding: 12px;
            border: 1px solid var(--gray-100);
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.15s;
        }
        .exam-item:hover {
            border-color: var(--blue);
            background: var(--blue-light);
        }
        .exam-item.active {
            border-color: var(--blue);
            background: var(--blue-light);
            box-shadow: inset 0 0 0 1px var(--blue);
        }
        .ex-grade {
            font-size: 10px;
            font-weight: 700;
            color: var(--gray-500);
            margin-bottom: 4px;
        }
        .ex-title {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.45;
            color: var(--gray-800);
        }

        #question-list, #cart-list { padding: 0; }
        .empty-box {
            padding: 40px 20px;
            text-align: center;
            color: var(--gray-300);
            font-size: 14px;
        }
        .q-item {
            padding: 20px;
            border-bottom: 1px solid var(--gray-100);
        }
        .q-meta {
            font-size: 11px;
            font-weight: 700;
            color: var(--blue);
            margin-bottom: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .q-body {
            font-size: 14px;
            line-height: 1.65;
            margin-bottom: 10px;
            color: var(--gray-800);
            word-break: keep-all;
            overflow-wrap: anywhere;
        }
        .q-choices {
            margin: 8px 0 14px;
            padding: 10px 12px;
            background: var(--gray-50);
            border: 1px solid var(--gray-100);
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            color: var(--gray-700);
        }
        .q-choice { margin-bottom: 4px; }
        .q-choice:last-child { margin-bottom: 0; }
        .q-group-title {
            position: sticky;
            top: 0;
            z-index: 2;
            padding: 10px 20px;
            background: #f8fafc;
            border-top: 1px solid var(--gray-200);
            border-bottom: 1px solid var(--gray-200);
            font-size: 12px;
            font-weight: 800;
            color: var(--gray-700);
        }
        .btn-add {
            background: var(--blue);
            color: white;
            border: none;
            padding: 7px 16px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-add:hover { background: var(--blue-dark); }
        .btn-add.added {
            background: var(--gray-200);
            color: var(--gray-500);
            cursor: default;
        }

        .cart-item {
            padding: 12px;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .cart-info { flex: 1; min-width: 0; }
        .c-title {
            font-size: 11px;
            color: var(--gray-500);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .c-body {
            font-size: 12px;
            line-height: 1.45;
            color: var(--gray-800);
            max-height: 3.1em;
            overflow: hidden;
            word-break: keep-all;
            overflow-wrap: anywhere;
        }
        .cart-ctrl {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-shrink: 0;
        }
        .btn-small {
            border: 1px solid var(--gray-200);
            background: white;
            padding: 4px 7px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
        }
        .btn-small:hover { background: var(--gray-100); }
        .btn-small.remove { color: var(--danger); }

        .cart-footer {
            padding: 18px;
            border-top: 1px solid var(--gray-200);
            background: white;
        }
        .cart-stats {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 12px;
            text-align: center;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn-print {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-print.main { background: var(--blue); color: white; }
        .btn-print.main:hover { background: var(--blue-dark); }
        .btn-print.sub { background: var(--gray-800); color: white; }
        .btn-print.sub:hover { background: var(--gray-700); }

        @media (max-width: 1024px) {
            body { height: auto; min-height: 100vh; overflow: auto; }
            main { flex-direction: column; overflow: visible; }
            .panel { width: 100% !important; min-height: 320px; }
            #panel-questions { min-width: unset; }
            #panel-cart { min-height: 260px; }
        }
    </style>
</head>
<body>
<header>
    <div class="h-left">
        <button class="btn-icon" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i> 목록으로</button>
        <span class="h-title">믹서 출제</span>
    </div>
    <button class="btn-icon" onclick="resetCart()"><i class="fa-solid fa-trash-can"></i> 선택 비우기</button>
</header>

<main>
    <section class="panel" id="panel-exams">
        <div class="filter-area">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="학교명, 과목, 학년, 시험 검색" oninput="renderExamList()">
            </div>
            <div class="filter-grid">
                <select id="f-grade" onchange="renderExamList()">
                    <option value="">학년 전체</option>
                    <option value="고3">고3</option><option value="고2">고2</option><option value="고1">고1</option>
                    <option value="중3">중3</option><option value="중2">중2</option>
                </select>
                <select id="f-year" onchange="renderExamList()"><option value="">연도 전체</option></select>
                <select id="f-exam" onchange="renderExamList()">
                    <option value="">시험 전체</option>
                    <option value="1학기중간">1학기 중간</option><option value="1학기기말">1학기 기말</option>
                    <option value="2학기중간">2학기 중간</option><option value="2학기기말">2학기 기말</option>
                </select>
            </div>
        </div>
        <div class="list-scroll" id="exam-list"></div>
    </section>

    <section class="panel" id="panel-questions">
        <div class="panel-header">
            <div>문항 목록 <span id="q-count-info" class="panel-subtle"></span></div>
            <div class="panel-tools">
                <select id="q-view-mode" class="panel-select" onchange="renderQuestionList()">
                    <option value="default">기본순</option>
                    <option value="category">단원별 묶음</option>
                </select>
                <select id="q-category-filter" class="panel-select" onchange="renderQuestionList()">
                    <option value="">단원 전체</option>
                </select>
                <button id="add-category-btn" class="panel-action" type="button" onclick="addCurrentCategory()">현재 단원 전체 담기</button>
            </div>
        </div>
        <div class="list-scroll" id="question-list">
            <div class="empty-box">시험지를 선택해주세요.</div>
        </div>
    </section>

    <section class="panel" id="panel-cart">
        <div class="panel-header">선택 바구니 <span id="cart-total-top" class="panel-subtle">0문항</span></div>
        <div class="list-scroll" id="cart-list">
            <div class="empty-box">담긴 문항이 없습니다.</div>
        </div>
        <div class="cart-footer">
            <div class="cart-stats">총 <span id="cart-total">0</span>문항 선택됨</div>
            <div class="btn-group">
                <button class="btn-print main" onclick="openMixed('exam')">시험지 보기</button>
                <button class="btn-print sub" onclick="openMixed('sol')">해설지 보기</button>
                <button class="btn-print sub" onclick="openMixed('ans')">정답표 보기</button>
            </div>
        </div>
    </section>
</main>

<script>
let db = { exams: [] };
let cart = [];
let currentExamFile = null;
let currentExamTitle = '';
let currentQuestions = [];

function examTypeLabel(examType) {
    if (examType === 'mid') return '중간';
    if (examType === 'final') return '기말';
    return examType || '';
}

function buildExamLabel(ex) {
    return `${ex.year || ''}년 ${ex.grade || ''} ${ex.semester || ''}학기 ${examTypeLabel(ex.examType)}`.trim();
}

function getExamSearchText(ex) {
    return [
        ex.school || '',
        ex.subject || '',
        ex.grade || '',
        ex.year || '',
        ex.semester ? `${ex.semester}학기` : '',
        examTypeLabel(ex.examType),
        buildExamLabel(ex)
    ].join(' ').toLowerCase();
}

async function loadDB() {
    return new Promise(res => {
        const s = document.createElement('script');
        s.src = 'db.js?v=' + Date.now();
        s.onload = () => {
            db = window.mainDB || window.db || { exams: [] };
            populateYearFilter();
            renderExamList();
            res();
        };
        s.onerror = () => {
            alert('db.js를 불러오지 못했습니다.');
            res();
        };
        document.body.appendChild(s);
    });
}

function populateYearFilter() {
    const years = [...new Set((db.exams || []).map(e => e.year))].filter(Boolean).sort((a, b) => b - a);
    const sel = document.getElementById('f-year');
    years.forEach(y => {
        const opt = document.createElement('option');
        opt.value = String(y);
        opt.textContent = `${y}년`;
        sel.appendChild(opt);
    });
}

function renderExamList() {
    const keyword = document.getElementById('search-input').value.trim().toLowerCase();
    const grade = document.getElementById('f-grade').value;
    const year = document.getElementById('f-year').value;
    const exam = document.getElementById('f-exam').value;

    const filtered = (db.exams || []).filter(ex => {
        if (ex.type === 'hidden') return false;
        const typeStr = ex.semester && ex.examType ? `${ex.semester}학기${examTypeLabel(ex.examType)}` : '';
        const matchK = !keyword || getExamSearchText(ex).includes(keyword);
        const matchG = !grade || ex.grade === grade;
        const matchY = !year || String(ex.year) === String(year);
        const matchE = !exam || typeStr === exam;
        return matchK && matchG && matchY && matchE;
    });

    const container = document.getElementById('exam-list');
    container.innerHTML = '';

    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-box">일치하는 시험지가 없습니다.</div>';
        return;
    }

    filtered.forEach(ex => {
        const item = document.createElement('div');
        item.className = `exam-item ${currentExamFile === ex.file ? 'active' : ''}`;
        item.dataset.file = ex.file || '';
        item.innerHTML = `
            <div class="ex-grade">${buildExamLabel(ex)}</div>
            <div class="ex-title">${ex.school || ''} ${ex.subject || ''}</div>
        `;
        item.addEventListener('click', () => loadExamQuestions(ex));
        container.appendChild(item);
    });
}

async function loadExamQuestions(examMeta) {
    currentExamFile = examMeta.file;
    currentExamTitle = `${examMeta.school || ''} ${examMeta.subject || ''}`.trim();
    currentQuestions = [];
    renderExamList();

    const container = document.getElementById('question-list');
    container.innerHTML = '<div class="empty-box">로딩 중...</div>';
    document.getElementById('q-count-info').innerText = '';

    const old = document.getElementById('exam-data-script');
    if (old) old.remove();
    delete window.questionBank;

    const s = document.createElement('script');
    s.id = 'exam-data-script';
    s.src = 'exams/' + examMeta.file + '?v=' + Date.now();
    s.onload = async () => {
        const qb = window.questionBank;
        currentQuestions = Array.isArray(qb) ? qb.map(q => ({ ...q })) : ((qb?.questions || qb?.problems || []).map(q => ({ ...q })));
        delete window.questionBank;
        s.remove();
        populateCategoryFilter();
        renderQuestionList();
        if (window.MathJax?.typesetPromise) {
            await MathJax.typesetPromise([container]);
        }
    };
    s.onerror = () => {
        currentQuestions = [];
        container.innerHTML = '<div class="empty-box">문항을 불러오지 못했습니다.</div>';
        document.getElementById('q-count-info').innerText = '';
    };
    document.body.appendChild(s);
}

function isQuestionAdded(q, idx) {
    const qId = String(q.id ?? idx);
    return cart.some(c => c._sourceFile === currentExamFile && String(c.id ?? c._originalIndex) === qId);
}

function extractChoiceText(choice) {
    if (choice === null || choice === undefined) return '';
    if (typeof choice === 'object') {
        return choice.text || choice.content || choice.value || choice.answer || Object.values(choice)[0] || '';
    }
    return String(choice);
}


function wrapLatex(text) {
    return wrapLatexPreserveBlocks(text);
}

function wrapLatexPreserveBlocks(text) {
    if (!text) return text;
    let s = String(text);

    s = s.replace(/\^\[([^\]]+)\]/g, '^{$1}').replace(/_\[([^\]]+)\]/g, '_{$1}');
    s = s.replace(//g, '(').replace(//g, ')').replace(//g, '');
    s = s.replace(/²/g, '^2').replace(/³/g, '^3');
    s = s.replace(/√\s*\(([^\)]+)\)/g, '\\sqrt{$1}').replace(/√\s*([0-9a-zA-Z]+)/g, '\\sqrt{$1}');
    s = s.replace(/sqrt\(([^)]+)\)/g, '\\sqrt{$1}').replace(/frac\(([^,]+),([^)]+)\)/g, '\\frac{$1}{$2}');
    s = s.replace(/\\frac\[([^\]]+)\]\[([^\]]+)\]/g, '\\frac{$1}{$2}').replace(/\\dot\[([^\]]+)\]/g, '\\dot{$1}');

    if (/\\begin\{(array|aligned|matrix|pmatrix|bmatrix|vmatrix|Vmatrix|cases)\}/.test(s) || /\\multicolumn|\\cline|\\hline/.test(s)) {
        return `$$${s}$$`;
    }

    if (/^\s*\$\$[\s\S]*\$\$\s*$/.test(s) || /^\s*\$[\s\S]*\$\s*$/.test(s)) return s;

    const parts = s.split(/(<[^>]+>)/g);
    return parts.map(p => {
        if (!p) return '';
        if (p.startsWith('<')) return p;

        let t = p.replace(/\\n/g, '<br>').replace(/\n/g, '<br>');

        if (!/\$/.test(t)) {
            t = t.split(/(<br>)/g).map(seg => {
                if (seg === '<br>') return seg;

                const tokens = seg.split(/(\s+)/);
                const out = [];
                let run = [];

                const flush = () => {
                    if (!run.length) return;
                    const joined = run.join('');
                    const trimmed = joined.trim();
                    if (trimmed) out.push(`$${trimmed}$`);
                    run = [];
                };

                for (let i = 0; i < tokens.length; i++) {
                    const tok = tokens[i];
                    if (!tok) continue;

                    if (/^\s+$/.test(tok)) {
                        if (run.length) run.push(tok);
                        else out.push(tok);
                        continue;
                    }

                    if (/[가-힣]/.test(tok)) {
                        flush();
                        out.push(tok);
                        continue;
                    }

                    const asciiMath = /^[0-9A-Za-z.,:;(){}\[\]+\-*\/=^_|\\%]+$/.test(tok);
                    const indicator = /\\[A-Za-z]+|\^|_/.test(tok);

                    let nextMeaningful = '';
                    for (let j = i + 1; j < tokens.length; j++) {
                        if (!/^\s+$/.test(tokens[j] || '')) {
                            nextMeaningful = tokens[j] || '';
                            break;
                        }
                    }
                    const nextIndicator = /\\[A-Za-z]+|\^|_/.test(nextMeaningful);

                    if (asciiMath && (run.length || indicator || nextIndicator)) {
                        run.push(tok);
                    } else {
                        flush();
                        out.push(tok);
                    }
                }

                flush();
                return out.join('');
            }).join('');
        }

        const trimmed = t.trim();
        const hasKorean = /[가-힣]/.test(trimmed);
        const hasDollar = /\$/.test(trimmed);

        const looksLikeMath =
            !hasKorean &&
            !hasDollar &&
            (
                /\\[a-zA-Z]+/.test(trimmed) ||
                (/^[0-9a-zA-Z\s\+\-\*\/\=\^\_\{\}\(\)\[\]\.,:;|\\]+$/.test(trimmed) && trimmed.length > 0)
            );

        if (looksLikeMath && !t.includes('<br>')) return `$${trimmed}$`;
        return t;
    }).join('');
}

function currentCategoryFilterValue() {
    return document.getElementById('q-category-filter')?.value || '';
}

function populateCategoryFilter() {
    const sel = document.getElementById('q-category-filter');
    if (!sel) return;
    const keep = sel.value || '';
    const categories = [...new Set(currentQuestions.map(q => String(q.category || '기타')))]
        .sort((a, b) => a.localeCompare(b, 'ko'));
    sel.innerHTML = '<option value="">단원 전체</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join('');
    if (categories.includes(keep)) sel.value = keep;
}

function addCurrentCategory() {
    const selected = currentCategoryFilterValue();
    if (!selected) {
        alert('먼저 단원을 선택해주세요.');
        return;
    }
    const indexes = currentQuestions
        .map((q, idx) => ({ q, idx }))
        .filter(({ q }) => String(q.category || '기타') === selected)
        .map(({ idx }) => idx);

    let added = 0;
    indexes.forEach(idx => {
        const q = currentQuestions[idx];
        const qId = String(q.id ?? idx);
        const isDup = cart.some(c => c._sourceFile === currentExamFile && String(c.id ?? c._originalIndex) === qId);
        if (isDup) return;
        cart.push({
            ...q,
            _sourceFile: currentExamFile,
            _sourceTitle: currentExamTitle,
            _originalIndex: idx
        });
        added += 1;
    });

    renderCart();
    renderQuestionList();
    if (added === 0) alert('이미 모두 담긴 단원입니다.');
}


function buildChoicesHTML(q) {
    if (!Array.isArray(q.choices) || !q.choices.length) return '';
    const circled = ['①','②','③','④','⑤'];
    const validChoices = q.choices
        .map(extractChoiceText)
        .filter(v => String(v).trim() !== '' && String(v).trim() !== '주관식');

    if (!validChoices.length) return '';
    return `<div class="q-choices">${validChoices.map((choice, idx) => `<div class="q-choice">${circled[idx] || (idx + 1) + ')'} ${wrapLatex(choice)}</div>`).join('')}</div>`;
}

function getQuestionRenderOrder() {
    const mode = document.getElementById('q-view-mode')?.value || 'default';
    const mapped = currentQuestions.map((q, idx) => ({ q, idx }));
    if (mode !== 'category') return mapped;

    return mapped.sort((a, b) => {
        const ca = String(a.q.category || '기타');
        const cb = String(b.q.category || '기타');
        if (ca === cb) return a.idx - b.idx;
        return ca.localeCompare(cb, 'ko');
    });
}

function renderQuestionList() {
    const container = document.getElementById('question-list');
    container.innerHTML = '';
    document.getElementById('q-count-info').innerText = currentQuestions.length ? `${currentQuestions.length}문항` : '';

    if (!currentQuestions.length) {
        container.innerHTML = '<div class="empty-box">불러온 문항이 없습니다.</div>';
        return;
    }

    const selectedCategory = currentCategoryFilterValue();
    const renderItems = getQuestionRenderOrder().filter(({ q }) => !selectedCategory || String(q.category || '기타') === selectedCategory);
    const groupMode = (document.getElementById('q-view-mode')?.value || 'default') === 'category';
    let lastCategory = null;

    const addCategoryBtn = document.getElementById('add-category-btn');
    if (addCategoryBtn) {
        addCategoryBtn.style.display = selectedCategory ? 'inline-flex' : 'none';
    }

    if (!renderItems.length) {
        container.innerHTML = '<div class="empty-box">선택한 단원에 해당하는 문항이 없습니다.</div>';
        return;
    }

    renderItems.forEach(({ q, idx }) => {
        const category = String(q.category || '기타');
        if (groupMode && category !== lastCategory) {
            const groupTitle = document.createElement('div');
            groupTitle.className = 'q-group-title';
            groupTitle.textContent = category;
            container.appendChild(groupTitle);
            lastCategory = category;
        }

        const isAdded = isQuestionAdded(q, idx);
        const item = document.createElement('div');
        item.className = 'q-item';
        item.innerHTML = `
            <div class="q-meta">
                <span>No. ${idx + 1}</span>
                <span>${category}</span>
            </div>
            <div class="q-body">${wrapLatex(q.content || q.question || '')}</div>
            ${buildChoicesHTML(q)}
        `;

        const btn = document.createElement('button');
        btn.className = `btn-add ${isAdded ? 'added' : ''}`;
        btn.textContent = isAdded ? '담겼음' : '+ 담기';
        btn.disabled = isAdded;
        btn.addEventListener('click', () => addQuestion(idx));

        item.appendChild(btn);
        container.appendChild(item);
    });

    if (window.MathJax?.typesetPromise) {
        MathJax.typesetPromise([container]);
    }
}

function addQuestion(originalIdx) {
    const q = currentQuestions[originalIdx];
    if (!q) return;

    const qId = String(q.id ?? originalIdx);
    const isDup = cart.some(c => c._sourceFile === currentExamFile && String(c.id ?? c._originalIndex) === qId);
    if (isDup) return;

    const item = {
        ...q,
        _sourceFile: currentExamFile,
        _sourceTitle: currentExamTitle,
        _originalIndex: originalIdx
    };

    cart.push(item);
    renderCart();
    renderQuestionList();
}

function renderCart() {
    const container = document.getElementById('cart-list');
    document.getElementById('cart-total').innerText = String(cart.length);
    document.getElementById('cart-total-top').innerText = `${cart.length}문항`;

    if (!cart.length) {
        container.innerHTML = '<div class="empty-box">담긴 문항이 없습니다.</div>';
        return;
    }

    container.innerHTML = '';
    cart.forEach((c, idx) => {
        const row = document.createElement('div');
        row.className = 'cart-item';
        row.innerHTML = `
            <div class="cart-info">
                <div class="c-title">${c._sourceTitle} [${c._originalIndex + 1}번] · ${c.category || '기타'}</div>
                <div class="c-body">${wrapLatex(c.content || c.question || '')}</div>
            </div>
        `;

        const ctrl = document.createElement('div');
        ctrl.className = 'cart-ctrl';

        const up = document.createElement('button');
        up.className = 'btn-small';
        up.innerHTML = '<i class="fa-solid fa-chevron-up"></i>';
        up.addEventListener('click', () => moveQuestionUp(idx));

        const down = document.createElement('button');
        down.className = 'btn-small';
        down.innerHTML = '<i class="fa-solid fa-chevron-down"></i>';
        down.addEventListener('click', () => moveQuestionDown(idx));

        const remove = document.createElement('button');
        remove.className = 'btn-small remove';
        remove.innerHTML = '<i class="fa-solid fa-xmark"></i>';
        remove.addEventListener('click', () => removeQuestion(idx));

        ctrl.appendChild(up);
        ctrl.appendChild(down);
        ctrl.appendChild(remove);
        row.appendChild(ctrl);
        container.appendChild(row);
    });

    if (window.MathJax?.typesetPromise) {
        MathJax.typesetPromise([container]);
    }
}

function removeQuestion(idx) {
    cart.splice(idx, 1);
    renderCart();
    if (currentQuestions.length) renderQuestionList();
}

function moveQuestionUp(idx) {
    if (idx <= 0) return;
    [cart[idx - 1], cart[idx]] = [cart[idx], cart[idx - 1]];
    renderCart();
}

function moveQuestionDown(idx) {
    if (idx >= cart.length - 1) return;
    [cart[idx + 1], cart[idx]] = [cart[idx], cart[idx + 1]];
    renderCart();
}

function resetCart() {
    if (!cart.length) return;
    if (!confirm('선택한 문항을 모두 비우시겠습니까?')) return;
    cart = [];
    renderCart();
    if (currentQuestions.length) renderQuestionList();
}

function openMixed(mode) {
    if (!cart.length) {
        alert('문항을 담아주세요.');
        return;
    }

    const categorySet = [...new Set(cart.map(q => q.category || '기타'))];
    const meta = {
        title: `믹서 출제 (${cart.length}문항)`,
        count: cart.length,
        categories: categorySet,
        generatedAt: new Date().toISOString()
    };

    const payload = JSON.stringify(cart);
    const metaPayload = JSON.stringify(meta);

    try {
        localStorage.setItem('mixedQuestions', payload);
        localStorage.setItem('mixedMeta', metaPayload);
    } catch (e) {}

    sessionStorage.setItem('mixedQuestions', payload);
    sessionStorage.setItem('mixedMeta', metaPayload);

    window.open(`mixed_engine.html?mode=${mode}&qpp=4`, '_blank', 'noopener,noreferrer');
}

window.onload = loadDB;
</script>
