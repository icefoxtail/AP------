<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS아카이브 | 수학 기출 통합 시스템</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --navy:          #07111f;
            --navy-2:        #0c1a2e;
            --blue-main:     #1d4ed8;
            --blue-light:    #60a5fa;
            --blue-pale:     #dbeafe;
            --green-main:    #059669;
            --green-pale:    #d1fae5;
            --gray-muted:    #94a3b8;
            --bg-soft:       #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-soft); color: #1e293b; overflow-x: hidden; }

        header { background: var(--navy); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .top-nav { max-width: 1200px; margin: 0 auto; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }

        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--blue-main); display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 3px; padding: 5px; }
        .logo-mark div { background: white; border-radius: 1px; }
        .logo-mark div:last-child { background: var(--blue-light); }
        .logo-name { font-size: 17px; font-weight: 800; color: white; letter-spacing: -0.5px; }
        .logo-name em { color: var(--blue-light); font-style: normal; }

        .grade-nav { display: flex; gap: 2px; }
        .gtab { font-size: 13px; color: rgba(255,255,255,0.38); font-weight: 600; padding: 5px 11px; border-radius: 6px; cursor: pointer; transition: 0.15s; }
        .gtab:hover { color: rgba(255,255,255,0.7); }
        .gtab.active { color: white; background: rgba(255,255,255,0.1); }

        .nav-count { font-size: 11px; color: rgba(255,255,255,0.35); font-weight: 600; background: rgba(255,255,255,0.07); padding: 4px 12px; border-radius: 20px; }

        .hero { background: var(--navy); padding: 36px 24px 50px; position: relative; overflow: hidden; }
        .hero-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; }
        .hero-grid-bg {
            position: absolute; inset: 0; opacity: 0.035;
            background-image: linear-gradient(rgba(255,255,255,1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .hero-deco { position: absolute; right: 10%; top: 20px; opacity: 0.06; pointer-events: none; }
        .hero-deco div { color: white; font-size: 22px; font-family: 'Nanum Myeongjo', serif; line-height: 2.2; text-align: right; }

        .hero-tag { display: inline-flex; align-items: center; gap: 6px; background: rgba(29,78,216,0.2); border: 1px solid rgba(96,165,250,0.2); border-radius: 20px; padding: 4px 12px; margin-bottom: 16px; }
        .tag-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue-light); }
        .hero-tag span { font-size: 11px; font-weight: 700; color: #93c5fd; letter-spacing: 0.8px; text-transform: uppercase; }

        .hero-title { font-size: 30px; font-weight: 800; color: white; line-height: 1.25; letter-spacing: -0.8px; margin-bottom: 7px; word-break: keep-all; }
        .hero-title em { color: var(--blue-light); font-style: normal; }
        .hero-desc { font-size: 13px; color: rgba(255,255,255,0.38); line-height: 1.6; }

        .stat-pills { display: flex; gap: 10px; flex-shrink: 0; }
        .stat-pill { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 16px 22px; text-align: center; min-width: 84px; }
        .stat-n { font-size: 26px; font-weight: 800; color: var(--blue-light); line-height: 1; font-variant-numeric: tabular-nums; }
        .stat-l { font-size: 11px; color: rgba(255,255,255,0.35); font-weight: 600; margin-top: 5px; white-space: nowrap; }

        .filter-band { background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 56px; z-index: 900; }
        .filter-inner { max-width: 1200px; margin: 0 auto; padding: 10px 24px; display: flex; align-items: center; gap: 10px; }

        .fb-search { flex: 1; position: relative; }
        .fb-search input {
            width: 100%; background: #f8fafc; border: 1px solid #e2e8f0;
            border-radius: 8px; padding: 9px 14px 9px 36px;
            font-size: 13px; color: #1e293b; font-family: inherit; outline: none;
        }
        .fb-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #94a3b8; pointer-events: none; }

        .fb-mixer {
            display: flex; align-items: center; gap: 7px;
            background: var(--blue-main); color: white; border: none;
            border-radius: 8px; padding: 9px 18px; font-size: 13px;
            font-weight: 700; font-family: inherit; cursor: pointer;
            white-space: nowrap; flex-shrink: 0;
        }

        .content-wrap { max-width: 1200px; margin: 0 auto; padding: 28px 24px 60px; }
        .sec-block { margin-bottom: 32px; }
        .sec-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .sec-badge { font-size: 12px; font-weight: 800; color: white; padding: 4px 12px; border-radius: 6px; flex-shrink: 0; }
        .sec-badge.engine { background: var(--blue-main); }
        .sec-line  { flex: 1; height: 0.5px; background: #e2e8f0; }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

        /* 카드 레이아웃 재구성: 수직 정렬 순서 고정 */
        .exam-card { background: white; border: 1px solid #f1f5f9; border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; transition: 0.2s; }
        .exam-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); border-color: #e2e8f0; }
        .card-top { height: 4px; background: var(--blue-main); }
        .card-top.green { background: var(--green-main); }
        
        .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .card-school { font-size: 18px; font-weight: 800; color: #1e293b; letter-spacing: -0.5px; }
        .card-exam-type { font-size: 14px; font-weight: 700; color: #475569; }
        .card-engine-tag { align-self: flex-start; margin: 2px 0; }
        .card-grade-info { font-size: 13px; font-weight: 700; color: #94a3b8; }

        .badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; display: inline-block; }
        .badge.blue  { background: var(--blue-pale); color: var(--blue-main); }
        .badge.green { background: var(--green-pale); color: var(--green-main); }

        .card-actions { border-top: 1px solid #f1f5f9; display: flex; background: #fcfdfe; }
        .action-btn { flex: 1; padding: 14px 0; text-align: center; font-size: 12px; font-weight: 700; color: #64748b; cursor: pointer; transition: 0.15s; }
        .action-btn + .action-btn { border-left: 1px solid #f1f5f9; }
        .action-btn:hover { background: #f1f5f9; color: var(--blue-main); }
        .action-btn.sole { color: var(--green-main); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: white; border-radius: 20px; padding: 36px 40px; width: 360px; text-align: center; }
        .qpp-btns { display: flex; gap: 14px; justify-content: center; margin-top: 20px; }
        .qpp-opt { flex: 1; padding: 20px 0; border: 2px solid #e2e8f0; border-radius: 14px; cursor: pointer; font-size: 28px; font-weight: 800; }
        .qpp-opt:hover { border-color: var(--blue-main); color: var(--blue-main); }
    </style>
</head>
<body>

<div class="modal-overlay" id="qppModal">
    <div class="modal-box">
        <div style="font-size:18px; font-weight:800;">시험지 출력 형식</div>
        <div class="qpp-btns">
            <div class="qpp-opt" onclick="confirmQpp(4)">4<span style="display:block; font-size:11px;">2x2 배열</span></div>
            <div class="qpp-opt" onclick="confirmQpp(6)">6<span style="display:block; font-size:11px;">2x3 배열</span></div>
        </div>
        <button onclick="closeModal()" style="margin-top:20px; border:none; background:none; color:#94a3b8; cursor:pointer;">취소</button>
    </div>
</div>

<header>
    <div class="top-nav">
        <div class="logo" onclick="resetView()">
            <div class="logo-mark"><div></div><div></div><div></div><div></div></div>
            <span class="logo-name"><em>JS</em>아카이브</span>
        </div>
        <nav class="grade-nav" id="gradeBar">
            <span class="gtab" data-grade="고3">고3</span>
            <span class="gtab" data-grade="고2">고2</span>
            <span class="gtab" data-grade="고1">고1</span>
            <span class="gtab" data-grade="중3">중3</span>
            <span class="gtab" data-grade="중2">중2</span>
            <span class="gtab active" data-grade="">전체</span>
        </nav>
        <span class="nav-count" id="navCount">0개</span>
    </div>
</header>

<div class="hero">
    <div class="hero-grid-bg"></div>
    <div class="hero-inner">
        <div>
            <div class="hero-tag"><div class="tag-dot"></div><span>수학 기출 아카이브</span></div>
            <div class="hero-title">학교별 기출 & 변형<br><em>통합 출제 시스템</em></div>
            <div class="hero-desc">시험지 · 해설지 · 정답표를 한 번에<br>엔진 렌더링 + PDF 기출 통합 관리</div>
        </div>
        <div class="stat-pills">
            <div class="stat-pill"><div class="stat-n" id="stat-total">0</div><div class="stat-l">총 시험지</div></div>
            <div class="stat-pill"><div class="stat-n" id="stat-pdf">0</div><div class="stat-l">PDF 기출</div></div>
        </div>
    </div>
</div>

<div class="filter-band">
    <div class="filter-inner">
        <div class="fb-search">
            <i class="fa-solid fa-magnifying-glass fb-search-icon"></i>
            <input type="text" id="searchInput" placeholder="학교명, 과목 검색…">
        </div>
        <button class="fb-mixer" onclick="location.href='mixer.html'">믹서 출제</button>
    </div>
</div>

<div class="content-wrap">
    <div id="featured-section"></div>
    <div id="full-section" style="display:none;">
        <div id="full-grid" class="card-grid"></div>
    </div>
</div>

<script>
let engineDB = { exams: [] };
let archiveDB = { files: [] };
let selectedGrade = '';

async function init() {
    await new Promise(res => {
        const s = document.createElement('script');
        s.src = 'db.js?v=' + Date.now();
        s.onload = () => { engineDB = window.mainDB || window.db || { exams: [] }; res(); };
        s.onerror = () => res();
        document.body.appendChild(s);
    });

    try {
        const r = await fetch('./data/catalog.json?v=' + Date.now());
        if (r.ok) archiveDB = await r.json();
    } catch (e) {}

    updateStats();
    initGradeBar();
    renderFeatured();
    document.getElementById('searchInput').addEventListener('input', onFilterChange);
}

function updateStats() {
    const total = engineDB.exams.length + (archiveDB.files?.length || 0);
    document.getElementById('stat-total').innerText = total;
    document.getElementById('stat-pdf').innerText = archiveDB.files?.length || 0;
    document.getElementById('navCount').innerText = `시험지 ${total}개`;
}

function initGradeBar() {
    document.querySelectorAll('.gtab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.gtab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            selectedGrade = tab.dataset.grade;
            onFilterChange();
        };
    });
}

function onFilterChange() {
    const keyword = document.getElementById('searchInput').value.trim();
    if (keyword || selectedGrade) {
        document.getElementById('featured-section').style.display = 'none';
        document.getElementById('full-section').style.display = 'block';
        renderFullList(keyword);
    } else {
        document.getElementById('featured-section').style.display = 'block';
        document.getElementById('full-section').style.display = 'none';
        renderFeatured();
    }
}

function buildCard(ex) {
    const isArchive = ex.url || ex.fileName;
    const card = document.createElement('div');
    card.className = 'exam-card';

    const school = ex.school || '학교 미상';
    const examType = ex.semester ? `${ex.semester}학기 ${ex.examType === 'mid' ? '중간' : '기말'}` : (ex.exam || '기출 시험');
    const engineTag = isArchive ? '<span class="badge green">PDF기출</span>' : '<span class="badge blue">엔진기출</span>';
    const grade = ex.grade || '전학년';

    card.innerHTML = `
        <div class="card-top ${isArchive ? 'green' : ''}"></div>
        <div class="card-body">
            <div class="card-school">${school}</div>
            <div class="card-exam-type">${examType}</div>
            <div class="card-engine-tag">${engineTag}</div>
            <div class="card-grade-info">${grade}</div>
        </div>
        <div class="card-actions">
            ${isArchive ? 
                `<div class="action-btn sole" onclick="openEngine('${ex.url || ex.fileName}', 'pdf', '${school}${grade}')">PDF 열기</div>` :
                `<div class="action-btn" onclick="openEngine('${ex.file}', 'exam', '${school}${grade}')">시험지</div>
                 <div class="action-btn" onclick="openEngine('${ex.file}', 'sol', '${school}${grade}')">해설지</div>
                 <div class="action-btn" onclick="openEngine('${ex.file}', 'ans', '${school}${grade}')">정답표</div>`
            }
        </div>`;
    return card;
}

let _pendingFile = '';
let _pendingTitle = '';

function openEngine(file, mode, title) {
    if (mode === 'pdf') {
        location.href = `engine.html?mode=pdf&file=${encodeURIComponent(file)}&title=${encodeURIComponent(title)}`;
        return;
    }
    if (mode === 'exam') {
        _pendingFile = file; _pendingTitle = title;
        document.getElementById('qppModal').classList.add('open');
        return;
    }
    location.href = `engine.html?mode=${mode}&data=exams/${file}&title=${encodeURIComponent(title)}`;
}

function confirmQpp(qpp) {
    location.href = `engine.html?mode=exam&qpp=${qpp}&data=exams/${_pendingFile}&title=${encodeURIComponent(_pendingTitle)}`;
}

function closeModal() { document.getElementById('qppModal').classList.remove('open'); }

function renderFeatured() {
    const container = document.getElementById('featured-section');
    container.innerHTML = '';
    const section = document.createElement('div');
    section.className = 'sec-block';
    section.innerHTML = `<div class="sec-header"><span class="sec-badge engine">최신 기출</span><div class="sec-line"></div></div><div class="card-grid" id="f-grid"></div>`;
    container.appendChild(section);
    const grid = section.querySelector('#f-grid');
    engineDB.exams.slice(0, 4).forEach(ex => grid.appendChild(buildCard(ex)));
}

function renderFullList(keyword) {
    const grid = document.getElementById('full-grid');
    grid.innerHTML = '';
    const filtered = engineDB.exams.filter(ex => 
        (!selectedGrade || ex.grade === selectedGrade) &&
        (!keyword || ex.school.includes(keyword))
    );
    filtered.forEach(ex => grid.appendChild(buildCard(ex)));
}

function resetView() { location.reload(); }
window.onload = init;
</script>
</body>
</html>
