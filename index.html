<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP 수학 | 통합 출제 시스템</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --navy-dark: #0f172a;
            --purple-primary: #4f46e5;
            --blue-exam: #378ADD;
            --green-unit: #1D9E75;
            --gray-private: #94a3b8;
            --bg-soft: #f8fafc;
        }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg-soft); color: #1e293b; overflow-x: hidden; }
        
        header { 
            background: var(--navy-dark); 
            position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-logo { color: white; font-size: 1.2rem; font-weight: 700; }
        .search-bar { position: relative; width: 400px; }
        .search-bar input {
            width: 100%; padding: 10px 15px 10px 40px;
            border-radius: 20px; border: none; outline: none; font-size: 14px;
            background: rgba(255,255,255,0.1); color: white;
        }
        .search-bar input::placeholder { color: rgba(255,255,255,0.6); }
        .search-bar i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.6); }
        
        main { padding: 2rem; max-width: 1400px; margin: 0 auto; }
        .section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--navy-dark); }
        
        .exam-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;
        }
        
        .card {
            background: white; border-radius: 12px; padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
        
        .badge-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .badge { 
            padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: 600;
            background: #e2e8f0; color: #475569;
        }
        .badge.archive { background: var(--blue-exam); color: white; }
        .badge.engine { background: var(--purple-primary); color: white; }
        
        .card-actions { display: flex; gap: 0.5rem; border-top: 1px solid #e2e8f0; padding-top: 1rem; margin-top: auto; }
        .action-item {
            flex: 1; text-align: center; padding: 0.5rem;
            border-radius: 6px; font-size: 0.9rem; color: #64748b;
            transition: 0.2s;
        }
        .action-item:hover { background: #f1f5f9; color: var(--navy-dark); }
        .action-item i { margin-right: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="header-logo">AP 수학 | 통합 출제 시스템</div>
        <div class="search-bar">
            <i class="fa-solid fa-search"></i>
            <input type="text" id="global-search" placeholder="학교명, 과목, 연도 검색">
        </div>
    </header>

    <main>
        <div class="section-title" id="list-title">전체 기출 및 자료 목록</div>
        <div class="exam-grid" id="exam-grid">
        </div>
    </main>

    <script>
        let catalogData = { years: [], exams: [], files: [] };
        let engineData = [];

        async function init() {
            try {
                const exRes = await fetch('exams.json');
                if (exRes.ok) {
                    engineData = await exRes.json();
                    engineData.forEach(item => item.source = 'engine');
                }
            } catch (e) {}

            try {
                const catRes = await fetch('./data/catalog.json');
                if (catRes.ok) {
                    catalogData = await catRes.json();
                }
            } catch (e) {}

            performSearch('');

            const searchInput = document.getElementById('global-search');
            searchInput.addEventListener('input', (e) => {
                performSearch(e.target.value.trim());
            });
        }

        function performSearch(query) {
            const grid = document.getElementById('exam-grid');
            const title = document.getElementById('list-title');
            
            title.innerText = query ? `검색 결과: ${query}` : '전체 기출 및 자료 목록';
            let allResults = [];

            if (engineData.length > 0) {
                const filteredEngine = engineData.filter(d => 
                    !query || 
                    (d.school && d.school.includes(query)) || 
                    (d.subject && d.subject.includes(query))
                );
                allResults = [...allResults, ...filteredEngine];
            }

            if (catalogData.files && catalogData.files.length > 0) {
                const filteredArchive = catalogData.files.filter(d => 
                    !query || 
                    (d.school && d.school.includes(query)) || 
                    (d.subject && d.subject.includes(query)) ||
                    (d.year && d.year.includes(query))
                );
                
                filteredArchive.forEach(item => {
                    item.source = 'archive'; 
                    item.displayTitle = `${item.school} (${item.year} ${item.exam})`;
                });
                allResults = [...allResults, ...filteredArchive];
            }

            renderCards(allResults);
        }

        function renderCards(data) {
            const grid = document.getElementById('exam-grid');
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; color:#64748b;">일치하는 자료가 없습니다.</div>';
                return;
            }

            data.forEach(ex => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const isArchive = ex.source === 'archive';
                const badgeClass = isArchive ? 'badge archive' : 'badge engine';
                const typeText = isArchive ? 'PDF기출' : (ex.type === 'exam' ? '엔진기출' : '엔진자료');
                const titleText = isArchive ? ex.displayTitle : `${ex.school || ''} ${ex.subject || ''}`.trim();
                const subjectText = ex.subject || '수학';
                
                let extraBadge = '';
                if (isArchive && ex.type) {
                    extraBadge = `<span class="badge" style="background:#f1f5f9; color:#475569;">${ex.type}</span>`;
                } else if (!isArchive && ex.grade) {
                    extraBadge = `<span class="badge" style="background:#f1f5f9; color:#475569;">${ex.grade}</span>`;
                }

                let actionsHTML = '';
                if (isArchive) {
                    actionsHTML = `<div class="action-item" data-mode="pdf"><i class="fa-regular fa-file-pdf"></i><span>PDF 열기</span></div>`;
                } else {
                    actionsHTML = `
                        <div class="action-item" data-mode="exam"><i class="fa-regular fa-file-pdf"></i><span>문제지</span></div>
                        <div class="action-item" data-mode="sol"><i class="fa-solid fa-chalkboard-user"></i><span>해설지</span></div>
                        <div class="action-item" data-mode="ans"><i class="fa-solid fa-list-check"></i><span>정답표</span></div>
                    `;
                }

                card.innerHTML = `
                    <div class="card-title">${titleText}</div>
                    <div class="badge-row">
                        <span class="${badgeClass}">${typeText}</span>
                        ${extraBadge}
                        <span class="badge" style="background:#f1f5f9; color:#475569;">${subjectText}</span>
                    </div>
                    <div class="card-actions">
                        ${actionsHTML}
                    </div>
                `;

                const actions = card.querySelectorAll('.action-item');
                actions.forEach((btn) => {
                    btn.addEventListener('click', e => {
                        e.stopPropagation();
                        const mode = btn.getAttribute('data-mode');
                        openEngine(ex, mode);
                    });
                });

                grid.appendChild(card);
            });
        }

        function openEngine(item, mode) {
            let url = "";
            if (item.source === 'archive') {
                url = `engine.html?file=pdf_archive/${item.fileName}&title=${encodeURIComponent(item.school + ' ' + item.subject)}&mode=pdf`;
            } else {
                url = `engine.html?data=exams/${item.file}&title=${encodeURIComponent((item.school || '') + ' ' + (item.subject || ''))}&mode=${mode}`;
            }
            window.location.href = url;
        }

        window.onload = init;
    </script>
</body>
</html>
