<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EIE 영어 관리</title>
    <!-- ==== eie.css 소스 순서 분할 (cascade 동일, 반드시 이 순서로 로드) ==== -->
    <!-- 공통 베이스: 토큰·body·헤더/카드/테이블/요약/상태 -->
    <link rel="stylesheet" href="./css/eie.css">
    <!-- 사이드바 가이드 + 원장 admin 랜딩 -->
    <link rel="stylesheet" href="./css/eie-landing.css">
    <!-- 시간표 프론트 에디터 -->
    <link rel="stylesheet" href="./css/eie-timetable-editor.css">
    <!-- 로그인 화면 -->
    <link rel="stylesheet" href="./css/eie-login.css">
    <!-- AP MATH 클론 셸 v2 (헤더/탑바/드로어/메인) -->
    <link rel="stylesheet" href="./css/eie-shell-v2.css">
    <!-- 시간표 v2 읽기 보드 -->
    <link rel="stylesheet" href="./css/eie-timetable-board.css">
    <!-- 시간표 보드 override(누수 제거) -->
    <link rel="stylesheet" href="./css/eie-timetable-board-fixes.css">
    <!-- 시간표 카드보드 refresh -->
    <link rel="stylesheet" href="./css/eie-timetable-board-refresh.css">
    <!-- 시간표 편집 모드 -->
    <link rel="stylesheet" href="./css/eie-timetable-edit.css">
    <!-- 헤더 parity/wordmark 고정 + 정리 패널 -->
    <link rel="stylesheet" href="./css/eie-detail-v2.css">
    <!-- v2 상세 패널 -->
    <link rel="stylesheet" href="./css/eie-v2-panels.css">
    <!-- v2 주간 카드 -->
    <link rel="stylesheet" href="./css/eie-v2-week-card.css">
    <!-- v2 미니 클래스룸 -->
    <link rel="stylesheet" href="./css/eie-v2-mini-classroom.css">
    <!-- EIE Panel 토큰/컴포넌트(반·학생·신규 패널 공통 §A·§B) -->
    <link rel="stylesheet" href="./css/eie-panel-tokens.css">
    <!-- 원장 대시보드 카드 + 클래스룸 화면 -->
    <link rel="stylesheet" href="./css/eie-dashboard-classroom.css">
    <!-- 출석부 월간 그리드 -->
    <link rel="stylesheet" href="./css/eie-attendance-grid.css">
    <!-- 대시보드 print + interaction standard -->
    <link rel="stylesheet" href="./css/eie-dashboard-print.css">
    <!-- ==== 기능별 분리 파일(고유 namespace, 나중 override 없음 → 마지막 로드 안전) ==== -->
    <link rel="stylesheet" href="./css/eie-dashboard.css">
    <link rel="stylesheet" href="./css/eie-timetable.css">
    <link rel="stylesheet" href="./css/eie-classroom.css">
    <link rel="stylesheet" href="./css/eie-students.css">
    <link rel="stylesheet" href="./css/eie-attendance.css">
    <link rel="stylesheet" href="./css/eie-grade-ledger.css">
    <!-- 관리(선생님 계정) 톤 보정 (스코프: .eie-management-screen) -->
    <link rel="stylesheet" href="./css/eie-management.css">
</head>
<body>

    <!-- ── Mobile header (AP MATH <header>와 동일 구조) ── -->
    <header class="eie-header" id="eie-mobile-header">
        <div class="eie-header-left">
            <button class="eie-hamburger-btn" onclick="eieOpenDrawer()" aria-label="메뉴 열기" title="메뉴">
                <span class="eie-hamburger-glyph">☰</span>
            </button>
            <button id="eie-mobile-back-button" class="app-back-btn" type="button" onclick="eieHistoryBack()" aria-label="뒤로가기" title="뒤로가기" disabled>
                <svg class="app-back-btn__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
                    <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </button>
        </div>
        <div class="eie-header-brand" onclick="eieGoHome()">
            <img class="app-header-logo eie-header-logo" src="./assets/eie-logo.png" alt="EIE">
        </div>
        <div class="eie-header-user" id="eie-mobile-user" aria-label="사용자"></div>
    </header>

    <!-- ── Desktop topbar (AP MATH .desktop-topbar와 동일 구조) ── -->
    <div class="eie-desktop-topbar" id="eie-desktop-topbar">
        <button id="eie-desktop-back-button" class="app-back-btn" type="button" onclick="eieHistoryBack()" aria-label="뒤로가기" title="뒤로가기" disabled>
            <svg class="app-back-btn__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
                <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </button>
        <div class="eie-topbar-brand" onclick="eieGoHome()">
            <img class="app-header-logo eie-header-logo" src="./assets/eie-logo.png" alt="EIE">
        </div>
    </div>

    <!-- ── Drawer overlay ── -->
    <div id="eie-drawer-overlay" onclick="eieCloseDrawer()"></div>

    <!-- ── Sidebar drawer (AP MATH #app-drawer와 동일 구조) ── -->
    <nav id="eie-drawer" aria-label="EIE 관리 메뉴">
        <button class="eie-drw-rail-toggle" onclick="eieOpenDrawer()" aria-label="메뉴 열기" title="메뉴">
            <span class="eie-hamburger-glyph">☰</span>
        </button>
        <div class="eie-drw-top-tools">
            <button class="eie-drw-hamburger" onclick="eieCloseDrawer()" aria-label="메뉴 닫기" title="닫기">
                <span class="eie-hamburger-glyph">☰</span>
            </button>
        </div>
        <div class="eie-drw-menu">
            <div class="eie-drw-section-label">EIE 관리</div>
            <button class="eie-drw-item" type="button" data-eie-route="dashboard" aria-label="대시보드" title="대시보드">
                <span class="eie-drw-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 4h7v7H4z"/><path d="M13 4h7v7h-7z"/><path d="M4 13h7v7H4z"/><path d="M13 13h7v7h-7z"/></svg></span>
                <span class="eie-drw-label">대시보드</span>
            </button>
            <button class="eie-drw-item" type="button" data-eie-route="timetable" aria-label="시간표" title="시간표">
                <span class="eie-drw-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4"/><path d="M16 3v4"/><path d="M4 10h16"/><path d="M8 14h3"/><path d="M13 14h3"/></svg></span>
                <span class="eie-drw-label">시간표</span>
            </button>
            <button class="eie-drw-item" type="button" data-eie-route="students" aria-label="학생관리" title="학생관리">
                <span class="eie-drw-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M16 19c0-2.2-1.8-4-4-4s-4 1.8-4 4"/><circle cx="12" cy="8" r="3"/><path d="M20 18c0-1.7-1.1-3.1-2.6-3.7"/><path d="M17 6.2a2.5 2.5 0 0 1 0 4.6"/></svg></span>
                <span class="eie-drw-label">학생관리</span>
            </button>
            <button class="eie-drw-item" type="button" data-eie-route="classroom" aria-label="클래스룸" title="클래스룸">
                <span class="eie-drw-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 10 12 5l8 5-8 5z"/><path d="M7 12v5c2.8 1.7 7.2 1.7 10 0v-5"/></svg></span>
                <span class="eie-drw-label">클래스룸</span>
            </button>
            <button class="eie-drw-item" type="button" data-eie-route="attendance" aria-label="출석부" title="출석부">
                <span class="eie-drw-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M8 3v4"/><path d="M16 3v4"/><path d="M4 10h16"/><path d="M9 14l1.6 1.6L14 13"/></svg></span>
                <span class="eie-drw-label">출석부</span>
            </button>
            <button class="eie-drw-item" type="button" data-eie-route="management" aria-label="관리" title="관리">
                <span class="eie-drw-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2 3.4-.2-.1a1.7 1.7 0 0 0-1.9.3 1.7 1.7 0 0 0-.6 1.7v.2H9v-.2a1.7 1.7 0 0 0-.6-1.7 1.7 1.7 0 0 0-1.9-.3l-.2.1-2-3.4.1-.1A1.7 1.7 0 0 0 4.6 15 1.7 1.7 0 0 0 3 13.8h-.2v-3.6H3A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.3-1.9l-.1-.1 2-3.4.2.1a1.7 1.7 0 0 0 1.9-.3A1.7 1.7 0 0 0 9 1.7v-.2h6v.2a1.7 1.7 0 0 0 .6 1.7 1.7 1.7 0 0 0 1.9.3l.2-.1 2 3.4-.1.1A1.7 1.7 0 0 0 19.4 9 1.7 1.7 0 0 0 21 10.2h.2v3.6H21a1.7 1.7 0 0 0-1.6 1.2z"/></svg></span>
                <span class="eie-drw-label">관리</span>
            </button>
        </div>
        <div class="eie-drw-spacer"></div>
        <div class="eie-drw-footer">
            <button class="eie-drw-item eie-drw-danger" type="button"
                    onclick="if(window.EieApp && EieApp.handleEieLogout) EieApp.handleEieLogout()"
                    aria-label="로그아웃">
                <span class="eie-drw-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M10 5H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h4"/><path d="M14 8l4 4-4 4"/><path d="M18 12H9"/></svg></span>
                <span class="eie-drw-label">로그아웃</span>
            </button>
        </div>
    </nav>

    <!-- ── Main content (AP MATH <main id="app-root">와 동일 위치/역할) ── -->
    <main id="eie-app" class="eie-main"></main>

    <script defer src="../shared/js/wangji-owner-auth-bridge.js"></script>
    <script defer src="./js/utils/eie-normalize.js"></script>
    <script defer src="./js/utils/eie-grade-utils.js"></script>
    <script defer src="./js/utils/eie-classroom-scope.js"></script>
    <script defer src="./js/eie-state.js"></script>
    <script defer src="./js/eie-api.js"></script>
    <script defer src="./js/apms-compat/eie-apms-state.js"></script>
    <script defer src="./js/apms-compat/eie-apms-api.js"></script>
    <script defer src="./js/apms-compat/eie-apms-ui-bridge.js"></script>
    <script defer src="./js/eie-app.js"></script>
    <script defer src="./js/views/eie-dashboard.js"></script>
    <script defer src="./js/views/eie-timetable.js?v=20260609"></script>
    <script defer src="./js/views/eie-timetable-editor.js"></script>
    <script defer src="./js/views/eie-students.js"></script>
    <script defer src="./js/views/eie-classroom.js"></script>
    <script defer src="./js/views/eie-attendance.js?v=20260609"></script>
    <script defer src="./js/views/eie-grade-ledger.js?v=20260613"></script>
    <script defer src="./js/views/eie-management.js"></script>
    <script defer src="./js/views/eie-teacher.js?v=20260609"></script>
    <script defer src="./js/eie-router.js"></script>
</body>
</html>
