    <script src="./js/utils/eie-normalize.js"></script>
    <script src="./js/eie-state.js"></script>
    <script src="./js/eie-api.js"></script>
    <script src="./js/eie-app.js"></script>
    <script src="./js/views/eie-dashboard.js"></script>
    <script src="./js/views/eie-timetable.js"></script>
    <script src="./js/views/eie-students.js"></script>
    <script src="./js/views/eie-classroom.js"></script>
    <script src="./js/views/eie-management.js"></script>
    <script src="./js/eie-router.js"></script>
    <script>
        (function bindEieRouteButtons() {
            function openEieRoute(route) {
                if (!route) return;
                if (window.EieRouter && typeof window.EieRouter.open === 'function') {
                    window.EieRouter.open(route);
                    return;
                }
                window.location.hash = '#' + route;
            }

            document.addEventListener('click', function handleEieRouteClick(event) {
                var target = event.target && event.target.closest ? event.target.closest('[data-eie-route]') : null;
                if (!target) return;
                var route = target.getAttribute('data-eie-route');
                if (!route) return;
                event.preventDefault();
                openEieRoute(route);
            });
        })();
    </script>
</body>
</html>
