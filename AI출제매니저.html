<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AP Math 출제 매니저 v4.2.3</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=block');
        body { font-family: 'Nanum Myeongjo', serif; padding: 30px; background: #f1f5f9; color: #1e293b; letter-spacing: -0.5px; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 5px solid #3b82f6; }
        h1 { color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-top: 0; font-weight: 800; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; color: #475569; font-size: 11pt; }
        input[type="text"], input[type="password"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 10.5pt; }
        .api-input-container { display: flex; gap: 8px; align-items: center; }
        .btn-save { padding: 10px 15px; background: #64748b; color: white; border-radius: 6px; font-size: 10pt; font-weight: 800; cursor: pointer; border: none; }
        .btn-save.success { background: #10b981; }
        .difficulty-table { background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .difficulty-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center; }
        .difficulty-item input { text-align: center; width: 70px; }
        .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 30px; }
        button { padding: 12px 20px; font-size: 11pt; border-radius: 8px; cursor: pointer; font-weight: 800; font-family: inherit; border: none; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        button:disabled { background: #cbd5e1 !important; cursor: not-allowed; }
        .btn-main { background: #3b82f6; color: white; flex: 2; min-width: 200px; font-size: 13pt; }
        .btn-print { background: #6366f1; color: white; }
        .btn-copy { background: #10b981; color: white; }
        .btn-reset { background: #ef4444; color: white; }
        #outputBox { margin-top: 25px; background: #1e293b; color: #f8fafc; padding: 25px; border-radius: 8px; font-family: 'Consolas', monospace; white-space: pre-wrap; font-size: 10.5pt; overflow-y: auto; max-height: 400px; border: 1px solid #334155; }
        .status { margin-top: 15px; font-weight: 800; text-align: center; font-size: 11pt; min-height: 25px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AP Math 출제 매니저 v4.2.3</h1>
    <div class="input-group">
        <label>🔑 Gemini API Key</label>
        <div class="api-input-container">
            <input type="password" id="apiKey" placeholder="API 키를 입력하세요" style="flex: 1;">
            <button id="btnSaveKey" class="btn-save" onclick="saveApiKey()">💾 저장</button>
        </div>
    </div>
    <div class="input-group">
        <label>📄 시험 제목</label>
        <input type="text" id="examTitle" value="24_연향중2_1학기_중간_중2">
    </div>
    <div class="input-group">
        <label>🎯 출제 범위 및 상세 지시</label>
        <input type="text" id="topicInput" value="유리수와 순환소수 ~ 일차부등식 (심화 단원 결합)">
    </div>
    <div class="difficulty-table">
        <label>📊 난이도별 문항 설정</label>
        <div class="difficulty-grid">
            <div class="difficulty-item"><label>하</label><input type="number" id="count_low" value="5" min="0"></div>
            <div class="difficulty-item"><label>중</label><input type="number" id="count_mid" value="10" min="0"></div>
            <div class="difficulty-item"><label>상</label><input type="number" id="count_high" value="4" min="0"></div>
            <div class="difficulty-item"><label>최상</label><input type="number" id="count_top" value="1" min="0"></div>
        </div>
    </div>
    <div class="btn-row">
        <button id="btnMain" class="btn-main" onclick="generateAIProblem()">⚡ 출제 시작</button>
        <button id="btnPrintExam" class="btn-print" onclick="printDoc('exam')" disabled>🖨️ 시험지</button>
        <button id="btnPrintAns" class="btn-print" onclick="printDoc('answer')" disabled>🔑 정답지</button>
        <button id="btnPrintSol" class="btn-print" onclick="printDoc('solution')" disabled>📖 해설지</button>
        <button id="btnCopy" class="btn-copy" onclick="copyFullHtml()" disabled>📋 단일 HTML 복사</button>
        <button class="btn-reset" onclick="resetBank()">🗑️ 초기화</button>
    </div>
    <div class="status" id="statusMsg">대기 중...</div>
    <div id="outputBox">// window.questionBank 데이터가 출력됩니다.</div>
</div>

<script>
let state = { isGenerating: false, questionBank: [] };

const encodeKey = (str) => btoa(unescape(encodeURIComponent(str)));
const decodeKey = (str) => decodeURIComponent(escape(atob(str)));

window.onload = () => {
    try {
        const encryptedKey = localStorage.getItem('ap_math_permanent_key');
        if (encryptedKey) document.getElementById('apiKey').value = decodeKey(encryptedKey);
    } catch (e) {}
    updateUIState();
};

function updateUIState() {
    const hasData = state.questionBank.length > 0;
    const isBusy = state.isGenerating;
    document.getElementById('btnMain').disabled = isBusy;
    ['btnPrintExam', 'btnPrintAns', 'btnPrintSol', 'btnCopy'].forEach(id => {
        document.getElementById(id).disabled = isBusy || !hasData;
    });
}

function saveApiKey() {
    const apiKey = document.getElementById("apiKey").value.trim();
    if (!apiKey) return alert("API 키를 입력해주세요.");
    localStorage.setItem('ap_math_permanent_key', encodeKey(apiKey));
    const btn = document.getElementById("btnSaveKey");
    btn.innerText = "✅ 저장됨"; btn.classList.add("success");
    setTimeout(() => { btn.innerText = "💾 저장"; btn.classList.remove("success"); }, 1500);
}

function resetBank() {
    state.questionBank = [];
    state.isGenerating = false;
    document.getElementById('outputBox').innerText = '// 초기화 완료.';
    document.getElementById('statusMsg').innerText = '대기 중...';
    document.getElementById('statusMsg').style.color = "#1e293b";
    updateUIState();
}

async function fetchDifficultyBlock(apiKey, topic, difficulty, count, retry = 0) {
    if (count <= 0) return [];
    
    const promptText = `주제: ${topic}
난이도 [${difficulty}] 수학 객관식 ${count}문항 생성.
반드시 JSON 배열만 출력 ($...$ LaTeX 필수).
형식: [{"difficulty":"${difficulty}","score":${difficulty==='최상'?6:5},"content":"","choices":["","","","",""],"answer":"1","solution":""}]`;

    try {
        // [완전 교정] 가장 표준화된 API 주소 체계 적용
        const apiUrl = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        
        const response = await fetch(apiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                contents: [{ parts: [{ text: promptText }] }]
            })
        });

        if (!response.ok) {
            const errBody = await response.json().catch(() => ({}));
            throw new Error(`${response.status}: ${errBody.error?.message || '주소 또는 키 오류'}`);
        }
        
        const data = await response.json();
        const rawJson = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
        
        const cleaned = rawJson.replace(/```json|```/g, '').trim();
        const match = cleaned.match(/\[\s*{[\s\S]*}\s*\]/);
        if (!match) throw new Error(`${difficulty} JSON 파싱 실패`);
        
        const parsed = JSON.parse(match[0]);

        parsed.forEach((q, i) => {
            if (!q.content || !q.solution || !q.answer) throw new Error(`${difficulty} ${i+1}번 데이터 누락`);
            if (!Array.isArray(q.choices) || q.choices.length !== 5) throw new Error(`${difficulty} ${i+1}번 보기 오류`);
        });

        return parsed;
    } catch (e) {
        if (retry < 2) return fetchDifficultyBlock(apiKey, topic, difficulty, count, retry + 1);
        throw e;
    }
}

async function generateAIProblem() {
    const apiKey = document.getElementById("apiKey").value.trim();
    const topic = document.getElementById("topicInput").value.trim();
    const counts = {
        '하': parseInt(document.getElementById('count_low').value) || 0,
        '중': parseInt(document.getElementById('count_mid').value) || 0,
        '상': parseInt(document.getElementById('count_high').value) || 0,
        '최상': parseInt(document.getElementById('count_top').value) || 0
    };
    
    const activeTasks = Object.entries(counts).filter(([_, count]) => count > 0);
    if (!apiKey || activeTasks.length === 0) return alert("설정을 확인해주세요.");

    state.isGenerating = true;
    updateUIState();
    const statusMsg = document.getElementById("statusMsg");
    statusMsg.style.color = "#3b82f6";
    statusMsg.innerText = "🚀 표준 API 엔진 가동 중...";

    try {
        const results = await Promise.all(
            activeTasks.map(([diff, count]) => fetchDifficultyBlock(apiKey, topic, diff, count))
        );

        const diffOrder = { '하': 1, '중': 2, '상': 3, '최상': 4 };
        const combined = results.flat().sort((a, b) => diffOrder[a.difficulty] - diffOrder[b.difficulty]);

        const symbolMap = { "1":"①", "2":"②", "3":"③", "4":"④", "5":"⑤" };
        state.questionBank = combined.map(q => ({
            ...q,
            answer: symbolMap[q.answer.toString()] || q.answer
        }));

        document.getElementById("outputBox").innerText = `window.questionBank = ${JSON.stringify(state.questionBank, null, 2)};`;
        statusMsg.style.color = "#10b981";
        statusMsg.innerText = `✅ 완료! ${state.questionBank.length}문항 병렬 출제 성공.`;
    } catch (e) {
        statusMsg.style.color = "#ef4444";
        statusMsg.innerText = `❌ 실패: ${e.message}`;
    } finally {
        state.isGenerating = false;
        updateUIState();
    }
}

// ... 인쇄 관련 함수 (기존과 동일) ...
function buildQuestionsRows(questions, type = 'exam') {
    const labels = ['①','②','③','④','⑤'];
    return questions.map((q, i) => {
        const choicesHtml = q.choices.map((c, idx) => `<span>${labels[idx]} ${c}</span>`).join('');
        const solutionHtml = type === 'solution' ? `<div class="sol-box"><b>[해설]</b><br>${q.solution}<br><b>정답: ${q.answer}</b></div>` : '';
        return `<div class="q-item"><span class="q-num">${i + 1}.</span> ${q.content} ${type === 'solution' ? `<span style="font-size:8pt;color:#94a3b8;">[${q.score}점/${q.difficulty}]</span>`:''}<div class="choices">${choicesHtml}</div>${solutionHtml}</div>`;
    }).join('');
}

function printDoc(type) {
    if (state.questionBank.length === 0) return;
    const title = document.getElementById("examTitle").value;
    const rows = type === 'answer' ? '' : buildQuestionsRows(state.questionBank, type);
    let answerTable = '';
    if (type === 'answer') {
        answerTable = '<table class="ans-table"><tr>' + state.questionBank.map((q, i) => 
            `<td><b>${i + 1}</b><br>${q.answer}</td>${(i + 1) % 5 === 0 ? '</tr><tr>' : ''}`).join('') + '</tr></table>';
    }
    const htmlContent = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=block" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><\/script><script>window.MathJax={tex:{inlineMath:[['$','$']],macros:{tf:["\\\\tfrac{#1}{#2}",2]}},startup:{pageReady:()=>MathJax.startup.defaultPageReady().then(()=>document.fonts.ready).then(()=>window.print())}}<\/script><style>@page{size:A4;margin:15mm}body{font-family:'Nanum Myeongjo',serif;font-size:10.5pt;margin:0}.header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:20px}.container{column-count:${type === 'answer' ? 1 : 2};column-gap:30px;column-rule:0.5pt solid #eee}.q-item{break-inside:avoid;margin-bottom:3.8rem}.choices{display:grid;grid-template-columns:repeat(2, 1fr);row-gap:8px;margin-top:10px}.ans-table{width:100%;border-collapse:collapse}.ans-table td{border:1px solid #000;padding:12px;text-align:center}.sol-box{background:#f8fafc;padding:12px;border-left:4px solid #3b82f6;margin-top:10px;font-size:9.5pt}</style></head><body><div class="header"><h1>${title}</h1></div><div class="container">${type === 'answer' ? answerTable : rows}</div></body></html>`;
    const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
    window.open(URL.createObjectURL(blob), '_blank');
}

function copyFullHtml() {
    if (state.questionBank.length === 0) return;
    const title = document.getElementById("examTitle").value;
    const questionsRows = buildQuestionsRows(state.questionBank, 'exam');
    const fullHtml = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>${title}</title><link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=block" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><\/script><script>window.MathJax={tex:{inlineMath:[['$','$']]}}<\/script><style>@page{size:A4;margin:15mm}body{font-family:'Nanum Myeongjo',serif;font-size:10.5pt;margin:0;padding:20px}.header{border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:20px}.container{column-count:2;column-gap:30px;column-rule:0.5pt solid #eee}.q-item{break-inside:avoid;margin-bottom:4rem}.choices{display:grid;grid-template-columns:repeat(2, 1fr);row-gap:8px;margin-top:10px}.no-print{text-align:center;margin-bottom:20px}@media print{.no-print{display:none}}</style></head><body><div class="no-print"><button onclick="window.print()" style="padding:10px 20px;font-weight:800;cursor:pointer">🖨️ 인쇄하기</button></div><div class="header"><h1>${title}</h1></div><div class="container">${questionsRows}</div></body></html>`;
    navigator.clipboard.writeText(fullHtml).then(() => alert("HTML 복사 완료")).catch(err => alert("복사 실패"));
}
</script>
</body>
</html>
