<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AP Math 출제 매니저 v3.4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=block');
        body { font-family: 'Nanum Myeongjo', serif; padding: 30px; background: #f1f5f9; color: #1e293b; letter-spacing: -0.5px; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 5px solid #3b82f6; }
        h1 { color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-top: 0; font-weight: 800; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; color: #475569; font-size: 11pt; }
        input[type="text"], input[type="password"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 10.5pt; }
        .api-input-container { display: flex; gap: 8px; align-items: center; }
        .btn-save { padding: 10px 15px; background: #64748b; color: white; border-radius: 6px; font-size: 10pt; font-weight: 800; cursor: pointer; border: none; }
        .btn-save.success { background: #10b981; }
        .difficulty-table { background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .difficulty-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center; }
        .difficulty-item input { text-align: center; width: 70px; }
        .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 30px; }
        button { padding: 12px 20px; font-size: 11pt; border-radius: 8px; cursor: pointer; font-weight: 800; font-family: inherit; border: none; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        button:disabled { background: #cbd5e1 !important; cursor: not-allowed; }
        .btn-main { background: #3b82f6; color: white; flex: 2; min-width: 200px; font-size: 13pt; }
        .btn-print { background: #6366f1; color: white; }
        .btn-copy { background: #10b981; color: white; }
        .btn-reset { background: #ef4444; color: white; }
        #outputBox { margin-top: 25px; background: #1e293b; color: #f8fafc; padding: 25px; border-radius: 8px; font-family: 'Consolas', monospace; white-space: pre-wrap; font-size: 10.5pt; overflow-y: auto; max-height: 400px; border: 1px solid #334155; }
        .status { margin-top: 15px; font-weight: 800; text-align: center; font-size: 11pt; min-height: 25px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AP Math 출제 매니저 v3.4</h1>
    <div class="input-group">
        <label>🔑 Gemini API Key (난독화 저장)</label>
        <div class="api-input-container">
            <input type="password" id="apiKey" placeholder="API 키를 입력하세요" autocomplete="current-password" style="flex: 1;">
            <button id="btnSaveKey" class="btn-save" onclick="saveApiKey()">💾 저장</button>
        </div>
    </div>
    <div class="input-group">
        <label>📄 시험 제목</label>
        <input type="text" id="examTitle" value="24_연향중2_1학기_중간_중2">
    </div>
    <div class="input-group">
        <label>🎯 출제 범위 및 상세 지시</label>
        <input type="text" id="topicInput" value="유리수와 순환소수 ~ 일차부등식 (심화 단원 결합)">
    </div>
    <div class="difficulty-table">
        <label>📊 난이도별 문항 설정 (정확한 분포 엄수)</label>
        <div class="difficulty-grid">
            <div class="difficulty-item"><label>하</label><input type="number" id="count_low" value="5" min="0"></div>
            <div class="difficulty-item"><label>중</label><input type="number" id="count_mid" value="10" min="0"></div>
            <div class="difficulty-item"><label>상</label><input type="number" id="count_high" value="4" min="0"></div>
            <div class="difficulty-item"><label>최상</label><input type="number" id="count_top" value="1" min="0"></div>
        </div>
    </div>
    <div class="btn-row">
        <button id="btnMain" class="btn-main" onclick="generateAIProblem()">⚡ 출제 시작</button>
        <button id="btnPrintExam" class="btn-print" onclick="printDoc('exam')" disabled>🖨️ 시험지</button>
        <button id="btnPrintAns" class="btn-print" onclick="printDoc('answer')" disabled>🔑 정답지</button>
        <button id="btnPrintSol" class="btn-print" onclick="printDoc('solution')" disabled>📖 해설지</button>
        <button id="btnCopy" class="btn-copy" onclick="copyFullHtml()" disabled>📋 단일 HTML 복사</button>
        <button class="btn-reset" onclick="resetBank()">🗑️ 초기화</button>
    </div>
    <div class="status" id="statusMsg">대기 중...</div>
    <div id="outputBox">// window.questionBank 데이터가 출력됩니다.</div>
</div>

<script>
let state = { isGenerating: false, questionBank: [] };

const encodeKey = (str) => btoa(unescape(encodeURIComponent(str)));
const decodeKey = (str) => decodeURIComponent(escape(atob(str)));

window.onload = () => {
    try {
        const encryptedKey = localStorage.getItem('ap_math_permanent_key');
        if (encryptedKey) document.getElementById('apiKey').value = decodeKey(encryptedKey);
    } catch (e) { console.error("키 복구 실패", e); }
    updateUIState();
};

function updateUIState() {
    const hasData = state.questionBank.length > 0;
    const isBusy = state.isGenerating;
    document.getElementById('btnMain').disabled = isBusy;
    ['btnPrintExam', 'btnPrintAns', 'btnPrintSol', 'btnCopy'].forEach(id => {
        document.getElementById(id).disabled = isBusy || !hasData;
    });
}

function saveApiKey() {
    const apiKey = document.getElementById("apiKey").value.trim();
    if (!apiKey) return alert("API 키를 입력해주세요.");
    localStorage.setItem('ap_math_permanent_key', encodeKey(apiKey));
    const btn = document.getElementById("btnSaveKey");
    btn.innerText = "✅ 저장됨"; btn.classList.add("success");
    setTimeout(() => { btn.innerText = "💾 저장"; btn.classList.remove("success"); }, 1500);
}

function resetBank() {
    state.questionBank = [];
    state.isGenerating = false;
    document.getElementById('outputBox').innerText = '// 초기화 완료.';
    document.getElementById('statusMsg').innerText = '대기 중...';
    document.getElementById('statusMsg').style.color = "#1e293b";
    updateUIState();
}

function buildQuestionsRows(questions, type = 'exam') {
    const labels = ['①','②','③','④','⑤'];
    return questions.map((q, i) => {
        const choicesHtml = q.choices.map((c, idx) => `<span>${labels[idx]} ${c}</span>`).join('');
        const solutionHtml = type === 'solution' ? `<div class="sol-box"><b>[해설]</b><br>${q.solution}<br><b>정답: ${q.answer}</b></div>` : '';
        const metaHtml = type === 'solution' ? `<span style="font-size:8pt;color:#94a3b8;">[${q.score}점 / ${q.difficulty}]</span>` : '';
        return `<div class="q-item"><span class="q-num">${i + 1}.</span> ${q.content} ${metaHtml}<div class="choices">${choicesHtml}</div>${solutionHtml}</div>`;
    }).join('');
}

async function generateAIProblem() {
    const apiKey = document.getElementById("apiKey").value.trim();
    const topic = document.getElementById("topicInput").value.trim();
    const counts = {
        하: parseInt(document.getElementById('count_low').value) || 0,
        중: parseInt(document.getElementById('count_mid').value) || 0,
        상: parseInt(document.getElementById('count_high').value) || 0,
        최상: parseInt(document.getElementById('count_top').value) || 0
    };
    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    if (!apiKey || total === 0) return alert("설정을 확인해주세요.");

    state.isGenerating = true;
    updateUIState();
    const statusMsg = document.getElementById("statusMsg");
    statusMsg.style.color = "#f59e0b";

    const promptText = `
    [수학 출제 엔진: ${topic}]
    반드시 정확히 ${total}문항의 JSON 배열만 반환하십시오.
    난이도 분포 엄수: 하(${counts.하}), 중(${counts.중}), 상(${counts.상}), 최상(${counts.최상})
    
    [JSON 형식 - 절대 준수]
    {
      "difficulty": "하|중|상|최상",
      "score": number,
      "content": "문제 내용",
      "choices": ["보기1", "보기2", "보기3", "보기4", "보기5"],
      "answer": "정답",
      "solution": "해설"
    }`;

    let retryCount = 0;
    const maxRetries = 2;

    while (retryCount <= maxRetries) {
        try {
            statusMsg.innerText = retryCount === 0 ? `⏳ 출제 시도 중...` : `🔄 오류 감지: 자동 재시도 중 (${retryCount}/${maxRetries})`;
            
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: promptText }] }], 
                    generationConfig: { responseMimeType: "application/json", temperature: 0.2 } 
                })
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const rawJson = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
            const cleanJson = rawJson.replace(/```json|```/g, '').trim().match(/\[.*\]/s)?.[0];
            const parsed = JSON.parse(cleanJson);

            // [1] 필드 및 데이터 무결성 검증
            parsed.forEach((q, i) => {
                if (!q.content || !q.solution || !q.answer) throw new Error(`${i+1}번 문항 데이터 누락`);
                if (!Array.isArray(q.choices) || q.choices.length !== 5) throw new Error(`${i+1}번 보기 개수 오류`);
                if (!['하','중','상','최상'].includes(q.difficulty)) throw new Error(`${i+1}번 난이도 설정 오류`);
            });

            // [2] 난이도 분포 검증
            const countCheck = { 하: 0, 중: 0, 상: 0, 최상: 0 };
            parsed.forEach(q => countCheck[q.difficulty]++);
            if (countCheck.하 !== counts.하 || countCheck.중 !== counts.중 || countCheck.상 !== counts.상 || countCheck.최상 !== counts.최상) {
                throw new Error(`난이도 분포 불일치 (기대: ${JSON.stringify(counts)}, 결과: ${JSON.stringify(countCheck)})`);
            }

            // [3] 최종 성공 처리
            state.questionBank = parsed;
            document.getElementById("outputBox").innerText = `window.questionBank = ${JSON.stringify(parsed, null, 2)};`;
            statusMsg.style.color = "#10b981";
            statusMsg.innerText = `✅ 검증 완료! ${total}문항 출제 성공.`;
            break; 

        } catch (e) {
            console.warn(`시도 ${retryCount + 1} 실패:`, e.message);
            retryCount++;
            if (retryCount > maxRetries) {
                statusMsg.style.color = "#ef4444";
                statusMsg.innerText = `❌ 최종 실패: ${e.message}`;
            }
        }
    }
    state.isGenerating = false;
    updateUIState();
}

function printDoc(type) {
    if (state.questionBank.length === 0) return;
    const title = document.getElementById("examTitle").value;
    const rows = type === 'answer' ? '' : buildQuestionsRows(state.questionBank, type);
    let answerTable = '';
    if (type === 'answer') {
        answerTable = '<table class="ans-table"><tr>' + state.questionBank.map((q, i) => 
            `<td><b>${i + 1}</b><br>${q.answer}</td>${(i + 1) % 5 === 0 ? '</tr><tr>' : ''}`).join('') + '</tr></table>';
    }
    const htmlContent = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=block" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><\/script><script>window.MathJax={tex:{inlineMath:[['$','$']],macros:{tf:["\\\\tfrac{#1}{#2}",2]}},startup:{pageReady:()=>MathJax.startup.defaultPageReady().then(()=>document.fonts.ready).then(()=>window.print())}}<\/script><style>@page{size:A4;margin:15mm}body{font-family:'Nanum Myeongjo',serif;font-size:10.5pt;margin:0}.header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:20px}.container{column-count:${type === 'answer' ? 1 : 2};column-gap:30px;column-rule:0.5pt solid #eee}.q-item{break-inside:avoid;margin-bottom:5rem}.choices{display:grid;grid-template-columns:1fr;margin-top:10px;row-gap:5px}.ans-table{width:100%;border-collapse:collapse}.ans-table td{border:1px solid #000;padding:12px;text-align:center}.sol-box{background:#f8fafc;padding:12px;border-left:4px solid #3b82f6;margin-top:10px;font-size:9.5pt}</style></head><body><div class="header"><h1>${title}</h1></div><div class="container">${type === 'answer' ? answerTable : rows}</div></body></html>`;
    const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
    window.open(URL.createObjectURL(blob), '_blank');
}

function copyFullHtml() {
    if (state.questionBank.length === 0) return;
    const title = document.getElementById("examTitle").value;
    const questionsRows = buildQuestionsRows(state.questionBank, 'exam');
    const fullHtml = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>${title}</title><link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=block" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><\/script><script>window.MathJax={tex:{inlineMath:[['$','$']],macros:{tf:["\\\\tfrac{#1}{#2}",2]}},startup:{pageReady:()=>MathJax.startup.defaultPageReady().then(()=>document.fonts.ready).then(()=>console.log("Ready"))}}<\/script><style>@page{size:A4;margin:15mm}body{font-family:'Nanum Myeongjo',serif;font-size:10.5pt;margin:0;padding:20px}.header{border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:20px}.container{column-count:2;column-gap:30px;column-rule:0.5pt solid #eee}.q-item{break-inside:avoid;margin-bottom:5.5rem}.choices{display:grid;grid-template-columns:1fr;margin-top:10px;row-gap:5px}.no-print{text-align:center;margin-bottom:20px}@media print{.no-print{display:none}}</style></head><body><div class="no-print"><button onclick="window.print()" style="padding:10px 20px;font-weight:800;cursor:pointer">🖨️ 인쇄하기</button></div><div class="header"><h1>${title}</h1></div><div class="container">${questionsRows}</div></body></html>`;
    navigator.clipboard.writeText(fullHtml).then(() => alert("HTML 복사 완료")).catch(err => alert("복사 실패: " + err.message));
}
</script>
</body>
</html>
