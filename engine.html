<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JS아카이브 엔진</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']], packages: {'[+]': ['ams', 'boldsymbol']} },
            options: { enableMenu: false },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        @page { size: A4; margin: 0; }
        body { margin: 0; font-family: 'Nanum Myeongjo', serif; font-size: 9.5pt; background: #f1f5f9; padding-top: 54px; }
        #mode-ctrl { position: fixed; top: 0; left: 0; width: 100%; height: 56px; background: #0f172a; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; z-index: 1000; box-sizing: border-box; }
        #ctrl-title { color: white; font-weight: 800; font-size: 14px; }
        .mode-tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.07); padding: 4px; border-radius: 10px; }
        .mode-tab { padding: 6px 16px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: rgba(255,255,255,0.5); }
        .mode-tab.active { background: white; color: #0f172a; }
        #print-area { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px 0; }
        .page { width: 210mm; height: 297mm; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); padding: 15mm; box-sizing: border-box; display: flex; flex-direction: column; position: relative; }
        .page-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 12px; font-weight: bold; font-size: 10pt; }
        .grid-container { flex: 1; display: grid; grid-template-columns: 1fr 1fr; position: relative; gap: 0; }
        .grid-container::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: #000; }
        .grid-col { display: flex; flex-direction: column; padding: 0 12px; }
        .q-box { flex: 1; padding: 10px 0; border-bottom: 0.5px solid #eee; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
        .q-num { font-weight: bold; font-size: 11pt; margin-bottom: 6px; }
        .answer-box { flex: 1; border: 1px dashed #ccc; margin-top: 10px; background: #fafafa; }
        
        /* 정답표 스타일 */
        .ans-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; }
        .ans-unit { border: 1px solid #000; display: flex; height: 32px; align-items: center; }
        .ans-n { width: 30px; background: #eee; text-align: center; font-weight: bold; font-size: 9pt; height: 100%; display: flex; align-items: center; justify-content: center; border-right: 1px solid #000; }
        .ans-v { flex: 1; text-align: center; font-size: 9.5pt; font-weight: bold; }

        @media print { #mode-ctrl { display: none; } body { padding-top: 0; background: white; } .page { box-shadow: none; page-break-after: always; } }
    </style>
</head>
<body>
    <div id="mode-ctrl">
        <span id="ctrl-title">JS아카이브</span>
        <div class="mode-tabs" id="tab-group">
            <button class="mode-tab" id="btn-exam" onclick="switchMode('exam')">시험지</button>
            <button class="mode-tab" id="btn-sol" onclick="switchMode('sol')">해설지</button>
            <button class="mode-tab" id="btn-ans" onclick="switchMode('ans')">정답표</button>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="mode-tab" style="color:white;" onclick="shuffleData()">🔀 셔플</button>
            <button onclick="window.print()" style="padding:8px 16px; border-radius:6px; border:none; background:#378ADD; color:white; font-weight:bold; cursor:pointer;">인쇄</button>
        </div>
    </div>
    <div id="print-area"></div>

<script>
const AppState = { data: [], mode: 'exam', qpp: 4, title: '' };

function wrapLatex(text) {
    if (!text) return "";
    let s = String(text);
    
    // [Item 2] LaTeX 구분자 호환성 변환
    s = s.replace(/\\\(([^)]+)\\\)/g, '$$$1$$');
    s = s.replace(/\\\[([^\]]+)\\\]/g, '$$$$$1$$$$');

    s = s.replace(/(?<!\\)because/gi, '\\because');
    const htmlTags = [];
    s = s.replace(/<svg[\s\S]*?<\/svg>|<img[^>]*>/gi, m => {
        const token = `__HTMLTAG_${htmlTags.length}__`;
        htmlTags.push(m);
        return token;
    });
    return s.replace(/__HTMLTAG_(\d+)__/g, (_, i) => htmlTags[i]);
}

function parseExamTitle(raw) {
    if (!raw) return { year: '', school: '', grade: '', semester: '', examType: '', subject: '' };
    const p = raw.split('_');
    return { year: p[0] ? '20' + p[0] + '년' : '', school: p[1] || '', semester: p[2] || '', examType: p[3] || '', grade: p[4] || '', subject: p[5] || '' };
}

async function init() {
    const p = new URLSearchParams(window.location.search);
    AppState.mode = p.get('mode') || 'exam';
    AppState.qpp = parseInt(p.get('qpp')) || 4;
    const dataUrl = p.get('data');
    if (!dataUrl) return;

    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('btn-' + AppState.mode).classList.add('active');

    const s = document.createElement('script');
    s.src = dataUrl + '?v=' + Date.now();
    s.onload = () => {
        AppState.data = window.questionBank.questions || window.questionBank.problems;
        AppState.title = window.examTitle || p.get('title');
        render();
    };
    document.body.appendChild(s);
}

function switchMode(mode) {
    const url = new URL(window.location.href);
    url.searchParams.set('mode', mode);
    window.location.href = url.toString();
}

function shuffleData() {
    for (let i = AppState.data.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [AppState.data[i], AppState.data[j]] = [AppState.data[j], AppState.data[i]];
    }
    render();
}

function makePage(area, type, pNum) {
    const page = document.createElement('div');
    page.className = 'page';
    const header = document.createElement('div');
    header.className = 'page-header';
    
    // [Item 2] 모드별 헤더 보더 색상 분기
    if (type === 'exam') header.style.borderBottomColor = '#1d4ed8'; // 파랑
    if (type === 'sol')  header.style.borderBottomColor = '#dc2626'; // 빨강
    if (type === 'ans')  header.style.borderBottomColor = '#059669'; // 초록

    const t = parseExamTitle(AppState.title);
    const left = [t.year, t.school, t.grade, t.semester, t.examType, t.subject].filter(Boolean).join(' | ') || AppState.title;
    let right = '';
    if (type === 'sol') right = '[ 정답 및 해설 ]';
    else if (type === 'ans') right = '[ 정답표 ]';
    else right = '이름: ____________  점수:        / 100';

    header.innerHTML = `<div>${left}</div><div>${right}</div><div style="width:30px; text-align:right;">${pNum}</div>`;
    page.appendChild(header);
    area.appendChild(page);
    return page;
}

function renderExam(area, data) {
    let pNum = 1;
    for (let i = 0; i < data.length; i += AppState.qpp) {
        const page = makePage(area, 'exam', pNum++);
        const grid = document.createElement('div');
        grid.className = 'grid-container';
        const left = document.createElement('div'); left.className = 'grid-col';
        const right = document.createElement('div'); right.className = 'grid-col';
        
        data.slice(i, i + AppState.qpp).forEach((q, idx) => {
            const box = document.createElement('div');
            box.className = 'q-box';
            box.innerHTML = `<div class="q-num">${i + idx + 1}.</div><div>${wrapLatex(q.content)}</div><div class="answer-box"></div>`;
            (idx < AppState.qpp / 2 ? left : right).appendChild(box);
        });
        grid.appendChild(left); grid.appendChild(right);
        page.appendChild(grid);
    }
}

function renderSol(area, data) {
    let pNum = 1;
    for (let i = 0; i < data.length; i += AppState.qpp) {
        const page = makePage(area, 'sol', pNum++);
        const grid = document.createElement('div');
        grid.className = 'grid-container';
        const left = document.createElement('div'); left.className = 'grid-col';
        const right = document.createElement('div'); right.className = 'grid-col';
        
        data.slice(i, i + AppState.qpp).forEach((q, idx) => {
            const box = document.createElement('div');
            box.className = 'q-box';
            box.innerHTML = `
                <div class="q-num">${i + idx + 1}.</div>
                <div style="margin-bottom:10px; color:#666;">${wrapLatex(q.content)}</div>
                <div style="background:#fdfdfd; padding:10px; border:1px solid #eee;">
                    <div style="font-weight:bold; color:red; margin-bottom:5px;">[정답] ${wrapLatex(q.answer)}</div>
                    <div style="font-size:9pt; line-height:1.6;">${wrapLatex(q.explanation || q.sol || '해설이 없습니다.')}</div>
                </div>`;
            (idx < AppState.qpp / 2 ? left : right).appendChild(box);
        });
        grid.appendChild(left); grid.appendChild(right);
        page.appendChild(grid);
    }
}

function renderAns(area, data) {
    const page = makePage(area, 'ans', 1);
    const title = document.createElement('div');
    title.style.cssText = 'font-size:16pt; font-weight:800; text-align:center; margin: 30px 0;';
    title.innerText = '빠른 정답 체크';
    page.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'ans-grid';
    data.forEach((q, i) => {
        const unit = document.createElement('div');
        unit.className = 'ans-unit';
        // [Item 2] 정답 데이터 wrapLatex 통과시켜 수식 렌더링 보장
        unit.innerHTML = `<div class="ans-n">${i+1}</div><div class="ans-v">${wrapLatex(q.answer ?? '–')}</div>`;
        grid.appendChild(unit);
    });
    page.appendChild(grid);
}

function render() {
    const area = document.getElementById('print-area');
    area.innerHTML = '';
    if (AppState.mode === 'ans') renderAns(area, AppState.data);
    else if (AppState.mode === 'sol') renderSol(area, AppState.data);
    else renderExam(area, AppState.data);
    if (window.MathJax) MathJax.typesetPromise();
}

window.onload = init;
</script>
</body>
</html>
