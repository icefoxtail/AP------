<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AP 수학학원 시험지 엔진 v10.8 - 긴급 롤백 및 안정화</title>
    <script>
        window.MathJax = {
            tex: { 
                inlineMath: [['$', '$']], 
                macros: { tf: ['\\dfrac{#1}{#2}', 2] } 
            },
            options: { 
                enableMenu: false 
            },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        
        @page { size: A4; margin: 0; }
        @media print { 
            .no-print { display: none !important; } 
            body { padding-top: 0 !important; background: #fff !important; } 
            .page { margin: 0 !important; border: none !important; box-shadow: none !important; width: 210mm !important; height: 297mm !important; }
            body.sol-mode .page { height: auto !important; min-height: 297mm !important; }
        }

        body { margin: 0; font-family: 'Nanum Myeongjo', serif; font-size: 9.5pt; background: #f1f5f9; padding-top: 50px; }
        #mode-ctrl { position: fixed; top: 0; left: 0; width: 100%; height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; background: white; z-index: 1000; border-bottom: 1px solid #e2e8f0; }
        
        .page { width: 210mm; height: 297mm; padding: 12mm 15mm; margin: 0 auto 10mm auto; background: #fff; page-break-after: always; display: flex; flex-direction: column; box-sizing: border-box; position: relative; }
        
        .content-container { flex: 1; width: 100%; display: grid; position: relative; box-sizing: border-box; overflow: hidden; }

        /* 하단 박스 여백 채우기 유지 (stretch) */
        body.test-mode .content-container { grid-template-columns: 1fr 1fr; align-items: stretch; }
        body.test-mode .content-container::after {
            content: ""; position: absolute; left: 50%; top: 0; bottom: 0;
            width: 1px; background: #000; z-index: 1; pointer-events: none;
        }

        body.sol-mode .page { height: auto; min-height: 297mm; }
        body.sol-mode .content-container { 
            display: block; column-count: 2; column-gap: 10mm; 
            column-rule: 0.5px solid #eee; column-fill: balance; 
            height: auto; overflow: visible;
        }

        .item { 
            padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; 
            break-inside: avoid; page-break-inside: avoid; 
            border-bottom: 0.5px solid #eee; height: 100%; 
            overflow: hidden; word-break: keep-all; overflow-wrap: break-word;
        }
        body.sol-mode .item { height: auto; }

        .test-area { flex: 1; display: flex; flex-direction: column; height: 100%; }
        .sol-area { display: none; }
        
        body.sol-mode .test-area { display: none; }
        body.sol-mode .sol-area { display: block; width: 100%; padding-bottom: 8px; }

        .sol-title { font-weight: 800; border-bottom: 2.5px solid #1e293b; padding-bottom: 2px; margin-bottom: 0; display: block; font-size: 10.5pt; width: 100%; }
        .sol-ans-text { color: #2563eb; margin-left: 10px; font-weight: 900; }
        
        /* 해설 본문 왼쪽 정렬 유지 */
        .sol-content { white-space: pre-wrap; line-height: 1.6; font-size: 9.5pt; margin-top: 5px; padding: 0; text-align: left; width: 100%; }
        
        .img-container svg, .img-container img { width: 100% !important; max-width: 100%; height: auto !important; display: block; margin: 5px auto; }
        .clearfix::after { content: ""; clear: both; display: table; }

        mjx-container { max-width: 100% !important; overflow-x: auto !important; margin: 5px 0 !important; text-align: left !important; }
    </style>
</head>
<body class="test-mode">
    <div id="mode-ctrl" class="no-print">
        <button onclick="location.href='index.html'">← 목록</button>
        <div>
            <button onclick="setMode('test-mode')">시험지</button>
            <button onclick="setMode('sol-mode')">해설지</button>
            <button onclick="setMode('ans-mode')">정답표</button>
        </div>
        <button onclick="window.print()" style="background:#1e293b; color:white; border:none; padding: 5px 15px; border-radius: 4px; cursor: pointer;">🖨️ 인쇄 / PDF</button>
    </div>
    <div id="print-area"></div>
    <div id="item-pool" style="display:none;"></div>

<script>
const AppState = { title: "", qpp: 4 };
const CIRCLED = ['①','②','③','④','⑤'];

function normalizeQuestion(q) {
    if (q.solution) {
        // [긴급 복구] 렌더링 엔진을 터뜨리는 정규식 전면 제거.
        // 수식 내부($)든 외부든 에러 없이 자연스럽게 이어지도록 순수 한글 텍스트로만 치환.
        q.solution = q.solution
            .replace(/\[Logical Anchor\]/g, '**[키포인트]**')
            .replace(/implies/gi, ' 이므로 ')
            .replace(/therefore/gi, ' 따라서 ')
            .replace(/because/gi, ' 왜냐하면 ')
            .replace(/here\s*fore/gi, ' 따라서 ')
            .replace(/ext(\d+)/gi, ' ($1)단계: ')
            .replace(/next/gi, ' 다음으로 ')
            .replace(/i\)/g, '1)')
            .replace(/ii\)/g, '2)')
            .replace(/iii\)/g, '3)')
            .replace(/iv\)/g, '4)')
            .replace(/case\s+(\d+)\)/gi, '경우 $1)')
            .trim();
    }

    if (['중상', '최상'].includes(q.level)) {
        if (!q.tags) q.tags = [];
        q.tags.push(q.level);
        q.level = '상';
    }

    if (q.content) {
        q.content = q.content.replace(/\\multicolumn(\d+)([rlc])/g, '\\multicolumn{$1}{$2}');
        q.content = q.content.replace(/\\cline(\d+)-(\d+)/g, '\\cline{$1-$2}');
    }

    if (Array.isArray(q.choices) && q.choices.length > 0 && typeof q.choices[0] === 'object') {
        q.choices = q.choices.map(c => c.text || c.content || "");
    }
    if (Array.isArray(q.answer)) q.answer = q.answer.join(', ');
    if (!q.solution && Array.isArray(q.solution_steps)) {
        q.solution = q.solution_steps.map((s, i) => `${i+1}. ${s}`).join('\n');
    }

    if (q.choices && q.choices.length > 0 && q.choices[0].trim() === "") {
        q.type = 'short';
    }

    if (!q.type) {
        if (q.choices && q.choices.length >= 5) q.type = 'single';
        else if (q.num?.toString().includes('서술') || q.content?.includes('서술')) q.type = 'descriptive';
        else q.type = 'short';
    }
    return q;
}

function setMode(m) { document.body.className = m; initRender(); }

(function load() {
    const params = new URLSearchParams(window.location.search);
    AppState.qpp = parseInt(params.get('qpp')) || 4;
    AppState.title = decodeURIComponent(params.get('title') || 'AP수학');
    document.title = AppState.title;

    const file = params.get('data');
    if (!file) return;

    if (file === 'mixed') {
        const raw = sessionStorage.getItem('mixedQuestions');
        if (raw) { window.questionBank = JSON.parse(raw); initRender(); }
        return;
    }

    const s = document.createElement('script');
    s.src = file + '?v=' + Date.now();
    s.onload = initRender;
    document.body.appendChild(s);
})();

async function initRender() {
    renderItems();
    paginate(); 
    if (window.MathJax?.typesetPromise) {
        await MathJax.typesetPromise();
    }
}

function renderItems() {
    const pool = document.getElementById('item-pool');
    let bank = Array.isArray(window.questionBank) ? window.questionBank 
             : (window.questionBank?.questions || window.questionBank?.problems || []);
    
    bank = bank.map(normalizeQuestion);

    pool.innerHTML = bank.map((q, i) => {
        const isMultiple = q.type === 'single';
        const hasSvg = (q.svg && q.svg.length > 10) || (q.content && q.content.includes('<svg'));

        return `
        <div class="item clearfix">
            <div class="test-area">
                <div style="font-size:7.5pt; color:#64748b; margin-bottom:3px;">[난이도: ${q.level || '중'}] ${q.category || ''}</div>
                <div style="flex:none;">
                    <b style="font-size:10.5pt;">${q.num || i+1}.</b> ${q.content}
                    ${isMultiple ? `<div style="margin-top:12px; line-height:1.6;">${q.choices.map((c, ci) => `<div style="margin-bottom:3px;">${CIRCLED[ci]} ${c}</div>`).join('')}</div>` : ''}
                </div>
                ${hasSvg ? `<div class="img-container">${q.svg || ''}</div>` : ''}
                
                ${(!isMultiple && q.type !== 'descriptive' && !hasSvg) ? `<div style="margin-top:10px; border:1px solid #e2e8f0; flex:1; min-height:40mm; background:#fafafa; width:100%;"></div>` : ''}
            </div>

            <div class="sol-area clearfix">
                <div class="sol-title">[문항 ${q.num || i+1}] <span class="sol-ans-text">정답: ${q.answer}</span></div>
                <div class="sol-content">
                    ${q.solution || ''}
                    ${q.wrong_reason && typeof q.wrong_reason === 'object'
                        ? Object.entries(q.wrong_reason).map(([k,v]) => `<div style="color:#e11d48; font-size:8.5pt; margin-top:4px;">• ${k} 오답: ${v}</div>`).join('')
                        : (q.wrong_reason ? `<div style="margin-top:8px; font-size:8.5pt; color:#e11d48; font-weight:bold;">⚠️ 함정 분석: ${q.wrong_reason}</div>` : '')}
                </div>
            </div>
        </div>`;
    }).join('');
}

function paginate() {
    const printArea = document.getElementById('print-area');
    printArea.innerHTML = '';
    const items = Array.from(document.getElementById('item-pool').querySelectorAll('.item'));
    const mode = document.body.className;

    const addPage = (suffix = "") => {
        const page = document.createElement('div'); page.className = 'page';
        page.innerHTML = `
            <div style="border-bottom:2px solid #1e293b; padding-bottom:5px; margin-bottom:12px; font-weight:bold; display:flex; justify-content:space-between; font-size:11pt;">
                <span>${AppState.title} ${suffix}</span><span>- ${printArea.children.length + 1} -</span>
            </div>
            <div class="content-container"></div>`;
        printArea.appendChild(page);
        return page;
    };

    if (mode === 'ans-mode') {
        const page = addPage("[정답표]");
        let bank = (Array.isArray(window.questionBank) ? window.questionBank : (window.questionBank?.questions || window.questionBank?.problems || [])).map(normalizeQuestion);
        page.querySelector('.content-container').innerHTML = `
            <div style="font-size:11pt; line-height:2.2; column-count:2; column-gap:15mm;">
                ${bank.map((q, i) => `<b>${q.num || i+1}.</b> ${q.answer}`).join('<br>')}
            </div>`;
        return;
    }

    const isSolMode = (mode === 'sol-mode');
    const itemsPerPage = isSolMode ? 6 : AppState.qpp;
    const rowCount = (AppState.qpp === 6) ? 3 : 2;

    let currentPage = addPage(isSolMode ? "[해설지]" : "");
    if (!isSolMode) {
        currentPage.querySelector('.content-container').style.gridTemplateRows = `repeat(${rowCount}, minmax(0, 1fr))`;
    }

    items.forEach((item, idx) => {
        if (idx > 0 && idx % itemsPerPage === 0) {
            currentPage = addPage(isSolMode ? "[해설지]" : "");
            if (!isSolMode) currentPage.querySelector('.content-container').style.gridTemplateRows = `repeat(${rowCount}, minmax(0, 1fr))`;
        }
        currentPage.querySelector('.content-container').appendChild(item.cloneNode(true));
    });
}
</script>
</body>
</html>
