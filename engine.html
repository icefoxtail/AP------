<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JS아카이브 엔진</title>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']],
                packages: {'[+]': ['ams', 'boldsymbol']}
            },
            options: { enableMenu: false },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        @page { size: A4; margin: 0; }

        body {
            margin: 0;
            font-family: 'Nanum Myeongjo', serif;
            font-size: 9.5pt;
            background: #f1f5f9;
            padding-top: 54px;
            color: #000;
        }

        #mode-ctrl {
            position: fixed; top: 0; left: 0; width: 100%; height: 56px;
            background: #0f172a; display: flex; justify-content: space-between;
            align-items: center; padding: 0 24px; z-index: 1000;
            box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.08);
            gap: 16px;
        }
        #ctrl-title {
            font-size: 14px; font-weight: 800; color: white;
            white-space: nowrap; letter-spacing: -0.3px;
            flex-shrink: 0;
        }
        .mode-tabs {
            display: flex; gap: 4px;
            background: rgba(255,255,255,0.07);
            padding: 4px; border-radius: 10px;
            flex-shrink: 0;
        }
        .mode-tab {
            padding: 6px 16px; border-radius: 7px;
            font-size: 12px; font-weight: 700;
            cursor: pointer; border: none;
            background: transparent; color: rgba(255,255,255,0.5);
            transition: 0.18s; font-family: inherit;
            letter-spacing: -0.2px;
        }
        .mode-tab:hover { color: white; background: rgba(255,255,255,0.1); }
        .mode-tab.active {
            background: white; color: #0f172a;
            box-shadow: 0 1px 4px rgba(0,0,0,0.25);
        }
        .ctrl-right { display: flex; gap: 8px; flex-shrink: 0; }
        .print-btn {
            padding: 7px 16px; border: none; border-radius: 7px;
            font-family: inherit; font-weight: 700; font-size: 12px;
            cursor: pointer; transition: 0.15s;
        }
        .print-btn.primary { background: #378ADD; color: white; }
        .print-btn.primary:hover { background: #2e73c4; }
        .print-btn.ghost { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
        .print-btn.ghost:hover { background: rgba(255,255,255,0.18); color: white; }

        #print-area {
            display: none; flex-direction: column;
            align-items: center; gap: 20px; padding: 20px 0;
        }

        .page {
            width: 210mm; height: 297mm;
            background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 15mm; box-sizing: border-box;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        @media print {
            body { padding-top: 0; background: white; }
            #mode-ctrl { display: none; }
            #print-area { display: flex !important; gap: 0; padding: 0; }
            .page { box-shadow: none; page-break-after: always; }
            #pdf-container { display: block !important; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
            body:not(.mode-pdf) #pdf-container { display: none !important; }
        }

        .page-header {
            display: flex; justify-content: space-between;
            border-bottom: 2px solid #000;
            padding-bottom: 5px; margin-bottom: 12px;
            font-weight: bold; flex-shrink: 0;
        }

        #pdf-container { display: none; width: 100%; height: calc(100vh - 54px); }
        #pdf-viewer { width: 100%; height: 100%; border: none; }

        .grid-container {
            flex: 1; display: grid;
            grid-template-columns: 1fr 1fr;
            position: relative; overflow: hidden;
        }
        .grid-container::after {
            content: ''; position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 1px; background: #000;
        }
        .grid-col {
            display: flex; flex-direction: column;
            padding: 0 12px; overflow: hidden;
            min-height: 0;
        }

        .q-box {
            flex: 1 1 0;
            min-height: 0;
            padding: 10px 0;
            border-bottom: 0.5px solid #ccc;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            word-break: keep-all;
            overflow-wrap: anywhere;
            line-height: 1.5;
            font-size: 9.5pt;
        }
        .q-box:last-child { border-bottom: none; }

        .q-num {
            font-weight: bold;
            font-size: 11pt;
            margin-bottom: 4px;
            flex-shrink: 0;
        }

        .q-content {
            min-height: 0;
        }
        
        .box {
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 8px 10px;
            margin: 6px 0;
            background: #f9f9f9;
            font-size: 9pt;
            line-height: 1.5;
        }

        .answer-box {
            flex: 1;
            border: 1px dashed #bbb;
            margin-top: 8px; background: #fafafa;
        }
        .choices {
            margin-top: 6px;
            line-height: 1.8;
        }

        .q-box.fit-tight {
            font-size: 9.1pt;
            line-height: 1.42;
        }

        .q-box.fit-tight .q-num {
            font-size: 10.5pt;
            margin-bottom: 3px;
        }

        .q-box.fit-tight .choices {
            margin-top: 4px;
            line-height: 1.62;
        }

        .q-box.fit-tighter {
            font-size: 8.6pt;
            line-height: 1.34;
        }

        .q-box.fit-tighter .q-num {
            font-size: 10pt;
            margin-bottom: 2px;
        }

        .q-box.fit-tighter .choices {
            margin-top: 3px;
            line-height: 1.46;
        }

        .q-box.fit-micro {
            font-size: 8.1pt;
            line-height: 1.26;
        }

        .q-box.fit-micro .q-num {
            font-size: 9.5pt;
            margin-bottom: 2px;
        }

        .q-box.fit-micro .choices {
            margin-top: 2px;
            line-height: 1.32;
        }

        .sol-box {
            padding: 8px 0;
            border-bottom: 0.5px solid #eee;
            width: 100%;
            margin-bottom: 45px;
            break-inside: avoid;
            page-break-inside: avoid;
        }
        .sol-box:last-child { border-bottom: none; margin-bottom: 0; }
        .sol-step {
            padding-left: 8px;
            border-left: 2px solid #e2e8f0;
            margin-bottom: 4px; font-size: 9pt;
        }

        .ans-grid {
            display: flex;
            flex-direction: column;
            gap: 2px; margin-top: 5px;
            max-height: 70%;
        }
        .ans-cell {
            padding: 4px 8px;
            display: flex; align-items: flex-start; gap: 12px;
            border-bottom: 0.1px solid #f0f0f0;
        }
    </style>
</head>
<body>

    <div id="mode-ctrl">
        <span id="ctrl-title">JS아카이브</span>
        <div class="mode-tabs" id="modeTabs">
            <button class="mode-tab" data-mode="exam" onclick="switchMode('exam')">시험지</button>
            <button class="mode-tab" data-mode="sol"  onclick="switchMode('sol')">해설지</button>
            <button class="mode-tab" data-mode="ans"  onclick="switchMode('ans')">정답표</button>
        </div>
        <div class="ctrl-right">
            <button class="print-btn primary" onclick="window.print()">🖨 인쇄</button>
            <button class="print-btn ghost"   onclick="history.back()">← 목록</button>
        </div>
    </div>

    <div id="pdf-container">
        <iframe id="pdf-viewer" src=""></iframe>
    </div>

    <div id="print-area"></div>
    <div id="staging" style="position:absolute;top:-9999px;left:0;visibility:hidden;width:85mm;"></div>

<script>
const AppState = { title: 'JS아카이브', data: [], mode: 'exam', qpp: 4 };
let pageCount = 0;

async function loadData(dataUrl) {
    if (dataUrl === 'mixed') {
        const raw = sessionStorage.getItem('mixedQuestions');
        return raw ? JSON.parse(raw) : [];
    }
    return new Promise(res => {
        const oldScript = document.getElementById('data-script');
        if (oldScript) oldScript.remove();
        
        delete window.questionBank;
        const s = document.createElement('script');
        s.id = 'data-script';
        s.src = dataUrl + '?v=' + Date.now();
        s.onload = () => {
            const qb = window.questionBank;
            const data = Array.isArray(qb) ? qb : (qb?.questions || qb?.problems || []);
            res(data);
        };
        s.onerror = () => res([]);
        document.body.appendChild(s);
    });
}

async function init() {
    const p = new URLSearchParams(window.location.search);
    AppState.mode  = p.get('mode')  || 'exam';
    AppState.title = (p.get('title') || 'JS아카이브 기출').replace(/\s/g, ''); 
    
    const rawQpp = parseInt(p.get('qpp'));
    AppState.qpp = isNaN(rawQpp) ? 4 : Math.max(2, Math.min(8, rawQpp));
    AppState.data_url = p.get('data') || '';

    const file = p.get('file');
    const dataUrl = AppState.data_url;

    document.getElementById('ctrl-title').innerText = AppState.title;

    if (AppState.mode === 'pdf' && file) {
        document.body.classList.add('mode-pdf');
        document.getElementById('modeTabs').style.display = 'none';
        document.getElementById('pdf-container').style.display = 'block';
        document.getElementById('pdf-viewer').src = file;
        return;
    }

    updateTabs(AppState.mode);
    document.getElementById('print-area').style.display = 'flex';

    if (dataUrl) {
        AppState.data = await loadData(dataUrl);
        if (AppState.data.length > 0) await renderEngine();
    }
}

function updateTabs(mode) {
    document.querySelectorAll('.mode-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
    });
}

function switchMode(mode) {
    if (mode === AppState.mode) return;
    const qpp = (mode === 'exam') ? AppState.qpp : 4;
    const url = new URL(window.location.href);
    url.searchParams.set('mode', mode);
    url.searchParams.set('qpp', qpp);
    window.location.href = url.toString();
}

async function renderEngine() {
    const area = document.getElementById('print-area');
    area.innerHTML = '';
    pageCount = 0;

    if      (AppState.mode === 'ans') renderAnsGrid(area, AppState.data);
    else if (AppState.mode === 'sol') await renderSol(area, AppState.data);
    else                               await renderExam(area, AppState.data);
}

async function renderExam(area, bank) {
    const perCol = Math.ceil(AppState.qpp / 2);
    const staging = document.getElementById('staging');
    staging.style.width = '85mm';
    staging.innerHTML = '';

    const boxes = bank.map((q, i) => {
        const el = document.createElement('div');
        el.className = 'q-box';
        el.innerHTML = buildExamBox(q, i);
        staging.appendChild(el);
        return el;
    });

    if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([staging]);
    await raf();

    for (let start = 0; start < boxes.length; start += AppState.qpp) {
        const chunk = boxes.slice(start, start + AppState.qpp);
        const page = makePage(area, 'exam');

        const leftItems = chunk.slice(0, perCol).map(el => el.cloneNode(true));
        const rightItems = chunk.slice(perCol).map(el => el.cloneNode(true));

        leftItems.forEach(el => page.cols[0].appendChild(el));
        rightItems.forEach(el => page.cols[1].appendChild(el));

        if (window.MathJax?.typesetPromise) {
            await MathJax.typesetPromise([page.cols[0], page.cols[1]]);
        }
        await raf();

        fitExamColumn(page.cols[0]);
        fitExamColumn(page.cols[1]);

        if (window.MathJax?.typesetPromise) {
            await MathJax.typesetPromise([page.cols[0], page.cols[1]]);
        }
        await raf();
    }
}

/* 데이터가 객체일 경우 텍스트를 안전하게 추출하는 헬퍼 */
function extractChoice(c) {
    if (c === null || c === undefined) return '';
    if (typeof c === 'object') {
        return c.text || c.content || c.value || c.answer || Object.values(c)[0] || '';
    }
    return String(c);
}

function buildExamBox(q, i) {
    const circled = ['①','②','③','④','⑤'];
    const isMultipleChoice = Array.isArray(q.choices) &&
                             q.choices.length > 0 &&
                             q.choices[0] !== "주관식" &&
                             q.choices.some(c => extractChoice(c).trim() !== "");

    const choicesHTML = isMultipleChoice
        ? `<div class="choices">${q.choices.map((c, ci) =>
              `<div>${circled[ci] || (ci + 1) + ')'} ${wrapLatex(extractChoice(c))}</div>`).join('')}</div>`
        : `<div class="answer-box"></div>`;

    return `
        <div class="q-num">${i + 1}.</div>
        <div class="q-content">${wrapLatex(q.content || q.question || '')}</div>
        ${choicesHTML}
    `;
}

function fitExamColumn(col) {
    const boxes = [...col.querySelectorAll('.q-box')];
    boxes.forEach(box => fitQuestionBox(box));
}

function fitQuestionBox(box) {
    const fitClasses = ['', 'fit-tight', 'fit-tighter', 'fit-micro'];

    for (const cls of fitClasses) {
        box.classList.remove('fit-tight', 'fit-tighter', 'fit-micro');
        if (cls) box.classList.add(cls);

        if (box.scrollHeight <= box.clientHeight + 1) {
            return;
        }
    }

    const choices = box.querySelector('.choices');
    if (choices) {
        choices.style.lineHeight = '1.2';
        choices.style.marginTop = '1px';
    }

    const qnum = box.querySelector('.q-num');
    if (qnum) {
        qnum.style.marginBottom = '1px';
    }
}

async function renderSol(area, bank) {
    const staging = document.getElementById('staging');
    staging.style.width = '85mm';
    staging.innerHTML = '';

    const boxes = bank.map((q, i) => {
        const el = document.createElement('div');
        el.className = 'sol-box';
        el.innerHTML = buildSolBox(q, i);
        staging.appendChild(el);
        return el;
    });

    if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([staging]);
    await raf();

    let p = makePage(area, 'sol');
    let colIdx = 0;

    for (const srcEl of boxes) {
        let placed = false;

        while (!placed) {
            const targetCol = p.cols[colIdx];
            const clone = srcEl.cloneNode(true);
            targetCol.appendChild(clone);

            if (window.MathJax?.typesetPromise) {
                await MathJax.typesetPromise([targetCol]);
            }
            await raf();

            const overflowed = targetCol.scrollHeight > targetCol.clientHeight + 1;

            if (!overflowed) {
                placed = true;
                continue;
            }

            clone.remove();

            if (colIdx === 0) {
                colIdx = 1;
            } else {
                p = makePage(area, 'sol');
                colIdx = 0;
            }
        }
    }
}

function buildSolBox(q, i) {
    let solHTML;
    if (q.solution_steps?.length) {
        solHTML = q.solution_steps.map((s, si) =>
            `<div class="sol-step"><b>[${si+1}단계]</b> ${wrapLatex(stripCite(s))}</div>`
        ).join('');
    } else if (q.solution) {
        const lines = stripCite(q.solution).split(/\\\\/);
        solHTML = lines.map(line =>
            `<div class="sol-step">${wrapLatex(line.trim())}</div>`
        ).join('');
    } else {
        solHTML = `<span style="color:#94a3b8;font-size:8pt;">해설 없음</span>`;
    }
    return `
        <div class="q-num" style="margin-bottom:4px;">${i+1}.
            <span style="font-size:9pt;font-weight:normal;">
                ${wrapLatex(q.content || q.question || '')}
            </span>
        </div>
        <div style="font-size:9pt;">${solHTML}</div>`;
}

function renderAnsGrid(area, bank) {
    const p = makePage(area, 'ans');
    const grid = document.createElement('div');
    grid.className = 'ans-grid';
    bank.forEach((q, i) => {
        const cell = document.createElement('div');
        cell.className = 'ans-cell';
        const rawAns = String(q.answer ?? '–');
        const displayAns = (rawAns.includes('sqrt') || rawAns.includes('/') || rawAns.includes('^')) 
                           ? wrapLatex(rawAns) : rawAns;

        cell.innerHTML = `<b style="font-size:10.5pt;min-width:35px;">${i+1}.</b>
                          <span style="font-size:10.5pt;">${wrapLatex(displayAns)}</span>`;
        grid.appendChild(cell);
    });
    p.body.appendChild(grid);
    if (window.MathJax?.typesetPromise) MathJax.typesetPromise([p.body]);
}

function makePage(area, type) {
    pageCount++;
    const page = document.createElement('div');
    page.className = 'page';
    const header = document.createElement('div');
    header.className = 'page-header';
    header.innerHTML = `<span>${AppState.title}</span><span>- ${pageCount} -</span>`;
    page.appendChild(header);

    if (type === 'ans') {
        const body = document.createElement('div');
        body.style.flex = '1';
        page.appendChild(body);
        area.appendChild(page);
        return { page, body };
    }

    const grid  = document.createElement('div');
    grid.className = 'grid-container';
    const left  = document.createElement('div');
    left.className = 'grid-col';
    const right = document.createElement('div');
    right.className = 'grid-col';
    grid.appendChild(left);
    grid.appendChild(right);
    page.appendChild(grid);
    area.appendChild(page);
    return { page, cols: [left, right] };
}

/* 수식 보정 로직: \tf 변환 및 멀티라인 수식 보호 */
function wrapLatex(text) {
    if (!text) return text;
    let s = String(text);
    
    // HWP 수식 보정: \tf{a}{b} -> \frac{a}{b}
    s = s.replace(/\\tf\{([^}]*)\}\{([^}]*)\}/g, '\\frac{$1}{$2}');
    s = s.replace(/\\tf[0-9a-zA-Z]+/g, ''); // 나머지 찌꺼기 제거
    
    // 수식 래핑 및 줄바꿈 처리 (수식 밖의 개행문자만 보호)
    const parts = s.split(/(\$\$[\s\S]*?\$\$|\$[\s\S]*?\$)/g);
    return parts.map(p => {
        if (p.startsWith('$')) return p; // 수식 영역은 보존
        let processed = p.replace(/\\n/g, '<br>').replace(/\n/g, '<br>');
        // 텍스트 내 자동 수식 감지 (필요 시에만 래핑)
        if (processed.includes('\\') || /[\+\-\*\/\^\(\)]/.test(processed)) {
            if (processed.trim() !== "" && !processed.includes('<br>')) return `$${processed}$`;
        }
        return processed;
    }).join('');
}

function stripCite(text) {
    if (!text) return text;
    return text.replace(/【[^】]*】/g, '').replace(/\[[^\]]*\]/g, '').trim();
}

function raf() { return new Promise(r => requestAnimationFrame(r)); }
window.onload = init;
</script>
</body>
</html>
