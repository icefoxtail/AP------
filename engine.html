<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AP 수학 문제 엔진</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; line-height: 1.6; }
        .question-box { border: 1px solid #ddd; padding: 20px; margin-bottom: 30px; border-radius: 8px; }
        .content { margin-bottom: 15px; font-weight: 500; }
        .choices { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 15px; }
        .choice-item { padding: 8px 12px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 4px; cursor: pointer; }
        .solution { background: #f0fdf4; padding: 15px; border-radius: 6px; margin-top: 10px; display: none; }
        .box { border: 1px solid #000; padding: 10px; margin: 10px 0; background: #fff; }
        mark { background: #fef08a; padding: 0 2px; }
    </style>
</head>
<body>
    <div id="displayTitle" style="font-size: 1.2em; font-weight: 800; margin-bottom: 20px; border-bottom: 2px solid #3b82f6; padding-bottom: 10px;"></div>
    <div id="quiz-container"></div>

    <script>
        // 무결성 보정 함수 (최신 업데이트)
        function normalizeQuestion(q) {
            const processText = (text) => {
                if (!text) return text;
                // 1. 논리 기호 한글화 및 \text{} 태그 정리 (한글 누락 방지)
                let t = text.replace(/\\implies/g, '이면').replace(/\\therefore/g, '따라서').replace(/\\because/g, '이므로')
                            .replace(/\\(?:text|mbox)\{([^}]+)\}/g, ' $1 ');
                // 2. 수식 기호(\)는 있으나 $ 래핑이 없는 경우 자동 래핑 (보기 깨짐 방지)
                if (t.includes('\\') && !t.includes('$')) {
                    t = `$${t.trim()}$`;
                }
                return t;
            };

            if (q.solution) {
                q.solution = processText(q.solution)
                    .replace(/\[Logical Anchor\]/g, '<strong>[키포인트]</strong>')
                    .replace(/\\?ext[i]*[case]*(\d+)\s*\)?/gi, '<br><strong>($1)단계:</strong> ')
                    .replace(/\\?next(\d*)/gi, '<br><strong>다음으로:</strong> ')
                    .replace(/case\s+(\d+)\)/gi, '경우 $1)');
            }
            
            q.content = processText(q.content);
            if (q.choices) q.choices = q.choices.map(c => processText(c));

            if (!q.type) {
                // 3. 보기가 하나라도 있으면 무조건 객관식(single)으로 판별
                if (q.choices && q.choices.length > 0) q.type = 'single';
                else if (q.content?.includes('서술')) q.type = 'descriptive';
                else q.type = 'short';
            }
            return q;
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const dataPath = params.get('data');
            const title = params.get('title');
            
            if (title) document.getElementById('displayTitle').innerText = decodeURIComponent(title);
            if (!dataPath) return;

            const script = document.createElement('script');
            script.src = dataPath;
            script.onload = () => {
                const container = document.getElementById('quiz-container');
                const questions = window.questionBank || [];
                
                questions.forEach(rawQ => {
                    const q = normalizeQuestion(rawQ);
                    const div = document.createElement('div');
                    div.className = 'question-box';
                    
                    let html = `<div class="content">${q.id}. ${q.content}</div>`;
                    
                    if (q.type === 'single' && q.choices) {
                        html += `<div class="choices">`;
                        q.choices.forEach((c, idx) => {
                            html += `<div class="choice-item">${idx + 1}) ${c}</div>`;
                        });
                        html += `</div>`;
                    } else {
                        html += `<div style="border:1px solid #ccc; height:40px; margin:10px 0; border-radius:4px; background:#fff;"></div>`;
                    }
                    
                    html += `<div class="solution" id="sol-${q.id}"><strong>[해설]</strong><br>${q.solution}<br><br><strong>정답: ${q.answer}</strong></div>`;
                    html += `<button onclick="document.getElementById('sol-${q.id}').style.display='block'" style="font-size:11px; cursor:pointer;">해설 보기</button>`;
                    
                    div.innerHTML = html;
                    container.appendChild(div);
                });
                if (window.MathJax) MathJax.typeset();
            };
            document.body.appendChild(script);
        }

        window.onload = init;
    </script>
</body>
</html>
