<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JS아카이브 엔진 - Stage E v1.6.2 (Rulebook v1.9 + Image Field)</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']], packages: {'[+]': ['ams', 'boldsymbol']} },
            options: { enableMenu: false },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        @page { size: A4; margin: 0; }
        body { margin: 0; font-family: 'Nanum Myeongjo', serif; font-size: 9.5pt; background: #f1f5f9; padding-top: 54px; }
        #mode-ctrl { position: fixed; top: 0; left: 0; width: 100%; height: 56px; background: #0f172a; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; z-index: 1000; box-sizing: border-box; }
        #ctrl-title { color: white; font-weight: 800; font-size: 14px; }
        .mode-tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.07); padding: 4px; border-radius: 10px; }
        .mode-tab { padding: 6px 16px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: rgba(255,255,255,0.5); }
        .mode-tab.active { background: white; color: #0f172a; }
        #print-area { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px 0; }
        
        .page { width: 210mm; height: 297mm; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); padding: 15mm; padding-bottom: 20mm; box-sizing: border-box; display: flex; flex-direction: column; position: relative; }
        .page-header { display: flex; align-items: flex-end; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 12px; font-weight: bold; font-size: 10pt; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; position: relative; gap: 0; min-height: 0; }
        .grid-container::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: #000; }
        .grid-col { display: flex; flex-direction: column; padding: 0 12px; overflow: hidden; height: 100%; min-height: 0; }
        
        .q-box { flex: 1; padding: 10px 0; border-bottom: none; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
        .q-box.sol-box { flex: none; border-bottom: 0.5px solid #eee; padding-bottom: 2.2em; margin-bottom: 2.2em; }
        .q-num { font-weight: bold; font-size: 11pt; margin-bottom: 6px; }
        
        /* [v1.9] 발문 가독성 및 이미지 렌더 보정 */
        .q-content { line-height: 1.62; word-break: keep-all; overflow-wrap: anywhere; }
        
        .q-content img, .q-image-wrap img { 
            display: block; 
            max-width: 100%; 
            height: auto; 
            margin: 8px auto; 
            break-inside: avoid;
            page-break-inside: avoid;
        }

        /* [v1.9] PNG 자동 축소 단계 클래스 */
        .q-content img.img-fit-tight, .q-image-wrap img.img-fit-tight { max-width: 92%; max-height: 120px; }
        .q-content img.img-fit-tighter, .q-image-wrap img.img-fit-tighter { max-width: 84%; max-height: 105px; }
        .q-content img.img-fit-micro, .q-image-wrap img.img-fit-micro { max-width: 76%; max-height: 90px; }
        
        /* [v1.9] 보기(Choices) 스타일 시스템 */
        .choices { margin-top: 10px; font-size: 9pt; }
        .choice-item { display: flex; align-items: flex-start; line-height: 1.5; }
        .choice-no { width: 20px; flex-shrink: 0; font-weight: bold; }
        .choice-text { flex: 1; word-break: keep-all; overflow-wrap: anywhere; }

        .choices-compact { display: flex; flex-wrap: wrap; gap: 4px 15px; }
        .choices-compact .choice-item { min-width: 15%; }

        .choices-block { display: flex; flex-direction: column; gap: 5px; }
        .choices-block .choice-item { 
            padding: 6px 10px; 
            background: #f9fafb; 
            border: 0.5px solid #eee; 
            border-radius: 4px; 
        }

        .answer-box { flex: 1; border: none; margin-top: 10px; background: transparent; }
        
        table.question-table { border-collapse: collapse; width: 100%; max-width: 280px; table-layout: fixed; font-size: 8.6pt; line-height: 1.35; margin: 8px 0; margin-left: 0; margin-right: auto; text-align: left; }
        table.question-table th, table.question-table td { border: 1px solid #000; padding: 3px 5px; text-align: center; vertical-align: middle; word-break: break-word; }
        table.question-table th { font-weight: 700; }

        .ans-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0 20px; width: 100%; }
        .ans-cell { border-bottom: 1px solid #eee; display: flex; height: 40px; align-items: center; padding: 0 10px; }
        .ans-n { width: 40px; font-weight: bold; color: #1d4ed8; font-size: 10pt; }
        .ans-v { flex: 1; font-weight: bold; font-size: 10.5pt; }

        /* [성역] fit 클래스 정의 */
        .fit-tight { font-size: 9.1pt !important; line-height: 1.45 !important; }
        .fit-tighter { font-size: 8.6pt !important; line-height: 1.35 !important; }
        .fit-micro { font-size: 8.1pt !important; line-height: 1.25 !important; }

        @media print {
            #mode-ctrl { display: none; }
            body { margin: 0 !important; padding: 0 !important; background: white; }
            #print-area { display: block !important; padding: 0 !important; }
            .page { box-shadow: none; height: 296.5mm; overflow: hidden; page-break-after: always; }
            .page:last-child { page-break-after: avoid; }
            #staging { display: none; }
        }
    </style>
</head>
<body>
    <div id="mode-ctrl">
        <span id="ctrl-title">JS아카이브</span>
        <div class="mode-tabs">
            <button class="mode-tab" id="btn-exam" onclick="switchMode('exam')">시험지</button>
            <button class="mode-tab" id="btn-sol" onclick="switchMode('sol')">해설지</button>
            <button class="mode-tab" id="btn-ans" onclick="switchMode('ans')">정답표</button>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="mode-tab" id="btn-shuffle" style="color:white;" onclick="shuffleData()">🔀 셔플</button>
            <button id="btn-print" onclick="window.print()" style="padding:8px 16px; border-radius:6px; border:none; background:#378ADD; color:white; font-weight:bold; cursor:pointer;">인쇄</button>
        </div>
    </div>
    <div id="print-area"></div>
    <div id="staging" style="position:absolute;top:-9999px;left:0;visibility:hidden;width:83mm;"></div>

<script>
/**
 * [Stage E v1.6.2] Standardized Constants & Asset Management
 * * 이미지 자산 정책 (Rulebook v1.9):
 * 1. 경로: assets/images/{시험지전체명}/q{id}.png (content 내 <img> 태그 사용 또는 q.image 필드 사용)
 * 2. 고2 이상: 반드시 과목명(대수, 미적분 등) 포함된 폴더 구조 유지
 * 3. 원본 관리: 여백/격자/라벨 제거된 정리된 PNG 권장
 * 4. 가독성 하한: 일반 그래프 폭 160px, 복잡 그래프 폭 180px 미만 지양
 */
const SE_OVERHEAD_COL = 10;
const SE_OVERHEAD_GRID = 20;
const SE_PAGE_TOLERANCE = 5;
const SE_BLOCK_GAP = 15;

const AppState = { data: [], mode: 'exam', qpp: 4, title: '' };

// [성역] wrapLatex
function wrapLatex(text) {
    if (text == null) return '';
    let s = String(text);
    s = s.replace(/\\\([\s\S]+?\\\)/g, m => '$' + m.slice(2, -2) + '$');
    s = s.replace(/\\\[[\s\S]+?\\\]/g, m => '$$' + m.slice(2, -2) + '$$');
    const combRepl = T => (m, a1, a2, b1, b2) => `$_{${a1||a2}}${T}_{${b1||b2}}$`;
    const combPat = prefix => new RegExp(`(?:\\{\\}|\\[\\])_(?:\\{([^}]+)\\}|([a-zA-Z0-9+\\-]+))${prefix}_(?:\\{([^}]+)\\}|([a-zA-Z0-9+\\-]+))`, 'g');
    const htmlTags = [];
    s = s.replace(/<svg[\s\S]*?<\/svg>|<img[^>]*>|<br\s*\/?>|<\/?(div|span|b|i|strong|em|u|sup|sub|table|thead|tbody|tr|th|td|colgroup|col)[^>]*>/gi, m => {
        const token = `__HTMLTAG_${htmlTags.length}__`; htmlTags.push(m); return token;
    });
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$)/g).map((seg, idx) => {
        if (idx % 2 === 1) return seg;
        let t = seg;
        t = t.replace(combPat('C'), combRepl('C')).replace(combPat('H'), combRepl('H')).replace(combPat('P'), combRepl('P'));
        return t.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }).join('');
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$|__HTMLTAG_\d+__)/g).map((seg, idx) => {
        if (idx % 2 === 1) return seg;
        const trimmed = seg.trim(); if (!trimmed) return seg;
        const hasKorean = /[가-힣]/.test(seg); const hasLatex = /\\[a-zA-Z]/.test(seg);
        if (!hasKorean && /\\begin\{(cases|aligned|array|matrix|pmatrix|bmatrix|vmatrix|Vmatrix)\}/.test(seg)) return `$$${seg}$$`;
        if (!hasKorean && hasLatex && /^[0-9a-zA-Z\s\+\-\*\/\=\^\{\}\(\)\[\]_\.,\\!;:]+$/.test(trimmed)) return `$${trimmed}$`;
        if (hasKorean && hasLatex) return seg.replace(/(\\[a-zA-Z]+(?:\{[^}]*\})*(?:\{[^}]*\})*(?:_\{?[^}\s]+\}?)?(?:\^\{?[^}\s]+\}?)?)/g, '$$$1$$');
        return seg;
    }).join('');
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$)/g).map((seg, idx) => {
        if (idx % 2 === 1) return seg;
        return seg.replace(/(\\\{(?:[^{}]|\{[^}]*\})*\\\})/g, '$$$1$$');
    }).join('');
    s = s.replace(/\\n(?![a-zA-Z])/g, '<br>').replace(/\r\n|\r|\n/g, '<br>');
    return s.replace(/__HTMLTAG_(\d+)__/g, (_, i) => htmlTags[i] || '');
}

// [성역] autoCompress
function autoCompress(container) {
    let fontSize = 9.5; let lineHeight = 1.58;
    while (container.scrollHeight > container.clientHeight + 1 && fontSize > 6.5) {
        fontSize = Math.max(fontSize - 0.3, 6.5); lineHeight = Math.max(lineHeight - 0.08, 1.0);
        container.style.fontSize = fontSize + 'pt'; container.style.lineHeight = String(lineHeight);
    }
}

/**
 * [FIXED] fitQuestionBox - PNG 축소 대상 확장 (.q-image-wrap 포함)
 */
function fitQuestionBox(box) {
    const textClasses = ['', 'fit-tight', 'fit-tighter', 'fit-micro'];
    const imgClasses = ['', 'img-fit-tight', 'img-fit-tighter', 'img-fit-micro'];
    const imgs = box.querySelectorAll('.q-content img, .q-image-wrap img');

    for (const tCls of textClasses) {
        box.classList.remove('fit-tight', 'fit-tighter', 'fit-micro');
        if (tCls) box.classList.add(tCls);
        if (box.scrollHeight <= box.clientHeight + 1) return;
    }

    for (const iCls of imgClasses) {
        imgs.forEach(img => img.classList.remove('img-fit-tight', 'img-fit-tighter', 'img-fit-micro'));
        if (iCls) imgs.forEach(img => img.classList.add(iCls));
        if (box.scrollHeight <= box.clientHeight + 1) return;
    }
}

function parseExamTitle(raw) {
    if (!raw) return { year: '', school: '', grade: '', semester: '', examType: '', subject: '' };
    const p = raw.split('_');
    if (p.length < 2) return { year: '', school: '', grade: '', semester: '', examType: '', subject: raw };
    return { year: p[0] ? (p[0].length === 2 ? '20' + p[0] + '년' : p[0] + '년') : '', school: p[1] || '', semester: p[2] || '', examType: p[3] || '', grade: p[4] || '', subject: p[5] || '' };
}

function makePage(area, type, pNum) {
    const page = document.createElement('div'); page.className = 'page';
    const header = document.createElement('div'); header.className = 'page-header';
    if (type === 'exam') header.style.borderBottomColor = '#1d4ed8';
    else if (type === 'sol') header.style.borderBottomColor = '#dc2626';
    else header.style.borderBottomColor = '#059669';
    const t = parseExamTitle(AppState.title);
    const leftText = [t.year, t.school, t.grade, t.semester, t.examType, t.subject].filter(Boolean).join(' | ') || AppState.title;
    let rightText = (type === 'sol') ? '[ 정답 및 해설 ]' : (type === 'ans') ? '[ 정답표 ]' : '이름: ____________  점수:        / 100';
    header.innerHTML = `<div style="flex:1;">${leftText}</div><div>${rightText}</div>`;
    page.appendChild(header);
    const body = document.createElement('div'); body.style.cssText = 'flex:1; display:flex; flex-direction:column; min-height:0;';
    page.appendChild(body); page.body = body;
    const pageNum = document.createElement('div'); pageNum.style.cssText = 'position:absolute; bottom:15mm; left:0; width:100%; text-align:center; font-size:9pt; color:#555;';
    pageNum.textContent = `- ${pNum} -`; page.appendChild(pageNum);
    area.appendChild(page); return page;
}

async function init() {
    const p = new URLSearchParams(window.location.search);
    AppState.mode = p.get('mode') || 'exam'; AppState.qpp = parseInt(p.get('qpp')) || 4;
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    const targetBtn = document.getElementById('btn-' + AppState.mode); if (targetBtn) targetBtn.classList.add('active');
    const dataUrl = p.get('data'); if (!dataUrl) return;
    const s = document.createElement('script'); s.src = dataUrl + '?v=' + Date.now();
    s.onload = async () => {
        const qb = window.questionBank;
        AppState.data = Array.isArray(qb) ? qb : (qb?.questions || qb?.problems || []);
        AppState.title = window.examTitle || p.get('title') || '수학 시험지';
        document.getElementById('ctrl-title').innerText = AppState.title;
        await render();
    };
    document.body.appendChild(s);
}
function switchMode(mode) {
    const url = new URL(window.location.href); url.searchParams.set('mode', mode); window.location.href = url.toString();
}
async function shuffleData() {
    for (let i = AppState.data.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1)); [AppState.data[i], AppState.data[j]] = [AppState.data[j], AppState.data[i]];
    }
    await render();
}
function raf() { return new Promise(r => requestAnimationFrame(r)); }

function extractChoice(c) {
    if (c === null || c === undefined) return '';
    if (typeof c === 'object') return c.text || c.content || c.value || c.answer || Object.values(c)[0] || '';
    return String(c);
}

function stripChoicePrefix(text) {
    return String(text || '').replace(/^\s*(?:[①②③④⑤⑥⑦⑧⑨⑩]|\(?\d+\)|\d+\.|\d+\))\s*/, '').trim();
}

/**
 * [v1.9] 보기 유형 판정 엔진
 */
function detectChoiceRenderMode(choices) {
    if (!choices || choices.length === 0) return 'compact';
    const texts = choices.map(c => stripChoicePrefix(extractChoice(c)).trim());
    const isLong = texts.some(t => t.length > 20);
    const hasBlockPrefix = texts.some(t => /^[가-힣ㄱ-ㅎa-zA-Z][\.\)]/.test(t));
    const hasSentences = texts.some(t => /[.?!]/.test(t) && t.length > 15);
    return (isLong || hasBlockPrefix || hasSentences) ? 'block' : 'compact';
}

function renderChoicesHTML(q) {
    const circled = ['①', '②', '③', '④', '⑤'];
    const isSubjective = !Array.isArray(q.choices) || q.choices.length === 0 || q.choices[0] === '주관식' || q.choices.every(c => extractChoice(c).trim() === '');
    if (isSubjective) return '<div class="answer-box"></div>';
    const mode = detectChoiceRenderMode(q.choices);
    const itemsHTML = q.choices.map((c, ci) => {
        const text = wrapLatex(stripChoicePrefix(extractChoice(c)));
        return `<div class="choice-item"><span class="choice-no">${circled[ci] || ''}</span><span class="choice-text">${text}</span></div>`;
    }).join('');
    return `<div class="choices choices-${mode}">${itemsHTML}</div>`;
}

/**
 * [v1.9] 서술형 소문항 줄바꿈
 */
function formatQuestionContent(html, q) {
    if (!html) return '';
    let count = 0;
    return html.replace(/([\.?!]|\s|>)\s*(\(\d+\))/g, (match, p1, p2) => {
        count++;
        if (count === 1) return match; 
        if (p1.includes('br>') || p1.includes('\n')) return match; 
        return p1 + '<br>' + p2;
    });
}

/**
 * [Image Field Handling]
 * 발문 내 인라인 이미지 정리 및 래퍼 생성
 */
function stripInlineImagesFromContent(content, hasImageField) {
    if (!content) return '';
    if (!hasImageField) return content;
    // img 태그와 주변 br 태그를 하나로 치환하여 공백 벌어짐 방지
    let stripped = content.replace(/(?:<br\s*\/?>\s*)*<img[^>]*>(?:\s*<br\s*\/?>)*/gi, '<br>');
    // 앞뒤 잉여 줄바꿈 정리
    stripped = stripped.replace(/^(?:<br\s*\/?>\s*)+/i, '').replace(/(?:<br\s*\/?>\s*)+$/i, '');
    return stripped;
}

function renderQuestionImageHTML(q) {
    if (!q.image) return '';
    return `<div class="q-image-wrap"><img src="${q.image}"></div>`;
}

/**
 * [Stage E v1.6.2] renderExam - Final Logic 
 */
async function renderExam(area, data) {
    const staging = document.getElementById('staging'); staging.style.width = '83mm'; staging.innerHTML = '';
    let pNum = 1;

    const items = data.map((q, i) => {
        const box = document.createElement('div'); box.className = 'q-box';
        
        // 1. 발문 (인라인 이미지 제거 및 줄바꿈 보정)
        const hasImageField = !!q.image;
        const rawContent = stripInlineImagesFromContent(q.content, hasImageField);
        const formattedContent = formatQuestionContent(wrapLatex(rawContent), q);
        
        // 2. 별도 이미지 래퍼 
        const imageHTML = renderQuestionImageHTML(q);
        
        // 3. 보기 HTML 생성
        const choicesHTML = renderChoicesHTML(q);
        
        // 조립: 발문 -> 이미지 -> 보기
        box.innerHTML = `<div class="q-num">${i + 1}.</div>
                         <div class="q-content">${formattedContent}</div>
                         ${imageHTML}
                         ${choicesHTML}`;
                         
        staging.appendChild(box); return { q, box, originalIndex: i };
    });

    if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([staging]); await raf();
    for (const item of items) {
        const p = {}; p.proxyHeight_raw = item.box.scrollHeight; item.box.classList.add('fit-tight'); await raf();
        p.proxyHeight_tight = item.box.scrollHeight; item.box.classList.remove('fit-tight');
        item.profile = p;
    }

    const tempPage = makePage(area, 'exam', 0);
    const usablePageHeight = tempPage.body.clientHeight;
    area.removeChild(tempPage);

    let firstPage = null; let pages = [];
    let currentPage = { blocks: [], usedHeight: 0 };
    let activeChunk = []; let currentType = null;

    const flushBlock = () => {
        if (activeChunk.length === 0) return;
        const type = currentType; const chunk = [...activeChunk];
        let hType = (type === 'normal') ? 'proxyHeight_tight' : 'proxyHeight_raw';
        let blockH;
        if (type === 'wide') {
            blockH = chunk[0].profile.proxyHeight_raw + SE_OVERHEAD_COL + SE_OVERHEAD_GRID;
        } else {
            const split = Math.ceil(chunk.length / 2);
            const leftH = chunk.slice(0, split).reduce((s, it) => s + it.profile[hType], 0) + SE_OVERHEAD_COL;
            const rightH = chunk.slice(split).reduce((s, it) => s + it.profile[hType], 0) + SE_OVERHEAD_COL;
            blockH = Math.max(leftH, rightH) + SE_OVERHEAD_GRID;
        }
        const isNormalForceBreak = (type === 'normal' && currentPage.blocks.length > 0);
        const gap = (currentPage.blocks.length > 0) ? SE_BLOCK_GAP : 0;
        if ((isNormalForceBreak || (currentPage.usedHeight + gap + blockH > usablePageHeight)) && currentPage.blocks.length > 0) {
            pages.push(currentPage); currentPage = { blocks: [], usedHeight: 0 };
        }
        currentPage.usedHeight += (currentPage.blocks.length > 0 ? SE_BLOCK_GAP : 0) + blockH;
        currentPage.blocks.push({ type, items: chunk, blockH });
        activeChunk = [];
    };

    items.forEach(item => {
        const lt = item.q.layoutTag || '';
        let qType = 'normal'; let limit = AppState.qpp;
        if (item.q.wide === true || lt === 'fullwidth') { qType = 'wide'; limit = 1; }
        else if (lt === 'subjective-2up') { qType = 'subj2'; limit = 2; }
        else if (lt === 'subjective-4up') { qType = 'subj4'; limit = 4; }
        const isSpecialType = (qType === 'subj2' || qType === 'subj4' || qType === 'wide');
        const prevWasSpecial = (currentType === 'subj2' || currentType === 'subj4' || currentType === 'wide');
        if ((currentType !== null && currentType !== qType) || (activeChunk.length >= limit) || ((isSpecialType || prevWasSpecial) && currentPage.blocks.length > 0)) {
            flushBlock();
            if (isSpecialType && currentPage.blocks.length > 0) { pages.push(currentPage); currentPage = { blocks: [], usedHeight: 0 }; }
            currentType = qType;
        }
        if (currentType === null) currentType = qType;
        activeChunk.push(item);
    });
    flushBlock(); if (currentPage.blocks.length > 0) pages.push(currentPage);

    for (let pIdx = 0; pIdx < pages.length; pIdx++) {
        const pageData = pages[pIdx];
        const page = (!firstPage) ? (firstPage = makePage(area, 'exam', pNum)) : makePage(area, 'exam', ++pNum);
        pageData.blocks.forEach((block, bIdx) => {
            if (block.type === 'wide') {
                const wideCol = document.createElement('div'); wideCol.style.cssText = 'flex:1; display:flex; flex-direction:column; padding:0 8px; min-height:0; overflow:hidden;';
                wideCol.appendChild(block.items[0].box.cloneNode(true)); page.body.appendChild(wideCol);
            } else {
                const bGrid = document.createElement('div'); bGrid.className = 'grid-container';
                bGrid.style.flex = (block.type === 'normal') ? '1 1 0' : 'none';
                if (bIdx < pageData.blocks.length - 1) bGrid.style.marginBottom = SE_BLOCK_GAP + 'px';
                const bLeft = document.createElement('div'); bLeft.className = 'grid-col';
                const bRight = document.createElement('div'); bRight.className = 'grid-col';
                bGrid.appendChild(bLeft); bGrid.appendChild(bRight); page.body.appendChild(bGrid);
                const split = Math.ceil(block.items.length / 2);
                block.items.slice(0, split).forEach(it => bLeft.appendChild(it.box.cloneNode(true)));
                block.items.slice(split).forEach(it => bRight.appendChild(it.box.cloneNode(true)));
            }
        });
        if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([page]); await raf();
        const allPageBoxes = page.querySelectorAll('.q-box'); allPageBoxes.forEach(b => fitQuestionBox(b));
        if (page.body.scrollHeight > usablePageHeight + SE_PAGE_TOLERANCE) {
            allPageBoxes.forEach(b => autoCompress(b)); await raf();
            if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([page]);
        }
    }
}

// [성역] renderSol (해설지는 image 필드 반영 안함, 이전 PASS본과 동일)
async function renderSol(area, data) {
    let pageNum = 1;
    function makeGridPage() {
        const p = makePage(area, 'sol', pageNum++);
        const grid = document.createElement('div'); grid.className = 'grid-container';
        const l = document.createElement('div'); l.className = 'grid-col';
        const r = document.createElement('div'); r.className = 'grid-col';
        grid.appendChild(l); grid.appendChild(r); p.body.appendChild(grid);
        return { p, cols: [l, r] };
    }
    let { cols } = makeGridPage(); let colIdx = 0;
    for (let i = 0; i < data.length; i++) {
        const q = data[i]; const solutionText = q.solution || q.explanation || q.sol || '해설이 없습니다.';
        const box = document.createElement('div'); box.className = 'q-box sol-box';
        box.innerHTML = `<div class="q-num">${i+1}.</div><div style="margin-bottom:8px;color:#555;font-size:8.5pt;">${wrapLatex(q.content)}</div><div style="background:#fdfdfd;padding:8px;border:1px solid #eee;border-radius:3px;"><div style="font-weight:bold;color:red;margin-bottom:4px;">[정답] ${wrapLatex(q.answer ?? '–')}</div><div style="font-size:8.5pt;line-height:1.55;">${wrapLatex(solutionText)}</div></div>`;
        cols[colIdx].appendChild(box);
        if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([cols[colIdx]]); await raf();
        if (cols[colIdx].scrollHeight > cols[colIdx].clientHeight + 2) {
            autoCompress(box); await raf();
            if (cols[colIdx].scrollHeight > cols[colIdx].clientHeight + 2) {
                cols[colIdx].removeChild(box);
                if (colIdx === 0) { colIdx = 1; cols[colIdx].appendChild(box); } 
                else { ({ cols } = makeGridPage()); colIdx = 0; cols[colIdx].appendChild(box); }
                if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([cols[colIdx]]); await raf();
            }
        }
    }
}

// [성역] renderAns
function renderAns(area, data) {
    const PER_PAGE = 50; let pCount = 1;
    for (let start = 0; start < data.length; start += PER_PAGE) {
        const chunk = data.slice(start, start + PER_PAGE);
        const p = makePage(area, 'ans', pCount++);
        const grid = document.createElement('div'); grid.className = 'ans-grid';
        const splitIndex = Math.ceil(chunk.length / 2);
        for (let i = 0; i < splitIndex; i++) {
            [i, splitIndex + i].forEach(idx => {
                if (chunk[idx]) {
                    const u = document.createElement('div'); u.className = 'ans-cell';
                    u.innerHTML = `<div class="ans-n">${start + idx + 1}.</div><div class="ans-v">${wrapLatex(chunk[idx].answer ?? '–')}</div>`;
                    grid.appendChild(u);
                }
            });
        }
        p.body.appendChild(grid);
    }
}

async function render() {
    const area = document.getElementById('print-area'); area.innerHTML = '';
    if (AppState.mode === 'ans') renderAns(area, AppState.data);
    else if (AppState.mode === 'sol') await renderSol(area, AppState.data);
    else await renderExam(area, AppState.data);
    if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([area]);
}
window.onload = init;
</script>
