<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AP 수학 엔진</title>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']],
                packages: {'[+]': ['ams', 'boldsymbol']}
            },
            options: { enableMenu: false },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        @page { size: A4; margin: 0; }

        body {
            margin: 0;
            font-family: 'Nanum Myeongjo', serif;
            font-size: 9.5pt;
            background: #f1f5f9;
            padding-top: 54px;
            color: #000;
        }

        #mode-ctrl {
            position: fixed; top: 0; left: 0; width: 100%; height: 54px;
            background: white; display: flex; justify-content: space-between;
            align-items: center; padding: 0 20px; z-index: 1000;
            box-sizing: border-box; border-bottom: 1px solid #ccc;
        }

        .print-btn {
            padding: 8px 16px; background: #378ADD; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-family: inherit; font-weight: bold;
        }

        #print-area { display: none; flex-direction: column; align-items: center; gap: 20px; padding: 20px 0; }
        .page {
            width: 210mm; min-height: 297mm; background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1); padding: 15mm;
            box-sizing: border-box; position: relative; display: flex; flex-direction: column;
            overflow: hidden;
        }
        @media print {
            body { padding-top: 0; background: white; }
            #mode-ctrl { display: none; }
            #print-area { display: flex; gap: 0; padding: 0; }
            .page { box-shadow: none; width: 210mm; height: 297mm; page-break-after: always; }
            #pdf-container { display: none !important; }
        }
        .page-header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 15px; font-weight: bold; }
        
        #pdf-container { display: none; width: 100%; height: calc(100vh - 54px); }
        #pdf-viewer { width: 100%; height: 100%; border: none; }

        .ans-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .ans-cell { border: 1px solid #000; padding: 10px; display: flex; align-items: center; gap: 10px; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex: 1; align-content: start; }
        .sol-col { display: flex; flex-direction: column; gap: 20px; flex: 1; }
        .q-box { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; break-inside: avoid; }
        .q-num { font-weight: bold; font-size: 11pt; }
    </style>
</head>
<body>

    <div id="mode-ctrl">
        <h3 id="top-title" style="margin:0;">AP 수학 엔진</h3>
        <div>
            <button class="print-btn" onclick="window.print()">인쇄하기 / PDF 저장</button>
            <button class="print-btn" style="background:#64748b; margin-left:10px;" onclick="history.back()">목록으로</button>
        </div>
    </div>

    <div id="pdf-container">
        <iframe id="pdf-viewer" src=""></iframe>
    </div>

    <div id="print-area"></div>

    <script>
        const AppState = { title: 'AP 수학', data: [], mode: 'exam' };

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode') || 'exam';
            const title = params.get('title') || 'AP 수학 기출';
            const file = params.get('file');
            const dataUrl = params.get('data');

            AppState.mode = mode;
            AppState.title = title;
            document.getElementById('top-title').innerText = title;

            if (mode === 'pdf' && file) {
                document.getElementById('pdf-container').style.display = 'block';
                document.getElementById('pdf-viewer').src = file;
                return;
            }

            document.getElementById('print-area').style.display = 'flex';
            if (dataUrl) {
                try {
                    const res = await fetch(dataUrl);
                    if (res.ok) {
                        AppState.data = await res.json();
                        renderEngine();
                    }
                } catch (e) {
                    console.error("Data load failed", e);
                }
            }
        }

        function renderEngine() {
            const area = document.getElementById('print-area');
            area.innerHTML = '';
            pageCount = 0;

            if (AppState.mode === 'ans') {
                renderAnsGrid(area, AppState.data);
            } else {
                let currentLayout = createPage(area, AppState.mode === 'sol');
                let currentContainer = currentLayout.grid || currentLayout.col;
                
                AppState.data.forEach((q, i) => {
                    const qEl = document.createElement('div');
                    qEl.className = 'q-box';
                    qEl.innerHTML = `
                        <div class="q-num">${i + 1}.</div>
                        <div>${q.question || q.content || ''}</div>
                        ${AppState.mode === 'sol' ? `<div style="color:blue; margin-top:10px;">[해설] ${q.solution || ''}</div>` : ''}
                    `;
                    currentContainer.appendChild(qEl);

                    // Paginate 코어 로직 복구 (페이지 높이 초과 시 새 페이지 생성)
                    if (currentLayout.page.scrollHeight > currentLayout.page.clientHeight) {
                        currentContainer.removeChild(qEl);
                        currentLayout = createPage(area, AppState.mode === 'sol');
                        currentContainer = currentLayout.grid || currentLayout.col;
                        currentContainer.appendChild(qEl);
                    }
                });
                if (window.MathJax?.typesetPromise) MathJax.typesetPromise([area]);
            }
        }

        function renderAnsGrid(area, bank) {
            const page = document.createElement('div');
            page.className = 'page';
            const pn = document.createElement('div');
            pn.className = 'page-header';
            pn.innerHTML = `<span>${AppState.title} — 정답표</span><span>- 1 -</span>`;
            const grid = document.createElement('div');
            grid.className = 'ans-grid';
            bank.forEach((q, i) => {
                const cell = document.createElement('div');
                cell.className = 'ans-cell';
                cell.innerHTML = `<b style="font-size:11pt;min-width:24px;">${i + 1}.</b>
                                  <span style="font-size:10pt;">${q.answer ?? '–'}</span>`;
                grid.appendChild(cell);
            });
            page.appendChild(pn);
            page.appendChild(grid);
            area.appendChild(page);
            if (window.MathJax?.typesetPromise) MathJax.typesetPromise([page]);
        }

        let pageCount = 0;
        function createPage(area, isSol = false) {
            pageCount++;
            const page = document.createElement('div');
            page.className = 'page';

            const header = document.createElement('div');
            header.className = 'page-header';
            header.innerHTML = `<span>${AppState.title}</span><span>- ${pageCount} -</span>`;
            page.appendChild(header);

            if (isSol) {
                const col = document.createElement('div');
                col.className = 'sol-col';
                page.appendChild(col);
                area.appendChild(page);
                return { page, col };
            } else {
                const grid = document.createElement('div');
                grid.className = 'grid-container';
                page.appendChild(grid);
                area.appendChild(page);
                return { page, grid };
            }
        }

        window.onload = init;
    </script>
</body>
</html>
