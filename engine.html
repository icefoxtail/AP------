<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JS아카이브 엔진</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']], packages: {'[+]': ['ams', 'boldsymbol']} },
            options: { enableMenu: false },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        @page { size: A4; margin: 0; }
        body { margin: 0; font-family: 'Nanum Myeongjo', serif; font-size: 9.5pt; background: #f1f5f9; padding-top: 54px; }
        #mode-ctrl { position: fixed; top: 0; left: 0; width: 100%; height: 56px; background: #0f172a; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; z-index: 1000; box-sizing: border-box; }
        #ctrl-title { color: white; font-weight: 800; font-size: 14px; }
        .mode-tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.07); padding: 4px; border-radius: 10px; }
        .mode-tab { padding: 6px 16px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: rgba(255,255,255,0.5); }
        .mode-tab.active { background: white; color: #0f172a; }
        #print-area { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px 0; }
        
        .page { 
            width: 210mm; 
            height: 297mm; 
            background: white; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
            padding: 15mm; 
            padding-bottom: 20mm; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }
        .page-header { display: flex; align-items: flex-end; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 12px; font-weight: bold; font-size: 10pt; }
        
        .grid-container { flex: 1; display: grid; grid-template-columns: 1fr 1fr; position: relative; gap: 0; min-height: 0; }
        .grid-container::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: #000; }
        .grid-col { display: flex; flex-direction: column; padding: 0 12px; min-height: 0; }
        
        .q-box { flex: 1; padding: 10px 0; border-bottom: 0.5px solid #eee; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
        .q-box.sol-box { flex: none; border-bottom: 0.5px solid #eee; }
        .q-num { font-weight: bold; font-size: 11pt; margin-bottom: 6px; }
        .choices { margin-top: 10px; font-size: 9pt; line-height: 1.6; }
        .choices div { margin-bottom: 2px; }
        .answer-box { flex: 1; border: 1px dashed #ccc; margin-top: 10px; background: #fafafa; }
        
        .q-box.fit-tight { font-size: 9pt; line-height: 1.4; }
        .q-box.fit-tighter { font-size: 8.6pt; line-height: 1.31; }
        .q-box.fit-micro { font-size: 8.1pt; line-height: 1.23; }

        .ans-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0 20px; width: 100%; }
        .ans-cell { border-bottom: 1px solid #eee; display: flex; height: 40px; align-items: center; padding: 0 10px; }
        .ans-n { width: 40px; font-weight: bold; color: #1d4ed8; font-size: 10pt; }
        .ans-v { flex: 1; font-weight: bold; font-size: 10.5pt; }

        @media print { #mode-ctrl { display: none; } body { padding-top: 0; background: white; } .page { box-shadow: none; page-break-after: always; } }
    </style>
</head>
<body>
    <div id="mode-ctrl">
        <span id="ctrl-title">JS아카이브</span>
        <div class="mode-tabs">
            <button class="mode-tab" id="btn-exam" onclick="switchMode('exam')">시험지</button>
            <button class="mode-tab" id="btn-sol" onclick="switchMode('sol')">해설지</button>
            <button class="mode-tab" id="btn-ans" onclick="switchMode('ans')">정답표</button>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="mode-tab" style="color:white;" onclick="shuffleData()">🔀 셔플</button>
            <button onclick="window.print()" style="padding:8px 16px; border-radius:6px; border:none; background:#378ADD; color:white; font-weight:bold; cursor:pointer;">인쇄</button>
        </div>
    </div>
    <div id="print-area"></div>

<script>
const AppState = { data: [], mode: 'exam', qpp: 4, title: '' };

// [지시 반영] wrapLatex 전체 교체 (고도화 버전)
function wrapLatex(text) {
    if (text == null) return '';
    let s = String(text);

    // 1. \(...\) → $...$  /  \[...\] → $$...$$
    s = s.replace(/\\\([\s\S]+?\\\)/g, m => '$' + m.slice(2, -2) + '$');
    s = s.replace(/\\\[[\s\S]+?\\\]/g, m => '$$' + m.slice(2, -2) + '$$');

    // 2. []_xC_y, []_xH_y, []_xP_y (조합/중복조합/순열)
    const comb = T => (m, a1, a2, b1, b2) => `$_{${a1||a2}}${T}_{${b1||b2}}$`;
    s = s.replace(/\[\]_(?:\{([^}]+)\}|([a-zA-Z0-9+\-]+))C_(?:\{([^}]+)\}|([a-zA-Z0-9+\-]+))/g, comb('C'));
    s = s.replace(/\[\]_(?:\{([^}]+)\}|([a-zA-Z0-9+\-]+))H_(?:\{([^}]+)\}|([a-zA-Z0-9+\-]+))/g, comb('H'));
    s = s.replace(/\[\]_(?:\{([^}]+)\}|([a-zA-Z0-9+\-]+))P_(?:\{([^}]+)\}|([a-zA-Z0-9+\-]+))/g, comb('P'));

    // 3. SVG/img 보호 (토큰화)
    const htmlTags = [];
    s = s.replace(/<svg[\s\S]*?<\/svg>|<img[^>]*>/gi, m => {
        const token = `__HTMLTAG_${htmlTags.length}__`;
        htmlTags.push(m);
        return token;
    });

    // 4. < > escape (부등호 HTML 태그 오인 방지, $...$ 밖에서만)
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]+\$)/g).map((seg, idx) => {
        if (idx % 2 === 1) return seg; // $...$ 안은 건드리지 않음
        return seg.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }).join('');

    // 5. $...$ 밖에 있는 \command{} 패턴 자동 감싸기
    s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]+\$|__HTMLTAG_\d+__)/g).map((seg, idx) => {
        if (idx % 2 === 1) return seg;
        if (!seg.trim()) return seg;
        const hasKorean = /[가-힣]/.test(seg);
        const hasLatex = /\\[a-zA-Z]/.test(seg);
        if (!hasKorean && hasLatex) {
            const trimmed = seg.trim();
            if (/^[0-9a-zA-Z\s\+\-\*\/\=\^\{\}\(\)\[\]_\.,\\]+$/.test(trimmed) && trimmed.length > 0) {
                return `$${trimmed}$`;
            }
        }
        return seg;
    }).join('');

    // 6. 줄바꿈 처리 (\n → <br>, 실제 개행 → <br>, \notin 등 LaTeX 명령 보호)
    s = s.replace(/\\n(?![a-zA-Z])/g, '<br>').replace(/\r\n|\r|\n/g, '<br>');

    // 7. 토큰 복원
    return s.replace(/__HTMLTAG_(\d+)__/g, (_, i) => htmlTags[i] || '');
}

function parseExamTitle(raw) {
    if (!raw) return { year: '', school: '', grade: '', semester: '', examType: '', subject: '' };
    const p = raw.split('_');
    return { year: p[0] ? '20' + p[0] + '년' : '', school: p[1] || '', semester: p[2] || '', examType: p[3] || '', grade: p[4] || '', subject: p[5] || '' };
}

// [성역] fitQuestionBox
function fitQuestionBox(box) {
    const classes = ['', 'fit-tight', 'fit-tighter', 'fit-micro'];
    for (const cls of classes) {
        box.classList.remove('fit-tight','fit-tighter','fit-micro');
        if (cls) box.classList.add(cls);
        if (box.scrollHeight <= box.clientHeight + 1) return;
    }
    const choices = box.querySelector('.choices');
    if (choices) { choices.style.lineHeight = '1.2'; choices.style.marginTop = '1px'; }
}

async function init() {
    const p = new URLSearchParams(window.location.search);
    AppState.mode = p.get('mode') || 'exam';
    AppState.qpp = parseInt(p.get('qpp')) || 4;
    const dataUrl = p.get('data');
    if (!dataUrl) return;

    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('btn-' + AppState.mode).classList.add('active');

    const s = document.createElement('script');
    s.src = dataUrl + '?v=' + Date.now();
    s.onload = () => {
        const qb = window.questionBank;
        AppState.data = Array.isArray(qb) ? qb : (qb?.questions || qb?.problems || []);
        AppState.title = window.examTitle || p.get('title') || '수학 시험지';
        document.getElementById('ctrl-title').innerText = AppState.title;
        document.getElementById('print-area').style.display = 'flex';
        render();
    };
    document.body.appendChild(s);
}

function switchMode(mode) {
    const url = new URL(window.location.href);
    url.searchParams.set('mode', mode);
    window.location.href = url.toString();
}

function shuffleData() {
    for (let i = AppState.data.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [AppState.data[i], AppState.data[j]] = [AppState.data[j], AppState.data[i]];
    }
    render();
}

// [성역] makePage
function makePage(area, type, pNum) {
    const page = document.createElement('div');
    page.className = 'page';
    page.style.position = 'relative';
    const header = document.createElement('div');
    header.className = 'page-header';
    if (type === 'exam') header.style.borderBottomColor = '#1d4ed8';
    else if (type === 'sol')  header.style.borderBottomColor = '#dc2626';
    else if (type === 'ans')  header.style.borderBottomColor = '#059669';

    const t = parseExamTitle(AppState.title);
    const leftText = [t.year, t.school, t.grade, t.semester, t.examType, t.subject].filter(Boolean).join(' | ') || AppState.title;
    let rightText = (type === 'sol') ? '[ 정답 및 해설 ]' : (type === 'ans') ? '[ 정답표 ]' : '이름: ____________  점수:        / 100';

    header.innerHTML = `<div style="flex:1;">${leftText}</div><div style="flex-shrink:0;">${rightText}</div>`;
    page.appendChild(header);

    const body = document.createElement('div');
    body.style.cssText = 'flex:1; display:flex; flex-direction:column; min-height:0;';
    page.appendChild(body);
    page.body = body;

    const pageNum = document.createElement('div');
    pageNum.style.cssText = 'position:absolute; bottom:15mm; left:0; width:100%; text-align:center; font-size:9pt; color:#555;';
    pageNum.textContent = `- ${pNum} -`;
    page.appendChild(pageNum);

    area.appendChild(page);
    return page;
}

// [성역] renderExam
function renderExam(area, data) {
    let pNum = 1;
    const circled = ['①','②','③','④','⑤'];
    for (let i = 0; i < data.length; i += AppState.qpp) {
        const page = makePage(area, 'exam', pNum++);
        const grid = document.createElement('div');
        grid.className = 'grid-container';
        const left = document.createElement('div'); left.className = 'grid-col';
        const right = document.createElement('div'); right.className = 'grid-col';
        grid.appendChild(left); grid.appendChild(right);
        page.body.appendChild(grid);
        
        const split = Math.ceil(AppState.qpp / 2);
        
        data.slice(i, i + AppState.qpp).forEach((q, idx) => {
            const box = document.createElement('div');
            box.className = 'q-box';
            
            const isChoice = Array.isArray(q.choices) && q.choices.length > 0 && q.choices[0] !== '주관식' && q.choices.some(c => String(c).trim() !== '');
            const choicesHTML = isChoice
                ? `<div class="choices">${q.choices.map((c,ci) => `<div>${circled[ci]||''} ${wrapLatex(String(c))}</div>`).join('')}</div>`
                : `<div class="answer-box"></div>`;

            box.innerHTML = `<div class="q-num">${i+idx+1}.</div><div>${wrapLatex(q.content)}</div>${choicesHTML}`;
            
            const targetCol = (idx < split ? left : right);
            targetCol.appendChild(box);
            fitQuestionBox(box);
        });
    }
}

// [성역] renderSol
function renderSol(area, data) {
    let pNum = 1;
    const split = Math.ceil(AppState.qpp / 2);
    for (let i = 0; i < data.length; i += AppState.qpp) {
        const page = makePage(area, 'sol', pNum++);
        const grid = document.createElement('div');
        grid.className = 'grid-container';
        const left = document.createElement('div'); left.className = 'grid-col';
        const right = document.createElement('div'); right.className = 'grid-col';
        grid.appendChild(left); grid.appendChild(right);
        page.body.appendChild(grid);

        data.slice(i, i + AppState.qpp).forEach((q, idx) => {
            const box = document.createElement('div');
            box.className = 'q-box sol-box';
            const solutionText = q.solution || q.explanation || q.sol || '해설이 없습니다.';
            box.innerHTML = `
                <div class="q-num">${i + idx + 1}.</div>
                <div style="margin-bottom:10px; color:#666;">${wrapLatex(q.content)}</div>
                <div style="background:#fdfdfd; padding:10px; border:1px solid #eee;">
                    <div style="font-weight:bold; color:red; margin-bottom:5px;">[정답] ${wrapLatex(q.answer ?? '–')}</div>
                    <div style="font-size:9pt; line-height:1.6;">${wrapLatex(solutionText)}</div>
                </div>`;
            
            const targetCol = (idx < split ? left : right);
            targetCol.appendChild(box);
        });
    }
}

// [성역] renderAns
function renderAns(area, data) {
    const PER_PAGE = 50;
    let pCount = 1;
    for (let start = 0; start < data.length; start += PER_PAGE) {
        const chunk = data.slice(start, start + PER_PAGE);
        const p = makePage(area, 'ans', pCount++);
        const grid = document.createElement('div');
        grid.className = 'ans-grid';
        const splitIndex = Math.ceil(chunk.length / 2);
        const orderedItems = [];
        for (let i = 0; i < splitIndex; i++) {
            orderedItems.push({ q: chunk[i], qNum: start + i + 1 });
            if (chunk[splitIndex + i]) {
                orderedItems.push({ q: chunk[splitIndex + i], qNum: start + splitIndex + i + 1 });
            }
        }
        orderedItems.forEach(({ q, qNum }) => {
            const unit = document.createElement('div');
            unit.className = 'ans-cell';
            unit.innerHTML = `<div class="ans-n">${qNum}.</div><div class="ans-v">${wrapLatex(q.answer ?? '–')}</div>`;
            grid.appendChild(unit);
        });
        p.body.appendChild(grid);
        if (start + PER_PAGE >= data.length) {
            const solUrl = new URL(window.location.href);
            solUrl.searchParams.set('mode', 'sol');
            const qrDiv = document.createElement('div');
            qrDiv.style.cssText = 'margin-top:auto; padding:20px 0; text-align:center; font-size:8pt; color:#555;';
            qrDiv.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(solUrl.toString())}" style="width:80px;height:80px;" alt="해설 QR"><div style="margin-top:4px; font-weight:bold;">📱 스마트 해설지 바로가기</div>`;
            p.body.appendChild(qrDiv);
        }
    }
}

// [성역] render (MathJax 호출 포함)
function render() {
    const area = document.getElementById('print-area');
    area.innerHTML = '';
    area.style.display = 'flex';
    
    if (AppState.mode === 'ans') renderAns(area, AppState.data);
    else if (AppState.mode === 'sol') renderSol(area, AppState.data);
    else renderExam(area, AppState.data);
    
    if (window.MathJax && MathJax.typesetPromise) {
        if (MathJax.typesetClear) MathJax.typesetClear([area]);
        MathJax.typesetPromise([area]);
    }
}
window.onload = init;
</script>
</body>
</html>
