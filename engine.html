<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시험지 출력 엔진 v9.1 - AP수학 무결성 버전</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], macros: { tf: ['\\dfrac{#1}{#2}', 2] } },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        @page { size: A4; margin: 0; }
        body { margin: 0; font-family: 'Nanum Myeongjo', serif; font-size: 9.5pt; background: #f1f5f9; padding-top: 50px; }
        #mode-ctrl { position: fixed; top: 0; left: 0; width: 100%; height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; background: white; z-index: 1000; border-bottom: 1px solid #e2e8f0; }
        .page { width: 210mm; height: 297mm; padding: 15mm; margin: 0 auto 10mm auto; background: #fff; page-break-after: always; display: flex; flex-direction: column; box-sizing: border-box; }
        .content-container { width: 100%; height: 100%; overflow: hidden; }
        
        /* 시험지 모드: 2단 레이아웃 */
        body.test-mode .content-container { column-count: 2; column-gap: 10mm; column-rule: 1px solid #000; }
        
        /* 해설지 모드: 1단으로 가독성 확보 */
        body.sol-mode .content-container { column-count: 1; }

        .item { break-inside: avoid; margin-bottom: 20px; padding: 2mm; box-sizing: border-box; display: flex; flex-direction: column; }
        mjx-container { max-width: 100% !important; overflow-x: auto !important; overflow-y: hidden !important; }

        .sol-mode-only { display: none; }
        body.sol-mode .sol-mode-only { 
            display: block; background: #f8fafc; padding: 10px; margin-top: 10px; border-radius: 4px; 
            font-size: 9pt; line-height: 1.6; border-left: 4px solid #1e293b; 
        }
        .ans-box-text { text-align: right; color: #ef4444; font-weight: bold; margin-top: 8px; border-top: 1px dashed #cbd5e1; padding-top: 5px; }

        button { cursor: pointer; padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; }
        @media print { .no-print { display: none !important; } body { padding-top: 0; } .page { margin: 0; } }
    </style>
</head>
<body class="test-mode">
    <div id="mode-ctrl" class="no-print">
        <button onclick="location.href='index.html'">← 목록</button>
        <div>
            <button onclick="setMode('test-mode')">시험지</button>
            <button onclick="setMode('sol-mode')">해설지</button>
            <button onclick="setMode('ans-mode')">정답표</button>
        </div>
        <button onclick="window.print()" style="background:#1e293b; color:white; border:none;">🖨️ 인쇄 / PDF</button>
    </div>
    <div id="print-area"></div>
    <div id="item-pool" style="display:none;"></div>

<script>
const AppState = { title: "" };
const CIRCLED = ['①','②','③','④','⑤'];

function setMode(m) { document.body.className = m; initRender(); }

(function load() {
    const params = new URLSearchParams(window.location.search);
    const file = params.get('data'); 
    const title = params.get('title');
    if (!file) return;
    AppState.title = decodeURIComponent(title || 'AP수학');
    document.title = AppState.title;

    if (file === 'mixed') {
        const raw = sessionStorage.getItem('mixedQuestions');
        if (raw) { window.questionBank = JSON.parse(raw); initRender(); }
        return;
    }

    const s = document.createElement('script');
    s.src = file + '?v=' + Date.now();
    s.onload = initRender;
    document.body.appendChild(s);
})();

async function initRender() {
    renderItems();
    if (window.MathJax?.typesetPromise) await MathJax.typesetPromise();
    paginate();
}

function renderItems() {
    const pool = document.getElementById('item-pool');
    let items = Array.isArray(window.questionBank) ? window.questionBank : (window.questionBank?.questions || []);

    pool.innerHTML = items.map((q, i) => {
        const isMultiple = q.choices && q.choices.length >= 5;
        const hasSvg = q.content && q.content.includes('<svg');
        const isDescriptive = q.num && (q.num.includes('서술') || q.num.includes('서논술'));

        return `
        <div class="item">
            <div style="font-size:7pt; color:#94a3b8;">[${q.level || '중'}] ${q.category || ''}</div>
            <div style="flex:1;">
                <b>${q.num || i+1}.</b> ${q.content}
                ${isMultiple ? `<div style="margin-top:10px;">${q.choices.map((c, ci) => `<div style="margin-bottom:2px;">${CIRCLED[ci]} ${c}</div>`).join('')}</div>` : ''}
            </div>
            ${hasSvg ? `<div style="margin-top:10px; text-align:center;"></div>` : ''}
            ${(!isMultiple && !isDescriptive) ? `<div style="margin-top:10px; border:1px solid #eee; height:25mm; background:#fafafa;"></div>` : ''}
            <div class="sol-mode-only">
                <div style="font-weight:bold; border-bottom:1px solid #cbd5e1; margin-bottom:5px;">[해설]</div>
                <div style="white-space: pre-wrap;">${q.solution || '해설 미입력'}</div>
                <div class="ans-box-text">정답: ${q.answer}</div>
            </div>
        </div>`;
    }).join('');
}

function paginate() {
    const printArea = document.getElementById('print-area');
    printArea.innerHTML = '';
    const poolItems = document.getElementById('item-pool').querySelectorAll('.item');
    const items = Array.from(poolItems);
    const mode = document.body.className;

    const addPage = (suffix = "") => {
        const page = document.createElement('div'); page.className = 'page';
        page.innerHTML = `<div style="border-bottom:2.5px solid #1e293b; padding-bottom:5px; margin-bottom:15px; font-weight:bold; display:flex; justify-content:space-between; font-size:11pt;">
            <span>${AppState.title} ${suffix}</span><span>- ${printArea.children.length + 1} -</span>
        </div><div class="content-container"></div>`;
        printArea.appendChild(page);
        return page;
    };

    if (mode === 'ans-mode') {
        const page = addPage("[정답표]");
        let html = '<table style="width:100%; border-collapse:collapse; table-layout:fixed;">';
        let bank = Array.isArray(window.questionBank) ? window.questionBank : (window.questionBank?.questions || []);
        for (let i = 0; i < bank.length; i += 5) {
            html += '<tr>';
            for (let j = i; j < i + 5; j++) {
                if (j < bank.length) {
                    const cleanAns = bank[j].answer.replace(/\$/g, '');
                    html += `<td style="border:1.5px solid #000; padding:8px; text-align:center; background:#f1f5f9; font-weight:bold; width:35px;">${j+1}</td><td style="border:1.5px solid #000; padding:8px; text-align:center;">${cleanAns}</td>`;
                } else { html += '<td style="border:1.5px solid #000; width:35px;"></td><td style="border:1.5px solid #000;"></td>'; }
            }
            html += '</tr>';
        }
        page.querySelector('.content-container').innerHTML = html + '</table>';
        return;
    }

    // [핵심] 모드별 자동 페이지 분할 로직
    const itemsPerPage = (mode === 'test-mode') ? 4 : 2; // 시험지는 4개, 해설지는 2개씩
    let currentPage = addPage(mode === 'sol-mode' ? "[해설지]" : "");
    
    items.forEach((item, idx) => {
        if (idx > 0 && idx % itemsPerPage === 0) {
            currentPage = addPage(mode === 'sol-mode' ? "[해설지]" : "");
        }
        currentPage.querySelector('.content-container').appendChild(item.cloneNode(true));
    });
}
</script>
</body>
</html>
