<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AP 수학 엔진</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        @page { size: A4; margin: 0; }
        body { margin: 0; font-family: 'Nanum Myeongjo', serif; font-size: 9.5pt; background: #f1f5f9; padding-top: 50px; }
        #mode-ctrl { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: white; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; border-bottom: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        
        .page { width: 210mm; height: 297mm; padding: 15mm; margin: 0 auto 10mm auto; background: white; box-sizing: border-box; display: flex; flex-direction: column; }
        .content-container { flex: 1; display: grid; grid-template-columns: 1fr 1fr; position: relative; gap: 0 20px; }
        .content-container::after { content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: #000; }

        .item { padding: 15px 10px; border-bottom: 0.5px solid #eee; break-inside: avoid; display: flex; flex-direction: column; height: 100%; }
        .answer-box { margin-top: auto; border: 1px dashed #ccc; min-height: 35mm; background: #fafafa; }
        @media print { .no-print { display: none; } body { padding: 0; } .page { margin: 0; border: none; } }
    </style>
</head>
<body class="test-mode">
    <div id="mode-ctrl" class="no-print">
        <button onclick="location.href='index.html'">← 목록</button>
        <button onclick="window.print()" style="background:#1e293b; color:white; border:none; padding:5px 15px; border-radius:4px;">인쇄</button>
    </div>
    <div id="print-area"></div>
    <div id="item-pool" style="display:none;"></div>

<script>
const AppState = { title: "", qpp: 4 };

function normalizeQuestion(q) {
    // 2시 시점의 기본적인 텍스트 보정 로직
    if (!q.content) return q;
    return q;
}

(function load() {
    const params = new URLSearchParams(window.location.search);
    AppState.qpp = parseInt(params.get('qpp')) || 4;
    AppState.title = decodeURIComponent(params.get('title') || 'AP수학');
    const f = params.get('data');
    if (!f) return;
    
    const s = document.createElement('script');
    s.src = decodeURIComponent(f) + '?v=' + Date.now();
    s.onload = initRender;
    document.body.appendChild(s);
})();

function initRender() {
    const pool = document.getElementById('item-pool');
    const bank = window.questionBank || [];
    
    pool.innerHTML = bank.map((q, i) => `
        <div class="item">
            <div style="font-size:10.5pt; margin-bottom:8px;"><b>${i+1}.</b> ${q.content}</div>
            ${q.choices ? `<div style="line-height:1.8;">${q.choices.map((c,ci)=>`<div>${ci+1}) ${c}</div>`).join('')}</div>` : '<div class="answer-box"></div>'}
        </div>`).join('');

    paginate();
    if (window.MathJax) MathJax.typeset();
}

function paginate() {
    const printArea = document.getElementById('print-area');
    printArea.innerHTML = '';
    const items = Array.from(document.getElementById('item-pool').querySelectorAll('.item'));
    
    const addPage = () => {
        const p = document.createElement('div'); p.className = 'page';
        p.innerHTML = `<div style="border-bottom:2px solid #000; padding-bottom:5px; margin-bottom:15px; display:flex; justify-content:space-between; font-weight:800;">
            <span>${AppState.title}</span><span>- ${printArea.children.length+1} -</span>
        </div><div class="content-container"></div>`;
        printArea.appendChild(p);
        return p;
    };

    let currentPage = addPage();
    items.forEach((item, idx) => {
        if (idx > 0 && idx % AppState.qpp === 0) currentPage = addPage();
        currentPage.querySelector('.content-container').appendChild(item.cloneNode(true));
    });
}
</script>
</body>
</html>
