<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AP 수학 엔진</title>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']],
                packages: {'[+]': ['ams', 'boldsymbol']}
            },
            options: { enableMenu: false },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        @page { size: A4; margin: 0; }

        body {
            margin: 0;
            font-family: 'Nanum Myeongjo', serif;
            font-size: 9.5pt;
            background: #f1f5f9;
            padding-top: 54px;
            color: #000;
        }

        #mode-ctrl {
            position: fixed; top: 0; left: 0; width: 100%; height: 56px;
            background: #0f172a; display: flex; justify-content: space-between;
            align-items: center; padding: 0 24px; z-index: 1000;
            box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.08);
            gap: 16px;
        }
        #ctrl-title {
            font-size: 14px; font-weight: 800; color: white;
            white-space: nowrap; letter-spacing: -0.3px;
            flex-shrink: 0;
        }
        /* 모드 전환 탭 */
        .mode-tabs {
            display: flex; gap: 4px;
            background: rgba(255,255,255,0.07);
            padding: 4px; border-radius: 10px;
            flex-shrink: 0;
        }
        .mode-tab {
            padding: 6px 16px; border-radius: 7px;
            font-size: 12px; font-weight: 700;
            cursor: pointer; border: none;
            background: transparent; color: rgba(255,255,255,0.5);
            transition: 0.18s; font-family: inherit;
            letter-spacing: -0.2px;
        }
        .mode-tab:hover { color: white; background: rgba(255,255,255,0.1); }
        .mode-tab.active {
            background: white; color: #0f172a;
            box-shadow: 0 1px 4px rgba(0,0,0,0.25);
        }
        /* 우측 버튼 */
        .ctrl-right { display: flex; gap: 8px; flex-shrink: 0; }
        .print-btn {
            padding: 7px 16px; border: none; border-radius: 7px;
            font-family: inherit; font-weight: 700; font-size: 12px;
            cursor: pointer; transition: 0.15s;
        }
        .print-btn.primary {
            background: #378ADD; color: white;
        }
        .print-btn.primary:hover { background: #2e73c4; }
        .print-btn.ghost {
            background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8);
        }
        .print-btn.ghost:hover { background: rgba(255,255,255,0.18); color: white; }

        #print-area {
            display: none; flex-direction: column;
            align-items: center; gap: 20px; padding: 20px 0;
        }

        .page {
            width: 210mm; height: 297mm;
            background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 15mm; box-sizing: border-box;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        @media print {
            body { padding-top: 0; background: white; }
            #mode-ctrl { display: none; }
            #print-area { display: flex !important; gap: 0; padding: 0; }
            .page { box-shadow: none; page-break-after: always; }
            #pdf-container { display: none !important; }
        }

        .page-header {
            display: flex; justify-content: space-between;
            border-bottom: 2px solid #000;
            padding-bottom: 5px; margin-bottom: 12px;
            font-weight: bold; flex-shrink: 0;
        }

        #pdf-container { display: none; width: 100%; height: calc(100vh - 54px); }
        #pdf-viewer { width: 100%; height: 100%; border: none; }

        /* 시험지 2열 */
        .grid-container {
            flex: 1; display: grid;
            grid-template-columns: 1fr 1fr;
            position: relative; overflow: hidden;
        }
        .grid-container::after {
            content: ''; position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 1px; background: #000;
        }
        .grid-col {
            display: flex; flex-direction: column;
            padding: 0 12px; overflow: hidden;
        }

        /* 문항 박스 — flex:1로 열 높이를 균등 분할 (4등분/6등분) */
        .q-box {
            flex: 1;
            padding: 10px 0;
            border-bottom: 0.5px solid #ccc;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .q-box:last-child { border-bottom: none; }
        .q-num { font-weight: bold; font-size: 11pt; margin-bottom: 4px; flex-shrink: 0; }
        .answer-box {
            flex: 1;
            border: 1px dashed #bbb;
            margin-top: 8px; background: #fafafa;
        }
        .choices { margin-top: 6px; line-height: 2; }

        /* 해설지 2열 신문 칼럼 */
        .sol-container {
            flex: 1;
            column-count: 2;
            column-gap: 24px;
            column-rule: 1px solid #ccc;
        }
        .sol-box {
            padding: 8px 0;
            border-bottom: 0.5px solid #eee;
            break-inside: avoid-page;
            display: inline-block;
            width: 100%;
        }
        .sol-box:last-child { border-bottom: none; }
        .sol-step {
            padding-left: 8px;
            border-left: 2px solid #e2e8f0;
            margin-bottom: 4px; font-size: 9pt;
        }

        /* 정답표 */
        .ans-grid {
            display: flex;
            flex-direction: column;
            gap: 10px; margin-top: 10px;
        }
        .ans-cell {
            padding: 8px;
            display: flex; align-items: flex-start; gap: 8px;
        }
    </style>
</head>
<body>

    <div id="mode-ctrl">
        <span id="ctrl-title">AP 수학</span>

        <div class="mode-tabs" id="modeTabs">
            <button class="mode-tab" data-mode="exam" onclick="switchMode('exam')">시험지</button>
            <button class="mode-tab" data-mode="sol"  onclick="switchMode('sol')">해설지</button>
            <button class="mode-tab" data-mode="ans"  onclick="switchMode('ans')">정답표</button>
        </div>

        <div class="ctrl-right">
            <button class="print-btn primary" onclick="window.print()">🖨 인쇄</button>
            <button class="print-btn ghost"   onclick="history.back()">← 목록</button>
        </div>
    </div>

    <div id="pdf-container">
        <iframe id="pdf-viewer" src=""></iframe>
    </div>

    <div id="print-area"></div>
    <div id="staging" style="position:absolute;top:-9999px;left:0;visibility:hidden;width:85mm;"></div>

<script>
const AppState = { title: 'AP 수학', data: [], mode: 'exam', qpp: 4 };
let pageCount = 0;

/* ── 데이터 로딩 ── */
async function loadData(dataUrl) {
    // mixed: sessionStorage
    if (dataUrl === 'mixed') {
        const raw = sessionStorage.getItem('mixedQuestions');
        return raw ? JSON.parse(raw) : [];
    }

    // exams/*.js : script 태그 방식 (window.questionBank)
    return new Promise(res => {
        delete window.questionBank;
        const s = document.createElement('script');
        s.src = dataUrl + '?v=' + Date.now();
        s.onload = () => {
            const qb = window.questionBank;
            const data = Array.isArray(qb) ? qb
                       : (qb?.questions || qb?.problems || []);
            res(data);
        };
        s.onerror = () => res([]);
        document.body.appendChild(s);
    });
}

/* ── 초기화 ── */
async function init() {
    const p = new URLSearchParams(window.location.search);
    AppState.mode  = p.get('mode')  || 'exam';
    AppState.title = p.get('title') || 'AP 수학 기출';
    AppState.qpp   = parseInt(p.get('qpp')) || 4;
    AppState.data_url = p.get('data') || '';

    const file    = p.get('file');
    const dataUrl = AppState.data_url;

    document.getElementById('ctrl-title').innerText = AppState.title;

    // PDF 모드 — 탭 숨김
    if (AppState.mode === 'pdf' && file) {
        document.getElementById('modeTabs').style.display = 'none';
        document.getElementById('pdf-container').style.display = 'block';
        document.getElementById('pdf-viewer').src = file;
        return;
    }

    // 탭 활성화
    updateTabs(AppState.mode);

    document.getElementById('print-area').style.display = 'flex';

    if (dataUrl) {
        AppState.data = await loadData(dataUrl);
        if (AppState.data.length > 0) await renderEngine();
        else console.warn('문항 데이터 없음:', dataUrl);
    }
}

/* ── 탭 활성화 ── */
function updateTabs(mode) {
    document.querySelectorAll('.mode-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
    });
}

/* ── 모드 전환 ── */
function switchMode(mode) {
    if (mode === AppState.mode) return;
    const qpp = (mode === 'exam') ? AppState.qpp : 4;
    const url = new URL(window.location.href);
    url.searchParams.set('mode', mode);
    url.searchParams.set('qpp', qpp);
    window.location.href = url.toString();
}

/* ── 렌더 분기 ── */
async function renderEngine() {
    const area = document.getElementById('print-area');
    area.innerHTML = '';
    pageCount = 0;

    if      (AppState.mode === 'ans') renderAnsGrid(area, AppState.data);
    else if (AppState.mode === 'sol') await renderSol(area, AppState.data);
    else                               await renderExam(area, AppState.data);
}

/* ── 시험지: QPP 격자 (2×2 or 2×3) ── */
async function renderExam(area, bank) {
    const perCol  = AppState.qpp / 2;
    const staging = document.getElementById('staging');
    staging.innerHTML = '';

    const boxes = bank.map((q, i) => {
        const el = document.createElement('div');
        el.className = 'q-box';
        el.innerHTML = buildExamBox(q, i);
        staging.appendChild(el);
        return el;
    });

    if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([staging]);
    await raf();

    for (let start = 0; start < boxes.length; start += AppState.qpp) {
        const chunk = boxes.slice(start, start + AppState.qpp);
        const page  = makePage(area, 'exam');

        chunk.slice(0, perCol).forEach(el => page.cols[0].appendChild(el.cloneNode(true)));
        chunk.slice(perCol).forEach(el   => page.cols[1].appendChild(el.cloneNode(true)));
    }
}

function buildExamBox(q, i) {
    const circled = ['①','②','③','④','⑤'];
    const choicesHTML = q.choices
        ? `<div class="choices">${q.choices.map((c, ci) =>
              `<div>${circled[ci] || (ci+1)+')'} ${wrapLatex(c)}</div>`).join('')}</div>`
        : `<div class="answer-box"></div>`;
    return `
        <div class="q-num">${i + 1}.</div>
        <div>${wrapLatex(q.content || q.question || '')}</div>
        ${choicesHTML}`;
}

/* ── 해설지: CSS 다단 Flow ── */
async function renderSol(area, bank) {
    const staging = document.getElementById('staging');
    staging.innerHTML = '';

    const p = makePage(area, 'sol');
    const container = p.container;

    bank.forEach((q, i) => {
        const el = document.createElement('div');
        el.className = 'sol-box';
        el.innerHTML = buildSolBox(q, i);
        container.appendChild(el);
    });

    if (window.MathJax?.typesetPromise) await MathJax.typesetPromise([p.page]);
}

function buildSolBox(q, i) {
    let solHTML;
    if (q.solution_steps?.length) {
        solHTML = q.solution_steps.map((s, si) =>
            `<div class="sol-step"><b>[${si+1}단계]</b> ${stripCite(s)}</div>`
        ).join('');
    } else if (q.solution) {
        solHTML = `<div class="sol-step">${stripCite(q.solution)}</div>`;
    } else {
        solHTML = `<span style="color:#94a3b8;font-size:8pt;">해설 없음</span>`;
    }
    return `
        <div class="q-num" style="margin-bottom:4px;">${i+1}.
            <span style="font-size:9pt;font-weight:normal;">
                ${wrapLatex(q.content || q.question || '')}
            </span>
        </div>
        <div style="font-size:9pt;">${solHTML}</div>`;
}

/* ── 정답표 ── */
function renderAnsGrid(area, bank) {
    const p = makePage(area, 'ans');
    const grid = document.createElement('div');
    grid.className = 'ans-grid';
    bank.forEach((q, i) => {
        const cell = document.createElement('div');
        cell.className = 'ans-cell';
        cell.innerHTML = `<b style="font-size:11pt;min-width:40px;">${i+1}.</b>
                          <span style="font-size:11pt;">${wrapLatex(q.answer ?? '–')}</span>`;
        grid.appendChild(cell);
    });
    p.body.appendChild(grid);
    if (window.MathJax?.typesetPromise) MathJax.typesetPromise([p.body]);
}

/* ── 페이지 팩토리 ── */
function makePage(area, type) {
    pageCount++;
    const page = document.createElement('div');
    page.className = 'page';

    const header = document.createElement('div');
    header.className = 'page-header';
    header.innerHTML = `<span>${AppState.title}</span><span>- ${pageCount} -</span>`;
    page.appendChild(header);

    if (type === 'sol') {
        const container = document.createElement('div');
        container.className = 'sol-container';
        page.appendChild(container);
        area.appendChild(page);
        return { page, container };
    }

    if (type === 'ans') {
        const body = document.createElement('div');
        body.style.flex = '1';
        page.appendChild(body);
        area.appendChild(page);
        return { page, body };
    }

    // exam — 2열
    const grid  = document.createElement('div');
    grid.className = 'grid-container';
    const left  = document.createElement('div');
    left.className = 'grid-col';
    const right = document.createElement('div');
    right.className = 'grid-col';
    grid.appendChild(left);
    grid.appendChild(right);
    page.appendChild(grid);
    area.appendChild(page);
    return { page, cols: [left, right] };
}

/* ── 텍스트 전처리 유틸 ── */

// \frac 등 LaTeX인데 $ 없는 경우 자동으로 감싸기
function wrapLatex(text) {
    if (!text) return text;
    if (text.includes('$')) return text;          // 이미 $ 있으면 그대로
    if (text.includes('\\')) return `$${text}$`; // \ 있으면 수식으로 감싸기
    return text;
}

// 태그 제거
function stripCite(text) {
    if (!text) return text;
    return text.replace(/\[cite:[^\]]*\]/g, '').trim();
}

function raf() { return new Promise(r => requestAnimationFrame(r)); }

window.onload = init;
</script>
</body>
</html>
