<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시험지 엔진 v8.9 (Final)</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], macros: { tf: ['\\dfrac{#1}{#2}', 2] } },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        @page { size: A4; margin: 0; }
        body { margin: 0; font-family: 'Nanum Myeongjo', serif; font-size: 9.5pt; background: #f1f5f9; padding-top: 50px; }
        #mode-ctrl { position: fixed; top: 0; left: 0; width: 100%; height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; background: white; z-index: 1000; border-bottom: 1px solid #e2e8f0; }
        .page { width: 210mm; height: 297mm; padding: 15mm; margin: 0 auto 10mm auto; background: #fff; page-break-after: always; display: flex; flex-direction: column; box-sizing: border-box; }
        .content-container { display: flex; flex: 1; width: 100%; height: 100%; overflow: hidden; }
        body.test-mode .content-container { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10mm; }
        body.test-mode .item { height: 125mm; overflow: hidden; border: 1px solid #f1f5f9; padding: 5mm; box-sizing: border-box; display: flex; flex-direction: column; }
        body.sol-mode .item { border-bottom: 1px dashed #cbd5e1; padding-bottom: 8mm; margin-bottom: 8mm; }
        .sol-mode-only { display: none; }
        body.sol-mode .sol-mode-only { display: block; }
        button { cursor: pointer; padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; }
        @media print { .no-print { display: none !important; } body { padding-top: 0; } .page { margin: 0; } }
        .step-box { margin-bottom: 6px; font-size: 9pt; line-height: 1.5; color: #334155; }
        .wrong-reason { font-size: 8pt; color: #64748b; margin-top: 8px; padding: 6px; background: #f8fafc; border-radius: 4px; border-left: 3px solid #cbd5e1; }
        .error-check-tag { font-size: 7.5pt; color: #94a3b8; margin-top: 6px; font-family: monospace; }
        .score-tag { color: #94a3b8; font-size: 8pt; font-weight: normal; margin-left: 4px; }
        .multi-tag { color: #ef4444; font-size: 8.5pt; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body class="test-mode">
    <div id="mode-ctrl" class="no-print">
        <button onclick="location.href='index.html'">← 목록</button>
        <div>
            <button onclick="setMode('test-mode')">시험지</button>
            <button onclick="setMode('sol-mode')">해설지</button>
            <button onclick="setMode('ans-mode')">정답표</button>
        </div>
        <button onclick="window.print()" style="background:#1e293b; color:white; border:none;">🖨️ 인쇄 / PDF</button>
    </div>
    <div id="print-area"></div>
    <div id="item-pool" style="display:none;"></div>

<script>
const AppState = { title: "" };
const CIRCLED = ['①','②','③','④','⑤'];

function setMode(m) { document.body.className = m; initRender(); }

(function load() {
    const params = new URLSearchParams(window.location.search);
    const file = params.get('data');
    const title = params.get('title');
    if (!file) return;
    AppState.title = decodeURIComponent(title || 'AP수학');
    document.title = AppState.title;
    const s = document.createElement('script');
    s.src = file + '?v=' + Date.now();
    s.onload = initRender;
    s.onerror = () => {
        document.getElementById('print-area').innerHTML = `<h2 style='text-align:center; margin-top:100px;'>❌ 파일을 찾을 수 없습니다.</h2>`;
    };
    document.body.appendChild(s);
})();

async function initRender() {
    renderItems();
    if (window.MathJax?.typesetPromise) await MathJax.typesetPromise();
    paginate();
}

function renderItems() {
    const pool = document.getElementById('item-pool');
    const bank = window.questionBank || (window.problems ? window.problems : []);
    
    pool.innerHTML = bank.map((q, i) => {
        const choicesArr = q.choices || [];
        const isSub = choicesArr.length < 5;
        const scoreTag = q.score ? `<span class="score-tag">[${q.score}점]</span>` : '';
        const multiTag = q.answer_count > 1 ? `<span class="multi-tag">(정답 ${q.answer_count}개)</span>` : '';
        const choicesHtml = choicesArr.map((c, ci) => {
            const text = (typeof c === 'string') ? c : c.text;
            const key = (typeof c === 'string') ? CIRCLED[ci] : c.key;
            return `<div>${key} ${text}</div>`;
        }).join('');

        const solutionHtml = q.solution_steps 
            ? q.solution_steps.map((step, si) => `<div class="step-box"><b>Step ${si+1}.</b> ${step}</div>`).join('')
            : q.solution || '';

        const wrongHtml = q.wrong_reason
            ? `<div class="wrong-reason"><b>[오답 분석]</b> ${Object.entries(q.wrong_reason).map(([k,v]) => `<span>${k} ${v}</span>`).join(' | ')}</div>`
            : '';

        const answerText = Array.isArray(q.answer) ? q.answer.join(', ') : q.answer;

        return `
        <div class="item">
            <div style="font-size:7.5pt; color:#94a3b8;">[${q.level || '중'}] ${q.category || ''}</div>
            <div style="flex:1;">
                <b>${i+1}.</b>${scoreTag} ${q.content}${multiTag}
                ${!isSub ? `<div style="margin-top:10px;">${choicesHtml}</div>` : ''}
            </div>
            ${isSub ? `<div style="margin-top:auto; border:1px solid #ccc; height:35mm; background:#f8fafc;"></div>` : ''}
            <div class="sol-mode-only" style="margin-top:10px; padding-top:10px; border-top:1px dashed #eee;">
                <b>[해설]</b>
                <div style="margin-top:5px;">${solutionHtml}</div>
                ${wrongHtml}
                ${q.error_check ? `<div class="error-check-tag">✓ ${q.error_check}</div>` : ''}
                <div style="text-align:right; color:#ef4444; font-weight:bold; margin-top:8px;">정답: ${answerText}</div>
            </div>
        </div>`;
    }).join('');
}

function paginate() {
    const printArea = document.getElementById('print-area');
    printArea.innerHTML = '';
    const items = Array.from(document.getElementById('item-pool').querySelectorAll('.item'));
    const mode = document.body.className;

    const addPage = (suffix = "") => {
        const page = document.createElement('div'); page.className = 'page';
        page.innerHTML = `<div style="border-bottom:2px solid #1e293b; padding-bottom:5px; margin-bottom:15px; font-weight:bold; display:flex; justify-content:space-between;">
            <span>${AppState.title} ${suffix}</span><span>- ${printArea.children.length + 1} -</span>
        </div><div class="content-container"></div>`;
        printArea.appendChild(page);
        return page;
    };

    if (mode === 'ans-mode') {
        const page = addPage("[정답표]");
        let html = '<table style="width:100%; border-collapse:collapse; margin-top:10px;">';
        const bank = window.questionBank || (window.problems ? window.problems : []);
        for (let i = 0; i < bank.length; i += 5) {
            html += '<tr>';
            for (let j = i; j < i + 5; j++) {
                if (j < bank.length) {
                    const ans = Array.isArray(bank[j].answer) ? bank[j].answer.join(', ') : bank[j].answer;
                    html += `<td style="border:1px solid #ccc; padding:8px; text-align:center; background:#f8fafc; font-weight:bold; width:40px;">${j+1}</td><td style="border:1px solid #ccc; padding:8px; text-align:center;">${ans}</td>`;
                } else html += '<td style="border:1px solid #ccc; width:40px;"></td><td style="border:1px solid #ccc;"></td>';
            }
            html += '</tr>';
        }
        page.querySelector('.content-container').innerHTML = html + '</table>';
        return;
    }

    let currentPage = addPage(mode === 'sol-mode' ? "[해설지]" : "");
    items.forEach((item, idx) => {
        // [클로드 피드백 반영] 해설지(sol-mode)는 한 페이지에 3개, 시험지는 4개씩 배분
        const itemsPerPage = mode === 'sol-mode' ? 3 : 4;
        if (idx > 0 && idx % itemsPerPage === 0) {
            currentPage = addPage(mode === 'sol-mode' ? "[해설지]" : "");
        }
        currentPage.querySelector('.content-container').appendChild(item.cloneNode(true));
    });
}
</script>
</body>
</html>
