<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AP Math 출제 매니저 v3.9.7 (Stable)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=block');
        body { font-family: 'Nanum Myeongjo', serif; padding: 30px; background: #f1f5f9; color: #1e293b; letter-spacing: -0.5px; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 5px solid #3b82f6; }
        h1 { color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-top: 0; font-weight: 800; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; color: #475569; font-size: 11pt; }
        input[type="text"], input[type="password"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 10.5pt; }
        .api-input-container { display: flex; gap: 8px; align-items: center; }
        .btn-save { padding: 10px 15px; background: #64748b; color: white; border-radius: 6px; font-size: 10pt; font-weight: 800; cursor: pointer; border: none; transition: 0.2s; }
        .btn-save.success { background: #10b981; }
        .difficulty-table { background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .difficulty-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center; }
        .difficulty-item input { text-align: center; width: 70px; }
        .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 30px; }
        button { padding: 12px 20px; font-size: 11pt; border-radius: 8px; cursor: pointer; font-weight: 800; border: none; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        button:disabled { background: #cbd5e1 !important; cursor: not-allowed; }
        .btn-main { background: #3b82f6; color: white; flex: 2; min-width: 200px; font-size: 13pt; }
        .btn-print { background: #6366f1; color: white; }
        .btn-copy { background: #10b981; color: white; }
        .btn-reset { background: #ef4444; color: white; }
        #outputBox { margin-top: 25px; background: #1e293b; color: #f8fafc; padding: 25px; border-radius: 8px; font-family: 'Consolas', monospace; white-space: pre-wrap; font-size: 10.5pt; overflow-y: auto; max-height: 400px; border: 1px solid #334155; }
        .status { margin-top: 15px; font-weight: 800; text-align: center; font-size: 11pt; min-height: 25px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AP Math 출제 매니저 v3.9.7</h1>
    <div class="status" style="font-size: 9pt; color: #64748b; margin-bottom: 10px;">📍 수식 렌더링 엔진(MathJax) 강화 완료</div>
    
    <div class="input-group">
        <label>🔑 Gemini API Key (Private PC 저장)</label>
        <div class="api-input-container">
            <input type="password" id="apiKey" placeholder="API 키를 입력하세요" autocomplete="current-password" style="flex: 1;">
            <button id="btnSaveKey" class="btn-save" onclick="saveApiKey()">💾 저장</button>
        </div>
    </div>
    <div class="input-group">
        <label>📄 시험 제목</label>
        <input type="text" id="examTitle" value="24_연향중2_1학기_중간_중2">
    </div>
    <div class="input-group">
        <label>🎯 출제 범위 및 상세 지시</label>
        <input type="text" id="topicInput" value="유리수와 순환소수 ~ 일차부등식 (심화 문항 결합)">
    </div>
    <div class="difficulty-table">
        <label>📊 난이도별 문항 설정</label>
        <div class="difficulty-grid">
            <div class="difficulty-item"><label>하</label><input type="number" id="count_low" value="5"></div>
            <div class="difficulty-item"><label>중</label><input type="number" id="count_mid" value="10"></div>
            <div class="difficulty-item"><label>상</label><input type="number" id="count_high" value="4"></div>
            <div class="difficulty-item"><label>최상</label><input type="number" id="count_top" value="1"></div>
        </div>
    </div>
    <div class="btn-row">
        <button id="btnMain" class="btn-main" onclick="generateAIProblem()">⚡ 출제 및 DB 저장 시작</button>
        <button id="btnPrintExam" class="btn-print" onclick="printDoc('exam')" disabled>🖨️ 시험지</button>
        <button id="btnPrintAns" class="btn-print" onclick="printDoc('answer')" disabled>🔑 정답지</button>
        <button id="btnPrintSol" class="btn-print" onclick="printDoc('solution')" disabled>📖 해설지</button>
        <button id="btnCopy" class="btn-copy" onclick="copyFullHtml()" disabled>📋 HTML 복사</button>
        <button class="btn-reset" onclick="resetBank()">🗑️ 초기화</button>
    </div>
    <div class="status" id="statusMsg">대기 중...</div>
    <div id="outputBox">// window.questionBank 데이터가 출력됩니다.</div>
</div>

<script>
let state = { isGenerating: false, questionBank: [] };

const encodeKey = (str) => btoa(unescape(encodeURIComponent(str)));
const decodeKey = (str) => decodeURIComponent(escape(atob(str)));

window.onload = () => {
    try {
        const encryptedKey = localStorage.getItem('ap_math_permanent_key');
        if (encryptedKey) document.getElementById('apiKey').value = decodeKey(encryptedKey);
    } catch (e) { console.error("Key Restore Error", e); }
    updateUIState();
};

function updateUIState() {
    const hasData = state.questionBank.length > 0;
    const isBusy = state.isGenerating;
    document.getElementById('btnMain').disabled = isBusy;
    ['btnPrintExam', 'btnPrintAns', 'btnPrintSol', 'btnCopy'].forEach(id => {
        document.getElementById(id).disabled = isBusy || !hasData;
    });
}

function saveApiKey() {
    const rawKey = document.getElementById("apiKey").value;
    const cleanKey = rawKey.replace(/[^a-zA-Z0-9-_]/g, '');
    if (!cleanKey) return alert("API 키를 올바르게 입력하세요.");
    document.getElementById("apiKey").value = cleanKey;
    localStorage.setItem('ap_math_permanent_key', encodeKey(cleanKey));
    const btn = document.getElementById("btnSaveKey");
    btn.innerText = "✅ 저장됨"; btn.classList.add("success");
    setTimeout(() => { btn.innerText = "💾 저장"; btn.classList.remove("success"); }, 1500);
}

function resetBank() {
    state.questionBank = [];
    state.isGenerating = false;
    document.getElementById('outputBox').innerText = '// 초기화 완료.';
    document.getElementById('statusMsg').innerText = '대기 중...';
    updateUIState();
}

function extractJSON(text) {
    const match = text.match(/\[\s*{[\s\S]*?}\s*\]/);
    if (!match) throw new Error("JSON 추출 실패");
    return JSON.parse(match[0]);
}

function downloadDB(data, title) {
    const archive = { title, date: new Date().toLocaleDateString(), questions: data };
    const blob = new Blob([JSON.stringify(archive, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${title}.json`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}

function buildQuestionsRows(questions, type) {
    const labels = ['①','②','③','④','⑤'];
    return questions.map((q, i) => {
        const choicesHtml = q.choices.map((c, idx) => `<span>${labels[idx]} ${c}</span>`).join('');
        const solutionHtml = type === 'solution' ? `<div class="sol-box"><b>[해설]</b><br>${q.solution}<br><b>정답: ${q.answer}</b></div>` : '';
        return `<div class="q-item"><span class="q-num">${i + 1}.</span> ${q.content} ${type === 'solution' ? `[${q.difficulty}]` : ''}<div class="choices">${choicesHtml}</div>${solutionHtml}</div>`;
    }).join('');
}

async function generateAIProblem() {
    const rawKey = document.getElementById("apiKey").value;
    const apiKey = rawKey.replace(/[^a-zA-Z0-9-_]/g, ''); 
    const title = document.getElementById("examTitle").value.trim();
    const topic = document.getElementById("topicInput").value.trim();
    const counts = { 하: parseInt(document.getElementById('count_low').value) || 0, 중: parseInt(document.getElementById('count_mid').value) || 0, 상: parseInt(document.getElementById('count_high').value) || 0, 최상: parseInt(document.getElementById('count_top').value) || 0 };
    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    
    if (!apiKey || total === 0) return alert("API 키와 문항 설정을 확인하세요.");

    state.isGenerating = true;
    updateUIState();
    const statusMsg = document.getElementById("statusMsg");
    statusMsg.style.color = "#f59e0b";

    const promptText = `수학 출제: ${topic}. [절대규칙] 정확히 ${total}문항 생성(배열길이=${total}). 난이도분포 엄수: 하(${counts.하}), 중(${counts.중}), 상(${counts.상}), 최상(${counts.최상}). 수식 $...$, 분수 \\tf{#1}{#2} 필수. JSON 배열만 반환. 필드: difficulty, score, content, choices(5개), answer, solution.`;

    try {
        statusMsg.innerText = `⏳ 출제 시도 중...`;
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                contents: [{ parts: [{ text: promptText }] }], 
                generationConfig: { temperature: 0.2, topK: 1, topP: 0.8 } 
            })
        });

        if (!response.ok) throw new Error(`Status: ${response.status}`);
        const data = await response.json();
        const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
        const parsed = extractJSON(rawText);

        state.questionBank = parsed;
        document.getElementById("outputBox").innerText = `// ${title}\nwindow.questionBank = ${JSON.stringify(parsed, null, 2)};`;
        downloadDB(parsed, title);
        statusMsg.style.color = "#10b981";
        statusMsg.innerText = `✅ 출제 성공 및 DB 자동 저장 완료!`;
    } catch (e) {
        statusMsg.style.color = "#ef4444"; 
        statusMsg.innerText = `❌ 실패: ${e.message}`; 
    }
    state.isGenerating = false;
    updateUIState();
}

function printDoc(type) {
    const title = document.getElementById("examTitle").value;
    const questionsHtml = buildQuestionsRows(state.questionBank, type);
    let answerTable = '';
    if (type === 'answer') {
        answerTable = '<table class="ans-table"><tr>' + state.questionBank.map((q, i) => `<td><b>${i+1}</b><br>${q.answer}</td>${(i+1)%5===0?'</tr><tr>' : ''}`).join('') + '</tr></table>';
    }

    // [패치] 수식 마법사(MathJax)가 인쇄용 창에서 완벽히 작동하도록 렌더링 완료 후 인쇄 로직 삽입
    const htmlContent = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>${title}</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=block" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><` + `/script>
    <script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$']],
            macros: { tf: ["\\\\tfrac{#1}{#2}", 2] }
        },
        startup: {
            pageReady: () => {
                return MathJax.startup.defaultPageReady().then(() => {
                    // 수식이 모두 그려지면 인쇄 창을 띄웁니다.
                    setTimeout(() => { window.print(); }, 500);
                });
            }
        }
    };
    <` + `/script>
    <style>
        @page { size: A4; margin: 15mm }
        body { font-family: 'Nanum Myeongjo', serif; font-size: 10.5pt; margin: 0; padding: 20px; }
        .header { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        .container { column-count: ${type==='answer'?1:2}; column-gap: 30px; column-rule: 0.5pt solid #eee; }
        .q-item { break-inside: avoid; margin-bottom: 4rem; position: relative; }
        .q-num { font-weight: 800; font-size: 12pt; }
        .choices { display: grid; grid-template-columns: 1fr; margin-top: 10px; row-gap: 5px; }
        .ans-table { width: 100%; border-collapse: collapse; }
        .ans-table td { border: 1px solid #000; padding: 12px; text-align: center; }
        .sol-box { background: #f8fafc; padding: 12px; border-left: 4px solid #3b82f6; margin-top: 10px; font-size: 9.5pt; }
    </style>
<` + `/head>
<body>
    <div class="header"><h1>${title}${type==='answer'?' (정답)':''}</h1></div>
    <div class="container">${type==='answer'?answerTable:questionsHtml}</div>
<` + `/body>
<` + `/html>`;

    const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const win = window.open(url, '_blank');
    if (!win) alert("팝업 차단을 해제해주세요.");
    setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function copyFullHtml() {
    const title = document.getElementById("examTitle").value;
    const questionsRows = buildQuestionsRows(state.questionBank, 'exam');
    const fullHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=block" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><` + `/script><script>window.MathJax={tex:{inlineMath:[['$','$']],macros:{tf:["\\\\tfrac{#1}{#2}",2]}},startup:{pageReady:()=>MathJax.startup.defaultPageReady().then(()=>document.fonts.ready)}}<` + `/script><style>@page{size:A4;margin:15mm}body{font-family:'Nanum Myeongjo',serif;font-size:10.5pt;margin:0;padding:20px}.header{border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:20px}.container{column-count:2;column-gap:30px;column-rule:0.5pt solid #eee}.q-item{break-inside:avoid;margin-bottom:4rem}.choices{display:grid;grid-template-columns:1fr;margin-top:10px;row-gap:5px}.no-print{text-align:center;margin-bottom:20px}@media print{.no-print{display:none}}</style><` + `/head><body><div class="no-print"><button onclick="window.print()" style="padding:10px 20px;font-weight:800;cursor:pointer">🖨️ 인쇄하기</button></div><div class="header"><h1>${title}</h1></div><div class="container">${questionsRows}</div><` + `/body><` + `/html>`;
    navigator.clipboard.writeText(fullHtml).then(() => alert("HTML 코드 복사 성공")).catch(err => alert("복사 실패"));
}
</script>
</body>
</html>
